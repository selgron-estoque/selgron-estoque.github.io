<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>GestûÈo de Estoques</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#EEF0F3" />
<!-- ûcone da aba do navegador (favicon) ã mesma logo usada no manifest/ûÙcones do PWA -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<!-- iOS: Safari ignora o manifest.json pra ûÙcone/instalaûÏûÈo ã precisa desses -->
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png" />
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<!-- Nome curto sû° pro rû°tulo do ûÙcone na tela de inûÙcio do iOS ã "GestûÈo de
     Estoques" (18 caracteres) ûˋ longo demais e o iOS trunca por caractere
     em vez de por palavra, colando as palavras visualmente. O nome completo
     continua em todo o resto do app (tûÙtulo da aba, tela de login, sidebar
     etc.), sû° este rû°tulo especûÙfico ûˋ encurtado. -->
<meta name="apple-mobile-web-app-title" content="GestûÈo Estoque" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg: #EEF0F3;
    --panel: #FFFFFF;
    --panel-raised: #F3F5F7;
    --line: #D7DBE1;
    --ink: #1A1C21;
    --ink-dim: #575756;
    --safety: #F6A200;
    --safety-ink: #14161A;
    --ok: #1E8E4F;
    --ok-bg: #E3F6EA;
    --warn: #A35F00;
    --warn-bg: #FFF1D6;
    --danger: #C4291B;
    --danger-bg: #FBE6E3;
    --accent2: #1F6FA8;
    --radius: 10px;
    --font-display: 'Oswald', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    /* Paleta corporativa/ERP (Inter + navy + cinzas) ã login e dashboard novo usam,
       resto do app (tablet do operador) continua no design system original acima */
    --font-corp: 'Inter', sans-serif;
    --navy: #0F172A;
    --gray-50: #F8FAFC;
    --gray-100: #F1F5F9;
    --gray-200: #E2E8F0;
    --gray-400: #94A3B8;
    --gray-500: #64748B;
    /* Escala de tamanho de fonte ã compartilhada pelos dois sistemas (um nû¤mero em
       px nûÈo ûˋ identidade visual; sû° font-family e cor continuam por sistema) */
    --text-2xs: 9.5px;
    --text-xs: 11px;
    --text-sm: 12.5px;
    --text-md: 14px;
    --text-lg: 15px;
    /* Cores reaproveitadas hoje sem token ã cada uma jûÀ usada em ãË2 lugares,
       sem correspondûˆncia exata em nenhuma variûÀvel existente */
    --purple: #7B3FC4;
    --purple-bg: #F1E9FB;
    --teal: #0D9488;
    --teal-bg: #E7F6F3;
    --blue: #2A6FD6;
    --blue-bg: #E3EEFC;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);height:100%;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
  #root{min-height:100vh;display:flex;flex-direction:column;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  ::selection{background:var(--safety);color:var(--safety-ink);}

  .app{display:flex;flex-direction:column;min-height:100vh;max-width:900px;margin:0 auto;width:100%;background:var(--bg);position:relative;}

  /* TOPBAR */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:20;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-logo{height:24px;width:auto;flex-shrink:0;display:block;}
  .brand-text{font-family:var(--font-display);font-weight:600;letter-spacing:0.5px;font-size:19px;text-transform:uppercase;}
  .brand-text small{display:block;font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--ink-dim);letter-spacing:1.5px;font-weight:500;text-transform:uppercase;margin-top:-2px;}
  .role-switch{display:flex;align-items:center;gap:8px;}
  .role-pill{font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:0.5px;text-transform:uppercase;background:var(--panel-raised);border:1px solid var(--line);color:var(--ink-dim);padding:7px 10px;border-radius:20px;display:flex;align-items:center;gap:6px;}
  .role-pill select{background:transparent;border:none;color:var(--ink);font-family:var(--font-mono);font-size:var(--text-xs);text-transform:uppercase;outline:none;}
  .role-pill select option{background:var(--panel-raised);color:var(--ink);}
  .logout-btn{background:var(--panel-raised);border:1px solid var(--line);color:var(--ink-dim);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .logout-btn:active{background:var(--danger-bg);color:var(--danger);border-color:var(--danger);}

  /* "InventûÀrio 360" ûˋ mais longo que "Stock360" (nome anterior) ã em telas
     estreitas precisa encolher/colapsar pra nûÈo quebrar o topbar em 3 linhas. */
  @media (max-width:400px){
    .brand-text{font-size:var(--text-lg);white-space:nowrap;}
    .role-pill span{display:none;}
    .role-pill{padding:7px 9px;}
  }

  /* BACK BAR */
  .subbar{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--bg);}
  .back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--ink-dim);font-size:var(--text-md);padding:6px 8px 6px 0;border-radius:6px;}
  .back-btn:active{background:var(--panel-raised);}
  .subbar h1{font-family:var(--font-display);font-size:17px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin:0;}

  .content{flex:1;padding:18px;padding-bottom:100px;}

  /* HOME CARDS */
  .grid-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (min-width:640px){.grid-cards{grid-template-columns:1fr 1fr 1fr;}}
  .home-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 16px;display:flex;flex-direction:column;gap:12px;align-items:flex-start;min-height:120px;position:relative;overflow:hidden;transition:transform .1s;}
  .home-card:active{transform:scale(0.97);background:var(--panel-raised);}
  .home-card .icon{font-size:26px;}
  .home-card .label{font-family:var(--font-display);font-size:var(--text-lg);text-transform:uppercase;letter-spacing:0.3px;font-weight:600;line-height:1.25;}
  .home-card .badge{position:absolute;top:12px;right:12px;background:var(--safety);color:var(--safety-ink);font-family:var(--font-mono);font-weight:700;font-size:var(--text-xs);padding:4px 9px;border-radius:20px;}
  .home-card.wide{grid-column:span 2;flex-direction:row;align-items:center;justify-content:space-between;}
  @media (min-width:640px){.home-card.wide{grid-column:span 3;}}

  .greet{font-family:var(--font-mono);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:1.5px;color:var(--safety);margin-bottom:4px;}
  .greet-title{font-family:var(--font-display);font-size:24px;font-weight:600;margin:0 0 20px 0;text-transform:uppercase;}

  /* BUTTONS */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 20px;border-radius:var(--radius);font-family:var(--font-display);font-size:var(--text-lg);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;border:none;width:100%;}
  .btn-primary{background:var(--safety);color:var(--safety-ink);}
  .btn-primary:active{background:#d9a300;}
  .btn-secondary{background:var(--panel-raised);color:var(--ink);border:1px solid var(--line);}
  .btn-secondary:active{background:#2b2f36;}
  .btn-outline{background:transparent;color:var(--ink-dim);border:1px solid var(--line);}
  .btn-danger{background:var(--danger);color:#fff;}
  /* Modificadores de tamanho ã absorvem os padrûçes de padding/font-size mais
     repetidos entre botûçes secundûÀrios pequenos em JSX (ver CLAUDE.md
     "PadronizaûÏûÈo... Fase 5"), em vez de cada call site reinventar o prû°prio
     style inline. Compûçem com .btn/.btn-primary/.btn-outline/etc., nûÈo
     substituem ã sû° ajustam tamanho. */
  .btn-sm{padding:8px 14px;font-size:var(--text-sm);width:auto;}
  .btn-xs{padding:8px;font-size:var(--text-2xs);width:auto;}
  .btn-row{display:flex;gap:10px;}
  .btn-row .btn{flex:1;}
  .btn:disabled{opacity:0.4;}

  /* PANELS/FORMS */
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-family:var(--font-mono);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:0.8px;color:var(--ink-dim);margin-bottom:7px;}
  .field input[type=text],.field input[type=number],.field input[type=date],.field select,.field textarea{width:100%;background:var(--panel-raised);border:1px solid var(--line);color:var(--ink);padding:14px;border-radius:8px;font-size:16px;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--safety);outline-offset:0;}
  .field textarea{resize:vertical;min-height:70px;}
  .field-erro{color:var(--danger);font-size:var(--text-sm);margin-top:6px;}
  .chip-input{display:flex;flex-wrap:wrap;align-items:center;gap:8px;width:100%;background:var(--panel-raised);border:1px solid var(--line);padding:9px 10px;border-radius:8px;}
  .chip-input:focus-within{outline:2px solid var(--safety);outline-offset:0;}
  .chip-input .chip{display:flex;align-items:center;gap:6px;background:var(--safety);color:#1a1200;font-family:var(--font-mono);font-weight:700;font-size:var(--text-sm);padding:6px 8px 6px 12px;border-radius:20px;}
  .chip-input .chip button{background:none;border:none;color:inherit;font-size:16px;line-height:1;cursor:pointer;padding:0 2px;}
  .chip-input input{flex:1;min-width:90px;border:none;background:none;padding:6px 4px;font-size:16px;color:var(--ink);}
  .chip-input input:focus{outline:none;}

  /* "Editar/Novo UsuûÀrio" ã dual-list de permissûçes (transfer list) no
     lugar dos toggles individuais de antes: pedido do cliente pra bater com
     referûˆncia de sistema corporativo (Fiori/Admin Center/Oracle), minimalista,
     sem ûÙcone decorativo/cor de fundo/sombra forte. Escopado sû° a este
     formulûÀrio (prefixo uf-), radius:8px prû°prio (diferente do --radius:10px
     do resto do app, de propû°sito ã mesmo tipo de exceûÏûÈo jûÀ documentada em
     outros cantos do CSS). */
  .uf-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:22px;}
  .uf-back-btn{flex-shrink:0;width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .uf-back-btn:hover{background:var(--panel-raised);}
  .uf-header-title{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--ink);}
  .uf-header-sub{font-size:var(--text-sm);color:var(--ink-dim);margin-top:3px;}

  .uf-info-strip{display:flex;flex-wrap:wrap;align-items:center;gap:22px;padding:16px 18px;border:1px solid var(--line);border-radius:8px;margin-bottom:22px;background:var(--panel);}
  .uf-info-item{display:flex;flex-direction:column;gap:4px;min-width:130px;}
  .uf-info-label{font-family:var(--font-mono);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:0.6px;color:var(--ink-dim);}
  .uf-info-value{font-size:var(--text-md);font-weight:600;color:var(--ink);word-break:break-word;}
  .uf-info-editbtn{margin-left:auto;width:auto;padding:9px 16px;font-size:var(--text-sm);flex-shrink:0;}
  .uf-info-editfields{display:flex;flex-wrap:wrap;gap:14px;flex:1;align-items:flex-start;}
  .uf-info-editfields .field{margin-bottom:0;min-width:180px;flex:1;}

  .uf-perm-title{font-family:var(--font-mono);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:0.8px;color:var(--ink-dim);margin-bottom:4px;}
  .uf-perm-note{font-size:var(--text-sm);color:var(--ink-dim);margin-bottom:16px;}

  .uf-dual{display:flex;align-items:stretch;gap:14px;}
  .uf-list-panel{flex:1;min-width:0;border:1px solid var(--line);border-radius:8px;background:var(--panel);display:flex;flex-direction:column;}
  .uf-list-panel.liberados{border-top:2px solid var(--ok);}
  .uf-list-title-row{padding:12px 14px;border-bottom:1px solid var(--line);}
  .uf-list-title{font-family:var(--font-mono);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:0.6px;color:var(--ink-dim);}
  .uf-list-search{position:relative;padding:10px 14px;border-bottom:1px solid var(--line);}
  .uf-list-search svg{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--ink-dim);pointer-events:none;}
  .uf-list-search input{width:100%;background:var(--panel-raised);border:1px solid var(--line);border-radius:8px;padding:8px 10px 8px 32px;font-size:var(--text-sm);color:var(--ink);}
  .uf-list-search input:focus{outline:2px solid var(--safety);outline-offset:0;}
  .uf-list-body{max-height:340px;overflow-y:auto;}
  .uf-list-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;font-size:var(--text-sm);color:var(--ink);}
  .uf-list-row:last-child{border-bottom:none;}
  .uf-list-row:hover{background:var(--panel-raised);}
  .uf-list-row.selected{background:#FFF4E0;}
  .uf-list-row .uf-row-label{flex:1;}
  .uf-list-row .uf-drag-handle{color:var(--ink-dim);cursor:grab;flex-shrink:0;display:flex;}
  .uf-list-row .uf-remove-btn{flex-shrink:0;width:22px;height:22px;border-radius:8px;border:none;background:transparent;color:var(--ink-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .uf-list-row .uf-remove-btn:hover{background:var(--danger);color:#fff;}
  .uf-list-empty{padding:24px 14px;text-align:center;font-size:var(--text-sm);color:var(--ink-dim);}

  .uf-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
  .uf-center-btn{width:120px;padding:9px 10px;font-size:var(--text-xs);font-weight:600;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--ink-dim);display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;text-transform:uppercase;letter-spacing:0.4px;}
  .uf-center-btn:hover:not(:disabled){background:var(--panel-raised);color:var(--ink);}
  .uf-center-btn:disabled{opacity:.45;cursor:not-allowed;}

  @media (max-width:760px){
    .uf-dual{flex-direction:column;}
    .uf-center{flex-direction:row;justify-content:center;}
    .uf-center-btn{width:auto;flex:1;padding:9px 4px;}
    .uf-info-editbtn{margin-left:0;}
  }

  /* "UsuûÀrios" ã cards com avatar/pill de status/botûçes com ûÙcone, pedido do
     cliente pra bater com um mockup de referûˆncia (mesmo espûÙrito
     minimalista/corporativo do redesenho de "Editar UsuûÀrio" acima).
     Escopado com prefixo um- (User Management). */
  .um-search-row{display:flex;flex-wrap:wrap;align-items:flex-end;gap:14px;margin-bottom:20px;}
  .um-search-row .field{flex:1;min-width:220px;margin-bottom:0;}
  .um-search-icon-wrap{position:relative;}
  .um-search-icon-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-dim);pointer-events:none;}
  .um-search-icon-wrap input{padding-left:36px;}
  .um-new-btn{width:auto;flex-shrink:0;padding:13px 18px;font-size:var(--text-sm);display:flex;align-items:center;gap:8px;}
  .btn-outline-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);}
  .btn-outline-danger:hover:not(:disabled){background:var(--danger-bg);}

  .um-card{border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:14px;display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;background:var(--panel);}
  .um-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:var(--text-lg);flex-shrink:0;}
  .um-info{flex:1;min-width:180px;}
  .um-name{font-size:var(--text-lg);font-weight:700;color:var(--ink);}
  .um-you{font-size:var(--text-sm);font-weight:600;color:var(--accent2);margin-left:4px;}
  .um-sub{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--ink-dim);margin-top:3px;}
  .um-last{font-size:var(--text-xs);color:var(--ink-dim);margin-top:4px;}
  .um-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;flex-shrink:0;}
  .um-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;}
  .um-btn{width:auto;padding:8px 12px;font-size:var(--text-xs);display:flex;align-items:center;gap:6px;}
  .um-pw-panel,.um-del-panel{width:280px;max-width:100%;}
  .um-req-card{border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:10px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;background:var(--panel);}
  .um-req-card:last-child{margin-bottom:0;}

  /* "ConfiguraûÏûçes" ã cards com "?" de ajuda (tooltip nativo via title) e
     salvamento em bloco (edita local, sû° grava tudo ao clicar "Salvar
     alteraûÏûçes" no rodapûˋ) ã pedido do cliente pra bater com um mockup de
     referûˆncia, mesmo espûÙrito minimalista/corporativo dos redesenhos
     anteriores (UsuûÀrios, Editar UsuûÀrio). Escopado com prefixo cfg-. */
  .cfg-card{border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:16px;background:var(--panel);}
  .cfg-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .cfg-card-title{font-size:var(--text-lg);font-weight:700;color:var(--ink);}
  .cfg-card-desc{font-size:var(--text-sm);color:var(--ink-dim);margin-top:4px;line-height:1.5;max-width:640px;}
  .cfg-help-btn{flex-shrink:0;width:24px;height:24px;border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--ink-dim);display:flex;align-items:center;justify-content:center;font-size:var(--text-sm);font-weight:700;cursor:help;}
  .cfg-check-row{display:flex;align-items:flex-start;gap:10px;margin-top:16px;cursor:pointer;}
  .cfg-check-row input{width:18px;height:18px;margin-top:2px;flex-shrink:0;}
  .cfg-check-label{font-size:var(--text-md);font-weight:600;color:var(--ink);}
  .cfg-check-sub{font-size:var(--text-sm);color:var(--ink-dim);margin-top:2px;}
  .cfg-timeout-row{display:flex;align-items:center;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .cfg-timeout-row input{width:80px;padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:var(--panel-raised);color:var(--ink);font-size:var(--text-md);}
  .cfg-timeout-badge{display:flex;align-items:center;gap:6px;font-size:var(--text-sm);color:var(--ink-dim);margin-top:12px;}
  .cfg-timeout-badge strong{background:var(--panel-raised);border:1px solid var(--line);border-radius:6px;padding:4px 9px;color:var(--ink);}
  .cfg-note{display:flex;align-items:flex-start;gap:6px;font-size:var(--text-xs);color:var(--ink-dim);margin-top:10px;}
  .cfg-footer{display:flex;justify-content:flex-end;align-items:center;gap:12px;margin-top:8px;}
  .cfg-footer .btn{width:auto;padding:14px 26px;}

  .grupo-suggestions{margin-top:6px;max-height:260px;overflow-y:auto;background:var(--panel-raised);border:1px solid var(--line);border-radius:8px;}
  .grupo-suggestion-item{display:block;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);color:var(--ink);padding:11px 14px;font-size:var(--text-md);cursor:pointer;}
  .grupo-suggestion-item:last-child{border-bottom:none;}
  .grupo-suggestion-item:hover{background:var(--panel);}
  .grupo-suggestion-count{color:var(--ink-dim);font-family:var(--font-mono);font-size:var(--text-sm);}
  .grupo-suggestion-empty{padding:14px;color:var(--ink-dim);font-size:var(--text-sm);}
  .radio-group{display:flex;flex-direction:column;gap:10px;}
  .radio-opt{display:flex;align-items:center;gap:12px;background:var(--panel-raised);border:1px solid var(--line);padding:14px;border-radius:8px;}
  .radio-opt.active{border-color:var(--safety);background:#FFF4E0;}
  .radio-opt input{width:20px;height:20px;accent-color:var(--safety);}
  .radio-opt .opt-title{font-weight:600;font-size:var(--text-md);}
  .radio-opt .opt-desc{font-size:var(--text-sm);color:var(--ink-dim);margin-top:2px;}

  /* STATUS */
  .status-tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:var(--text-xs);font-weight:700;text-transform:uppercase;padding:4px 9px;border-radius:20px;letter-spacing:0.3px;}
  .status-ok{background:var(--ok-bg);color:var(--ok);}
  .status-warn{background:var(--warn-bg);color:var(--warn);}
  .status-danger{background:var(--danger-bg);color:var(--danger);}
  .status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

  /* ITEM CARD (count item) */
  .item-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
  .item-card-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .item-code{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--safety);letter-spacing:0.5px;}
  .item-desc{font-family:var(--font-display);font-size:18px;font-weight:600;margin:4px 0 0 0;text-transform:uppercase;}
  .item-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 18px;}
  .item-meta .m{background:var(--panel-raised);border-radius:8px;padding:10px 12px;}
  .item-meta .m .k{font-family:var(--font-mono);font-size:var(--text-2xs);text-transform:uppercase;color:var(--ink-dim);letter-spacing:0.6px;}
  .item-meta .m .v{font-size:var(--text-md);font-weight:600;margin-top:3px;}
  .address-chip{font-family:var(--font-mono);font-size:20px;font-weight:700;letter-spacing:2px;background:var(--panel-raised);border:1px dashed var(--line);border-radius:8px;padding:14px;text-align:center;margin-bottom:14px;}

  /* COUNT CARD (Recontagens/Itens Divergentes/ConcluûÙdas) ã shell visual
     compartilhado pelas 3 telas, ver CLAUDE.md "Redesign das telas de
     Recontagens...". Reaproveita .item-code/.item-desc jûÀ existentes, sû°
     acrescenta a faixa de severidade lateral + badges + linhas novas.
     Raio (16px) e sombra sûÈo PRûPRIOS deste card (pedido explûÙcito do
     cliente pra bater com o mockup de referûˆncia) ã diferentes do
     --radius:10px usado no resto do app, de propû°sito, nûÈo ûˋ regressûÈo. */
  .count-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:16px;display:flex;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  /* Item marcado como urgente (lûÙder/admin, Recontagens/Itens Divergentes) ã
     destaque visual pra ele se sobressair na lista, alûˋm de vir ordenado
     primeiro (ver RecountsPanel/DivergentItemsPanel). Contorno vermelho e
     grosso, pedido explûÙcito do cliente (1ôˆ versûÈo era azul/fino demais). */
  .count-card.urgente{box-shadow:0 0 0 3px var(--danger), 0 1px 3px rgba(0,0,0,.04);}
  .urgente-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.4px;padding:4px 9px;border-radius:20px;background:var(--danger);color:#fff;}
  /* Item reprovado pela Diretoria (fluxo de SA de Ajuste, ver App()) ã mesma
     tûˋcnica do anel de "urgente" acima, mas com cor RESERVADA sû° pra esse
     caso (roxo, jûÀ usado em outras partes do app com outro sentido ã nunca em
     estado de contagem), pra nûÈo se confundir com a rejeiûÏûÈo do lûÙder (vermelho). */
  .count-card.reprovado-diretoria{box-shadow:0 0 0 3px var(--purple), 0 1px 3px rgba(0,0,0,.04);}
  /* Item "Sem Ajuste" vindo do histû°rico importado (BD_Contagens) ã pedido
     explûÙcito do cliente: "card discreto e uma borda na cor amarela... sem
     chamar muita atenûÏûÈo". Mesma tûˋcnica de anel do "urgente"/"reprovado-
     diretoria" acima, mas 2px (nûÈo 3px) e cor ûÂmbar (`--warn`, a mesma jûÀ
     usada em "Pendente" no resto do app) ã deliberadamente mais sutil que os
     outros dois anûˋis, que sûÈo pra CHAMAR atenûÏûÈo; este ûˋ o oposto. */
  .count-card.sem-ajuste-destaque{box-shadow:0 0 0 2px var(--warn), 0 1px 3px rgba(0,0,0,.04);}
  .count-card-bar{width:5px;flex-shrink:0;}
  .count-card-body{flex:1;min-width:0;padding:16px 20px;display:flex;flex-direction:column;gap:10px;}
  .count-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .count-card-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .severity-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.4px;padding:4px 9px;border-radius:20px;}
  .category-chip{font-family:var(--font-mono);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:0.3px;color:var(--ink-dim);background:var(--panel-raised);padding:4px 9px;border-radius:20px;}
  .count-card-head-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .count-card-date{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--ink-dim);white-space:nowrap;}
  .count-card-menu-btn{background:none;border:none;color:var(--ink-dim);font-size:16px;line-height:1;padding:2px 4px;cursor:pointer;}
  .count-card-menu{position:relative;}
  .count-card-menu-dropdown{position:absolute;right:0;top:100%;margin-top:4px;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.12);z-index:5;overflow:hidden;white-space:nowrap;}
  .count-card-menu-dropdown button{display:block;width:100%;padding:9px 16px;background:none;border:none;text-align:left;font-size:var(--text-sm);color:var(--ink);cursor:pointer;}
  .count-card-menu-dropdown button:hover{background:var(--panel-raised);}
  .count-card-menu-dropdown button.menu-item-danger{color:var(--danger);}
  .count-card-menu-dropdown button.menu-item-danger:hover{background:var(--danger-bg);}
  .count-card-title{line-height:1.15;}
  /* Destaque invertido em relaûÏûÈo ao .item-code/.item-desc padrûÈo do resto
     do app (lûÀ a descriûÏûÈo ûˋ maior) ã pedido do cliente pensando em
     facilidade operacional: o cû°digo ûˋ o que o operador confere contra o
     item fûÙsico/etiqueta, entûÈo precisa ser o principal destaque visual
     aqui, com a descriûÏûÈo como apoio secundûÀrio menor. Escopado sû° a
     .count-card-title (Recontagens/Itens Divergentes/ConcluûÙdas), nûÈo
     muda .item-code/.item-desc em nenhum outro lugar do app. */
  .count-card-title .item-code{font-size:20px;font-weight:700;letter-spacing:0.3px;}
  .count-card-title .item-desc{font-size:var(--text-sm);font-weight:600;margin-top:2px;}
  /* EndereûÏo virou o elemento de MAIOR destaque do cabeûÏalho do card ã
     cliente marcou com print que o espaûÏo vazio ao lado do cû°digo deveria
     mostrar o endereûÏo em bem mais evidûˆncia ("primeira coisa que bate o
     olho"), jûÀ que ûˋ a informaûÏûÈo que o operador mais precisa pra
     localizar o item fisicamente antes de recontar. */
  .count-card-toprow{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .count-card-toprow .count-card-title{flex:1;min-width:0;}
  .count-card-address-badge{display:flex;align-items:center;gap:6px;flex-shrink:0;font-family:var(--font-mono);font-size:16px;font-weight:700;color:var(--safety-ink);background:#FFF3E0;border:1.5px solid var(--safety);border-radius:var(--radius);padding:8px 14px;white-space:nowrap;}
  .count-card-main{display:flex;gap:16px;align-items:stretch;flex:1;}
  .count-card-content{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;justify-content:center;}
  .count-card-actions-col{display:flex;flex-direction:column;gap:8px;width:150px;flex-shrink:0;justify-content:center;}
  /* Botûçes empilhados û  direita usam o mesmo .btn/.btn-primary/.btn-outline
     do resto do app (nûÈo criei classe nova), mas o tamanho padrûÈo (pensado
     pro card espaûÏado antigo) fica desproporcional aqui ã reduzido sû°
     neste contexto, sem mudar o botûÈo em nenhum outro lugar. */
  .count-card-actions-col .btn{width:100%;padding:11px 14px;font-size:var(--text-sm);}
  .count-card-extra{border-top:1px solid var(--line);padding-top:8px;font-size:var(--text-sm);color:var(--ink-dim);}
  .count-card-extra strong{color:var(--ink);}
  @media (max-width:640px){
    .count-card-main{flex-direction:column;}
    .count-card-actions-col{width:100%;flex-direction:row;}
  }
  /* .count-card-actions ã usado pelo estado de "confirmar exclusûÈo"
     (empilha alerta + botûçes Cancelar/Confirmar), sempre um wrapper
     isolado, nunca combinado direto com .btn-row no mesmo elemento (ver
     .count-card-actions-row abaixo pra esse outro caso). */
  .count-card-actions{padding:0;display:flex;flex-direction:column;gap:8px;width:100%;}
  .count-card-actions .btn{width:100%;padding:11px 14px;font-size:var(--text-sm);}
  /* .count-card-actions-row ã fileira de botûçes lado a lado (Itens
     Divergentes pode ter atûˋ 4 aûÏûçes) ã classe SEPARADA de
     .count-card-actions de propû°sito, pra nûÈo colidir com o
     flex-direction:column acima quando combinada com .btn-row no mesmo
     elemento. */
  .count-card-actions-row.btn-row .btn{width:auto;padding:11px 14px;font-size:var(--text-xs);flex:1 1 auto;}
  .count-card-actions-row.btn-row .btn-danger{flex:0 0 auto;}

  /* Comparativo 1ôˆ/2ôˆ contagem (item que jûÀ tem uma rodada anterior, ver
     "anterior" em DivergentItemsPanel) ã as duas rodadas empilhadas, cada
     uma no mesmo .result-grid de sempre, com destaque visual pra qual ûˋ a
     rodada ATUAL (borda laranja) vs. a anterior (neutra). Aprovado com o
     cliente via prûˋvia de artifact antes de subir ã ver CLAUDE.md. */
  .rounds-stack{display:flex;flex-direction:column;gap:10px;}
  .round-panel{border-radius:var(--radius);padding:12px 14px;display:flex;flex-direction:column;gap:10px;min-width:0;}
  /* Fundo branco (nûÈo --panel-raised) ã precisa contrastar com o fundo
     cinza das cûˋlulas .rg dentro dele, senûÈo painel e cûˋlula se fundem
     num bloco sû° sem nenhum contraste pro texto dos rû°tulos. */
  .round-panel.previous{background:var(--panel);border:1px solid var(--line);}
  .round-panel.current{background:#fff;border:2px solid var(--safety);}
  .round-eyebrow{display:flex;align-items:center;flex-wrap:wrap;gap:8px;}
  .round-eyebrow .label{font-family:var(--font-mono);font-size:var(--text-sm);font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--ink-dim);}
  .round-panel.current .round-eyebrow .label{color:var(--safety-ink);}
  .round-eyebrow .badge{font-family:var(--font-mono);font-size:var(--text-2xs);font-weight:700;text-transform:uppercase;padding:4px 9px;border-radius:var(--radius);background:var(--safety);color:#fff;}
  .round-who{font-size:var(--text-xs);color:var(--ink-dim);margin-left:auto;}

  /* QR SCAN VISUAL */
  .scan-box{position:relative;background:#0A0B0D;border:1px solid var(--line);border-radius:var(--radius);height:180px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:14px;}
  .scan-frame{width:120px;height:120px;position:relative;}
  .scan-frame::before,.scan-frame::after,.scan-corner-b1,.scan-corner-b2{content:'';position:absolute;width:26px;height:26px;border-color:var(--safety);}
  .scan-frame::before{top:0;left:0;border-top:3px solid var(--safety);border-left:3px solid var(--safety);}
  .scan-frame::after{top:0;right:0;border-top:3px solid var(--safety);border-right:3px solid var(--safety);}
  .scan-corner-b1{bottom:0;left:0;border-bottom:3px solid var(--safety);border-left:3px solid var(--safety);}
  .scan-corner-b2{bottom:0;right:0;border-bottom:3px solid var(--safety);border-right:3px solid var(--safety);}
  .scan-laser{position:absolute;left:6px;right:6px;height:2px;background:var(--safety);box-shadow:0 0 8px var(--safety);animation:laser 1.8s ease-in-out infinite;}
  @keyframes laser{0%{top:6px;}50%{top:110px;}100%{top:6px;}}

  /* LIVE CAMERA SCANNER (html5-qrcode) */
  .scanner-wrap{background:#0A0B0D;border-radius:var(--radius);overflow:hidden;margin-bottom:14px;border:1px solid var(--line);position:relative;}
  .scanner-viewport{width:100%;min-height:240px;}
  .scanner-viewport video{width:100% !important;display:block;}
  .scanner-hint{text-align:center;color:var(--ink-dim);font-size:var(--text-sm);margin:-6px 0 14px 0;}
  .scan-toggle-row{display:flex;gap:10px;margin-bottom:14px;}
  .manual-fallback{background:var(--panel-raised);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:14px;}

  /* RESULT BANNER */
  .result-banner{border-radius:var(--radius);padding:20px;margin-bottom:16px;border:1px solid;}
  .result-banner.ok{background:var(--ok-bg);border-color:var(--ok);}
  .result-banner.warn{background:var(--warn-bg);border-color:var(--warn);}
  .result-banner.danger{background:var(--danger-bg);border-color:var(--danger);}
  .result-banner .rb-title{font-family:var(--font-display);font-size:18px;font-weight:700;text-transform:uppercase;margin:0 0 6px 0;}
  .result-banner .rb-sub{font-size:var(--text-md);color:var(--ink-dim);}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
  /* Era rgba(255,255,255,0.04) ã sobra do tema escuro anterior (ver
     "ConvenûÏûçes de design" no CLAUDE.md), praticamente invisûÙvel no tema
     claro atual (branco em cima de branco). Corrigido pra --panel-raised,
     o mesmo cinza-claro sutil jûÀ usado em outros blocos de info do app. */
  .result-grid .rg{background:var(--panel-raised);border-radius:8px;padding:10px 12px;min-width:0;}
  .result-grid .rg .k{font-family:var(--font-mono);font-size:var(--text-2xs);text-transform:uppercase;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .result-grid .rg .v{font-family:var(--font-mono);font-size:17px;font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  /* Grids de 4 colunas numa linha sû° (Sistema/FûÙsico/DiferenûÏa/%, ver
     CLAUDE.md) ã em telas de celular estreitas (~360-390px), mesmo com
     nowrap, "DIFERENûA" ainda nûÈo cabia no espaûÏo de 1/4 da largura do
     card. Aperta padding/fonte sû° nessa variante (classe result-grid-4col),
     sem afetar os outros usos de 2 colunas com labels mais longos. */
  @media (max-width:520px){
    .result-grid.result-grid-4col{gap:5px;}
    .result-grid.result-grid-4col .rg{padding:6px 4px;text-align:center;}
    .result-grid.result-grid-4col .rg .k{font-size:7.2px;}
    .result-grid.result-grid-4col .rg .v{font-size:var(--text-sm);}
  }

  /* TELA DE CONTAGEM ã "coletor industrial" (Zebra/Honeywell/WMS), pedido
     do cliente: "esta ûˋ a tela mais importante... prioridade ûˋ velocidade
     operacional". Ver CLAUDE.md "Recontar Item vira coletor industrial".
     Cards com 16px de raio + sombra bem discreta (pedido explûÙcito),
     diferente do --radius:10px do resto do app ã mesmo tipo de exceûÏûÈo jûÀ
     documentada em .count-card acima, escopada sû° a esta tela. */
  .cs-screen{display:flex;flex-direction:column;gap:14px;padding-bottom:88px;}
  /* CabeûÏalho do app some inteiro nas telas de contagem (pedido do
     cliente: "essas informaûÏûçes jûÀ existem em outras partes da aplicaûÏûÈo
     e ocupam uma ûÀrea muito valiosa da tela operacional") ã o espaûÏo
     liberado ûˋ usado por este contexto operacional (progresso da fila ou
     prioridade da recontagem) em vez de nome/avatar/perfil do usuûÀrio. */
  .cs-context{display:flex;flex-direction:column;gap:8px;}
  .cs-progress{display:flex;flex-direction:column;gap:6px;}
  .cs-progress-track{height:6px;border-radius:4px;background:var(--line);overflow:hidden;}
  .cs-progress-fill{height:100%;background:var(--safety);border-radius:4px;transition:width .2s ease;}
  .cs-progress-meta{display:flex;justify-content:space-between;gap:8px;font-family:var(--font-mono);font-size:var(--text-xs);color:var(--ink-dim);}

  /* Card "Nôˆ contagem" (dados da rodada anterior) ã movido pro final da
     tela, logo acima do rodapûˋ: ûˋ informaûÏûÈo de apoio/histû°rico, nûÈo o
     que o operador precisa ver primeiro (pedido do cliente). */
  .cs-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:10px 16px;}
  .cs-round-badge{font-family:var(--font-mono);font-size:var(--text-xs);font-weight:700;letter-spacing:0.5px;color:#fff;background:var(--accent2);padding:5px 10px;border-radius:20px;white-space:nowrap;}
  .cs-top-sep{width:1px;align-self:stretch;background:var(--line);}
  .cs-top-block .cs-top-k{font-family:var(--font-mono);font-size:var(--text-2xs);text-transform:uppercase;color:var(--ink-dim);letter-spacing:0.4px;}
  .cs-top-block .cs-top-v{font-size:var(--text-sm);font-weight:600;margin-top:1px;}

  /* Card do material ã Almox/EndereûÏo saûÙram do canto (jûÀ aparecem nas
     informaûÏûçes tûˋcnicas mais abaixo, seria duplicado) e o espaûÏo virou
     pro botûÈo de cûÂmera, ~20% maior e centralizado, pra parecer uma aûÏûÈo
     de verdade, nûÈo um ûÙcone pequeno perdido no canto. */
  .cs-material{display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:20px;}
  .cs-material-info{flex:1;min-width:0;}

  .cs-scan-btn{flex-shrink:0;width:56px;height:56px;border-radius:14px;border:2px solid var(--safety);background:#FFF3E0;color:var(--safety);display:flex;align-items:center;justify-content:center;}
  .cs-scan-btn:active{background:var(--safety);color:#fff;}

  .cs-scan-feedback{margin-top:-4px;font-size:var(--text-sm);font-weight:600;border-radius:8px;padding:8px 12px;}
  .cs-scan-feedback.ok{background:var(--ok-bg);color:var(--ok);}
  .cs-scan-feedback.warn{background:var(--warn-bg);color:var(--warn);}

  /* Referûˆncia do saldo do sistema ANTES de digitar ã mostra o valor
     esperado junto do campo de quantidade (em vez de sû° depois de jûÀ ter
     digitado), reduzindo erro de digitaûÏûÈo por comparaûÏûÈo visual direta. */
  .cs-sistema-ref{text-align:center;background:var(--panel-raised);border-radius:12px;padding:10px;}
  .cs-sistema-ref .cs-sistema-k{font-family:var(--font-mono);font-size:var(--text-2xs);text-transform:uppercase;color:var(--ink-dim);letter-spacing:0.5px;}
  .cs-sistema-ref .cs-sistema-v{font-family:var(--font-mono);font-size:20px;font-weight:700;margin-top:2px;}
  .cs-sistema-arrow{display:flex;justify-content:center;color:var(--ink-dim);margin:-6px 0;}
  .cs-qty-label-row{display:flex;align-items:center;justify-content:center;position:relative;}

  .cs-calc-btn{position:absolute;right:0;width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:var(--panel-raised);color:var(--ink-dim);display:flex;align-items:center;justify-content:center;}

  /* "=" ocupa 2 linhas no grid (gridRow:'span 2'), mas a altura FIXA de

     pra ele em branco, por baixo. height:100% deixa ele de fato preencher

  .cs-qty-input{width:100%;height:90px;font-family:var(--font-mono);font-size:48px;font-weight:700;text-align:center;background:var(--panel);border:2px solid var(--line);border-radius:16px;color:var(--ink);}

  /* Card "Saû¤de do InventûÀrio" ã pedido do cliente com imagem de referûˆncia

  .health-card{display:flex;flex-direction:column;align-items:stretch;gap:16px;border-radius:18px;padding:22px 26px;margin-bottom:24px;}

     Dashboard/Vercel (ver CLAUDE.md "Filtro de perûÙodo vira painel Filtros
     estilo SaaS"). Cor de destaque (--tfb-teal) ûˋ a mesma jûÀ usada nos

  .trend-filter-bar{background:#fff;border:1px solid #EAEAEA;border-radius:18px;padding:24px;box-shadow:0 8px 30px rgba(0,0,0,.05);margin-bottom:24px;}

  /* Empilhado por padrûÈo (largura total, chip+botûÈo lado a lado mas numa
     linha PRûPRIA abaixo do tûÙtulo) ã mesmo raciocûÙnio do `.health-card`
     acima: sû° volta a ficar espremido ao lado do tûÙtulo (`margin-left:auto`)
     a partir de telas realmente largas (ãË1024px), ver media query no fim

  .tfb-head-actions{display:flex;align-items:center;gap:10px;margin-left:0;width:100%;justify-content:space-between;flex-wrap:wrap;margin-top:14px;}

  /* LOGIN SCREEN v3 ã redesign completo estilo SaaS premium (Microsoft 365,

     Estrutura: pûÀgina com degradûˆ suave ã shell centralizado (max 1450px,

     (laranja oficial da Selgron, jûÀ usado em todo o app) permanece a cor de

     CLAUDE.md jûÀ registra --safety como "cor oficial da marca", nûÈo um tom

  .login-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;

  /* ---- Coluna esquerda ã marca ---- */
  /* Terceira imagem do cliente: a composiûÏûÈo inteira da tela (logo, tûÙtulo,
     subtûÙtulo, cena do armazûˋm, dispositivos, benefûÙcios ã tudo jûÀ dentro
     do arquivo), com instruûÏûÈo explûÙcita de usar exatamente como veio, SEM
     nenhum elemento HTML por cima ("nûÈo precisa alterar ou acrescentar

     conteû¤do, depois como fundo com texto HTML sobreposto). `.login-brand`
     agora sû° existe pra dar a moldura (largura/altura da coluna); todo o

  .login-brand{position:relative;display:flex;background:#fff;overflow:hidden;}
  /* Mobile-first: largura cheia, altura livre (`height:auto`) ã mostra a
     imagem INTEIRA, sem cortar nada, jûÀ que agora ela ûˋ o û¤nico conteû¤do do
     painel (sem HTML por cima pra proteger/duplicar). No desktop
     (`@media min-width:900px` mais abaixo), a imagem vira `position:
     absolute` ã bug real encontrado: com `height:100%` num `<img>` normal

     do `.login-shell` em row) pra bater com a altura de `.login-form-col`,

     inflava a linha inteira pra ~1200px de altura (a altura natural da

     sû° pra bater com a altura de verdade do formulûÀrio, e a imagem (agora
     fora do fluxo) preenche esse espaûÏo via `inset:0`. */
  .login-brand-img{width:100%;height:auto;display:block;}

<div id="root"></div>
<script type="text/babel" data-presets="react">

const {useState, useMemo, useRef, useEffect} = React;

/* ---------------- SUPABASE (catûÀlogo real de produtos) ----------------
   Primeiro pedaûÏo do backend real aplicado (ver backend/schema.sql e
   CLAUDE.md "CatûÀlogo real de produtos via Supabase"). A "publishable key"
   ûˋ segura de expor no navegador (mesmo papel da antiga "anon key") ã as
   tabelas sensûÙveis (contagens, saldo) tûˆm RLS; `produtos` hoje sû° tem
   leitura pû¤blica porque ûˋ sû° um catûÀlogo de cû°digoãdescriûÏûÈo, sem dado
   sigiloso. Login/usuûÀrios/inventûÀrios/contagens continuam 100% no
   localStorage por enquanto ã essa migraûÏûÈo ûˋ a prû°xima etapa, nûÈo esta. */
const SUPABASE_URL = 'https://geeqfpzamexmeketcecu.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_Wx-oyRE86XWz4bTSPWBe5A_8tXRpHJr';

// Cliente Supabase padrûÈo ã sessûÈo sempre persiste no localStorage (default
// do supabase-js), sobrevive a fechar o navegador. Uma rodada anterior tinha
// criado um storage adapter prû°prio pra fazer o checkbox "Lembrar-me"
// controlar ISSO (persistir ou nûÈo a sessûÈo) ã o cliente esclareceu depois
// que nûÈo era esse o pedido: "Lembrar-me" precisa sû° manter os CAMPOS do
// formulûÀrio (usuûÀrio/e-mail) preenchidos da prû°xima vez, nûÈo controlar a
// sessûÈo de login em si (ver `LOGIN_LEMBRADO_KEY` mais abaixo, perto de
// `LoginScreen`). Revertido pra configuraûÏûÈo padrûÈo, mais simples.
const supabaseClient = window.supabase
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY)
  : null;

// Garante que o socket do Realtime carregue o JWT de quem estûÀ logado ã
// sem isso, os canais de postgres_changes (ver App(), perto de countsRef)
// silenciosamente nûÈo recebem NENHUM evento, porque a policy de RLS
// `auth.role() = 'authenticated'` das 4 tabelas nunca ûˋ satisfeita do lado
// de quem RECEBE o evento (a conexûÈo do socket fica anûÇnima por padrûÈo atûˋ
// alguûˋm anexar o token). Chamado sempre que a sessûÈo muda (ver App(),
// getSession()/onAuthStateChange) ã nûÈo custa nada chamar de novo com o
// mesmo token, e cobre o caso de o supabase-js nûÈo sincronizar isso sozinho
// automaticamente a tempo do primeiro canal ser assinado.
function sincronizarAuthRealtime(session){
  if(supabaseClient && supabaseClient.realtime && typeof supabaseClient.realtime.setAuth==='function'){
    supabaseClient.realtime.setAuth(session ? session.access_token : null);
  }
}

// Busca no catûÀlogo real (85 mil+ produtos) por cû°digo ou descriûÏûÈo ã û¤nica
// fonte de busca do app (o cache local de 300 SKUs foi removido, ver
// CLAUDE.md "RemoûÏûÈo do cache local de 300 SKUs"). Enriquece com saldo
// (estoque_saldo) e endereûÏo (estoque_enderecos/enderecos) quando existirem;
// sem saldo carregado ainda pro cû°digo, o produto sintûˋtico monta com
// saldoSistema:null ã CountStep jûÀ sabe tratar isso como "sem saldo pra
// comparar" (ver hasSaldoLocal).
//
// `almoxarifado` (obrigatû°rio na prûÀtica ã `ManualCountFlow` sempre pede
// pra escolher o armazûˋm antes de liberar a busca) filtra o saldo pro
// armazûˋm EXATO onde a pessoa estûÀ contando. Bug real corrigido aqui: a
// versûÈo anterior somava o saldo de TODOS os armazûˋns onde o cû°digo
// existia ã um item com saldo em 2 armazûˋns nunca batia com a contagem
// fûÙsica, porque sû° existe saldo de UM armazûˋm no local fûÙsico onde o item
// estûÀ. Cada linha de `estoque_saldo` jûÀ ûˋ por armazûˋm (nûÈo precisa somar
// nada) ã sû° faltava restringir a busca ao armazûˋm certo.
async function searchSupabaseCatalog(query, almoxarifado){
  if(!supabaseClient || !query || query.trim().length < 2) return [];
  const q = query.trim();
  const { data, error } = await supabaseClient
    .from('produtos')
    .select('codigo, descricao, unidade, grupo, estoque_enderecos(saldo_no_endereco, enderecos(codigo))')
    .or(`codigo.ilike.%${q}%,descricao.ilike.%${q}%`)
    .limit(8);
  if(error || !data) return [];

  // Busca o saldo REAL (coluna "Saldo Atual" da planilha SB2, gravada em
  // estoque_saldo.saldo pelo upload manual ã ver StockSyncPanel/
  // parseSB2Rows) pros cû°digos encontrados, restrito ao armazûˋm informado ã
  // no mûÀximo 1 linha por cû°digo+armazûˋm, entûÈo nûÈo precisa somar nada,
  // sû° pegar o valor direto. `estoque_saldo` nûÈo tem FK pra `produtos` (ver
  // backend/schema.sql), entûÈo ûˋ uma consulta separada, nûÈo um join
  // automûÀtico do PostgREST.
  const codigos = data.map(row=>row.codigo);
  const saldoPorCodigo = {};
  if(codigos.length>0 && almoxarifado){
    const { data: saldoRows } = await supabaseClient
      .from('estoque_saldo')
      .select('produto_codigo, saldo, almoxarifado')
      .in('produto_codigo', codigos)
      .eq('almoxarifado', almoxarifado);
    (saldoRows||[]).forEach(r=>{
      saldoPorCodigo[r.produto_codigo] = Number(r.saldo||0);
    });
  }

  return data.map(row=>{
    const enderecoRow = (row.estoque_enderecos && row.estoque_enderecos[0] && row.estoque_enderecos[0].enderecos) || null;
    return {
      codigo: row.codigo,
      descricao: row.descricao,
      unidade: row.unidade || null,
      familia: describeGrupo(row.grupo),
      endereco: enderecoRow ? enderecoRow.codigo : null,
      enderecoCadastrado: !!enderecoRow,
      almoxarifado: almoxarifado || 'ã',
      corredor: null,
      rua: null,
      // Sem saldo pra ESTE armazûˋm especûÙfico = sem saldo pra comparar (nûÈo
      // ûˋ o mesmo que "cû°digo nûÈo existe no catûÀlogo") ã CountStep trata os
      // dois casos igual (hasSaldoLocal), mas aqui ûˋ importante nûÈo fingir
      // um saldo de outro armazûˋm.
      saldoSistema: Object.prototype.hasOwnProperty.call(saldoPorCodigo, row.codigo) ? saldoPorCodigo[row.codigo] : null,
      custoUnit: 0,
      valorFinanceiro: 0,
      semMovimentoRecente: false,
      ultimaSaida: null,
      foraDoCacheLocal: true,
    };
  });
}

// Grava a contagem tambûˋm no Supabase (alûˋm do localStorage, que continua
// sendo a fonte de verdade do app hoje). Sem Supabase Auth ainda ã usuûÀrio e
// inventûÀrio vûÈo como texto puro, sem FK pra usuarios/inventarios (esses
// continuam sû° locais). Continua "fire and forget" NO PONTO DE CHAMADA ã quem
// chama (CountStep.finalize) nûÈo usa `await`, entûÈo uma contagem nunca trava
// esperando rede ã mas agora a funûÏûÈo RETORNA `{ok, erro}` em vez de nada,
// pra quem quiser reagir ao resultado via `.then()` sem bloquear (ver
// `marcarContagemSincronizada`/fila de retry em App()).
async function saveContagemToSupabase(count){
  if(!supabaseClient) return {ok:false, erro:'Supabase nûÈo configurado.'};
  try{
    const { error } = await supabaseClient.from('contagens').insert({
      id: count.id,
      inventario_id: count.inventario,
      produto_codigo: count.productCode,
      descricao: count.descricao,
      endereco: count.endereco,
      endereco_contado: count.enderecoContado,
      endereco_pendente_validacao: count.enderecoPendenteValidacao,
      usuario: count.usuario,
      numero_contagem: count.numeroContagem,
      contagem_anterior_id: count.contagemAnteriorId,
      qtd_contada: count.qtdContada,
      saldo_sistema: count.saldoSistema,
      diferenca: count.diferenca,
      percentual: count.percentual,
      valor_divergente: count.valorDivergente,
      fora_do_cache_local: count.foraDoCacheLocal,
      classificacao: count.classificacao ? count.classificacao.label : null,
      status_aprovacao: count.statusAprovacao,
      motivo: count.motivo,
      tem_foto: count.foto,
      observacao: count.observacao,
      almoxarifado: count.almoxarifado || null,
      familia: count.familia || null,
      data: count.data,
      hora: count.hora,
      diferenca_confirmada: !!count.diferencaConfirmada,
    });
    if(error){
      console.warn('Falha ao salvar contagem no Supabase (mantida no localStorage):', error.message);
      return {ok:false, erro:error.message};
    }
    return {ok:true};
  }catch(err){
    console.warn('Falha ao salvar contagem no Supabase (mantida no localStorage):', err);
    return {ok:false, erro:String(err && err.message || err)};
  }
}

// Atualiza status/decisûÈo do lûÙder numa contagem jûÀ existente ã usada por
// `approveDivergence`/`requestRecountFromOperator` em App(). Diferente de
// `saveContagemToSupabase`, esta ûˋ sempre `await`ada por quem chama: decisûÈo
// do lûÙder precisa de confirmaûÏûÈo visûÙvel (se falhar, o lûÙder fica sabendo
// na hora, em vez de achar que aprovou e essa decisûÈo nunca aparecer em
// outro aparelho). `patch` ûˋ um objeto parcial jûÀ em snake_case (colunas da
// tabela `contagens`); sempre inclui `atualizado_em`, usado pela
// sincronizaûÏûÈo pra saber qual lado ûˋ mais recente ao reconciliar.
async function updateContagemStatusToSupabase(id, patch){
  if(!supabaseClient) return {ok:false, erro:'Supabase nûÈo configurado.'};
  try{
    const { error } = await supabaseClient
      .from('contagens')
      .update({...patch, atualizado_em: new Date().toISOString()})
      .eq('id', id);
    if(error) return {ok:false, erro:error.message};
    return {ok:true};
  }catch(err){
    return {ok:false, erro:String(err && err.message || err)};
  }
}

// Reconstrû°i o objeto `count` no mesmo formato que CountStep.finalize() jûÀ usa
// localmente, a partir de uma linha da tabela `contagens` ã usado ao ler
// contagens feitas em OUTROS aparelhos (ver fetchContagensFromSupabase).
// `classificacao` no banco ûˋ sû° o label (texto) ã reconstrû°i um objeto
// mûÙnimo compatûÙvel com os lugares que leem c.classificacao.label/.level/.rule.
// `aprovadoPor`/`aprovadoEm`/`recontagemSolicitada*`/`atualizadoEm` vûˆm das
// colunas adicionadas pra decisûÈo do lûÙder se propagar entre aparelhos (ver
// updateContagemStatusToSupabase) ã `atualizadoEm` tambûˋm ûˋ usado pela
// sincronizaûÏûÈo pra reconciliar (ver sync() em App()).
function contagemRowToLocal(row){
  return {
    id: row.id,
    // `reconstructNumericCode` aqui (nûÈo sû° no parser do upload) ã mesmo
    // raciocûÙnio jûÀ aplicado em `historicoRowToCountLike`: linhas semeadas
    // na tabela `contagens` ANTES da correûÏûÈo do parser de histû°rico (ver
    // `buildRecontarSeedsFromHistorico`) ficaram gravadas com o cû°digo cru,
    // sem pontuaûÏûÈo (ex.: "12403100020" em vez de "124.031.00020") ã e como
    // o upsert de recontagem usa `ignoreDuplicates:true`, reimportar a
    // mesma planilha depois do parser corrigido NûO conserta essas linhas
    // jûÀ existentes. Reconstruir aqui, na leitura, corrige a exibiûÏûÈo sem
    // precisar de nenhuma limpeza manual no banco.

    descricao: row.descricao,

// Busca TODAS as linhas de uma consulta, sem depender de um û¤nico `.limit()`
// ã nem de um teto fixo no cû°digo, nem do limite de linhas por requisiûÏûÈo
// configurado no projeto Supabase (Settings ã API ã Max Rows, geralmente
// 1000 por padrûÈo no PostgREST). Esse teto do projeto corta o resultado
// SILENCIOSAMENTE ã sem erro nenhum, `select *` simplesmente devolve menos
// linhas do que existem ã foi exatamente o que sumiu com semanas inteiras
// do histû°rico em "Tendûˆncia Semanal" mesmo com o dado presente na tabela
// (confirmado pelo cliente: `count(*)` batia com o total esperado, mas a
// busca de linhas de verdade vinha incompleta). Pagina com `.range()` atûˋ
// vir uma pûÀgina menor que `PAGE_SIZE` (ou vazia) ã sinal de que chegou ao
// fim, nûÈo importa quantas linhas existam ao todo.
// `buildQuery` ûˋ uma FUNûûO que devolve um query builder novo a cada
// chamada (nûÈo um builder jûÀ construûÙdo) ã necessûÀrio porque um builder do
// supabase-js sû° pode ser "executado" (via `await`) uma vez.
async function fetchTodasPaginado(buildQuery){
  const PAGE_SIZE = 1000;
  let offset = 0;
  let todas = [];
  while(true){
    const { data, error } = await buildQuery().range(offset, offset + PAGE_SIZE - 1);
    if(error) throw error;
    if(!data || data.length === 0) break;
    todas = todas.concat(data);
    if(data.length < PAGE_SIZE) break;
    offset += PAGE_SIZE;
  }
  return todas;
}

// tiebreaker (`id`) alûˋm de `criado_em` ã necessûÀrio pra paginaûÏûÈo ficar

// Incrementa `contados` no Supabase via funûÏûÈo de banco (increment_contados,
// ver backend/schema.sql) em vez de ler+somar+gravar no client ã evita perder
// incremento se dois aparelhos completarem uma contagem quase ao mesmo tempo.
// Fila de incrementos que falharam, guardada direto no localStorage (fora do
// estado React de propû°sito ã os 3 pontos que chamam
// `incrementContadosSupabase` (RandomCountFlow/RouteCountFlow/
// ImportedListCountFlow) continuam chamando exatamente como antes, sem
// precisar receber um callback novo de App() sû° pra registrar falha). O
// ciclo de sync de 30s em App() lûˆ essa fila direto daqui pra reenviar ã
// ver PENDING_INCREMENTS_KEY.
const PENDING_INCREMENTS_KEY = 'stock360:v1:pendingIncrements';
function getPendingIncrements(){
  try{ return JSON.parse(window.localStorage.getItem(PENDING_INCREMENTS_KEY)) || []; }
  catch(err){ return []; }
}
function addPendingIncrement(invId){
  try{
    const atual = getPendingIncrements();
    if(!atual.includes(invId)) window.localStorage.setItem(PENDING_INCREMENTS_KEY, JSON.stringify([...atual, invId]));
  }catch(err){ /* localStorage indisponûÙvel ã ignora */ }
}
function removePendingIncrement(invId){
  try{
    window.localStorage.setItem(PENDING_INCREMENTS_KEY, JSON.stringify(getPendingIncrements().filter(id=>id!==invId)));
  }catch(err){ /* localStorage indisponûÙvel ã ignora */ }
}

async function incrementContadosSupabase(invId){
  if(!supabaseClient) { addPendingIncrement(invId); return {ok:false, erro:'Supabase nûÈo configurado.'}; }
  try{
    const { error } = await supabaseClient.rpc('increment_contados', {p_id: invId});
    if(error){
      console.warn('Falha ao sincronizar progresso do inventûÀrio no Supabase:', error.message);
      addPendingIncrement(invId);
      return {ok:false, erro:error.message};
    }
    removePendingIncrement(invId);
    return {ok:true};
  }catch(err){
    console.warn('Falha ao sincronizar progresso do inventûÀrio no Supabase:', err);
    addPendingIncrement(invId);
    return {ok:false, erro:String(err && err.message || err)};
  }
}

// Merge genûˋrico por `id`, com desempate por um campo de timestamp ã a
// mesma lû°gica que jûÀ existia repetida quase igual em cada ciclo de
// sincronizaûÏûÈo (contagens, endereûÏos propostos, usuûÀrios). Usado tanto
// pelo fetch de reconciliaûÏûÈo (na carga inicial e sempre que um canal do
// Realtime reconecta, ver assinatura dos canais em App()) quanto pelos
// handlers de evento INSERT/UPDATE do prû°prio Realtime.
// `removeMissing:true` sû° faz sentido chamando com a lista REMOTA COMPLETA
// (fetch de reconciliaûÏûÈo) ã nunca passar isso ao processar um û¤nico
// evento do Realtime, ou tudo que nûÈo for aquele um registro seria removido
// por engano.
function mergeByIdComTimestamp(prev, incoming, {timestampField, removeMissing=false}={}){
  const byId = new Map(prev.map(item=>[item.id, item]));
  incoming.forEach(inc=>{
    const local = byId.get(inc.id);
    if(!local){
      byId.set(inc.id, inc);
    } else {
      const remoteTs = inc[timestampField] ? new Date(inc[timestampField]).getTime() : 0;
      const localTs = local[timestampField] ? new Date(local[timestampField]).getTime() : 0;
      if(remoteTs >= localTs) byId.set(inc.id, {...local, ...inc});
    }
  });
  if(removeMissing){
    const incomingIds = new Set(incoming.map(i=>i.id));
    return Array.from(byId.values()).filter(item=>incomingIds.has(item.id));
  }
  return Array.from(byId.values());
}

// Chama a Edge Function `usuarios-admin` ã ela decodifica o JWT de quem
// estûÀ logado (anexado automaticamente por `functions.invoke`) e confirma
// que ûˋ admin antes de fazer qualquer coisa privilegiada. `acao` ûˋ sempre
// um dos valores tratados lûÀ dentro (criar_usuario/atualizar_usuario/
// definir_senha/alternar_bloqueio/excluir_usuario/auto_definir_senha).
async function chamarUsuariosAdmin(acao, payload){
  if(!supabaseClient) return {ok:false, erro:'Supabase nûÈo configurado.'};
  try{
    const { data, error } = await supabaseClient.functions.invoke('usuarios-admin', {
      body: {acao, ...payload},
    });
    if(error){
      // Quando a Edge Function responde com status != 2xx, o client do
      // Supabase joga fora o corpo da resposta e sû° devolve uma mensagem
      // genûˋrica ("Edge Function returned a non-2xx status code") ã a
      // mensagem de verdade (ex: "e-mail jûÀ cadastrado") continua disponûÙvel
      // no corpo bruto da resposta, em `error.context` (um Response). Sem
      // isso, todo erro da funûÏûÈo aparecia com o mesmo texto genûˋrico,
      // sem dizer o que realmente deu errado.
      let erro = error.message;
      if(error.context && typeof error.context.json==='function'){
        try{
          const corpo = await error.context.json();
          if(corpo && corpo.erro) erro = corpo.erro;
        }catch(_e){ /* corpo nûÈo era JSON ã mantûˋm a mensagem genûˋrica */ }
      }
      return {ok:false, erro};
    }
    return data;
  }catch(err){
    return {ok:false, erro:String(err && err.message || err)};
  }
}

// ---- AtualizaûÏûÈo diûÀria do saldo em estoque (planilha SB2) ----
// O cliente ainda nûÈo tem a sincronizaûÏûÈo automûÀtica com o Protheus (a Edge
// Function sync-saldo-protheus continua sû° desenhada) ã enquanto isso, ele
// mesmo sobe a planilha SB2 pelo painel "Atualizar Saldo em Estoque" em
// ConfiguraûÏûçes, tipicamente todo dia.

// Mesma regra de reconstruûÏûÈo jûÀ usada pro catûÀlogo de produtos (85 mil+
// linhas importadas) e pro cache local de 300 SKUs: o Excel guarda cû°digo
// 100% numûˋrico como nû¤mero, perdendo o zero û  esquerda e os pontos. Formatos
// vûÀlidos: 8 dûÙgitos ã XXX.XXXXX; 9 ã XXX.XXXXX.X; 11 ã XXX.XXX.XXXXX; 10 ã
// sempre um 11-dûÙgitos que perdeu o zero û  esquerda (repûçe e formata igual).
function reconstructNumericCode(raw){
  let d = String(raw).trim();
  if(!/^[0-9]+$/.test(d)) return d;
  if(d.length===10) d = '0'+d;
  if(d.length===11) return d.slice(0,3)+'.'+d.slice(3,6)+'.'+d.slice(6,11);
  if(d.length===9) return d.slice(0,3)+'.'+d.slice(3,8)+'.'+d.slice(8,9);
  if(d.length===8) return d.slice(0,3)+'.'+d.slice(3,8);
  return d; // tamanho fora dos formatos conhecidos ã mantûˋm cru
}

// Lûˆ as linhas jûÀ convertidas pelo SheetJS (sheet_to_json, com cellDates:true
// pra "DT.Ult.Saida" vir como Date em vez de nû¤mero serial) e devolve as
// linhas normalizadas pra gravar em estoque_saldo, mais um resumo pra exibir
// antes de confirmar. Colunas esperadas (export padrûÈo SB2 do Protheus):
// Produto, Almoxarifado, DT.Ult.Saida, Saldo Atual, Sld.Atu. (valor
// financeiro do saldo).
function parseSB2Rows(rawRows){
  let totalLinhas = 0, semCodigo = 0, invalidas = 0;
  const linhas = [];
  rawRows.forEach(row=>{
    totalLinhas++;
    // Colunas com formato contûÀbil (moeda) no Excel ã ex: "Sld.Atu." ã fazem
    // o SheetJS devolver a CHAVE do cabeûÏalho com espaûÏo de preenchimento nas
    // pontas (" Sld.Atu. " em vez de "Sld.Atu."), herdado da parte "texto" do
    // format code contûÀbil (`_-@_-`). Sem isso o valor sempre lia undefined e
    // virava 0 silenciosamente. Normaliza tirando espaûÏo de toda chave antes
    // de comparar, robusto a qualquer coluna que receba esse mesmo formato.
    const norm = {};
    Object.keys(row).forEach(k=>{ norm[k.trim()] = row[k]; });

    const codigoRaw = norm['Produto'];
    if(codigoRaw==null || String(codigoRaw).trim()===''){ semCodigo++; return; }
    const codigo = reconstructNumericCode(codigoRaw);
    const almoxarifado = norm['Almoxarifado']!=null ? String(norm['Almoxarifado']).trim() : '';
    const saldo = Number(norm['Saldo Atual']);
    const valorFinanceiro = Number(norm['Sld.Atu.']);
    if(!almoxarifado || Number.isNaN(saldo)){ invalidas++; return; }
    let dataUltimaSaida = null;
    const rawData = norm['DT.Ult.Saida'];
    if(rawData instanceof Date && !Number.isNaN(rawData.getTime())){
      dataUltimaSaida = rawData.toISOString().slice(0,10);
    }
    linhas.push({
      produto_codigo: codigo,
      almoxarifado,
      saldo,
      valor_financeiro: Number.isNaN(valorFinanceiro) ? 0 : valorFinanceiro,
      data_ultima_saida: dataUltimaSaida,
    });
  });
  const armazens = new Set(linhas.map(l=>l.almoxarifado)).size;
  return { linhas, resumo: { totalLinhas, validas: linhas.length, semCodigo, invalidas, armazens } };
}

// "1" ã "Armazûˋm 01" (2 dûÙgitos, mesmo padrûÈo de nomenclatura jûÀ usado no
// resto do app ã ex: "Almox 01" no cache local). Cû°digo nûÈo-numûˋrico (ex:
// "EX", visto na planilha real do cliente) mantûˋm como veio, sem inventar
// um nome.
function formatArmazemLabel(codigo){
  return /^[0-9]+$/.test(codigo) ? 'Armazûˋm ' + codigo.padStart(2,'0') : 'Armazûˋm ' + codigo;
}

// Substitui TODO o conteû¤do de estoque_saldo pelo snapshot da planilha ã
// apaga tudo e insere de novo, em lotes (nûÈo ûˋ upsert incremental). Isso
// evita linha û°rfûÈ de item que saiu do armazûˋm/zerou de um dia pro outro, e
// ûˋ mais simples que casar upsert por (produto_codigo, almoxarifado) entre
// exportaûÏûçes que podem ter formataûÏûÈo de cû°digo levemente diferente.
// Retorna {ok, inseridas, erro}. NûÈo ûˋ fire-and-forget como as outras escritas
// ã quem chama precisa aguardar e mostrar o resultado, jûÀ que ûˋ uma aûÏûÈo
// explûÙcita do admin, nûÈo um efeito colateral de outro fluxo.
async function replaceEstoqueSaldoInSupabase(linhas, onProgress){
  if(!supabaseClient) return {ok:false, erro:'Supabase nûÈo configurado.'};
  try{
    const { error: delError } = await supabaseClient.from('estoque_saldo').delete().not('produto_codigo','is',null);
    if(delError) return {ok:false, erro:'Falha ao limpar saldo anterior: '+delError.message};

    const TAMANHO_LOTE = 500;
    let inseridas = 0;
    for(let i=0; i<linhas.length; i+=TAMANHO_LOTE){
      const lote = linhas.slice(i, i+TAMANHO_LOTE);
      const { error: insError } = await supabaseClient.from('estoque_saldo').insert(lote);
      if(insError) return {ok:false, erro:'Falha ao inserir lote (linha '+i+'): '+insError.message, inseridas};
      inseridas += lote.length;
      if(onProgress) onProgress(inseridas, linhas.length);
    }
    return {ok:true, inseridas};
  }catch(err){
    return {ok:false, erro:String(err && err.message || err)};
  }
}

// Normaliza o endereûÏo vindo da planilha "DescriûÏûÈo de Produtos" pro mesmo
// formato usado no resto do app (3 dûÙgitos-corredor, traûÏo, letra, traûÏo, 1
// dûÙgito de posiûÏûÈo ã ver ENDERECO_REGEX) ã corrige as variaûÏûçes mecûÂnicas
// mais comuns encontradas no export real do cliente (corredor com 1-2
// dûÙgitos, posiûÏûÈo com 2 dûÙgitos, traûÏo faltando antes da posiûÏûÈo, traûÏo
// duplicado) e devolve `null` pros casos sem informaûÏûÈo suficiente pra
// interpretar com seguranûÏa (ex.: "073-A", sem posiûÏûÈo nenhuma) ã esses
// ficam sem endereûÏo cadastrado em vez de arriscar um palpite errado.
// **ExceûÏûÈo deliberada**: o padrûÈo "10000-X-0" (corredor sempre "10000",
// posiûÏûÈo sempre "0") foge completamente da numeraûÏûÈo normal (001-075 no
// resto da planilha), mas o cliente confirmou que ûˋ um endereûÏo real ã
// mantido como veio, sem tentar encaixar no formato de 3 dûÙgitos.
function normalizeEnderecoCatalogo(raw){
  if(!raw) return null;
  const e = String(raw).trim().toUpperCase();
  if(!e) return null;
  if(/^\d{3}-[A-Z]-\d$/.test(e)) return e;
  if(/^\d{5}-[A-Z]-\d+$/.test(e)) return e;
  let m = e.match(/^(\d{1,2})-([A-Z])-(\d+)$/);
  if(m) return m[1].padStart(3,'0')+'-'+m[2]+'-'+m[3];
  m = e.match(/^(\d{3})-([A-Z])-0(\d)$/);
  if(m) return m[1]+'-'+m[2]+'-'+m[3];
  m = e.match(/^(\d{1,3})-([A-Z])(\d)$/);
  if(m) return m[1].padStart(3,'0')+'-'+m[2]+'-'+m[3];
  m = e.match(/^(\d{3})--([A-Z])-(\d)$/);
  if(m) return m[1]+'-'+m[2]+'-'+m[3];
  return null;
}

// Lûˆ a planilha "DescriûÏûÈo de Produtos" (export SB2 do Protheus com Unidade
// e LocalizaûÏûÈo acrescentadas ã mesmo catûÀlogo de sempre, 85 mil+ cû°digos) ã
// via matriz crua (`sheet_to_json(sheet,{header:1})`), nûÈo por nome de
// cabeûÏalho: o arquivo real do cliente veio com o cabeûÏalho da coluna
// "DescriûÏûÈo" corrompido (mojibake, provavelmente um export de codepage
// errado) ã ler por POSIûûO (Produto/DescriûÏûÈo/Grupo/Unidade/Localizacao,
// nessa ordem fixa) ûˋ imune a esse tipo de problema de encoding. Reaproveita
// `reconstructNumericCode` (mesmo bug jûÀ visto no catûÀlogo original e na
// SB2 de saldo: cû°digo 100% numûˋrico perde formataûÏûÈo no Excel).
function parseDescricaoProdutosRows(matrixRows){
  const linhas = matrixRows.slice(1); // pula cabeûÏalho
  // Guarda o endereûÏo original (cru) junto do jûÀ normalizado ã a planilha
  // real tem 40 mil+ linhas duplicadas (mesmo cû°digo repetido, ver
  // CLAUDE.md) e o resumo (corrigidos/ignorados) precisa contar por CûDIGO
  // ûNICO, nûÈo por linha crua ã senûÈo um cû°digo repetido 4x infla a
  // contagem em 4x por engano (bug pego no teste antes de subir).
  const porCodigo = new Map();

  linhas.forEach(row=>{
    if(!row || row[0]==null || String(row[0]).trim()==='') return;
    const codigo = reconstructNumericCode(String(row[0]).trim());
    const descricao = row[1]!=null ? String(row[1]).trim() : '';
    const grupo = row[2]!=null && String(row[2]).trim()!=='' ? String(row[2]).trim() : null;
    const unidadeRaw = row[3]!=null ? String(row[3]).trim() : '';
    const unidade = unidadeRaw ? unidadeRaw.toUpperCase() : null;
    const enderecoRaw = row[4]!=null ? String(row[4]).trim() : '';
    const endereco = enderecoRaw ? normalizeEnderecoCatalogo(enderecoRaw) : null;
    porCodigo.set(codigo, {codigo, descricao, grupo, unidade, endereco, enderecoRaw});
  });

  const entradas = Array.from(porCodigo.values());
  const produtos = entradas.map(({codigo, descricao, grupo, unidade, endereco})=>({codigo, descricao, grupo, unidade, endereco}));
  const comEndereco = entradas.filter(e=>e.endereco).length;
  const enderecosDistintos = new Set(entradas.filter(e=>e.endereco).map(e=>e.endereco)).size;
  const comUnidade = entradas.filter(e=>e.unidade).length;
  const enderecosCorrigidos = entradas.filter(e=>e.endereco && e.endereco!==e.enderecoRaw.toUpperCase()).length;
  const enderecosIgnorados = entradas.filter(e=>e.enderecoRaw && !e.endereco).map(e=>({codigo:e.codigo, enderecoOriginal:e.enderecoRaw}));

  return {
    produtos,
    resumo: {
      totalLinhas: linhas.length,
      codigosUnicos: produtos.length,
      comUnidade,
      comEndereco,
      enderecosDistintos,
      enderecosCorrigidos,
      enderecosIgnorados,
    },
  };
}

// Grava o catûÀlogo atualizado no Supabase ã UPSERT por cû°digo (nûÈo replace
// completo como a SB2 de saldo: aqui nûÈo faz sentido apagar tudo, o
// catûÀlogo ûˋ fonte de descriûÏûÈo/unidade/endereûÏo, perder uma linha por uma
// falha no meio do upload seria pior que sû° nûÈo atualizar aquele cû°digo
// desta vez). Trûˆs etapas: (1) upsert em `produtos`; (2) upsert dos
// endereûÏos DISTINTOS em `enderecos` (sempre Armazûˋm 01, confirmado com o
// cliente ã a planilha nûÈo traz essa coluna), recuperando o `id` de cada
// um via `.select()`; (3) upsert dos vûÙnculos produtoãendereûÏo em
// `estoque_enderecos` usando os ids resolvidos no passo 2.
async function upsertCatalogoDescricao(produtos, onProgress){
  if(!supabaseClient) return {ok:false, erro:'Supabase nûÈo configurado.'};
  const TAMANHO_LOTE = 500;
  const agora = new Date().toISOString();
  try{
    // 1) produtos
    const linhasProdutos = produtos.map(p=>({
      codigo: p.codigo, descricao: p.descricao, grupo: p.grupo, unidade: p.unidade,
      sincronizado_em: agora,
    }));
    for(let i=0; i<linhasProdutos.length; i+=TAMANHO_LOTE){
      const lote = linhasProdutos.slice(i, i+TAMANHO_LOTE);
      const { error } = await supabaseClient.from('produtos').upsert(lote, {onConflict:'codigo'});
      if(error) return {ok:false, erro:'Falha ao gravar produtos (linha '+i+'): '+error.message};
      if(onProgress) onProgress({etapa:'produtos', feito:Math.min(i+TAMANHO_LOTE, linhasProdutos.length), total:linhasProdutos.length});
    }

    // 2) endereûÏos distintos
    const comEndereco = produtos.filter(p=>p.endereco);
    const codigosEnderecoDistintos = Array.from(new Set(comEndereco.map(p=>p.endereco)));
    const idPorCodigoEndereco = new Map();
    for(let i=0; i<codigosEnderecoDistintos.length; i+=TAMANHO_LOTE){
      const lote = codigosEnderecoDistintos.slice(i, i+TAMANHO_LOTE).map(codigo=>({codigo, almoxarifado:'01'}));
      const { data, error } = await supabaseClient.from('enderecos').upsert(lote, {onConflict:'codigo'}).select('id, codigo');
      if(error) return {ok:false, erro:'Falha ao gravar endereûÏos (linha '+i+'): '+error.message};
      (data||[]).forEach(row=>idPorCodigoEndereco.set(row.codigo, row.id));
      if(onProgress) onProgress({etapa:'enderecos', feito:Math.min(i+TAMANHO_LOTE, codigosEnderecoDistintos.length), total:codigosEnderecoDistintos.length});
    }

    // 3) vûÙnculos produtoãendereûÏo
    const vinculos = comEndereco
      .map(p=>({produto_codigo:p.codigo, endereco_id:idPorCodigoEndereco.get(p.endereco)}))
      .filter(v=>v.endereco_id);
    for(let i=0; i<vinculos.length; i+=TAMANHO_LOTE){
      const lote = vinculos.slice(i, i+TAMANHO_LOTE);
      const { error } = await supabaseClient.from('estoque_enderecos').upsert(lote, {onConflict:'produto_codigo,endereco_id'});
      if(error) return {ok:false, erro:'Falha ao vincular endereûÏos (linha '+i+'): '+error.message};
      if(onProgress) onProgress({etapa:'vinculos', feito:Math.min(i+TAMANHO_LOTE, vinculos.length), total:vinculos.length});
    }

    return {ok:true, produtos: linhasProdutos.length, enderecos: codigosEnderecoDistintos.length, vinculos: vinculos.length};
  }catch(err){
    return {ok:false, erro:String(err && err.message || err)};
  }
}
