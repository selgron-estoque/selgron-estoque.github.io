<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Inventário 360 — Controle de Inventário Cíclico</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#EEF0F3" />
<!-- iOS: Safari ignora o manifest.json pra ícone/instalação — precisa desses -->
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png" />
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Inventário 360" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg: #EEF0F3;
    --panel: #FFFFFF;
    --panel-raised: #F3F5F7;
    --line: #D7DBE1;
    --ink: #1A1C21;
    --ink-dim: #575756;
    --safety: #F6A200;
    --safety-ink: #14161A;
    --ok: #1E8E4F;
    --ok-bg: #E3F6EA;
    --warn: #A35F00;
    --warn-bg: #FFF1D6;
    --danger: #C4291B;
    --danger-bg: #FBE6E3;
    --accent2: #1F6FA8;
    --radius: 10px;
    --font-display: 'Oswald', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    /* Paleta corporativa/ERP (Inter + navy + cinzas) — login e dashboard novo usam,
       resto do app (tablet do operador) continua no design system original acima */
    --font-corp: 'Inter', sans-serif;
    --navy: #0F172A;
    --gray-50: #F8FAFC;
    --gray-100: #F1F5F9;
    --gray-200: #E2E8F0;
    --gray-400: #94A3B8;
    --gray-500: #64748B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);height:100%;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
  #root{min-height:100vh;display:flex;flex-direction:column;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  ::selection{background:var(--safety);color:var(--safety-ink);}

  .app{display:flex;flex-direction:column;min-height:100vh;max-width:900px;margin:0 auto;width:100%;background:var(--bg);position:relative;}

  /* TOPBAR */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:20;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-logo{height:24px;width:auto;flex-shrink:0;display:block;}
  .brand-text{font-family:var(--font-display);font-weight:600;letter-spacing:0.5px;font-size:19px;text-transform:uppercase;}
  .brand-text small{display:block;font-family:var(--font-mono);font-size:9px;color:var(--ink-dim);letter-spacing:1.5px;font-weight:500;text-transform:uppercase;margin-top:-2px;}
  .role-switch{display:flex;align-items:center;gap:8px;}
  .role-pill{font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.5px;text-transform:uppercase;background:var(--panel-raised);border:1px solid var(--line);color:var(--ink-dim);padding:7px 10px;border-radius:20px;display:flex;align-items:center;gap:6px;}
  .role-pill select{background:transparent;border:none;color:var(--ink);font-family:var(--font-mono);font-size:11px;text-transform:uppercase;outline:none;}
  .role-pill select option{background:var(--panel-raised);color:var(--ink);}
  .logout-btn{background:var(--panel-raised);border:1px solid var(--line);color:var(--ink-dim);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .logout-btn:active{background:var(--danger-bg);color:var(--danger);border-color:var(--danger);}

  /* "Inventário 360" é mais longo que "Stock360" (nome anterior) — em telas
     estreitas precisa encolher/colapsar pra não quebrar o topbar em 3 linhas. */
  @media (max-width:400px){
    .brand-text{font-size:15px;white-space:nowrap;}
    .role-pill span{display:none;}
    .role-pill{padding:7px 9px;}
  }

  /* BACK BAR */
  .subbar{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--bg);}
  .back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--ink-dim);font-size:14px;padding:6px 8px 6px 0;border-radius:6px;}
  .back-btn:active{background:var(--panel-raised);}
  .subbar h1{font-family:var(--font-display);font-size:17px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin:0;}

  .content{flex:1;padding:18px;padding-bottom:100px;}

  /* HOME CARDS */
  .grid-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (min-width:640px){.grid-cards{grid-template-columns:1fr 1fr 1fr;}}
  .home-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 16px;display:flex;flex-direction:column;gap:12px;align-items:flex-start;min-height:120px;position:relative;overflow:hidden;transition:transform .1s;}
  .home-card:active{transform:scale(0.97);background:var(--panel-raised);}
  .home-card .icon{font-size:26px;}
  .home-card .label{font-family:var(--font-display);font-size:15px;text-transform:uppercase;letter-spacing:0.3px;font-weight:600;line-height:1.25;}
  .home-card .badge{position:absolute;top:12px;right:12px;background:var(--safety);color:var(--safety-ink);font-family:var(--font-mono);font-weight:700;font-size:11px;padding:2px 7px;border-radius:20px;}
  .home-card.wide{grid-column:span 2;flex-direction:row;align-items:center;justify-content:space-between;}
  @media (min-width:640px){.home-card.wide{grid-column:span 3;}}

  .greet{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--safety);margin-bottom:4px;}
  .greet-title{font-family:var(--font-display);font-size:24px;font-weight:600;margin:0 0 20px 0;text-transform:uppercase;}

  /* BUTTONS */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 20px;border-radius:var(--radius);font-family:var(--font-display);font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;border:none;width:100%;}
  .btn-primary{background:var(--safety);color:var(--safety-ink);}
  .btn-primary:active{background:#d9a300;}
  .btn-secondary{background:var(--panel-raised);color:var(--ink);border:1px solid var(--line);}
  .btn-secondary:active{background:#2b2f36;}
  .btn-outline{background:transparent;color:var(--ink-dim);border:1px solid var(--line);}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-row{display:flex;gap:10px;}
  .btn-row .btn{flex:1;}
  .btn:disabled{opacity:0.4;}

  /* PANELS/FORMS */
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--ink-dim);margin-bottom:7px;}
  .field input[type=text],.field input[type=number],.field input[type=date],.field select,.field textarea{width:100%;background:var(--panel-raised);border:1px solid var(--line);color:var(--ink);padding:14px;border-radius:8px;font-size:16px;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--safety);outline-offset:0;}
  .field textarea{resize:vertical;min-height:70px;}
  .field .qty-input{font-family:var(--font-mono);font-size:28px;font-weight:700;text-align:center;padding:18px;}
  .radio-group{display:flex;flex-direction:column;gap:10px;}
  .radio-opt{display:flex;align-items:center;gap:12px;background:var(--panel-raised);border:1px solid var(--line);padding:14px;border-radius:8px;}
  .radio-opt.active{border-color:var(--safety);background:#2a2410;}
  .radio-opt input{width:20px;height:20px;accent-color:var(--safety);}
  .radio-opt .opt-title{font-weight:600;font-size:14.5px;}
  .radio-opt .opt-desc{font-size:12px;color:var(--ink-dim);margin-top:2px;}

  /* STATUS */
  .status-tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;padding:4px 9px;border-radius:20px;letter-spacing:0.3px;}
  .status-ok{background:var(--ok-bg);color:var(--ok);}
  .status-warn{background:var(--warn-bg);color:var(--warn);}
  .status-danger{background:var(--danger-bg);color:var(--danger);}
  .status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

  /* ITEM CARD (count item) */
  .item-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
  .item-card-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .item-code{font-family:var(--font-mono);font-size:13px;color:var(--safety);letter-spacing:0.5px;}
  .item-desc{font-family:var(--font-display);font-size:18px;font-weight:600;margin:4px 0 0 0;text-transform:uppercase;}
  .item-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 18px;}
  .item-meta .m{background:var(--panel-raised);border-radius:8px;padding:10px 12px;}
  .item-meta .m .k{font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;color:var(--ink-dim);letter-spacing:0.6px;}
  .item-meta .m .v{font-size:14.5px;font-weight:600;margin-top:3px;}
  .address-chip{font-family:var(--font-mono);font-size:20px;font-weight:700;letter-spacing:2px;background:var(--panel-raised);border:1px dashed var(--line);border-radius:8px;padding:14px;text-align:center;margin-bottom:14px;}

  /* QR SCAN VISUAL */
  .scan-box{position:relative;background:#0A0B0D;border:1px solid var(--line);border-radius:var(--radius);height:180px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:14px;}
  .scan-frame{width:120px;height:120px;position:relative;}
  .scan-frame::before,.scan-frame::after,.scan-corner-b1,.scan-corner-b2{content:'';position:absolute;width:26px;height:26px;border-color:var(--safety);}
  .scan-frame::before{top:0;left:0;border-top:3px solid var(--safety);border-left:3px solid var(--safety);}
  .scan-frame::after{top:0;right:0;border-top:3px solid var(--safety);border-right:3px solid var(--safety);}
  .scan-corner-b1{bottom:0;left:0;border-bottom:3px solid var(--safety);border-left:3px solid var(--safety);}
  .scan-corner-b2{bottom:0;right:0;border-bottom:3px solid var(--safety);border-right:3px solid var(--safety);}
  .scan-laser{position:absolute;left:6px;right:6px;height:2px;background:var(--safety);box-shadow:0 0 8px var(--safety);animation:laser 1.8s ease-in-out infinite;}
  @keyframes laser{0%{top:6px;}50%{top:110px;}100%{top:6px;}}

  /* LIVE CAMERA SCANNER (html5-qrcode) */
  .scanner-wrap{background:#0A0B0D;border-radius:var(--radius);overflow:hidden;margin-bottom:14px;border:1px solid var(--line);position:relative;}
  .scanner-viewport{width:100%;min-height:240px;}
  .scanner-viewport video{width:100% !important;display:block;}
  .scanner-hint{text-align:center;color:var(--ink-dim);font-size:12.5px;margin:-6px 0 14px 0;}
  .scan-toggle-row{display:flex;gap:10px;margin-bottom:14px;}
  .manual-fallback{background:var(--panel-raised);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:14px;}

  /* RESULT BANNER */
  .result-banner{border-radius:var(--radius);padding:20px;margin-bottom:16px;border:1px solid;}
  .result-banner.ok{background:var(--ok-bg);border-color:var(--ok);}
  .result-banner.warn{background:var(--warn-bg);border-color:var(--warn);}
  .result-banner.danger{background:var(--danger-bg);border-color:var(--danger);}
  .result-banner .rb-title{font-family:var(--font-display);font-size:18px;font-weight:700;text-transform:uppercase;margin:0 0 6px 0;}
  .result-banner .rb-sub{font-size:13.5px;color:var(--ink-dim);}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
  .result-grid .rg{background:rgba(255,255,255,0.04);border-radius:8px;padding:10px 12px;}
  .result-grid .rg .k{font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;color:var(--ink-dim);}
  .result-grid .rg .v{font-family:var(--font-mono);font-size:17px;font-weight:700;margin-top:2px;}

  /* LIST ROWS */
  .list-row{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;margin-bottom:10px;}
  .list-row:active{background:var(--panel-raised);}
  .list-row .lr-title{font-weight:600;font-size:14.5px;}
  .list-row .lr-sub{font-size:12px;color:var(--ink-dim);margin-top:3px;font-family:var(--font-mono);}
  .chevron{color:var(--ink-dim);font-size:18px;}

  .progress-bar{height:6px;background:var(--panel-raised);border-radius:4px;overflow:hidden;margin-top:8px;}
  .progress-bar .fill{height:100%;background:var(--safety);border-radius:4px;}

  /* DASHBOARD */
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
  @media (min-width:640px){.kpi-grid{grid-template-columns:repeat(4,1fr);}}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
  .kpi .kv{font-family:var(--font-mono);font-size:26px;font-weight:700;}
  .kpi .kl{font-size:11px;color:var(--ink-dim);margin-top:4px;text-transform:uppercase;letter-spacing:0.4px;}
  .section-title{font-family:var(--font-display);font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-dim);margin:24px 0 12px 0;display:flex;align-items:center;gap:8px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--line);}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .bar-row .bl{width:110px;font-size:12px;color:var(--ink-dim);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar-track{flex:1;height:20px;background:var(--panel-raised);border-radius:5px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--safety);border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;}
  .bar-fill span{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--safety-ink);}
  .rank-table{width:100%;border-collapse:collapse;}
  .rank-table th{text-align:left;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;color:var(--ink-dim);padding:8px 6px;border-bottom:1px solid var(--line);}
  .rank-table td{padding:10px 6px;border-bottom:1px solid var(--line);font-size:13px;}
  .rank-table td.num{font-family:var(--font-mono);text-align:right;}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--line);display:flex;max-width:900px;margin:0 auto;z-index:20;}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px 12px;background:none;border:none;color:var(--ink-dim);font-size:9.5px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.3px;}
  .nav-btn.active{color:var(--safety);}
  .nav-btn .ic{font-size:19px;}

  .empty-state{text-align:center;padding:50px 20px;color:var(--ink-dim);}
  .empty-state .ic{font-size:40px;margin-bottom:12px;}

  .divergence-alert{background:var(--warn-bg);border:1px solid var(--warn);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px;display:flex;gap:10px;align-items:flex-start;}

  .photo-preview{width:100%;height:140px;border-radius:8px;object-fit:cover;margin-top:10px;border:1px solid var(--line);}
  .photo-btn{border:1px dashed var(--line);background:var(--panel-raised);border-radius:8px;padding:16px;text-align:center;color:var(--ink-dim);font-size:13px;}

  .role-note{font-family:var(--font-mono);font-size:11px;color:var(--ink-dim);background:var(--panel-raised);border-radius:8px;padding:10px 12px;margin-bottom:16px;border-left:3px solid var(--accent2);}

  /* LOGIN SCREEN — identidade corporativa/ERP (navy + branco + laranja Selgron),
     card dividido em 2 colunas (ilustração + formulário), replicando o mockup de
     referência do cliente. Ver CLAUDE.md "Tela de login vira o mockup de 2 colunas". */
  .login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:
      radial-gradient(circle at 12% 8%, rgba(15,23,42,0.07), transparent 40%),
      radial-gradient(circle at 88% 92%, rgba(246,162,0,0.09), transparent 42%),
      var(--gray-100);
    padding:24px;font-family:var(--font-corp);}
  .login-card{width:100%;max-width:900px;display:flex;flex-direction:column;align-items:stretch;background:#FFFFFF;border:1px solid var(--gray-200);border-radius:20px;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,42,0.04), 0 16px 40px rgba(15,23,42,0.08);}

  /* Coluna/faixa esquerda — ilustração. SEMPRE visível (mobile-first): em telas
     estreitas vira uma faixa horizontal compacta no topo do card (logo + ícone +
     nome, sem tagline nem o recorte decorativo, pra não gastar espaço vertical
     precioso); a partir de 760px vira a coluna alta e centralizada do mockup de
     referência, com tagline e o recorte diagonal decorativo. */
  .login-illustration{display:flex;flex-direction:row;align-items:center;gap:14px;width:100%;flex-shrink:0;background:var(--gray-50);padding:20px 24px;position:relative;overflow:hidden;}
  .login-illustration img{height:20px;width:auto;display:block;position:relative;z-index:2;flex-shrink:0;}
  .login-illust-mid{flex:1;display:flex;flex-direction:row;align-items:center;justify-content:flex-start;text-align:left;gap:10px;position:relative;z-index:2;}
  .login-cycle-icon{width:36px;height:36px;flex-shrink:0;}
  .login-illust-title{display:none;font-family:var(--font-corp);font-size:23px;font-weight:700;color:var(--navy);white-space:nowrap;}
  .login-illust-title span{color:var(--safety);}
  .login-illust-tagline{display:none;font-family:var(--font-corp);font-size:13px;color:var(--gray-500);margin-top:-6px;}
  .login-illust-decor{display:none;position:absolute;left:-10%;bottom:-8%;width:130%;height:46%;z-index:1;
    background:repeating-linear-gradient(0deg, rgba(15,23,42,0.05) 0px, rgba(15,23,42,0.05) 2px, transparent 2px, transparent 20px);
    clip-path:polygon(0 40%, 100% 0%, 100% 100%, 0 100%);}
  .login-illust-decor::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg, rgba(246,162,0,0.22), rgba(246,162,0,0) 65%);}

  /* Coluna direita — formulário */
  .login-form-panel{flex:1;min-width:0;padding:44px 48px;display:flex;flex-direction:column;justify-content:center;}
  .login-title{font-family:var(--font-corp);font-size:26px;font-weight:700;letter-spacing:-0.2px;color:var(--navy);margin:0;}
  .login-title span{color:var(--safety);}
  .login-subtitle{font-family:var(--font-corp);font-size:11px;font-weight:600;color:var(--gray-500);letter-spacing:1.2px;text-transform:uppercase;margin:6px 0 0 0;}
  .login-rule{width:44px;height:3px;background:var(--safety);border-radius:2px;margin:14px 0 24px;}
  .login-field{margin-bottom:16px;position:relative;}
  .login-field label{display:block;font-family:var(--font-corp);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--gray-500);margin-bottom:7px;}
  .login-field .field-wrap{position:relative;display:flex;align-items:center;}
  .login-field .field-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);display:flex;color:var(--gray-400);pointer-events:none;}
  .login-field input{width:100%;background:var(--gray-50);border:1px solid var(--gray-200);color:var(--navy);padding:12px 14px 12px 40px;border-radius:8px;font-family:var(--font-corp);font-size:14.5px;transition:border-color .12s, background .12s;}
  .login-field input::placeholder{color:var(--gray-400);}
  .login-field input:focus{outline:none;border-color:var(--navy);background:#fff;box-shadow:0 0 0 3px rgba(15,23,42,0.07);}
  .login-field input[type="password"],
  .login-field input.has-toggle{padding-right:76px;}
  .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray-500);display:flex;align-items:center;gap:5px;padding:4px;border-radius:6px;font-family:var(--font-corp);font-size:12px;font-weight:600;}
  .pw-toggle:hover{color:var(--navy);}
  .login-error{display:flex;align-items:center;gap:8px;background:#FEF2F2;border:1px solid #FECACA;color:#B91C1C;border-radius:8px;padding:11px 13px;font-size:13px;font-family:var(--font-corp);margin-bottom:16px;}
  .login-success{display:flex;align-items:center;gap:8px;background:#F0FDF4;border:1px solid #BBF7D0;color:#15803D;border-radius:8px;padding:11px 13px;font-size:13px;font-family:var(--font-corp);margin-bottom:16px;}
  .login-notice{display:flex;align-items:center;gap:8px;background:#FFF7ED;border:1px solid #FED7AA;color:#9A5B13;border-radius:8px;padding:11px 13px;font-size:13px;font-family:var(--font-corp);margin-bottom:16px;}
  .login-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--safety);color:var(--safety-ink);border:none;border-radius:8px;padding:13px 20px;font-family:var(--font-corp);font-size:14.5px;font-weight:700;letter-spacing:0.3px;text-transform:uppercase;margin-top:8px;transition:background .12s;}
  .login-btn:hover{background:#e0940a;}
  .login-btn:active{background:#d9a300;}
  .login-or{display:flex;align-items:center;gap:12px;margin:18px 0 4px;font-family:var(--font-corp);font-size:11.5px;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.5px;}
  .login-or::before, .login-or::after{content:'';flex:1;height:1px;background:var(--gray-200);}
  .login-forgot{display:flex;align-items:center;justify-content:center;gap:6px;text-align:center;margin-top:6px;background:none;border:none;color:var(--accent2);font-family:var(--font-corp);font-size:13px;font-weight:600;width:100%;padding:8px;}
  .login-forgot:hover{text-decoration:underline;}
  .login-back{display:block;text-align:center;margin-top:14px;background:none;border:none;color:var(--gray-500);font-family:var(--font-corp);font-size:12.5px;width:100%;padding:8px;}
  .demo-creds{margin-top:22px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:10px;padding:14px 16px;}
  .demo-creds .dc-title{display:flex;align-items:center;gap:6px;font-family:var(--font-corp);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--navy);}
  .demo-creds .dc-sub{font-family:var(--font-corp);font-size:11px;color:var(--gray-500);margin:2px 0 10px 19px;}
  .demo-creds .dc-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--gray-200);}
  .demo-creds .dc-row:first-of-type{border-top:none;padding-top:0;}
  .demo-creds .dc-avatar{width:24px;height:24px;border-radius:50%;background:#fff;border:1px solid var(--gray-200);color:var(--gray-400);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .demo-creds .dc-cred{flex:1;font-family:var(--font-mono);font-size:12px;color:var(--navy);}
  .dc-role-pill{font-family:var(--font-corp);font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;}
  .dc-role-pill.admin{background:#DBEAFE;color:#1D4ED8;}
  .dc-role-pill.lider{background:#DCFCE7;color:#15803D;}
  .dc-role-pill.operador{background:#FFEDD5;color:#C2410C;}
  .login-card .role-note{font-family:var(--font-corp);font-size:12.5px;color:var(--gray-500);background:var(--gray-50);border-radius:8px;border-left:3px solid var(--navy);}

  /* Faixa de confiança + rodapé, abaixo do card */
  /* Faixa de confiança: sempre lado a lado (mesmo em telas estreitas), os itens
     encolhem — ícone em cima do texto, fontes menores — em vez de empilhar
     verticalmente. A partir de 760px vira o layout largo (ícone ao lado do texto). */
  .login-trust-row{display:flex;align-items:stretch;justify-content:center;gap:0;width:100%;max-width:900px;margin-top:28px;}
  .login-trust-item{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 6px;text-align:center;}
  .login-trust-item + .login-trust-item{border-left:1px solid var(--gray-200);}
  .login-trust-item .ti-icon{color:var(--gray-500);flex-shrink:0;}
  .login-trust-item strong{display:block;font-family:var(--font-corp);font-size:11px;color:var(--navy);font-weight:700;white-space:nowrap;}
  .login-trust-item span{display:block;font-family:var(--font-corp);font-size:9.5px;color:var(--gray-500);margin-top:1px;line-height:1.25;}
  .login-footer{text-align:center;font-family:var(--font-corp);font-size:11.5px;color:var(--gray-500);margin-top:26px;letter-spacing:0.2px;line-height:1.7;}
  .login-footer .lf-restrict{display:flex;align-items:center;justify-content:center;gap:6px;}

  @media (min-width:760px){
    .login-card{flex-direction:row;}
    .login-illustration{flex-direction:column;justify-content:space-between;width:38%;padding:36px 34px;}
    .login-illustration img{height:22px;}
    .login-illust-mid{flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;}
    .login-cycle-icon{width:104px;height:104px;}
    .login-illust-title{display:block;font-size:23px;}
    .login-illust-tagline{display:block;}
    .login-illust-decor{display:block;}
    .login-trust-item{flex-direction:row;align-items:flex-start;gap:10px;padding:0 20px;text-align:left;}
    .login-trust-item strong{font-size:13px;white-space:normal;}
    .login-trust-item span{font-size:11.5px;}
  }

  /* ---------------- LAYOUT DESKTOP (sidebar) — a partir de celular médio ----------------
     Esse bloco entra a partir de 360px (cobre praticamente qualquer celular moderno,
     incluindo iPhone 13 e maiores, além de tablet/monitor — ver CLAUDE.md "Dashboard
     novo funciona em qualquer largura de tela"). Abaixo de 768px a sidebar vira um
     painel sobreposto (overlay) que desliza por cima do conteúdo em vez de empurrá-lo,
     já que não cabe um menu fixo de 264px numa tela de celular. */
  .desktop-topbar, .sidebar, .sidebar-toggle, .sidebar-backdrop, .desktop-kpi-grid, .desktop-quick-grid, .desktop-cta-row, .pnl-wrap{display:none;}

  @media (min-width:360px){
    .app{max-width:none;flex-direction:row;align-items:flex-start;position:relative;}
    .mobile-topbar, .bottom-nav{display:none;}
    .app-main{flex:1;display:flex;flex-direction:column;min-width:0;}
    .content{padding:32px 40px 48px;max-width:1400px;margin:0 auto;width:100%;}

    .sidebar{display:flex;flex-direction:column;width:264px;flex-shrink:0;background:var(--navy);min-height:100vh;position:sticky;top:0;overflow:hidden;transition:width .18s ease;}
    .sidebar.collapsed{width:0;}
    .sidebar-toggle{display:flex;align-items:center;justify-content:center;position:absolute;top:24px;left:250px;width:28px;height:28px;border-radius:50%;background:var(--accent2);color:#fff;border:2px solid var(--bg);box-shadow:0 2px 6px rgba(0,0,0,0.18);z-index:30;transition:left .18s ease;}
    .sidebar-toggle:hover{background:#195a89;}
    .sidebar-toggle.collapsed{left:8px;}
    .sidebar-brand{padding:22px 22px 18px;border-bottom:1px solid rgba(255,255,255,0.08);width:264px;flex-shrink:0;box-sizing:border-box;}
    .sidebar-brand img{width:100%;max-width:170px;height:auto;display:block;margin-bottom:10px;}
    .sidebar-brand .product{font-family:var(--font-display);font-size:15px;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;color:#fff;}
    .sidebar-brand .product small{display:block;font-family:var(--font-mono);font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:1.2px;text-transform:uppercase;margin-top:2px;}
    .sidebar-nav{padding:14px 12px;display:flex;flex-direction:column;gap:2px;width:264px;flex-shrink:0;box-sizing:border-box;}
    .sidebar-nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:8px;background:none;border:none;color:rgba(255,255,255,0.72);font-size:13.5px;font-weight:500;text-align:left;width:100%;}
    .sidebar-nav-item:hover{background:rgba(255,255,255,0.07);}
    .sidebar-nav-item.active{background:var(--safety);color:var(--safety-ink);font-weight:600;}
    .sidebar-nav-item .ic{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .sidebar-shortcuts{padding:16px 20px 18px;border-top:1px solid rgba(255,255,255,0.08);margin-top:auto;width:264px;flex-shrink:0;box-sizing:border-box;}
    .sidebar-section-title{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.45);margin-bottom:10px;}
    .sidebar-shortcut{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;color:rgba(255,255,255,0.75);font-size:12.5px;padding:8px 2px;text-align:left;}
    .sidebar-shortcut:hover{color:#fff;}
    .sidebar-shortcut span{color:var(--safety);font-weight:700;}
    .sidebar-footer{padding:14px 20px 20px;border-top:1px solid rgba(255,255,255,0.08);font-family:var(--font-corp);font-size:11px;color:rgba(255,255,255,0.45);display:flex;flex-direction:column;gap:6px;width:264px;flex-shrink:0;box-sizing:border-box;}
    .sidebar-footer .status{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,0.6);}
    .sidebar-footer .status .dot{width:6px;height:6px;border-radius:50%;background:var(--ok);flex-shrink:0;}
    .sidebar-footer .sf-user{display:flex;align-items:center;gap:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.72);font-weight:600;}

    .desktop-topbar{position:relative;height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:var(--panel);border-bottom:1px solid var(--line);}
    .desktop-topbar-titlewrap{display:flex;flex-direction:column;justify-content:center;gap:2px;}
    .desktop-topbar-title{font-family:var(--font-corp);font-size:20px;font-weight:700;color:var(--navy);letter-spacing:-0.1px;}
    .desktop-topbar-subtitle{font-family:var(--font-corp);font-size:12.5px;color:var(--gray-500);}
    .desktop-topbar-right{display:flex;align-items:center;gap:14px;}
    .pnl-period-select{font-family:var(--font-corp);font-size:12.5px;font-weight:500;color:var(--navy);background:#fff;border:1px solid var(--gray-200);border-radius:8px;padding:8px 12px;}
    .desktop-bell{width:36px;height:36px;border-radius:8px;border:1px solid var(--gray-200);background:#fff;display:flex;align-items:center;justify-content:center;color:var(--gray-500);flex-shrink:0;}
    .desktop-bell:hover{background:var(--gray-50);color:var(--navy);}
    .desktop-notif-menu{position:absolute;top:60px;right:32px;background:#fff;border:1px solid var(--gray-200);border-radius:10px;box-shadow:0 8px 24px rgba(15,23,42,.12);width:240px;padding:16px;z-index:50;font-family:var(--font-corp);font-size:12.5px;color:var(--gray-500);text-align:center;}
    .desktop-user-wrap{position:relative;}
    .desktop-user{display:flex;align-items:center;gap:10px;background:none;border:none;padding:4px 6px 4px 4px;border-radius:8px;cursor:pointer;font-family:var(--font-corp);}
    .desktop-user:hover{background:var(--gray-50);}
    .desktop-user .avatar{width:36px;height:36px;border-radius:50%;background:var(--safety);color:var(--safety-ink);display:flex;align-items:center;justify-content:center;font-family:var(--font-corp);font-weight:700;font-size:13px;flex-shrink:0;}
    .desktop-user .info{display:flex;flex-direction:column;line-height:1.3;text-align:left;}
    .desktop-user .info strong{font-size:13px;color:var(--navy);}
    .desktop-user .info span{font-size:11px;color:var(--gray-500);}
    .desktop-user-menu{position:absolute;top:56px;right:0;background:#fff;border:1px solid var(--gray-200);border-radius:10px;box-shadow:0 8px 24px rgba(15,23,42,.12);min-width:210px;padding:8px;z-index:50;font-family:var(--font-corp);}
    .desktop-user-menu .um-head{padding:9px 11px 11px;border-bottom:1px solid var(--gray-100);margin-bottom:6px;}
    .desktop-user-menu .um-head strong{display:block;font-size:13.5px;color:var(--navy);}
    .desktop-user-menu .um-head span{font-size:11.5px;color:var(--gray-500);}
    .desktop-user-menu button{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;padding:9px 11px;border-radius:6px;font-size:13px;color:var(--navy);text-align:left;}
    .desktop-user-menu button:hover{background:var(--gray-50);}
    .desktop-user-menu button.danger{color:var(--danger);}

    .desktop-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
    .desktop-kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;}
    .desktop-kpi .kpi-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
    .desktop-kpi .kpi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
    .desktop-kpi .kpi-label{font-size:13px;color:var(--ink-dim);font-weight:500;}
    .desktop-kpi .kpi-value{font-family:var(--font-display);font-size:30px;font-weight:700;margin-bottom:8px;}
    .desktop-kpi .kpi-link{font-size:12.5px;font-weight:600;background:none;border:none;padding:0;display:flex;align-items:center;gap:4px;color:var(--accent2);}

    .desktop-quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px;}
    .desktop-quick-card{display:flex;align-items:flex-start;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;text-align:left;}
    .desktop-quick-card:hover{border-color:var(--safety);}
    .desktop-quick-card .qc-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .desktop-quick-card .qc-body{flex:1;display:flex;flex-direction:column;}
    .desktop-quick-card .qc-title{display:block;font-size:14px;font-weight:600;margin-bottom:3px;}
    .desktop-quick-card .qc-desc{display:block;font-size:12px;color:var(--ink-dim);line-height:1.4;}
    .desktop-quick-card .qc-arrow{color:var(--ink-dim);font-size:16px;flex-shrink:0;}

    .desktop-cta-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;}
    .desktop-cta{display:flex;align-items:center;justify-content:space-between;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;}
    .desktop-cta .cta-left{display:flex;align-items:center;gap:14px;}
    .desktop-cta .cta-icon{width:40px;height:40px;border-radius:10px;background:var(--panel-raised);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .desktop-cta .cta-title{font-size:14.5px;font-weight:600;}
    .desktop-cta .cta-desc{font-size:12px;color:var(--ink-dim);margin-top:2px;}

    .grid-cards{display:none;}

    /* ---- Dashboard novo ("painel") — design system corporativo/ERP (Inter,
       navy, laranja Selgron, grid de 12 colunas, espaçamento em múltiplos de 8) ---- */
    .pnl-wrap{display:block;font-family:var(--font-corp);color:var(--navy);}
    .pnl-kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px;}
    .pnl-kpi{display:block;width:100%;text-align:left;font:inherit;background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:18px;box-shadow:0 1px 2px rgba(15,23,42,.03);transition:box-shadow .15s, transform .15s;}
    .pnl-kpi:hover{box-shadow:0 6px 16px rgba(15,23,42,.08);transform:translateY(-1px);}
    .pnl-kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .pnl-kpi-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .pnl-kpi-value{font-family:var(--font-corp);font-size:28px;font-weight:700;color:var(--navy);line-height:1;margin-bottom:6px;}
    .pnl-kpi-label{font-size:12.5px;color:var(--gray-500);font-weight:500;margin-bottom:12px;line-height:1.35;}
    .pnl-kpi-trend{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;padding:3px 8px;border-radius:20px;}
    .pnl-kpi-trend.good{background:#ECFDF5;color:#15803D;}
    .pnl-kpi-trend.bad{background:#FEF2F2;color:#B91C1C;}
    .pnl-kpi-trend.flat{background:var(--gray-100);color:var(--gray-500);}

    .pnl-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .pnl-section-title{font-size:16px;font-weight:700;color:var(--navy);}
    .pnl-section-link{font-size:12.5px;font-weight:600;color:var(--accent2);background:none;border:none;display:flex;align-items:center;gap:4px;}

    .pnl-row{display:grid;grid-template-columns:repeat(12,1fr);gap:24px;margin-bottom:24px;}
    .pnl-col-8{grid-column:span 8;}
    .pnl-col-4{grid-column:span 4;}
    .pnl-col-5{grid-column:span 5;}
    .pnl-col-7{grid-column:span 7;}
    .pnl-card{background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:20px;box-shadow:0 1px 2px rgba(15,23,42,.03);}

    .pnl-table{width:100%;border-collapse:collapse;font-size:13px;}
    .pnl-table th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.4px;color:var(--gray-500);font-weight:600;padding:0 10px 10px;border-bottom:1px solid var(--gray-200);}
    .pnl-table td{padding:12px 10px;border-bottom:1px solid var(--gray-100);color:var(--navy);vertical-align:middle;}
    .pnl-table tr:last-child td{border-bottom:none;}
    .pnl-status{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;}
    .pnl-status .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
    .pnl-status.ok{background:#ECFDF5;color:#15803D;}
    .pnl-status.warn{background:#FFF7ED;color:#9A5B13;}
    .pnl-status.danger{background:#FEF2F2;color:#B91C1C;}

    .pnl-quick-list{display:flex;flex-direction:column;gap:4px;}
    .pnl-quick-item{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:8px;background:none;border:none;text-align:left;width:100%;color:var(--navy);}
    .pnl-quick-item:hover{background:var(--gray-50);}
    .pnl-quick-icon{width:32px;height:32px;border-radius:8px;background:var(--gray-100);color:var(--gray-500);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .pnl-quick-text{flex:1;font-size:13px;font-weight:500;}
    .pnl-quick-arrow{color:var(--gray-400);flex-shrink:0;}

    .pnl-donut-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding-top:4px;}
    .pnl-donut-legend{display:flex;flex-direction:column;gap:9px;width:100%;}
    .pnl-legend-row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--navy);}
    .pnl-legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
    .pnl-legend-row .n{margin-left:auto;font-weight:600;}

    .pnl-bar-row{display:flex;align-items:center;gap:12px;padding:10px 0;}
    .pnl-bar-label{width:104px;font-size:12.5px;color:var(--gray-500);flex-shrink:0;}
    .pnl-bar-track{flex:1;height:8px;background:var(--gray-100);border-radius:20px;overflow:hidden;}
    .pnl-bar-fill{height:100%;border-radius:20px;}
    .pnl-bar-num{width:76px;text-align:right;font-size:12.5px;font-weight:600;color:var(--navy);flex-shrink:0;}

    .pnl-footer{display:flex;align-items:center;justify-content:space-between;padding:20px 4px 4px;margin-top:8px;border-top:1px solid var(--gray-200);font-size:12px;color:var(--gray-500);}
    .pnl-footer-links{display:flex;gap:18px;color:var(--gray-500);}

    @media (max-width:1360px){
      .pnl-kpi-row{grid-template-columns:repeat(3,1fr);}
      .pnl-col-8,.pnl-col-4,.pnl-col-5,.pnl-col-7{grid-column:span 12;}
    }

    /* Celular (360-767px): sidebar vira painel flutuante (overlay) sobre o
       conteúdo, começa fechada, e some sozinha ao navegar — ver Sidebar.jsx
       (prop collapsed + goto que fecha ao clicar) e CLAUDE.md. */
    @media (max-width:767px){

<div id="root"></div>
<script type="text/babel" data-presets="react">

const {useState, useMemo, useRef, useEffect} = React;

/* ---------------- SUPABASE (catálogo real de produtos) ----------------
   Primeiro pedaço do backend real aplicado (ver backend/schema.sql e
   CLAUDE.md "Catálogo real de produtos via Supabase"). A "publishable key"
   é segura de expor no navegador (mesmo papel da antiga "anon key") — as
   tabelas sensíveis (contagens, saldo) têm RLS; `produtos` hoje só tem
   leitura pública porque é só um catálogo de código→descrição, sem dado
   sigiloso. Login/usuários/inventários/contagens continuam 100% no
   localStorage por enquanto — essa migração é a próxima etapa, não esta. */
const SUPABASE_URL = 'https://geeqfpzamexmeketcecu.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_Wx-oyRE86XWz4bTSPWBe5A_8tXRpHJr';
const supabaseClient = window.supabase
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY)
  : null;

// Busca no catálogo real (85 mil+ produtos) por código ou descrição — usado
// quando o item não está no cache local de 300 SKUs (RAW_SB2_PRODUCTS). Sem
// saldo/endereço vivo ainda (só o catálogo foi importado até agora), então o
// produto sintético monta com saldoSistema:null — CountStep já sabe tratar
// isso como "sem saldo pra comparar" (ver hasSaldoLocal).
async function searchSupabaseCatalog(query){
  if(!supabaseClient || !query || query.trim().length < 2) return [];
  const q = query.trim();
  const { data, error } = await supabaseClient
    .from('produtos')
    .select('codigo, descricao, grupo, estoque_enderecos(saldo_no_endereco, enderecos(codigo))')
    .or(`codigo.ilike.%${q}%,descricao.ilike.%${q}%`)
    .limit(8);
  if(error || !data) return [];
  return data.map(row=>{
    const enderecoRow = (row.estoque_enderecos && row.estoque_enderecos[0] && row.estoque_enderecos[0].enderecos) || null;
    return {
      codigo: row.codigo,
      descricao: row.descricao,
      unidade: null,
      familia: describeGrupo(row.grupo),
      endereco: enderecoRow ? enderecoRow.codigo : null,
      enderecoCadastrado: !!enderecoRow,
      almoxarifado: '—',
      corredor: null,
      rua: null,
      saldoSistema: null,
      custoUnit: 0,
      valorFinanceiro: 0,
      semMovimentoRecente: false,
      ultimaSaida: null,
      foraDoCacheLocal: true,
    };
  });
}

// Grava a contagem também no Supabase (além do localStorage, que continua
// sendo a fonte de verdade do app hoje). Sem Supabase Auth ainda — usuário e
// inventário vão como texto puro, sem FK pra usuarios/inventarios (esses
// continuam só locais). "Fire and forget": se falhar (offline, RLS, etc.) não
// bloqueia nem afeta o fluxo de contagem no app — só loga no console.
async function saveContagemToSupabase(count){
  if(!supabaseClient) return;
  try{
    const { error } = await supabaseClient.from('contagens').insert({
      id: count.id,
      inventario_id: count.inventario,
      produto_codigo: count.productCode,
      descricao: count.descricao,
      endereco: count.endereco,
      endereco_contado: count.enderecoContado,
      endereco_pendente_validacao: count.enderecoPendenteValidacao,
      usuario: count.usuario,
      numero_contagem: count.numeroContagem,
      contagem_anterior_id: count.contagemAnteriorId,
      qtd_contada: count.qtdContada,
      saldo_sistema: count.saldoSistema,
      diferenca: count.diferenca,
      percentual: count.percentual,
      valor_divergente: count.valorDivergente,
      fora_do_cache_local: count.foraDoCacheLocal,
      classificacao: count.classificacao ? count.classificacao.label : null,
      status_aprovacao: count.statusAprovacao,
      motivo: count.motivo,
      tem_foto: count.foto,
      observacao: count.observacao,
      data: count.data,
      hora: count.hora,
    });
    if(error) console.warn('Falha ao salvar contagem no Supabase (mantida no localStorage):', error.message);
  }catch(err){
    console.warn('Falha ao salvar contagem no Supabase (mantida no localStorage):', err);
  }
}

// Reconstrói o objeto `count` no mesmo formato que CountStep.finalize() já usa
// localmente, a partir de uma linha da tabela `contagens` — usado ao ler
// contagens feitas em OUTROS aparelhos (ver fetchContagensFromSupabase).
// `classificacao` no banco é só o label (texto) — reconstrói um objeto
// mínimo compatível com os lugares que leem c.classificacao.label/.level/.rule.
function contagemRowToLocal(row){
  return {
    id: row.id,
    productCode: row.produto_codigo,
    descricao: row.descricao,
    endereco: row.endereco,
    enderecoContado: row.endereco_contado,
    enderecoPendenteValidacao: row.endereco_pendente_validacao,
    usuario: row.usuario,
    qtdContada: row.qtd_contada,
    saldoSistema: row.saldo_sistema,
    diferenca: row.diferenca,
    percentual: row.percentual,
    valorDivergente: row.valor_divergente,
    foraDoCacheLocal: row.fora_do_cache_local,
    classificacao: {label: row.classificacao, level: undefined, rule: ''},
    statusAprovacao: row.status_aprovacao,
    numeroContagem: row.numero_contagem,
    contagemAnteriorId: row.contagem_anterior_id,
    motivo: row.motivo,
    foto: row.tem_foto,
    observacao: row.observacao,
    data: row.data,
    hora: row.hora,
    inventario: row.inventario_id,
  };
}

// Busca contagens gravadas em QUALQUER aparelho (ver saveContagemToSupabase) —
// usada só pra completar o histórico local com o que aconteceu em outros
// aparelhos, nunca substitui o que já existe localmente. Limite de 500 linhas
// mais recentes: suficiente pro protótipo, sem paginação por ora.
async function fetchContagensFromSupabase(){
  if(!supabaseClient) return [];
  try{
    const { data, error } = await supabaseClient
      .from('contagens')
      .select('*')
      .order('criado_em', {ascending:false})
      .limit(500);
    if(error || !data) return [];
    return data.map(contagemRowToLocal);
  }catch(err){
    console.warn('Falha ao buscar contagens do Supabase:', err);
    return [];
  }
}

// Grava o inventário também no Supabase, no momento da criação — mesmo
// padrão fire-and-forget de saveContagemToSupabase. Login/usuários continuam
// locais, então `responsavel` vai como texto puro, sem FK.
async function saveInventarioToSupabase(inv){
  if(!supabaseClient) return;
  try{
    const { error } = await supabaseClient.from('inventarios').insert({
      id: inv.id,
      nome: inv.nome,
      almoxarifado: inv.almoxarifado,
      responsavel: inv.responsavel,
      data: inv.data,
      tipo: inv.tipo,
      qtd_itens: inv.qtdItens,
      status: inv.status,
      contados: inv.contados,
      itens_importados: inv.itensImportados || null,
    });
    if(error) console.warn('Falha ao salvar inventário no Supabase (mantido no localStorage):', error.message);
  }catch(err){
    console.warn('Falha ao salvar inventário no Supabase (mantido no localStorage):', err);
  }
}

// Incrementa `contados` no Supabase via função de banco (increment_contados,
// ver backend/schema.sql) em vez de ler+somar+gravar no client — evita perder
// incremento se dois aparelhos completarem uma contagem quase ao mesmo tempo.
async function incrementContadosSupabase(invId){
  if(!supabaseClient) return;
  try{
    const { error } = await supabaseClient.rpc('increment_contados', {p_id: invId});
    if(error) console.warn('Falha ao sincronizar progresso do inventário no Supabase:', error.message);
  }catch(err){
    console.warn('Falha ao sincronizar progresso do inventário no Supabase:', err);
  }
}

// Busca inventários gravados em QUALQUER aparelho — mesma lógica de
// fetchContagensFromSupabase, usada pra mesclar progresso feito em outros
// aparelhos no mesmo inventário.
async function fetchInventoriesFromSupabase(){
  if(!supabaseClient) return [];
  try{
    const { data, error } = await supabaseClient
      .from('inventarios')
      .select('*')
      .order('criado_em', {ascending:false})
      .limit(200);
    if(error || !data) return [];
    return data.map(row=>({
      id: row.id,
      nome: row.nome,
      almoxarifado: row.almoxarifado,
      responsavel: row.responsavel,
      data: row.data,
      tipo: row.tipo,
      qtdItens: row.qtd_itens,
      status: row.status,
      contados: row.contados,
      ...(row.itens_importados ? {itensImportados: row.itens_importados} : {}),
    }));
  }catch(err){
    console.warn('Falha ao buscar inventários do Supabase:', err);
    return [];
  }
}

// Padrão fixo de endereço da Selgron: 3 números, traço, 1 letra, traço,
// 1 número (ex: 035-A-1). Aplica a máscara enquanto o operador digita —
// insere os traços automaticamente e só aceita dígito/letra na posição
// certa — pra evitar erro de digitação num campo que hoje é obrigatório.
const ENDERECO_REGEX = /^\d{3}-[A-Z]-\d$/;

function formatEnderecoInput(value){
  const raw = String(value||'').toUpperCase().replace(/[^0-9A-Z]/g, '');
  let numPart = '', letterPart = '', lastPart = '';
  for(const ch of raw){
    if(numPart.length < 3){
      if(/[0-9]/.test(ch)) numPart += ch;
    } else if(!letterPart){
      if(/[A-Z]/.test(ch)) letterPart = ch;
    } else if(lastPart.length < 1){
      if(/[0-9]/.test(ch)) lastPart += ch;
    }
  }
  let out = numPart;
  if(letterPart) out += '-' + letterPart;
  if(lastPart) out += '-' + lastPart;
  return out;
}

function classifyDivergence(pct){
  const abs = Math.abs(pct);
  if(abs === 0) return {level:'ok', label:'Sem divergência', rule:'Aprovado automaticamente'};
  if(abs <= 5) return {level:'ok', label:'Dentro da tolerância', rule:'Aprovação automática'};
  if(abs <= 15) return {level:'warn', label:'Divergência moderada', rule:'Segunda contagem solicitada'};
  return {level:'danger', label:'Divergência crítica', rule:'Enviado para análise do líder'};
}

// MÓDULO 7 — regra de segunda contagem, aplicada sobre o resultado de CADA
// contagem (a 1ª ou qualquer recontagem seguinte):
//  ≤5%           → aprovado (automaticamente na 1ª, ou confirmado na recontagem)
//  5–15% na 1ª   → aguarda segunda contagem, feita por outro operador
//  >15% na 1ª, ou qualquer recontagem que ainda divirja acima de 5%
//                → vai para análise do líder de estoque
function computeStatus(numeroContagem, level){
  if(level==='ok') return numeroContagem===1 ? 'aprovado_auto' : 'aprovado_segunda';
  if(numeroContagem===1) return level==='warn' ? 'aguardando_segunda' : 'aguardando_analise_lider';
  return 'aguardando_analise_lider';
}

const STATUS_INFO = {
  aprovado_auto: {level:'ok', text:'Aprovado automaticamente'},
  aprovado_segunda: {level:'ok', text:'Aprovado — a recontagem confirmou o saldo dentro da tolerância'},
  aguardando_segunda: {level:'warn', text:'Segunda contagem solicitada — deve ser feita por outro operador'},
  aguardando_analise_lider: {level:'danger', text:'Enviado para análise do líder de estoque'},
  aprovado_lider: {level:'ok', text:'Divergência aprovada pelo líder de estoque'},
};

// Status que ainda não foram resolvidos — enquanto um item estiver num
// desses, existe um "documento de contagem em aberto" pra ele.
const OPEN_STATUSES = ['aguardando_segunda', 'aguardando_analise_lider'];

// Encontra o documento de contagem em aberto (se houver) mais recente pra um
// código de produto — usado pra bloquear lançar uma contagem NOVA (1ª
// rodada) de um item que já está em análise/aguardando recontagem em outro
// lugar do app. Só olha a PONTA de cada corrente de recontagem (o registro
// que ainda não tem uma rodada seguinte), mesma lógica já usada em
// RecountsPanel pra montar as filas de recontagem.
function getOpenCountForProduct(counts, productCode){
  const hasFollowUp = new Set();
  counts.forEach(c=>{ if(c.contagemAnteriorId) hasFollowUp.add(c.contagemAnteriorId); });
  return counts.find(c=>c.productCode===productCode && !hasFollowUp.has(c.id) && OPEN_STATUSES.includes(c.statusAprovacao)) || null;
}

/* ---------------- RELATÓRIO EXCEL (SheetJS) ---------------- */

function statusLabel(c){
  return (STATUS_INFO[c.statusAprovacao] || {}).text || c.classificacao.rule;
}

function buildSummaryRows(counts, inventories){
  const contados = counts.length;
  const divergentes = counts.filter(c=>c.diferenca!==0);
  const acuracidade = contados>0 ? (((contados-divergentes.length)/contados)*100).toFixed(1) : '100.0';
  const valorDivergente = counts.reduce((s,c)=>s+Number(c.valorDivergente||0),0);
  return [
    {Indicador:'Data do relatório', Valor: new Date().toLocaleString('pt-BR')},
    {Indicador:'Itens contados', Valor: contados},
    {Indicador:'Divergências', Valor: divergentes.length},
    {Indicador:'Acuracidade do estoque (%)', Valor: Number(acuracidade)},
    {Indicador:'Valor total divergente (R$)', Valor: Number(valorDivergente.toFixed(2))},
    {Indicador:'Inventários ativos', Valor: inventories.length},
  ];
}

function buildCountRows(counts){
  return counts.map(c=>({
    'ID Contagem': c.id,
    'Inventário': c.inventario,
    'Código': c.productCode,
    'Descrição': c.descricao,
    'Endereço': c.endereco,
    'Endereço Contado': c.enderecoContado || '',
    'Rodada': c.numeroContagem || 1,
    'Usuário': c.usuario,
    'Qtd. Contada': c.qtdContada,
    'Saldo Sistema': c.saldoSistema,
    'Diferença': c.diferenca,
    'Divergência (%)': Number((c.percentual||0).toFixed(2)),
    'Valor Divergente (R$)': Number(c.valorDivergente || 0),
    'Classificação': c.classificacao.label,
    'Status': statusLabel(c),
    'Motivo': c.motivo || '',
    'Endereço Pendente Validação': c.enderecoPendenteValidacao ? 'Sim' : 'Não',
    'Data': c.data,
    'Hora': c.hora || '',
  }));
}

// Espelha o formato da planilha que o cliente sobe pra gerar a lista de
// contagem (Produto/Descrição/End/Sistema/Fisico, ver
// buildImportTemplateWorkbook) com o resultado já preenchido — "Fisico" traz
// a quantidade contada no app, e "Endereço Contado" traz onde o item foi
// fisicamente encontrado (pode diferir do "End" cadastrado).
function buildPlanilhaPadraoRows(counts){
  return counts.map(c=>({
    'Produto': c.productCode,
    'Descrição': c.descricao,
    'End': c.endereco,
    'Sistema': c.saldoSistema==null ? '' : c.saldoSistema,
    'Fisico': c.qtdContada,
    'Endereço Contado': c.enderecoContado || c.endereco || '',
  }));
}

function buildAdjustmentRows(counts){
  return counts.filter(c=>c.diferenca!==0).map(c=>({
    'Código': c.productCode,
    'Descrição': c.descricao,
    'Endereço': c.endereco,
    'Saldo Sistema (Protheus)': c.saldoSistema,
    'Saldo Contado': c.qtdContada,
    'Ajuste Necessário': c.diferenca,
    'Valor do Ajuste (R$)': Number(c.valorDivergente || 0),
    'Motivo': c.motivo || 'Não informado',
    'Status': statusLabel(c),
    'Aprovado por': c.aprovadoPor || '',
    'Data Aprovação': c.aprovadoEm || '',
  }));
}

function generateReportWorkbook(counts, inventories){
  const XLSX = window.XLSX;
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildSummaryRows(counts, inventories)), 'Resumo');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildCountRows(counts)), 'Contagens');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildPlanilhaPadraoRows(counts)), 'Contar');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildAdjustmentRows(counts)), 'Solicitação de Ajuste');
  return wb;
}

/* ---------------- IMPORTAÇÃO DE LISTA DE CONTAGEM (Excel) ---------------- */

// Modelo alinhado com a planilha real que o cliente já usa para contagem
// (colunas "Produto", "Descrição", "End", "Sistema", "Fisico") — ver
// Cont_13.07.xlsx. "Fisico" fica em branco no modelo: a contagem física é
// feita dentro do app, não escrita à mão na planilha.
const IMPORT_TEMPLATE_COLUMNS = ['Produto', 'Descrição', 'End', 'Sistema', 'Fisico'];

// Aceita variações de acentuação/maiúsculas no cabeçalho da planilha que o
// usuário sobe (ex: "codigo", "CÓDIGO", "Codigo" caem todos em "codigo"), e
// também os dois formatos de coluna já vistos: o nome "cheio" (Código,
// Endereço) e o abreviado usado na planilha real do cliente (Produto, End).
function normalizeHeaderKey(h){
  return String(h||'').normalize('NFD').replace(/[̀-ͯ]/g,'').trim().toLowerCase();
}

const IMPORT_HEADER_MAP = {
  codigo:'codigo',
  produto:'codigo',
  descricao:'descricao',
  endereco:'endereco',
  end:'endereco',
  almoxarifado:'almoxarifado',
  sistema:'saldoSistema',
  saldosistema:'saldoSistema',
  saldo:'saldoSistema',
};

function buildImportTemplateWorkbook(){
  const XLSX = window.XLSX;
  const wb = XLSX.utils.book_new();
  const exemplo = [{
    'Produto': PRODUCTS[0] ? PRODUCTS[0].codigo : '000.35310',
    'Descrição': PRODUCTS[0] ? PRODUCTS[0].descricao : 'Exemplo de item',
    'End': '',
    'Sistema': PRODUCTS[0] ? PRODUCTS[0].saldoSistema : 0,
    'Fisico': '',
  }];
  const ws = XLSX.utils.json_to_sheet(exemplo, {header: IMPORT_TEMPLATE_COLUMNS});
  XLSX.utils.book_append_sheet(wb, ws, 'Contar');
  return wb;
}

// Lê as linhas já convertidas pelo SheetJS (sheet_to_json) e devolve a lista
// de itens válidos (código não vazio, duplicatas removidas mantendo a 1ª
// ocorrência — preserva a ordem original da planilha) mais um resumo para
// exibir antes de confirmar a criação do inventário.
//
// A coluna "Sistema" (saldo do sistema já trazido na própria planilha) é o
// que viabiliza contar itens fora do cache local de 300 SKUs do protótipo:
// sem ela, qualquer código que não estivesse nesses 300 ficaria sem saldo
// para comparar. Quando presente, prevalece sobre o saldo do cache local
// (mock estático) por ser o dado mais recente que o cliente trouxe.
function parseImportedListRows(rawRows){
  let totalLinhas = 0;
  let semCodigo = 0;
  let duplicadas = 0;
  const vistos = new Set();
  const itens = [];

  rawRows.forEach(row=>{
    totalLinhas++;
    const norm = {};
    Object.keys(row).forEach(k=>{
      const canon = IMPORT_HEADER_MAP[normalizeHeaderKey(k)];
      if(canon) norm[canon] = row[k];
    });
    const codigo = norm.codigo!=null ? String(norm.codigo).trim() : '';
    if(!codigo){ semCodigo++; return; }
    if(vistos.has(codigo)){ duplicadas++; return; }
    vistos.add(codigo);
    let saldoSistema = null;
    if(norm.saldoSistema!=null && String(norm.saldoSistema).trim()!==''){
      const n = Number(String(norm.saldoSistema).replace(',', '.'));
      if(!Number.isNaN(n)) saldoSistema = n;
    }
    itens.push({
      codigo,
      descricao: norm.descricao!=null ? String(norm.descricao).trim() : '',
      endereco: norm.endereco!=null ? String(norm.endereco).trim().toUpperCase() : '',
      almoxarifado: norm.almoxarifado!=null ? String(norm.almoxarifado).trim() : '',
      saldoSistema,
    });
  });

  const naoEncontrados = itens.filter(it => !PRODUCTS.some(p=>p.codigo===it.codigo)).length;
  const semSaldoDisponivel = itens.filter(it => !PRODUCTS.some(p=>p.codigo===it.codigo) && it.saldoSistema==null).length;

  return {
    itens,
    resumo: { totalLinhas, validas: itens.length, semCodigo, duplicadas, naoEncontrados, semSaldoDisponivel },
  };
}

const Ic = ({children}) => <span aria-hidden="true">{children}</span>;

/* ---------------- PERSISTÊNCIA (localStorage) ---------------- */
// Primeiro passo pra sair do protótipo 100% em memória: os dados que o app
// gera (usuários, inventários, contagens, endereços propostos, histórico)
// agora sobrevivem a recarregar a página / fechar o navegador NO MESMO
// aparelho. Isso NÃO sincroniza entre tablets/operadores diferentes — cada
// aparelho guarda sua própria cópia local. Pra sincronizar de verdade entre
// aparelhos precisa do backend real (ver backend/schema.sql e README.md).
// STORAGE_VERSION prefixa a chave — se o formato dos dados mudar de um jeito
// incompatível no futuro, basta subir a versão pra ignorar dados antigos em
// vez de o app quebrar tentando ler um formato que não bate mais.
const STORAGE_VERSION = 'v1';

function loadPersisted(key, fallback){
  try{
    const raw = window.localStorage.getItem('stock360:'+STORAGE_VERSION+':'+key);
    if(raw==null) return fallback;
    return JSON.parse(raw);
  } catch(err){
    return fallback;
  }
}

function usePersistedState(key, initialValue){
  const [state, setState] = useState(()=>loadPersisted(key, initialValue));
  useEffect(()=>{
    try{
      window.localStorage.setItem('stock360:'+STORAGE_VERSION+':'+key, JSON.stringify(state));
    } catch(err){
      // localStorage indisponível (modo privado, cota cheia, etc.) — ignora
      // silenciosamente, o app continua funcionando só sem persistir.
    }
  }, [key, state]);
  return [state, setState];
}

/* ---------------- APP SHELL ---------------- */

const SESSION_TIMEOUT_MS = 15 * 60 * 1000; // 15 min de inatividade → logout automático

function App(){
  // Dados que o app gera ficam salvos no localStorage (ver usePersistedState
  // acima) — sobrevivem a recarregar/fechar o navegador neste aparelho.
  // Sessão de login (currentUserId) e navegação (view/flowState) continuam só
  // em memória de propósito — cada recarregamento volta pra tela de login.
  const [users, setUsers] = usePersistedState('users', USERS_SEED);
  const [currentUserId, setCurrentUserId] = useState(null);
  const [logoutNotice, setLogoutNotice] = useState('');

  const [view, setView] = useState('home');
  const [flowState, setFlowState] = useState(null); // params passed into a flow
  const [dashboardPeriod, setDashboardPeriod] = useState('7d'); // filtro de período do Dashboard novo
  // Esconder sidebar (desktop/tablet: começa aberta e empurra o conteúdo; celular
  // <768px: começa fechada, vira painel flutuante — ver CSS ".sidebar" no <style>).
  const [sidebarCollapsed, setSidebarCollapsed] = useState(() => typeof window!=='undefined' && window.innerWidth < 768);

  // Em telas de celular a sidebar é um painel flutuante — fecha sozinha ao navegar,
  // senão ficaria coberta por cima da tela nova. Em telas largas (empurra o conteúdo)
  // não faz sentido fechar sozinha, então só age abaixo de 768px.
  function gotoAndCloseSidebar(id, data){
    goto(id, data);
    if(window.innerWidth < 768) setSidebarCollapsed(true);
  }

  const [inventories, setInventories] = usePersistedState('inventories', [
    {id:'INV-001', nome:'Inventário Cíclico Julho/2026', almoxarifado:'Almox 01', responsavel:'Carlos Mendes', data:'2026-07-14', tipo:'Contagem Aleatória', qtdItens:20, status:'em_andamento', contados: 6},
    {id:'INV-002', nome:'Inventário Curva A — Rolamentos', almoxarifado:'Almox 01', responsavel:'Fernanda Lima', data:'2026-07-15', tipo:'Contagem por Curva ABC', qtdItens:12, status:'pendente', contados: 0},
  ]);

  const [counts, setCounts] = usePersistedState('counts', []); // finalized counts
  const [enderecosPropostos, setEnderecosPropostos] = usePersistedState('enderecosPropostos', []); // endereços informados por operadores, aguardando validação do líder
  const [passwordRequests, setPasswordRequests] = usePersistedState('passwordRequests', []); // solicitações de "esqueci minha senha"
  const [passwordHistory, setPasswordHistory] = usePersistedState('passwordHistory', []); // histórico de alterações de senha
  const [reportSendHistory, setReportSendHistory] = usePersistedState('reportSendHistory', []); // histórico de envios de relatório por e-mail

  function logReportSend(entry){
    setReportSendHistory(prev=>[entry, ...prev]);
  }

  const currentUser = users.find(u=>u.id===currentUserId) || null;
  const role = currentUser ? currentUser.perfil : null;

  function goto(v, params){ setFlowState(params||null); setView(v); window.scrollTo(0,0); }

  function addAddressProposal(p){
    setEnderecosPropostos(prev=>[{...p, id:'END-'+Math.random().toString(36).slice(2,7).toUpperCase(), status:'pendente'}, ...prev]);
  }

  function resolveAddressProposal(id, status){
    setEnderecosPropostos(prev=>prev.map(e=>e.id===id?{...e, status}:e));
  }

  function approveDivergence(countId){
    setCounts(prev=>prev.map(c=>c.id===countId?{...c, statusAprovacao:'aprovado_lider', aprovadoPor:currentUser?currentUser.nome:'—', aprovadoEm:new Date().toLocaleString('pt-BR')}:c));
  }

  // Encaminha o item pra fila de "Aguardando Segunda Contagem" — não faz a
  // recontagem agora, só libera o item pra qualquer operador pegar depois
  // (mesma fila que já existe, ver RecountsPanel). Diferente do botão
  // "Recontar" (RecountFlow), que é o próprio líder/admin recontando na hora.
  function requestRecountFromOperator(countId){
    setCounts(prev=>prev.map(c=>c.id===countId?{
      ...c,
      statusAprovacao:'aguardando_segunda',
      // Marca que essa 2ª contagem existe porque o líder REJEITOU a
      // divergência (não aceitou o resultado) — diferente de um item que
      // caiu em "aguardando_segunda" sozinho pela regra automática da 1ª
      // contagem. RecountsPanel usa isso pra diferenciar o card.
      recontagemSolicitadaPeloLider:true,
      recontagemSolicitadaPor: currentUser?currentUser.nome:'—',
      recontagemSolicitadaEm: new Date().toLocaleString('pt-BR'),
    }:c));
  }

  function deleteInventory(id){
    setInventories(prev=>prev.filter(i=>i.id!==id));
  }

  function logHistory(usuarioAlvo, acao, administrador){
    setPasswordHistory(prev=>[{
      id:'HIST-'+Math.random().toString(36).slice(2,7).toUpperCase(),
      usuario: usuarioAlvo,
      acao,
      administrador: administrador || '—',
      data: new Date().toLocaleString('pt-BR'),
    }, ...prev]);
  }

  // ---- Autenticação ----
  function attemptLogin(identifier, senha){
    const id = identifier.trim().toLowerCase();
    const user = users.find(u => u.usuario.toLowerCase()===id || (u.email && u.email.toLowerCase()===id));
    if(!user) return {ok:false, error:'Usuário ou senha inválidos.'};
    if(user.status==='bloqueado') return {ok:false, error:'Usuário bloqueado. Contate o administrador.'};
    if(user.status==='deve_definir_senha') return {ok:false, needsNewPassword:true, userId:user.id};
    if(user.senha !== senha) return {ok:false, error:'Usuário ou senha inválidos.'};
    setCurrentUserId(user.id);
    setView('home');
    return {ok:true};
  }

  function logout(notice){
    setCurrentUserId(null);
    setView('home');
    setFlowState(null);
    setLogoutNotice(notice || '');
  }

  function requestPasswordReset(identifier){
    const id = identifier.trim().toLowerCase();
    const user = users.find(u => u.usuario.toLowerCase()===id || (u.email && u.email.toLowerCase()===id));
    if(user){
      setPasswordRequests(prev=>[{
        id:'REQ-'+Math.random().toString(36).slice(2,7).toUpperCase(),
        userId:user.id, usuarioNome:user.nome, data:new Date().toLocaleString('pt-BR'), status:'pendente',
      }, ...prev]);
    }
    // Mensagem genérica sempre — evita confirmar/negar se o usuário existe (boa prática de segurança)
    return 'Se o usuário existir, uma solicitação foi enviada para aprovação do administrador.';
  }

  function resolvePasswordRequest(reqId, acao, novaSenhaDigitada){
    const req = passwordRequests.find(r=>r.id===reqId);
    if(!req) return;
    applyAdminPasswordAction(req.userId, acao, novaSenhaDigitada);
    setPasswordRequests(prev=>prev.map(r=>r.id===reqId?{...r, status:'resolvido'}:r));
  }

  function applyAdminPasswordAction(userId, acao, novaSenhaDigitada){
    const target = users.find(u=>u.id===userId);
    if(!target || !currentUser) return;
    let acaoLabel = '';
    if(acao==='temp'){
      const temp = generateTempPassword();
      setUsers(prev=>prev.map(u=>u.id===userId?{...u, senha:temp, status:'ativo'}:u));
      acaoLabel = `Senha temporária gerada (${temp}) — repassar ao usuário`;
    } else if(acao==='definir'){
      setUsers(prev=>prev.map(u=>u.id===userId?{...u, senha:novaSenhaDigitada, status:'ativo'}:u));
      acaoLabel = 'Nova senha definida pelo administrador';
    } else if(acao==='liberar'){
      setUsers(prev=>prev.map(u=>u.id===userId?{...u, senha:null, status:'deve_definir_senha'}:u));
      acaoLabel = 'Usuário liberado para criar nova senha';
    }
    logHistory(target.nome, acaoLabel, currentUser.nome);
  }

  function selfSetNewPassword(userId, novaSenha){
    const target = users.find(u=>u.id===userId);
    setUsers(prev=>prev.map(u=>u.id===userId?{...u, senha:novaSenha, status:'ativo'}:u));
    if(target) logHistory(target.nome, 'Senha definida pelo próprio usuário', '—');
    setCurrentUserId(userId);
    setView('home');
  }

  function createUser(data){
    setUsers(prev=>[{...data, id:'u'+Math.random().toString(36).slice(2,7), status:'ativo'}, ...prev]);
  }

  function updateUser(userId, data){
    setUsers(prev=>prev.map(u=>u.id===userId?{...u, ...data}:u));
  }

  function toggleUserStatus(userId){
    const target = users.find(u=>u.id===userId);
    if(!target) return;
    const novoStatus = target.status==='bloqueado' ? 'ativo' : 'bloqueado';
    setUsers(prev=>prev.map(u=>u.id===userId?{...u, status:novoStatus}:u));
    logHistory(target.nome, novoStatus==='bloqueado' ? 'Usuário bloqueado' : 'Usuário desbloqueado', currentUser?currentUser.nome:'—');
  }

  function deleteUser(userId){
    const target = users.find(u=>u.id===userId);
    if(!target || userId===currentUserId) return;
    setUsers(prev=>prev.filter(u=>u.id!==userId));
    logHistory(target.nome, 'Usuário excluído', currentUser?currentUser.nome:'—');
  }

  // ---- Logout automático por inatividade ----
  useEffect(()=>{
    if(!currentUser) return;
    let timer = setTimeout(()=>logout('Sessão encerrada por inatividade.'), SESSION_TIMEOUT_MS);
    function resetTimer(){
      clearTimeout(timer);
      timer = setTimeout(()=>logout('Sessão encerrada por inatividade.'), SESSION_TIMEOUT_MS);
    }
    const events = ['click','keydown','touchstart','mousemove'];
    events.forEach(ev=>window.addEventListener(ev, resetTimer));
    return ()=>{ clearTimeout(timer); events.forEach(ev=>window.removeEventListener(ev, resetTimer)); };
  }, [currentUser]);

  // ---- Sincronização de inventários/contagens com o Supabase ----
  // localStorage continua sendo a fonte imediata (funciona offline, mostra na
  // hora o que o próprio aparelho fez); isso só busca o que outros aparelhos
  // gravaram desde o último poll (a cada 30s) e mescla. Nunca some com dado
  // local: contagens só são ADICIONADAS (por id, o que já existe fica como
  // está); inventários só são sobrescritos quando o `contados` remoto está
  // igual ou mais avançado que o local (evita "voltar" o progresso se o poll
  // chegar antes do próprio incremento local processar).
  useEffect(()=>{
    if(!currentUser || !supabaseClient) return;
    let cancelled = false;
    async function sync(){
      const [remoteInv, remoteCounts] = await Promise.all([
        fetchInventoriesFromSupabase(),
        fetchContagensFromSupabase(),
      ]);
      if(cancelled) return;
      if(remoteInv.length){
        setInventories(prev=>{
          const byId = new Map(prev.map(i=>[i.id, i]));
          remoteInv.forEach(ri=>{
            const local = byId.get(ri.id);
            if(!local || ri.contados >= local.contados) byId.set(ri.id, {...local, ...ri});
          });
          return Array.from(byId.values());
        });
      }
      if(remoteCounts.length){
        setCounts(prev=>{
          const knownIds = new Set(prev.map(c=>c.id));
          const novas = remoteCounts.filter(c=>!knownIds.has(c.id));
          return novas.length ? [...novas, ...prev] : prev;
        });
      }
    }
    sync();
    const interval = setInterval(sync, 30000);
    return ()=>{ cancelled = true; clearInterval(interval); };
  }, [currentUser]);

  if(!currentUser){
    return (
      <LoginScreen
        onLogin={attemptLogin}
        onForgot={requestPasswordReset}
        onSelfSetPassword={selfSetNewPassword}
        notice={logoutNotice}
        clearNotice={()=>setLogoutNotice('')}
      />
    );
  }

  return (
    <div className="app">
      <Sidebar view={view} goto={gotoAndCloseSidebar} role={role} user={currentUser} collapsed={sidebarCollapsed} />
      <div className={"sidebar-backdrop"+(sidebarCollapsed?'':' visible')} onClick={()=>setSidebarCollapsed(true)}></div>
      <button
        className={"sidebar-toggle"+(sidebarCollapsed?' collapsed':'')}
        onClick={()=>setSidebarCollapsed(c=>!c)}
        title={sidebarCollapsed?'Mostrar menu':'Esconder menu'}
      >
        <DIcon name={sidebarCollapsed?'chevronRight':'chevronLeft'} size={14} />
      </button>
      <div className="app-main">
      <TopBar user={currentUser} role={role} onHome={()=>goto('home')} onLogout={()=>logout('')} />
      <DesktopTopbar
        view={view}
        user={currentUser}
        role={role}
        onLogout={()=>logout('')}
        subtitle={VIEW_SUBTITLES[view]}
        rightExtra={view==='home' ? (
          <select className="pnl-period-select" value={dashboardPeriod} onChange={e=>setDashboardPeriod(e.target.value)}>
            <option value="7d">Últimos 7 dias</option>
            <option value="30d">Últimos 30 dias</option>
            <option value="all">Todo o período</option>
          </select>
        ) : null}
      />
      {view!=='home' && <SubBar view={view} goto={goto} />}
      <div className="content">
        {view==='home' && <Home role={role} user={currentUser} inventories={inventories} counts={counts} enderecosPropostos={enderecosPropostos} goto={goto} period={dashboardPeriod} />}
        {view==='inventories' && <InventoryList inventories={inventories} goto={goto} role={role} counts={counts} onDelete={deleteInventory} />}
        {view==='newInventory' && (role==='lider'||role==='admin') && <NewInventory users={users} onCreate={(inv)=>{setInventories(prev=>[inv,...prev]); saveInventarioToSupabase(inv); goto('inventories');}} />}
        {view==='pickCountType' && <PickCountType inv={flowState} goto={goto} />}
        {view==='randomCount' && <RandomCountFlow inv={flowState} user={currentUser} counts={counts} onFinish={(c)=>{setCounts(p=>[c,...p]); goto('inventories');}} onAddressProposed={addAddressProposal} setInventories={setInventories} />}
        {view==='manualCount' && <ManualCountFlow user={currentUser} counts={counts} onFinish={(c)=>{setCounts(p=>[c,...p]); goto('home');}} onAddressProposed={addAddressProposal} />}
        {view==='routeCount' && <RouteCountFlow inv={flowState} user={currentUser} counts={counts} onFinish={(c)=>{setCounts(p=>[c,...p]); goto('inventories');}} onAddressProposed={addAddressProposal} setInventories={setInventories} />}
        {view==='importedListCount' && <ImportedListCountFlow inv={flowState} user={currentUser} counts={counts} onFinish={(c)=>{setCounts(p=>[c,...p]); goto('inventories');}} onAddressProposed={addAddressProposal} setInventories={setInventories} />}
        {view==='myCounts' && <MyCounts counts={counts} user={currentUser} role={role} goto={goto} />}
        {view==='recounts' && <RecountsPanel counts={counts} role={role} currentUser={currentUser} goto={goto} onApprove={approveDivergence} onRequestRecount={requestRecountFromOperator} />}
        {view==='recount' && flowState && <RecountFlow original={flowState} user={currentUser} onAddressProposed={addAddressProposal} onFinish={(c)=>{setCounts(p=>[c,...p]); goto('recounts');}} />}
        {view==='dashboard' && <Dashboard counts={counts} inventories={inventories} />}
        {view==='relatorios' && <ReportsScreen counts={counts} inventories={inventories} currentUser={currentUser} sendHistory={reportSendHistory} onLogSend={logReportSend} />}
        {view==='settings' && (
          <Settings
            role={role}
            users={users}
            currentUser={currentUser}
            goto={goto}
            onToggleUserStatus={toggleUserStatus}
            onDeleteUser={deleteUser}
            onAdminPasswordAction={applyAdminPasswordAction}
            passwordRequests={passwordRequests}
            onResolvePasswordRequest={resolvePasswordRequest}
            passwordHistory={passwordHistory}
          />
        )}
        {view==='enderecos' && (role==='lider'||role==='admin') && (
          <AddressValidationPanel enderecosPropostos={enderecosPropostos} onResolve={resolveAddressProposal} />
        )}
        {view==='userForm' && role==='admin' && flowState && (
          <UserForm
            mode={flowState.mode}
            initialData={flowState.initialData}
            users={users}
            onCreateUser={(data)=>{ createUser(data); goto('settings'); }}
            onUpdateUser={(id,data)=>{ updateUser(id,data); goto('settings'); }}
            onCancel={()=>goto('settings')}
          />
        )}
      </div>
      <BottomNav view={view} goto={goto} role={role} />
      </div>
    </div>
  );
}

   importar o pacote lucide/lucide-react (mais uma dependência CDN + integração

   sidebar/header desktop e no Dashboard novo — o resto do app continua com
   emoji (componente `Ic`), não foi trocado (fora do escopo pedido). */
const DICON_PATHS = {
