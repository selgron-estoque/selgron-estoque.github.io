                    <button className="btn btn-primary" disabled={busyId===c.id || !saValor.trim()} onClick={()=>handleEnviarParaDiretoria(c.id)}>{busyId===c.id ? 'Enviando…' : 'Enviar para aprovação da Diretoria'}</button>
                  </div>
                </div>
              ) : canApprove ? (
                <div className="btn-row count-card-actions-row">
                  <button className="btn btn-secondary" disabled={busyId===c.id} onClick={()=>handleRequestRecount(c.id)}>{busyId===c.id ? 'Enviando…' : 'Solicitar nova contagem'}</button>
                  <button className="btn btn-secondary" disabled={busyId===c.id} onClick={()=>goto('recount', c)}><Ic>🔁</Ic> Recontar</button>
                  <button className="btn btn-secondary" disabled={busyId===c.id} onClick={()=>handleApprove(c.id)}>{busyId===c.id ? 'Enviando…' : 'Sem Ajuste Necessário'}</button>
                  <button className="btn btn-primary" disabled={busyId===c.id} onClick={()=>{setSaAbertoId(c.id); setSaValor('');}}><Ic>📋</Ic> Gerar SA de Ajuste</button>
                </div>
              ) : (
                <div style={{fontSize:12,color:'var(--ink-dim)'}}>Aguardando decisão do líder de estoque.</div>
              )}
            </div>
          </div>
        );
      })}
      <PaginationControls pagina={pagina} setPagina={setPagina} totalPaginas={totalPaginas} tamanhoPagina={tamanhoPagina} setTamanhoPagina={setTamanhoPagina} totalItens={listaFiltrada.length} itemLabel="itens" />
    </div>
  );
}

// "Aprovação de Ajustes" — tela nova, pedido do cliente: o fluxo real de
// ajuste de estoque da Selgron não termina no líder aprovar a divergência.
// Quando o líder decide que HÁ ajuste necessário (botão "Gerar SA de Ajuste"
// em DivergentItemsPanel), o item cai aqui até a Diretoria decidir — hoje
// isso é manual, feito pelo próprio admin dentro do app (não existe perfil
// "Diretoria" nem integração externa). Mesmo shell visual das outras 3 telas
// de contagem (count-card/SearchWithScanner/TrendFilterBar/result-grid-4col).
function DiretoriaApprovalPanel({counts, inventories, role, onApproveSA, onRejectSA}){
  const canDecide = role==='admin';
  const aguardandoDiretoria = counts.filter(c=>c.statusAprovacao==='aguardando_aprovacao_diretoria');

  // Mesmo critério das demais telas de contagem — `useState` puro (não
  // persiste) e padrão "Todos os períodos" (não esconde SA aguardando
  // aprovação só porque foi gerada há mais de 30 dias).
  const [trendFilter, setTrendFilter] = useState({tipo:'todos', from:'', to:''});
  const hojeStr = hojeLocalStr();
  const { from: dataInicioStr, to: dataFimStr } = computeTrendRange(trendFilter.tipo, hojeStr, trendFilter.from, trendFilter.to);
  const aguardandoDiretoriaNoPeriodo = aguardandoDiretoria.filter(c=>c.data && c.data>=dataInicioStr && c.data<=dataFimStr);

  const [busca, setBusca] = useState('');
  const buscaNorm = busca.trim().toLowerCase();
  const porBusca = buscaNorm
    ? aguardandoDiretoriaNoPeriodo.filter(c => c.productCode.toLowerCase().includes(buscaNorm) || (c.descricao||'').toLowerCase().includes(buscaNorm))
    : aguardandoDiretoriaNoPeriodo;

  const [severidade, setSeveridade] = useState('todos');
  const listaFiltrada = severidade==='todos' ? porBusca : porBusca.filter(c=>classifySeverity4(severidadeDe(c)).level===severidade);
  const {pagina, setPagina, tamanhoPagina, setTamanhoPagina, listaPaginada, totalPaginas} = usePaginacaoLista(listaFiltrada, 50);

  const [busyId, setBusyId] = useState(null);
  const [erros, setErros] = useState({});
  const [confirmRejectId, setConfirmRejectId] = useState(null);

  async function handleApprove(countId){
    setBusyId(countId);
    setErros(prev=>({...prev, [countId]: null}));
    const res = await onApproveSA(countId);
    setBusyId(null);
    if(!res || !res.ok) setErros(prev=>({...prev, [countId]: (res && res.erro) || 'Não foi possível aprovar — tente novamente.'}));
  }

  async function handleConfirmReject(countId){
    setBusyId(countId);
    setErros(prev=>({...prev, [countId]: null}));
    const res = await onRejectSA(countId);
    setBusyId(null);
    if(res && res.ok){
      setConfirmRejectId(null);
    } else {
      setErros(prev=>({...prev, [countId]: (res && res.erro) || 'Não foi possível reprovar — tente novamente.'}));
    }
  }

  return (
    <div>
      <TrendFilterBar
        trendFilter={trendFilter}
        setTrendFilter={setTrendFilter}
        dataInicioStr={dataInicioStr}
        dataFimStr={dataFimStr}
        hojeStr={hojeStr}
        subtitle="Selecione o período para filtrar as SAs aguardando aprovação"
      />

      <SearchWithScanner value={busca} onChange={setBusca} placeholder="Código ou descrição do material" />

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:10}}>
        <span style={{fontSize:12.5,color:'var(--ink-dim)'}}>
          <strong style={{color:'var(--ink)'}}>{aguardandoDiretoria.length}</strong> pendentes
          {aguardandoDiretoriaNoPeriodo.length!==aguardandoDiretoria.length && <> · <strong style={{color:'var(--ink)'}}>{aguardandoDiretoriaNoPeriodo.length}</strong> no período selecionado</>}
        </span>
      </div>

      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <SeverityFilterRow counts={porBusca} value={severidade} onChange={setSeveridade} />
      </div>

      {listaFiltrada.length===0 ? (
        <div className="empty-state" style={{padding:20}}>
          {aguardandoDiretoria.length===0
            ? 'Nenhuma SA de ajuste aguardando aprovação no momento.'
            : (aguardandoDiretoriaNoPeriodo.length===0 ? 'Nenhuma SA aguardando aprovação nesse período.' : 'Nenhum item encontrado para esse filtro.')}
        </div>
      ) : listaPaginada.map(c=>{
        const sev = classifySeverity4(severidadeDe(c));
        return (
          <div key={c.id} className="count-card">
            <div className="count-card-bar" style={{background:sev.color}}></div>
            <div className="count-card-body">
              <div className="count-card-head">
                <div className="count-card-badges">
                  <span className="severity-chip" style={{background:'#F1E9FB',color:'#7B3FC4'}}><Ic>📋</Ic> SA {c.solicitacaoAjuste}</span>
                  <span className="category-chip">{categoriaDoInventario(c, inventories)}</span>
                </div>
                <span className="count-card-date">{c.data}</span>
              </div>
              <div className="count-card-toprow">
                <div className="count-card-title">
                  <div className="item-code">{c.productCode}</div>
                  <div className="item-desc">{c.descricao}</div>
                </div>
                <div className="count-card-address-badge"><DIcon name="mapPin" size={16} /> {c.endereco || 'não cadastrado'}</div>
              </div>
              <div className="result-grid result-grid-4col" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
                <div className="rg"><div className="k">Sistema</div><div className="v">{c.saldoSistema==null ? '—' : c.saldoSistema}</div></div>
                <div className="rg"><div className="k">Físico</div><div className="v">{c.qtdContada}</div></div>
                <div className="rg"><div className="k">Diferença</div><div className="v" style={{color:sev.color}}>{c.diferenca==null ? '—' : (c.diferenca>0?'+':'')+c.diferenca}</div></div>
                <div className="rg"><div className="k">%</div><div className="v" style={{color:sev.color}}>{c.percentual==null ? '—' : Math.round(c.percentual)+'%'}</div></div>
              </div>
              <div style={{padding:'10px 16px 0',fontSize:12.5,color:'var(--ink-dim)'}}>SA gerada por {c.saGeradaPor||'—'} em {c.saGeradaEm||'—'}</div>
              {c.motivo && <div style={{padding:'6px 16px 0',fontSize:12.5}}>Motivo: <strong>{c.motivo}</strong></div>}
              {c.valorDivergente!=null && Number(c.valorDivergente)!==0 && <div style={{padding:'6px 16px 0',fontSize:12.5}}>Valor divergente: <strong>R$ {Number(c.valorDivergente).toFixed(2)}</strong></div>}
              {erros[c.id] && (
                <div className="divergence-alert" style={{margin:'10px 16px 0'}}><Ic>⚠</Ic><span>{erros[c.id]}</span></div>
              )}
              {confirmRejectId===c.id ? (
                <div className="count-card-actions">
                  <div className="divergence-alert" style={{marginBottom:10}}>
                    <Ic>⚠</Ic><span>Reprovar a SA {c.solicitacaoAjuste}? O item volta pra fila de recontagem, marcado como reprovado pela Diretoria.</span>
                  </div>
                  <div className="btn-row">
                    <button className="btn btn-secondary" disabled={busyId===c.id} onClick={()=>setConfirmRejectId(null)}>Cancelar</button>
                    <button className="btn btn-danger" disabled={busyId===c.id} onClick={()=>handleConfirmReject(c.id)}>{busyId===c.id ? 'Enviando…' : 'Confirmar reprovação'}</button>
                  </div>
                </div>
              ) : canDecide ? (
                <div className="btn-row count-card-actions-row">
                  <button className="btn btn-danger" disabled={busyId===c.id} onClick={()=>setConfirmRejectId(c.id)}>Reprovar</button>
                  <button className="btn btn-primary" disabled={busyId===c.id} onClick={()=>handleApprove(c.id)}>{busyId===c.id ? 'Enviando…' : 'Aprovar'}</button>
                </div>
              ) : (
                <div style={{padding:'10px 16px 16px',fontSize:12,color:'var(--ink-dim)'}}>Aguardando decisão da Diretoria.</div>
              )}
            </div>
          </div>
        );
      })}
      <PaginationControls pagina={pagina} setPagina={setPagina} totalPaginas={totalPaginas} tamanhoPagina={tamanhoPagina} setTamanhoPagina={setTamanhoPagina} totalItens={listaFiltrada.length} itemLabel="itens" />
    </div>
  );
}

// "Todas as Divergências" — tela nova e separada, só alcançável pelo link
// "Ver todas as divergências" do Dashboard ("Top 5 Maiores Divergências").
// Pedido do cliente: esse link abria "Itens Divergentes" (acima), mas essa
// tela é escopada de propósito só pra `aguardando_analise_lider` (o KPI da
// Home/atalho da Sidebar sempre significou isso, não pode mudar). O link do
// Dashboard precisa mostrar QUALQUER item com divergência real, não importa o
// status (pendente, já aprovado pelo líder, etc.), com uma única exceção: os
// que estão na fila de recontagem (`aguardando_segunda`) já têm tela própria
// (`RecountsPanel`) e sairiam duplicados aqui. Combina contagens ao vivo +
// histórico importado (mesmo pool já usado em "Top 5 Maiores Divergências"),
// então nenhum item "some" entre as duas telas por vir de uma fonte diferente.
function AllDivergencesPanel({counts, historicoConcluidas, goto}){
  const [busca, setBusca] = useState('');
  const historicoComoContagem = useMemo(()=>historicoConcluidas.map(historicoRowToCountLike).filter(Boolean), [historicoConcluidas]);
  const divergentes = useMemo(()=>{
    const pool = [...counts, ...historicoComoContagem];
    // Dedupe por id antes de filtrar — se a mesma contagem/linha de
    // histórico acabar aparecendo mais de uma vez no pool (ex.: uma busca
    // paginada que se sobrepôs), mantém só uma ocorrência em vez de mostrar
    // o mesmo item repetido na lista.
    const vistos = new Map();
    pool.forEach(c=>{ if(c && c.id!=null && !vistos.has(c.id)) vistos.set(c.id, c); });
    return Array.from(vistos.values())
      .filter(c=>c.diferenca!=null && c.diferenca!==0 && c.statusAprovacao!=='aguardando_segunda')
      .sort((a,b)=>Math.abs(b.diferenca||0)-Math.abs(a.diferenca||0));
  }, [counts, historicoComoContagem]);

  const termo = busca.trim().toLowerCase();
  const filtrados = termo
    ? divergentes.filter(c=>(c.productCode||'').toLowerCase().includes(termo) || (c.descricao||'').toLowerCase().includes(termo))
    : divergentes;

  return (
    <div>
      <div className="field">
        <label>Buscar item</label>
        <input type="text" value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Código ou descrição do material" />
      </div>

      <div className="section-title" style={{marginTop:0}}>
        Lista completa
        {filtrados.length>0 && <span className="badge" style={{position:'static',marginLeft:8}}>{filtrados.length}</span>}
      </div>
      <div className="panel">
        {filtrados.length===0 ? (
          <div className="empty-state" style={{padding:20}}>{termo ? 'Nenhum item encontrado para essa busca.' : 'Nenhuma divergência registrada no momento.'}</div>
        ) : (
          <table className="rank-table">
            <thead><tr><th>Produto</th><th>Almox.</th><th className="num">Esperado</th><th className="num">Encontrado</th><th className="num">Diferença</th><th className="num">Valor (R$)</th></tr></thead>
            <tbody>
              {filtrados.map(c=>{
                const almoxLabel = c.almoxarifado ? ('Almox ' + (/^[0-9]+$/.test(c.almoxarifado) ? c.almoxarifado.padStart(2,'0') : c.almoxarifado)) : '—';
                const valorComSinal = valorDivergenteComSinal(c);
                return (
                  <tr key={c.id}>
                    <td>{reconstructNumericCode(c.productCode)} · {c.descricao}</td>
                    <td>{almoxLabel}</td>
                    <td className="num">{c.saldoSistema==null ? '—' : c.saldoSistema}</td>
                    <td className="num">{c.qtdContada}</td>
                    <td className="num" style={{color:'var(--danger)'}}>{c.diferenca>0?'+':''}{c.diferenca}</td>
                    <td className="num" style={{color:valorComSinal===0?'var(--ok)':'var(--danger)'}}>{valorComSinal>0?'+':''}{valorComSinal.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

/* ---------------- CONTAGENS CONCLUÍDAS (painel de auditoria) ---------------- */

// "Contagens Concluídas" deixou de ser um atalho pra MyCounts e virou um
// painel de auditoria de verdade — agrupa `counts` em CADEIAS (a sequência
// de rodadas do mesmo item, ligadas por contagemAnteriorId/numeroContagem),
// uma linha por ciclo completo (não uma linha por rodada individual). Uma
// cadeia é "concluída" quando a rodada mais recente (a ponta, sem nenhuma
// outra contagem apontando pra ela via contagemAnteriorId) sai dos status
// abertos (OPEN_STATUSES) — chegou a um veredito final: aprovada
// automaticamente na 1ª contagem, aprovada pelo líder, ou confirmada na
// recontagem. 100% derivado de campos que a contagem já grava — nenhum dado
// novo precisou ser inventado nem persistido.
// Ordena cadeias por data+hora (mais recente primeiro) — cadeia SEM data
// (item do histórico importado cuja planilha original não trouxe "Data",
// ver CLAUDE.md "Data sempre explícita") vai sempre pro FIM da lista, nunca
// pro topo. Bug real corrigido aqui: o sort antigo comparava strings
// (`b.tip.data+... .localeCompare(a.tip.data+...)`) e, quando `tip.data` é
// `null`, a concatenação vira a STRING literal `"null"` — que por
// comparação lexicográfica (`'n' > qualquer dígito`) sempre "vence" contra
// uma data real tipo `"2026-07-14"`, fazendo os itens sem data flutuarem
// pro TOPO da lista (parecendo "mais recentes que tudo") em vez de para o
// fim, que é o que faz sentido numa lista "mais recente primeiro".
function compararCadeiasPorData(a, b){
  const da = a.tip.data, db = b.tip.data;
  if(!da && !db) return 0;
  if(!da) return 1;
  if(!db) return -1;
  return (db+(b.tip.hora||'')).localeCompare(da+(a.tip.hora||''));
}

function buildConcludedChains(counts){
  const hasFollowUp = new Set();
  counts.forEach(c=>{ if(c.contagemAnteriorId) hasFollowUp.add(c.contagemAnteriorId); });
  const byId = new Map(counts.map(c=>[c.id, c]));
  const pontas = counts.filter(c => !hasFollowUp.has(c.id) && !OPEN_STATUSES.includes(c.statusAprovacao));
  return pontas.map(tip=>{
    const rodadas = [];
    let atual = tip;
    while(atual){
      rodadas.unshift(atual);
      atual = atual.contagemAnteriorId ? byId.get(atual.contagemAnteriorId) : null;
    }
    // "Houve ajuste de estoque" — agora tem sinal EXPLÍCITO pros dois status
    // que passam pela Diretoria (ver `enviarParaAprovacaoDiretoria`/
    // `aprovarAjusteDiretoria` em App()): `ajuste_aprovado_diretoria` sempre
    // teve ajuste de verdade, `aprovado_lider` (daqui pra frente só usado pro
    // caminho "Sem Ajuste Necessário") nunca tem. Pros status mais antigos
    // (aprovado_auto/aprovado_segunda, sempre com diferença zero por
    // definição) cai no mesmo heurístico de antes, que já dava o resultado
    // certo pra esses casos.
    const houveAjuste = tip.statusAprovacao==='ajuste_aprovado_diretoria' ? true
      : tip.statusAprovacao==='aprovado_lider' ? false
      : (tip.diferenca!=null && tip.diferenca!==0);
    return { chaveId: tip.id, tip, rodadas, houveAjuste };
  }).sort(compararCadeiasPorData);
}

// Converte uma linha de `contagens_historico` (já filtrada pros status
// concluídos — ver fetchContagensHistoricoConcluidas) num objeto "contagem"
// no MESMO formato usado pro resto do app, pra poder ser reaproveitado em
// qualquer lugar que já sabe ler `counts` (ConcludedCountsPanel, Dashboard,
// futuros usos) sem duplicar lógica de mapeamento. Carrega TODOS os campos
// que existem na planilha original — inclusive os que a contagem ao vivo do
// app não tem (classe/SA/documento/dias sem movimento) — porque o cliente
// pediu explicitamente que essa tela sirva de painel de auditoria: "um dia
// bata uma auditoria, preciso de toda informação necessária ali".
// "Ajustar" saiu daqui — não é um veredito CONCLUÍDO (o próprio nome já diz
// que ainda precisa de ajuste), então não faz mais parte do histórico
// "resolvido" mostrado em Contagens Concluídas. Ver `buildAjustarSeedsFromHistorico`
// — esses itens agora entram na fila viva de "Itens Divergentes", mesmo
// tratamento já dado a "Recontar" antes.
const HISTORICO_STATUS_DISPLAY = {
  'OK': {level:'ok', text:'Aprovado (histórico importado)'},
  'Sem Ajuste': {level:'ok', text:'Aprovado — sem ajuste necessário (histórico importado)'},
  'Ajustado': {level:'ok', text:'Ajuste já aplicado no Protheus (histórico importado)'},
};
function historicoRowToCountLike(h){
  const statusNorm = String(h.status||'').trim();
  const display = HISTORICO_STATUS_DISPLAY[statusNorm];
  if(!display || !h.produto_codigo) return null;
  const percentual = (h.saldo_sistema!=null && h.saldo_sistema!==0 && h.diferenca!=null)
    ? (h.diferenca / h.saldo_sistema) * 100
    : null;
  return {
    id: 'HIST-CONCL-' + String(h.produto_codigo).replace(/[^A-Za-z0-9]/g,'') + '-' + (h.data||'sem-data') + '-' + (h.endereco||'sem-endereco'),
    // reconstructNumericCode aqui (não só no parser do upload) corrige a
    // exibição mesmo pra linhas JÁ importadas antes da correção do parser —
    // sem isso, precisaria o cliente reimportar a planilha inteira de novo.
    productCode: reconstructNumericCode(h.produto_codigo),
    descricao: h.descricao || '',
    // "-" é só um valor sentinela gravado no banco (ver parseHistoricoContagensRows)
    // pra trava de duplicado (unique produto_codigo+data+endereco) funcionar de
    // verdade em linha sem endereço — na exibição, trata igual a "sem endereço"
    // de sempre (cai no "não cadastrado"/"—" que as telas já mostram).
    endereco: (h.endereco && h.endereco!=='-') ? h.endereco : null,
    enderecoContado: (h.endereco && h.endereco!=='-') ? h.endereco : null,
    usuario: 'Importação Histórica',
    numeroContagem: 1,
    contagemAnteriorId: null,
    qtdContada: h.qtd_contada,
    saldoSistema: h.saldo_sistema,
    diferenca: h.diferenca,
    percentual,
    valorDivergente: h.valor_divergente!=null ? Math.abs(h.valor_divergente) : 0,
    classificacao: {label: display.text, level: display.level, rule: ''},
    statusAprovacao: null, // sem equivalente 1:1 no vocabulário do app — usa _statusDisplay
    motivo: h.causa,
    observacao: h.observacao || null,
    data: h.data,
    hora: null,
    // Campos extras que só a planilha antiga tem — não existem numa
    // contagem feita ao vivo no app, mas são reais e o cliente pediu que
    // apareçam pra fins de auditoria.
    classe: h.classe || null,
    solicitacaoAjuste: h.solicitacao_ajuste || null,
    documento: h.documento || null,
    diasSemMovimento: h.dias_sem_movimento!=null ? h.dias_sem_movimento : null,
    semana: h.semana!=null ? h.semana : null,
    _statusDisplay: display,
    _fromHistorico: true,
    _statusOriginal: statusNorm,
    // Guarda a linha CRUA (produto_codigo/data/endereco tal como está em
    // `contagens_historico`, sem a reconstrução de código feita acima) — é
    // isso que `reprovarAjusteHistoricoNaLinha` precisa pra bater exatamente
    // na chave única (produto_codigo, data, endereco) da tabela na hora de
    // atualizar o status; `productCode` (acima) já vem corrigido pra
    // exibição e pode não bater com o valor cru gravado no banco.
    _historicoRaw: h,
  };
}

// Cada linha do histórico vira uma cadeia de 1 rodada só — a planilha
// antiga não guarda a sequência de rodadas (1ª contagem → recontagem → …)
// que o app registra hoje.
function historicoRowToConcludedChain(h){
  const tip = historicoRowToCountLike(h);
  if(!tip) return null;
  // Diferente das cadeias ao vivo do app (onde `houveAjuste` precisa ser
  // inferido da diferença, por falta de um campo explícito — ver
  // buildConcludedChains), a planilha antiga JÁ diz isso diretamente pelo
  // próprio status: "Ajustado"/"Ajustar" = precisou de ajuste; "OK"/"Sem
  // Ajuste" = não precisou, MESMO que tenha sobrado uma diferença pequena
  // dentro da tolerância (é exatamente o que "Sem Ajuste" quer dizer) — não
  // usar o fallback de diferença!=0 aqui, ele contradiria o status da
  // própria planilha.
  const houveAjuste = tip._statusOriginal==='Ajustado' || tip._statusOriginal==='Ajustar';
  return { chaveId: tip.id, tip, rodadas: [tip], houveAjuste };
}

function ConcludedCountsPanel({counts, inventories, historicoConcluidas=[], onDeleteCount, onReprovarAjusteHistorico, onRefresh}){
  const [busca, setBusca] = useState('');
  const [confirmDeleteId, setConfirmDeleteId] = useState(null); // id da RODADA (r.id), não da cadeia
  const [excluindo, setExcluindo] = useState(false);
  const [erroExclusao, setErroExclusao] = useState('');
  const [atualizando, setAtualizando] = useState(false);
  // "Reprovar ajuste" — reverte um item importado como "Ajustado" direto no
  // site, sem editar a planilha (ver reprovarAjusteHistoricoNaLinha em App()).
  // Estado por CADEIA (cd.chaveId), mesmo padrão de confirmação inline já
  // usado pra excluir uma rodada.
  const [confirmReprovarId, setConfirmReprovarId] = useState(null);
  const [reprovando, setReprovando] = useState(false);
  const [erroReprovar, setErroReprovar] = useState('');
  // Mesmo padrão de toggle "Detalhes"/"Ocultar" já usado em RecontagensPanel
  // (pedido do cliente: padronizar) — troca a navegação pra uma tela própria
  // por uma expansão inline dentro do próprio card, sem sair da lista.
  const [detalhesAbertosIds, setDetalhesAbertosIds] = useState(()=>new Set());
  function toggleDetalhes(id){
    setDetalhesAbertosIds(prev=>{
      const next = new Set(prev);
      if(next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }

  // Mesmo painel "Filtros" (presets de calendário) já usado em Indicadores —
  // `useState` puro, não `usePersistedState` (pedido do cliente: o filtro
  // volta ao padrão sempre que a tela recarregar, em vez de continuar
  // lembrando o período escolhido da última vez). Padrão mudou de "Últimos
  // 30 dias" pra "Todos os períodos" — mesmo motivo já documentado em
  // RecountsPanel: o histórico completo já está em memória (sem paginação
  // por data), então filtrar por padrão só escondia dado sem necessidade.
  const [trendFilter, setTrendFilter] = useState({tipo:'todos', from:'', to:''});
  const hojeStr = hojeLocalStr();
  const { from: dataInicioStr, to: dataFimStr } = computeTrendRange(trendFilter.tipo, hojeStr, trendFilter.from, trendFilter.to);

  async function handleRefresh(){
    if(!onRefresh) return;
    setAtualizando(true);
    try{ await onRefresh(); } finally { setAtualizando(false); }
  }

  async function handleConfirmDelete(id){
    setExcluindo(true);
    setErroExclusao('');
    const res = await onDeleteCount(id);
    setExcluindo(false);
    if(res && res.ok){
      setConfirmDeleteId(null);
    } else {
      setErroExclusao((res && res.erro) || 'Não foi possível excluir — tente novamente.');
    }
  }

  async function handleConfirmReprovar(chaveId, historicoRaw){
    setReprovando(true);
    setErroReprovar('');
    const res = await onReprovarAjusteHistorico(historicoRaw);
    setReprovando(false);
    if(res && res.ok){
      setConfirmReprovarId(null);
      // Tira o item de "Contagens Concluídas" na hora — sem isso, ficaria
      // duplicado (aqui como "Ajustado" e em "Itens Divergentes" como
      // pendente) até o próximo refresh manual/reload.
      if(onRefresh) onRefresh();
    } else {
      setErroReprovar((res && res.erro) || 'Não foi possível reprovar — tente novamente.');
    }
  }

  const cadeias = useMemo(()=>{
    const doApp = buildConcludedChains(counts);
    const doHistorico = historicoConcluidas.map(historicoRowToConcludedChain).filter(Boolean);
    return [...doApp, ...doHistorico].sort(compararCadeiasPorData);
  }, [counts, historicoConcluidas]);

  // Filtro de período: pedido explícito do cliente — item SEM data não deve
  // aparecer em NENHUM filtro de período (nem "Hoje", nem "Todo o período"
  // via preset, nenhum). Decisão anterior (mostrar sempre, pra não "esconder
  // dado" da planilha antiga) foi revertida — o cliente prefere que a
  // ausência de data exclua o item da lista filtrada por período, ponto.
  const cadeiasNoPeriodo = useMemo(()=>
    cadeias.filter(cd => cd.tip.data && cd.tip.data>=dataInicioStr && cd.tip.data<=dataFimStr),
  [cadeias, dataInicioStr, dataFimStr]);

  // Busca também por nº de SA — pedido explícito do cliente ("possibilitando
  // pesquisas por uma SA específica"), pra achar rápido em qual documento um
  // ajuste específico foi feito.
  const buscaNorm = busca.trim().toLowerCase();
  const cadeiasPorBusca = buscaNorm
    ? cadeiasNoPeriodo.filter(cd => cd.tip.productCode.toLowerCase().includes(buscaNorm) || (cd.tip.descricao||'').toLowerCase().includes(buscaNorm) || (cd.tip.solicitacaoAjuste||'').toLowerCase().includes(buscaNorm))
    : cadeiasNoPeriodo;

  const [severidade, setSeveridade] = useState('todos');
  const cadeiasFiltradas = severidade==='todos' ? cadeiasPorBusca : cadeiasPorBusca.filter(cd=>classifySeverity4(severidadeDe(cd.tip)).level===severidade);
  const {pagina, setPagina, tamanhoPagina, setTamanhoPagina, listaPaginada: cadeiasPaginadas, totalPaginas} = usePaginacaoLista(cadeiasFiltradas, 50);

  return (
    <div>
      <TrendFilterBar
        trendFilter={trendFilter}
        setTrendFilter={setTrendFilter}
        dataInicioStr={dataInicioStr}
        dataFimStr={dataFimStr}
        hojeStr={hojeStr}
        onRefresh={onRefresh ? handleRefresh : undefined}
        refreshing={atualizando}
        subtitle="Selecione o período para filtrar as contagens concluídas"
      />

      <SearchWithScanner value={busca} onChange={setBusca} placeholder="Código, descrição ou nº da SA" />

      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <SeverityFilterRow counts={cadeiasPorBusca.map(cd=>cd.tip)} value={severidade} onChange={setSeveridade} />
      </div>

      <div className="section-title" style={{marginTop:0}}>
        Histórico
        {cadeiasNoPeriodo.length>0 && <span className="badge" style={{position:'static',marginLeft:8}}>{cadeiasNoPeriodo.length}</span>}
      </div>
      {cadeiasFiltradas.length===0 ? (
        <div className="empty-state" style={{padding:20}}>
          {cadeiasNoPeriodo.length===0 ? 'Nenhuma contagem concluída nesse período.' : 'Nenhum item encontrado para esse filtro.'}
        </div>
      ) : cadeiasPaginadas.map(cd=>{
        const tip = cd.tip;
        const sev = classifySeverity4(severidadeDe(tip));
        const aberto = detalhesAbertosIds.has(cd.chaveId);
        // "Ajustado"/"Sem Ajuste"/"OK" podem vir de dois lugares: uma decisão AO
        // VIVO no app (statusAprovacao) ou uma linha JÁ resolvida importada da
        // planilha antiga (tip._fromHistorico + tip._statusOriginal, que guarda
        // o vocabulário cru da planilha — "OK"/"Sem Ajuste"/"Ajustado"). Os dois
        // casos precisam mostrar o mesmo badge, senão um item do histórico
        // aparece sem nenhuma indicação de status (statusAprovacao é sempre
        // `null` pra linha de histórico).
        const ehAjustado = tip.statusAprovacao==='ajuste_aprovado_diretoria' || (tip._fromHistorico && tip._statusOriginal==='Ajustado');
        const ehSemAjuste = (tip.statusAprovacao==='aprovado_lider' && tip.diferenca!=null && tip.diferenca!==0) || (tip._fromHistorico && tip._statusOriginal==='Sem Ajuste');
        const ehSaldoOk = tip._fromHistorico && tip._statusOriginal==='OK';
        return (
          <div key={cd.chaveId} className={"count-card"+(ehSemAjuste ? ' sem-ajuste-destaque' : '')}>
            <div className="count-card-bar" style={{background:sev.color}}></div>
            <div className="count-card-body">
              <div className="count-card-head">
                <div className="count-card-badges">
                  <span className="severity-chip" style={{background:sev.bg,color:sev.color}}><Ic>{sev.icon}</Ic> {sev.label}</span>
                  <span className="category-chip">{categoriaDoInventario(tip, inventories)}</span>
                  {tip._fromHistorico && <span className="category-chip">histórico importado</span>}
                  {/* Fluxo de SA de Ajuste/Diretoria (ver App()) — "Ajustado" é um
                      resultado positivo e concreto (Diretoria aprovou, ajuste
                      efetivado ou já constava assim na planilha antiga), badge
                      verde com o nº da SA quando disponível (pedido explícito do
                      cliente — "permitindo identificar em qual SA o ajuste foi
                      realizado"); "Sem Ajuste" é uma decisão sem nenhuma ação
                      sobre o estoque, badge neutro/leve + borda amarela discreta
                      no card inteiro (pedido explícito — "sem chamar muita
                      atenção"); "SALDO OK" (só histórico importado — a contagem
                      ao vivo já não ganha badge nenhum quando bate exato, decisão
                      anterior mantida) deixa explícito que o item foi contado e
                      não teve divergência nenhuma, não só "sem ajuste". */}
                  {ehAjustado && (
                    <span className="category-chip" style={{background:'var(--ok-bg)',color:'var(--ok)'}}>Ajustado{tip.solicitacaoAjuste ? (' · SA '+tip.solicitacaoAjuste) : ''}</span>
                  )}
                  {ehSemAjuste && (
                    <span className="category-chip" style={{background:'var(--panel-raised)',color:'var(--ink-dim)'}}>Sem Ajuste</span>
                  )}
                  {ehSaldoOk && (
                    <span className="category-chip" style={{background:'var(--ok-bg)',color:'var(--ok)'}}>SALDO OK</span>
                  )}
                </div>
                <span className="count-card-date">{tip.data ? tip.data+(tip.hora?' '+tip.hora:'') : 'Sem data registrada'}</span>
              </div>
              <div className="count-card-toprow">
                <div className="count-card-title">
                  <div className="item-code">{tip.productCode}</div>
                  <div className="item-desc">{tip.descricao}</div>
                </div>
                <div className="count-card-address-badge"><DIcon name="mapPin" size={16} /> {tip.endereco || tip.enderecoContado || 'não cadastrado'}</div>
              </div>
              <div className="count-card-main" style={{alignItems:'center'}}>
                <div className="count-card-content">
                  <div className="result-grid result-grid-4col" style={{marginTop:0,gridTemplateColumns:'repeat(4,1fr)'}}>
                    <div className="rg"><div className="k">Sistema</div><div className="v">{tip.saldoSistema==null ? '—' : tip.saldoSistema}</div></div>
                    <div className="rg"><div className="k">Qtd. Final</div><div className="v">{tip.qtdContada}</div></div>
                    <div className="rg"><div className="k">Contagens</div><div className="v">{tip.numeroContagem}</div></div>
                    <div className="rg"><div className="k">Ajuste</div><div className="v" style={{fontSize:12.5}}>{cd.houveAjuste ? 'Necessário' : (tip.diferenca==null?'Sem saldo local':'Não necessário')}</div></div>
                  </div>
                  {aberto && (
                    <div className="count-card-extra">
                      <div>Quantidade final validada: <strong>{tip.qtdContada}</strong></div>
                      <div>{cd.rodadas.length-1} recontagem(ns) até a decisão final</div>
                      {cd.houveAjuste && <div>Valor do ajuste: <strong>R$ {Number(tip.valorDivergente||0).toFixed(2)}</strong></div>}
                    </div>
                  )}
                </div>
                <div className="count-card-actions-col" style={{width:'auto'}}>
                  <button className="btn btn-outline" onClick={()=>toggleDetalhes(cd.chaveId)}><Ic>📋</Ic> {aberto ? 'Ocultar' : 'Detalhes'}</button>
                  {onReprovarAjusteHistorico && tip._fromHistorico && tip._statusOriginal==='Ajustado' && (
                    <button className="btn btn-danger" onClick={()=>{ setConfirmReprovarId(cd.chaveId); setErroReprovar(''); }}><Ic>⛔</Ic> Reprovar ajuste</button>
                  )}
                </div>
              </div>
              {confirmReprovarId===cd.chaveId && (
                <div style={{padding:'0 16px 16px'}}>
                  <div className="divergence-alert" style={{marginBottom:10}}>
                    <Ic>⚠</Ic><span>Reprovar o ajuste de {tip.productCode}? O item sai de "Contagens Concluídas" e volta pra "Itens Divergentes" pra uma nova decisão — sem alterar a planilha original, só o registro no site.</span>
                  </div>
                  <div className="btn-row">
                    <button className="btn btn-secondary" disabled={reprovando} onClick={()=>setConfirmReprovarId(null)}>Cancelar</button>
                    <button className="btn btn-danger" disabled={reprovando} onClick={()=>handleConfirmReprovar(cd.chaveId, tip._historicoRaw)}>{reprovando ? 'Reprovando…' : 'Confirmar reprovação'}</button>
                  </div>
                  {erroReprovar && <div style={{fontSize:11.5,color:'var(--danger)',marginTop:8}}>{erroReprovar}</div>}
                </div>
              )}
              {aberto && (
                // Painel de auditoria: mostra TODA informação disponível de
                // cada rodada, não só um resumo — pedido explícito do
                // cliente ("um dia bata uma auditoria, preciso de toda
                // informação necessária ali"). Mesmo componente visual já
                // usado pra comparar 1ª/2ª contagem em "Itens Divergentes"
                // (`.rounds-stack`/`.round-panel`), estendido pra N rodadas —
                // a última (que decidiu o status final da cadeia) vem
                // destacada como "current", as anteriores como "previous".
                // Data sempre explícita, com aviso claro quando a planilha
                // antiga não trouxe data pra essa linha (não é bug, é
                // limitação real do dado de origem).
                <div className="rounds-stack" style={{padding:'0 16px 16px'}}>
                  {cd.rodadas.map((r,idx)=>{
                    const isUltima = idx===cd.rodadas.length-1;
                    return (
                      <div key={r.id} className={"round-panel "+(isUltima?'current':'previous')}>
                        <div className="round-eyebrow">
                          <span className="label">{idx+1}ª Contagem{r._fromHistorico ? ' · histórico importado' : ''}</span>
                          {isUltima && <span className="badge">Final</span>}
                          <span className="round-who">{r.usuario||'—'} · {r.data ? r.data+(r.hora?' '+r.hora:'') : 'sem data registrada'}</span>
                        </div>
                        <div className="result-grid" style={{marginTop:0,gridTemplateColumns:'repeat(4,1fr)'}}>
                          <div className="rg"><div className="k">Sistema</div><div className="v">{r.saldoSistema==null ? '—' : r.saldoSistema}</div></div>
                          <div className="rg"><div className="k">Físico</div><div className="v">{r.qtdContada}</div></div>
                          <div className="rg"><div className="k">Diferença</div><div className="v">{r.diferenca==null ? '—' : (r.diferenca>0?'+':'')+r.diferenca}</div></div>
                          <div className="rg"><div className="k">%</div><div className="v">{r.percentual==null ? '—' : Math.round(r.percentual)+'%'}</div></div>
                        </div>
                        {(r.endereco || r.enderecoContado) && <div style={{fontSize:12.5}}>Endereço: <strong>{r.endereco || r.enderecoContado}</strong></div>}
                        {r.valorDivergente!=null && r.valorDivergente!==0 && <div style={{fontSize:12.5}}>Valor divergente: <strong>R$ {Number(r.valorDivergente).toFixed(2)}</strong></div>}
                        {r.motivo && <div style={{fontSize:12.5}}>Motivo: <strong>{r.motivo}</strong></div>}
                        {r.observacao && <div style={{fontSize:12.5}}>Observação: {r.observacao}</div>}
                        {r.aprovadoPor && <div style={{fontSize:12,color:'var(--ink-dim)'}}>Aprovado por {r.aprovadoPor} em {r.aprovadoEm}</div>}
                        {!r._fromHistorico && r.solicitacaoAjuste && (
                          <div style={{fontSize:11.5,color:'var(--ink-dim)',fontFamily:'var(--font-mono)'}}>
                            SA: {r.solicitacaoAjuste} · gerada por {r.saGeradaPor||'—'} em {r.saGeradaEm||'—'}
                          </div>
                        )}
                        {r._fromHistorico && (r.classe || r.solicitacaoAjuste || r.documento || r.diasSemMovimento!=null) && (
                          <div style={{fontSize:11.5,color:'var(--ink-dim)',fontFamily:'var(--font-mono)'}}>
                            {r.classe && <>Classe ABC: {r.classe} · </>}
                            {r.solicitacaoAjuste && <>SA: {r.solicitacaoAjuste} · </>}
                            {r.documento && <>Doc: {r.documento} · </>}
                            {r.diasSemMovimento!=null && <>Dias s/ movimento: {r.diasSemMovimento}</>}
                          </div>
                        )}
                        {onDeleteCount && !r._fromHistorico && (
                          confirmDeleteId===r.id ? (
                            <div>
                              <div className="divergence-alert" style={{marginBottom:10}}>
                                <Ic>⚠</Ic><span>Excluir esta {idx+1}ª contagem? Essa ação não pode ser desfeita e não deixa rastro.</span>
                              </div>
                              {erroExclusao && <div className="divergence-alert" style={{marginBottom:10}}><Ic>⚠</Ic><span>{erroExclusao}</span></div>}
                              <div className="btn-row">
                                <button className="btn btn-secondary" disabled={excluindo} onClick={()=>{setConfirmDeleteId(null); setErroExclusao('');}}>Cancelar</button>
                                <button className="btn btn-danger" disabled={excluindo} onClick={()=>handleConfirmDelete(r.id)}>{excluindo ? 'Excluindo…' : 'Confirmar exclusão'}</button>
                              </div>
                            </div>
                          ) : (
                            <button className="btn btn-danger" style={{alignSelf:'flex-start'}} onClick={()=>setConfirmDeleteId(r.id)}><Ic>🗑</Ic> Excluir esta contagem</button>
                          )
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        );
      })}
      <PaginationControls pagina={pagina} setPagina={setPagina} totalPaginas={totalPaginas} tamanhoPagina={tamanhoPagina} setTamanhoPagina={setTamanhoPagina} totalItens={cadeiasFiltradas.length} itemLabel="itens" />
    </div>
  );
}

/* ---------------- RELATÓRIOS (Excel + e-mail) ---------------- */

function ReportsScreen({counts, inventories, currentUser, sendHistory, onLogSend, role, onHistoricoImportado}){
  const isAdmin = role==='admin';
  const [email, setEmail] = useState('');
  const [assunto, setAssunto] = useState('Gestão de Estoques — Relatório de Inventário Cíclico');
  const [mensagem, setMensagem] = useState('Segue relatório de contagens e divergências do inventário cíclico para análise e solicitação de ajuste de estoque.');
  const [feedback, setFeedback] = useState('');
  // Filtro opcional por dia (formato YYYY-MM-DD, igual ao que já sai de
  // <input type="date"> e ao campo `data` de cada contagem) — vazio significa
  // "todas as contagens", sem filtro nenhum (comportamento de antes).
  const [filtroData, setFiltroData] = useState('');

  const countsFiltrados = filtroData ? counts.filter(c=>c.data===filtroData) : counts;
  const divergentesCount = countsFiltrados.filter(c=>c.diferenca!==0).length;

  function downloadWorkbook(){
    if(!window.XLSX){
      setFeedback('A biblioteca de exportação não carregou (verifique a conexão com a internet).');
      return false;
    }
    const wb = generateReportWorkbook(countsFiltrados, inventories);
    const sufixo = filtroData || hojeLocalStr();
    const filename = `GestaoEstoques_Relatorio_${sufixo}.xlsx`;
    window.XLSX.writeFile(wb, filename);
    return filename;
  }

  function handleDownloadClick(){
    const filename = downloadWorkbook();
    if(filename) setFeedback('Relatório baixado: ' + filename);
  }

  function handleSendEmail(e){
    e.preventDefault();
    if(!email.trim()){ setFeedback('Informe o e-mail do destinatário.'); return; }
    const filename = downloadWorkbook();
    if(!filename) return;
    const body = encodeURIComponent(mensagem + '\n\n(O arquivo ' + filename + ' foi baixado agora — anexe-o a este e-mail antes de enviar.)');
    const subject = encodeURIComponent(assunto);
    window.location.href = `mailto:${email.trim()}?subject=${subject}&body=${body}`;
    onLogSend({
      id:'ENV-'+Math.random().toString(36).slice(2,7).toUpperCase(),
      destinatario:email.trim(), assunto, arquivo:filename,
      enviadoPor:currentUser.nome, data:new Date().toLocaleString('pt-BR'),
    });
    setFeedback('E-mail preparado no seu programa de e-mail padrão — anexe o arquivo baixado antes de enviar.');
  }

  return (
    <div>
      <div className="role-note">
        {filtroData
          ? <>{countsFiltrados.length} contagens em {filtroData} · {divergentesCount} com divergência</>
          : <>{counts.length} contagens registradas · {divergentesCount} com divergência</>}
      </div>
      {feedback && <div className="login-success" style={{marginBottom:16}}>{feedback}</div>}

      <div className="panel">
        <div className="section-title" style={{marginTop:0}}>Baixar Relatório</div>
        <div style={{fontSize:13,color:'var(--ink-dim)',marginBottom:14,lineHeight:1.6}}>
          Gera uma planilha Excel (.xlsx) com 4 abas: <strong>Resumo</strong> (indicadores gerais),
          <strong> Contagens</strong> (todas as contagens realizadas, com histórico completo de
          rodadas e o endereço onde cada item foi fisicamente contado), <strong>Contar</strong>{' '}
          (mesmo formato da planilha de importação — Produto, Descrição, End, Sistema, Fisico —
          já com a quantidade contada e o endereço contado preenchidos) e
          <strong> Solicitação de Ajuste</strong> (só os itens com divergência — pronta para
          enviar à equipe responsável por corrigir o saldo no Protheus).
        </div>
        <div className="field" style={{maxWidth:220}}>
          <label>Filtrar por dia (opcional)</label>
          <input type="date" value={filtroData} onChange={e=>setFiltroData(e.target.value)} />
        </div>
        {filtroData && (
          <div style={{fontSize:12,color:'var(--ink-dim)',marginBottom:14}}>
            Relatório vai sair só com as {countsFiltrados.length} contagens de {filtroData}.{' '}
            <a href="#" onClick={e=>{e.preventDefault(); setFiltroData('');}}>Limpar filtro</a>
          </div>
        )}
        <button className="btn btn-primary" onClick={handleDownloadClick} disabled={countsFiltrados.length===0}>
          <Ic>⬇</Ic> Baixar Excel (.xlsx)
        </button>
        {countsFiltrados.length===0 && (
          <div style={{fontSize:12,color:'var(--ink-dim)',marginTop:8}}>
            {filtroData ? 'Nenhuma contagem registrada nesse dia.' : 'Nenhuma contagem registrada ainda.'}
          </div>
        )}
      </div>

      <div className="panel">
        <div className="section-title" style={{marginTop:0}}>Enviar por E-mail</div>
        <div className="divergence-alert" style={{marginBottom:14}}>
          <Ic>ℹ</Ic>
          <span>Por limitação de segurança dos navegadores, não é possível anexar o arquivo
          automaticamente a um e-mail. Ao enviar, o Excel é baixado e o seu programa de
          e-mail abre com o texto pronto — só falta anexar o arquivo baixado antes de mandar.</span>
        </div>
        <form onSubmit={handleSendEmail}>
          <div className="field">
            <label>Destinatário</label>
            <input type="text" value={email} onChange={e=>setEmail(e.target.value)} placeholder="controladoria@empresa.com" autoCapitalize="none" autoCorrect="off" spellCheck="false" />
          </div>
          <div className="field">
            <label>Assunto</label>
            <input type="text" value={assunto} onChange={e=>setAssunto(e.target.value)} />
          </div>
          <div className="field">
            <label>Mensagem</label>
            <textarea value={mensagem} onChange={e=>setMensagem(e.target.value)} />
          </div>
          <button className="btn btn-primary" type="submit" disabled={countsFiltrados.length===0}>
            <Ic>✉</Ic> Baixar e Preparar E-mail
          </button>
        </form>
      </div>

      {sendHistory.length>0 && (
        <div className="panel">
          <div className="section-title" style={{marginTop:0}}>Histórico de Envios</div>
          <table className="rank-table">
            <thead><tr><th>Destinatário</th><th>Assunto</th><th>Enviado por</th><th>Data</th></tr></thead>
            <tbody>
              {sendHistory.map(h=>(
                <tr key={h.id}><td>{h.destinatario}</td><td>{h.assunto}</td><td>{h.enviadoPor}</td><td style={{fontFamily:'var(--font-mono)',fontSize:11.5}}>{h.data}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {isAdmin && <StockSyncPanel />}
      {isAdmin && <CatalogoDescricaoSyncPanel />}
      {isAdmin && <HistoricoImportPanel onImported={onHistoricoImportado} />}

      <div className="panel">
        <div className="section-title" style={{marginTop:0}}>Regras de Divergência</div>
        <div style={{fontSize:13,lineHeight:1.9,color:'var(--ink-dim)'}}>
          <div>R$ 0 (contagem exata) → <span style={{color:'var(--ok)'}}>Aprovação automática</span></div>
          <div>Até R$ 49,99 → <span style={{color:'var(--danger)'}}>Análise do líder de estoque</span></div>
          <div>A partir de R$ 50 → <span style={{color:'var(--warn)'}}>Segunda contagem obrigatória</span></div>
          <div style={{marginTop:8,fontSize:12}}>Na recontagem, se a diferença bater exata com a da 1ª contagem, vai
          direto pro líder com o aviso "Diferença confirmada, seguir com ajuste".</div>
          <div style={{marginTop:8,fontSize:12}}>Se o líder confirmar que HÁ ajuste necessário, ele gera uma SA de
          Ajuste e encaminha pra aprovação da Diretoria ("Aprovação de Ajustes") — só depois de
          aprovada o item conta como resolvido. Se a Diretoria reprovar, volta pra recontagem.
          "Sem Ajuste Necessário" não passa por essa etapa.</div>
        </div>
      </div>
      <div className="panel">
        <div className="section-title" style={{marginTop:0}}>Origem dos Dados</div>
        <div style={{fontSize:13,color:'var(--ink-dim)',lineHeight:1.7}}>
          Catálogo completo (85 mil+ produtos) importado da tabela SB2 do Protheus, direto no
          Supabase — sem cache local no app. Saldo em estoque atualizado por upload manual da
          planilha SB2 acima ("Atualizar Saldo em Estoque"). Nenhum endereço físico cadastrado
          ainda; cadastro de endereços em construção via contagem (ver "Endereços Pendentes" na
          tela inicial).
        </div>
      </div>
      <div className="panel">
        <div className="section-title" style={{marginTop:0}}>Integrações Futuras</div>
        <div style={{fontSize:13,color:'var(--ink-dim)'}}>ERP TOTVS · Power BI · Preparado, ainda não conectado.</div>
      </div>
    </div>
  );
}

/* ---------------- GRÁFICOS SEMANAIS (linha + colunas), usados no Dashboard ---------------- */

// Agrupa por semana ISO (segunda a domingo), a partir do campo `data` de
// cada contagem — mesmo tipo de agregação já usada no resto do Dashboard
// (calculado em cima de `counts`, nada fabricado). `key` é a segunda-feira
// da semana (YYYY-MM-DD, ordenável direto).
function getWeekInfo(dataStr){
  const d = new Date(dataStr + 'T00:00:00');
  const dow = (d.getDay() + 6) % 7; // 0=segunda ... 6=domingo
  const monday = new Date(d);
  monday.setDate(d.getDate() - dow);
  const key = monday.toISOString().slice(0, 10);
  // Número da semana ISO: baseado na quinta-feira da mesma semana (regra
  // ISO 8601 padrão — evita semana 0/53 ambígua na virada do ano).
  const thursday = new Date(monday);
  thursday.setDate(monday.getDate() + 3);
  const yearStart = new Date(Date.UTC(thursday.getFullYear(), 0, 1));
  const weekNumber = Math.ceil((((thursday - yearStart) / 86400000) + 1) / 7);
  return {
    key,
    weekNumber,
    label: 'Sem ' + weekNumber,
    sublabel: monday.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}),
  };
}

// Acuracidade de UM item — usa o "Acc" que a própria planilha já traz
// quando o item vem do histórico (0 a 1, fórmula original do cliente:
// max(0, 1-|diferença|/sistema) — ver "Padrão de planilha do cliente" no
// CLAUDE.md), senão calcula com a MESMA fórmula em cima de diferenca/
// saldoSistema (contagem ao vivo do app). Retorna `null` quando não dá pra
// calcular (sem saldo pra comparar) — esses itens ficam de fora da MÉDIA,
// não entram como 0% nem como 100%.
function itemAcuracidade(c){
  if(c.acuracidade!=null) return c.acuracidade;
  if(c.saldoSistema==null || c.saldoSistema===0 || c.diferenca==null) return null;
  return Math.max(0, 1 - Math.abs(c.diferenca)/c.saldoSistema);
}

// Agrupa por MÊS civil (YYYY-MM) — mesma ideia de `getWeekInfo`, granularidade
// maior. Usado pelo gráfico "Acuracidade Mensal".
const NOMES_MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function getMonthInfo(dataStr){
  const d = new Date(dataStr + 'T00:00:00');
  const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  return {
    key,
    label: NOMES_MESES[d.getMonth()],
    sublabel: String(d.getFullYear()),
  };
}

// Traduz o filtro de período do painel "Filtros" (Dashboard/Indicadores) num
// par de datas concreto. Pedido do cliente: abandonar o conceito de "10/26
// semanas" (pouco intuitivo, amarrado à granularidade do gráfico) por
// presets no vocabulário do dia a dia — mesmo catálogo usado por
// ferramentas tipo Power BI/Stripe Dashboard ("Hoje", "Este mês", "Últimos
// 30 dias"...). Os presets fixos são sempre recalculados a partir de "hoje"
// (não guardam data absoluta) — reabrir o dashboard amanhã com "Últimos 30
// dias" ainda selecionado desliza a janela sozinho, sem precisar o usuário
// reconfirmar nada. Só "custom" usa `from`/`to` (persistidos) como fonte de
// verdade, já que aí a intenção do usuário É uma data absoluta específica.
function computeTrendRange(tipo, hojeStr, from, to){
  const hoje = new Date(hojeStr + 'T00:00:00');
  const fmt = d => d.toISOString().slice(0,10);
  switch(tipo){
    // "Todos os períodos" — sem restrição de data nenhuma. Em vez de mudar a
    // lógica de filtro em cada tela (que já compara `data>=dataInicioStr &&
    // data<=dataFimStr`), usa uma data-sentinela bem anterior a qualquer
    // registro real do app (nenhuma contagem, ao vivo ou do histórico
    // importado, é de antes disso) — efeito idêntico a "sem filtro", menor
    // impacto na estrutura já existente.
    case 'todos':
      return { from: '1970-01-01', to: hojeStr };
    case 'hoje':
      return { from: hojeStr, to: hojeStr };
    case 'semana': {
      const diasDesdeSegunda = (hoje.getDay()+6) % 7; // 0=segunda-feira
      const segunda = new Date(hoje); segunda.setDate(hoje.getDate() - diasDesdeSegunda);
      return { from: fmt(segunda), to: hojeStr };
    }
    case 'mes': {
      const inicioMes = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
      return { from: fmt(inicioMes), to: hojeStr };
    }
    case '60d': {
      const d = new Date(hoje); d.setDate(d.getDate() - 59);
      return { from: fmt(d), to: hojeStr };
    }
    case '90d': {
      const d = new Date(hoje); d.setDate(d.getDate() - 89);
      return { from: fmt(d), to: hojeStr };
    }
    case 'ano':
      return { from: hoje.getFullYear() + '-01-01', to: hojeStr };
    case 'custom':
      return { from: from || hojeStr, to: to || hojeStr };
    case '30d':
    default: {
      const d = new Date(hoje); d.setDate(d.getDate() - 29);
      return { from: fmt(d), to: hojeStr };
    }
  }
}

function fmtDataBR(dataStr){
  if(!dataStr) return '—';
  const [ano,mes,dia] = dataStr.split('-');
  return dia+'/'+mes+'/'+ano;
}

// Data de HOJE no formato YYYY-MM-DD, sempre pelo horário LOCAL do aparelho
// — bug real corrigido aqui: `new Date().toISOString().slice(0,10)` converte
// pra UTC antes de cortar a data, e o Brasil é UTC-3. Qualquer contagem feita
// entre ~21h e meia-noite (horário local) cai no dia SEGUINTE em UTC — uma
// contagem às 22h30 do dia 17 gravava `data:'2026-07-18'` (errado) junto com
// `hora:'22:30'` (certo, já que esse campo já usava horário local) — cliente
// reportou o mesmo sintoma no filtro "Hoje" de Contagens Concluídas, que
// também usava esse padrão. `hojeLocalStr`/`localDateStr` usam
// getFullYear/getMonth/getDate (sempre horário local do navegador, nunca
// UTC) — substitui todo `new Date().toISOString().slice(0,10)` que tentava
// representar "agora"/"hoje" (não os que só reformatam uma data JÁ fixada,
// como o `fmt` de computeTrendRange, que não sofre desse problema).
function localDateStr(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function hojeLocalStr(){
  return localDateStr(new Date());
}

// Janela por INTERVALO DE DATAS explícito (`dataInicioStr`/`dataFimStr`,
// YYYY-MM-DD) — troca a antiga janela fixa "últimas N semanas terminando
// hoje" por algo que o cliente pode apontar pra qualquer período (inclusive
// um pedido pontual tipo "me manda março inteiro"). Sempre gera TODAS as
// semanas entre as duas datas (zero-preenchidas), não só as que tiveram
// contagem — mesmo raciocínio de antes, só que a origem do intervalo agora
// é escolhida por fora (ver `Dashboard`) em vez de fixa em "hoje".
// `guard` evita um intervalo absurdo (datas invertidas, anos de diferença)
// gerar um loop gigante — corta em 300 semanas (~5 anos e meio).
// "Acuracidade Semanal" é a MÉDIA da acuracidade individual de cada item
// contado naquela semana (`itemAcuracidade`, contínua 0-100%) — não o %
// binário de "quantos bateram exato" que o resto do app usa (KPI
// "Acuracidade do Estoque"/Home). Cliente pediu especificamente essa
// definição pro gráfico semanal ("média de acuracidade das contagens da
// semana"); os dois convivem no mesmo app porque respondem perguntas
// diferentes — um é "taxa de acerto perfeito", o outro é "o quão perto, em
// média, a gente chega". Semana sem NENHUM item com acuracidade calculável
// vira `acuracidade:null` (não `0`) — 0% seria enganoso, pareceria "semana
// péssima" em vez de "sem dado nenhum"; quem desenha o gráfico decide como
// representar esse buraco (ver TrendLineChart).
function computeWeeklyStats(counts, dataInicioStr, dataFimStr){
  const buckets = {};
  const ordem = [];
  let cursor = new Date(getWeekInfo(dataInicioStr).key + 'T00:00:00');
  const fimMonday = new Date(getWeekInfo(dataFimStr).key + 'T00:00:00');
  let guard = 0;
  while(cursor <= fimMonday && guard < 300){
    const info = getWeekInfo(cursor.toISOString().slice(0,10));
    if(!buckets[info.key]){
      buckets[info.key] = {key:info.key, label:info.label, sublabel:info.sublabel, total:0, somaAcuracidade:0, comAcuracidade:0};
      ordem.push(info.key);
    }
    cursor.setDate(cursor.getDate()+7);
    guard++;
  }
  counts.forEach(c=>{
    if(!c.data) return;
    const {key} = getWeekInfo(c.data);
    if(!buckets[key]) return; // fora do intervalo escolhido
    buckets[key].total += 1;
    const acc = itemAcuracidade(c);
    if(acc!=null){
      buckets[key].somaAcuracidade += acc;
      buckets[key].comAcuracidade += 1;
    }
  });
  return ordem.map(key=>{
    const w = buckets[key];
    return {
      key:w.key, label:w.label, sublabel:w.sublabel, total:w.total,
      acuracidade: w.comAcuracidade>0 ? (w.somaAcuracidade/w.comAcuracidade)*100 : null,
    };
  });
}

// Mesma ideia de `computeWeeklyStats`, granularidade mensal — alimenta
// "Acuracidade Mensal". `guard` corta em 120 meses (10 anos).
function computeMonthlyStats(counts, dataInicioStr, dataFimStr){
  const buckets = {};
  const ordem = [];
  let cursor = new Date(dataInicioStr + 'T00:00:00');
  cursor.setDate(1);
  const fim = new Date(dataFimStr + 'T00:00:00');
  fim.setDate(1);
  let guard = 0;
  while(cursor <= fim && guard < 120){
    const info = getMonthInfo(cursor.toISOString().slice(0,10));
    if(!buckets[info.key]){
      buckets[info.key] = {key:info.key, label:info.label, sublabel:info.sublabel, total:0, somaAcuracidade:0, comAcuracidade:0};
      ordem.push(info.key);
    }
    cursor.setMonth(cursor.getMonth()+1);
    guard++;
  }
  counts.forEach(c=>{
    if(!c.data) return;
    const {key} = getMonthInfo(c.data);
    if(!buckets[key]) return;
    buckets[key].total += 1;
    const acc = itemAcuracidade(c);
    if(acc!=null){
      buckets[key].somaAcuracidade += acc;
      buckets[key].comAcuracidade += 1;
    }
  });
  return ordem.map(key=>{
    const w = buckets[key];
    return {
      key:w.key, label:w.label, sublabel:w.sublabel, total:w.total,
      acuracidade: w.comAcuracidade>0 ? (w.somaAcuracidade/w.comAcuracidade)*100 : null,
    };
  });
}

// Gera ticks "redondos" (passo de 1/2/5 × potência de 10) pro eixo Y —
// evita um eixo tipo "0, 13, 25, 38, 50" e mostra "0, 15, 30, 45, 60" (ou
// similar) em vez disso. O último tick vira o teto do eixo.
function niceAxisTicks(maxVal, targetTicks){
  if(maxVal<=0) return [0, 10];
  const rawStep = maxVal / targetTicks;
  const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const residual = rawStep / magnitude;
  const niceResidual = residual<=1 ? 1 : residual<=2 ? 2 : residual<=5 ? 5 : 10;
  const step = niceResidual * magnitude;
  const ticks = [0];
  while(ticks[ticks.length-1] < maxVal - 1e-9) ticks.push(ticks[ticks.length-1] + step);
  return ticks;
}

const WEEKLY_CHART_COLOR = '#0D9488'; // mesmo teal já usado em ARMAZEM_COLORS (Dashboard)

// Meta de acuracidade semanal, confirmada pelo cliente ("meta de 95%") —
// mesmo tratamento do META_CONTAGENS_SEMANAL: linha de referência fixa, não
// mais a média das semanas exibidas.
const META_ACURACIDADE_SEMANAL = 95;

function WeeklyLineChart({weeks, meta=META_ACURACIDADE_SEMANAL}){
  const W = 760, H = 220, padL = 34, padR = 30, padT = 34, padB = 40;
  const chartW = W - padL - padR, chartH = H - padT - padB;
  const n = weeks.length;
  const x = i => padL + (n>1 ? (i/(n-1))*chartW : chartW/2);
  const y = v => padT + chartH - (v/100)*chartH;
  // Semanas sem contagem nenhuma têm `acuracidade:null` (ver
  // computeWeeklyStats) — entram no eixo X (pra manter a janela fixa de
  // `maxWeeks` semanas), mas NÃO na linha, que vira um "buraco" em vez de
  // mergulhar pra 0% (0% enganaria, pareceria uma semana ruim em vez de uma
  // semana sem dado nenhum).
  const segmentos = [];
  let atual = [];
  weeks.forEach((w,i)=>{
    if(w.acuracidade!=null) atual.push(i);
    else if(atual.length){ segmentos.push(atual); atual = []; }
  });
  if(atual.length) segmentos.push(atual);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block'}} role="img" aria-label="Gráfico de acuracidade semanal">
      {[0,25,50,75,100].map(t=>(
        <g key={t}>
          <line x1={padL} x2={W-padR} y1={y(t)} y2={y(t)} stroke="var(--line)" strokeWidth={1} strokeDasharray="3,3" />
          <text x={padL-8} y={y(t)+3.5} textAnchor="end" fontSize={10} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{t}%</text>
        </g>
      ))}
      {/* Rótulo "Meta: X%" saiu do SVG (ver .chart-meta-badge no cabeçalho do
          painel, fora do gráfico) — dentro do SVG ele sobrepunha o rótulo do
          ponto de dado sempre que a semana mais recente tinha acuracidade
          próxima da meta (os dois ficavam no mesmo canto superior direito).
          Fica só a linha tracejada de referência aqui, com tooltip. */}
      <line x1={padL} x2={W-padR} y1={y(meta)} y2={y(meta)} stroke={WEEKLY_CHART_COLOR} strokeWidth={1.5} strokeDasharray="5,4" opacity={0.65}>
        <title>Meta: {meta}%</title>
      </line>
      {segmentos.map((seg,si)=>{
        const pts = seg.map(i=>`${x(i)},${y(weeks[i].acuracidade)}`).join(' ');
        const area = `${x(seg[0])},${y(0)} ${pts} ${x(seg[seg.length-1])},${y(0)}`;
        return (
          <g key={si}>
            <polygon points={area} fill={WEEKLY_CHART_COLOR} opacity={0.12} />
            <polyline points={pts} fill="none" stroke={WEEKLY_CHART_COLOR} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round" />
          </g>
        );
      })}
      {weeks.map((w,i)=>(
        <g key={w.key}>
          {w.acuracidade!=null ? (
            <>
              <circle cx={x(i)} cy={y(w.acuracidade)} r={4} fill={WEEKLY_CHART_COLOR} stroke="var(--panel)" strokeWidth={2}>
                <title>{w.label} ({w.sublabel}): {w.acuracidade.toFixed(1)}% · {w.total} contagem(ns)</title>
              </circle>
              <text x={x(i)} y={y(w.acuracidade)-11} textAnchor="middle" fontSize={11} fontWeight={700} fill="var(--ink)" fontFamily="var(--font-mono)">{Math.round(w.acuracidade)}%</text>
            </>
          ) : (
            <circle cx={x(i)} cy={y(0)} r={2.5} fill="var(--ink-dim)" opacity={0.5}>
              <title>{w.label} ({w.sublabel}): sem contagens</title>
            </circle>
          )}
          <text x={x(i)} y={H-24} textAnchor="middle" fontSize={10} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{w.label}</text>
          <text x={x(i)} y={H-11} textAnchor="middle" fontSize={10} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{w.sublabel}</text>
        </g>
      ))}
    </svg>
  );
}

// Meta semanal de contagem, confirmada pelo cliente ("meta de 250 itens") —
// linha de referência fixa no gráfico "Contagens na Semana", em vez da
// média das semanas exibidas (que mudava a cada janela e não representava
// nenhum objetivo real). Constante isolada aqui em cima pra ser fácil de
// ajustar se o cliente mudar a meta depois.
const META_CONTAGENS_SEMANAL = 250;

function WeeklyCountChart({weeks, meta=META_CONTAGENS_SEMANAL}){
  const W = 760, H = 220, padL = 34, padR = 30, padT = 34, padB = 40;
  const chartW = W - padL - padR, chartH = H - padT - padB;
  const n = weeks.length;
  const ticks = niceAxisTicks(Math.max(...weeks.map(w=>w.total), meta, 1), 4);
  const maxVal = ticks[ticks.length-1];
  const slot = chartW / n;
  const barW = Math.min(40, slot * 0.5);
  const x = i => padL + i*slot + slot/2;
  const y = v => padT + chartH - (v/maxVal)*chartH;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block'}} role="img" aria-label="Gráfico de contagens por semana">
      {ticks.map(t=>(
        <g key={t}>
          <line x1={padL} x2={W-padR} y1={y(t)} y2={y(t)} stroke="var(--line)" strokeWidth={1} strokeDasharray="3,3" />
          <text x={padL-8} y={y(t)+3.5} textAnchor="end" fontSize={10} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{Math.round(t)}</text>
        </g>
      ))}
      <line x1={padL} x2={W-padR} y1={y(meta)} y2={y(meta)} stroke={WEEKLY_CHART_COLOR} strokeWidth={1.5} strokeDasharray="5,4" opacity={0.65}>
        <title>Meta: {meta}</title>
      </line>
      {weeks.map((w,i)=>(
        <g key={w.key}>
          <rect x={x(i)-barW/2} y={y(w.total)} width={barW} height={Math.max(0, y(0)-y(w.total))} rx={4} fill={WEEKLY_CHART_COLOR}>
            <title>{w.label} ({w.sublabel}): {w.total} contagem(ns)</title>
          </rect>
          <text x={x(i)} y={y(w.total)-8} textAnchor="middle" fontSize={11} fontWeight={700} fill="var(--ink)" fontFamily="var(--font-mono)">{w.total}</text>
          <text x={x(i)} y={H-24} textAnchor="middle" fontSize={10} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{w.label}</text>
          <text x={x(i)} y={H-11} textAnchor="middle" fontSize={10} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{w.sublabel}</text>
        </g>
      ))}
    </svg>
  );
}

// "Acuracidade Mensal" virou colunas (era o mesmo WeeklyLineChart de linha,
// reaproveitado por engano visual — o cliente pediu formato de barras, mais
// fácil de comparar mês a mês). Mesmo padL/padR/padB de WeeklyCountChart,
// mas eixo Y fixo em 0-100% (como WeeklyLineChart) já que é acuracidade, não
// contagem absoluta. padT um pouco maior que os outros dois (38 em vez de
// 34) porque as colunas costumam bater perto de 100%, e o rótulo do valor
// fica ACIMA da barra — precisa de mais respiro entre o topo do SVG e a
// grade de "100%" pra não ficar espremido.
function MonthlyAccuracyBarChart({months, meta=META_ACURACIDADE_SEMANAL}){
  const W = 760, H = 220, padL = 34, padR = 30, padT = 38, padB = 40;
  const chartW = W - padL - padR, chartH = H - padT - padB;
  const n = months.length;
  const slot = chartW / n;
  const barW = Math.min(48, slot * 0.55);
  const x = i => padL + i*slot + slot/2;
  const y = v => padT + chartH - (v/100)*chartH;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block'}} role="img" aria-label="Gráfico de acuracidade mensal">
      {[0,25,50,75,100].map(t=>(
        <g key={t}>
          <line x1={padL} x2={W-padR} y1={y(t)} y2={y(t)} stroke="var(--line)" strokeWidth={1} strokeDasharray="3,3" />
          <text x={padL-8} y={y(t)+3.5} textAnchor="end" fontSize={10} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{t}%</text>
        </g>
      ))}
      <line x1={padL} x2={W-padR} y1={y(meta)} y2={y(meta)} stroke={WEEKLY_CHART_COLOR} strokeWidth={1.5} strokeDasharray="5,4" opacity={0.65}>
        <title>Meta: {meta}%</title>
      </line>
      {months.map((m,i)=>(
        <g key={m.key}>
          {m.acuracidade!=null ? (
            <>
              <rect x={x(i)-barW/2} y={y(m.acuracidade)} width={barW} height={Math.max(0, y(0)-y(m.acuracidade))} rx={4} fill={WEEKLY_CHART_COLOR}>
                <title>{m.label} ({m.sublabel}): {m.acuracidade.toFixed(1)}% · {m.total} contagem(ns)</title>
              </rect>
              <text x={x(i)} y={y(m.acuracidade)-8} textAnchor="middle" fontSize={11} fontWeight={700} fill="var(--ink)" fontFamily="var(--font-mono)">{Math.round(m.acuracidade)}%</text>
            </>
          ) : (
            <rect x={x(i)-2} y={y(0)-3} width={4} height={3} fill="var(--ink-dim)" opacity={0.5}>
              <title>{m.label} ({m.sublabel}): sem contagens</title>
            </rect>
          )}
          <text x={x(i)} y={H-24} textAnchor="middle" fontSize={10} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{m.label}</text>
          <text x={x(i)} y={H-11} textAnchor="middle" fontSize={10} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{m.sublabel}</text>
        </g>
      ))}
    </svg>
  );
}

// Mini gráfico de linha, mais enxuto que WeeklyLineChart (sem meta, sem
// rótulo "Sem N" em cima da data, sem % grande em cada ponto) — pensado pra
// caber dentro do card "Saúde do Inventário", não como painel próprio.
function HealthSparkline({pontos, color}){
  const W = 320, H = 92, padL = 30, padR = 8, padT = 8, padB = 18;
  const chartW = W-padL-padR, chartH = H-padT-padB;
  const n = pontos.length;
  const x = i => padL + (n>1 ? (i/(n-1))*chartW : chartW/2);
  const y = v => padT + chartH - (v/100)*chartH;
  const pts = pontos.map((p,i)=>`${x(i)},${y(p.acuracidade)}`).join(' ');
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block'}} role="img" aria-label="Tendência recente de acuracidade">
      {[0,25,50,75,100].map(t=>(
        <text key={t} x={padL-6} y={y(t)+3} textAnchor="end" fontSize={9} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{t}%</text>
      ))}
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" />
      {pontos.map((p,i)=>(
        <circle key={p.key} cx={x(i)} cy={y(p.acuracidade)} r={3.5} fill={color} stroke="#fff" strokeWidth={1.5}>
          <title>{p.sublabel}: {p.acuracidade.toFixed(1)}%</title>
        </circle>
      ))}
      {pontos.map((p,i)=>{
        // Rótulo do 1º/último ponto ancorado na PONTA (start/end) em vez de
        // "middle" — com "middle" nesses dois, metade do texto (ex: "13/07")
        // cai fora do viewBox (0-W), e o SVG recorta silenciosamente o que
        // passa da borda (overflow implícito da raiz `<svg>`), cortando a
        // data pela metade ("13/0"). Só os pontos do meio continuam
        // centralizados, onde não há risco de estourar a borda.
        const anchor = i===0 ? 'start' : (i===pontos.length-1 ? 'end' : 'middle');
        return (
          <text key={p.key+'-lbl'} x={x(i)} y={H-4} textAnchor={anchor} fontSize={9} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{p.sublabel}</text>
        );
      })}
    </svg>
  );
}

// Card "Saúde do Inventário" — pedido do cliente (mandou uma imagem de
// referência: selo de status + variação vs. período anterior + mini
// gráfico + acuracidade atual em destaque). Implementado 100% em cima de
// dado real já calculado por `computeWeeklyStats` — sem inventar nenhuma
// métrica nova: "atual" é a última semana com contagem de verdade dentro do
// período filtrado, "variação" compara contra a semana anterior a essa
// (também só entre semanas com dado real). Se ainda não existe nenhuma
// semana com contagem no período escolhido, não renderiza nada (mesmo
// critério de "não fabricar dado" já usado no resto do Dashboard) — quem
// chama decide o que mostrar no lugar.
function InventoryHealthCard({weeklyStats, meta=META_ACURACIDADE_SEMANAL}){
  const comDado = weeklyStats.filter(w=>w.acuracidade!=null);
  if(comDado.length===0) return null;
  const atual = comDado[comDado.length-1];
  const anterior = comDado.length>1 ? comDado[comDado.length-2] : null;
  const variacao = anterior ? (atual.acuracidade - anterior.acuracidade) : null;

  // 4 faixas de status, relativas à META (não valores fixos) — assim o
  // rótulo continua fazendo sentido se o cliente um dia mudar a meta de 95%.
  let tier;
  if(atual.acuracidade >= meta) tier = {status:'Excelente', sub:'Você está dentro da meta!', color:'#0D9488', bg:'#E7F6F3'};
  else if(atual.acuracidade >= meta-10) tier = {status:'Bom', sub:'Perto da meta', color:'#2563EB', bg:'#EAF1FD'};
  else if(atual.acuracidade >= meta-25) tier = {status:'Atenção', sub:'Abaixo da meta', color:'#B7791F', bg:'#FDF3E3'};
  else tier = {status:'Crítico', sub:'Bem abaixo da meta', color:'#C4291B', bg:'#FBEAE8'};

  const pontos = comDado.slice(-6);

  return (
    <div className="health-card" style={{background:tier.bg}}>
      <div className="health-left">
        <div className="health-icon" style={{background:tier.color}}><DIcon name="shieldCheck" size={22} style={{color:'#fff'}} /></div>
        <div className="health-text">
          <div className="health-eyebrow">Saúde do Inventário</div>
          <div className="health-status" style={{color:tier.color}}>{tier.status}</div>
          <div className="health-sub" style={{color:tier.color}}>{tier.sub}</div>
          {variacao!=null && (
            <div className="health-desc">
              A acuracidade está {Math.abs(variacao).toFixed(1)}% {variacao>=0?'acima':'abaixo'} do período anterior.
              {variacao>=0 ? ' Continue assim.' : ''}
            </div>
          )}
        </div>
      </div>
      <div className="health-chart"><HealthSparkline pontos={pontos} color={tier.color} /></div>
      <div className="health-current">
        <div className="health-current-value" style={{color:tier.color}}>{atual.acuracidade.toFixed(1)}%</div>
        <div className="health-current-label">Acuracidade da semana</div>
      </div>
    </div>
  );
}
