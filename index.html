// "Bom dia"/"Boa tarde"/"Boa noite" conforme o horário do aparelho — troca o
// "Bem-vindo, {perfil}" antigo na saudação da Home (cliente achou repetitivo
// já que o perfil já aparece no avatar do topbar).
function saudacaoPorHorario(){
  const h = new Date().getHours();
  if(h < 12) return 'Bom dia';
  if(h < 18) return 'Boa tarde';
  return 'Boa noite';
}

function Home({role, user, inventories, counts, historicoConcluidas=[], enderecosPropostos=[], goto}){
  // Bug real corrigido aqui: `i.status` é gravado como 'pendente' na criação
  // do inventário e nunca é atualizado depois — nunca vira 'concluido' de
  // verdade. Deriva de `contados`/`qtdItens` via `inventarioConcluido`
  // (mesma função usada em `InventoryList`, mesmo critério do donut do
  // Dashboard), não do campo morto — senão esse badge/contador nunca
  // descontava um inventário 100% contado.
  const pendentes = inventories.filter(i=>!inventarioConcluido(i)).length;
  const byOriginal = {};
  counts.forEach(c=>{ if(c.contagemAnteriorId) byOriginal[c.contagemAnteriorId]=true; });
  // Bug real corrigido aqui: este KPI ("Recontagens Pendentes", clica e vai
  // pra `recounts`/RecountsPanel) somava TAMBÉM `aguardando_analise_lider`
  // — sobra de quando "Itens Divergentes" ainda era uma seção DENTRO de
  // RecountsPanel, antes da extração pra tela própria (ver CLAUDE.md
  // "'Itens Divergentes' vira tela própria"). Depois da extração,
  // RecountsPanel passou a mostrar só `aguardando_segunda` (ver
  // `aguardandoSegunda` ali), mas este cálculo nunca foi atualizado — o
  // cliente notou o card mostrando um número (325) bem maior que a própria
  // tela de Recontagens Pendentes (285), diferença batendo exatamente com
  // `itensDivergentesPendentes` (que já tem seu próprio KPI "Itens
  // Divergentes" logo ao lado, contando esse status separadamente — estava
  // sendo contado duas vezes, uma em cada card). Corrigido pra contar só o
  // que a tela `recounts` de fato mostra.
  const pendentesRecontagem = counts.filter(c=>c.statusAprovacao==='aguardando_segunda' && !byOriginal[c.id]).length;
  // "Itens Divergentes" (KPI + tela própria, ver DivergentItemsPanel) — só
  // divergência que AINDA não entrou em processo de recontagem. Assim que o
  // item vira aguardando_segunda, some daqui (mesma regra da tela).
  const itensDivergentesPendentes = counts.filter(c=>c.statusAprovacao==='aguardando_analise_lider').length;
  // "Aprovação de Ajustes" (KPI + tela própria, ver DiretoriaApprovalPanel) —
  // SAs de ajuste geradas pelo líder, aguardando decisão da Diretoria. Não
  // interessa ao operador (ele não participa dessa etapa), mesmo critério de
  // ACESSOS_RESTRITOS.aprovacaoDiretoria.
  const aguardandoDiretoria = counts.filter(c=>c.statusAprovacao==='aguardando_aprovacao_diretoria').length;
  const podeGerir = hasAccess(user,'enderecos');
  const pendentesEnderecos = enderecosPropostos.filter(e=>e.status==='pendente').length;

  // ---- Dashboard desktop: KPIs, atividades, ações rápidas, situação dos inventários ----
  // (view "home" virou o Dashboard — ver CLAUDE.md "Dashboard vira a tela inicial")
  const emAndamento = inventories.filter(i=>i.contados>0 && i.contados<i.qtdItens).length;
  const pendentesInicio = inventories.filter(i=>i.contados===0).length;

  const hojeStr = hojeLocalStr();
  const ontemStr = localDateStr(new Date(Date.now()-86400000));

  // Acuracidade cumulativa inclui o histórico importado (contagens_historico,
  // status já concluídos) além das contagens ao vivo do app — sem isso, a
  // Acuracidade do Estoque ficava artificialmente alta/vazia logo depois de
  // um reset, ignorando os milhares de contagens já resolvidas na planilha
  // antiga da Selgron. `historicoConcluidas` já tem os campos `data`/
  // `diferenca` com o mesmo nome/formato usado em `counts`, então dá pra
  // juntar os dois arrays direto no filtro, sem conversão.
  //
  // Bug real corrigido aqui: `c.data<=dataLimite` sozinho, com `c.data:null`
  // (~460 linhas da planilha antiga sem data, ver CLAUDE.md), avalia
  // `null<=dataLimite` como FALSE (JS converte null pra 0, e 0<=string vira
  // NaN na comparação) — excluía silenciosamente todo item sem data do
  // cálculo aqui, mesmo esses itens sendo contagens de verdade que
  // aconteceram antes de hoje. O card "Acuracidade do Estoque" de
  // Indicadores (Dashboard) não tem esse filtro de data — nunca excluía
  // esses itens — e por isso os dois cards batiam número diferente mesmo
  // depois do bug de null-como-divergência já ter sido corrigido. Item sem
  // data conta igual nos dois agora (`!c.data ||` cobre esse caso).
  function acumuladoAte(dataLimite){
    const relevantes = [...counts, ...historicoConcluidas].filter(c=>!c.data || c.data<=dataLimite);
    const divergentes = relevantes.filter(c=>c.diferenca!==0 && c.diferenca!==null);
    const acuracidade = relevantes.length ? ((relevantes.length-divergentes.length)/relevantes.length*100) : 100;
    return {total:relevantes.length, divergentes:divergentes.length, acuracidade};
  }
  const hoje = acumuladoAte(hojeStr);
  const ontem = acumuladoAte(ontemStr);
  const concluidasHoje = counts.filter(c=>c.data===hojeStr).length;
  const concluidasOntem = counts.filter(c=>c.data===ontemStr).length;

  const concluidasTrendPct = pnlTrendPct(concluidasHoje, concluidasOntem);
  const acuracidadePontos = ontem.total>0 ? (hoje.acuracidade-ontem.acuracidade) : null;

  const kpis = [
    {
      key:'andamento', icon:'box', bg:'#E3EEFC', color:'#2A6FD6',
      label:'Inventários em Andamento', value:emAndamento,
      trend:<span className="pnl-kpi-trend flat">{pendentesInicio} aguardando início</span>,
      onClick:()=>goto('inventories'),
    },
    {
      key:'recontagens', icon:'repeat', bg:'#FFF1D6', color:'#A35F00',
      label:'Recontagens Pendentes', value:pendentesRecontagem,
      trend:<span className={"pnl-kpi-trend "+(pendentesRecontagem>0?'bad':'good')}>{pendentesRecontagem>0?'Requer atenção':'Nenhuma pendência'}</span>,
      onClick:()=>goto('recounts'),
    },
    {
      key:'divergentes', icon:'alertTriangle', bg:'#FBE6E3', color:'#C4291B',
      label:'Itens Divergentes', value:itensDivergentesPendentes,
      // Estado atual (fila de pendência), não cumulativo — mesmo critério já
      // usado em "Recontagens Pendentes" (sem histórico de snapshot pra
      // calcular tendência real, ver CLAUDE.md "KPIs — só dado real").
      trend:<span className={"pnl-kpi-trend "+(itensDivergentesPendentes>0?'bad':'good')}>{itensDivergentesPendentes>0?'Requer atenção':'Nenhuma pendência'}</span>,
      onClick:()=>goto('divergentes'),
    },
    ...(role!=='operador' ? [{
      key:'aprovacaoDiretoria', icon:'clipboardList', bg:'#FFF1D6', color:'#A35F00',
      label:'Aguardando Aprovação da Diretoria', value:aguardandoDiretoria,
      trend:<span className={"pnl-kpi-trend "+(aguardandoDiretoria>0?'bad':'good')}>{aguardandoDiretoria>0?'Requer atenção':'Nenhuma pendência'}</span>,
      onClick:()=>goto('aprovacaoDiretoria'),
    }] : []),
    {
      key:'concluidas', icon:'checkCircle', bg:'#E3F6EA', color:'#1E8E4F',
      label:'Contagens Concluídas Hoje', value:concluidasHoje,
      trend:<KpiTrend pct={concluidasTrendPct} />,
      onClick:()=>goto('concluidas'),
    },
    {
      key:'acuracidade', icon:'percent', bg:'#F1E9FB', color:'#7B3FC4',
      label:'Acuracidade do Estoque', value:hoje.acuracidade.toFixed(1)+'%',
      trend:<KpiTrend pct={acuracidadePontos} suffix=" pts" />,
      // Sem acesso a Indicadores (perfil não libera nem tem exceção
      // concedida, ver ACESSOS_RESTRITOS), o card continua mostrando o
      // número mas não navega pra lugar nenhum.
      onClick: hasAccess(user,'dashboard') ? ()=>goto('dashboard') : undefined,
    },
  ];

  // "Últimas Contagens" — pedido do cliente com imagem de referência:
  // agrupa contagens individuais por SESSÃO (mesmo usuário + mesma data +
  // mesmo armazém), não uma linha por item contado. "Itens" = quantos
  // itens essa sessão cobriu; "Acuracidade" = média contínua (mesma fórmula
  // de itemAcuracidade já usada no card "Saúde do Inventário"), não a taxa
  // binária de acerto exato. Sessões sem `almoxarifado` (contagens feitas
  // antes do armazém virar obrigatório) caem sob "—", não quebram o
  // agrupamento.
  const sessoesPorChave = {};
  counts.forEach(c=>{
    const almox = c.almoxarifado || '—';
    const key = c.usuario+'|'+c.data+'|'+almox;
    if(!sessoesPorChave[key]) sessoesPorChave[key] = {usuario:c.usuario, data:c.data, almoxarifado:almox, itens:0, somaAcc:0, comAcc:0, ultimaHora:c.hora||''};
    const s = sessoesPorChave[key];
    s.itens += 1;
    const acc = itemAcuracidade(c);
    if(acc!=null){ s.somaAcc += acc; s.comAcc += 1; }
    if((c.hora||'') > s.ultimaHora) s.ultimaHora = c.hora||'';
  });
  const atividades = Object.values(sessoesPorChave)
    .map(s=>({...s, acuracidade: s.comAcc>0 ? (s.somaAcc/s.comAcc)*100 : null}))
    .sort((a,b)=> (b.data+b.ultimaHora).localeCompare(a.data+a.ultimaHora))
    .slice(0,5);

  const acoes = [
    {icon:'search', label:'Nova Contagem', onClick:()=>goto('pickCountType')},
    {icon:'checkCircle', label:'Contagens Concluídas', onClick:()=>goto('concluidas')},
    {icon:'repeat', label:'Recontagens', onClick:()=>goto('recounts')},
    // Some da lista (não só desabilita) quando o usuário não tem acesso a
    // Relatórios — mesmo critério de "não deixar link morto" já aplicado no
    // KPI de Indicadores acima.
    ...(hasAccess(user,'relatorios') ? [{icon:'fileText', label:'Relatórios', onClick:()=>goto('relatorios')}] : []),
  ];

  const planejados = inventories.filter(i=>i.contados===0 && i.status!=='cancelado').length;
  const concluidosInv = inventories.filter(i=>i.qtdItens>0 && i.contados>=i.qtdItens).length;
  const canceladosInv = inventories.filter(i=>i.status==='cancelado').length;
  const totalInv = planejados+emAndamento+concluidosInv+canceladosInv;

  const statusRows = [
    {label:'Planejados', value:planejados, color:'#94A3B8'},
    {label:'Em andamento', value:emAndamento, color:'#F6A200'},
    {label:'Concluídos', value:concluidosInv, color:'#1E8E4F'},
    {label:'Cancelados', value:canceladosInv, color:'#C4291B'},
  ];
  const maxRow = Math.max(1, ...statusRows.map(r=>r.value));

  return (
    <div>
      <div className="greet">{saudacaoPorHorario()}</div>
      <h2 className="greet-title">{user.nome}</h2>

      {/* Telas largas: Dashboard novo (design corporativo/ERP) — ver CLAUDE.md
          "Dashboard vira a tela inicial". Tablet/celular continua com o grid
          de atalhos simples logo abaixo, sem alteração. */}
      <div className="pnl-wrap">
        <div className="pnl-kpi-row">
          {kpis.map(k=>(
            <button key={k.key} className="pnl-kpi" onClick={k.onClick} style={{cursor:'pointer'}}>
              <div className="pnl-kpi-top">
                <span className="pnl-kpi-icon" style={{background:k.bg, color:k.color}}><DIcon name={k.icon} size={17} /></span>
              </div>
              <div className="pnl-kpi-value">{k.value}</div>
              <div className="pnl-kpi-label">{k.label}</div>
              {k.trend}
            </button>
          ))}
        </div>

        <div className="pnl-row">
          <div className="pnl-col-8 pnl-card">
            <div className="pnl-section-head">
              <div className="pnl-section-title">Últimas Contagens</div>
              <button className="pnl-section-link" onClick={()=>goto('concluidas')}>Ver todas <DIcon name="chevronRight" size={13} /></button>
            </div>
            {atividades.length===0 ? (
              <div style={{color:'var(--gray-500)', fontSize:13, padding:'12px 4px'}}>Nenhuma atividade registrada ainda.</div>
            ) : (
              <table className="pnl-table">
                <thead><tr><th>Data</th><th>Usuário</th><th>Almoxarifado</th><th>Itens</th><th>Acuracidade</th></tr></thead>
                <tbody>
                  {atividades.map(s=>{
                    const almoxLabel = s.almoxarifado==='—' ? '—' : ('Almox ' + (/^[0-9]+$/.test(s.almoxarifado) ? s.almoxarifado.padStart(2,'0') : s.almoxarifado));
                    const accColor = s.acuracidade==null ? 'var(--gray-500)' : s.acuracidade>=85 ? 'var(--ok)' : s.acuracidade>=70 ? 'var(--warn)' : 'var(--danger)';
                    return (
                      <tr key={s.usuario+'|'+s.data+'|'+s.almoxarifado}>
                        <td>{fmtDataBR(s.data)}</td>
                        <td>{s.usuario}</td>
                        <td>{almoxLabel}</td>
                        <td>{s.itens}</td>
                        <td style={{color:accColor, fontWeight:700}}>{s.acuracidade==null ? '—' : s.acuracidade.toFixed(0)+'%'}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
          </div>

          <div className="pnl-col-4 pnl-card">
            <div className="pnl-section-head">
              <div className="pnl-section-title">Ações Rápidas</div>
            </div>
            <div className="pnl-quick-list">
              {acoes.map(a=>(
                <button key={a.label} className="pnl-quick-item" onClick={a.onClick}>
                  <span className="pnl-quick-icon"><DIcon name={a.icon} size={15} /></span>
                  <span className="pnl-quick-text">{a.label}</span>
                  <span className="pnl-quick-arrow"><DIcon name="chevronRight" size={15} /></span>
                </button>
              ))}
            </div>
          </div>
        </div>

        <div className="pnl-row">
          <div className="pnl-col-5 pnl-card">
            <div className="pnl-section-head">
              <div className="pnl-section-title">Situação Geral dos Inventários</div>
            </div>
            <div className="pnl-donut-wrap">
              <PnlDonut segments={statusRows} />
              <div className="pnl-donut-legend">
                {statusRows.map(r=>(
                  <div key={r.label} className="pnl-legend-row">
                    <span className="pnl-legend-dot" style={{background:r.color}}></span>
                    {r.label}
                    <span className="n">{r.value}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="pnl-col-7 pnl-card">
            <div className="pnl-section-head">
              <div className="pnl-section-title">Status dos Inventários</div>
            </div>
            {statusRows.map(r=>(
              <div key={r.label} className="pnl-bar-row">
                <div className="pnl-bar-label">{r.label}</div>
                <div className="pnl-bar-track"><div className="pnl-bar-fill" style={{width:(r.value/maxRow*100)+'%', background:r.color}}></div></div>
                <div className="pnl-bar-num">{r.value} · {totalInv?Math.round(r.value/totalInv*100):0}%</div>
              </div>
            ))}
          </div>
        </div>

        <div className="pnl-footer">
          <span>© {new Date().getFullYear()} Selgron</span>
          <div className="pnl-footer-links">
            <span>Política de Privacidade</span>
            <span>Termos de Uso</span>
          </div>
        </div>
      </div>

      {/* Celular: menu de destinos em vez do Dashboard (ver MobileHomeMenu) */}
      <MobileHomeMenu user={user} goto={goto} badges={{
        inventories: pendentes,
        recounts: pendentesRecontagem,
        divergentes: itensDivergentesPendentes,
        enderecos: pendentesEnderecos,
      }} />

      {/* Legado — só aparece em telas menores que 360px (praticamente
          inexistentes hoje), ver CLAUDE.md "Dashboard novo funciona em
          qualquer largura de tela" */}
      <div className="grid-cards">
        <div className="home-card" onClick={()=>goto('inventories')}>
          {pendentes>0 && <span className="badge">{pendentes}</span>}
          <span className="icon"><Ic size={26}>📦</Ic></span>
          <span className="label">Inventários Pendentes</span>
        </div>
        <div className="home-card" onClick={()=>goto('pickCountType')}>
          <span className="icon"><Ic size={26}>🔍</Ic></span>
          <span className="label">Nova Contagem</span>
        </div>
        <div className="home-card" onClick={()=>goto('concluidas')}>
          <span className="icon"><Ic size={26}>✅</Ic></span>
          <span className="label">Contagens Concluídas</span>
        </div>
        <div className="home-card" onClick={()=>goto('recounts')}>
          {pendentesRecontagem>0 && <span className="badge">{pendentesRecontagem}</span>}
          <span className="icon"><Ic size={26}>🔁</Ic></span>
          <span className="label">Recontagens Pendentes</span>
        </div>
        {podeGerir && (
          <div className="home-card" onClick={()=>goto('enderecos')}>
            {pendentesEnderecos>0 && <span className="badge">{pendentesEnderecos}</span>}
            <span className="icon"><Ic size={26}>📍</Ic></span>
            <span className="label">Endereços Pendentes</span>
          </div>
        )}
        {hasAccess(user,'dashboard') && (
          <div className="home-card" onClick={()=>goto('dashboard')}>
            <span className="icon"><Ic size={26}>📊</Ic></span>
            <span className="label">Indicadores</span>
          </div>
        )}
        {hasAccess(user,'relatorios') && (
          <div className="home-card" onClick={()=>goto('relatorios')}>
            <span className="icon"><Ic size={26}>📄</Ic></span>
            <span className="label">Relatórios</span>
          </div>
        )}
        <div className="home-card" onClick={()=>goto('settings')}>
          <span className="icon"><Ic size={26}>⚙</Ic></span>
          <span className="label">Configurações</span>
        </div>
      </div>
    </div>
  );
}

/* ---------------- DASHBOARD (agora é a tela "home") ----------------
   Helpers usados pelo bloco desktop de `Home` (design corporativo/ERP — ver
   CLAUDE.md "Dashboard vira a tela inicial"). Toda métrica vem de
   `counts`/`inventories` reais já existentes no app — nada fabricado.
   Tendência dia-a-dia (vs. ontem) só é mostrada onde a comparação é
   genuinamente derivável do campo `data` de cada contagem (cumulativo até uma
   data); para KPIs que são puro estado atual (sem histórico registrado —
   inventários em andamento, recontagens pendentes) mostra uma nota contextual
   real em vez de inventar uma variação percentual sem base de dados. */

function pnlTrendPct(atual, anterior){
  if(anterior===0) return atual===0 ? 0 : null;
  return ((atual-anterior)/anterior)*100;
}

function KpiTrend({pct, invert, suffix, compareLabel}){
  if(pct===null || pct===undefined){
    return null;
  }
  const flat = Math.abs(pct) < 0.05;
  const rising = pct > 0;
  const good = flat ? null : (invert ? !rising : rising);
  const cls = flat ? 'flat' : (good ? 'good' : 'bad');
  const icon = flat ? 'minus' : (rising ? 'trendingUp' : 'trendingDown');
  const sign = pct > 0 ? '+' : '';
  return (
    <span className={"pnl-kpi-trend "+cls}>
      <DIcon name={icon} size={11} />
      {sign}{pct.toFixed(1)}{suffix || '%'} {compareLabel || 'vs. ontem'}
    </span>
  );
}

function PnlDonut({segments, size=168, strokeWidth=22, centerLabel='inventários'}){
  const r = (size - strokeWidth) / 2;
  const c = 2 * Math.PI * r;
  const total = segments.reduce((s, x) => s + x.value, 0);
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--gray-100)" strokeWidth={strokeWidth} />
      {total > 0 && segments.map((seg, i) => {
        if (seg.value <= 0) return null;
        const len = (seg.value / total) * c;
        const dashoffset = -offset;
        offset += len;
        return (
          <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={seg.color} strokeWidth={strokeWidth}
            strokeDasharray={`${len} ${c - len}`} strokeDashoffset={dashoffset}
            transform={`rotate(-90 ${size/2} ${size/2})`} />
        );
      })}
      <text x="50%" y="47%" textAnchor="middle" fontSize="24" fontWeight="700" fill="var(--navy)" fontFamily="Inter, sans-serif">{total}</text>
      <text x="50%" y="63%" textAnchor="middle" fontSize="10.5" fill="var(--gray-500)" fontFamily="Inter, sans-serif">{centerLabel}</text>
    </svg>
  );
}

/* ---------------- MÓDULO 1: INVENTÁRIOS ---------------- */

// Um inventário é "concluído" quando todos os itens já foram contados —
// derivado de `contados`/`qtdItens` (mesmo critério já usado no donut
// "Situação Geral dos Inventários" do Dashboard, `concluidosInv` em Home),
// nunca do campo `status`: esse campo é gravado como `'pendente'` na
// criação e NUNCA é atualizado depois — bug real reportado pelo cliente
// ("Inventários concluídos ainda estão ficando nesta tela"), porque esta
// tela mostrava todo mundo sem filtro nenhum e o `StatusTag` de cada card
// também lia esse mesmo campo morto (sempre "Pendente").
function inventarioConcluido(inv){
  return inv.qtdItens>0 && inv.contados>=inv.qtdItens;
}

function InventoryList({inventories, goto, role, counts, onDelete, onCancel}){
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  // `onDelete` agora aguarda confirmação do Supabase antes de sumir com o
  // card (ver App()) — `excluindo` desabilita os botões durante o envio,
  // `erroExclusao` mostra o motivo se falhar, mantendo o card visível.
  const [excluindo, setExcluindo] = useState(false);
  const [erroExclusao, setErroExclusao] = useState('');
  // Mesmo padrão pro cancelamento (encerrar um inventário em andamento
  // mantendo só o que já foi contado) — confirmação inline própria, separada
  // da de excluir (são ações diferentes, um cancela e o outro apaga).
  const [confirmCancelId, setConfirmCancelId] = useState(null);
  const [cancelando, setCancelando] = useState(false);
  const [erroCancelamento, setErroCancelamento] = useState('');
  // Seção "Concluídos" começa FECHADA (pedido do cliente) — o usuário
  // expande clicando na seta só quando quiser ver o que já foi finalizado,
  // sem isso ocupar espaço por padrão na tela. Estado puramente de UI, não
  // persiste (mesmo critério já usado pra `sidebarCollapsed`/navegação).
  const [concluidosAbertos, setConcluidosAbertos] = useState(false);
  // Toggle "Itens"/"Ocultar itens" — só faz sentido pros 2 tipos que guardam
  // uma lista FIXA de itens (`itensImportados`: Lista Importada/Itens
  // Específicos); os demais tipos (Aleatória/Curva ABC/Rota/Grupo) montam a
  // fila na hora, via RPC, sem uma lista fixa pra mostrar aqui. Visível pra
  // qualquer perfil (só consulta, não é ação destrutiva) — mesmo padrão de
  // `Set` já usado pro toggle "Detalhes" em RecountsPanel/ConcludedCountsPanel.
  const [itensAbertosIds, setItensAbertosIds] = useState(()=>new Set());
  function toggleItens(id){
    setItensAbertosIds(prev=>{
      const next = new Set(prev);
      if(next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }

  if(inventories.length===0){
    return <div className="empty-state"><div className="ic"><Ic size={40}>📦</Ic></div>Nenhum inventário programado.</div>;
  }

  function handleDownload(inv){
    if(!window.XLSX) return;
    const invCounts = (counts||[]).filter(c=>c.inventario===inv.id);
    const wb = generateReportWorkbook(invCounts, [inv]);
    const nomeArquivo = inv.nome.replace(/[^\w]+/g,'_');
    window.XLSX.writeFile(wb, `GestaoEstoques_${inv.id}_${nomeArquivo}.xlsx`);
  }

  async function handleConfirmDelete(id){
    setExcluindo(true);
    setErroExclusao('');
    const res = await onDelete(id);
    setExcluindo(false);
    if(res && res.ok){
      setConfirmDeleteId(null);
    } else {
      setErroExclusao((res && res.erro) || 'Não foi possível excluir — tente novamente.');
    }
  }

  async function handleConfirmCancel(id){
    setCancelando(true);
    setErroCancelamento('');
    const res = await onCancel(id);
    setCancelando(false);
    if(res && res.ok){
      setConfirmCancelId(null);
    } else {
      setErroCancelamento((res && res.erro) || 'Não foi possível cancelar — tente novamente.');
    }
  }

  const pendentes = inventories.filter(inv=>!inventarioConcluido(inv));
  const concluidos = inventories.filter(inventarioConcluido);
  // Concluídos só interessa a quem gerencia — pro operador, ver documentos
  // já fechados ali misturado com o que ainda precisa contar só gera
  // confusão sobre o que de fato falta fazer.
  const podeVerConcluidos = role!=='operador';

  function renderCard(inv){
    const pct = inv.qtdItens ? Math.round((inv.contados/inv.qtdItens)*100) : 0;
    const concluido = inventarioConcluido(inv);
    // Continuar contando um inventário já concluído não faz sentido (a fila
    // já está vazia) — só os cards ainda pendentes navegam pro fluxo de
    // contagem ao clicar; concluídos só têm as ações de Baixar/Excluir.
    // "Contagem por Rota de Endereço" tem motor próprio (RouteCountFlow) —
    // deixa escolher o corredor a contar agora, em vez de cair na fila
    // genérica (RandomCountFlow) usada pelos demais tipos não-importados.
    const destino = (inv.tipo==='Lista Importada (Excel)' || inv.tipo==='Itens Específicos') ? 'importedListCount'
      : inv.tipo==='Contagem por Rota de Endereço' ? 'routeCount'
      : 'randomCount';
    // Lista fixa de itens (só existe pros 2 tipos que guardam
    // `itensImportados` — ver comentário do estado `itensAbertosIds` acima).
    const temListaItens = (inv.tipo==='Itens Específicos' || inv.tipo==='Lista Importada (Excel)') && inv.itensImportados && inv.itensImportados.length>0;
    const itensAberto = itensAbertosIds.has(inv.id);
    return (
      <div key={inv.id} className="item-card" style={concluido ? {} : {cursor:'pointer'}} onClick={concluido ? undefined : ()=>goto(destino, inv)}>
        <div className="item-card-head">
          <div>
            <div className="item-code">{inv.id} · {inv.almoxarifado}</div>
            <div className="item-desc" style={{fontSize:16}}>{inv.nome}</div>
          </div>
          <StatusTag status={concluido ? 'ok' : 'warn'} text={concluido ? 'Concluído' : (inv.contados>0 ? 'Em andamento' : 'Pendente')} />
        </div>
        <div style={{padding:'14px 18px'}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12.5,color:'var(--ink-dim)'}}>
            <span>{inv.tipo}</span>
            <span>{inv.data}</span>
          </div>
          <div className="progress-bar"><div className="fill" style={{width:pct+'%', background: pct>=100 ? 'var(--ok)' : 'var(--safety)'}}></div></div>
          <div style={{fontFamily:'var(--font-mono)',fontSize:11.5,color:'var(--ink-dim)',marginTop:6}}>{inv.contados}/{inv.qtdItens} itens contados ({pct}%)</div>
        </div>
        {temListaItens && (
          <div style={{padding:'0 18px 14px'}} onClick={e=>e.stopPropagation()}>
            <button type="button" className="btn btn-outline" style={{width:'auto',padding:'6px 14px',fontSize:12}} onClick={()=>toggleItens(inv.id)}>
              <Ic>📋</Ic> {itensAberto ? 'Ocultar itens' : `Itens (${inv.itensImportados.length})`}
            </button>
            {itensAberto && (() => {
              // Um item pode ter mais de uma rodada (recontagem) dentro do mesmo
              // inventário — usa sempre a rodada MAIS RECENTE (maior numeroContagem)
              // pra decidir se está divergente hoje, não a 1ª (que pode já ter sido
              // corrigida por uma recontagem seguinte).
              const ultimaPorCodigo = {};
              (counts||[]).filter(c=>c.inventario===inv.id).forEach(c=>{
                const atual = ultimaPorCodigo[c.productCode];
                if(!atual || (c.numeroContagem||1) >= (atual.numeroContagem||1)) ultimaPorCodigo[c.productCode] = c;
              });
              return (
                <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:6,maxHeight:280,overflowY:'auto'}}>
                  {inv.itensImportados.map(it=>{
                    const countItem = ultimaPorCodigo[it.codigo];
                    const contado = !!countItem;
                    const divergente = contado && countItem.diferenca!=null && countItem.diferenca!==0;
                    return (
                      <div key={it.codigo} className="list-row" style={{cursor:'default',margin:0}}>
                        <div>
                          <div className="lr-title">{it.codigo} · {it.descricao || '—'}</div>
                          <div className="lr-sub">{it.endereco || 'sem endereço'}</div>
                        </div>
                        <StatusTag
                          status={!contado ? 'warn' : (divergente ? 'danger' : 'ok')}
                          text={!contado ? 'Pendente' : (divergente ? (<><Ic>⚠</Ic> Contado</>) : 'Contado')}
                        />
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </div>
        )}
        {role==='admin' && (
          confirmDeleteId===inv.id ? (
            <div style={{padding:'0 18px 16px'}} onClick={e=>e.stopPropagation()}>
              <div className="divergence-alert" style={{marginBottom:10}}>
                <Ic>⚠</Ic><span>Excluir "{inv.nome}"? Essa ação não pode ser desfeita.</span>
              </div>
              {erroExclusao && <div className="divergence-alert" style={{marginBottom:10}}><Ic>⚠</Ic><span>{erroExclusao}</span></div>}
              <div className="btn-row">
                <button className="btn btn-secondary" disabled={excluindo} onClick={()=>{setConfirmDeleteId(null); setErroExclusao('');}}>Voltar</button>
                <button className="btn btn-danger" disabled={excluindo} onClick={()=>handleConfirmDelete(inv.id)}>{excluindo ? 'Excluindo…' : 'Confirmar exclusão'}</button>
              </div>
            </div>
          ) : confirmCancelId===inv.id ? (
            <div style={{padding:'0 18px 16px'}} onClick={e=>e.stopPropagation()}>
              <div className="divergence-alert" style={{marginBottom:10}}>
                <Ic>⚠</Ic>
                <span>
                  {inv.contados>0
                    ? `Cancelar "${inv.nome}"? Os ${inv.contados} itens já contados são mantidos; os itens ainda em aberto são removidos e o inventário passa a Concluído.`
                    : `Cancelar "${inv.nome}"? Nenhum item foi contado ainda — cancelar remove o inventário por completo.`
                  } Essa ação não pode ser desfeita.
                </span>
              </div>
              {erroCancelamento && <div className="divergence-alert" style={{marginBottom:10}}><Ic>⚠</Ic><span>{erroCancelamento}</span></div>}
              <div className="btn-row">
                <button className="btn btn-secondary" disabled={cancelando} onClick={()=>{setConfirmCancelId(null); setErroCancelamento('');}}>Voltar</button>
                <button className="btn btn-danger" disabled={cancelando} onClick={()=>handleConfirmCancel(inv.id)}>{cancelando ? 'Cancelando…' : 'Confirmar cancelamento'}</button>
              </div>
            </div>
          ) : (
            <div className="btn-row" style={{padding:'0 18px 16px'}} onClick={e=>e.stopPropagation()}>
              <button className="btn btn-secondary" onClick={()=>handleDownload(inv)}><Ic>⬇</Ic> Baixar</button>
              {!concluido && <button className="btn btn-secondary" onClick={()=>setConfirmCancelId(inv.id)}><Ic>⛔</Ic> Cancelar</button>}
              <button className="btn btn-danger" onClick={()=>setConfirmDeleteId(inv.id)}><Ic>🗑</Ic> Excluir</button>
            </div>
          )
        )}
      </div>
    );
  }

  return (
    <div>
      {(role==='lider'||role==='admin') && (
        <button className="btn btn-primary" style={{marginBottom:16}} onClick={()=>goto('pickCountType')}>
          <Ic>➕</Ic> Criar Inventário
        </button>
      )}
      {pendentes.length===0 ? (
        <div className="empty-state" style={{marginBottom:16}}>Nenhum inventário pendente no momento.</div>
      ) : pendentes.map(renderCard)}

      {podeVerConcluidos && concluidos.length>0 && (
        <>
          <div className="section-title" style={{cursor:'pointer',justifyContent:'space-between'}} onClick={()=>setConcluidosAbertos(v=>!v)}>
            <span>Concluídos <span className="badge" style={{position:'static',marginLeft:8}}>{concluidos.length}</span></span>
            <DIcon name="chevronDown" size={16} style={{transform: concluidosAbertos ? 'rotate(0deg)' : 'rotate(-90deg)', transition:'transform .15s'}} />
          </div>
          {concluidosAbertos && concluidos.map(renderCard)}
        </>
      )}
    </div>
  );
}

function StatusTag({status, text}){
  return <span className={"status-tag status-"+status}><span className="status-dot"></span>{text}</span>;
}

// Nome automático do inventário — pedido do cliente: identificar de onde
// cada inventário veio (tipo + armazém + data) sem precisar digitar nada, e
// nunca duplicar nome de um documento existente (checa contra os nomes já
// usados e acrescenta " #2", " #3"... se colidir).
const TIPO_ABREV_NOME = {
  'Contagem Aleatória': 'Aleatória',
  'Contagem por Curva ABC': 'Curva ABC',
  'Contagem por Rota de Endereço': 'Rota',
  'Contagem por Grupo': 'Grupo',
};
function gerarNomeAutomaticoInventario(tipo, almoxCodes, data, nomesExistentes, grupoDescricao){
  const abrev = TIPO_ABREV_NOME[tipo] || tipo;
  const almoxLabel = (almoxCodes && almoxCodes.length) ? almoxCodes.map(c=>c.padStart(2,'0')).join('+') : '—';
  const [ano, mes, dia] = (data || '').split('-');
  const dataLabel = (dia && mes && ano) ? (dia + '/' + mes + '/' + ano) : '';
  // "Contagem por Grupo" acrescenta a descrição do grupo escolhido no nome
  // (ex.: "Grupo — ACRILICOS — Almox 01 — 17/07/2026") — sem isso, dois
  // inventários por grupo diferentes no mesmo dia/armazém ficariam com o
  // mesmo nome base e só se diferenciariam pelo sufixo "#2" sem sentido.
  const base = abrev + (grupoDescricao ? (' — ' + grupoDescricao) : '') + ' — Almox ' + almoxLabel + (dataLabel ? (' — ' + dataLabel) : '');
  const usados = new Set((nomesExistentes || []).map(n => String(n || '').trim().toLowerCase()));
  if(!usados.has(base.toLowerCase())) return base;
  let n = 2;
  while(usados.has((base + ' #' + n).toLowerCase())) n++;
  return base + ' #' + n;
}

// Campo de busca com chips pra selecionar mais de um grupo/família de
// produto — pedido do cliente: "conforme eu for digitando for filtrando na
// lista" + "ter a opção de selecionar mais de um grupo". Reaproveita o
// mesmo visual de chip do Almoxarifado (`.chip-input`/`.chip`), mas aqui a
// busca é por TEXTO livre na descrição (não código exato), então a lista de
// sugestões abaixo do campo filtra em tempo real por `.includes()` — usado
// tanto em NewInventory (líder/admin) quanto na versão avulsa do operador em
// PickCountType, ambos só passam `grupos`/`selecionados`/callbacks.
function GrupoMultiSelectField({grupos, selecionados, onToggle, onRemove}){
  const [busca, setBusca] = useState('');
  const buscaNorm = busca.trim().toLowerCase();
  const disponiveis = (grupos||[]).filter(g => !selecionados.includes(g.grupo));
  // Busca casa tanto pelo número do grupo quanto pela descrição — `label`
  // já junta os dois ("01 - Chapas Inox"), então buscar "01" ou "chapas"
  // encontra o mesmo grupo.
  const sugestoes = buscaNorm ? disponiveis.filter(g => g.label.toLowerCase().includes(buscaNorm)) : disponiveis;
  const selecionadosObjs = selecionados.map(cod => (grupos||[]).find(g=>g.grupo===cod)).filter(Boolean);

  return (
    <div>
      <div className="chip-input">
        {selecionadosObjs.map(g=>(
          <span key={g.grupo} className="chip">
            {g.label}
            <button type="button" onClick={()=>onRemove(g.grupo)} aria-label={"Remover grupo "+g.label}>×</button>
          </span>
        ))}
        <input
          type="text"
          value={busca}
          onChange={e=>setBusca(e.target.value)}
          placeholder={selecionados.length ? 'Adicionar outro grupo…' : 'Digite pra buscar um grupo…'}
        />
      </div>
      {busca.trim() && (
        <div className="grupo-suggestions">
          {sugestoes.length===0 ? (
            <div className="grupo-suggestion-empty">Nenhum grupo encontrado para "{busca}".</div>
          ) : sugestoes.slice(0,30).map(g=>(
            <button
              key={g.grupo}
              type="button"
              className="grupo-suggestion-item"
              onClick={()=>{ onToggle(g.grupo); setBusca(''); }}
            >
              {g.label} <span className="grupo-suggestion-count">({g.qtdItens} {g.qtdItens===1?'item':'itens'})</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function NewInventory({onCreate, goto, inventories, gruposExcluidos}){
  const [nome, setNome] = useState('');
  // Almoxarifado virou multi-seleção (chips) — começa com "01" pré-adicionado,
  // dá pra tirar e/ou adicionar outros. Só aceita código numérico que exista
  // de verdade na planilha SB2 (estoque_saldo), buscado do Supabase ao montar
  // — evita cadastrar inventário num armazém que não existe.
  const [almoxCodes, setAlmoxCodes] = useState(['1']);
  const [almoxInput, setAlmoxInput] = useState('');
  const [almoxErro, setAlmoxErro] = useState('');
  const [armazensValidos, setArmazensValidos] = useState(null); // null = ainda não carregou (não bloqueia validação nesse meio-tempo)
  const [data, setData] = useState(()=> hojeLocalStr());
  const [qtd, setQtd] = useState('');
  // Fluxo em 2 passos, pedido do cliente: primeiro escolhe o tipo de
  // inventário, só depois configura o resto (nome, almoxarifado, data,
  // quantidade). `tipo:null` = ainda no passo 1 (escolha do tipo).
  const [tipo, setTipo] = useState(null);
  const isImportado = tipo==='Lista Importada (Excel)';
  const isEspecificos = tipo==='Itens Específicos';
  const isPorGrupo = tipo==='Contagem por Grupo';

  // "Contagem por Grupo" — grupos disponíveis carregados sob demanda (só
  // quando esse tipo é escolhido, não vale a pena buscar sempre) via a RPC
  // grupos_com_estoque, que já filtra pros grupos com saldo carregado (evita
  // listar os ~248 grupos possíveis do catálogo, a maioria ainda vazia).
  const [grupos, setGrupos] = useState(null); // null = ainda não carregou
  // Vira array — pedido do cliente pra poder selecionar mais de um grupo na
  // mesma contagem, não só um.
  const [gruposSelecionados, setGruposSelecionados] = useState([]);

  const [arquivoNome, setArquivoNome] = useState('');
  const [itensImportados, setItensImportados] = useState(null);
  const [importResumo, setImportResumo] = useState(null);
  const [importErro, setImportErro] = useState('');
  const [salvando, setSalvando] = useState(false);
  const [erroCriacao, setErroCriacao] = useState('');
  const fileRef = useRef();

  // "Itens Específicos" — busca no catálogo real (mesma função/debounce já
  // usados em ManualCountFlow) pra montar a lista item por item, em vez de
  // subir uma planilha. Reaproveita o MESMO `itensImportados`/`canCreate`/
  // `handleCreate` da Lista Importada — só muda como a lista é montada.
  const [especBusca, setEspecBusca] = useState('');
  const [especResultados, setEspecResultados] = useState([]);
  const [especBuscando, setEspecBuscando] = useState(false);
  useEffect(()=>{
    if(!isEspecificos || especBusca.trim().length<2){ setEspecResultados([]); setEspecBuscando(false); return; }
    let cancelado = false;
    setEspecBuscando(true);
    const timer = setTimeout(async ()=>{
      const found = await searchSupabaseCatalog(especBusca);
      if(!cancelado){ setEspecResultados(found); setEspecBuscando(false); }
    }, 350);
    return ()=>{ cancelado = true; clearTimeout(timer); };
  }, [isEspecificos, especBusca]);

  function addItemEspecifico(p){
    setItensImportados(prev=>{
      const lista = prev || [];
      if(lista.some(it=>it.codigo===p.codigo)) return lista; // já adicionado, ignora clique duplicado
      return [...lista, {codigo:p.codigo, descricao:p.descricao, endereco:p.endereco||'', almoxarifado:'', saldoSistema:p.saldoSistema}];
    });
  }

  function removeItemEspecifico(codigo){
    setItensImportados(prev=>(prev||[]).filter(it=>it.codigo!==codigo));
  }

  useEffect(()=>{
    let cancelado = false;
    fetchEstoqueValorPorAlmoxarifado().then(rows=>{
      if(cancelado || !rows || rows.length===0) return;
      setArmazensValidos(rows.map(r=>String(r.almoxarifado)));
    });
    return ()=>{ cancelado = true; };
  }, []);

  useEffect(()=>{
    if(tipo!=='Contagem por Grupo' || grupos!==null) return;
    let cancelado = false;
    fetchGruposComEstoque(gruposExcluidos).then(lista=>{ if(!cancelado) setGrupos(lista); });
    return ()=>{ cancelado = true; };
  }, [tipo, grupos, gruposExcluidos]);

  const hojeStr = hojeLocalStr();

  function addAlmoxCode(){
    const bruto = almoxInput.trim();
    if(!bruto) return;
    if(!/^\d+$/.test(bruto)){
      setAlmoxErro('Informe só o número do armazém (ex.: 01, 4) — sem letras.');
      return;
    }
    const norm = normalizarCodigoAlmox(bruto);
    if(almoxCodes.includes(norm)){
      setAlmoxErro('Esse armazém já foi adicionado.');
      return;
    }
    if(armazensValidos && !armazensValidos.some(c=>normalizarCodigoAlmox(c)===norm)){
      setAlmoxErro('Armazém "' + bruto + '" não encontrado.');
      return;
    }
    setAlmoxCodes(prev=>[...prev, norm]);
    setAlmoxInput('');
    setAlmoxErro('');
  }

  function removeAlmoxCode(code){
    setAlmoxCodes(prev=>prev.filter(c=>c!==code));
  }

  const tipos = [
    {v:'Contagem Manual', d:'Operador escolhe os itens livremente'},
    {v:'Contagem Aleatória', d:'O sistema seleciona os itens automaticamente'},
    {v:'Contagem por Curva ABC', d:'Prioriza itens de maior valor ou giro'},
    {v:'Contagem por Rota de Endereço', d:'Sequência otimizada por corredor/rua'},
    {v:'Contagem por Grupo', d:'Conta só os itens de um grupo/família de produto específico'},
    {v:'Itens Específicos', d:'Você digita/busca exatamente quais itens entram na fila, um por um'},
    {v:'Lista Importada (Excel)', d:'Conta exatamente os itens de uma planilha importada, na ordem em que vieram'},
  ];

  // Rótulo pro nome automático: 1 grupo mostra a descrição inteira; mais de
  // um mostra os 2 primeiros + "e mais N" (senão o nome do inventário ficaria
  // absurdamente longo com vários grupos selecionados).
  const gruposLabel = useMemo(()=>{
    if(!isPorGrupo || gruposSelecionados.length===0) return null;
    const nomes = gruposSelecionados.map(cod => (grupos||[]).find(g=>g.grupo===cod)).filter(Boolean).map(g=>g.label);
    if(nomes.length<=2) return nomes.join(' + ');
    return nomes.slice(0,2).join(' + ') + ' + ' + (nomes.length-2) + ' outro' + (nomes.length-2===1?'':'s');
  }, [isPorGrupo, gruposSelecionados, grupos]);

  // "Quantidade de itens" some do formulário pra este tipo (pedido do
  // cliente) — a contagem já cobre TODOS os itens dos grupos escolhidos,
  // então a quantidade sai sozinha somando `qtdItens` de cada grupo
  // selecionado (já vem pronto de `grupos_com_estoque`), sem precisar
  // perguntar de novo pro usuário.
  const qtdItensGrupo = useMemo(()=>{
    if(!isPorGrupo) return 0;
    return gruposSelecionados.reduce((soma, cod)=>{
      const g = (grupos||[]).find(x=>x.grupo===cod);
      return soma + (g ? g.qtdItens : 0);
    }, 0);
  }, [isPorGrupo, gruposSelecionados, grupos]);

  // Nome do inventário: pra "Lista Importada" continua saindo do nome do
  // arquivo (setNome em handleFileUpload); pros outros tipos que ainda
  // passam por este formulário (Aleatória/Curva ABC/Rota/Grupo), é gerado
  // sozinho a partir de tipo+(grupo)+armazém+data, sem campo pra digitar —
  // recalcula a cada mudança de armazém/data/grupo, sempre único frente aos
  // inventários já criados.
  const nomeAuto = useMemo(()=>{
    if(!tipo || isImportado || isEspecificos) return '';
    return gerarNomeAutomaticoInventario(tipo, almoxCodes, data, (inventories||[]).map(i=>i.nome), gruposLabel);
  }, [tipo, isImportado, isEspecificos, almoxCodes, data, inventories, gruposLabel]);
  // "Itens Específicos" não tem um armazém único (os itens escolhidos podem
  // vir de qualquer almoxarifado) — nome gerado só a partir da data, sem
  // "Almox X" no meio (diferente de gerarNomeAutomaticoInventario, pensada
  // pros tipos que sempre têm um armazém associado).
  const nomeEspecificos = useMemo(()=>{
    if(!isEspecificos) return '';
    const [ano, mes, dia] = (data || '').split('-');
    const dataLabel = (dia && mes && ano) ? (dia + '/' + mes + '/' + ano) : '';
    const base = 'Itens Específicos' + (dataLabel ? (' — ' + dataLabel) : '');
    const usados = new Set((inventories||[]).map(i => String(i.nome || '').trim().toLowerCase()));
    if(!usados.has(base.toLowerCase())) return base;
    let n = 2;
    while(usados.has((base + ' #' + n).toLowerCase())) n++;
    return base + ' #' + n;
  }, [isEspecificos, data, inventories]);
  const nomeFinal = isImportado ? nome : (isEspecificos ? nomeEspecificos : nomeAuto);

  const usaListaPropria = isImportado || isEspecificos;
  const camposBasicosOk = nomeFinal.trim() && almoxCodes.length>0 && data && data>=hojeStr && (usaListaPropria || isPorGrupo || Number(qtd)>0) && (!isPorGrupo || gruposSelecionados.length>0);
  const canCreate = camposBasicosOk && (usaListaPropria ? !!(itensImportados && itensImportados.length>0) : true);

  function handleDownloadTemplate(){
    if(!window.XLSX) return;
    const wb = buildImportTemplateWorkbook();
    window.XLSX.writeFile(wb, 'GestaoEstoques_Modelo_Lista_Contagem.xlsx');
  }

  function handleFileUpload(e){
    const file = e.target.files[0];
    if(!file) return;
    setImportErro('');
    setArquivoNome(file.name);
    const reader = new FileReader();
    reader.onload = async (evt)=>{
      try{
        const data = new Uint8Array(evt.target.result);
        const wb = window.XLSX.read(data, {type:'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = window.XLSX.utils.sheet_to_json(sheet, {defval:''});
        const {itens, resumo} = parseImportedListRows(rows);
        if(itens.length===0){
          setImportErro('Nenhuma linha válida encontrada — verifique se a coluna "Código" está preenchida.');
          setItensImportados(null);
          setImportResumo(null);
          return;
        }
        setItensImportados(itens);
        setImportResumo(resumo);
        // "Lista Importada" pula os campos de nome/almoxarifado/data (ver
        // abaixo, escondidos pra esse tipo) — o nome do inventário sai
        // sozinho do nome do arquivo, sem precisar digitar nada.
        setNome(prev => prev.trim() ? prev : ('Lista Importada — ' + file.name.replace(/\.(xlsx|xls)$/i, '')));
        // Completa o resumo com "não encontrados"/"sem saldo" depois — busca
        // no catálogo real do Supabase, não trava a exibição inicial do resumo.
        const extras = await computeImportSummaryExtras(itens);
        setImportResumo(prev => prev ? {...prev, ...extras} : prev);
      } catch(err){
        setImportErro('Não foi possível ler o arquivo. Verifique se é um .xlsx válido.');
        setItensImportados(null);
        setImportResumo(null);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  // Criar inventário é ação do líder/admin — aguarda a confirmação do
  // Supabase (`onCreate` só navega/atualiza a lista depois de gravar lá,
  // ver App()) antes de sair da tela, mostrando erro em vez de fingir que
  // deu certo se a gravação falhar.
  async function handleCreate(){
    setSalvando(true);
    setErroCriacao('');
    const almoxarifado = almoxCodes.map(c=>c.padStart(2,'0')).join(', ');
    const res = await onCreate({
      id:'INV-'+Math.floor(Math.random()*900+100), nome:nomeFinal, almoxarifado, data, tipo,
      qtdItens: usaListaPropria ? itensImportados.length : (isPorGrupo ? qtdItensGrupo : Number(qtd)), status:'pendente', contados:0,
      ...(usaListaPropria ? {itensImportados} : {}),
      ...(isPorGrupo ? {grupo: gruposSelecionados.join(',')} : {}),
    });
    setSalvando(false);
    if(res && !res.ok) setErroCriacao(res.erro || 'Não foi possível criar o inventário — tente novamente.');
  }

  // Passo 1: só a escolha do tipo — cada card já navega pro passo 2 ao
  // clicar (não precisa de botão "Avançar" separado). Exceção: "Contagem
  // Manual" não cria inventário nenhum — pula direto pra tela de contagem
  // avulsa (mesmo destino que o operador já usa), sem pedir nome/
  // almoxarifado/data/quantidade, que não fazem sentido pra uma busca
  // pontual de item.
  if(!tipo){
    return (
      <div>
        <div className="field">
          <label>Tipo de inventário</label>
          <div className="radio-group">
            {tipos.map(t=>(
              <button
                key={t.v}
                type="button"
                className="item-card"
                style={{padding:18,textAlign:'left',border:'1px solid var(--line)',background:'var(--panel)',width:'100%'}}
                onClick={()=>{ if(t.v==='Contagem Manual'){ goto('manualCount'); return; } setTipo(t.v); }}
              >
                <div className="opt-title" style={{fontSize:15}}>{t.v}</div>
                <div className="opt-desc">{t.d}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <button className="back-btn" style={{marginBottom:14}} onClick={()=>setTipo(null)}><Ic>←</Ic> Trocar tipo de inventário</button>
      <div className="panel">
        <div className="role-note" style={{marginBottom:16}}>Tipo selecionado: <strong>{tipo}</strong></div>
        {!isImportado && !isEspecificos && (
          <>
            <div className="field">
              <label>Nome do inventário</label>
              <input type="text" value={nomeAuto} disabled title="Gerado automaticamente a partir do tipo, armazém e data — não é possível editar." />
              <div className="opt-desc" style={{marginTop:4}}>Gerado automaticamente, sem repetir nome de outro inventário.</div>
            </div>
            {isPorGrupo && (
              <div className="field">
                <label>Grupo (pode selecionar mais de um)</label>
                {grupos===null ? (
                  <div className="empty-state" style={{padding:14}}>Carregando grupos disponíveis…</div>
                ) : grupos.length===0 ? (
                  <div className="empty-state" style={{padding:14}}>Nenhum grupo com saldo carregado ainda.</div>
                ) : (
                  <GrupoMultiSelectField
                    grupos={grupos}
                    selecionados={gruposSelecionados}
                    onToggle={cod=>setGruposSelecionados(prev=>[...prev, cod])}
                    onRemove={cod=>setGruposSelecionados(prev=>prev.filter(c=>c!==cod))}
                  />
                )}
              </div>
            )}
            <div className="field">
              <label>Almoxarifado</label>
              <div className="chip-input">
                {almoxCodes.map(c=>(
                  <span key={c} className="chip">
                    {c.padStart(2,'0')}
                    <button type="button" onClick={()=>removeAlmoxCode(c)} aria-label={"Remover armazém "+c}>×</button>
                  </span>
                ))}
                <input
                  type="text"
                  inputMode="numeric"
                  value={almoxInput}
                  onChange={e=>{setAlmoxInput(e.target.value); setAlmoxErro('');}}
                  onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); addAlmoxCode(); } }}
                  onBlur={addAlmoxCode}
                  placeholder={almoxCodes.length ? 'Adicionar outro…' : 'Ex.: 01'}
                />
              </div>
              {almoxErro && <div className="field-erro">{almoxErro}</div>}
            </div>
            <div className="field">
              <label>Data</label>
              <input type="date" value={data} min={hojeStr} onChange={e=>setData(e.target.value)} />
            </div>
            {!isPorGrupo && (
              <div className="field">
                <label>Quantidade de itens</label>
                <input type="number" value={qtd} onChange={e=>setQtd(e.target.value)} onWheel={e=>e.target.blur()} placeholder="Ex.: 20" />
              </div>
            )}
          </>
        )}

        {isImportado && (
          <div className="field">
            <label>Lista de itens para contar</label>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <button type="button" className="btn btn-outline" onClick={handleDownloadTemplate}><Ic>⬇</Ic> Baixar modelo padrão (.xlsx)</button>
              <button type="button" className="btn btn-secondary" onClick={()=>fileRef.current.click()}>
                <Ic>📤</Ic> {arquivoNome ? 'Trocar arquivo (' + arquivoNome + ')' : 'Selecionar planilha preenchida (.xlsx)'}
              </button>
              <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={handleFileUpload} />
            </div>
            {importErro && <div className="login-error" style={{marginTop:10}}>{importErro}</div>}

        {isEspecificos && (
          <div className="field">
            <label>Buscar item por código ou descrição</label>
            <input type="text" value={especBusca} onChange={e=>setEspecBusca(e.target.value)} placeholder="Ex: 000.35310 ou parafuso" />
            {especBuscando && <div className="empty-state" style={{padding:14,marginTop:8}}>Buscando no catálogo…</div>}
            {!especBuscando && especBusca.trim().length>=2 && especResultados.length===0 && (

            )}

              const jaAdicionado = (itensImportados||[]).some(it=>it.codigo===p.codigo);
              return (
                <div key={p.codigo} className="list-row" style={{marginTop:8}}>
                  <div>
                    <div className="lr-title">{p.descricao}</div>
                    <div className="lr-sub">{p.codigo} · {p.enderecoCadastrado ? p.endereco : 'sem endereço cadastrado'}</div>
                  </div>
                  <button type="button" className="btn btn-outline" disabled={jaAdicionado} onClick={()=>addItemEspecifico(p)}>

              );

            <div className="opt-desc" style={{marginTop:16,marginBottom:6}}>
              <strong>{(itensImportados||[]).length}</strong> {(itensImportados||[]).length===1 ? 'item adicionado' : 'itens adicionados'} à fila

      </div>

      {isImportado && importResumo && (
        <div className="panel">
          <div className="section-title" style={{marginTop:0}}>Resumo da Importação</div>
          <div style={{fontSize:13,lineHeight:1.9}}>
            <div>Linhas na planilha: <strong>{importResumo.totalLinhas}</strong></div>
            <div>Itens válidos para contagem: <strong>{importResumo.validas}</strong></div>
            {importResumo.duplicadas>0 && <div>Códigos duplicados removidos: <strong>{importResumo.duplicadas}</strong></div>}
            {importResumo.semCodigo>0 && <div>Linhas sem código (ignoradas): <strong>{importResumo.semCodigo}</strong></div>}

            {importResumo.naoEncontrados>0 && (
              <div>&nbsp;&nbsp;↳ desses, com saldo do sistema trazido pela própria planilha (coluna "Sistema"): <strong>{importResumo.naoEncontrados - importResumo.semSaldoDisponivel}</strong></div>
            )}
          </div>
          {importResumo.semSaldoDisponivel>0 && (
            <div className="divergence-alert" style={{marginTop:12}}>
              <Ic>ℹ</Ic>
              <span><strong>{importResumo.semSaldoDisponivel}</strong> {importResumo.semSaldoDisponivel===1?'item':'itens'} não {importResumo.semSaldoDisponivel===1?'está':'estão'} no catálogo e a planilha não trouxe o saldo do sistema (coluna "Sistema") — ainda {importResumo.semSaldoDisponivel===1?'pode':'podem'} ser contado{importResumo.semSaldoDisponivel===1?'':'s'} normalmente, mas sem comparação automática (vai direto para revisão do líder).</span>
            </div>
          )}
        </div>
      )}

      {erroCriacao && <div className="divergence-alert" style={{marginBottom:14}}><Ic>⚠</Ic><span>{erroCriacao}</span></div>}
      <button className="btn btn-primary" disabled={!canCreate || salvando} onClick={handleCreate}>
        {salvando ? 'Criando…' : 'Criar Inventário'}
      </button>
    </div>
  );
}

// "Nova Contagem" — pra líder/admin, é literalmente o formulário de criar
// inventário (NewInventory, ver abaixo), já que o atalho "Criar novo
// inventário" foi removido (deixou de existir como entrada separada,
// pedido do cliente) e fundido aqui. Pra operador, continua sendo a tela
// rápida de sempre (contagem avulsa, sem inventário associado) — criar
// inventário sempre foi ação de líder/admin, essa fusão não muda isso.
function PickCountType({role, goto, onCreate, inventories, gruposExcluidos}){
  const podeGerir = role==='lider' || role==='admin';

  // Substitui o antigo `ANY_ADDRESS_REGISTERED` (derivado do cache local
  // estático, removido — ver CLAUDE.md "cache local removido"). Começa
  // desabilitado (mesmo comportamento de sempre, já que endereços cadastrados
  // ainda são raros) e libera assim que a checagem no Supabase responder.
  // Só usado pela tela do operador — hooks continuam declarados sem
  // condição (regra dos hooks), o efeito só faz alguma coisa quando
  // `podeGerir` é false.
  const [anyAddress, setAnyAddress] = useState(false);
  useEffect(()=>{
    if(podeGerir) return;
    let cancelado = false;
    fetchAnyAddressRegistered().then(v=>{ if(!cancelado) setAnyAddress(v); });
    return ()=>{ cancelado = true; };
  }, [podeGerir]);

  // "Contagem por Grupo" avulsa (sem criar inventário) — mesma ideia da
  // versão de líder/admin em NewInventory, só que pro operador escolher na
  // hora e já cair direto na fila (goto('randomCount', {grupo}) — RandomCountFlow
  // já sabe filtrar por `inv.grupo`, e como esse "inv" avulso não tem `.id`,
  // o incremento de `contados`/gravação de progresso é pulado sozinho, sem
  // nenhum tratamento especial extra aqui).
  const [grupoAvulsoAberto, setGrupoAvulsoAberto] = useState(false);
  const [gruposAvulso, setGruposAvulso] = useState(null);
  const [gruposAvulsoSelecionados, setGruposAvulsoSelecionados] = useState([]);
  useEffect(()=>{
    if(podeGerir || !grupoAvulsoAberto || gruposAvulso!==null) return;
    let cancelado = false;
    fetchGruposComEstoque(gruposExcluidos).then(lista=>{ if(!cancelado) setGruposAvulso(lista); });
    return ()=>{ cancelado = true; };
  }, [podeGerir, grupoAvulsoAberto, gruposAvulso, gruposExcluidos]);

  if(podeGerir){
    return <NewInventory onCreate={onCreate} goto={goto} inventories={inventories} gruposExcluidos={gruposExcluidos} />;
  }

  return (
    <div>
      <div className="radio-group">
        <button className="item-card" style={{padding:18,textAlign:'left',border:'1px solid var(--line)',background:'var(--panel)'}} onClick={()=>goto('randomCount')}>
          <div className="opt-title" style={{fontSize:15}}><Ic>🎲</Ic>&nbsp; Contagem Aleatória / por Rota Gerada</div>
          <div className="opt-desc">O sistema indica o próximo item e endereço a contar</div>
        </button>
        <button className="item-card" style={{padding:18,textAlign:'left',border:'1px solid var(--line)',background:'var(--panel)'}} onClick={()=>goto('manualCount')}>
          <div className="opt-title" style={{fontSize:15}}><Ic>⌨</Ic>&nbsp; Contagem Manual</div>
          <div className="opt-desc">Buscar item por código, descrição ou código de barras</div>
        </button>
        <button
          className="item-card"
          style={{padding:18,textAlign:'left',border:'1px solid var(--line)',background:'var(--panel)', opacity: anyAddress?1:0.5, cursor: anyAddress?'pointer':'not-allowed'}}
          disabled={!anyAddress}
          onClick={()=>{ if(anyAddress) goto('routeCount'); }}
        >
          <div className="opt-title" style={{fontSize:15}}><Ic>🗺</Ic>&nbsp; Contagem por Rota</div>
          <div className="opt-desc">{anyAddress ? 'Sequência otimizada por corredor e rua, menor deslocamento' : 'Indisponível — nenhum endereço cadastrado ainda neste almoxarifado'}</div>
        </button>
        <button className="item-card" style={{padding:18,textAlign:'left',border:'1px solid var(--line)',background:'var(--panel)'}} onClick={()=>setGrupoAvulsoAberto(v=>!v)}>
          <div className="opt-title" style={{fontSize:15}}><Ic>🏷</Ic>&nbsp; Contagem por Grupo</div>
          <div className="opt-desc">Contar só os itens de um grupo/família específico</div>
        </button>
        {grupoAvulsoAberto && (
          <div className="field" style={{marginTop:-6}}>
            {gruposAvulso===null ? (
              <div className="empty-state" style={{padding:14}}>Carregando grupos disponíveis…</div>
            ) : gruposAvulso.length===0 ? (
              <div className="empty-state" style={{padding:14}}>Nenhum grupo com saldo carregado ainda.</div>
            ) : (
              <>
                <GrupoMultiSelectField
                  grupos={gruposAvulso}
                  selecionados={gruposAvulsoSelecionados}
                  onToggle={cod=>setGruposAvulsoSelecionados(prev=>[...prev, cod])}
                  onRemove={cod=>setGruposAvulsoSelecionados(prev=>prev.filter(c=>c!==cod))}
                />
                <button
                  className="btn btn-primary"
                  style={{marginTop:10}}
                  disabled={gruposAvulsoSelecionados.length===0}
                  onClick={()=>{
                    // Soma qtdItens dos grupos escolhidos (já vem pronto de
                    // grupos_com_estoque) — sem isso, RandomCountFlow cairia
                    // no padrão de 5 itens (mesmo fallback da Aleatória
                    // avulsa), deixando de fora o resto do grupo.
                    const qtdItensGrupoAvulso = gruposAvulsoSelecionados.reduce((soma, cod)=>{
                      const g = gruposAvulso.find(x=>x.grupo===cod);
                      return soma + (g ? g.qtdItens : 0);
                    }, 0);
                    goto('randomCount', {grupo: gruposAvulsoSelecionados.join(','), qtdItens: qtdItensGrupoAvulso});
                  }}
                >Iniciar contagem</button>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------------- LEITOR DE CÂMERA (QR Code e Código de Barras) ---------------- */

function CameraScanner({onDetected, onCancel}){
  const containerId = useRef('scanner-'+Math.random().toString(36).slice(2,9)).current;
  const [status, setStatus] = useState('starting'); // starting | scanning | error
  const scannerRef = useRef(null);
  const doneRef = useRef(false);

  useEffect(()=>{
    let cancelled = false;
    async function start(){
      if(!window.Html5Qrcode){
        setStatus('error');
        return;
      }
      try{
        const formats = window.Html5QrcodeSupportedFormats ? [
          window.Html5QrcodeSupportedFormats.QR_CODE,
          window.Html5QrcodeSupportedFormats.CODE_128,
          window.Html5QrcodeSupportedFormats.CODE_39,
          window.Html5QrcodeSupportedFormats.EAN_13,
          window.Html5QrcodeSupportedFormats.EAN_8,
          window.Html5QrcodeSupportedFormats.UPC_A,
          window.Html5QrcodeSupportedFormats.ITF,
        ] : undefined;
        // useBarCodeDetectorIfSupported: usa a API nativa BarcodeDetector do
        // navegador (Chrome/Android — a plataforma alvo do app, ver
        // README.md "tablets Android") em vez do decodificador em JS puro
        // (ZXing) que a lib usa por padrão. O ZXing lê QR Code bem, mas é
        // bem menos confiável pra código de barras 1D (EAN-13, CODE-128) —
        // a API nativa é mais rápida e mais precisa pra esse caso quando o
        // navegador suporta (cai pro ZXing sozinho quando não suporta, ex:
        // Safari/iOS, sem quebrar nada lá).
        const scanner = new window.Html5Qrcode(containerId, {
          ...(formats ? {formatsToSupport: formats} : {}),
          useBarCodeDetectorIfSupported: true,
        });
        scannerRef.current = scanner;
        await scanner.start(
          {facingMode:'environment'},
          {fps:10, qrbox:{width:260, height:160}},
          (decodedText)=>{
            if(doneRef.current || cancelled) return;
            doneRef.current = true;
            onDetected(decodedText.trim());
          },
          ()=>{ /* ignora falhas de leitura por frame — é o comportamento normal enquanto mira */ }
        );
        if(!cancelled) setStatus('scanning');
      } catch(err){
        if(!cancelled) setStatus('error');
      }
    }
    start();
    return ()=>{
      cancelled = true;
      if(scannerRef.current){
        scannerRef.current.stop().then(()=>scannerRef.current.clear()).catch(()=>{});
      }
    };
  }, []);

  return (
    <div>
      <div className="scanner-wrap">
        <div id={containerId} className="scanner-viewport"></div>
      </div>
      {status==='error' && (
        <div className="login-error">Não foi possível acessar a câmera. Verifique a permissão do navegador ou use a digitação manual abaixo.</div>
      )}
      {status==='scanning' && <p className="scanner-hint">Aponte a câmera para o QR Code ou código de barras</p>}
      <button className="btn btn-secondary" onClick={onCancel} style={{marginBottom:14}}>Cancelar leitura</button>
    </div>
  );
}


function useCountQueue(items){
  const [idx, setIdx] = useState(0);
  const current = items[idx];
  const next = ()=> setIdx(i=>Math.min(i+1, items.length));
  const done = idx >= items.length;
  return {current, idx, total:items.length, next, done};
}

function CountStep({product, user, onComplete, onAddressProposed, inv, expectAddressCheck=true, numeroContagem=1, contagemAnteriorId=null, counts=[], previousCount=null, queueAtual=null, queueTotal=null, operadorVeSaldo=false}){
  // Bloqueia lançar uma contagem NOVA (1ª rodada) de um item que já tem um
  // documento em aberto em outro lugar do app (ex: contado numa lista de
  // inventário e ainda aguardando análise do líder, e alguém tenta contar o
  // mesmo código de novo via "Nova Contagem" avulsa). Recontagem legítima
  // (numeroContagem>1, vinda do RecountFlow) nunca é bloqueada — é
  // exatamente o fluxo que resolve o documento em aberto.
  const openDoc = numeroContagem===1 ? getOpenCountForProduct(counts, product.codigo) : null;
  if(openDoc){
    const info = STATUS_INFO[openDoc.statusAprovacao] || {};
    return (
      <div className="empty-state">
        <div className="ic"><Ic size={40}>🔒</Ic></div>
        <div style={{fontWeight:700,marginBottom:6}}>{product.codigo} já tem uma contagem em aberto</div>
        <div style={{maxWidth:420,margin:'0 auto'}}>
          {openDoc.recontagemSolicitadaPeloLider
            ? <>A divergência anterior não foi aceita — {openDoc.recontagemSolicitadaPor || 'o líder'} solicitou recontagem em {openDoc.recontagemSolicitadaEm||''}.</>
            : <>{info.text || 'Aguardando resolução.'}</>
          } Contado por {openDoc.usuario} em {openDoc.data} {openDoc.hora||''} · {openDoc.qtdContada} un.
        </div>
        <div style={{maxWidth:420,margin:'10px auto 0',fontSize:12.5,color:'var(--ink-dim)'}}>
          Não é possível lançar uma nova contagem deste item enquanto esse documento não for
          resolvido (aprovado ou recontado) — veja em "Recontagens".
        </div>
      </div>
    );
  }
  // Itens sem endereço cadastrado (comum enquanto o cadastro de endereços
  // ainda não existe no Protheus) pulam o QR Code e vão direto para a etapa
  // em que o operador INFORMA onde encontrou o item fisicamente.
  const hasAddress = expectAddressCheck && !!product.enderecoCadastrado;
  const needsAddressInput = expectAddressCheck && !product.enderecoCadastrado;
  const [step, setStep] = useState(hasAddress ? 'scan' : (needsAddressInput ? 'enderecoManual' : 'count'));
  const [scannedCode, setScannedCode] = useState('');
  const [addressOk, setAddressOk] = useState(null);
  const [enderecoInformado, setEnderecoInformado] = useState('');
  const [qty, setQty] = useState('');

  const [scanning, setScanning] = useState(false);
  // Verificação opcional do item por câmera dentro da própria tela de
  // contagem (botão 📷 ao lado do código) — só CONFIRMA que o código
  // escaneado bate com o item já carregado nesta tela (protege contra
  // contar o item errado por engano); não troca o item em exibição, isso
  // exigiria plumbing de re-busca/fila em cada um dos 5 fluxos que usam
  // este componente, fora do escopo deste redesenho.
  const [scanningItem, setScanningItem] = useState(false);
  const [itemScanFeedback, setItemScanFeedback] = useState(null);

  function handleItemVerifyScan(text){
    setScanningItem(false);
    const clean = text.trim();
    const bate = clean.toUpperCase() === String(product.codigo||'').toUpperCase();
    setItemScanFeedback({ok:bate, text: bate ? 'Código confere com o item em contagem.' : `Código lido (${clean}) não bate com ${product.codigo}.`});
  }

  function bumpQty(n){
    setQty(prev => String((Number(prev)||0) + n));
  }

  // Calculadora inline — pedido do cliente: itens contados em mais de um
  // lugar (ex: paletes/prateleiras diferentes) exigem somar antes de
  // lançar a quantidade final; em vez de fazer conta de cabeça ou trocar
  // de app pra usar a calculadora do aparelho, o operador soma aqui mesmo
  // e manda o resultado direto pro campo com um toque. Calculadora básica
  // de 4 operações (sempre um operador pendente por vez, sem precedência —
  // mesmo comportamento de uma calculadora de bolso comum).
  const [calcOpen, setCalcOpen] = useState(false);
  const [calcCurrent, setCalcCurrent] = useState('0');
  const [calcAcc, setCalcAcc] = useState(null);
  const [calcOp, setCalcOp] = useState(null);

  function calcApply(a, op, b){
    const x = parseFloat(a) || 0, y = parseFloat(b) || 0;
    if(op==='+') return x + y;
    if(op==='-') return x - y;
    if(op==='×') return x * y;
    if(op==='÷') return y===0 ? 0 : x / y;
    return y;
  }

  function calcDigit(d){
    setCalcCurrent(prev => (prev==='0' ? String(d) : prev + String(d)));
  }
  // O botão mostra "," (separador decimal em pt-BR), mas o estado interno
  // continua usando "." — é o formato que `parseFloat`/`calcApply` esperam
  // e o mesmo que o campo `qty` (input type="number") exige, não importa o
  // idioma. A troca "." → "," acontece só na hora de EXIBIR (`.replace`,
  // no display da calculadora), nunca no valor guardado.
  function calcDot(){
    setCalcCurrent(prev => prev.includes('.') ? prev : prev + '.');
  }
  function calcBackspace(){
    setCalcCurrent(prev => prev.length>1 ? prev.slice(0,-1) : '0');
  }
  function calcOperator(op){
    setCalcAcc(prev => String(prev==null ? calcCurrent : calcApply(prev, calcOp, calcCurrent)));
    setCalcOp(op);
    setCalcCurrent('0');
  }
  function calcEquals(){
    if(calcOp==null) return;
    setCalcCurrent(String(calcApply(calcAcc, calcOp, calcCurrent)));
    setCalcAcc(null);
    setCalcOp(null);
  }
  function calcClear(){
    setCalcAcc(null);
    setCalcOp(null);
    setCalcCurrent('0');
  }
  function calcUsarValor(){
    setQty(calcCurrent);
    setCalcOpen(false);
    calcClear();
  }

  function simulateScan(match){
    if(match){
      setScannedCode(product.endereco);
      setAddressOk(true);
    } else {
      // pick a plausible wrong neighboring address
      setScannedCode(product.endereco.slice(0,-1) + (((parseInt(product.endereco.slice(-1))+1)%9)||1));
      setAddressOk(false);
    }
  }

  function handleAddressScanDetected(text){
    setScanning(false);
    const clean = text.trim();
    const norm = clean.toUpperCase();
    const expected = (product.endereco||'').toUpperCase();
    setScannedCode(clean);
    setAddressOk(norm === expected);
    setStep('scanResult');
  }

  function handleEnderecoManualScanDetected(text){
    setScanning(false);
    setEnderecoInformado(formatEnderecoInput(text));
  }

  function confirmEnderecoManual(){
    if(onAddressProposed && ENDERECO_REGEX.test(enderecoInformado)){
      onAddressProposed({
        productCode: product.codigo,
        descricao: product.descricao,
        enderecoInformado,
        usuario: user.nome,
        data: hojeLocalStr(),
      });
    }
    setStep('count');
  }

  const hasSaldoLocal = typeof product.saldoSistema === 'number';
  // Controla só o que aparece NA TELA (referência antes de digitar, card de
  // comparação ao vivo, cor da borda do campo) — a regra de negócio real
  // (classifyDivergence/computeStatus, abaixo) continua sendo calculada do
  // mesmo jeito independente disso, então aprovação automática/segunda
  // contagem/análise do líder funcionam normalmente mesmo com a contagem
  // "às cegas". Líder/admin sempre veem; só o operador fica sujeito à
  // configuração `operadorVeSaldo` (Configurações → "Visibilidade do Saldo
  // na Contagem"). Quando não há saldo nenhum pra comparar (`!hasSaldoLocal`,
  // ex. item fora do catálogo), o fallback "sem saldo" sempre aparece pra
  // todo mundo — não há nada sensível a esconder nesse caso.
  const mostrarSaldo = hasSaldoLocal && (user.perfil !== 'operador' || operadorVeSaldo);
  const diffAbs = (qty!=='' && hasSaldoLocal) ? Number(qty) - product.saldoSistema : 0;
  const diffPct = (qty!=='' && hasSaldoLocal) ? (product.saldoSistema===0 ? 100 : (diffAbs/product.saldoSistema)*100) : 0;
  // `diffValor` (R$) é o que decide a classificação agora, não mais
  // `diffPct` — ver `classifyDivergence`. `diffPct`/`percentual` continuam
  // calculados e salvos na contagem (usados em indicadores/tendência
  // semanal, que não mudaram), só pararam de decidir aprovação.
  const diffValor = (qty!=='' && hasSaldoLocal) ? Math.abs(diffAbs) * Number(product.custoUnit || 0) : 0;
  // `custoConhecido`: `custoUnit` vale 0 tanto pra "produto sem custo" quanto
  // pra "custo desconhecido" (sem valor_financeiro cadastrado) — os dois
  // casos são indistinguíveis olhando só o número. Sem essa checagem,
  // qualquer diferença de quantidade num item sem custo cadastrado dava
  // `diffValor=0` e passava como "sem divergência" (bug real corrigido, ver
  // `classifyDivergenceSemCusto`) — só entra na exceção de fato quando a
  // diferença de QUANTIDADE também é zero (contagem bateu exata de verdade).
  const custoConhecido = Number(product.custoUnit) > 0;
  const classification = hasSaldoLocal
    ? (diffAbs !== 0 && !custoConhecido ? classifyDivergenceSemCusto() : classifyDivergence(diffValor))
    : {level:'warn', label:'Sem saldo para comparar', rule:'Nenhum saldo carregado para este código — revisão manual necessária'};
  const statusAprovacao = hasSaldoLocal ? computeStatus(numeroContagem, classification.level) : 'aguardando_analise_lider';
  // Recontagem (numeroContagem>=2) cuja diferença bate EXATAMENTE com a da
  // rodada anterior — cliente pediu esse sinal à parte pro líder ("Diferença
  // confirmada, seguir com ajuste"), distinto de uma recontagem que ainda
  // diverge só que com outro número (também vai pro líder, mas sem essa
  // mensagem). Compara a quantidade (`diffAbs`/`previousCount.diferenca`),
  // não o valor em R$, pra não depender de arredondamento de multiplicação.
  const diferencaConfirmada = !!(hasSaldoLocal && numeroContagem>=2 && previousCount && previousCount.diferenca===diffAbs);

  function finalize(){
    const count = {
      id: 'CNT-'+Math.random().toString(36).slice(2,8).toUpperCase(),
      productCode: product.codigo,
      descricao: product.descricao,
      endereco: product.endereco || enderecoInformado.toUpperCase() || '—',
      // Endereço onde o item foi FISICAMENTE contado — pode ser diferente do
      // cadastro acima quando o operador escaneia um endereço divergente e
      // opta por "Contar mesmo assim" (scannedCode), ou quando o item não
      // tinha cadastro e o operador informa onde encontrou (enderecoInformado).
      enderecoContado: scannedCode || (enderecoInformado ? enderecoInformado.toUpperCase() : '') || '',
      enderecoPendenteValidacao: needsAddressInput,
      usuario: user.nome,
      qtdContada: Number(qty),
      saldoSistema: hasSaldoLocal ? product.saldoSistema : null,
      diferenca: hasSaldoLocal ? diffAbs : null,
      percentual: hasSaldoLocal ? diffPct : null,
      valorDivergente: hasSaldoLocal ? (Math.abs(diffAbs) * Number(product.custoUnit)).toFixed(2) : '0.00',
      foraDoCacheLocal: !!product.foraDoCacheLocal,
      classificacao: classification,
      statusAprovacao,
      numeroContagem,
      contagemAnteriorId,
      // Recontagem cuja diferença bate exata com a rodada anterior — ver
      // comentário perto de `diferencaConfirmada`, acima.
      diferencaConfirmada,
      // Captura de foto/motivo da divergência foi removida da tela de
      // contagem (redesenho "coletor industrial" — pedido do cliente,
      // ver CLAUDE.md): a análise da divergência passou a acontecer só
      // depois, nos painéis de Recontagens/Itens Divergentes. Campos
      // mantidos vazios/false pra não quebrar o formato de `count` já
      // usado pelo Supabase/relatório Excel.
      motivo: '',
      foto: false,
      observacao: '',
      // Armazém onde o item foi contado — cliente reportou que sem isso
      // recontagens não sabiam contra qual armazém comparar o saldo (item
      // com saldo em mais de um armazém nunca batia). Guardado na própria
      // contagem pra RecountFlow poder repetir a comparação no armazém
      // certo, sem ambiguidade.
      almoxarifado: product.almoxarifado && product.almoxarifado!=='—' ? product.almoxarifado : null,
      // Família/grupo do produto (ex: "MAT EXPEDIENTE", ver describeGrupo) —
      // guardado na própria contagem pra alimentar o indicador "Divergência
      // por Família/Grupo" em Indicadores (Resumo da Operação) sem precisar
      // de uma consulta extra ao catálogo na hora de montar esse indicador.
      familia: product.familia || null,
      data: hojeLocalStr(),
      hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
      inventario: inv ? inv.id : '—',
      // Marcação de urgência (Recontagens/Itens Divergentes) — sempre começa
      // false; só é ligada depois, pelo líder/admin, direto nessas telas.
      urgente: false,
      // Marca como "ainda não confirmado no Supabase" — App() (via
      // registerFinishedCount) tenta gravar assim que a contagem chega lá, e
      // o ciclo de sync de 30s reenvia sozinho enquanto continuar true (ver
      // CLAUDE.md "Histórico único e centralizado").
      _syncPendente: true,
    };
    onComplete(count);
  }

  // Cabeçalho compacto (código + descrição) fica em cima só pra confirmar
  // qual item é, durante as etapas de endereço (que continuam exatamente
  // como eram — ver CLAUDE.md "Recontar Item vira coletor industrial").
  // A etapa 'count' (redesenhada) tem seu PRÓPRIO card de material, bem
  // maior — não repete este cabeçalho compacto, senão o código apareceria
  // duas vezes na mesma tela.
  const infoComplementar = (
    <div className="item-card">
      <div className="item-meta">
        <div className="m"><div className="k">Unidade</div><div className="v">{product.unidade || 'não informado'}</div></div>
        <div className="m"><div className="k">Família</div><div className="v">{product.familia}</div></div>
