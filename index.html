  // ---- Logout automûÀtico por inatividade ----
  // O Supabase Auth nûÈo tem timeout de inatividade nativo, entûÈo essa
  // camada segue por cima da sessûÈo real.
  useEffect(()=>{
    if(!currentUser) return;
    // Minutos configurados pelo admin (ConfiguraûÏûçes ã "Tempo de
    // Inatividade") ã cai pro padrûÈo de fûÀbrica se por algum motivo vier
    // vazio/invûÀlido do localStorage (ex.: campo zerado sem querer).
    const timeoutMs = (Number(sessionTimeoutMin) > 0 ? Number(sessionTimeoutMin) : DEFAULT_SESSION_TIMEOUT_MIN) * 60 * 1000;
    // `sessionStorage` sobrevive a um F5 mas ûˋ apagado quando a ABA/JANELA
    // fecha de verdade ã ûˋ exatamente essa distinûÏûÈo que separa os dois
    // cenûÀrios (ver comentûÀrio perto de `TAB_ABERTA_KEY`, acima):
    let jaDecorrido = 0;
    try{
      const abaJaEstavaAberta = sessionStorage.getItem(TAB_ABERTA_KEY)==='1';
      if(abaJaEstavaAberta){
        // F5/remontagem dentro da MESMA aba ã usa o tempo real decorrido
        // desde a û¤ltima atividade (protege o tablet compartilhado
        // esquecido logado, que ûˋ o motivo deste timer existir).
        const ultimaAtividade = loadLastActivity();
        jaDecorrido = ultimaAtividade ? (Date.now() - ultimaAtividade) : 0;
      } else {
        // Aba nova ã reabriu o navegador (com "Lembrar-me" marcado) ou ûˋ a
        // primeira vez nesta aba. Reabrir o app ûˋ presenûÏa de verdade, nûÈo
        // inatividade acumulada enquanto estava fechado ã trata como
        // atividade fresca (prazo cheio a partir de agora), senûÈo quem
        // marca "Lembrar-me" e volta depois de mais de `sessionTimeoutMin`
        // seria deslogado NA HORA ao reabrir, mesmo com a sessûÈo do
        // Supabase Auth ainda vûÀlida.
        touchLastActivity();
        sessionStorage.setItem(TAB_ABERTA_KEY, '1');
      }
    }catch(err){}
    let timer = setTimeout(()=>logout('SessûÈo encerrada por inatividade.'), Math.max(0, timeoutMs - jaDecorrido));
    function resetTimer(){
      clearTimeout(timer);
      touchLastActivity();
      timer = setTimeout(()=>logout('SessûÈo encerrada por inatividade.'), timeoutMs);
    }
    const events = ['click','keydown','touchstart','mousemove'];
    events.forEach(ev=>window.addEventListener(ev, resetTimer));
    return ()=>{ clearTimeout(timer); events.forEach(ev=>window.removeEventListener(ev, resetTimer)); };
  }, [currentUser, sessionTimeoutMin]);

  // ---- SincronizaûÏûÈo de inventûÀrios/contagens com o Supabase ----
  // localStorage continua sendo a fonte imediata (mostra na hora o que o
  // prû°prio aparelho fez) ã os dois efeitos abaixo cobrem duas coisas
  // DIFERENTES: este primeiro ûˋ sû° a fila de retry de GRAVAûûES que
  // falharam; o segundo (logo abaixo) ûˋ a sincronizaûÏûÈo de LEITURA com
  // outros aparelhos, agora via Realtime em vez de polling.
  //
  // Fila de retry de GRAVAûûES que falharam ã contagens marcadas
  // `_syncPendente` (ver registerFinishedCount) e incrementos de inventûÀrio
  // que falharam antes (ver getPendingIncrements/incrementContadosSupabase).
  // Independente da sincronizaûÏûÈo de LEITURA logo abaixo (que agora ûˋ via
  // Realtime, nûÈo polling) ã ûˋ o que garante que um aparelho que ficou
  // offline no meio de uma contagem sincroniza sozinho assim que a rede
  // voltar, sem precisar ninguûˋm abrir aquele tablet especificamente.
  useEffect(()=>{
    if(!currentUser || !supabaseClient) return;
    let cancelled = false;
    async function retry(){
      const contagensPendentes = countsRef.current.filter(c=>c._syncPendente);
      for(const c of contagensPendentes){
        if(cancelled) return;
        const res = await saveContagemToSupabase(c);
        if(res.ok) setCounts(prev=>prev.map(x=>x.id===c.id ? {...x, _syncPendente:false} : x));
      }
      const incrementosPendentes = getPendingIncrements();
      for(const invId of incrementosPendentes){
        if(cancelled) return;
        await incrementContadosSupabase(invId); // jûÀ cuida de add/remove da fila sozinho
      }
      if(!cancelled) setPendingIncrementsCount(getPendingIncrements().length);
    }
    retry();
    const interval = setInterval(retry, 30000);
    return ()=>{ cancelled = true; clearInterval(interval); };
  }, [currentUser]);

  // ---- SincronizaûÏûÈo em tempo real (Supabase Realtime) ã contagens,
  // inventûÀrios e endereûÏos propostos ----
  // Substitui o polling de 30s que existia aqui antes (o cliente confirmou
  // que prefere sincronizaûÏûÈo instantûÂnea entre aparelhos, aceitando que o
  // app dependa de conexûÈo pro caso comum ã ver CLAUDE.md). Cada canal
  // recebe um evento assim que OUTRO aparelho grava/atualiza/exclui uma
  // linha ã nûÈo precisa mais esperar atûˋ 30s pra um tablet ver o progresso
  // de outro no mesmo inventûÀrio. `users` tem seu prû°prio canal
  // independente (ver useEffect logo acima de `countsRef`).
  //
  // Cada canal aplica a MESMA regra de merge que o polling antigo jûÀ
  // usava: contagens/endereûÏos por `atualizadoEm` (`mergeByIdComTimestamp`),
  // inventûÀrios por `contados >= local.contados` (nûÈo tem coluna de
  // timestamp, entûÈo mantûˋm a lû°gica prû°pria). DELETE remove localmente
  // (contagens/inventûÀrios podem ser excluûÙdos ã deleteCount/
  // deleteInventory; endereûÏos propostos nunca sûÈo deletados, sû° mudam de
  // status, entûÈo nûÈo trata DELETE ali).
  //
  // Um evento isolado do Realtime sû° atualiza a LINHA daquele evento ã o
  // fetch completo (mesma reconciliaûÏûÈo de sempre) sû° roda quando cada
  // canal conecta/reconecta (`status==='SUBSCRIBED'`, dispara na conexûÈo
  // inicial e em toda reconexûÈo automûÀtica), pra cobrir qualquer mudanûÏa
  // perdida enquanto o canal estava desconectado (o Realtime nûÈo garante
  // reentrega de eventos de quando o cliente nûÈo estava ouvindo).
  useEffect(()=>{
    if(!currentUser || !supabaseClient) return;

    const canalContagens = supabaseClient
      .channel('realtime:contagens')
      .on('postgres_changes', {event:'*', schema:'public', table:'contagens'}, payload=>{
        if(payload.eventType==='DELETE'){
          setCounts(prev=>prev.filter(c=>c.id!==payload.old.id));
        } else {
          const row = contagemRowToLocal(payload.new);
          setCounts(prev=>mergeByIdComTimestamp(prev, [row], {timestampField:'atualizadoEm'}));
        }
      })
      .subscribe(status=>{
        if(status!=='SUBSCRIBED') return;
        fetchContagensFromSupabase().then(remote=>{
          if(remote.length) setCounts(prev=>mergeByIdComTimestamp(prev, remote, {timestampField:'atualizadoEm'}));
        });
      });

    const canalInventarios = supabaseClient
      .channel('realtime:inventarios')
      .on('postgres_changes', {event:'*', schema:'public', table:'inventarios'}, payload=>{
        if(payload.eventType==='DELETE'){
          setInventories(prev=>prev.filter(i=>i.id!==payload.old.id));
        } else {
          const row = inventarioRowToLocal(payload.new);
          setInventories(prev=>{
            const byId = new Map(prev.map(i=>[i.id, i]));
            const local = byId.get(row.id);
            if(!local || row.contados >= local.contados) byId.set(row.id, {...local, ...row});
            return Array.from(byId.values());
          });
        }
      })
      .subscribe(status=>{
        if(status!=='SUBSCRIBED') return;
        fetchInventoriesFromSupabase().then(remoteInv=>{
          if(remoteInv===null) return;
          setInventories(prev=>{
            const remoteIds = new Set(remoteInv.map(i=>i.id));
            const byId = new Map(prev.map(i=>[i.id, i]));
            remoteInv.forEach(ri=>{
              const local = byId.get(ri.id);
              if(!local || ri.contados >= local.contados) byId.set(ri.id, {...local, ...ri});
            });
            return Array.from(byId.values()).filter(i=>remoteIds.has(i.id));
          });
        });
      });

    const canalEnderecos = supabaseClient
      .channel('realtime:enderecos_propostos')
      .on('postgres_changes', {event:'*', schema:'public', table:'enderecos_propostos'}, payload=>{
        const row = enderecoPropostoRowToLocal(payload.new);
        setEnderecosPropostos(prev=>mergeByIdComTimestamp(prev, [row], {timestampField:'atualizadoEm'}));
      })
      .subscribe(status=>{
        if(status!=='SUBSCRIBED') return;
        fetchEnderecosPropostosFromSupabase().then(remote=>{
          if(remote.length) setEnderecosPropostos(prev=>mergeByIdComTimestamp(prev, remote, {timestampField:'atualizadoEm'}));
        });
      });

    return ()=>{
      supabaseClient.removeChannel(canalContagens);
      supabaseClient.removeChannel(canalInventarios);
      supabaseClient.removeChannel(canalEnderecos);
    };
  }, [currentUser]);

  // Evita mostrar a tela de login por uma fraûÏûÈo de segundo pra quem jûÀ tem
  // sessûÈo vûÀlida ã `getSession()` ûˋ assûÙncrono (ver useEffect acima), entûÈo
  // sem essa checagem o primeiro render sempre cairia em "nûÈo logado" antes
  // de saber a resposta de verdade. Tambûˋm espera o fetch do PRûPRIO perfil
  // terminar quando jûÀ existe uma sessûÈo (`currentUserId` setado mas
  // `currentUser` ainda nûÈo resolveu em `users`) ã se esse fetch falhar de
  // vez, o efeito acima jûÀ desloga sozinho, entûÈo isso nunca fica preso.
  if(!authReady || (currentUserId && !currentUser)){
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--bg)',color:'var(--ink-dim)',fontFamily:'var(--font-body)',fontSize:'var(--text-md)'}}>
        CarregandoãÎ
      </div>
    );
  }

  if(!currentUser){
    return (
      <LoginScreen
        onLogin={attemptLogin}
        onForgot={requestPasswordReset}
        onSelfSetPassword={selfSetNewPassword}
        notice={logoutNotice}
        clearNotice={()=>setLogoutNotice('')}
      />
    );
  }

  return (
    <div className="app">
      <Sidebar view={view} goto={gotoAndCloseSidebar} role={role} user={currentUser} collapsed={sidebarCollapsed} pendingSync={counts.filter(c=>c._syncPendente).length + pendingIncrementsCount} />
      <div className={"sidebar-backdrop"+(sidebarCollapsed?'':' visible')} onClick={()=>setSidebarCollapsed(true)}></div>
      <button
        className={"sidebar-toggle"+(sidebarCollapsed?' collapsed':'')}
        onClick={()=>setSidebarCollapsed(c=>!c)}
        title={sidebarCollapsed?'Mostrar menu':'Esconder menu'}
      >
        <DIcon name={sidebarCollapsed?'chevronRight':'chevronLeft'} size={14} />
      </button>
      <MobileNavBar onHome={()=>goto('home')} onVoltar={voltarUmPasso} podeVoltar={navHistory.length>0} />
      <div className="app-main">
      {!COUNT_SCREEN_VIEWS.includes(view) && (
        <>
          <TopBar user={currentUser} role={role} onHome={()=>goto('home')} onLogout={()=>logout('')} />
          <DesktopTopbar
            view={view}
            user={currentUser}
            role={role}
            onLogout={()=>logout('')}
            subtitle={VIEW_SUBTITLES[view]}
          />
        </>
      )}
      {view!=='home' && !COUNT_SCREEN_VIEWS.includes(view) && <SubBar view={view} goto={goto} />}
      <div className="content">
        {view==='home' && <Home role={role} user={currentUser} inventories={inventories} counts={counts} historicoConcluidas={historicoConcluidas} enderecosPropostos={enderecosPropostos} goto={goto} />}
        {view==='inventories' && hasAccess(currentUser,'inventories') && <InventoryList inventories={inventories} goto={goto} role={role} counts={counts} onDelete={deleteInventory} onCancel={cancelInventory} />}
        {view==='pickCountType' && hasAccess(currentUser,'pickCountType') && <PickCountType role={role} goto={goto} inventories={inventories} gruposExcluidos={gruposExcluidos} onCreate={async(inv)=>{
          const res = await saveInventarioToSupabase(inv);
          if(res.ok){ setInventories(prev=>[inv,...prev]); goto('inventories'); }
          return res;
        }} />}
        {view==='randomCount' && <RandomCountFlow inv={flowState} user={currentUser} counts={counts} onRegisterCount={registerFinishedCount} onFinish={()=>goto('inventories')} onAddressProposed={addAddressProposal} setInventories={setInventories} operadorVeSaldo={operadorVeSaldo} gruposExcluidos={gruposExcluidos} />}
        {view==='manualCount' && <ManualCountFlow user={currentUser} counts={counts} onFinish={(c)=>{registerFinishedCount(c); goto('home');}} onAddressProposed={addAddressProposal} operadorVeSaldo={operadorVeSaldo} />}
        {view==='routeCount' && <RouteCountFlow inv={flowState} user={currentUser} counts={counts} onRegisterCount={registerFinishedCount} onFinish={()=>goto('inventories')} onAddressProposed={addAddressProposal} setInventories={setInventories} operadorVeSaldo={operadorVeSaldo} gruposExcluidos={gruposExcluidos} />}
        {view==='importedListCount' && <ImportedListCountFlow inv={flowState} user={currentUser} counts={counts} onRegisterCount={registerFinishedCount} onFinish={()=>goto('inventories')} onAddressProposed={addAddressProposal} setInventories={setInventories} operadorVeSaldo={operadorVeSaldo} />}
        {view==='recounts' && hasAccess(currentUser,'recounts') && <RecountsPanel counts={counts} inventories={inventories} role={role} goto={goto} onDeleteCount={role==='admin' ? deleteCount : undefined} onToggleUrgente={toggleUrgente} operadorVeValoresRecontagem={operadorVeValoresRecontagem} />}
        {view==='divergentes' && hasAccess(currentUser,'divergentes') && <DivergentItemsPanel counts={counts} inventories={inventories} role={role} goto={goto} onApprove={approveDivergence} onSendToDiretoria={enviarParaAprovacaoDiretoria} onRequestRecount={requestRecountFromOperator} onDeleteCount={role==='admin' ? deleteCount : undefined} onToggleUrgente={toggleUrgente} />}
        {view==='aprovacaoDiretoria' && hasAccess(currentUser,'aprovacaoDiretoria') && <DiretoriaApprovalPanel counts={counts} inventories={inventories} role={role} onApproveSA={aprovarAjusteDiretoria} onRejectSA={reprovarAjusteDiretoria} />}
        {view==='todasDivergencias' && <AllDivergencesPanel counts={counts} historicoConcluidas={historicoConcluidas} goto={goto} />}
        {view==='concluidas' && hasAccess(currentUser,'concluidas') && <ConcludedCountsPanel counts={counts} inventories={inventories} historicoConcluidas={historicoConcluidas} onDeleteCount={role==='admin' ? deleteCount : undefined} onReprovarAjusteHistorico={role==='admin' ? reprovarAjusteHistorico : undefined} onRefresh={refreshHistoricoConcluidas} />}
        {view==='recount' && flowState && <RecountFlow original={flowState} user={currentUser} onAddressProposed={addAddressProposal} onFinish={(c)=>{registerFinishedCount(c); goto('recounts');}} operadorVeSaldo={operadorVeSaldo} />}
        {view==='dashboard' && hasAccess(currentUser,'dashboard') && <Dashboard counts={counts} inventories={inventories} historicoConcluidas={historicoConcluidas} historicoParaTendencia={historicoParaTendencia} goto={goto} />}
        {view==='relatorios' && hasAccess(currentUser,'relatorios') && <ReportsScreen counts={counts} inventories={inventories} currentUser={currentUser} sendHistory={reportSendHistory} onLogSend={logReportSend} role={role} onHistoricoImportado={refreshHistoricoConcluidas} />}
        {view==='settings' && hasAccess(currentUser,'settings') && <Settings role={role} currentUser={currentUser} operadorVeSaldo={operadorVeSaldo} onSetOperadorVeSaldo={updateOperadorVeSaldo} operadorVeValoresRecontagem={operadorVeValoresRecontagem} onSetOperadorVeValoresRecontagem={updateOperadorVeValoresRecontagem} gruposExcluidos={gruposExcluidos} onSetGruposExcluidos={updateGruposExcluidos} sessionTimeoutMin={sessionTimeoutMin} onSetSessionTimeoutMin={updateSessionTimeoutMin} />}
        {view==='usuarios' && hasAccess(currentUser,'usuarios') && (
          <UsuariosScreen
            users={users}
            currentUser={currentUser}
            goto={goto}
            successMessage={flowState && flowState.successMessage}
            onToggleUserStatus={toggleUserStatus}
            onDeleteUser={deleteUser}
            onAdminPasswordAction={applyAdminPasswordAction}
            passwordRequests={passwordRequests}
            onResolvePasswordRequest={resolvePasswordRequest}
            passwordHistory={passwordHistory}
          />
        )}
        {view==='enderecos' && hasAccess(currentUser,'enderecos') && (
          <AddressValidationPanel enderecosPropostos={enderecosPropostos} onResolve={resolveAddressProposal} />
        )}
        {view==='userForm' && hasAccess(currentUser,'usuarios') && flowState && (
          <UserForm
            mode={flowState.mode}
            initialData={flowState.initialData}
            users={users}
            onCreateUser={createUser}
            onUpdateUser={updateUser}
            onSaved={(msg)=>goto('usuarios', msg ? {successMessage:msg} : null)}
            onCancel={()=>goto('usuarios')}
          />
        )}
      </div>
      <BottomNav view={view} goto={goto} role={role} />
      </div>
    </div>
  );
}

function LoginScreen({onLogin, onForgot, onSelfSetPassword, notice, clearNotice}){
  const [mode, setMode] = useState('login'); // login | forgot | newPassword
  // "Lembrar-me": mantûˋm sû° o campo "UsuûÀrio ou e-mail" preenchido da
  // prû°xima vez (nunca a senha, ver `LOGIN_LEMBRADO_KEY`/`attemptLogin`) ã
  // se jûÀ existe um identificador lembrado de um login anterior, o campo jûÀ
  // abre preenchido com ele e o checkbox jûÀ abre marcado (reflete o que
  // estûÀ de fato acontecendo); senûÈo, os dois comeûÏam vazios/desmarcados.
  const [identifier, setIdentifier] = useState(()=>carregarLoginLembrado());
  const [lembrar, setLembrar] = useState(()=>!!carregarLoginLembrado());
  const [senha, setSenha] = useState('');
  const [showSenha, setShowSenha] = useState(false);
  const [error, setError] = useState('');
  const [forgotMsg, setForgotMsg] = useState('');
  // Mostrado na tela de login normal depois que "Nova senha" salva com
  // sucesso ã nûÈo tenta mais logar automaticamente (ver comentûÀrio em
  // `selfSetNewPassword`), entûÈo precisa deixar claro que a senha Jû foi
  // salva e o prû°ximo passo ûˋ logar com ela.
  const [successMsg, setSuccessMsg] = useState('');
  const [pendingUserId, setPendingUserId] = useState(null);
  const [novaSenha, setNovaSenha] = useState('');
  const [confirmaSenha, setConfirmaSenha] = useState('');
  const [salvandoSenha, setSalvandoSenha] = useState(false);
  // Login agora ûˋ uma chamada de rede de verdade (Supabase Auth) em vez de
  // uma checagem local instantûÂnea ã precisa de um estado de "enviando"
  // pra desabilitar o botûÈo e nûÈo deixar dois cliques dispararem duas
  // tentativas de login em paralelo.
  const [salvandoLogin, setSalvandoLogin] = useState(false);
  // Os outros dois toggles do formulûÀrio continuam puramente visuais
  // (mockup do cliente pede, mas sem funcionalidade real ã ver CLAUDE.md
  // "Login vira redesign premium"): o seletor de idioma nûÈo faz nada porque
  // o app sû° existe em pt-BR; "cû°digo de acesso" mostra uma nota honesta em
  // vez de fingir um QR-login que nûÈo existe (mesmo critûˋrio do sino de
  // notificaûÏûÈo no DesktopTopbar).
  const [qrNote, setQrNote] = useState(false);
  const senhaRef = useRef(null);

  // Enter no campo "UsuûÀrio ou e-mail" pula pro campo "Senha" em vez de
  // tentar logar direto (o formulûÀrio sû° tem os dois campos, entûÈo Enter
  // dentro de um <form> submeteria ã tinha que apertar Enter DUAS vezes,
  // uma pra "confirmar" o usuûÀrio sem querer e outra pra logar de verdade).
  // Sû° o campo de senha aciona o submit normal do form.
  function handleIdentifierKeyDown(e){
    if(e.key==='Enter'){
      e.preventDefault();
      senhaRef.current && senhaRef.current.focus();
    }
  }

  // Cliente reportou que, no celular, tocar num campo pra digitar exige
  // arrastar a tela manualmente pra ver o que estûÀ escrevendo ã o teclado
  // virtual cobre o campo e o navegador nûÈo rola sozinho atûˋ ele (a tela de
  // login ûˋ mais alta que a viewport visûÙvel quando o teclado abre, jûÀ que
  // a ilustraûÏûÈo ocupa bastante espaûÏo). Delegado num û¤nico handler no
  // container (React propaga foco/blur como qualquer evento) em vez de
  // repetir em cada <input> ã cobre os 3 modos (login/esqueci senha/nova
  // senha) de uma vez, inclusive se um campo novo for adicionado depois.
  // O atraso dûÀ tempo da animaûÏûÈo do teclado comeûÏar antes de rolar ã
  // rolar cedo demais rola pra posiûÏûÈo errada (calculada com o teclado
  // ainda fechado).
  function scrollCampoFocadoParaVisivel(e){
    if(!e.target || e.target.tagName!=='INPUT') return;
    const el = e.target;
    setTimeout(()=>{ el.scrollIntoView({behavior:'smooth', block:'center'}); }, 300);
  }

  async function submitLogin(e){
    e.preventDefault();
    setError('');
    setSuccessMsg('');
    setSalvandoLogin(true);
    const result = await onLogin(identifier, senha, lembrar);
    setSalvandoLogin(false);
    if(!result.ok){
      if(result.needsNewPassword){
        setPendingUserId(result.userId);
        setMode('newPassword');
      } else {
        setError(result.error);
      }
    }
  }

  function submitForgot(e){
    e.preventDefault();
    const msg = onForgot(identifier);
    setForgotMsg(msg);
  }

  async function submitNewPassword(e){
    e.preventDefault();
    setError('');
    if(novaSenha.length < 6){ setError('A nova senha deve ter pelo menos 6 caracteres.'); return; }
    if(novaSenha !== confirmaSenha){ setError('As senhas nûÈo coincidem.'); return; }
    setSalvandoSenha(true);
    const res = await onSelfSetPassword(pendingUserId, novaSenha);
    setSalvandoSenha(false);
    if(res && res.ok){

      // senha antiga que tinha sido digitada na 1ôˆ tentativa (o campo
      // "UsuûÀrio ou e-mail" continua preenchido, jûÀ que nunca foi limpo).
      setNovaSenha('');
      setConfirmaSenha('');
      setSenha('');
      setPendingUserId(null);
      setMode('login');
      setSuccessMsg('Senha definida com sucesso! FaûÏa login com sua nova senha.');
    } else if(res){
      setError(res.erro || 'NûÈo foi possûÙvel salvar a nova senha ã tente novamente.');
    }
  }

  return (
    <div className="login-page login-screen">
      <div className="login-shell login-card">
        <div className="login-brand">
          <BrandIllustration />
        </div>

        <div className="login-form-col">
          <div className="login-form-body" onFocus={scrollCampoFocadoParaVisivel}>

                <div className="login-field2 login-field">
                  <label>UsuûÀrio ou e-mail</label>
                  <div className="field-wrap2">
                    <span className="field-icon2"><LoginFieldIcon name="user" /></span>
                    <input type="text" value={identifier} onChange={e=>{setIdentifier(e.target.value); clearNotice&&clearNotice();}} onKeyDown={handleIdentifierKeyDown} placeholder="Digite seu usuûÀrio ou e-mail" autoCapitalize="none" autoFocus enterKeyHint="next" />
                  </div>
                </div>
                <div className="login-field2 login-field">
                  <label>Senha</label>
                  <div className="field-wrap2">
                    <span className="field-icon2"><LoginFieldIcon name="lock" /></span>
                    <input ref={senhaRef} className="has-toggle2" type={showSenha?'text':'password'} value={senha} onChange={e=>setSenha(e.target.value)} placeholder="Digite sua senha" enterKeyHint="go" />
                    <button type="button" className="pw-toggle2" onClick={()=>setShowSenha(s=>!s)} title={showSenha?'Ocultar senha':'Mostrar senha'}><EyeIcon off={showSenha} /></button>
                  </div>
                </div>

                <div className="login-row-between">
                  <button type="button" className="login-remember" onClick={()=>setLembrar(l=>!l)} title={lembrar ? 'O usuûÀrio/e-mail digitado vai ficar preenchido na prû°xima vez' : 'O campo nûÈo serûÀ preenchido automaticamente na prû°xima vez'}>
                    <span className={'cb-box'+(lembrar?' checked':'')}>{lembrar && <DIcon name="checkCircle" size={13} style={{marginTop:0}} />}</span>
                    Lembrar-me
                  </button>
                  <button type="button" className="login-forgot2" onClick={()=>{setMode('forgot'); setError(''); setForgotMsg('');}}>Esqueci minha senha</button>
                </div>

                <button className="login-btn2 login-btn" type="submit" disabled={salvandoLogin}><DIcon name="logIn" size={18} /> {salvandoLogin ? 'EntrandoãÎ' : 'Entrar'}</button>

                <div className="login-or2">ou</div>
                <button type="button" className="login-btn-outline" onClick={()=>setQrNote(v=>!v)}>
                  <DIcon name="qrCode" size={18} /> Entrar com cû°digo de acesso
                </button>
                {qrNote && <div className="login-inline-note2">Login por cû°digo de acesso ainda nûÈo estûÀ disponûÙvel.</div>}
              </form>
            )}

            {mode==='forgot' && (
              <form onSubmit={submitForgot}>

                {!forgotMsg ? (

                    <div className="login-field2 login-field">
                      <label>UsuûÀrio ou e-mail</label>
                      <div className="field-wrap2">

                      </div>
                    </div>

                )}

              </form>
            )}

            {mode==='newPassword' && (

                {error && <div className="login-error2">{error}</div>}

const ROLE_LABELS = {operador:'Operador', lider:'LûÙder de Estoque', admin:'Administrador'};

// Telas com um padrûÈo de acesso por perfil diferente do "liberado a todo
// mundo" ã usado sû° como PONTO DE PARTIDA (o que um usuûÀrio NOVO desse

// mapa continuam com o comportamento de sempre: liberadas por padrûÈo a

// tiradas de um usuûÀrio especûÙfico via `acessosRemovidos` (ver hasAccess).
const ACESSOS_RESTRITOS = {
  dashboard: ['lider','admin'],

  enderecos: ['lider','admin'],
  usuarios: ['admin'],
  // AprovaûÏûÈo de SA de Ajuste nûÈo interessa ao operador por padrûÈo ã ele nûÈo

// usuûÀrio (pedido do cliente: "todos os menus, tenham a opûÏûÈo de eu
// selecionar por operador se ele pode ter acesso ou nûÈo") ã usada pelo
// toggle em UserForm. "InûÙcio" fica de fora de propû°sito: ûˋ o destino de
// seguranûÏa pra onde o app redireciona sozinho quando alguûˋm perde acesso û 
// tela em que estava (ver useEffect logo abaixo de goto/voltarUmPasso em
// App()) ã nûÈo pode ser ela mesma bloqueûÀvel, senûÈo nûÈo sobraria destino
// nenhum pra redirecionar.
const TODOS_OS_MENUS = [
  {id:'inventories', label:'InventûÀrios'},
  {id:'pickCountType', label:'Nova Contagem'},
  {id:'recounts', label:'Recontagens'},
  {id:'divergentes', label:'Itens Divergentes'},

];

// Verdadeiro se o PERFIL sozinho (sem considerar exceûÏûçes por usuûÀrio) jûÀ
// libera essa tela ã telas fora de ACESSOS_RESTRITOS sempre liberam (mesmo
// comportamento de sempre).
function perfilLiberaPorPadrao(perfil, viewId){
  const perfisPadrao = ACESSOS_RESTRITOS[viewId];
  return !perfisPadrao || perfisPadrao.includes(perfil);
}

// Administrador NUNCA ûˋ bloqueado por nenhuma das duas listas ã decisûÈo
// deliberada pra nûÈo correr risco de um admin se autobloquear de uma tela
// crûÙtica (ex.: ConfiguraûÏûçes, UsuûÀrios) sem querer. Pra lûÙder/operador,
// `acessosRemovidos` (tira acesso que o perfil daria) tem prioridade sobre o
// padrûÈo do perfil, e `acessosExtras` continua concedendo o que o perfil
// sozinho nûÈo daria ã as duas listas juntas cobrem TODO o menu agora, nûÈo sû°
// as 4 telas que tinham essa opûÏûÈo antes.
function hasAccess(user, viewId){
  if(!user) return false;
  if(user.perfil==='admin') return true;
  if((user.acessosRemovidos||[]).includes(viewId)) return false;
  if(perfilLiberaPorPadrao(user.perfil, viewId)) return true;
  return (user.acessosExtras||[]).includes(viewId);
}

function Home({role, user, inventories, counts, historicoConcluidas=[], enderecosPropostos=[], goto}){
  // Bug real corrigido aqui: `i.status` ûˋ gravado como 'pendente' na criaûÏûÈo
  // do inventûÀrio e nunca ûˋ atualizado depois ã nunca vira 'concluido' de
  // verdade. Deriva de `contados`/`qtdItens` via `inventarioConcluido`
  // (mesma funûÏûÈo usada em `InventoryList`, mesmo critûˋrio do donut do
  // Dashboard), nûÈo do campo morto ã senûÈo esse badge/contador nunca
  // descontava um inventûÀrio 100% contado.
  const pendentes = inventories.filter(i=>!inventarioConcluido(i)).length;
  const byOriginal = {};
  counts.forEach(c=>{ if(c.contagemAnteriorId) byOriginal[c.contagemAnteriorId]=true; });
  // Bug real corrigido aqui: este KPI ("Recontagens Pendentes", clica e vai
  // pra `recounts`/RecountsPanel) somava TAMBûM `aguardando_analise_lider`
  // ã sobra de quando "Itens Divergentes" ainda era uma seûÏûÈo DENTRO de
  // RecountsPanel, antes da extraûÏûÈo pra tela prû°pria (ver CLAUDE.md
  // "'Itens Divergentes' vira tela prû°pria"). Depois da extraûÏûÈo,
  // RecountsPanel passou a mostrar sû° `aguardando_segunda` (ver
  // `aguardandoSegunda` ali), mas este cûÀlculo nunca foi atualizado ã o
  // cliente notou o card mostrando um nû¤mero (325) bem maior que a prû°pria
  // tela de Recontagens Pendentes (285), diferenûÏa batendo exatamente com
  // `itensDivergentesPendentes` (que jûÀ tem seu prû°prio KPI "Itens
  // Divergentes" logo ao lado, contando esse status separadamente ã estava
  // sendo contado duas vezes, uma em cada card). Corrigido pra contar sû° o
  // que a tela `recounts` de fato mostra.
  const pendentesRecontagem = counts.filter(c=>c.statusAprovacao==='aguardando_segunda' && !byOriginal[c.id]).length;
  // "Itens Divergentes" (KPI + tela prû°pria, ver DivergentItemsPanel) ã sû°
  // divergûˆncia que AINDA nûÈo entrou em processo de recontagem. Assim que o
  // item vira aguardando_segunda, some daqui (mesma regra da tela).
  const itensDivergentesPendentes = counts.filter(c=>c.statusAprovacao==='aguardando_analise_lider').length;
  // "AprovaûÏûÈo de Ajustes" (KPI + tela prû°pria, ver DiretoriaApprovalPanel) ã
  // SAs de ajuste geradas pelo lûÙder, aguardando decisûÈo da Diretoria. NûÈo
  // interessa ao operador (ele nûÈo participa dessa etapa), mesmo critûˋrio de
  // ACESSOS_RESTRITOS.aprovacaoDiretoria.
  const aguardandoDiretoria = counts.filter(c=>c.statusAprovacao==='aguardando_aprovacao_diretoria').length;
  const podeGerir = hasAccess(user,'enderecos');
  const pendentesEnderecos = enderecosPropostos.filter(e=>e.status==='pendente').length;

  // ---- Dashboard desktop: KPIs, atividades, aûÏûçes rûÀpidas, situaûÏûÈo dos inventûÀrios ----
  // (view "home" virou o Dashboard ã ver CLAUDE.md "Dashboard vira a tela inicial")
  const emAndamento = inventories.filter(i=>i.contados>0 && i.contados<i.qtdItens).length;
  const pendentesInicio = inventories.filter(i=>i.contados===0).length;

  const hojeStr = hojeLocalStr();
  const ontemStr = localDateStr(new Date(Date.now()-86400000));

  // Acuracidade cumulativa inclui o histû°rico importado (contagens_historico,
  // status jûÀ concluûÙdos) alûˋm das contagens ao vivo do app ã sem isso, a
  // Acuracidade do Estoque ficava artificialmente alta/vazia logo depois de
  // um reset, ignorando os milhares de contagens jûÀ resolvidas na planilha
  // antiga da Selgron. `historicoConcluidas` jûÀ tem os campos `data`/
  // `diferenca` com o mesmo nome/formato usado em `counts`, entûÈo dûÀ pra
  // juntar os dois arrays direto no filtro, sem conversûÈo.
  //
  // Bug real corrigido aqui: `c.data<=dataLimite` sozinho, com `c.data:null`
  // (~460 linhas da planilha antiga sem data, ver CLAUDE.md), avalia
  // `null<=dataLimite` como FALSE (JS converte null pra 0, e 0<=string vira
  // NaN na comparaûÏûÈo) ã excluûÙa silenciosamente todo item sem data do
  // cûÀlculo aqui, mesmo esses itens sendo contagens de verdade que
  // aconteceram antes de hoje. O card "Acuracidade do Estoque" de
  // Indicadores (Dashboard) nûÈo tem esse filtro de data ã nunca excluûÙa
  // esses itens ã e por isso os dois cards batiam nû¤mero diferente mesmo
  // depois do bug de null-como-divergûˆncia jûÀ ter sido corrigido. Item sem
  // data conta igual nos dois agora (`!c.data ||` cobre esse caso).
  function acumuladoAte(dataLimite){
    const relevantes = [...counts, ...historicoConcluidas].filter(c=>!c.data || c.data<=dataLimite);
    const divergentes = relevantes.filter(c=>c.diferenca!==0 && c.diferenca!==null);

/* ---------------- DASHBOARD (agora ûˋ a tela "home") ----------------
   Helpers usados pelo bloco desktop de `Home` (design corporativo/ERP ã ver
   CLAUDE.md "Dashboard vira a tela inicial"). Toda mûˋtrica vem de
   `counts`/`inventories` reais jûÀ existentes no app ã nada fabricado.
   Tendûˆncia dia-a-dia (vs. ontem) sû° ûˋ mostrada onde a comparaûÏûÈo ûˋ
   genuinamente derivûÀvel do campo `data` de cada contagem (cumulativo atûˋ uma
   data); para KPIs que sûÈo puro estado atual (sem histû°rico registrado ã
   inventûÀrios em andamento, recontagens pendentes) mostra uma nota contextual
   real em vez de inventar uma variaûÏûÈo percentual sem base de dados. */

function pnlTrendPct(atual, anterior){
  if(anterior===0) return atual===0 ? 0 : null;
  return ((atual-anterior)/anterior)*100;
}

function KpiTrend({pct, invert, suffix, compareLabel}){
  if(pct===null || pct===undefined){
    return null;
  }
  const flat = Math.abs(pct) < 0.05;
  const rising = pct > 0;
  const good = flat ? null : (invert ? !rising : rising);
  const cls = flat ? 'flat' : (good ? 'good' : 'bad');
  const icon = flat ? 'minus' : (rising ? 'trendingUp' : 'trendingDown');
  const sign = pct > 0 ? '+' : '';
  return (
    <span className={"pnl-kpi-trend "+cls}>
      <DIcon name={icon} size={11} />
      {sign}{pct.toFixed(1)}{suffix || '%'} {compareLabel || 'vs. ontem'}
    </span>
  );
}

function PnlDonut({segments, size=168, strokeWidth=22, centerLabel='inventûÀrios'}){
  const r = (size - strokeWidth) / 2;
  const c = 2 * Math.PI * r;
  const total = segments.reduce((s, x) => s + x.value, 0);
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--gray-100)" strokeWidth={strokeWidth} />
      {total > 0 && segments.map((seg, i) => {
        if (seg.value <= 0) return null;
        const len = (seg.value / total) * c;
        const dashoffset = -offset;
        offset += len;
        return (
          <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={seg.color} strokeWidth={strokeWidth}
            strokeDasharray={`${len} ${c - len}`} strokeDashoffset={dashoffset}
            transform={`rotate(-90 ${size/2} ${size/2})`} />
        );
      })}
      <text x="50%" y="47%" textAnchor="middle" fontSize="24" fontWeight="700" fill="var(--navy)" fontFamily="Inter, sans-serif">{total}</text>
      <text x="50%" y="63%" textAnchor="middle" fontSize="10.5" fill="var(--gray-500)" fontFamily="Inter, sans-serif">{centerLabel}</text>
    </svg>
  );
}

/* ---------------- MûDULO 1: INVENTûRIOS ---------------- */

// Um inventûÀrio ûˋ "concluûÙdo" quando todos os itens jûÀ foram contados ã
// derivado de `contados`/`qtdItens` (mesmo critûˋrio jûÀ usado no donut
// "SituaûÏûÈo Geral dos InventûÀrios" do Dashboard, `concluidosInv` em Home),
// nunca do campo `status`: esse campo ûˋ gravado como `'pendente'` na
// criaûÏûÈo e NUNCA ûˋ atualizado depois ã bug real reportado pelo cliente
// ("InventûÀrios concluûÙdos ainda estûÈo ficando nesta tela"), porque esta
// tela mostrava todo mundo sem filtro nenhum e o `StatusTag` de cada card
// tambûˋm lia esse mesmo campo morto (sempre "Pendente").
function inventarioConcluido(inv){
  return inv.qtdItens>0 && inv.contados>=inv.qtdItens;
}

function InventoryList({inventories, goto, role, counts, onDelete, onCancel}){
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  // `onDelete` agora aguarda confirmaûÏûÈo do Supabase antes de sumir com o
  // card (ver App()) ã `excluindo` desabilita os botûçes durante o envio,
  // `erroExclusao` mostra o motivo se falhar, mantendo o card visûÙvel.
  const [excluindo, setExcluindo] = useState(false);
  const [erroExclusao, setErroExclusao] = useState('');
  // Mesmo padrûÈo pro cancelamento (encerrar um inventûÀrio em andamento
  // mantendo sû° o que jûÀ foi contado) ã confirmaûÏûÈo inline prû°pria, separada
  // da de excluir (sûÈo aûÏûçes diferentes, um cancela e o outro apaga).
  const [confirmCancelId, setConfirmCancelId] = useState(null);
  const [cancelando, setCancelando] = useState(false);
  const [erroCancelamento, setErroCancelamento] = useState('');
  // SeûÏûÈo "ConcluûÙdos" comeûÏa FECHADA (pedido do cliente) ã o usuûÀrio
  // expande clicando na seta sû° quando quiser ver o que jûÀ foi finalizado,
  // sem isso ocupar espaûÏo por padrûÈo na tela. Estado puramente de UI, nûÈo
  // persiste (mesmo critûˋrio jûÀ usado pra `sidebarCollapsed`/navegaûÏûÈo).
  const [concluidosAbertos, setConcluidosAbertos] = useState(false);
  // Toggle "Itens"/"Ocultar itens" ã sû° faz sentido pros 2 tipos que guardam
  // uma lista FIXA de itens (`itensImportados`: Lista Importada/Itens
  // EspecûÙficos); os demais tipos (Aleatû°ria/Curva ABC/Rota/Grupo) montam a
  // fila na hora, via RPC, sem uma lista fixa pra mostrar aqui. VisûÙvel pra
  // qualquer perfil (sû° consulta, nûÈo ûˋ aûÏûÈo destrutiva) ã mesmo padrûÈo de
  // `Set` jûÀ usado pro toggle "Detalhes" em RecountsPanel/ConcludedCountsPanel.
  const [itensAbertosIds, setItensAbertosIds] = useState(()=>new Set());
  function toggleItens(id){
    setItensAbertosIds(prev=>{
      const next = new Set(prev);
      if(next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }

  if(inventories.length===0){
    return <div className="empty-state"><div className="ic"><Ic size={40}>ÞÎ</Ic></div>Nenhum inventûÀrio programado.</div>;
  }

  function handleDownload(inv){
    if(!window.XLSX) return;
    const invCounts = (counts||[]).filter(c=>c.inventario===inv.id);
    const wb = generateReportWorkbook(invCounts, [inv]);
    const nomeArquivo = inv.nome.replace(/[^\w]+/g,'_');
    window.XLSX.writeFile(wb, `GestaoEstoques_${inv.id}_${nomeArquivo}.xlsx`);
  }

  async function handleConfirmDelete(id){
    setExcluindo(true);
    setErroExclusao('');
    const res = await onDelete(id);
    setExcluindo(false);
    if(res && res.ok){
      setConfirmDeleteId(null);
    } else {
      setErroExclusao((res && res.erro) || 'NûÈo foi possûÙvel excluir ã tente novamente.');
    }
  }

  async function handleConfirmCancel(id){
    setCancelando(true);
    setErroCancelamento('');
    const res = await onCancel(id);
    setCancelando(false);
    if(res && res.ok){
      setConfirmCancelId(null);
    } else {
      setErroCancelamento((res && res.erro) || 'NûÈo foi possûÙvel cancelar ã tente novamente.');
    }
  }

  const pendentes = inventories.filter(inv=>!inventarioConcluido(inv));
  const concluidos = inventories.filter(inventarioConcluido);
  // ConcluûÙdos sû° interessa a quem gerencia ã pro operador, ver documentos
  // jûÀ fechados ali misturado com o que ainda precisa contar sû° gera
  // confusûÈo sobre o que de fato falta fazer.
  const podeVerConcluidos = role!=='operador';

  function renderCard(inv){
    const pct = inv.qtdItens ? Math.round((inv.contados/inv.qtdItens)*100) : 0;
    const concluido = inventarioConcluido(inv);
    // Continuar contando um inventûÀrio jûÀ concluûÙdo nûÈo faz sentido (a fila
    // jûÀ estûÀ vazia) ã sû° os cards ainda pendentes navegam pro fluxo de
    // contagem ao clicar; concluûÙdos sû° tûˆm as aûÏûçes de Baixar/Excluir.
    // "Contagem por Rota de EndereûÏo" tem motor prû°prio (RouteCountFlow) ã
    // deixa escolher o corredor a contar agora, em vez de cair na fila
    // genûˋrica (RandomCountFlow) usada pelos demais tipos nûÈo-importados.
    const destino = (inv.tipo==='Lista Importada (Excel)' || inv.tipo==='Itens EspecûÙficos') ? 'importedListCount'
      : inv.tipo==='Contagem por Rota de EndereûÏo' ? 'routeCount'

                    : `Cancelar "${inv.nome}"? Nenhum item foi contado ainda ã cancelar remove o inventûÀrio por completo.`

// Nome automûÀtico do inventûÀrio ã pedido do cliente: identificar de onde
// cada inventûÀrio veio (tipo + armazûˋm + data) sem precisar digitar nada, e
// nunca duplicar nome de um documento existente (checa contra os nomes jûÀ
// usados e acrescenta " #2", " #3"... se colidir).
const TIPO_ABREV_NOME = {
  'Contagem Aleatû°ria': 'Aleatû°ria',
  'Contagem por Curva ABC': 'Curva ABC',
  'Contagem por Rota de EndereûÏo': 'Rota',
  'Contagem por Grupo': 'Grupo',
};
function gerarNomeAutomaticoInventario(tipo, almoxCodes, data, nomesExistentes, grupoDescricao){
  const abrev = TIPO_ABREV_NOME[tipo] || tipo;
  const almoxLabel = (almoxCodes && almoxCodes.length) ? almoxCodes.map(c=>c.padStart(2,'0')).join('+') : 'ã';
  const [ano, mes, dia] = (data || '').split('-');
  const dataLabel = (dia && mes && ano) ? (dia + '/' + mes + '/' + ano) : '';
  // "Contagem por Grupo" acrescenta a descriûÏûÈo do grupo escolhido no nome
  // (ex.: "Grupo ã ACRILICOS ã Almox 01 ã 17/07/2026") ã sem isso, dois
  // inventûÀrios por grupo diferentes no mesmo dia/armazûˋm ficariam com o
  // mesmo nome base e sû° se diferenciariam pelo sufixo "#2" sem sentido.
  const base = abrev + (grupoDescricao ? (' ã ' + grupoDescricao) : '') + ' ã Almox ' + almoxLabel + (dataLabel ? (' ã ' + dataLabel) : '');
  const usados = new Set((nomesExistentes || []).map(n => String(n || '').trim().toLowerCase()));
  if(!usados.has(base.toLowerCase())) return base;
  let n = 2;
  while(usados.has((base + ' #' + n).toLowerCase())) n++;
  return base + ' #' + n;
}

// Campo de busca com chips pra selecionar mais de um grupo/famûÙlia de
// produto ã pedido do cliente: "conforme eu for digitando for filtrando na
// lista" + "ter a opûÏûÈo de selecionar mais de um grupo". Reaproveita o
// mesmo visual de chip do Almoxarifado (`.chip-input`/`.chip`), mas aqui a
// busca ûˋ por TEXTO livre na descriûÏûÈo (nûÈo cû°digo exato), entûÈo a lista de
// sugestûçes abaixo do campo filtra em tempo real por `.includes()` ã usado
// tanto em NewInventory (lûÙder/admin) quanto na versûÈo avulsa do operador em
// PickCountType, ambos sû° passam `grupos`/`selecionados`/callbacks.
function GrupoMultiSelectField({grupos, selecionados, onToggle, onRemove}){
  const [busca, setBusca] = useState('');
  const buscaNorm = busca.trim().toLowerCase();
  const disponiveis = (grupos||[]).filter(g => !selecionados.includes(g.grupo));
  // Busca casa tanto pelo nû¤mero do grupo quanto pela descriûÏûÈo ã `label`
  // jûÀ junta os dois ("01 - Chapas Inox"), entûÈo buscar "01" ou "chapas"
  // encontra o mesmo grupo.
  const sugestoes = buscaNorm ? disponiveis.filter(g => g.label.toLowerCase().includes(buscaNorm)) : disponiveis;
  const selecionadosObjs = selecionados.map(cod => (grupos||[]).find(g=>g.grupo===cod)).filter(Boolean);

  return (
    <div>
      <div className="chip-input">
        {selecionadosObjs.map(g=>(
          <span key={g.grupo} className="chip">
            {g.label}
            <button type="button" onClick={()=>onRemove(g.grupo)} aria-label={"Remover grupo "+g.label}>û</button>
          </span>
        ))}
        <input
          type="text"
          value={busca}
          onChange={e=>setBusca(e.target.value)}
          placeholder={selecionados.length ? 'Adicionar outro grupoãÎ' : 'Digite pra buscar um grupoãÎ'}
        />
      </div>
      {busca.trim() && (
        <div className="grupo-suggestions">
          {sugestoes.length===0 ? (
            <div className="grupo-suggestion-empty">Nenhum grupo encontrado para "{busca}".</div>
          ) : sugestoes.slice(0,30).map(g=>(
            <button
              key={g.grupo}
              type="button"
              className="grupo-suggestion-item"
              onClick={()=>{ onToggle(g.grupo); setBusca(''); }}
            >
              {g.label} <span className="grupo-suggestion-count">({g.qtdItens} {g.qtdItens===1?'item':'itens'})</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function NewInventory({onCreate, goto, inventories, gruposExcluidos}){
  const [nome, setNome] = useState('');
  // Almoxarifado virou multi-seleûÏûÈo (chips) ã comeûÏa com "01" prûˋ-adicionado,
  // dûÀ pra tirar e/ou adicionar outros. Sû° aceita cû°digo numûˋrico que exista
  // de verdade na planilha SB2 (estoque_saldo), buscado do Supabase ao montar
  // ã evita cadastrar inventûÀrio num armazûˋm que nûÈo existe.
  const [almoxCodes, setAlmoxCodes] = useState(['1']);
  const [almoxInput, setAlmoxInput] = useState('');
  const [almoxErro, setAlmoxErro] = useState('');
  const [armazensValidos, setArmazensValidos] = useState(null); // null = ainda nûÈo carregou (nûÈo bloqueia validaûÏûÈo nesse meio-tempo)
  const [data, setData] = useState(()=> hojeLocalStr());
  const [qtd, setQtd] = useState('');
  // Fluxo em 2 passos, pedido do cliente: primeiro escolhe o tipo de
  // inventûÀrio, sû° depois configura o resto (nome, almoxarifado, data,
  // quantidade). `tipo:null` = ainda no passo 1 (escolha do tipo).
  const [tipo, setTipo] = useState(null);
  const isImportado = tipo==='Lista Importada (Excel)';
  const isEspecificos = tipo==='Itens EspecûÙficos';
  const isPorGrupo = tipo==='Contagem por Grupo';

  // "Contagem por Grupo" ã grupos disponûÙveis carregados sob demanda (sû°
  // quando esse tipo ûˋ escolhido, nûÈo vale a pena buscar sempre) via a RPC
  // grupos_com_estoque, que jûÀ filtra pros grupos com saldo carregado (evita
  // listar os ~248 grupos possûÙveis do catûÀlogo, a maioria ainda vazia).
  const [grupos, setGrupos] = useState(null); // null = ainda nûÈo carregou
  // Vira array ã pedido do cliente pra poder selecionar mais de um grupo na
  // mesma contagem, nûÈo sû° um.
  const [gruposSelecionados, setGruposSelecionados] = useState([]);

  const [arquivoNome, setArquivoNome] = useState('');
  const [itensImportados, setItensImportados] = useState(null);
  const [importResumo, setImportResumo] = useState(null);
  const [importErro, setImportErro] = useState('');
  const [salvando, setSalvando] = useState(false);
  const [erroCriacao, setErroCriacao] = useState('');
  const fileRef = useRef();

  // "Itens EspecûÙficos" ã busca no catûÀlogo real (mesma funûÏûÈo/debounce jûÀ
  // usados em ManualCountFlow) pra montar a lista item por item, em vez de
  // subir uma planilha. Reaproveita o MESMO `itensImportados`/`canCreate`/
  // `handleCreate` da Lista Importada ã sû° muda como a lista ûˋ montada.
  const [especBusca, setEspecBusca] = useState('');
  const [especResultados, setEspecResultados] = useState([]);
  const [especBuscando, setEspecBuscando] = useState(false);
  useEffect(()=>{
    if(!isEspecificos || especBusca.trim().length<2){ setEspecResultados([]); setEspecBuscando(false); return; }
    let cancelado = false;
    setEspecBuscando(true);
    const timer = setTimeout(async ()=>{
      const found = await searchSupabaseCatalog(especBusca);
      if(!cancelado){ setEspecResultados(found); setEspecBuscando(false); }
    }, 350);
    return ()=>{ cancelado = true; clearTimeout(timer); };
  }, [isEspecificos, especBusca]);

  function addItemEspecifico(p){
    setItensImportados(prev=>{
      const lista = prev || [];
      if(lista.some(it=>it.codigo===p.codigo)) return lista; // jûÀ adicionado, ignora clique duplicado
      return [...lista, {codigo:p.codigo, descricao:p.descricao, endereco:p.endereco||'', almoxarifado:'', saldoSistema:p.saldoSistema}];
    });
  }

  function removeItemEspecifico(codigo){
    setItensImportados(prev=>(prev||[]).filter(it=>it.codigo!==codigo));
  }

  useEffect(()=>{
    let cancelado = false;
    fetchEstoqueValorPorAlmoxarifado().then(rows=>{
      if(cancelado || !rows || rows.length===0) return;
      setArmazensValidos(rows.map(r=>String(r.almoxarifado)));
    });
    return ()=>{ cancelado = true; };
  }, []);

  useEffect(()=>{
    if(tipo!=='Contagem por Grupo' || grupos!==null) return;
    let cancelado = false;
    fetchGruposComEstoque(gruposExcluidos).then(lista=>{ if(!cancelado) setGrupos(lista); });
    return ()=>{ cancelado = true; };
  }, [tipo, grupos, gruposExcluidos]);

  const hojeStr = hojeLocalStr();

  function addAlmoxCode(){
    const bruto = almoxInput.trim();
    if(!bruto) return;
    if(!/^\d+$/.test(bruto)){
      setAlmoxErro('Informe sû° o nû¤mero do armazûˋm (ex.: 01, 4) ã sem letras.');
      return;
    }
    const norm = normalizarCodigoAlmox(bruto);
    if(almoxCodes.includes(norm)){
      setAlmoxErro('Esse armazûˋm jûÀ foi adicionado.');
      return;
    }
    if(armazensValidos && !armazensValidos.some(c=>normalizarCodigoAlmox(c)===norm)){
      setAlmoxErro('Armazûˋm "' + bruto + '" nûÈo encontrado.');
      return;
    }
    setAlmoxCodes(prev=>[...prev, norm]);
    setAlmoxInput('');
    setAlmoxErro('');
  }

  function removeAlmoxCode(code){
    setAlmoxCodes(prev=>prev.filter(c=>c!==code));
  }

  const tipos = [
    {v:'Contagem Manual', d:'Operador escolhe os itens livremente'},
    {v:'Contagem Aleatû°ria', d:'O sistema seleciona os itens automaticamente'},
    {v:'Contagem por Curva ABC', d:'Prioriza itens de maior valor ou giro'},
    {v:'Contagem por Rota de EndereûÏo', d:'Sequûˆncia otimizada por corredor/rua'},
    {v:'Contagem por Grupo', d:'Conta sû° os itens de um grupo/famûÙlia de produto especûÙfico'},
    {v:'Itens EspecûÙficos', d:'Vocûˆ digita/busca exatamente quais itens entram na fila, um por um'},
    {v:'Lista Importada (Excel)', d:'Conta exatamente os itens de uma planilha importada, na ordem em que vieram'},
  ];

  // Rû°tulo pro nome automûÀtico: 1 grupo mostra a descriûÏûÈo inteira; mais de
  // um mostra os 2 primeiros + "e mais N" (senûÈo o nome do inventûÀrio ficaria
  // absurdamente longo com vûÀrios grupos selecionados).
  const gruposLabel = useMemo(()=>{
    if(!isPorGrupo || gruposSelecionados.length===0) return null;
    const nomes = gruposSelecionados.map(cod => (grupos||[]).find(g=>g.grupo===cod)).filter(Boolean).map(g=>g.label);
    if(nomes.length<=2) return nomes.join(' + ');
    return nomes.slice(0,2).join(' + ') + ' + ' + (nomes.length-2) + ' outro' + (nomes.length-2===1?'':'s');
  }, [isPorGrupo, gruposSelecionados, grupos]);

  // "Quantidade de itens" some do formulûÀrio pra este tipo (pedido do
  // cliente) ã a contagem jûÀ cobre TODOS os itens dos grupos escolhidos,
  // entûÈo a quantidade sai sozinha somando `qtdItens` de cada grupo
  // selecionado (jûÀ vem pronto de `grupos_com_estoque`), sem precisar
  // perguntar de novo pro usuûÀrio.
  const qtdItensGrupo = useMemo(()=>{
    if(!isPorGrupo) return 0;
    return gruposSelecionados.reduce((soma, cod)=>{
      const g = (grupos||[]).find(x=>x.grupo===cod);
      return soma + (g ? g.qtdItens : 0);
    }, 0);
  }, [isPorGrupo, gruposSelecionados, grupos]);

  // Nome do inventûÀrio: pra "Lista Importada" continua saindo do nome do
  // arquivo (setNome em handleFileUpload); pros outros tipos que ainda
  // passam por este formulûÀrio (Aleatû°ria/Curva ABC/Rota/Grupo), ûˋ gerado
  // sozinho a partir de tipo+(grupo)+armazûˋm+data, sem campo pra digitar ã
  // recalcula a cada mudanûÏa de armazûˋm/data/grupo, sempre û¤nico frente aos
  // inventûÀrios jûÀ criados.
  const nomeAuto = useMemo(()=>{
    if(!tipo || isImportado || isEspecificos) return '';
    return gerarNomeAutomaticoInventario(tipo, almoxCodes, data, (inventories||[]).map(i=>i.nome), gruposLabel);
  }, [tipo, isImportado, isEspecificos, almoxCodes, data, inventories, gruposLabel]);
  // "Itens EspecûÙficos" nûÈo tem um armazûˋm û¤nico (os itens escolhidos podem
  // vir de qualquer almoxarifado) ã nome gerado sû° a partir da data, sem
  // "Almox X" no meio (diferente de gerarNomeAutomaticoInventario, pensada
  // pros tipos que sempre tûˆm um armazûˋm associado).
  const nomeEspecificos = useMemo(()=>{
    if(!isEspecificos) return '';
    const [ano, mes, dia] = (data || '').split('-');
    const dataLabel = (dia && mes && ano) ? (dia + '/' + mes + '/' + ano) : '';
    const base = 'Itens EspecûÙficos' + (dataLabel ? (' ã ' + dataLabel) : '');
    const usados = new Set((inventories||[]).map(i => String(i.nome || '').trim().toLowerCase()));
    if(!usados.has(base.toLowerCase())) return base;
    let n = 2;
    while(usados.has((base + ' #' + n).toLowerCase())) n++;
    return base + ' #' + n;
  }, [isEspecificos, data, inventories]);
  const nomeFinal = isImportado ? nome : (isEspecificos ? nomeEspecificos : nomeAuto);

  const usaListaPropria = isImportado || isEspecificos;
  const camposBasicosOk = nomeFinal.trim() && almoxCodes.length>0 && data && data>=hojeStr && (usaListaPropria || isPorGrupo || Number(qtd)>0) && (!isPorGrupo || gruposSelecionados.length>0);
  const canCreate = camposBasicosOk && (usaListaPropria ? !!(itensImportados && itensImportados.length>0) : true);

  function handleDownloadTemplate(){
    if(!window.XLSX) return;
    const wb = buildImportTemplateWorkbook();
    window.XLSX.writeFile(wb, 'GestaoEstoques_Modelo_Lista_Contagem.xlsx');
  }

  function handleFileUpload(e){
    const file = e.target.files[0];
    if(!file) return;
    setImportErro('');
    setArquivoNome(file.name);
    const reader = new FileReader();
    reader.onload = async (evt)=>{
      try{
        const data = new Uint8Array(evt.target.result);
        const wb = window.XLSX.read(data, {type:'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = window.XLSX.utils.sheet_to_json(sheet, {defval:''});
        const {itens, resumo} = parseImportedListRows(rows);
        if(itens.length===0){
          setImportErro('Nenhuma linha vûÀlida encontrada ã verifique se a coluna "Cû°digo" estûÀ preenchida.');
          setItensImportados(null);
          setImportResumo(null);
          return;
        }
        setItensImportados(itens);

        const extras = await computeImportSummaryExtras(itens);

// "Nova Contagem" ã pra lûÙder/admin, ûˋ literalmente o formulûÀrio de criar
// inventûÀrio (NewInventory, ver abaixo), jûÀ que o atalho "Criar novo
// inventûÀrio" foi removido (deixou de existir como entrada separada,
// pedido do cliente) e fundido aqui. Pra operador, continua sendo a tela
// rûÀpida de sempre (contagem avulsa, sem inventûÀrio associado) ã criar
// inventûÀrio sempre foi aûÏûÈo de lûÙder/admin, essa fusûÈo nûÈo muda isso.
function PickCountType({role, goto, onCreate, inventories, gruposExcluidos}){
  const podeGerir = role==='lider' || role==='admin';

  // Substitui o antigo `ANY_ADDRESS_REGISTERED` (derivado do cache local
  // estûÀtico, removido ã ver CLAUDE.md "cache local removido"). ComeûÏa
  // desabilitado (mesmo comportamento de sempre, jûÀ que endereûÏos cadastrados
  // ainda sûÈo raros) e libera assim que a checagem no Supabase responder.
  // Sû° usado pela tela do operador ã hooks continuam declarados sem
  // condiûÏûÈo (regra dos hooks), o efeito sû° faz alguma coisa quando
  // `podeGerir` ûˋ false.
  const [anyAddress, setAnyAddress] = useState(false);
  useEffect(()=>{
    if(podeGerir) return;
    let cancelado = false;
    fetchAnyAddressRegistered().then(v=>{ if(!cancelado) setAnyAddress(v); });
    return ()=>{ cancelado = true; };
  }, [podeGerir]);

  // "Contagem por Grupo" avulsa (sem criar inventûÀrio) ã mesma ideia da
  // versûÈo de lûÙder/admin em NewInventory, sû° que pro operador escolher na
  // hora e jûÀ cair direto na fila (goto('randomCount', {grupo}) ã RandomCountFlow
  // jûÀ sabe filtrar por `inv.grupo`, e como esse "inv" avulso nûÈo tem `.id`,
  // o incremento de `contados`/gravaûÏûÈo de progresso ûˋ pulado sozinho, sem
  // nenhum tratamento especial extra aqui).
  const [grupoAvulsoAberto, setGrupoAvulsoAberto] = useState(false);
  const [gruposAvulso, setGruposAvulso] = useState(null);
  const [gruposAvulsoSelecionados, setGruposAvulsoSelecionados] = useState([]);
  useEffect(()=>{
    if(podeGerir || !grupoAvulsoAberto || gruposAvulso!==null) return;
    let cancelado = false;
    fetchGruposComEstoque(gruposExcluidos).then(lista=>{ if(!cancelado) setGruposAvulso(lista); });
    return ()=>{ cancelado = true; };
  }, [podeGerir, grupoAvulsoAberto, gruposAvulso, gruposExcluidos]);

  if(podeGerir){
    return <NewInventory onCreate={onCreate} goto={goto} inventories={inventories} gruposExcluidos={gruposExcluidos} />;
  }

  return (
    <div>
      <div className="radio-group">
        <button className="item-card" style={{padding:18,textAlign:'left',border:'1px solid var(--line)',background:'var(--panel)'}} onClick={()=>goto('randomCount')}>
          <div className="opt-title" style={{fontSize:'var(--text-lg)'}}><Ic>Þý</Ic>&nbsp; Contagem Aleatû°ria / por Rota Gerada</div>
          <div className="opt-desc">O sistema indica o prû°ximo item e endereûÏo a contar</div>
        </button>
        <button className="item-card" style={{padding:18,textAlign:'left',border:'1px solid var(--line)',background:'var(--panel)'}} onClick={()=>goto('manualCount')}>
          <div className="opt-title" style={{fontSize:'var(--text-lg)'}}><Ic>ã´</Ic>&nbsp; Contagem Manual</div>
          <div className="opt-desc">Buscar item por cû°digo, descriûÏûÈo ou cû°digo de barras</div>
        </button>
        <button
          className="item-card"
          style={{padding:18,textAlign:'left',border:'1px solid var(--line)',background:'var(--panel)', opacity: anyAddress?1:0.5, cursor: anyAddress?'pointer':'not-allowed'}}
          disabled={!anyAddress}
          onClick={()=>{ if(anyAddress) goto('routeCount'); }}
        >
          <div className="opt-title" style={{fontSize:'var(--text-lg)'}}><Ic>Þ¤</Ic>&nbsp; Contagem por Rota</div>
          <div className="opt-desc">{anyAddress ? 'Sequûˆncia otimizada por corredor e rua, menor deslocamento' : 'IndisponûÙvel ã nenhum endereûÏo cadastrado ainda neste almoxarifado'}</div>
        </button>
        <button className="item-card" style={{padding:18,textAlign:'left',border:'1px solid var(--line)',background:'var(--panel)'}} onClick={()=>setGrupoAvulsoAberto(v=>!v)}>
          <div className="opt-title" style={{fontSize:'var(--text-lg)'}}><Ic>Þñ</Ic>&nbsp; Contagem por Grupo</div>
          <div className="opt-desc">Contar sû° os itens de um grupo/famûÙlia especûÙfico</div>
        </button>
        {grupoAvulsoAberto && (
          <div className="field" style={{marginTop:-6}}>
            {gruposAvulso===null ? (
              <div className="empty-state" style={{padding:14}}>Carregando grupos disponûÙveisãÎ</div>
            ) : gruposAvulso.length===0 ? (
              <div className="empty-state" style={{padding:14}}>Nenhum grupo com saldo carregado ainda.</div>
            ) : (
              <>
                <GrupoMultiSelectField
                  grupos={gruposAvulso}
                  selecionados={gruposAvulsoSelecionados}
                  onToggle={cod=>setGruposAvulsoSelecionados(prev=>[...prev, cod])}
                  onRemove={cod=>setGruposAvulsoSelecionados(prev=>prev.filter(c=>c!==cod))}
                />
                <button
                  className="btn btn-primary"
                  style={{marginTop:10}}
                  disabled={gruposAvulsoSelecionados.length===0}
                  onClick={()=>{
                    // Soma qtdItens dos grupos escolhidos (jûÀ vem pronto de
                    // grupos_com_estoque) ã sem isso, RandomCountFlow cairia
                    // no padrûÈo de 5 itens (mesmo fallback da Aleatû°ria
                    // avulsa), deixando de fora o resto do grupo.
                    const qtdItensGrupoAvulso = gruposAvulsoSelecionados.reduce((soma, cod)=>{
                      const g = gruposAvulso.find(x=>x.grupo===cod);
                      return soma + (g ? g.qtdItens : 0);
                    }, 0);
                    goto('randomCount', {grupo: gruposAvulsoSelecionados.join(','), qtdItens: qtdItensGrupoAvulso});
                  }}
                >Iniciar contagem</button>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function CameraScanner({onDetected, onCancel}){
  const containerId = useRef('scanner-'+Math.random().toString(36).slice(2,9)).current;
  const [status, setStatus] = useState('starting'); // starting | scanning | error
  const scannerRef = useRef(null);
  const doneRef = useRef(false);

  useEffect(()=>{
    let cancelled = false;
    async function start(){
      if(!window.Html5Qrcode){
        setStatus('error');
        return;
      }
      try{
        const formats = window.Html5QrcodeSupportedFormats ? [
          window.Html5QrcodeSupportedFormats.QR_CODE,
          window.Html5QrcodeSupportedFormats.CODE_128,
          window.Html5QrcodeSupportedFormats.CODE_39,
          window.Html5QrcodeSupportedFormats.EAN_13,
          window.Html5QrcodeSupportedFormats.EAN_8,
          window.Html5QrcodeSupportedFormats.UPC_A,
          window.Html5QrcodeSupportedFormats.ITF,
        ] : undefined;
        // useBarCodeDetectorIfSupported: usa a API nativa BarcodeDetector do
        // navegador (Chrome/Android ã a plataforma alvo do app, ver
        // README.md "tablets Android") em vez do decodificador em JS puro
        // (ZXing) que a lib usa por padrûÈo. O ZXing lûˆ QR Code bem, mas ûˋ
        // bem menos confiûÀvel pra cû°digo de barras 1D (EAN-13, CODE-128) ã
        // a API nativa ûˋ mais rûÀpida e mais precisa pra esse caso quando o
        // navegador suporta (cai pro ZXing sozinho quando nûÈo suporta, ex:
        // Safari/iOS, sem quebrar nada lûÀ).
        const scanner = new window.Html5Qrcode(containerId, {
          ...(formats ? {formatsToSupport: formats} : {}),
          useBarCodeDetectorIfSupported: true,
        });
        scannerRef.current = scanner;
        await scanner.start(
          {facingMode:'environment'},
          {fps:10, qrbox:{width:260, height:160}},
          (decodedText)=>{
            if(doneRef.current || cancelled) return;
            doneRef.current = true;
            onDetected(decodedText.trim());
          },
          ()=>{ /* ignora falhas de leitura por frame ã ûˋ o comportamento normal enquanto mira */ }
        );
        if(!cancelled) setStatus('scanning');
      } catch(err){
        if(!cancelled) setStatus('error');
      }
    }
    start();
    return ()=>{
      cancelled = true;
      if(scannerRef.current){
        scannerRef.current.stop().then(()=>scannerRef.current.clear()).catch(()=>{});
      }
    };
  }, []);

  return (
    <div>
      <div className="scanner-wrap">
        <div id={containerId} className="scanner-viewport"></div>
      </div>
      {status==='error' && (
        <div className="login-error">NûÈo foi possûÙvel acessar a cûÂmera. Verifique a permissûÈo do navegador ou use a digitaûÏûÈo manual abaixo.</div>
      )}
      {status==='scanning' && <p className="scanner-hint">Aponte a cûÂmera para o QR Code ou cû°digo de barras</p>}
      <button className="btn btn-secondary" onClick={onCancel} style={{marginBottom:14}}>Cancelar leitura</button>
    </div>
  );
}


function useCountQueue(items){
  const [idx, setIdx] = useState(0);
  const current = items[idx];
  const next = ()=> setIdx(i=>Math.min(i+1, items.length));
  const done = idx >= items.length;
  return {current, idx, total:items.length, next, done};
}

function CountStep({product, user, onComplete, onAddressProposed, inv, expectAddressCheck=true, numeroContagem=1, contagemAnteriorId=null, counts=[], previousCount=null, queueAtual=null, queueTotal=null, operadorVeSaldo=false}){
  // Bloqueia lanûÏar uma contagem NOVA (1ôˆ rodada) de um item que jûÀ tem um
  // documento em aberto em outro lugar do app (ex: contado numa lista de
  // inventûÀrio e ainda aguardando anûÀlise do lûÙder, e alguûˋm tenta contar o
  // mesmo cû°digo de novo via "Nova Contagem" avulsa). Recontagem legûÙtima
  // (numeroContagem>1, vinda do RecountFlow) nunca ûˋ bloqueada ã ûˋ
  // exatamente o fluxo que resolve o documento em aberto.
  const openDoc = numeroContagem===1 ? getOpenCountForProduct(counts, product.codigo) : null;
  if(openDoc){
    const info = STATUS_INFO[openDoc.statusAprovacao] || {};
    return (
      <div className="empty-state">
        <div className="ic"><Ic size={40}>Þ</Ic></div>
        <div style={{fontWeight:700,marginBottom:6}}>{product.codigo} jûÀ tem uma contagem em aberto</div>
        <div style={{maxWidth:420,margin:'0 auto'}}>
          {openDoc.recontagemSolicitadaPeloLider
            ? <>A divergûˆncia anterior nûÈo foi aceita ã {openDoc.recontagemSolicitadaPor || 'o lûÙder'} solicitou recontagem em {openDoc.recontagemSolicitadaEm||''}.</>
            : <>{info.text || 'Aguardando resoluûÏûÈo.'}</>
          } Contado por {openDoc.usuario} em {openDoc.data} {openDoc.hora||''} ôñ {openDoc.qtdContada} un.

/* ---------------- MûDULO 2: CONTAGEM ALEATûRIA ---------------- */

function RandomCountFlow({inv, user, onRegisterCount, onFinish, onAddressProposed, setInventories, counts, operadorVeSaldo, gruposExcluidos}){
  // Armazûˋm obrigatû°rio em TODA contagem por este motor (pedido do
  // cliente: item com saldo em mais de um armazûˋm nunca batia, porque a
  // busca nûÈo era presa a um armazûˋm fûÙsico especûÙfico). Um inventûÀrio
  // criado via NewInventory jûÀ tem `inv.almoxarifado` (campo obrigatû°rio na
  // criaûÏûÈo) ã sû° a versûÈo AVULSA (Aleatû°ria/Grupo escolhidos direto na
  // tela rûÀpida do operador, sem criar inventûÀrio) ainda nûÈo tem essa
  // informaûÏûÈo, e precisa perguntar aqui antes de buscar qualquer item.
  const invAlmoxarifados = (inv && inv.almoxarifado) ? inv.almoxarifado.split(',').map(s=>normalizarCodigoAlmox(s)).filter(Boolean) : null;
  const [armazemAdHoc, setArmazemAdHoc] = useState('');
  const almoxarifadosFiltro = invAlmoxarifados || (armazemAdHoc ? [armazemAdHoc] : null);

  // Lista priorizada de itens vem do Supabase agora (RPC
  // contagem_itens_prioritarios ã cache local estûÀtico removido, ver
  // CLAUDE.md "cache local removido"). Critûˋrio: item sem saûÙda recente
  // primeiro, depois por valor financeiro decrescente (curva A) ã calculado
  // no banco, nûÈo mais no navegador. Busca uma vez ao montar (sû° depois do
  // armazûˋm definido); a fila (useCountQueue) e o retomar por "contados"
  // continuam iguais assim que a lista chega.
  const [allItems, setAllItems] = useState(null); // null = carregando
  useEffect(()=>{
    if(!almoxarifadosFiltro) return; // esperando o armazûˋm ser escolhido (avulso)
    let cancelado = false;
    const qtd = (inv && inv.qtdItens) || 5;
    // "Contagem por Grupo" filtra a busca pelos grupos salvos no inventûÀrio
    // (`inv.grupo`, texto com cû°digos separados por vûÙrgula ã pode ser mais
    // de um) ã os outros tipos passam `undefined`, sem filtro, mesmo
    // comportamento de sempre.
    const gruposFiltro = (inv && inv.grupo) ? inv.grupo.split(',').filter(Boolean) : undefined;
    fetchContagemItensPrioritarios(Math.max(qtd, 25), gruposFiltro, almoxarifadosFiltro, gruposExcluidos).then(itens=>{
      if(cancelado) return;
      // Sequûˆncia de endereûÏo: itens com endereûÏo cadastrado vûˆm primeiro,
      // ordenados por corredor ã rua ã endereûÏo (deslocamento fûÙsico menor);
      // itens sem endereûÏo cadastrado ainda ficam depois, na ordem por valor
      // (a RPC jûÀ devolve nessa ordem de valor/movimento).
      function ordenarPorEndereco(lista){
        const comEndereco = lista.filter(p=>p.enderecoCadastrado).sort((a,b)=>
          (a.corredor||'').localeCompare(b.corredor||'') ||
          (a.rua||'').localeCompare(b.rua||'') ||
          (a.endereco||'').localeCompare(b.endereco||'')
        );
        const semEndereco = lista.filter(p=>!p.enderecoCadastrado);
        return [...comEndereco, ...semEndereco];
      }
      // Prioriza itens que AINDA NûO foram contados (pedido do cliente) ã
      // um cû°digo com qualquer contagem jûÀ registrada (qualquer inventûÀrio/
      // rodada, qualquer status) sû° entra na fila se sobrar vaga depois de
      // esgotar os itens nunca contados. Snapshot de `counts` tirado no
      // momento em que a lista ûˋ montada (mesmo padrûÈo de "nûÈo re-sortear a
      // cada remontagem" jûÀ usado aqui) ã nûÈo muda a ordem no meio da fila.
      const codigosJaContados = new Set((counts||[]).map(c=>c.productCode));
      const naoContados = itens.filter(p=>!codigosJaContados.has(p.codigo));
      const jaContados = itens.filter(p=>codigosJaContados.has(p.codigo));
      setAllItems([...ordenarPorEndereco(naoContados), ...ordenarPorEndereco(jaContados)].slice(0, qtd));
    });
    return ()=>{ cancelado = true; };
    // `almoxarifadosFiltro`/`gruposExcluidos` sûÈo arrays recriados a cada
    // render ã usa a versûÈo "achatada" em texto como dependûˆncia (join),
    // senûÈo o efeito refaria a busca em TODO render sû° por causa da
    // identidade do array mudar.
  }, [inv, almoxarifadosFiltro ? almoxarifadosFiltro.join(',') : null, gruposExcluidos ? gruposExcluidos.join(',') : '']);

  // Ao voltar para este inventûÀrio no meio da fila, retoma a partir de
  // "contados" ã mesmo padrûÈo usado em ImportedListCountFlow ã em vez de
  // recomeûÏar do item 1 a cada re-entrada.
  const jaContados = inv ? (inv.contados || 0) : 0;
  const pendentes = useMemo(()=> allItems ? allItems.slice(jaContados) : [], [allItems, jaContados]);
  const q = useCountQueue(pendentes);

  if(!almoxarifadosFiltro){
    return <ArmazemGate onSelected={setArmazemAdHoc} />;
  }

  if(allItems===null){
    return <div className="empty-state" style={{padding:20}}>Carregando itens para contagemãÎ</div>;
  }

  if(q.done){
    return (
      <div className="empty-state">
        <div className="ic"><Ic size={40}>Þ</Ic></div>
        Fila de contagem concluûÙda.
        <div style={{marginTop:16}}><button className="btn btn-primary" onClick={onFinish}>Voltar aos inventûÀrios</button></div>
      </div>
    );
  }

  return (
    <div>
      <div className="role-note">Armazûˋm {almoxarifadosFiltro.map(a=>a.padStart(2,'0')).join(', ')} ôñ Itens ainda nûÈo contados primeiro, depois por sequûˆncia de endereûÏo{inv && inv.grupo ? (' ôñ Grupo: ' + inv.grupo.split(',').filter(Boolean).map(formatGrupoLabel).join(', ')) : ''}</div>
      <CountStep
        key={q.current.codigo}
        product={q.current}
        user={user}
        inv={inv}
        counts={counts}
        queueAtual={jaContados+q.idx+1}
        queueTotal={allItems.length}
        onAddressProposed={onAddressProposed}
        operadorVeSaldo={operadorVeSaldo}
        onComplete={(c)=>{
          if(inv && inv.id){ setInventories(prev=>prev.map(i=>i.id===inv.id?{...i, contados:i.contados+1}:i)); incrementContadosSupabase(inv.id); }
          onRegisterCount(c);
          q.next();
        }}
      />
    </div>
  );
}

// Escolha de armazûˋm, compartilhada pelos fluxos avulsos (Manual, Aleatû°ria/
// Grupo/Rota quando nûÈo vûˆm de um inventûÀrio jûÀ criado com almoxarifado
// definido) ã cliente reportou que um item com saldo em mais de um armazûˋm
// nunca batia na contagem, porque a comparaûÏûÈo nûÈo sabia em qual armazûˋm a

  const [armazens, setArmazens] = useState(null); // null = carregando

  }, []);

  return (
    <div>

      <div className="field">
        <label>Armazûˋm</label>
        {armazens===null ? (
          <div className="empty-state" style={{padding:14}}>Carregando armazûˋnsãÎ</div>
        ) : armazens.length===0 ? (
          <div className="empty-state" style={{padding:14}}>Nenhum armazûˋm com saldo carregado ainda.</div>
        ) : (
          <select value={valor} onChange={e=>setValor(e.target.value)}>
            <option value="">Selecione o armazûˋmãÎ</option>
            {armazens.map(a=>(
              <option key={a} value={a}>Armazûˋm {a.padStart(2,'0')}</option>
            ))}
          </select>
        )}
      </div>
      <button className="btn btn-primary" disabled={!valor} onClick={()=>onSelected(valor)}>Confirmar armazûˋm</button>
    </div>
  );
}

function ManualCountFlow({user, onFinish, onAddressProposed, counts, operadorVeSaldo}){
  const [armazem, setArmazem] = useState('');
  const [query, setQuery] = useState('');
  const [selected, setSelected] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);

  // Busca sû° no catûÀlogo real via Supabase (produtos + estoque_saldo +
  // estoque_enderecos, ver searchSupabaseCatalog) ã o cache local estûÀtico
  // de 300 SKUs foi removido (ver CLAUDE.md "cache local removido"), o
  // Supabase ûˋ a û¤nica fonte agora. Debounce de 350ms pra nûÈo disparar uma
  // requisiûÏûÈo a cada tecla. Sû° dispara depois do armazûˋm escolhido ã a
  // busca precisa saber em qual armazûˋm comparar o saldo.
  useEffect(()=>{
    if(!armazem || !query){ setResults([]); setLoading(false); return; }
    let cancelado = false;
    setLoading(true);
    const timer = setTimeout(async ()=>{
      const found = await searchSupabaseCatalog(query, armazem);
      if(!cancelado){ setResults(found); setLoading(false); }
    }, 350);
    return ()=>{ cancelado = true; clearTimeout(timer); };
  }, [query, armazem]);

  if(!armazem){
    return <ArmazemGate onSelected={setArmazem} />;
  }

  if(selected){
    return <CountStep product={selected} user={user} counts={counts} onAddressProposed={onAddressProposed} onComplete={(c)=>onFinish(c)} expectAddressCheck={true} operadorVeSaldo={operadorVeSaldo} />;
  }

  function handleScanDetected(text){
    setScanning(false);
    setQuery(text.trim());
  }

  return (
    <div>
      <div className="role-note" style={{marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
        <span>Contando no <strong>Armazûˋm {armazem.padStart(2,'0')}</strong></span>
        <button type="button" className="back-btn" style={{marginBottom:0}} onClick={()=>{ setArmazem(''); setQuery(''); setResults([]); }}>Trocar armazûˋm</button>
      </div>
      {scanning ? (
        <CameraScanner onDetected={handleScanDetected} onCancel={()=>setScanning(false)} />
      ) : (
        <button className="btn btn-primary" style={{marginBottom:14}} onClick={()=>setScanning(true)}><Ic>Þñ</Ic> Escanear cû°digo de barras / QR do item</button>
      )}
      <div className="field">
        <label>Ou buscar por cû°digo, descriûÏûÈo ou cû°digo de barras</label>
        <input type="text" value={query} onChange={e=>setQuery(e.target.value)} placeholder="Ex: 000.35310 ou parafuso" />
      </div>
      {loading && <div className="empty-state" style={{padding:20}}>Buscando no catûÀlogoãÎ</div>}
      {!loading && results.length===0 && query && <div className="empty-state" style={{padding:20}}>Nenhum item encontrado.</div>}
      {results.map(p=>(
        <div key={p.codigo} className="list-row" onClick={()=>setSelected(p)}>
          <div>
            <div className="lr-title">{p.descricao}</div>
            <div className="lr-sub">{p.codigo} ôñ {p.enderecoCadastrado ? p.endereco : 'sem endereûÏo cadastrado'}</div>
          </div>
          <span className="chevron"><Ic>ã¤</Ic></span>
        </div>
      ))}
    </div>
  );
}
