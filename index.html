<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Stock360 — Inventário Cíclico</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#EEF0F3" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg: #EEF0F3;
    --panel: #FFFFFF;
    --panel-raised: #F3F5F7;
    --line: #D7DBE1;
    --ink: #1A1C21;
    --ink-dim: #565C66;
    --safety: #F2B705;
    --safety-ink: #14161A;
    --ok: #1E8E4F;
    --ok-bg: #E3F6EA;
    --warn: #A35F00;
    --warn-bg: #FFF1D6;
    --danger: #C4291B;
    --danger-bg: #FBE6E3;
    --accent2: #1F6FA8;
    --radius: 10px;
    --font-display: 'Oswald', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);height:100%;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
  #root{min-height:100vh;display:flex;flex-direction:column;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  ::selection{background:var(--safety);color:var(--safety-ink);}

  .app{display:flex;flex-direction:column;min-height:100vh;max-width:900px;margin:0 auto;width:100%;background:var(--bg);position:relative;}

  /* TOPBAR */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:20;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--safety),#c78e02);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:var(--safety-ink);font-size:16px;flex-shrink:0;}
  .brand-text{font-family:var(--font-display);font-weight:600;letter-spacing:0.5px;font-size:19px;text-transform:uppercase;}
  .brand-text small{display:block;font-family:var(--font-mono);font-size:9px;color:var(--ink-dim);letter-spacing:1.5px;font-weight:500;text-transform:uppercase;margin-top:-2px;}
  .role-switch{display:flex;align-items:center;gap:8px;}
  .role-pill{font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.5px;text-transform:uppercase;background:var(--panel-raised);border:1px solid var(--line);color:var(--ink-dim);padding:7px 10px;border-radius:20px;display:flex;align-items:center;gap:6px;}
  .role-pill select{background:transparent;border:none;color:var(--ink);font-family:var(--font-mono);font-size:11px;text-transform:uppercase;outline:none;}
  .role-pill select option{background:var(--panel-raised);color:var(--ink);}
  .logout-btn{background:var(--panel-raised);border:1px solid var(--line);color:var(--ink-dim);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .logout-btn:active{background:var(--danger-bg);color:var(--danger);border-color:var(--danger);}

  /* BACK BAR */
  .subbar{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--bg);}
  .back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--ink-dim);font-size:14px;padding:6px 8px 6px 0;border-radius:6px;}
  .back-btn:active{background:var(--panel-raised);}
  .subbar h1{font-family:var(--font-display);font-size:17px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin:0;}

  .content{flex:1;padding:18px;padding-bottom:100px;}

  /* HOME CARDS */
  .grid-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (min-width:640px){.grid-cards{grid-template-columns:1fr 1fr 1fr;}}
  .home-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 16px;display:flex;flex-direction:column;gap:12px;align-items:flex-start;min-height:120px;position:relative;overflow:hidden;transition:transform .1s;}
  .home-card:active{transform:scale(0.97);background:var(--panel-raised);}
  .home-card .icon{font-size:26px;}
  .home-card .label{font-family:var(--font-display);font-size:15px;text-transform:uppercase;letter-spacing:0.3px;font-weight:600;line-height:1.25;}
  .home-card .badge{position:absolute;top:12px;right:12px;background:var(--safety);color:var(--safety-ink);font-family:var(--font-mono);font-weight:700;font-size:11px;padding:2px 7px;border-radius:20px;}
  .home-card.wide{grid-column:span 2;flex-direction:row;align-items:center;justify-content:space-between;}
  @media (min-width:640px){.home-card.wide{grid-column:span 3;}}

  .greet{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--safety);margin-bottom:4px;}
  .greet-title{font-family:var(--font-display);font-size:24px;font-weight:600;margin:0 0 20px 0;text-transform:uppercase;}

  /* BUTTONS */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 20px;border-radius:var(--radius);font-family:var(--font-display);font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;border:none;width:100%;}
  .btn-primary{background:var(--safety);color:var(--safety-ink);}
  .btn-primary:active{background:#d9a300;}
  .btn-secondary{background:var(--panel-raised);color:var(--ink);border:1px solid var(--line);}
  .btn-secondary:active{background:#2b2f36;}
  .btn-outline{background:transparent;color:var(--ink-dim);border:1px solid var(--line);}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-row{display:flex;gap:10px;}
  .btn-row .btn{flex:1;}
  .btn:disabled{opacity:0.4;}

  /* PANELS/FORMS */
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--ink-dim);margin-bottom:7px;}
  .field input[type=text],.field input[type=number],.field input[type=date],.field select,.field textarea{width:100%;background:var(--panel-raised);border:1px solid var(--line);color:var(--ink);padding:14px;border-radius:8px;font-size:16px;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--safety);outline-offset:0;}
  .field textarea{resize:vertical;min-height:70px;}
  .field .qty-input{font-family:var(--font-mono);font-size:28px;font-weight:700;text-align:center;padding:18px;}
  .radio-group{display:flex;flex-direction:column;gap:10px;}
  .radio-opt{display:flex;align-items:center;gap:12px;background:var(--panel-raised);border:1px solid var(--line);padding:14px;border-radius:8px;}
  .radio-opt.active{border-color:var(--safety);background:#2a2410;}
  .radio-opt input{width:20px;height:20px;accent-color:var(--safety);}
  .radio-opt .opt-title{font-weight:600;font-size:14.5px;}
  .radio-opt .opt-desc{font-size:12px;color:var(--ink-dim);margin-top:2px;}

  /* STATUS */
  .status-tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;padding:4px 9px;border-radius:20px;letter-spacing:0.3px;}
  .status-ok{background:var(--ok-bg);color:var(--ok);}
  .status-warn{background:var(--warn-bg);color:var(--warn);}
  .status-danger{background:var(--danger-bg);color:var(--danger);}
  .status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

  /* ITEM CARD (count item) */
  .item-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
  .item-card-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .item-code{font-family:var(--font-mono);font-size:13px;color:var(--safety);letter-spacing:0.5px;}
  .item-desc{font-family:var(--font-display);font-size:18px;font-weight:600;margin:4px 0 0 0;text-transform:uppercase;}
  .item-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 18px;}
  .item-meta .m{background:var(--panel-raised);border-radius:8px;padding:10px 12px;}
  .item-meta .m .k{font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;color:var(--ink-dim);letter-spacing:0.6px;}
  .item-meta .m .v{font-size:14.5px;font-weight:600;margin-top:3px;}
  .address-chip{font-family:var(--font-mono);font-size:20px;font-weight:700;letter-spacing:2px;background:var(--panel-raised);border:1px dashed var(--line);border-radius:8px;padding:14px;text-align:center;margin-bottom:14px;}

  /* QR SCAN VISUAL */
  .scan-box{position:relative;background:#0A0B0D;border:1px solid var(--line);border-radius:var(--radius);height:180px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:14px;}
  .scan-frame{width:120px;height:120px;position:relative;}
  .scan-frame::before,.scan-frame::after,.scan-corner-b1,.scan-corner-b2{content:'';position:absolute;width:26px;height:26px;border-color:var(--safety);}
  .scan-frame::before{top:0;left:0;border-top:3px solid var(--safety);border-left:3px solid var(--safety);}
  .scan-frame::after{top:0;right:0;border-top:3px solid var(--safety);border-right:3px solid var(--safety);}
  .scan-corner-b1{bottom:0;left:0;border-bottom:3px solid var(--safety);border-left:3px solid var(--safety);}
  .scan-corner-b2{bottom:0;right:0;border-bottom:3px solid var(--safety);border-right:3px solid var(--safety);}
  .scan-laser{position:absolute;left:6px;right:6px;height:2px;background:var(--safety);box-shadow:0 0 8px var(--safety);animation:laser 1.8s ease-in-out infinite;}
  @keyframes laser{0%{top:6px;}50%{top:110px;}100%{top:6px;}}

  /* LIVE CAMERA SCANNER (html5-qrcode) */
  .scanner-wrap{background:#0A0B0D;border-radius:var(--radius);overflow:hidden;margin-bottom:14px;border:1px solid var(--line);position:relative;}
  .scanner-viewport{width:100%;min-height:240px;}
  .scanner-viewport video{width:100% !important;display:block;}
  .scanner-hint{text-align:center;color:var(--ink-dim);font-size:12.5px;margin:-6px 0 14px 0;}
  .scan-toggle-row{display:flex;gap:10px;margin-bottom:14px;}
  .manual-fallback{background:var(--panel-raised);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:14px;}

  /* RESULT BANNER */
  .result-banner{border-radius:var(--radius);padding:20px;margin-bottom:16px;border:1px solid;}
  .result-banner.ok{background:var(--ok-bg);border-color:var(--ok);}
  .result-banner.warn{background:var(--warn-bg);border-color:var(--warn);}
  .result-banner.danger{background:var(--danger-bg);border-color:var(--danger);}
  .result-banner .rb-title{font-family:var(--font-display);font-size:18px;font-weight:700;text-transform:uppercase;margin:0 0 6px 0;}
  .result-banner .rb-sub{font-size:13.5px;color:var(--ink-dim);}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
  .result-grid .rg{background:rgba(255,255,255,0.04);border-radius:8px;padding:10px 12px;}
  .result-grid .rg .k{font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;color:var(--ink-dim);}
  .result-grid .rg .v{font-family:var(--font-mono);font-size:17px;font-weight:700;margin-top:2px;}

  /* LIST ROWS */
  .list-row{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;margin-bottom:10px;}
  .list-row:active{background:var(--panel-raised);}
  .list-row .lr-title{font-weight:600;font-size:14.5px;}
  .list-row .lr-sub{font-size:12px;color:var(--ink-dim);margin-top:3px;font-family:var(--font-mono);}
  .chevron{color:var(--ink-dim);font-size:18px;}

  .progress-bar{height:6px;background:var(--panel-raised);border-radius:4px;overflow:hidden;margin-top:8px;}
  .progress-bar .fill{height:100%;background:var(--safety);border-radius:4px;}

  /* DASHBOARD */
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
  @media (min-width:640px){.kpi-grid{grid-template-columns:repeat(4,1fr);}}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
  .kpi .kv{font-family:var(--font-mono);font-size:26px;font-weight:700;}
  .kpi .kl{font-size:11px;color:var(--ink-dim);margin-top:4px;text-transform:uppercase;letter-spacing:0.4px;}
  .section-title{font-family:var(--font-display);font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-dim);margin:24px 0 12px 0;display:flex;align-items:center;gap:8px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--line);}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .bar-row .bl{width:110px;font-size:12px;color:var(--ink-dim);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar-track{flex:1;height:20px;background:var(--panel-raised);border-radius:5px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--safety);border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;}
  .bar-fill span{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--safety-ink);}
  .rank-table{width:100%;border-collapse:collapse;}
  .rank-table th{text-align:left;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;color:var(--ink-dim);padding:8px 6px;border-bottom:1px solid var(--line);}
  .rank-table td{padding:10px 6px;border-bottom:1px solid var(--line);font-size:13px;}
  .rank-table td.num{font-family:var(--font-mono);text-align:right;}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--line);display:flex;max-width:900px;margin:0 auto;z-index:20;}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px 12px;background:none;border:none;color:var(--ink-dim);font-size:9.5px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.3px;}
  .nav-btn.active{color:var(--safety);}
  .nav-btn .ic{font-size:19px;}

  .empty-state{text-align:center;padding:50px 20px;color:var(--ink-dim);}
  .empty-state .ic{font-size:40px;margin-bottom:12px;}

  .divergence-alert{background:var(--warn-bg);border:1px solid var(--warn);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px;display:flex;gap:10px;align-items:flex-start;}

  .photo-preview{width:100%;height:140px;border-radius:8px;object-fit:cover;margin-top:10px;border:1px solid var(--line);}
  .photo-btn{border:1px dashed var(--line);background:var(--panel-raised);border-radius:8px;padding:16px;text-align:center;color:var(--ink-dim);font-size:13px;}

  .role-note{font-family:var(--font-mono);font-size:11px;color:var(--ink-dim);background:var(--panel-raised);border-radius:8px;padding:10px 12px;margin-bottom:16px;border-left:3px solid var(--accent2);}

  /* LOGIN SCREEN */
  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 20%, #ffffff 0%, var(--bg) 65%);padding:24px;}
  .login-card{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:36px 32px;box-shadow:0 12px 40px rgba(20,22,26,0.12);}
  .login-logo{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:8px;}
  .login-logo .mark{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--safety),#c78e02);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:var(--safety-ink);font-size:26px;}
  .login-title{font-family:var(--font-display);font-size:24px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;text-align:center;margin:0;}
  .login-subtitle{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-dim);text-align:center;letter-spacing:0.8px;text-transform:uppercase;margin:2px 0 28px 0;}
  .login-field{margin-bottom:16px;position:relative;}
  .login-field label{display:block;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--ink-dim);margin-bottom:7px;}
  .login-field input{width:100%;background:var(--panel-raised);border:1px solid var(--line);color:var(--ink);padding:16px;border-radius:10px;font-size:17px;}
  .login-field input:focus{outline:2px solid var(--safety);}
  .pw-toggle{position:absolute;right:12px;top:38px;background:none;border:none;color:var(--ink-dim);font-size:13px;font-family:var(--font-mono);text-transform:uppercase;}
  .login-error{background:var(--danger-bg);border:1px solid var(--danger);color:var(--danger);border-radius:8px;padding:12px 14px;font-size:13px;margin-bottom:16px;}
  .login-success{background:var(--ok-bg);border:1px solid var(--ok);color:var(--ok);border-radius:8px;padding:12px 14px;font-size:13px;margin-bottom:16px;}
  .login-notice{background:var(--warn-bg);border:1px solid var(--warn);color:var(--warn);border-radius:8px;padding:12px 14px;font-size:13px;margin-bottom:16px;}
  .login-forgot{display:block;text-align:center;margin-top:18px;background:none;border:none;color:var(--ink-dim);font-size:13px;text-decoration:underline;text-underline-offset:3px;width:100%;padding:8px;}
  .login-back{display:block;text-align:center;margin-top:14px;background:none;border:none;color:var(--ink-dim);font-size:13px;width:100%;padding:8px;}
  .demo-creds{margin-top:26px;background:var(--panel-raised);border:1px dashed var(--line);border-radius:10px;padding:14px;}
  .demo-creds .dc-title{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.6px;color:var(--ink-dim);margin-bottom:8px;}
  .demo-creds .dc-row{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11.5px;padding:4px 0;color:var(--ink);}
  .demo-creds .dc-row span:last-child{color:var(--ink-dim);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const {useState, useMemo, useRef, useEffect} = React;

/* ---------------- MOCK DATA ---------------- */

// SEGURANÇA — NOTA IMPORTANTE: este protótipo roda 100% no navegador, sem
// backend. As "senhas" abaixo ficam em texto puro em memória só para permitir
// testar o fluxo de login. Isso NUNCA deve ir para produção: no sistema real,
// a senha nunca trafega nem fica visível para o admin — o Supabase Auth cuida
// do hash (bcrypt) e da comparação no servidor. O botão "gerar senha
// temporária" aqui mostra o valor em texto só para o protótipo simular o
// admin repassando a senha ao operador; em produção isso seria exibido uma
// única vez e nunca fica gravado em log.
const USERS_SEED = [
  {id:'u1', nome:'Carlos Mendes', usuario:'carlos.mendes', email:'carlos.mendes@empresa.com', senha:'operador123', perfil:'operador', status:'ativo'},
  {id:'u2', nome:'Fernanda Lima', usuario:'fernanda.lima', email:'fernanda.lima@empresa.com', senha:'operador123', perfil:'operador', status:'ativo'},
  {id:'u3', nome:'Roberto Alves', usuario:'roberto.alves', email:'roberto.alves@empresa.com', senha:'lider123', perfil:'lider', status:'ativo'},
  {id:'u4', nome:'Alisson', usuario:'alisson', email:'alisson@empresa.com', senha:'admin123', perfil:'admin', status:'ativo'},
];

function generateTempPassword(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let out = '';
  for(let i=0;i<8;i++) out += chars[Math.floor(Math.random()*chars.length)];

function classifyDivergence(pct){
  const abs = Math.abs(pct);
  if(abs === 0) return {level:'ok', label:'Sem divergência', rule:'Aprovado automaticamente'};
  if(abs <= 5) return {level:'ok', label:'Dentro da tolerância', rule:'Aprovação automática'};
  if(abs <= 15) return {level:'warn', label:'Divergência moderada', rule:'Segunda contagem solicitada'};
  return {level:'danger', label:'Divergência crítica', rule:'Enviado para análise do líder'};
}

// MÓDULO 7 — regra de segunda contagem, aplicada sobre o resultado de CADA
// contagem (a 1ª ou qualquer recontagem seguinte):
//  ≤5%           → aprovado (automaticamente na 1ª, ou confirmado na recontagem)
//  5–15% na 1ª   → aguarda segunda contagem, feita por outro operador
//  >15% na 1ª, ou qualquer recontagem que ainda divirja acima de 5%
//                → vai para análise do líder de estoque
function computeStatus(numeroContagem, level){
  if(level==='ok') return numeroContagem===1 ? 'aprovado_auto' : 'aprovado_segunda';
  if(numeroContagem===1) return level==='warn' ? 'aguardando_segunda' : 'aguardando_analise_lider';
  return 'aguardando_analise_lider';
}

const STATUS_INFO = {
  aprovado_auto: {level:'ok', text:'Aprovado automaticamente'},
  aprovado_segunda: {level:'ok', text:'Aprovado — a recontagem confirmou o saldo dentro da tolerância'},
  aguardando_segunda: {level:'warn', text:'Segunda contagem solicitada — deve ser feita por outro operador'},
  aguardando_analise_lider: {level:'danger', text:'Enviado para análise do líder de estoque'},
  aprovado_lider: {level:'ok', text:'Divergência aprovada pelo líder de estoque'},
};

/* ---------------- RELATÓRIO EXCEL (SheetJS) ---------------- */

function statusLabel(c){
  return (STATUS_INFO[c.statusAprovacao] || {}).text || c.classificacao.rule;
}

function buildSummaryRows(counts, inventories){
  const contados = counts.length;
  const divergentes = counts.filter(c=>c.diferenca!==0);
  const acuracidade = contados>0 ? (((contados-divergentes.length)/contados)*100).toFixed(1) : '100.0';
  const valorDivergente = counts.reduce((s,c)=>s+Number(c.valorDivergente||0),0);
  return [
    {Indicador:'Data do relatório', Valor: new Date().toLocaleString('pt-BR')},
    {Indicador:'Itens contados', Valor: contados},
    {Indicador:'Divergências', Valor: divergentes.length},
    {Indicador:'Acuracidade do estoque (%)', Valor: Number(acuracidade)},
    {Indicador:'Valor total divergente (R$)', Valor: Number(valorDivergente.toFixed(2))},
    {Indicador:'Inventários ativos', Valor: inventories.length},
  ];
}

function buildCountRows(counts){
  return counts.map(c=>({
    'ID Contagem': c.id,
    'Inventário': c.inventario,
    'Código': c.productCode,
    'Descrição': c.descricao,
    'Endereço': c.endereco,
    'Rodada': c.numeroContagem || 1,
    'Usuário': c.usuario,
    'Qtd. Contada': c.qtdContada,
    'Saldo Sistema': c.saldoSistema,
    'Diferença': c.diferenca,
    'Divergência (%)': Number((c.percentual||0).toFixed(2)),
    'Valor Divergente (R$)': Number(c.valorDivergente || 0),
    'Classificação': c.classificacao.label,
    'Status': statusLabel(c),
    'Motivo': c.motivo || '',
    'Endereço Pendente Validação': c.enderecoPendenteValidacao ? 'Sim' : 'Não',
    'Data': c.data,
    'Hora': c.hora || '',
  }));
}

function buildAdjustmentRows(counts){
  return counts.filter(c=>c.diferenca!==0).map(c=>({
    'Código': c.productCode,
    'Descrição': c.descricao,
    'Endereço': c.endereco,
    'Saldo Sistema (Protheus)': c.saldoSistema,
    'Saldo Contado': c.qtdContada,
    'Ajuste Necessário': c.diferenca,
    'Valor do Ajuste (R$)': Number(c.valorDivergente || 0),
    'Motivo': c.motivo || 'Não informado',
    'Status': statusLabel(c),
    'Aprovado por': c.aprovadoPor || '',
    'Data Aprovação': c.aprovadoEm || '',
  }));
}

function generateReportWorkbook(counts, inventories){
  const XLSX = window.XLSX;
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildSummaryRows(counts, inventories)), 'Resumo');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildCountRows(counts)), 'Contagens');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildAdjustmentRows(counts)), 'Solicitação de Ajuste');
  return wb;
}

// Modelo alinhado com a planilha real que o cliente já usa para contagem
// (colunas "Produto", "Descrição", "End", "Sistema", "Fisico") — ver
// Cont_13.07.xlsx. "Fisico" fica em branco no modelo: a contagem física é
// feita dentro do app, não escrita à mão na planilha.
const IMPORT_TEMPLATE_COLUMNS = ['Produto', 'Descrição', 'End', 'Sistema', 'Fisico'];

// Aceita variações de acentuação/maiúsculas no cabeçalho da planilha que o
// usuário sobe (ex: "codigo", "CÓDIGO", "Codigo" caem todos em "codigo"), e
// também os dois formatos de coluna já vistos: o nome "cheio" (Código,
// Endereço) e o abreviado usado na planilha real do cliente (Produto, End).
function normalizeHeaderKey(h){
  return String(h||'').normalize('NFD').replace(/[̀-ͯ]/g,'').trim().toLowerCase();
}

const IMPORT_HEADER_MAP = {
  codigo:'codigo',
  produto:'codigo',
  descricao:'descricao',
  endereco:'endereco',
  end:'endereco',
  almoxarifado:'almoxarifado',
  sistema:'saldoSistema',
  saldosistema:'saldoSistema',
  saldo:'saldoSistema',
};

function buildImportTemplateWorkbook(){
  const XLSX = window.XLSX;
  const wb = XLSX.utils.book_new();
  const exemplo = [{
    'Produto': PRODUCTS[0] ? PRODUCTS[0].codigo : '000.35310',
    'Descrição': PRODUCTS[0] ? PRODUCTS[0].descricao : 'Exemplo de item',
    'End': '',
    'Sistema': PRODUCTS[0] ? PRODUCTS[0].saldoSistema : 0,
    'Fisico': '',
  }];
  const ws = XLSX.utils.json_to_sheet(exemplo, {header: IMPORT_TEMPLATE_COLUMNS});
  XLSX.utils.book_append_sheet(wb, ws, 'Contar');
  return wb;
}

// Lê as linhas já convertidas pelo SheetJS (sheet_to_json) e devolve a lista
// de itens válidos (código não vazio, duplicatas removidas mantendo a 1ª
// ocorrência — preserva a ordem original da planilha) mais um resumo para
// exibir antes de confirmar a criação do inventário.
//
// A coluna "Sistema" (saldo do sistema já trazido na própria planilha) é o
// que viabiliza contar itens fora do cache local de 300 SKUs do protótipo:
// sem ela, qualquer código que não estivesse nesses 300 ficaria sem saldo
// para comparar. Quando presente, prevalece sobre o saldo do cache local
// (mock estático) por ser o dado mais recente que o cliente trouxe.
function parseImportedListRows(rawRows){
  let totalLinhas = 0;
  let semCodigo = 0;
  let duplicadas = 0;
  const vistos = new Set();
  const itens = [];

  rawRows.forEach(row=>{
    totalLinhas++;
    const norm = {};
    Object.keys(row).forEach(k=>{
      const canon = IMPORT_HEADER_MAP[normalizeHeaderKey(k)];
      if(canon) norm[canon] = row[k];
    });
    const codigo = norm.codigo!=null ? String(norm.codigo).trim() : '';
    if(!codigo){ semCodigo++; return; }
    if(vistos.has(codigo)){ duplicadas++; return; }
    vistos.add(codigo);
    let saldoSistema = null;
    if(norm.saldoSistema!=null && String(norm.saldoSistema).trim()!==''){
      const n = Number(String(norm.saldoSistema).replace(',', '.'));
      if(!Number.isNaN(n)) saldoSistema = n;
    }
    itens.push({
      codigo,
      descricao: norm.descricao!=null ? String(norm.descricao).trim() : '',
      endereco: norm.endereco!=null ? String(norm.endereco).trim().toUpperCase() : '',
      almoxarifado: norm.almoxarifado!=null ? String(norm.almoxarifado).trim() : '',
      saldoSistema,
    });
  });

  const naoEncontrados = itens.filter(it => !PRODUCTS.some(p=>p.codigo===it.codigo)).length;
  const semSaldoDisponivel = itens.filter(it => !PRODUCTS.some(p=>p.codigo===it.codigo) && it.saldoSistema==null).length;

  return {
    itens,
    resumo: { totalLinhas, validas: itens.length, semCodigo, duplicadas, naoEncontrados, semSaldoDisponivel },
  };
}

    if(!req) return;
    applyAdminPasswordAction(req.userId, acao, novaSenhaDigitada);
    setPasswordRequests(prev=>prev.map(r=>r.id===reqId?{...r, status:'resolvido'}:r));
  }

  function applyAdminPasswordAction(userId, acao, novaSenhaDigitada){
    const target = users.find(u=>u.id===userId);
    if(!target || !currentUser) return;
    let acaoLabel = '';
    if(acao==='temp'){
      const temp = generateTempPassword();
      setUsers(prev=>prev.map(u=>u.id===userId?{...u, senha:temp, status:'ativo'}:u));
      acaoLabel = `Senha temporária gerada (${temp}) — repassar ao usuário`;
    } else if(acao==='definir'){
      setUsers(prev=>prev.map(u=>u.id===userId?{...u, senha:novaSenhaDigitada, status:'ativo'}:u));
      acaoLabel = 'Nova senha definida pelo administrador';
    } else if(acao==='liberar'){
      setUsers(prev=>prev.map(u=>u.id===userId?{...u, senha:null, status:'deve_definir_senha'}:u));
      acaoLabel = 'Usuário liberado para criar nova senha';
    }
    logHistory(target.nome, acaoLabel, currentUser.nome);
  }

  function selfSetNewPassword(userId, novaSenha){
    const target = users.find(u=>u.id===userId);
    setUsers(prev=>prev.map(u=>u.id===userId?{...u, senha:novaSenha, status:'ativo'}:u));
    if(target) logHistory(target.nome, 'Senha definida pelo próprio usuário', '—');
    setCurrentUserId(userId);
    setView('home');
  }

  function createUser(data){
    setUsers(prev=>[{...data, id:'u'+Math.random().toString(36).slice(2,7), status:'ativo'}, ...prev]);
  }

  function updateUser(userId, data){
    setUsers(prev=>prev.map(u=>u.id===userId?{...u, ...data}:u));
  }

  function toggleUserStatus(userId){
    const target = users.find(u=>u.id===userId);
    if(!target) return;
    const novoStatus = target.status==='bloqueado' ? 'ativo' : 'bloqueado';
    setUsers(prev=>prev.map(u=>u.id===userId?{...u, status:novoStatus}:u));
    logHistory(target.nome, novoStatus==='bloqueado' ? 'Usuário bloqueado' : 'Usuário desbloqueado', currentUser?currentUser.nome:'—');
  }

  // ---- Logout automático por inatividade ----
  useEffect(()=>{
    if(!currentUser) return;
    let timer = setTimeout(()=>logout('Sessão encerrada por inatividade.'), SESSION_TIMEOUT_MS);
    function resetTimer(){
      clearTimeout(timer);
      timer = setTimeout(()=>logout('Sessão encerrada por inatividade.'), SESSION_TIMEOUT_MS);
    }
    const events = ['click','keydown','touchstart','mousemove'];
    events.forEach(ev=>window.addEventListener(ev, resetTimer));
    return ()=>{ clearTimeout(timer); events.forEach(ev=>window.removeEventListener(ev, resetTimer)); };
  }, [currentUser]);

  if(!currentUser){
    return (
      <LoginScreen
        onLogin={attemptLogin}
        onForgot={requestPasswordReset}
        onSelfSetPassword={selfSetNewPassword}
        notice={logoutNotice}
        clearNotice={()=>setLogoutNotice('')}
      />
    );
  }

  return (
    <div className="app">
      <TopBar user={currentUser} role={role} onHome={()=>goto('home')} onLogout={()=>logout('')} />
      {view!=='home' && <SubBar view={view} goto={goto} />}
      <div className="content">
        {view==='home' && <Home role={role} user={currentUser} inventories={inventories} counts={counts} goto={goto} />}
        {view==='inventories' && <InventoryList inventories={inventories} goto={goto} role={role} />}
        {view==='newInventory' && (role==='lider'||role==='admin') && <NewInventory users={users} onCreate={(inv)=>{setInventories(prev=>[inv,...prev]); goto('inventories');}} />}
        {view==='pickCountType' && <PickCountType inv={flowState} goto={goto} />}
        {view==='randomCount' && <RandomCountFlow inv={flowState} user={currentUser} onFinish={(c)=>{setCounts(p=>[c,...p]); goto('inventories');}} onAddressProposed={addAddressProposal} setInventories={setInventories} />}
        {view==='manualCount' && <ManualCountFlow user={currentUser} onFinish={(c)=>{setCounts(p=>[c,...p]); goto('home');}} onAddressProposed={addAddressProposal} />}
        {view==='routeCount' && <RouteCountFlow inv={flowState} user={currentUser} onFinish={(c)=>{setCounts(p=>[c,...p]); goto('inventories');}} onAddressProposed={addAddressProposal} setInventories={setInventories} />}
        {view==='importedListCount' && <ImportedListCountFlow inv={flowState} user={currentUser} onFinish={(c)=>{setCounts(p=>[c,...p]); goto('inventories');}} onAddressProposed={addAddressProposal} setInventories={setInventories} />}
        {view==='myCounts' && <MyCounts counts={counts} user={currentUser} role={role} goto={goto} />}
        {view==='recounts' && <RecountsPanel counts={counts} role={role} currentUser={currentUser} goto={goto} onApprove={approveDivergence} />}
        {view==='recount' && flowState && <RecountFlow original={flowState} user={currentUser} onAddressProposed={addAddressProposal} onFinish={(c)=>{setCounts(p=>[c,...p]); goto('recounts');}} />}
        {view==='dashboard' && <Dashboard counts={counts} inventories={inventories} />}
        {view==='relatorios' && <ReportsScreen counts={counts} inventories={inventories} currentUser={currentUser} sendHistory={reportSendHistory} onLogSend={logReportSend} />}
        {view==='settings' && (
          <Settings
            role={role}
            enderecosPropostos={enderecosPropostos}
            onResolve={resolveAddressProposal}
            users={users}
            currentUser={currentUser}
            onCreateUser={createUser}
            onUpdateUser={updateUser}
            onToggleUserStatus={toggleUserStatus}
            onAdminPasswordAction={applyAdminPasswordAction}
            passwordRequests={passwordRequests}
            onResolvePasswordRequest={resolvePasswordRequest}
            passwordHistory={passwordHistory}
          />
        )}
      </div>
      <BottomNav view={view} goto={goto} role={role} />
    </div>
  );
}

function LoginScreen({onLogin, onForgot, onSelfSetPassword, notice, clearNotice}){
  const [mode, setMode] = useState('login'); // login | forgot | newPassword
  const [identifier, setIdentifier] = useState('');
  const [senha, setSenha] = useState('');
  const [showSenha, setShowSenha] = useState(false);
  const [error, setError] = useState('');
  const [forgotMsg, setForgotMsg] = useState('');
  const [pendingUserId, setPendingUserId] = useState(null);
  const [novaSenha, setNovaSenha] = useState('');
  const [confirmaSenha, setConfirmaSenha] = useState('');

  function submitLogin(e){
    e.preventDefault();
    setError('');
    const result = onLogin(identifier, senha);
    if(!result.ok){
      if(result.needsNewPassword){
        setPendingUserId(result.userId);
        setMode('newPassword');
      } else {
        setError(result.error);
      }
    }
  }

  function submitForgot(e){
    e.preventDefault();
    const msg = onForgot(identifier);
    setForgotMsg(msg);
  }

  function submitNewPassword(e){
    e.preventDefault();
    setError('');
    if(novaSenha.length < 6){ setError('A nova senha deve ter pelo menos 6 caracteres.'); return; }
    if(novaSenha !== confirmaSenha){ setError('As senhas não coincidem.'); return; }
    onSelfSetPassword(pendingUserId, novaSenha);
  }

  return (
    <div className="login-screen">
      <div className="login-card">
        <div className="login-logo">
          <div className="mark">S360</div>
        </div>
        <h1 className="login-title">Stock360</h1>
        <div className="login-subtitle">Controle de Inventário Cíclico</div>

        {notice && mode==='login' && (
          <div className="login-notice">{notice}</div>
        )}

        {mode==='login' && (
          <form onSubmit={submitLogin}>
            {error && <div className="login-error">{error}</div>}
            <div className="login-field">
              <label>Usuário ou e-mail</label>
              <input type="text" value={identifier} onChange={e=>{setIdentifier(e.target.value); clearNotice&&clearNotice();}} placeholder="usuario.sobrenome" autoCapitalize="none" autoFocus />
            </div>
            <div className="login-field">
              <label>Senha</label>
              <input type={showSenha?'text':'password'} value={senha} onChange={e=>setSenha(e.target.value)} placeholder="••••••••" />
              <button type="button" className="pw-toggle" onClick={()=>setShowSenha(s=>!s)}>{showSenha?'ocultar':'mostrar'}</button>
            </div>
            <button className="btn btn-primary" type="submit">Entrar</button>
            <button type="button" className="login-forgot" onClick={()=>{setMode('forgot'); setError(''); setForgotMsg('');}}>Esqueci minha senha</button>

            <div className="demo-creds">
              <div className="dc-title">Credenciais de demonstração (remover em produção)</div>
              <div className="dc-row"><span>alisson / admin123</span><span>Administrador</span></div>
              <div className="dc-row"><span>roberto.alves / lider123</span><span>Líder de Estoque</span></div>
              <div className="dc-row"><span>carlos.mendes / operador123</span><span>Operador</span></div>
            </div>
          </form>
        )}

        {mode==='forgot' && (
          <form onSubmit={submitForgot}>
            {!forgotMsg ? (
              <div>
                <div className="role-note" style={{marginBottom:20}}>Informe seu usuário ou e-mail. Um administrador vai analisar e liberar o acesso.</div>
                <div className="login-field">
                  <label>Usuário ou e-mail</label>
                  <input type="text" value={identifier} onChange={e=>setIdentifier(e.target.value)} autoFocus />
                </div>
                <button className="btn btn-primary" type="submit">Solicitar recuperação</button>
              </div>
            ) : (
              <div className="login-success">{forgotMsg}</div>
            )}
            <button type="button" className="login-back" onClick={()=>{setMode('login'); setForgotMsg(''); setIdentifier('');}}>← Voltar ao login</button>
          </form>
        )}

        {mode==='newPassword' && (
          <form onSubmit={submitNewPassword}>
            <div className="role-note" style={{marginBottom:20}}>O administrador liberou sua conta para você criar uma nova senha.</div>
            {error && <div className="login-error">{error}</div>}
            <div className="login-field">
              <label>Nova senha</label>
              <input type="password" value={novaSenha} onChange={e=>setNovaSenha(e.target.value)} autoFocus />
            </div>
            <div className="login-field">
              <label>Confirmar nova senha</label>
              <input type="password" value={confirmaSenha} onChange={e=>setConfirmaSenha(e.target.value)} />
            </div>
            <button className="btn btn-primary" type="submit">Definir senha e entrar</button>
          </form>
        )}
      </div>
    </div>
  );
}

function NewInventory({users, onCreate}){
  const [nome, setNome] = useState('Inventário Cíclico Julho/2026');
  const [almox, setAlmox] = useState('Almox 01');
  const [resp, setResp] = useState('Carlos Mendes');
  const [data, setData] = useState('2026-07-20');
  const [qtd, setQtd] = useState(20);
  const [tipo, setTipo] = useState('Contagem Aleatória');

  const [arquivoNome, setArquivoNome] = useState('');
  const [itensImportados, setItensImportados] = useState(null);
  const [importResumo, setImportResumo] = useState(null);
  const [importErro, setImportErro] = useState('');
  const fileRef = useRef();

  const tipos = [
    {v:'Contagem Aleatória', d:'O sistema seleciona os itens automaticamente'},
    {v:'Contagem por Curva ABC', d:'Prioriza itens de maior valor ou giro'},
    {v:'Contagem Manual', d:'Operador escolhe os itens livremente'},
    {v:'Contagem por Rota de Endereço', d:'Sequência otimizada por corredor/rua'},
    {v:'Lista Importada (Excel)', d:'Conta exatamente os itens de uma planilha importada, na ordem em que vieram'},
  ];

  const isImportado = tipo==='Lista Importada (Excel)';
  const canCreate = isImportado ? !!(itensImportados && itensImportados.length>0) : true;

  function handleDownloadTemplate(){
    if(!window.XLSX) return;
    const wb = buildImportTemplateWorkbook();
    window.XLSX.writeFile(wb, 'Stock360_Modelo_Lista_Contagem.xlsx');
  }

  function handleFileUpload(e){
    const file = e.target.files[0];
    if(!file) return;
    setImportErro('');
    setArquivoNome(file.name);
    const reader = new FileReader();
    reader.onload = (evt)=>{
      try{
        const data = new Uint8Array(evt.target.result);
        const wb = window.XLSX.read(data, {type:'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = window.XLSX.utils.sheet_to_json(sheet, {defval:''});
        const {itens, resumo} = parseImportedListRows(rows);
        if(itens.length===0){
          setImportErro('Nenhuma linha válida encontrada — verifique se a coluna "Código" está preenchida.');
          setItensImportados(null);
          setImportResumo(null);
          return;
        }
        setItensImportados(itens);
        setImportResumo(resumo);
      } catch(err){
        setImportErro('Não foi possível ler o arquivo. Verifique se é um .xlsx válido.');
        setItensImportados(null);
        setImportResumo(null);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function handleCreate(){
    onCreate({
      id:'INV-'+Math.floor(Math.random()*900+100), nome, almoxarifado:almox, responsavel:resp, data, tipo,
      qtdItens: isImportado ? itensImportados.length : qtd, status:'pendente', contados:0,
      ...(isImportado ? {itensImportados} : {}),
    });
  }

  return (
    <div>
      <div className="panel">
        <div className="field">
          <label>Nome do inventário</label>
          <input type="text" value={nome} onChange={e=>setNome(e.target.value)} />
        </div>
        <div className="field">
          <label>Almoxarifado</label>
          <select value={almox} onChange={e=>setAlmox(e.target.value)}>
            <option>Almox 01</option>
            <option>Almox 02</option>
          </select>
        </div>
        <div className="field">
          <label>Responsável</label>
          <select value={resp} onChange={e=>setResp(e.target.value)}>
            {users.filter(u=>u.perfil==='operador').map(u=><option key={u.id}>{u.nome}</option>)}
          </select>
        </div>
        <div className="field">
          <label>Data</label>
          <input type="date" value={data} onChange={e=>setData(e.target.value)} />
        </div>
        {!isImportado && (
          <div className="field">
            <label>Quantidade de itens</label>
            <input type="number" value={qtd} onChange={e=>setQtd(Number(e.target.value))} />
          </div>
        )}
        <div className="field">
          <label>Tipo de inventário</label>
          <div className="radio-group">
            {tipos.map(t=>(
              <label key={t.v} className={"radio-opt"+(tipo===t.v?' active':'')}>
                <input type="radio" name="tipo" checked={tipo===t.v} onChange={()=>setTipo(t.v)} />
                <div>
                  <div className="opt-title">{t.v}</div>
                  <div className="opt-desc">{t.d}</div>
                </div>
              </label>
            ))}
          </div>
        </div>

        {isImportado && (
          <div className="field">
            <label>Lista de itens para contar</label>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <button type="button" className="btn btn-outline" onClick={handleDownloadTemplate}><Ic>⬇</Ic> Baixar modelo padrão (.xlsx)</button>
              <button type="button" className="btn btn-secondary" onClick={()=>fileRef.current.click()}>
                <Ic>📤</Ic> {arquivoNome ? 'Trocar arquivo (' + arquivoNome + ')' : 'Selecionar planilha preenchida (.xlsx)'}
              </button>
              <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={handleFileUpload} />
            </div>
            {importErro && <div className="login-error" style={{marginTop:10}}>{importErro}</div>}
          </div>
        )}
      </div>

      {isImportado && importResumo && (
        <div className="panel">
          <div className="section-title" style={{marginTop:0}}>Resumo da Importação</div>
          <div style={{fontSize:13,lineHeight:1.9}}>
            <div>Linhas na planilha: <strong>{importResumo.totalLinhas}</strong></div>
            <div>Itens válidos para contagem: <strong>{importResumo.validas}</strong></div>
            {importResumo.duplicadas>0 && <div>Códigos duplicados removidos: <strong>{importResumo.duplicadas}</strong></div>}
            {importResumo.semCodigo>0 && <div>Linhas sem código (ignoradas): <strong>{importResumo.semCodigo}</strong></div>}
            <div>Códigos não encontrados no cache local (300 SKUs): <strong>{importResumo.naoEncontrados}</strong></div>

              <div>&nbsp;&nbsp;↳ desses, com saldo do sistema trazido pela própria planilha (coluna "Sistema"): <strong>{importResumo.naoEncontrados - importResumo.semSaldoDisponivel}</strong></div>
            )}
          </div>
          {importResumo.semSaldoDisponivel>0 && (
            <div className="divergence-alert" style={{marginTop:12}}>
              <Ic>ℹ</Ic>
              <span><strong>{importResumo.semSaldoDisponivel}</strong> {importResumo.semSaldoDisponivel===1?'item':'itens'} não {importResumo.semSaldoDisponivel===1?'está':'estão'} no cache local de 300 SKUs do protótipo e a planilha não trouxe o saldo do sistema (coluna "Sistema") — ainda {importResumo.semSaldoDisponivel===1?'pode':'podem'} ser contado{importResumo.semSaldoDisponivel===1?'':'s'} normalmente, mas sem comparação automática (vai direto para revisão do líder). Em produção, com o banco sincronizado, o saldo real apareceria para qualquer código.</span>
            </div>
          )}
        </div>
      )}

      <button className="btn btn-primary" disabled={!canCreate} onClick={handleCreate}>Criar Inventário</button>
    </div>
  );
}

/* ---------------- LEITOR DE CÂMERA (QR Code e Código de Barras) ---------------- */

function CameraScanner({onDetected, onCancel}){
  const containerId = useRef('scanner-'+Math.random().toString(36).slice(2,9)).current;
  const [status, setStatus] = useState('starting'); // starting | scanning | error
  const scannerRef = useRef(null);
  const doneRef = useRef(false);

  useEffect(()=>{
    let cancelled = false;
    async function start(){
      if(!window.Html5Qrcode){
        setStatus('error');
        return;
      }
      try{
        const formats = window.Html5QrcodeSupportedFormats ? [
          window.Html5QrcodeSupportedFormats.QR_CODE,
          window.Html5QrcodeSupportedFormats.CODE_128,
          window.Html5QrcodeSupportedFormats.CODE_39,
          window.Html5QrcodeSupportedFormats.EAN_13,
          window.Html5QrcodeSupportedFormats.EAN_8,
          window.Html5QrcodeSupportedFormats.UPC_A,
          window.Html5QrcodeSupportedFormats.ITF,
        ] : undefined;
        const scanner = new window.Html5Qrcode(containerId, formats ? {formatsToSupport: formats} : undefined);
        scannerRef.current = scanner;
        await scanner.start(
          {facingMode:'environment'},
          {fps:10, qrbox:{width:260, height:160}},
          (decodedText)=>{
            if(doneRef.current || cancelled) return;
            doneRef.current = true;
            onDetected(decodedText.trim());
          },
          ()=>{ /* ignora falhas de leitura por frame — é o comportamento normal enquanto mira */ }
        );
        if(!cancelled) setStatus('scanning');
      } catch(err){
        if(!cancelled) setStatus('error');
      }
    }
    start();
    return ()=>{
      cancelled = true;
      if(scannerRef.current){
        scannerRef.current.stop().then(()=>scannerRef.current.clear()).catch(()=>{});
      }
    };
  }, []);

  return (
    <div>
      <div className="scanner-wrap">
        <div id={containerId} className="scanner-viewport"></div>
      </div>
      {status==='error' && (
        <div className="login-error">Não foi possível acessar a câmera. Verifique a permissão do navegador ou use a digitação manual abaixo.</div>
      )}
      {status==='scanning' && <p className="scanner-hint">Aponte a câmera para o QR Code ou código de barras</p>}
      <button className="btn btn-secondary" onClick={onCancel} style={{marginBottom:14}}>Cancelar leitura</button>
    </div>
  );
}


function useCountQueue(items){
  const [idx, setIdx] = useState(0);
  const current = items[idx];
  const next = ()=> setIdx(i=>Math.min(i+1, items.length));
  const done = idx >= items.length;
  return {current, idx, total:items.length, next, done};
}

function CountStep({product, user, onComplete, onAddressProposed, inv, expectAddressCheck=true, numeroContagem=1, contagemAnteriorId=null}){
  // Itens sem endereço cadastrado (comum enquanto o cadastro de endereços
  // ainda não existe no Protheus) pulam o QR Code e vão direto para a etapa
  // em que o operador INFORMA onde encontrou o item fisicamente.
  const hasAddress = expectAddressCheck && !!product.enderecoCadastrado;
  const needsAddressInput = expectAddressCheck && !product.enderecoCadastrado;
  const [step, setStep] = useState(hasAddress ? 'scan' : (needsAddressInput ? 'enderecoManual' : 'count'));
  const [scannedCode, setScannedCode] = useState('');
  const [addressOk, setAddressOk] = useState(null);
  const [enderecoInformado, setEnderecoInformado] = useState('');
  const [qty, setQty] = useState('');
  const [photo, setPhoto] = useState(null);
  const [obs, setObs] = useState('');
  const [motivo, setMotivo] = useState('');
  const fileRef = useRef();

  const [scanning, setScanning] = useState(false);

  function simulateScan(match){
    if(match){
      setScannedCode(product.endereco);
      setAddressOk(true);
    } else {
      // pick a plausible wrong neighboring address
      setScannedCode(product.endereco.slice(0,-1) + (((parseInt(product.endereco.slice(-1))+1)%9)||1));
      setAddressOk(false);
    }
  }

  function handleAddressScanDetected(text){
    setScanning(false);
    const clean = text.trim();
    const norm = clean.toUpperCase();
    const expected = (product.endereco||'').toUpperCase();
    setScannedCode(clean);
    setAddressOk(norm === expected);
    setStep('scanResult');
  }

  function handleEnderecoManualScanDetected(text){
    setScanning(false);
    setEnderecoInformado(text.trim().toUpperCase());
  }

  function confirmEnderecoManual(){
    if(onAddressProposed && enderecoInformado.trim()){
      onAddressProposed({
        productCode: product.codigo,
        descricao: product.descricao,
        enderecoInformado: enderecoInformado.trim().toUpperCase(),
        usuario: user.nome,
        data: new Date().toISOString().slice(0,10),
      });
    }
    setStep('count');
  }

  function handlePhoto(e){
    const f = e.target.files[0];
    if(f){ setPhoto(URL.createObjectURL(f)); }
  }

  const hasSaldoLocal = typeof product.saldoSistema === 'number';
  const diffAbs = (qty!=='' && hasSaldoLocal) ? Number(qty) - product.saldoSistema : 0;
  const diffPct = (qty!=='' && hasSaldoLocal) ? (product.saldoSistema===0 ? 100 : (diffAbs/product.saldoSistema)*100) : 0;
  const classification = hasSaldoLocal
    ? classifyDivergence(diffPct)
    : {level:'warn', label:'Sem saldo local para comparar', rule:'Item fora do cache local do protótipo — revisão manual necessária'};
  const statusAprovacao = hasSaldoLocal ? computeStatus(numeroContagem, classification.level) : 'aguardando_analise_lider';

  function finalize(){
    onComplete({
      id: 'CNT-'+Math.random().toString(36).slice(2,8).toUpperCase(),
      productCode: product.codigo,
      descricao: product.descricao,
      endereco: product.endereco || enderecoInformado.toUpperCase() || '—',
      enderecoPendenteValidacao: needsAddressInput,
      usuario: user.nome,
      qtdContada: Number(qty),
      saldoSistema: hasSaldoLocal ? product.saldoSistema : null,
      diferenca: hasSaldoLocal ? diffAbs : null,
      percentual: hasSaldoLocal ? diffPct : null,
      valorDivergente: hasSaldoLocal ? (Math.abs(diffAbs) * Number(product.custoUnit)).toFixed(2) : '0.00',
      foraDoCacheLocal: !!product.foraDoCacheLocal,
      classificacao: classification,
      statusAprovacao,
      numeroContagem,
      contagemAnteriorId,
      motivo: diffAbs!==0 ? motivo : '',
      foto: !!photo,
      observacao: obs,
      data: new Date().toISOString().slice(0,10),
      hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
      inventario: inv ? inv.id : '—',
    });
  }

  return (
    <div>
      <div className="item-card">
        <div className="item-card-head">
          <div>
            <div className="item-code">{product.codigo}</div>
            <div className="item-desc">{product.descricao}</div>
          </div>
        </div>
        <div className="item-meta">
          <div className="m"><div className="k">Unidade</div><div className="v">{product.unidade || 'não informado'}</div></div>
          <div className="m"><div className="k">Família</div><div className="v">{product.familia}</div></div>
          <div className="m"><div className="k">Almoxarifado</div><div className="v">{product.almoxarifado}</div></div>
          <div className="m"><div className="k">Endereço</div><div className="v">{product.enderecoCadastrado ? product.endereco : 'não cadastrado'}</div></div>
        </div>
        {typeof product.valorFinanceiro === 'number' && product.valorFinanceiro > 0 && (
          <div style={{padding:'0 18px 16px',display:'flex',gap:10,fontSize:11.5,color:'var(--ink-dim)',fontFamily:'var(--font-mono)',flexWrap:'wrap'}}>
            <span>Valor em estoque: R$ {product.valorFinanceiro.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
            {product.semMovimentoRecente && <span style={{color:'var(--warn)'}}>· sem saída recente</span>}
          </div>
        )}
      </div>

      {product.foraDoCacheLocal && (
        <div className="divergence-alert">
          <Ic>ℹ</Ic>
          {hasSaldoLocal ? (
            <span>Este código não está no cache local de 300 SKUs do protótipo, mas o saldo do sistema veio da própria planilha importada (coluna "Sistema") — a comparação funciona normalmente. Só dados complementares (unidade, família, valor em estoque) não estão disponíveis aqui.</span>
          ) : (
            <span>Este código não está no cache local de 300 SKUs do protótipo e a planilha não trouxe o saldo do sistema para este item. O saldo não está disponível aqui para comparação automática; a contagem será registrada para revisão manual do líder. Em produção, com o banco sincronizado, o saldo real apareceria normalmente.</span>
          )}
        </div>
      )}

      {needsAddressInput && step==='enderecoManual' && (
        <div>
          <div className="divergence-alert"><Ic>📍</Ic><span>Este item ainda não tem endereço cadastrado no sistema. Escaneie a etiqueta da prateleira ou informe onde você encontrou — essa informação será enviada para validação do líder.</span></div>
          {scanning ? (
            <CameraScanner onDetected={handleEnderecoManualScanDetected} onCancel={()=>setScanning(false)} />
          ) : (
            <button className="btn btn-primary" style={{marginBottom:14}} onClick={()=>setScanning(true)}><Ic>📷</Ic> Escanear código do endereço</button>
          )}
          <div className="field">
            <label>Endereço onde o item foi encontrado</label>
            <input type="text" value={enderecoInformado} onChange={e=>setEnderecoInformado(e.target.value)} placeholder="Ex: A-02-03-01" />
          </div>
          <div className="btn-row">
            <button className="btn btn-secondary" onClick={()=>setStep('count')}>Pular por enquanto</button>
            <button className="btn btn-primary" disabled={!enderecoInformado.trim()} onClick={confirmEnderecoManual}>Confirmar e continuar</button>
          </div>
        </div>
      )}

      {hasAddress && step==='scan' && (
        <div>
          <div className="address-chip">{product.endereco}</div>
          {scanning ? (
            <CameraScanner onDetected={handleAddressScanDetected} onCancel={()=>setScanning(false)} />
          ) : (
            <div>
              <div className="scan-box">
                <div className="scan-frame"><div className="scan-corner-b1"></div><div className="scan-corner-b2"></div><div className="scan-laser"></div></div>
              </div>
              <p className="scanner-hint">Toque em "Escanear" e aponte a câmera para o QR Code do endereço</p>
              <button className="btn btn-primary" style={{marginBottom:10}} onClick={()=>setScanning(true)}><Ic>📷</Ic> Escanear com a câmera</button>
              <div className="scan-toggle-row">
                <button className="btn btn-outline" style={{fontSize:11.5}} onClick={()=>{simulateScan(false); setStep('scanResult');}}>Sem câmera: simular leitura errada</button>
                <button className="btn btn-outline" style={{fontSize:11.5}} onClick={()=>{simulateScan(true); setStep('scanResult');}}>Sem câmera: simular leitura certa</button>
              </div>
            </div>
          )}
        </div>
      )}

      {hasAddress && step==='scanResult' && (
        addressOk ? (
          <div>
            <div className="result-banner ok">
              <div className="rb-title"><Ic>✅</Ic> Endereço confirmado</div>
              <div className="rb-sub">Código lido: {scannedCode}</div>
            </div>
            <button className="btn btn-primary" onClick={()=>setStep('count')}>Continuar</button>
          </div>
        ) : (
          <div>
            <div className="result-banner warn">
              <div className="rb-title"><Ic>⚠</Ic> Atenção</div>
              <div className="rb-sub">Você está no endereço: <strong>{scannedCode}</strong><br/>O item está cadastrado no: <strong>{product.endereco}</strong></div>
            </div>
            <div className="btn-row">
              <button className="btn btn-secondary" onClick={()=>setStep('scan')}>Escanear novamente</button>
              <button className="btn btn-primary" onClick={()=>setStep('count')}>Contar mesmo assim</button>
            </div>
          </div>
        )
      )}

      {step==='count' && (
        <div>
          <div className="divergence-alert"><Ic>👁‍🗨</Ic><span>Contagem cega — o saldo do sistema não é exibido. Informe apenas a quantidade física encontrada.</span></div>
          <div className="field">
            <label>Quantidade encontrada ({product.unidade || 'un. não informada'})</label>
            <input className="qty-input" type="number" inputMode="decimal" value={qty} onChange={e=>setQty(e.target.value)} placeholder="0" autoFocus />
          </div>
          <button className="btn btn-primary" disabled={qty===''} onClick={()=>setStep('photo')}>Confirmar quantidade</button>
        </div>
      )}

      {step==='photo' && (
        <div>
          <div className="field">
            <label>Foto (opcional)</label>
            {photo ? <img src={photo} className="photo-preview" /> : (
              <button className="photo-btn" style={{width:'100%'}} onClick={()=>fileRef.current.click()}><Ic>📷</Ic> Toque para anexar foto</button>
            )}
            <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handlePhoto} />
          </div>
          <div className="field">
            <label>Observação (opcional)</label>
            <textarea value={obs} onChange={e=>setObs(e.target.value)} placeholder="Ex: material próximo ao endereço, embalagem danificada..." />
          </div>
          <button className="btn btn-primary" onClick={()=>setStep('result')}>Finalizar Contagem</button>
        </div>
      )}

      {step==='result' && (
        <div>
          <div className={"result-banner "+classification.level}>
            <div className="rb-title">
              {classification.level==='ok' && <Ic>✅</Ic>}
              {classification.level==='warn' && <Ic>⚠</Ic>}
              {classification.level==='danger' && <Ic>⛔</Ic>}
              &nbsp;{classification.label}{numeroContagem>1 && <span style={{fontWeight:400,fontSize:13}}> · {numeroContagem}ª contagem</span>}
            </div>
            <div className="rb-sub">{STATUS_INFO[statusAprovacao].text}</div>
            <div className="result-grid">
              <div className="rg"><div className="k">Saldo Sistema</div><div className="v">{hasSaldoLocal ? product.saldoSistema : '—'}</div></div>
              <div className="rg"><div className="k">Qtd. Contada</div><div className="v">{qty}</div></div>
              <div className="rg"><div className="k">Diferença</div><div className="v">{hasSaldoLocal ? (diffAbs>0?'+':'')+diffAbs : '—'}</div></div>
              <div className="rg"><div className="k">Divergência</div><div className="v">{hasSaldoLocal ? diffPct.toFixed(1)+'%' : '—'}</div></div>
            </div>
          </div>
          {(diffAbs!==0 || !hasSaldoLocal) && (
            <div className="field">
              <label>Motivo da divergência{!hasSaldoLocal && ' (opcional)'}</label>
              <select value={motivo} onChange={e=>setMotivo(e.target.value)}>
                <option value="">Selecione um motivo</option>
                {MOTIVOS.map(m=><option key={m}>{m}</option>)}
              </select>
            </div>
          )}
          <button className="btn btn-primary" disabled={diffAbs!==0 && hasSaldoLocal && !motivo} onClick={finalize}>Registrar e continuar</button>
        </div>
      )}
    </div>
  );
}

/* ---------------- MÓDULO 2: CONTAGEM ALEATÓRIA ---------------- */

function RandomCountFlow({inv, user, onFinish, onAddressProposed, setInventories}){
  const items = useMemo(()=> {
    // Critério aplicado: prioriza itens de maior valor financeiro (curva A) e
    // itens sem saída recente — os dois critérios "futuros" já citados no
    // briefing, aplicados aqui sobre os dados reais da SB2.
    const scored = [...PRODUCTS].map(p=>({
      p, score: (p.semMovimentoRecente ? 50000 : 0) + p.valorFinanceiro + Math.random()*500
    })).sort((a,b)=>b.score-a.score);
    return scored.slice(0, 25).sort(()=>Math.random()-0.5).slice(0,5).map(s=>s.p);
  }, []);
  const q = useCountQueue(items);

  if(q.done){
    return (
      <div className="empty-state">
        <div className="ic"><Ic>🎉</Ic></div>
        Fila de contagem aleatória concluída.
        <div style={{marginTop:16}}><button className="btn btn-primary" onClick={()=>onFinish(null)}>Voltar aos inventários</button></div>
      </div>
    );
  }

  return (
    <div>
      <div className="role-note">Item {q.idx+1} de {q.total} · Fila priorizada por valor financeiro e itens sem saída recente</div>
      <CountStep
        product={q.current}
        user={user}
        inv={inv}
        onAddressProposed={onAddressProposed}
        onComplete={(c)=>{
          if(inv) setInventories(prev=>prev.map(i=>i.id===inv.id?{...i, contados:i.contados+1}:i));
          onFinish(c);
          q.next();
        }}
      />
    </div>
  );
}

/* ---------------- MÓDULO 3: CONTAGEM MANUAL ---------------- */

function ManualCountFlow({user, onFinish, onAddressProposed}){
  const [query, setQuery] = useState('');
  const [selected, setSelected] = useState(null);
  const [scanning, setScanning] = useState(false);

  const results = useMemo(()=>{
    if(!query) return [];
    const q = query.toLowerCase();
    return PRODUCTS.filter(p=>p.codigo.toLowerCase().includes(q) || p.descricao.toLowerCase().includes(q)).slice(0,8);
  }, [query]);

  if(selected){
    return <CountStep product={selected} user={user} onAddressProposed={onAddressProposed} onComplete={(c)=>onFinish(c)} expectAddressCheck={true} />;
  }

  function handleScanDetected(text){
    setScanning(false);
    setQuery(text.trim());
  }

  return (
    <div>
      {scanning ? (
        <CameraScanner onDetected={handleScanDetected} onCancel={()=>setScanning(false)} />
      ) : (
        <button className="btn btn-primary" style={{marginBottom:14}} onClick={()=>setScanning(true)}><Ic>📷</Ic> Escanear código de barras / QR do item</button>
      )}
      <div className="field">
        <label>Ou buscar por código, descrição ou código de barras</label>
        <input type="text" value={query} onChange={e=>setQuery(e.target.value)} placeholder="Ex: 000.35310 ou parafuso" />
      </div>
      {results.length===0 && query && <div className="empty-state" style={{padding:20}}>Nenhum item encontrado.</div>}
      {results.map(p=>(
        <div key={p.codigo} className="list-row" onClick={()=>setSelected(p)}>
          <div>
            <div className="lr-title">{p.descricao}</div>
            <div className="lr-sub">{p.codigo} · {p.enderecoCadastrado ? p.endereco : 'sem endereço cadastrado'}</div>
          </div>
          <span className="chevron"><Ic>›</Ic></span>
        </div>
      ))}
    </div>
  );
}

/* ---------------- MÓDULO 4: CONTAGEM POR ROTA ---------------- */

function RouteCountFlow({inv, user, onFinish, onAddressProposed, setInventories}){
  const grouped = useMemo(()=>{
    const byCorredor = {};
    PRODUCTS.forEach(p=>{
      byCorredor[p.corredor] = byCorredor[p.corredor] || {};
      byCorredor[p.corredor][p.rua] = byCorredor[p.corredor][p.rua] || [];
      byCorredor[p.corredor][p.rua].push(p);
    });
    return byCorredor;
  }, []);

  const [active, setActive] = useState(null);

  if(!ANY_ADDRESS_REGISTERED){
    return (
      <div className="empty-state">
        <div className="ic"><Ic>🗺</Ic></div>
        Nenhum endereço cadastrado ainda neste almoxarifado.<br/>
        A contagem por rota é liberada assim que o líder validar os primeiros endereços informados pelos operadores (veja "Endereços Pendentes" em Configurações).
      </div>
    );
  }

  if(active){
    return <CountStep product={active} user={user} inv={inv} onAddressProposed={onAddressProposed} onComplete={(c)=>{
      if(inv) setInventories(prev=>prev.map(i=>i.id===inv.id?{...i, contados:i.contados+1}:i));

      setActive(null);
    }} />;

  return (
    <div>

  );
}

/* ---------------- MÓDULO 1B: CONTAGEM POR LISTA IMPORTADA (Excel) ---------------- */

function ImportedListCountFlow({inv, user, onFinish, onAddressProposed, setInventories}){
  const allItems = useMemo(()=>{
    const lista = (inv && inv.itensImportados) || [];
    return lista.map(item=>{
      const local = PRODUCTS.find(p=>p.codigo===item.codigo);
      if(local){
        return {
          ...local,
          // planilha trouxe um endereço e o cadastro local ainda não tem — usa o da planilha
          ...(item.endereco && !local.enderecoCadastrado ? {endereco:item.endereco, enderecoCadastrado:true} : {}),
          // saldo da própria planilha é mais recente que o cache estático — prevalece quando informado
          ...(item.saldoSistema!=null ? {saldoSistema:item.saldoSistema} : {}),
        };
      }
      // código não está no cache local de 300 SKUs — monta o item a partir do
      // que a própria planilha trouxe (fallback documentado no CLAUDE.md). A
      // coluna "Sistema" da planilha (item.saldoSistema) é o que permite
      // comparar o saldo mesmo assim — sem ela, fica null e a contagem vai
      // sem comparação automática para revisão do líder.
      return {
        codigo: item.codigo,
        descricao: item.descricao || item.codigo,
        unidade: null,
        familia: '—',
        endereco: item.endereco || null,
        enderecoCadastrado: !!item.endereco,
        almoxarifado: item.almoxarifado || (inv ? inv.almoxarifado : '—'),
        corredor: null,
        rua: null,
        saldoSistema: item.saldoSistema,
        custoUnit: 0,
        valorFinanceiro: 0,
        semMovimentoRecente: false,
        ultimaSaida: null,
        foraDoCacheLocal: true,
      };
    });
  }, [inv]);

  // A lista é sempre percorrida na ordem original; ao voltar para este
  // inventário depois de contar alguns itens, retoma exatamente de onde
  // parou usando "contados" — sem isso, cada vez que a tela remonta a fila
  // reiniciaria do item 1 (mesmo problema que a Contagem Aleatória já tem,
  // mas aqui seria pior: o operador nunca chegaria ao 2º item da planilha).
  const jaContados = inv ? (inv.contados || 0) : 0;
  const pendentes = useMemo(()=> allItems.slice(jaContados), [allItems, jaContados]);
  const q = useCountQueue(pendentes);

  if(allItems.length===0){
    return <div className="empty-state"><div className="ic"><Ic>📄</Ic></div>Esta lista importada não tem itens válidos.</div>;
  }

  if(q.done){
    return (
      <div className="empty-state">
        <div className="ic"><Ic>🎉</Ic></div>
        Lista importada concluída — todos os {allItems.length} itens foram contados.
        <div style={{marginTop:16}}><button className="btn btn-primary" onClick={()=>onFinish(null)}>Voltar aos inventários</button></div>
      </div>
    );
  }

  return (
    <div>
      <div className="role-note">Item {jaContados+q.idx+1} de {allItems.length} · Lista importada{inv?' de '+inv.nome:''} — ordem original da planilha</div>
      <CountStep
        product={q.current}
        user={user}
        inv={inv}
        onAddressProposed={onAddressProposed}
        onComplete={(c)=>{
          if(inv) setInventories(prev=>prev.map(i=>i.id===inv.id?{...i, contados:i.contados+1}:i));
          onFinish(c);
          q.next();
        }}
      />
    </div>
  );
}

  );

function ReportsScreen({counts, inventories, currentUser, sendHistory, onLogSend}){
  const [email, setEmail] = useState('');
  const [assunto, setAssunto] = useState('Stock360 — Relatório de Inventário Cíclico');
  const [mensagem, setMensagem] = useState('Segue relatório de contagens e divergências do inventário cíclico para análise e solicitação de ajuste de estoque.');
  const [feedback, setFeedback] = useState('');

  const divergentesCount = counts.filter(c=>c.diferenca!==0).length;

  function downloadWorkbook(){
    if(!window.XLSX){
      setFeedback('⚠ A biblioteca de exportação não carregou (verifique a conexão com a internet).');
      return false;
    }
    const wb = generateReportWorkbook(counts, inventories);
    const filename = `Stock360_Relatorio_${new Date().toISOString().slice(0,10)}.xlsx`;
    window.XLSX.writeFile(wb, filename);
    return filename;
  }

  function handleDownloadClick(){
    const filename = downloadWorkbook();
    if(filename) setFeedback('Relatório baixado: ' + filename);
  }

  function handleSendEmail(e){
    e.preventDefault();
    if(!email.trim()){ setFeedback('Informe o e-mail do destinatário.'); return; }
    const filename = downloadWorkbook();
    if(!filename) return;
    const body = encodeURIComponent(mensagem + '\n\n(O arquivo ' + filename + ' foi baixado agora — anexe-o a este e-mail antes de enviar.)');
    const subject = encodeURIComponent(assunto);
    window.location.href = `mailto:${email.trim()}?subject=${subject}&body=${body}`;
    onLogSend({
      id:'ENV-'+Math.random().toString(36).slice(2,7).toUpperCase(),
      destinatario:email.trim(), assunto, arquivo:filename,
      enviadoPor:currentUser.nome, data:new Date().toLocaleString('pt-BR'),
    });
    setFeedback('E-mail preparado no seu programa de e-mail padrão — anexe o arquivo baixado antes de enviar.');
  }

  return (
    <div>
      <div className="role-note">{counts.length} contagens registradas · {divergentesCount} com divergência</div>
      {feedback && <div className="login-success" style={{marginBottom:16}}>{feedback}</div>}

      <div className="panel">
        <div className="section-title" style={{marginTop:0}}>Baixar Relatório</div>
        <div style={{fontSize:13,color:'var(--ink-dim)',marginBottom:14,lineHeight:1.6}}>
          Gera uma planilha Excel (.xlsx) com 3 abas: <strong>Resumo</strong> (indicadores gerais),
          <strong> Contagens</strong> (todas as contagens realizadas, com histórico completo de
          rodadas) e <strong>Solicitação de Ajuste</strong> (só os itens com divergência —
          pronta para enviar à equipe responsável por corrigir o saldo no Protheus).
        </div>
        <button className="btn btn-primary" onClick={handleDownloadClick} disabled={counts.length===0}>
          <Ic>⬇</Ic> Baixar Excel (.xlsx)
        </button>
        {counts.length===0 && <div style={{fontSize:12,color:'var(--ink-dim)',marginTop:8}}>Nenhuma contagem registrada ainda.</div>}
      </div>

      <div className="panel">
        <div className="section-title" style={{marginTop:0}}>Enviar por E-mail</div>
        <div className="divergence-alert" style={{marginBottom:14}}>
          <Ic>ℹ</Ic>
          <span>Por limitação de segurança dos navegadores, não é possível anexar o arquivo
          automaticamente a um e-mail. Ao enviar, o Excel é baixado e o seu programa de
          e-mail abre com o texto pronto — só falta anexar o arquivo baixado antes de mandar.</span>
        </div>
        <form onSubmit={handleSendEmail}>
          <div className="field">
            <label>Destinatário</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="controladoria@empresa.com" />
          </div>
          <div className="field">
            <label>Assunto</label>
            <input type="text" value={assunto} onChange={e=>setAssunto(e.target.value)} />
          </div>
          <div className="field">
            <label>Mensagem</label>
            <textarea value={mensagem} onChange={e=>setMensagem(e.target.value)} />
          </div>
          <button className="btn btn-primary" type="submit" disabled={counts.length===0}>
            <Ic>✉</Ic> Baixar e Preparar E-mail
          </button>
        </form>
      </div>

      {sendHistory.length>0 && (
        <div className="panel">
          <div className="section-title" style={{marginTop:0}}>Histórico de Envios</div>
          <table className="rank-table">
            <thead><tr><th>Destinatário</th><th>Assunto</th><th>Enviado por</th><th>Data</th></tr></thead>
            <tbody>
              {sendHistory.map(h=>(
                <tr key={h.id}><td>{h.destinatario}</td><td>{h.assunto}</td><td>{h.enviadoPor}</td><td style={{fontFamily:'var(--font-mono)',fontSize:11.5}}>{h.data}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function Dashboard({counts, inventories}){
  const planejados = inventories.reduce((s,i)=>s+i.qtdItens,0);
  const contados = counts.length;
  const pendentes = Math.max(planejados-contados,0);
  const divergentes = counts.filter(c=>c.diferenca!==0);
  const acuracidade = contados>0 ? (((contados-divergentes.length)/contados)*100).toFixed(1) : '100.0';
  const valorDivergente = counts.reduce((s,c)=>s+Number(c.valorDivergente||0),0);

  const porOperador = {};
  counts.forEach(c=>{ porOperador[c.usuario] = (porOperador[c.usuario]||0)+1; });
  const maxOp = Math.max(1, ...Object.values(porOperador));

  const porMotivo = {};
  divergentes.forEach(c=>{ if(c.motivo) porMotivo[c.motivo] = (porMotivo[c.motivo]||0)+1; });
  const maxMotivo = Math.max(1, ...Object.values(porMotivo));

  const topDivergentes = [...counts].sort((a,b)=>Math.abs(b.diferenca)-Math.abs(a.diferenca)).slice(0,10);

  return (
    <div>
      <div className="section-title">Operação</div>
      <div className="kpi-grid">
        <div className="kpi"><div className="kv">{planejados}</div><div className="kl">Itens Planejados</div></div>
        <div className="kpi"><div className="kv">{contados}</div><div className="kl">Itens Contados</div></div>
        <div className="kpi"><div className="kv">{pendentes}</div><div className="kl">Itens Pendentes</div></div>
        <div className="kpi"><div className="kv">{counts.length ? '4.2min' : '—'}</div><div className="kl">Tempo Médio</div></div>
      </div>

      <div className="section-title">Qualidade</div>
      <div className="kpi-grid">
        <div className="kpi"><div className="kv" style={{color:'var(--ok)'}}>{acuracidade}%</div><div className="kl">Acuracidade do Estoque</div></div>
        <div className="kpi"><div className="kv" style={{color:'var(--warn)'}}>{divergentes.length}</div><div className="kl">Divergências</div></div>
        <div className="kpi"><div className="kv" style={{color:'var(--danger)'}}>R$ {valorDivergente.toFixed(0)}</div><div className="kl">Valor Divergente</div></div>
        <div className="kpi"><div className="kv">{inventories.length}</div><div className="kl">Inventários Ativos</div></div>
      </div>

      {Object.keys(porOperador).length>0 && (
        <div>
          <div className="section-title">Produtividade por Operador</div>
          <div className="panel">
            {Object.entries(porOperador).map(([nome,n])=>(
              <div key={nome} className="bar-row">
                <div className="bl">{nome}</div>
                <div className="bar-track"><div className="bar-fill" style={{width:(n/maxOp*100)+'%'}}><span>{n}</span></div></div>
              </div>
            ))}
          </div>
        </div>
      )}

      {Object.keys(porMotivo).length>0 && (
        <div>
          <div className="section-title">Principais Causas de Erro</div>
          <div className="panel">
            {Object.entries(porMotivo).map(([m,n])=>(
              <div key={m} className="bar-row">
                <div className="bl" style={{width:160}}>{m}</div>
                <div className="bar-track"><div className="bar-fill" style={{width:(n/maxMotivo*100)+'%', background:'var(--danger)'}}><span style={{color:'#fff'}}>{n}</span></div></div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="section-title">Top Itens com Maior Divergência</div>
      <div className="panel">
        {topDivergentes.length===0 ? <div style={{color:'var(--ink-dim)',fontSize:13}}>Sem contagens registradas.</div> : (
          <table className="rank-table">
            <thead><tr><th>Item</th><th>Endereço</th><th>Diferença</th></tr></thead>
            <tbody>
              {topDivergentes.map(c=>(
                <tr key={c.id}><td>{c.descricao}</td><td>{c.endereco}</td><td className="num" style={{color:c.diferenca===0?'var(--ok)':'var(--danger)'}}>{c.diferenca>0?'+':''}{c.diferenca}</td></tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}
