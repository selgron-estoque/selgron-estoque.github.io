// Painel "Filtros" — extraído do Dashboard pra ser reaproveitado em
// qualquer outra tela que precise do mesmo controle de período (presets de
// calendário + intervalo personalizado + chip do intervalo aplicado). Só
// dono do INTERVALO (`trendFilter`/`setTrendFilter`, geralmente
// usePersistedState no componente pai — cada tela usa sua própria chave, o
// filtro de uma tela não deve afetar a outra) — quem usa o intervalo pra
// filtrar dado é sempre o componente pai. `onRefresh`/`refreshing` são
// opcionais: só faz sentido passar quando a tela depende de uma busca
// assíncrona que vale a pena repetir sob demanda (ex.: saldo do Supabase no
// Dashboard); telas que só recalculam em cima de dado já carregado em
// memória (ex.: Contagens Concluídas) podem omitir os dois e o botão
// "Atualizar" nem aparece.
function TrendFilterBar({trendFilter, setTrendFilter, dataInicioStr, dataFimStr, hojeStr, onRefresh, refreshing, subtitle}){
  return (
    <div className="trend-filter-bar">
      <div className="tfb-head">
        <div className="tfb-icon-badge"><FilterIcon /></div>
        <div className="tfb-head-text">
          <div className="tfb-title">Filtros</div>
          <div className="tfb-subtitle">{subtitle || 'Selecione o período para atualizar os indicadores'}</div>
        </div>
        <div className="tfb-head-actions">
          <div className="tfb-range-chip"><CalendarIcon /> {fmtDataBR(dataInicioStr)} – {fmtDataBR(dataFimStr)}</div>
          {onRefresh && (
            <button type="button" className="tfb-refresh-btn" onClick={onRefresh} disabled={refreshing}>
              <RefreshIcon spinning={refreshing} /> {refreshing ? 'Atualizando…' : 'Atualizar'}
            </button>
          )}
        </div>
      </div>
      <div className="tfb-period-row">
        <div className="tfb-period-label"><CalendarIcon /> Período</div>
        <div className="tfb-quick-buttons">
          {[
            {v:'todos', l:'Todos os períodos'},
            {v:'hoje', l:'Hoje'},
            {v:'semana', l:'Esta semana'},
            {v:'mes', l:'Este mês'},
            {v:'30d', l:'Últimos 30 dias'},
            {v:'60d', l:'Últimos 60 dias'},
            {v:'90d', l:'Últimos 90 dias'},
            {v:'ano', l:'Este ano'},
            {v:'custom', l:'Personalizado'},
          ].map(opt=>(
            <button
              key={opt.v}
              type="button"
              className={'tfb-pill'+(trendFilter.tipo===opt.v ? ' active' : '')}
              onClick={()=>{
                if(opt.v==='custom'){
                  // Preenche os campos com o intervalo já aplicado (em vez
                  // de começar de "hoje até hoje") pra não dar a impressão
                  // de que o filtro "sumiu" ao entrar no modo personalizado.
                  setTrendFilter({tipo:'custom', from:dataInicioStr, to:dataFimStr});
                } else {
                  setTrendFilter({tipo:opt.v, from:'', to:''});
                }
              }}
            >{opt.l}</button>
          ))}
        </div>
      </div>
      {trendFilter.tipo==='custom' && (
        <div className="tfb-custom-row">
          <div className="tfb-date-field">
            <label htmlFor="tfb-date-from">Data inicial</label>
            <div className="tfb-date-input-wrap">
              <CalendarIcon />
              <input id="tfb-date-from" type="date" value={trendFilter.from} max={trendFilter.to || hojeStr} onChange={e=>setTrendFilter(f=>({...f, from:e.target.value}))} />
            </div>
          </div>
          <div className="tfb-date-field">
            <label htmlFor="tfb-date-to">Data final</label>
            <div className="tfb-date-input-wrap">
              <CalendarIcon />
              <input id="tfb-date-to" type="date" value={trendFilter.to} min={trendFilter.from} max={hojeStr} onChange={e=>setTrendFilter(f=>({...f, to:e.target.value}))} />
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Dashboard({counts, inventories, historicoConcluidas=[], historicoParaTendencia=[], goto}){
  const planejados = inventories.reduce((s,i)=>s+i.qtdItens,0);
  const contados = counts.length;
  const pendentes = Math.max(planejados-contados,0);

  // Filtro de período do painel "Filtros" — trocado de janelas fixas
  // ("10/26 semanas") pra presets de calendário (Hoje/Esta semana/Este
  // mês/Últimos 30-90 dias/Este ano/Personalizado), pedido explícito do
  // cliente pra ficar "mais profissional" e no vocabulário do dia a dia
  // (mesmo catálogo usado por Power BI/Stripe Dashboard). Persiste no
  // localStorage (`usePersistedState`) — reabrir a tela de Indicadores
  // mantém o último filtro escolhido, também pedido explicitamente.
  // `from`/`to` só têm significado quando `tipo==='custom'`; os presets
  // fixos são sempre recalculados a partir de "hoje" (ver
  // `computeTrendRange`), então nunca ficam desatualizados.
  const [trendFilter, setTrendFilter] = usePersistedState('dashboardTrendFilter', {tipo:'30d', from:'', to:''});

  // "Qualidade" (acuracidade/divergências/valor divergente), "Principais
  // Causas de Erro" e "Top Itens com Maior Divergência" passam a somar o
  // histórico importado — sem isso essa tela inteira ficava praticamente
  // vazia logo depois de um reset, já que dependia só de `counts` (contagens
  // feitas ao vivo no app). "Itens Planejados/Contados/Pendentes" (progresso
  // de inventário em andamento) e "Produtividade por Operador" continuam só
  // com dado ao vivo, de propósito — são conceitos sobre a operação ATUAL,
  // não fazem sentido misturados com um histórico de meses atrás; o
  // histórico também não tem operador real por trás de cada linha (ver
  // `usuario:'Importação Histórica'` em historicoRowToCountLike).
  const historicoComoContagem = historicoConcluidas.map(historicoRowToCountLike).filter(Boolean);
  const todasParaQualidade = [...counts, ...historicoComoContagem];
  // Bug real corrigido aqui: `diferenca!==0` sozinho conta item SEM saldo
  // pra comparar (diferenca:null, ex.: código fora do catálogo) como
  // divergente — mesma classe de bug já corrigida antes em
  // computeWeeklyStats, reproduzida aqui e em buildSummaryRows (relatório
  // Excel). Era a causa de "Acuracidade do Estoque" mostrar um número
  // diferente aqui do que na Home (que já excluía null corretamente via
  // acumuladoAte) — cliente reportou 3 cards de acuracidade com valores
  // diferentes.
  const divergentes = todasParaQualidade.filter(c=>c.diferenca!==0 && c.diferenca!==null);
  const acuracidade = todasParaQualidade.length>0 ? (((todasParaQualidade.length-divergentes.length)/todasParaQualidade.length)*100).toFixed(1) : '100.0';
  const valorDivergente = todasParaQualidade.reduce((s,c)=>s+Number(c.valorDivergente||0),0);
  // Card "Itens Divergentes" (Resumo da Operação) — cliente pediu pra
  // mostrar, dentro do mesmo card, quantos registros de contagem existem no
  // total e quantos CÓDIGOS distintos isso representa (um mesmo produto pode
  // ter mais de um registro — 1ª contagem + recontagem, ou contagem ao vivo
  // + linha do histórico — então "registros" e "códigos únicos" são números
  // diferentes por natureza). Mesmo raciocínio pro "Divergências": 835
  // registros divergentes não são necessariamente 835 PRODUTOS diferentes.
  const codigosDistintosContados = new Set(todasParaQualidade.map(c=>c.productCode)).size;
  const codigosDistintosDivergentes = new Set(divergentes.map(c=>c.productCode)).size;

  // Valor em estoque por armazém — vem do Supabase (estoque_saldo,
  // atualizado via upload manual da planilha SB2 em Configurações, ver
  // StockSyncPanel). Sem fallback pro cache local (removido, ver CLAUDE.md
  // "cache local removido") — se a tabela ainda estiver vazia, mostra um
  // empty-state honesto em vez de calcular a partir de dado estático.
  const [estoqueRemoto, setEstoqueRemoto] = useState(null); // null = ainda carregando/não tentado
  const [resumoGeral, setResumoGeral] = useState(null);
  const [modoValor, setModoValor] = useState('valor'); // 'valor' | 'percentual' — toggle do painel "Valor por Armazém"
  // "Atualizar" do painel de Filtros re-busca o saldo/resumo do Supabase —
  // ação de verdade (não decorativa): os gráficos de tendência já são
  // recalculados na hora a partir de `counts`/histórico (em memória, sem
  // custo de rede), mas o painel "Valor por Armazém" depende de RPCs que só
  // rodam no mount por padrão — esse botão dá ao usuário um jeito manual de
  // puxar o saldo mais recente sem precisar recarregar a página inteira
  // (útil se o líder subiu uma planilha SB2 nova em outro aparelho/aba
  // enquanto essa tela já estava aberta).
  const [atualizando, setAtualizando] = useState(false);
  const carregarEstoque = async () => {
    setAtualizando(true);
    try {
      const [rows, resumo] = await Promise.all([
        fetchEstoqueValorPorAlmoxarifado(),
        fetchEstoqueResumoGeral(),
      ]);
      setEstoqueRemoto(rows);
      setResumoGeral(resumo);
    } finally {
      setAtualizando(false);
    }
  };
  useEffect(()=>{ carregarEstoque(); }, []);

  const porArmazem = {};
  (estoqueRemoto||[]).forEach(r=>{ porArmazem[r.almoxarifado || '—'] = Number(r.valor_total||0); });
  const armazens = Object.keys(porArmazem).sort();
  const valorTotalEstoque = armazens.reduce((s,k)=>s+porArmazem[k],0);
  const maxArmazemValor = Math.max(1, ...armazens.map(a=>porArmazem[a]));
  const fmtReais = v => 'R$ ' + Number(v).toLocaleString('pt-BR',{maximumFractionDigits:0});
  const armazensAtivos = Number(resumoGeral?.armazens_ativos || armazens.length);
  const ARMAZEM_COLORS = ['#F6A200','#2563EB','#16A34A','#DB2777','#7C3AED','#0D9488','#64748B','#EA580C'];

  const porOperador = {};
  counts.forEach(c=>{ porOperador[c.usuario] = (porOperador[c.usuario]||0)+1; });
  const maxOp = Math.max(1, ...Object.values(porOperador));

  const porMotivo = {};
  divergentes.forEach(c=>{ if(c.motivo) porMotivo[c.motivo] = (porMotivo[c.motivo]||0)+1; });
  const maxMotivo = Math.max(1, ...Object.values(porMotivo));

  // Divergência por Família/Grupo (Resumo da Operação) — `familia` só existe
  // em contagens registradas a partir do redesenho "coletor industrial" (ver
  // CLAUDE.md, `CountStep.finalize`), que passou a gravar o campo junto da
  // contagem; contagens antigas e itens do histórico importado (que nunca
  // teve coluna de grupo/família na planilha) não têm esse dado — ficam de
  // fora da soma em vez de aparecerem como "sem família" fabricado. Ordenado
  // do maior pro menor, mesmo critério visual de "Principais Causas de Erro".
  const porFamiliaObj = {};
  divergentes.forEach(c=>{ if(c.familia) porFamiliaObj[c.familia] = (porFamiliaObj[c.familia]||0)+1; });
  const porFamilia = Object.entries(porFamiliaObj).sort((a,b)=>b[1]-a[1]);
  const maxFamilia = Math.max(1, ...porFamilia.map(([,n])=>n));

  const topDivergentes = [...todasParaQualidade].sort((a,b)=>Math.abs(b.diferenca||0)-Math.abs(a.diferenca||0)).slice(0,5);
  // "Tendência Semanal" usa um pool AINDA MAIS amplo que "Qualidade" — inclui
  // status "Pendente" do histórico (fora de escopo pro resto do app), porque
  // aqui o que importa é quantas contagens de verdade aconteceram naquela
  // semana e qual a acuracidade média delas, não se já foram decididas. Cada
  // linha do histórico carrega a DATA REAL em que a contagem aconteceu
  // (fev-jul/2026, não a data de importação), então soma na semana certa
  // igual a qualquer contagem ao vivo — nenhum pico artificial.
  const historicoTendenciaComoContagem = historicoParaTendencia
    .filter(h=>h.data)
    .map(h=>({data:h.data, diferenca:h.diferenca, saldoSistema:h.saldo_sistema, acuracidade:h.acuracidade}));
  const poolTendencia = [...counts, ...historicoTendenciaComoContagem];
  // Janela dos gráficos é escolhível (cliente pediu): fixa em 10/26 semanas,
  // "todo o período" (da contagem mais antiga do pool até hoje) ou um
  // período personalizado (dois campos de data) pra quando o cliente
  // precisar olhar uma janela específica. As três opções convergem pro mesmo
  // par `dataInicioStr`/`dataFimStr`, usado tanto por `computeWeeklyStats`
  // quanto por `computeMonthlyStats` — os dois recebem intervalo de data
  // agora, não mais "quantidade de semanas".
  const hojeStr = hojeLocalStr();
  const trendRange = computeTrendRange(trendFilter.tipo, hojeStr, trendFilter.from, trendFilter.to);
  let dataInicioStr = trendRange.from, dataFimStr = trendRange.to;
  if(dataInicioStr > dataFimStr) dataInicioStr = dataFimStr; // evita intervalo invertido se o usuário escolher datas fora de ordem
  const weeklyStats = computeWeeklyStats(poolTendencia, dataInicioStr, dataFimStr);
  // "Acuracidade Mensal" é INDEPENDENTE do filtro de período acima —
  // deliberado, cliente pediu "mostrar todos os meses com dados do ano".
  // Um mês é um balde grande de mais pro filtro de "10/26 semanas" fazer
  // sentido (10 semanas cobre só ~2-3 meses, deixando o gráfico mensal
  // praticamente vazio a maior parte do tempo) — em vez disso, esse
  // gráfico sempre mostra o ano corrente inteiro até hoje.
  const anoAtualStr = String(new Date().getFullYear()) + '-01-01';
  const monthlyStats = computeMonthlyStats(poolTendencia, anoAtualStr, hojeStr);

  return (
    <div>
      <div className="section-title">Operação</div>
      <div className="kpi-grid">
        <div className="kpi"><div className="kv">{planejados}</div><div className="kl">Itens Planejados</div></div>
        <div className="kpi"><div className="kv">{contados}</div><div className="kl">Itens Contados</div></div>
        <div className="kpi"><div className="kv">{pendentes}</div><div className="kl">Itens Pendentes</div></div>
        <div className="kpi"><div className="kv">{counts.length ? '4.2min' : '—'}</div><div className="kl">Tempo Médio</div></div>
      </div>

      {armazens.length===0 && (
        <div className="empty-state" style={{padding:20,marginBottom:14}}>
          <div className="ic"><Ic size={40}>📦</Ic></div>
          Nenhum saldo carregado ainda. Envie a planilha SB2 em Configurações pra ver o valor em estoque por armazém.
        </div>
      )}

      {armazens.length>0 && (
        <div className="panel">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10,marginBottom:14}}>
            <div>
              <div className="section-title" style={{marginTop:0,marginBottom:4}}>Valor por Armazém</div>
              <div style={{fontSize:12,color:'var(--ink-dim)'}}>Distribuição do valor total em estoque por armazém.</div>
            </div>
            <div style={{display:'flex',border:'1px solid var(--line)',borderRadius:8,overflow:'hidden',flexShrink:0}}>

const PERFIL_OPTIONS = [
  {v:'operador', label:'Operador'},
  {v:'lider', label:'Líder de Estoque'},
  {v:'admin', label:'Administrador'},
];

function emptyUserForm(){
  return {nome:'', usuario:'', email:'', senha:'', perfil:'operador', acessosExtras:[]};
}

// Rótulo curto de cada tela restrita, pros checkboxes de "Acessos extras" no
// UserForm — mesmos ids usados em ACESSOS_RESTRITOS/buildSidebarGroups.
const ACESSOS_EXTRAS_LABELS = {
  dashboard: 'Indicadores',
  relatorios: 'Relatórios',
  enderecos: 'Endereços Pendentes',
  usuarios: 'Usuários',
};

// Verifica se o login já está em uso por OUTRO usuário (case-insensitive,
// mesma normalização usada no login real). Na edição, exclui o próprio
// usuário da checagem — ele pode manter o login que já tinha.
function isLoginDuplicado(users, usuario, excludeId){
  const norm = usuario.trim().toLowerCase();
  return users.some(u => u.id!==excludeId && u.usuario.trim().toLowerCase()===norm);
}

const USERS_PAGE_SIZE = 8;

function UserManagementPanel({users, currentUser, goto, onToggleUserStatus, onDeleteUser, onAdminPasswordAction}){
  const [search, setSearch] = useState('');
  const [page, setPage] = useState(1);
  const [pwAction, setPwAction] = useState(null); // userId currently doing a password action
  const [pwValue, setPwValue] = useState('');
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  // Ações agora aguardam confirmação do Supabase (ver App()) — busyId
  // desabilita só o botão clicado, erros guarda a mensagem por usuário, mesmo
  // padrão já usado em RecountsPanel pra aprovar/rejeitar divergência.
  const [busyId, setBusyId] = useState(null);
  const [erros, setErros] = useState({});
  // Senha temporária gerada (ver handlePwAction, modo 'temp') — precisa
  // aparecer na hora, em destaque, senão o admin não tem como repassar pro
  // usuário. Antes disso, o valor só ficava guardado no "Histórico de
  // Alterações de Senha" (rodapé da tela), sem nenhum aviso imediato —
  // parecia que o botão "Gerar temporária" não tinha feito nada.
  const [senhaGerada, setSenhaGerada] = useState({}); // {[userId]: senha}

  async function handleToggle(userId){
    setBusyId(userId);
    setErros(prev=>({...prev, [userId]: null}));
    const res = await onToggleUserStatus(userId);
    setBusyId(null);
    if(!res || !res.ok) setErros(prev=>({...prev, [userId]: (res && res.erro) || 'Não foi possível atualizar — tente novamente.'}));
  }

  async function handleDelete(userId){
    setBusyId(userId);
    setErros(prev=>({...prev, [userId]: null}));
    const res = await onDeleteUser(userId);
    setBusyId(null);
    if(res && res.ok){
      setConfirmDeleteId(null);
    } else {
      setErros(prev=>({...prev, [userId]: (res && res.erro) || 'Não foi possível excluir — tente novamente.'}));
    }
  }

  async function handlePwAction(userId, acao, senha){
    setBusyId(userId);
    setErros(prev=>({...prev, [userId]: null}));
    const res = await onAdminPasswordAction(userId, acao, senha);
    setBusyId(null);
    if(res && res.ok){
      if(acao==='temp' && res.senhaTemporaria){
        // Mantém o painel aberto (em vez de fechar com setPwAction(null))
        // pra dar tempo do admin ler/copiar a senha antes de sumir da tela.
        setSenhaGerada(prev=>({...prev, [userId]: res.senhaTemporaria}));
      } else {
        setPwAction(null);
      }
    } else {
      setErros(prev=>({...prev, [userId]: (res && res.erro) || 'Não foi possível salvar a senha — tente novamente.'}));
    }
  }

  const filtered = useMemo(()=>{
    const q = search.trim().toLowerCase();
    if(!q) return users;
    return users.filter(u=>
      u.nome.toLowerCase().includes(q) ||
      u.usuario.toLowerCase().includes(q) ||
      (u.email||'').toLowerCase().includes(q)
    );
  }, [users, search]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / USERS_PAGE_SIZE));
  const currentPage = Math.min(page, totalPages);
  const paged = filtered.slice((currentPage-1)*USERS_PAGE_SIZE, currentPage*USERS_PAGE_SIZE);

  function handleSearchChange(v){
    setSearch(v);
    setPage(1);
  }

  return (
    <div className="panel">
      <div className="field">
        <label>Buscar usuário</label>
        <input type="text" value={search} onChange={e=>handleSearchChange(e.target.value)} placeholder="Nome completo, login ou e-mail" />
      </div>

      <button className="btn btn-secondary" style={{marginBottom:14}} onClick={()=>goto('userForm', {mode:'new'})}>+ Novo Usuário</button>

      {filtered.length===0 ? (
        <div style={{fontSize:13,color:'var(--ink-dim)',padding:'12px 0'}}>Nenhum usuário encontrado{search?` para "${search}"`:''}.</div>
      ) : (
        <React.Fragment>
          {paged.map(u=>(
            <div key={u.id} className="list-row" style={{flexWrap:'wrap',alignItems:'flex-start'}}>
              <div>
                <div className="lr-title">{u.nome}{u.id===currentUser.id && <span style={{color:'var(--ink-dim)',fontWeight:400}}> (você)</span>}</div>
                <div className="lr-sub">{u.usuario} · {PERFIL_OPTIONS.find(p=>p.v===u.perfil)?.label}</div>
                <div style={{fontSize:11.5,color:'var(--ink-dim)',marginTop:4}}>
                  Último acesso: {u.ultimoAcesso ? new Date(u.ultimoAcesso).toLocaleString('pt-BR') : 'nunca acessou'}
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
                <StatusTag status={u.status==='ativo'?'ok':u.status==='bloqueado'?'danger':'warn'} text={u.status==='ativo'?'Ativo':u.status==='bloqueado'?'Bloqueado':'Aguardando nova senha'} />
                <div className="btn-row" style={{width:'auto'}}>
                  <button className="btn btn-outline" style={{padding:'7px 10px',fontSize:10.5}} disabled={busyId===u.id} onClick={()=>goto('userForm', {mode:u.id, initialData:u})}>Editar</button>
                  {/* Nunca mostra "Bloquear" na própria linha — mesmo raciocínio já
                      usado no botão "Excluir" abaixo. Se por algum motivo a própria
                      conta já estiver bloqueada, "Desbloquear" continua visível. */}
                  {(u.id!==currentUser.id || u.status==='bloqueado') && (
                    <button className="btn btn-outline" style={{padding:'7px 10px',fontSize:10.5}} disabled={busyId===u.id} onClick={()=>handleToggle(u.id)}>{busyId===u.id ? 'Enviando…' : (u.status==='bloqueado'?'Desbloquear':'Bloquear')}</button>
                  )}
                  <button className="btn btn-outline" style={{padding:'7px 10px',fontSize:10.5}} disabled={busyId===u.id} onClick={()=>{setPwAction(pwAction===u.id?null:u.id); setPwValue(''); setErros(prev=>({...prev,[u.id]:null})); setSenhaGerada(prev=>{const n={...prev}; delete n[u.id]; return n;});}}>Redefinir senha</button>
                  {u.id!==currentUser.id && (
                    <button className="btn btn-danger" style={{padding:'7px 10px',fontSize:10.5,width:'auto'}} disabled={busyId===u.id} onClick={()=>{setConfirmDeleteId(u.id); setErros(prev=>({...prev,[u.id]:null}));}}>Excluir</button>
                  )}
                </div>
                {erros[u.id] && pwAction!==u.id && confirmDeleteId!==u.id && (
                  <div style={{fontSize:11.5,color:'var(--danger)',maxWidth:260,textAlign:'right'}}>{erros[u.id]}</div>
                )}
                {pwAction===u.id && (
                  <div style={{background:'var(--panel-raised)',border:'1px solid var(--line)',borderRadius:8,padding:12,width:260}}>
                    {senhaGerada[u.id] ? (
                      <React.Fragment>
                        <div style={{fontSize:11.5,color:'var(--ink-dim)',marginBottom:6}}>Senha temporária gerada — repasse ao usuário agora (não fica visível de novo depois de fechar):</div>
                        <div style={{fontFamily:'var(--font-mono)',fontSize:16,fontWeight:700,color:'var(--ok)',background:'var(--ok-bg)',border:'1px solid var(--ok)',borderRadius:6,padding:'8px 10px',textAlign:'center',marginBottom:8,letterSpacing:1}}>{senhaGerada[u.id]}</div>
                        <button className="btn btn-secondary" style={{padding:'8px',fontSize:10}} onClick={()=>{setSenhaGerada(prev=>{const n={...prev}; delete n[u.id]; return n;}); setPwAction(null);}}>Fechar</button>
                      </React.Fragment>
                    ) : (
                      <React.Fragment>
                        {erros[u.id] && <div style={{fontSize:11.5,color:'var(--danger)',marginBottom:8}}>{erros[u.id]}</div>}
                        <div className="btn-row" style={{marginBottom:8}}>
                          <button className="btn btn-secondary" style={{padding:'8px',fontSize:10}} disabled={busyId===u.id} onClick={()=>handlePwAction(u.id,'temp')}>{busyId===u.id ? 'Enviando…' : 'Gerar temporária'}</button>
                          <button className="btn btn-secondary" style={{padding:'8px',fontSize:10}} disabled={busyId===u.id} onClick={()=>handlePwAction(u.id,'liberar')}>Liberar p/ criar</button>
                        </div>
                        <input type="text" placeholder="Definir senha manual" value={pwValue} onChange={e=>setPwValue(e.target.value)} style={{width:'100%',padding:8,marginBottom:8,background:'var(--panel)',border:'1px solid var(--line)',borderRadius:6,color:'var(--ink)',fontSize:12}} />
                        <button className="btn btn-primary" style={{padding:'8px',fontSize:10}} disabled={pwValue.length<6 || busyId===u.id} onClick={()=>handlePwAction(u.id,'definir',pwValue)}>{busyId===u.id ? 'Enviando…' : 'Confirmar senha definida'}</button>
                      </React.Fragment>
                    )}
                  </div>
                )}
                {confirmDeleteId===u.id && (
                  <div style={{background:'var(--danger-bg)',border:'1px solid var(--danger)',borderRadius:8,padding:12,width:260}}>
                    <div style={{fontSize:12,color:'var(--danger)',marginBottom:10}}>Excluir "{u.nome}"? Essa ação não pode ser desfeita.</div>
                    {erros[u.id] && <div style={{fontSize:11.5,color:'var(--danger)',marginBottom:10}}>{erros[u.id]}</div>}
                    <div className="btn-row">
                      <button className="btn btn-secondary" style={{padding:'8px',fontSize:10}} disabled={busyId===u.id} onClick={()=>setConfirmDeleteId(null)}>Cancelar</button>
                      <button className="btn btn-danger" style={{padding:'8px',fontSize:10}} disabled={busyId===u.id} onClick={()=>handleDelete(u.id)}>{busyId===u.id ? 'Excluindo…' : 'Confirmar exclusão'}</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          ))}
          {totalPages>1 && (
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:10,paddingTop:14,borderTop:'1px solid var(--line)'}}>
              <button className="btn btn-outline" style={{width:'auto',padding:'8px 14px'}} disabled={currentPage<=1} onClick={()=>setPage(p=>p-1)}>‹ Anterior</button>
              <span style={{fontFamily:'var(--font-mono)',fontSize:11.5,color:'var(--ink-dim)'}}>Página {currentPage} de {totalPages} · {filtered.length} usuário{filtered.length===1?'':'s'}</span>
              <button className="btn btn-outline" style={{width:'auto',padding:'8px 14px'}} disabled={currentPage>=totalPages} onClick={()=>setPage(p=>p+1)}>Próxima ›</button>
            </div>
          )}
        </React.Fragment>
      )}
    </div>
  );
}

function UserForm({mode, initialData, users, onCreateUser, onUpdateUser, onSaved, onCancel}){
  const isEdit = mode!=='new';
  const [form, setForm] = useState(isEdit && initialData
    ? {nome:initialData.nome, usuario:initialData.usuario, email:initialData.email||'', senha:'', perfil:initialData.perfil, acessosExtras:initialData.acessosExtras||[]}
    : emptyUserForm());
  const [feedback, setFeedback] = useState('');
  const [salvando, setSalvando] = useState(false);

  function toggleAcessoExtra(viewId){
    setForm(f=>({...f, acessosExtras: f.acessosExtras.includes(viewId)
      ? f.acessosExtras.filter(v=>v!==viewId)
      : [...f.acessosExtras, viewId]}));
  }

  async function submitForm(e){
    e.preventDefault();
    const nome = form.nome.trim();
    const usuario = form.usuario.trim();
    // E-mail sempre normalizado pra minúsculo — mesmo endereço digitado com
    // maiúscula em lugares diferentes (ex: criação vs. login) não pode virar
    // "duas contas diferentes" pro Supabase Auth, que já trata e-mail como
    // case-insensitive por padrão.
    const email = form.email.trim().toLowerCase();
    if(!nome || !usuario || !email){ setFeedback('Nome, usuário de acesso e e-mail são obrigatórios.'); return; }
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ setFeedback('Informe um e-mail válido.'); return; }
    if(isLoginDuplicado(users, usuario, isEdit ? mode : null)){
      setFeedback('Este login já está sendo utilizado por outro usuário.');
      return;
    }
    setSalvando(true);
    setFeedback('');
    let res;
    if(!isEdit){
      if(!form.senha || form.senha.length<6){ setFeedback('Defina uma senha inicial com pelo menos 6 caracteres.'); setSalvando(false); return; }
      res = await onCreateUser({nome, usuario, email, senha:form.senha, perfil:form.perfil, acessosExtras:form.acessosExtras});
    } else {
      res = await onUpdateUser(mode, {nome, usuario, email, perfil:form.perfil, acessosExtras:form.acessosExtras});
    }
    setSalvando(false);
    if(res && res.ok){
      onSaved(isEdit ? 'Alterações de "'+nome+'" salvas com sucesso.' : 'Usuário "'+nome+'" criado com sucesso.');
    } else {
      setFeedback((res && res.erro) || 'Não foi possível salvar — tente novamente.');
    }
  }

  return (
    <div className="panel">
      <div className="section-title" style={{marginTop:0}}>{isEdit ? 'Editar Usuário' : 'Novo Usuário'}</div>
      <form onSubmit={submitForm}>
        {feedback && <div className="login-error" style={{marginBottom:12}}>{feedback}</div>}
        <div className="field">
          <label>Nome completo</label>
          <input type="text" value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))} autoFocus />
        </div>
        <div className="field">
          <label>Usuário de acesso (login)</label>
          <input type="text" value={form.usuario} onChange={e=>setForm(f=>({...f,usuario:e.target.value}))} placeholder="nome.sobrenome" autoCapitalize="none" />
        </div>
        <div className="field">
          <label>E-mail</label>
          <input type="text" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="nome@empresa.com" autoCapitalize="none" autoCorrect="off" spellCheck="false" />
          <div style={{fontSize:11.5,color:'var(--ink-dim)',marginTop:6}}>
            Operador sem e-mail próprio? Use um endereço fictício com o login da pessoa,
            por exemplo <strong style={{color:'var(--ink)'}}>{(form.usuario||'nome.sobrenome').trim()||'nome.sobrenome'}@estoque.selgron.local</strong> —
            ninguém recebe mensagem nesse endereço, ele só precisa ser único no sistema.
          </div>
        </div>
        {!isEdit && (
          <div className="field">
            <label>Senha inicial</label>
            <input type="text" value={form.senha} onChange={e=>setForm(f=>({...f,senha:e.target.value}))} placeholder="mínimo 6 caracteres" />
          </div>
        )}
        <div className="field">
          <label>Perfil de acesso</label>
          <select value={form.perfil} onChange={e=>setForm(f=>({...f,perfil:e.target.value}))}>
            {PERFIL_OPTIONS.map(p=><option key={p.v} value={p.v}>{p.label}</option>)}
          </select>
        </div>
        <div className="field">
          <label>Acessos extras (além do que o perfil já libera)</label>
          <div>
            {Object.keys(ACESSOS_EXTRAS_LABELS).map(viewId=>{
              const jaIncluso = ACESSOS_RESTRITOS[viewId].includes(form.perfil);
              const ligado = jaIncluso || form.acessosExtras.includes(viewId);
              return (
                <div key={viewId} className="toggle-switch-row">
                  <span style={{fontSize:13,color: jaIncluso ? 'var(--ink-dim)' : 'var(--ink)'}}>
                    {ACESSOS_EXTRAS_LABELS[viewId]}
                    {jaIncluso && <span style={{fontSize:11.5}}> (já incluso no perfil selecionado)</span>}
                  </span>
                  <label className="toggle-switch">
                    <input
                      type="checkbox"
                      checked={ligado}
                      disabled={jaIncluso}
                      onChange={()=>toggleAcessoExtra(viewId)}
                    />
                    <span className="toggle-switch-track"></span>
                  </label>
                </div>
              );
            })}
          </div>
        </div>
        <div className="btn-row">
          <button type="button" className="btn btn-secondary" onClick={onCancel} disabled={salvando}>Cancelar</button>
          <button type="submit" className="btn btn-primary" disabled={salvando}>{salvando ? 'Salvando…' : (isEdit ? 'Salvar Alterações' : 'Criar Usuário')}</button>
        </div>
      </form>
    </div>
  );
}

// Antes vivia empilhado dentro de Configurações, logo acima de Usuários — foi
// destacado pra tela própria (goto('enderecos')) porque estava se misturando
// visualmente com o cadastro de usuário. Mesmo componente/lógica de antes, só
// a navegação até ele que mudou (ver Home, Sidebar).
function AddressValidationPanel({enderecosPropostos=[], onResolve}){
  const pendentes = enderecosPropostos.filter(e=>e.status==='pendente');
  // Confirmar/rejeitar agora aguarda confirmação do Supabase (ver
  // resolveAddressProposal em App()) — mesmo padrão de busyId/erros já usado
  // em UserManagementPanel/RecountsPanel.
  const [busyId, setBusyId] = useState(null);
  const [erros, setErros] = useState({});

  async function handleResolve(id, status){
    setBusyId(id);
    setErros(prev=>({...prev, [id]: null}));
    const res = await onResolve(id, status);
    setBusyId(null);
    if(!res || !res.ok) setErros(prev=>({...prev, [id]: (res && res.erro) || 'Não foi possível salvar — tente novamente.'}));
  }

  return (
    <div className="panel">
      <div className="section-title" style={{marginTop:0}}>
        Aguardando confirmação
        {pendentes.length>0 && <span className="badge" style={{position:'static',marginLeft:8}}>{pendentes.length}</span>}
      </div>
      {enderecosPropostos.length===0 ? (
        <div style={{fontSize:13,color:'var(--ink-dim)'}}>
          Nenhum endereço informado ainda. Toda vez que um operador contar um item sem endereço
          cadastrado, ele vai informar onde encontrou — e o endereço aparece aqui para validação.
        </div>
      ) : (
        enderecosPropostos.map(e=>(
          <div key={e.id} className="list-row" style={{flexWrap:'wrap'}}>
            <div>
              <div className="lr-title">{e.descricao}</div>
              <div className="lr-sub">{e.productCode} · informado como <strong style={{color:'var(--ink)'}}>{e.enderecoInformado}</strong> por {e.usuario} em {e.data}</div>
              {erros[e.id] && <div style={{fontSize:11.5,color:'var(--danger)',marginTop:4}}>{erros[e.id]}</div>}
            </div>
            {e.status==='pendente' ? (
              <div className="btn-row" style={{width:'auto'}}>
                <button className="btn btn-secondary" style={{padding:'8px 12px',fontSize:11}} disabled={busyId===e.id} onClick={()=>handleResolve(e.id,'rejeitado')}>Rejeitar</button>
                <button className="btn btn-primary" style={{padding:'8px 12px',fontSize:11}} disabled={busyId===e.id} onClick={()=>handleResolve(e.id,'confirmado')}>{busyId===e.id ? 'Enviando…' : 'Confirmar'}</button>
              </div>
            ) : (
              <StatusTag status={e.status==='confirmado'?'ok':'danger'} text={e.status==='confirmado'?'Confirmado':'Rejeitado'} />
            )}
          </div>
        ))
      )}
    </div>
  );
}

function StockSyncPanel(){
  const [arquivoNome, setArquivoNome] = useState('');
  const [parseResult, setParseResult] = useState(null);
  const [erro, setErro] = useState('');
  const [status, setStatus] = useState('idle'); // idle | uploading | done | error
  const [progresso, setProgresso] = useState(null);
  const [resultado, setResultado] = useState(null);
  const [ultimaAtualizacao, setUltimaAtualizacao] = useState(undefined); // undefined = carregando, null = nunca atualizado
  const fileRef = useRef();

  useEffect(()=>{
    let cancelado = false;
    fetchUltimaAtualizacaoEstoque().then(v=>{ if(!cancelado) setUltimaAtualizacao(v); });
    return ()=>{ cancelado = true; };
  }, []);

  function handleFile(e){
    const file = e.target.files[0];
    if(!file) return;
    setErro(''); setResultado(null); setParseResult(null); setStatus('idle');
    setArquivoNome(file.name);
    const reader = new FileReader();
    reader.onload = (evt)=>{
      try{
        const data = new Uint8Array(evt.target.result);
        const wb = window.XLSX.read(data, {type:'array', cellDates:true});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = window.XLSX.utils.sheet_to_json(sheet, {defval:''});
        const parsed = parseSB2Rows(rows);
        if(parsed.linhas.length===0){
          setErro('Nenhuma linha válida encontrada — verifique se é o export padrão da SB2 (colunas Produto, Almoxarifado, Saldo Atual, Sld.Atu.).');
          return;
        }
        setParseResult(parsed);
      }catch(err){
        setErro('Não foi possível ler o arquivo. Verifique se é um .xlsx válido.');
      }
    };
    reader.readAsArrayBuffer(file);
  }

  async function handleConfirmar(){
    if(!parseResult) return;
    setStatus('uploading');
    setProgresso({inseridas:0, total:parseResult.linhas.length});
    const res = await replaceEstoqueSaldoInSupabase(parseResult.linhas, (inseridas,total)=>setProgresso({inseridas,total}));
    setResultado(res);
    setStatus(res.ok ? 'done' : 'error');
    if(res.ok) fetchUltimaAtualizacaoEstoque().then(setUltimaAtualizacao);
  }

  return (
    <div className="panel">
      <div className="section-title" style={{marginTop:0}}>Atualizar Saldo em Estoque (SB2)</div>
      <div style={{fontSize:13,color:'var(--ink-dim)',marginBottom:14,lineHeight:1.6}}>
        Enquanto a sincronização automática com o Protheus não está pronta, suba aqui a
        planilha SB2 (export padrão: colunas Produto, Almoxarifado, DT.Ult.Saida, Saldo
        Atual, Sld.Atu.) sempre que precisar atualizar o saldo — normalmente todo dia.
        Cada upload <strong>substitui</strong> todo o saldo anterior pelo snapshot da
        planilha nova. Requer conexão com a internet.
      </div>
      <div style={{fontSize:12.5,fontFamily:'var(--font-mono)',color:'var(--ink-dim)',marginBottom:14}}>
        {ultimaAtualizacao===undefined
          ? 'Verificando última atualização…'
          : ultimaAtualizacao
            ? <>Última atualização: {new Date(ultimaAtualizacao).toLocaleString('pt-BR')}</>
            : 'Ainda sem saldo carregado no Supabase.'}
      </div>
      <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={handleFile} />
      <button className="btn btn-secondary" onClick={()=>fileRef.current.click()}>
        <Ic>📄</Ic> {arquivoNome || 'Selecionar planilha SB2 (.xlsx)'}
      </button>

      {erro && <div className="divergence-alert" style={{marginTop:14}}><Ic>⚠</Ic><span>{erro}</span></div>}

      {parseResult && status!=='done' && (
        <div style={{marginTop:14}}>
          <div style={{fontSize:13,color:'var(--ink-dim)',lineHeight:1.8}}>
            {parseResult.resumo.totalLinhas} linhas na planilha · {parseResult.resumo.validas} válidas ·{' '}
            {parseResult.resumo.armazens} armazéns
            {parseResult.resumo.semCodigo>0 && <> · {parseResult.resumo.semCodigo} sem código</>}
            {parseResult.resumo.invalidas>0 && <> · {parseResult.resumo.invalidas} com dado inválido</>}
          </div>
          <button className="btn btn-primary" style={{marginTop:10}} onClick={handleConfirmar} disabled={status==='uploading'}>
            <Ic>⬆</Ic> {status==='uploading' ? 'Atualizando…' : 'Confirmar atualização'}
          </button>
          {status==='uploading' && progresso && (
            <div style={{fontSize:12,color:'var(--ink-dim)',marginTop:8}}>
              {progresso.inseridas} de {progresso.total} linhas enviadas…
            </div>
          )}
        </div>
      )}

      {resultado && resultado.ok && (
        <div className="login-success" style={{marginTop:14}}>
          Saldo atualizado: {resultado.inseridas} linhas gravadas no Supabase.
        </div>
      )}
      {resultado && !resultado.ok && (
        <div className="divergence-alert" style={{marginTop:14}}><Ic>⚠</Ic><span>{resultado.erro}</span></div>
      )}
    </div>
  );
}

function HistoricoImportPanel({onImported}){
  const [arquivoNome, setArquivoNome] = useState('');
  const [parseResult, setParseResult] = useState(null);
  const [erro, setErro] = useState('');
  const [status, setStatus] = useState('idle'); // idle | uploading | done | error
  const [progresso, setProgresso] = useState(null);
  const [resultado, setResultado] = useState(null);
  const [ultimaImportacao, setUltimaImportacao] = useState(undefined); // undefined = carregando, null = nunca importado
  const [lendo, setLendo] = useState(false); // lendo/parseando o arquivo (planilha grande, ~5MB — sem isso a tela fica sem feedback nenhum entre selecionar o arquivo e o resumo aparecer)
  const fileRef = useRef();

  useEffect(()=>{
    let cancelado = false;
    fetchUltimaImportacaoHistorico().then(v=>{ if(!cancelado) setUltimaImportacao(v); });
    return ()=>{ cancelado = true; };
  }, []);

  function handleFile(e){
    const file = e.target.files[0];
    if(!file) return;
    setErro(''); setResultado(null); setParseResult(null); setStatus('idle');
    setArquivoNome(file.name);
    setLendo(true);
    const reader = new FileReader();
    reader.onload = (evt)=>{
      try{
        const data = new Uint8Array(evt.target.result);
        const wb = window.XLSX.read(data, {type:'array', cellDates:true});
        const sheetName = wb.SheetNames.find(n=>n==='BD_Contagens') || wb.SheetNames[0];
        const sheet = wb.Sheets[sheetName];
        const matrix = window.XLSX.utils.sheet_to_json(sheet, {header:1, defval:null});
        const parsed = parseHistoricoContagensRows(matrix);
        if(parsed.resumo.erroCabecalho){
          setErro('Não encontrei a coluna "Código" em nenhuma linha da planilha — confirme se essa é a aba BD_Contagens (ou equivalente) do arquivo de análise.');
          return;
        }
        if(parsed.linhas.length===0){
          setErro('Nenhuma linha válida encontrada — verifique se as linhas têm código preenchido.');
          return;
        }
        setParseResult(parsed);
      }catch(err){
        setErro('Não foi possível ler o arquivo. Verifique se é um .xlsx válido.');
      }finally{
        setLendo(false);
      }
    };
    reader.onerror = ()=>{
      setErro('Não foi possível ler o arquivo. Verifique se é um .xlsx válido.');
      setLendo(false);
    };
    reader.readAsArrayBuffer(file);
  }

  async function handleConfirmar(){
    if(!parseResult) return;
    setStatus('uploading');
    setProgresso({inseridas:0, total:parseResult.linhas.length});
    const res = await importHistoricoContagensToSupabase(parseResult.linhas, (inseridas,total)=>setProgresso({inseridas,total}));
    if(!res.ok){
      setResultado(res);
      setStatus('error');
      return;
    }
    // Itens com Status="Recontar" ou "Ajustar" não estão resolvidos de
    // verdade — além de ir pro histórico, também alimentam a fila real do
    // app (ver buildRecontarSeedsFromHistorico/buildAjustarSeedsFromHistorico):
    // "Recontar" cai em "Recontagens"/Aguardando Segunda Contagem, "Ajustar"
    // cai em "Itens Divergentes"/Aguardando Análise do Líder. Um upsert só,
    // combinando os dois lotes — `seedRecontarQueueFromHistorico` é genérica
    // o suficiente (só grava o que receber em `contagens`), não precisou de
    // uma função separada só pra isso.
    const seedsRecontar = buildRecontarSeedsFromHistorico(parseResult.linhas);
    const seedsAjustar = buildAjustarSeedsFromHistorico(parseResult.linhas);
    const seedRes = await seedRecontarQueueFromHistorico([...seedsRecontar, ...seedsAjustar]);
    // Depois de semear os NOVOS itens ainda pendentes, limpa os que ficaram
    // órfãos — item que estava "Recontar"/"Ajustar" numa importação anterior
    // e foi resolvido na planilha atual precisa sair de "Recontagens
    // Pendentes"/"Itens Divergentes", senão o site continua mostrando o
    // status velho mesmo com a planilha já corrigida.
    const limpezaRes = seedRes.ok
      ? await limparSeedsHistoricoDesatualizados(parseResult.linhas)
      : {ok:true, removidas:0}; // se a semeadura falhou, não faz sentido tentar limpar também
    const resFinal = seedRes.ok
      ? {
          ...res,
          recontarEnfileiradas: seedsRecontar.length,
          ajustarEnfileirados: seedsAjustar.length,
          seedsRemovidos: limpezaRes.ok ? limpezaRes.removidas : undefined,
          erroLimpezaSeeds: limpezaRes.ok ? undefined : limpezaRes.erro,
        }
      : {...res, erroFilaRecontagem: seedRes.erro};
    setResultado(resFinal);
    setStatus('done');
    // Reavisa App() pra rebuscar os itens concluídos do histórico — sem
    // isso, quem já está logado só veria o resultado atualizado em
    // "Contagens Concluídas"/Indicadores depois de um reload.
    if(onImported) onImported();
    fetchUltimaImportacaoHistorico().then(setUltimaImportacao);
  }

  return (
    <div className="panel">
      <div className="section-title" style={{marginTop:0}}>Importar Histórico de Contagens (planilha de análise)</div>
      <div style={{fontSize:13,color:'var(--ink-dim)',marginBottom:14,lineHeight:1.6}}>
        Envia pro Supabase o histórico de contagens da planilha de análise que a Selgron já
        usava antes do Inventário 360 (aba <strong>BD_Contagens</strong>). Fica guardado
        numa tabela separada, só pra consulta/relatório — não interfere nas contagens em
        andamento no app. Pode subir o mesmo arquivo mais de uma vez conforme ele for
        crescendo: linhas já importadas antes não duplicam.
      </div>
      <div style={{fontSize:12.5,fontFamily:'var(--font-mono)',color:'var(--ink-dim)',marginBottom:14}}>
        {ultimaImportacao===undefined
          ? 'Verificando última importação…'
          : ultimaImportacao
            ? <>Última importação: {new Date(ultimaImportacao).toLocaleString('pt-BR')}</>
            : 'Ainda sem histórico importado no Supabase.'}
      </div>
      <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={handleFile} />
      <button className="btn btn-secondary" onClick={()=>fileRef.current.click()} disabled={lendo}>
        <Ic>📄</Ic> {arquivoNome || 'Selecionar planilha de análise (.xlsx)'}
      </button>
      {lendo && (
        <div style={{fontSize:13,color:'var(--ink-dim)',marginTop:10}}>
          <Ic>⏳</Ic> Lendo planilha… (pode levar alguns segundos, arquivo grande)
        </div>
      )}

      {erro && <div className="divergence-alert" style={{marginTop:14}}><Ic>⚠</Ic><span>{erro}</span></div>}

      {parseResult && status!=='done' && (
        <div style={{marginTop:14}}>
          <div style={{fontSize:13,color:'var(--ink-dim)',lineHeight:1.8}}>
            {parseResult.resumo.totalLinhas} linhas na planilha · {parseResult.resumo.validas} válidas
            {parseResult.resumo.semCodigo>0 && <> · {parseResult.resumo.semCodigo} sem código</>}
            {parseResult.resumo.semData>0 && <> · {parseResult.resumo.semData} sem data</>}
            {parseResult.resumo.duplicadas>0 && <> · {parseResult.resumo.duplicadas} duplicadas (mesmo código+data+endereço, mantida a mais recente)</>}
          </div>
          <div style={{fontSize:13,color:'var(--ink-dim)',marginTop:4}}>
            <Ic>🔁</Ic> {buildRecontarSeedsFromHistorico(parseResult.linhas).length} itens marcados "Recontar" vão entrar na fila de
            recontagem do app (tela "Recontagens" → Aguardando Segunda Contagem).
          </div>
          <div style={{fontSize:13,color:'var(--ink-dim)',marginTop:4}}>
            <Ic>⚠</Ic> {buildAjustarSeedsFromHistorico(parseResult.linhas).length} itens marcados "Ajustar" vão entrar em
            "Itens Divergentes", aguardando decisão do líder de estoque.
          </div>
          <button className="btn btn-primary" style={{marginTop:10}} onClick={handleConfirmar} disabled={status==='uploading'}>
            <Ic>⬆</Ic> {status==='uploading' ? 'Importando…' : 'Confirmar importação'}
          </button>
          {status==='uploading' && progresso && (
            <div style={{fontSize:12,color:'var(--ink-dim)',marginTop:8}}>
              {progresso.inseridas} de {progresso.total} linhas enviadas…
            </div>
          )}
        </div>
      )}

      {resultado && resultado.ok && (
        <div className="login-success" style={{marginTop:14}}>
          Histórico importado: {resultado.inseridas} linhas gravadas (ou atualizadas) no Supabase.
          {resultado.recontarEnfileiradas!=null && <> {resultado.recontarEnfileiradas} itens entraram na fila de recontagem.</>}
          {resultado.ajustarEnfileirados!=null && <> {resultado.ajustarEnfileirados} itens entraram em Itens Divergentes.</>}
          {resultado.seedsRemovidos!=null && resultado.seedsRemovidos>0 && (
            <> {resultado.seedsRemovidos} item(ns) que já tinham status desatualizado (ex: era "Recontar"/"Ajustar" e virou "OK"/"Sem Ajuste"/"Ajustado" na planilha) foram removidos de Recontagens/Itens Divergentes.</>
          )}
          {resultado.erroFilaRecontagem && <><br/><Ic>⚠</Ic> Histórico salvo, mas falhou ao enfileirar recontagens/ajustes: {resultado.erroFilaRecontagem}</>}
          {resultado.erroLimpezaSeeds && <><br/><Ic>⚠</Ic> Histórico salvo, mas falhou ao limpar itens com status desatualizado: {resultado.erroLimpezaSeeds}</>}
        </div>
      )}
      {resultado && !resultado.ok && (
        <div className="divergence-alert" style={{marginTop:14}}><Ic>⚠</Ic><span>{resultado.erro}</span></div>
      )}
    </div>
  );
}

// "Usuários" — extraído de dentro de Configurações (cliente notou que fazia
// mais sentido como cadastro do que como configuração de sistema, mesma
// razão que já tinha levado "Endereços Pendentes" pra fora de Configurações
// antes). Levei junto os dois painéis de senha (Solicitações de
// Redefinição, Histórico de Alterações) — são bem ligados a usuário, mesmo
// padrão de "extrair o bloco tal como está" já usado antes. Só admin
// acessa, mesmo grupo que já tinha esse conteúdo dentro de Configurações.
function UsuariosScreen({users, currentUser, goto, successMessage, onToggleUserStatus, onDeleteUser, onAdminPasswordAction, passwordRequests=[], onResolvePasswordRequest, passwordHistory=[]}){
  const pendentesSenha = passwordRequests.filter(r=>r.status==='pendente');
  // `successMessage` vem via flowState (ver App(), onSaved do UserForm) — só
  // aparece logo depois de criar/editar um usuário com sucesso, some sozinho
  // em qualquer navegação seguinte (flowState é sempre substituído por
  // goto()). Sem isso, criar um usuário não dava nenhuma confirmação visível
  // além de voltar pra esta tela — parecia que "nada tinha acontecido".
  const [dismissed, setDismissed] = useState(false);
  useEffect(()=>{ setDismissed(false); }, [successMessage]);

  return (
    <div>
      {successMessage && !dismissed && (
        <div className="result-banner ok" style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:12}}>
          <span style={{fontSize:13,fontWeight:600,color:'var(--ok)'}}>{successMessage}</span>
          <button type="button" className="btn btn-secondary" style={{width:'auto',padding:'6px 12px',fontSize:11.5}} onClick={()=>setDismissed(true)}>Fechar</button>
        </div>
      )}
      <UserManagementPanel
        users={users}
        currentUser={currentUser}
        goto={goto}
        onToggleUserStatus={onToggleUserStatus}
        onDeleteUser={onDeleteUser}
        onAdminPasswordAction={onAdminPasswordAction}
      />

      <div className="panel">
        <div className="section-title" style={{marginTop:0}}>
          Solicitações de Redefinição de Senha
          {pendentesSenha.length>0 && <span className="badge" style={{position:'static',marginLeft:8}}>{pendentesSenha.length}</span>}
        </div>
        {passwordRequests.length===0 ? (
          <div style={{fontSize:13,color:'var(--ink-dim)'}}>Nenhuma solicitação de "esqueci minha senha" recebida ainda.</div>
        ) : (
          passwordRequests.map(r=>(
            <PasswordRequestRow key={r.id} req={r} onResolve={onResolvePasswordRequest} />
          ))
        )}
      </div>

      {passwordHistory.length>0 && (
        <div className="panel">
          <div className="section-title" style={{marginTop:0}}>Histórico de Alterações de Senha</div>
          <table className="rank-table">
            <thead><tr><th>Usuário</th><th>Ação</th><th>Administrador</th><th>Data/Hora</th></tr></thead>
            <tbody>
              {passwordHistory.map(h=>(
                <tr key={h.id}><td>{h.usuario}</td><td>{h.acao}</td><td>{h.administrador}</td><td style={{fontFamily:'var(--font-mono)',fontSize:11.5}}>{h.data}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// Configurações — esvaziada depois que Usuários (+ painéis de senha) virou
// tela própria em Cadastros. Cliente pediu pra manter a tela no menu mesmo
// vazia ("pode surgir ideias pra colocarmos lá dentro"), em vez de remover o
// item de navegação — placeholder simples até aparecer algo real pra ir aqui.
function Settings({role, currentUser, operadorVeSaldo, onSetOperadorVeSaldo, operadorVeValoresRecontagem, onSetOperadorVeValoresRecontagem, gruposExcluidos, onSetGruposExcluidos, sessionTimeoutMin, onSetSessionTimeoutMin}){
  const isAdmin = role==='admin';

  // Lista COMPLETA de grupos com saldo (sem aplicar a própria exclusão) —
  // o admin precisa ver e poder REMOVER um grupo já excluído, não só
  // adicionar; se filtrássemos aqui pela mesma exclusão, o grupo já marcado
  // desapareceria da lista de sugestões e ficaria impossível desmarcar.
  const [gruposDisponiveis, setGruposDisponiveis] = useState(isAdmin ? null : []);
  useEffect(()=>{
    if(!isAdmin) return;
    let cancelado = false;
    fetchGruposComEstoque().then(lista=>{ if(!cancelado) setGruposDisponiveis(lista); });
    return ()=>{ cancelado = true; };
  }, [isAdmin]);

  // Os 3 `onSet*` recebidos de App() agora são assíncronos (gravam no
  // Supabase, `app_config`) — cada painel tem seu próprio busy/erro, mesmo
  // padrão já usado em RecountsPanel/UserManagementPanel: desabilita só o
  // controle em uso, mostra erro inline se a gravação falhar, nunca finge
  // sucesso.
  const [salvandoSaldo, setSalvandoSaldo] = useState(false);
  const [erroSaldo, setErroSaldo] = useState(null);
  async function toggleOperadorVeSaldo(checked){
    setSalvandoSaldo(true); setErroSaldo(null);
    const res = await onSetOperadorVeSaldo(checked);
    setSalvandoSaldo(false);
    if(!res.ok) setErroSaldo(res.erro || 'Falha ao salvar — tente novamente.');
  }

  // Trava SEPARADA da acima — pedido explícito da Diretoria (ver
  // CLAUDE.md): operação não pode ter acesso a valores nas telas de
  // revisão (Recontagens Pendentes/Itens Divergentes), independente de como
  // "Visibilidade do Saldo na Contagem" estiver configurada.
  const [salvandoValoresRecontagem, setSalvandoValoresRecontagem] = useState(false);
  const [erroValoresRecontagem, setErroValoresRecontagem] = useState(null);
  async function toggleOperadorVeValoresRecontagem(checked){
    setSalvandoValoresRecontagem(true); setErroValoresRecontagem(null);
    const res = await onSetOperadorVeValoresRecontagem(checked);
    setSalvandoValoresRecontagem(false);
    if(!res.ok) setErroValoresRecontagem(res.erro || 'Falha ao salvar — tente novamente.');
  }

  const [salvandoGrupo, setSalvandoGrupo] = useState(false);
  const [erroGrupo, setErroGrupo] = useState(null);
  async function alterarGruposExcluidos(novaLista){
    setSalvandoGrupo(true); setErroGrupo(null);
    const res = await onSetGruposExcluidos(novaLista);
    setSalvandoGrupo(false);
    if(!res.ok) setErroGrupo(res.erro || 'Falha ao salvar — tente novamente.');
  }

  const [timeoutInput, setTimeoutInput] = useState(String(sessionTimeoutMin ?? DEFAULT_SESSION_TIMEOUT_MIN));
  const [timeoutSalvo, setTimeoutSalvo] = useState(false);
  const [salvandoTimeout, setSalvandoTimeout] = useState(false);
  const [erroTimeout, setErroTimeout] = useState(null);
  useEffect(()=>{ setTimeoutInput(String(sessionTimeoutMin ?? DEFAULT_SESSION_TIMEOUT_MIN)); }, [sessionTimeoutMin]);

  async function salvarTimeout(){
    const min = Number(timeoutInput);
    if(!Number.isFinite(min) || min <= 0) return;
    setSalvandoTimeout(true); setErroTimeout(null);
    const res = await onSetSessionTimeoutMin(Math.round(min));
    setSalvandoTimeout(false);
    if(res.ok){
      setTimeoutSalvo(true);
      setTimeout(()=>setTimeoutSalvo(false), 2500);
    } else {
      setErroTimeout(res.erro || 'Falha ao salvar — tente novamente.');
    }
  }

  return (
    <div>
      {isAdmin && (
        <div className="panel">
          <div className="section-title" style={{marginTop:0}}>Visibilidade do Saldo na Contagem</div>
          <div style={{fontSize:13,color:'var(--ink-dim)',lineHeight:1.6,marginBottom:12}}>
            Controla se o operador vê o saldo do sistema (referência antes de digitar,
            card de comparação ao vivo) durante a contagem, em todos os modos
            (Aleatória, Manual, Rota, Lista Importada, Recontagem). Com a opção
            desligada, o operador conta "às cegas" — a comparação com o sistema só
            aparece depois, na análise do líder. Líder e administrador sempre veem o
            saldo, independente desta configuração. Isso não muda a regra de aprovação
            automática/segunda contagem/análise do líder, só o que aparece na tela.
          </div>
          <label style={{display:'flex',alignItems:'center',gap:10,cursor:salvandoSaldo?'wait':'pointer',opacity:salvandoSaldo?0.7:1}}>
            <input
              type="checkbox"
              checked={!!operadorVeSaldo}
              disabled={salvandoSaldo}
              onChange={e=>toggleOperadorVeSaldo(e.target.checked)}
              style={{width:18,height:18}}
            />
            <span style={{fontSize:14}}>Operador pode ver o saldo do sistema durante a contagem</span>
          </label>
          {erroSaldo && <div className="login-error" style={{marginTop:10}}>{erroSaldo}</div>}
        </div>
      )}
      {isAdmin && (
        <div className="panel">
          <div className="section-title" style={{marginTop:0}}>Visibilidade de Valores em Recontagens/Divergentes</div>
          <div style={{fontSize:13,color:'var(--ink-dim)',lineHeight:1.6,marginBottom:12}}>
            Configuração separada da acima — controla só o BLOCO EXTRA de cada card em
            "Recontagens Pendentes" (armazém, endereço contado, motivo, observação, foto,
            valor divergente em R$ e quem contou). O quadro principal
            (Sistema/Físico/Diferença/%) continua visível pra qualquer perfil — essa
            configuração é só sobre o valor em R$ e os detalhes complementares. Com a
            opção desligada (padrão), a operação não vê esse bloco extra — líder e
            administrador sempre veem, sem essa restrição.
          </div>
          <label style={{display:'flex',alignItems:'center',gap:10,cursor:salvandoValoresRecontagem?'wait':'pointer',opacity:salvandoValoresRecontagem?0.7:1}}>
            <input
              type="checkbox"
              checked={!!operadorVeValoresRecontagem}
              disabled={salvandoValoresRecontagem}
              onChange={e=>toggleOperadorVeValoresRecontagem(e.target.checked)}
              style={{width:18,height:18}}
            />
            <span style={{fontSize:14}}>Operador pode ver detalhes extras em Recontagens Pendentes</span>
          </label>
          {erroValoresRecontagem && <div className="login-error" style={{marginTop:10}}>{erroValoresRecontagem}</div>}
        </div>
      )}
      {isAdmin && (
        <div className="panel">
          <div className="section-title" style={{marginTop:0}}>Grupos Excluídos da Contagem Automática</div>
          <div style={{fontSize:13,color:'var(--ink-dim)',lineHeight:1.6,marginBottom:12}}>
            Grupos/famílias marcados aqui nunca entram sozinhos numa fila de contagem
            (Aleatória, Curva ABC, Rota de Endereço) nem aparecem pra seleção em
            "Contagem por Grupo" — útil pra grupos cujo material não existe fisicamente
            no almoxarifado (só saldo remanescente no sistema). Buscar um código
            específico na Contagem Manual continua funcionando normalmente, mesmo de um
            grupo excluído — esta configuração só afeta geração automática de fila.
          </div>
          {gruposDisponiveis===null ? (
            <div className="empty-state" style={{padding:14}}>Carregando grupos disponíveis…</div>
          ) : gruposDisponiveis.length===0 ? (
            <div className="empty-state" style={{padding:14}}>Nenhum grupo com saldo carregado ainda.</div>
          ) : (
            <div style={{opacity:salvandoGrupo?0.7:1}}>
              <GrupoMultiSelectField
                grupos={gruposDisponiveis}
                selecionados={gruposExcluidos||[]}
                onToggle={cod=>alterarGruposExcluidos([...(gruposExcluidos||[]), cod])}
                onRemove={cod=>alterarGruposExcluidos((gruposExcluidos||[]).filter(c=>c!==cod))}
              />
            </div>
          )}
          {salvandoGrupo && <div style={{fontSize:12,color:'var(--ink-dim)',marginTop:8}}>Salvando…</div>}
          {erroGrupo && <div className="login-error" style={{marginTop:10}}>{erroGrupo}</div>}
        </div>
      )}
      {isAdmin && (
        <div className="panel">
          <div className="section-title" style={{marginTop:0}}>Tempo de Inatividade</div>
          <div style={{fontSize:13,color:'var(--ink-dim)',lineHeight:1.6,marginBottom:12}}>
            Minutos sem nenhuma interação (toque, clique, tecla) até o logout automático
            — protege um tablet compartilhado esquecido logado no chão de fábrica. Hoje:
            {' '}<strong>{sessionTimeoutMin ?? DEFAULT_SESSION_TIMEOUT_MIN} minutos</strong>.
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
            <input
              type="number"
              min="1"
              step="1"
              value={timeoutInput}
              disabled={salvandoTimeout}
              onChange={e=>setTimeoutInput(e.target.value)}
              onWheel={e=>e.target.blur()}
              style={{width:90}}
            />
            <span style={{fontSize:13,color:'var(--ink-dim)'}}>minutos</span>
            <button type="button" className="btn btn-primary" onClick={salvarTimeout} disabled={salvandoTimeout || !Number.isFinite(Number(timeoutInput)) || Number(timeoutInput)<=0}>{salvandoTimeout?'Salvando…':'Salvar'}</button>
            {timeoutSalvo && <span style={{fontSize:13,color:'var(--ok)'}}>Salvo — já vale em todos os aparelhos.</span>}
          </div>
          {erroTimeout && <div className="login-error" style={{marginTop:10}}>{erroTimeout}</div>}
        </div>
      )}
      {!isAdmin && (
        <div className="panel">
          <div style={{fontSize:13,color:'var(--ink-dim)'}}>Nenhuma configuração disponível no momento.</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
    });
  }
</script>
</body>
</html>
