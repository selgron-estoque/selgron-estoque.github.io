function RouteCountFlow({inv, user, onRegisterCount, onFinish, onAddressProposed, setInventories, counts, operadorVeSaldo, gruposExcluidos}){
  // Armazûˋm obrigatû°rio (mesmo motivo do RandomCountFlow) ã se `inv` jûÀ vem
  // de um inventûÀrio criado do tipo "Contagem por Rota de EndereûÏo" (ver
  // InventoryList), o almoxarifado jûÀ estûÀ definido ali; a versûÈo avulsa
  // (operador, "Nova Contagem" ã "Contagem por Rota") pergunta na hora.
  const invAlmoxarifados = (inv && inv.almoxarifado) ? inv.almoxarifado.split(',').map(s=>normalizarCodigoAlmox(s)).filter(Boolean) : null;
  const [armazemAdHoc, setArmazemAdHoc] = useState('');
  const almoxarifadosFiltro = invAlmoxarifados || (armazemAdHoc ? [armazemAdHoc] : null);

  // Busca itens priorizados no Supabase (mesma RPC do RandomCountFlow, com
  // limite maior jûÀ que aqui interessa toda a rota, nûÈo sû° `qtdItens`) e
  // agrupa por corredor/rua os que jûÀ tûˆm endereûÏo cadastrado.
  const [anyAddress, setAnyAddress] = useState(null); // null = carregando
  const [grouped, setGrouped] = useState(null);
  useEffect(()=>{
    if(!almoxarifadosFiltro) return; // esperando o armazûˋm ser escolhido
    let cancelado = false;
    const gruposFiltro = (inv && inv.grupo) ? inv.grupo.split(',').filter(Boolean) : undefined;
    fetchAnyAddressRegistered().then(async (hasAny)=>{
      if(cancelado) return;
      setAnyAddress(hasAny);
      if(!hasAny) return;
      const itens = await fetchContagemItensPrioritarios(200, gruposFiltro, almoxarifadosFiltro, gruposExcluidos);
      if(cancelado) return;
      const byCorredor = {};
      itens.filter(p=>p.enderecoCadastrado).forEach(p=>{
        byCorredor[p.corredor] = byCorredor[p.corredor] || {};
        byCorredor[p.corredor][p.rua] = byCorredor[p.corredor][p.rua] || [];
        byCorredor[p.corredor][p.rua].push(p);
      });
      setGrouped(byCorredor);
    });
    return ()=>{ cancelado = true; };
  }, [almoxarifadosFiltro ? almoxarifadosFiltro.join(',') : null, gruposExcluidos ? gruposExcluidos.join(',') : '', inv && inv.grupo]);

  // Corredor escolhido pra contar agora (ex.: "hoje o 010, amanhûÈ o 019") ã
  // pedido do cliente: em vez de despejar TODOS os corredores numa lista sû°
  // pra clicar item a item, escolhe um corredor e a fila libera sozinha, em
  // sequûˆncia (rua ã endereûÏo), item apû°s item ã mesmo padrûÈo de fila
  // auto-avanûÏando jûÀ usado em RandomCountFlow/ImportedListCountFlow.
  const [corredorEscolhido, setCorredorEscolhido] = useState(null);

  // Itens jûÀ contados (qualquer corredor, qualquer rodada) ã mesmo critûˋrio
  // jûÀ usado em RandomCountFlow (`codigosJaContados`). Usado pra excluir da
  // fila em vez de basear o "retomar" numa posiûÏûÈo fixa: como o operador
  // pode escolher um corredor DIFERENTE a cada vez que entra, nûÈo existe um
  // ûÙndice û¤nico de progresso ã cada item jûÀ contado simplesmente some de
  // qualquer corredor em que apareûÏa, nûÈo importa quando/onde foi contado.
  const codigosJaContados = useMemo(()=> new Set((counts||[]).map(c=>c.productCode)), [counts]);

  // Lista achatada e ordenada (rua ã endereûÏo) sû° do corredor escolhido, sem
  // os itens jûÀ contados ã "libera na sequûˆncia do corredor".
  const itensCorredor = useMemo(()=>{
    if(!grouped || !corredorEscolhido || !grouped[corredorEscolhido]) return [];
    const flat = [];
    Object.keys(grouped[corredorEscolhido]).sort().forEach(rua=>{
      grouped[corredorEscolhido][rua]
        .slice()
        .sort((a,b)=>(a.endereco||'').localeCompare(b.endereco||''))
        .forEach(p=>flat.push(p));
    });
    return flat.filter(p=>!codigosJaContados.has(p.codigo));
  }, [grouped, corredorEscolhido, codigosJaContados]);

  const q = useCountQueue(itensCorredor);

  if(!almoxarifadosFiltro){
    return <ArmazemGate onSelected={setArmazemAdHoc} />;
  }

  if(anyAddress===null){
    return <div className="empty-state" style={{padding:20}}>Verificando endereûÏos cadastradosãÎ</div>;
  }

  if(!anyAddress || !grouped){
    return (
      <div className="empty-state">
        <div className="ic"><Ic size={40}>Þ¤</Ic></div>
        Nenhum endereûÏo cadastrado ainda neste almoxarifado.<br/>
        A contagem por rota ûˋ liberada assim que o lûÙder validar os primeiros endereûÏos informados pelos operadores (veja "EndereûÏos Pendentes" em ConfiguraûÏûçes).
      </div>
    );
  }

  if(!corredorEscolhido){
    const corredores = Object.keys(grouped).sort();
    return (
      <div>
        <div className="role-note">Armazûˋm {almoxarifadosFiltro.map(a=>a.padStart(2,'0')).join(', ')} ôñ Escolha o corredor que vai contar agora</div>
        {corredores.map(cor=>{
          const totalCor = Object.values(grouped[cor]).reduce((s,arr)=>s+arr.length, 0);
          const pendentesCor = Object.values(grouped[cor]).reduce((s,arr)=>s+arr.filter(p=>!codigosJaContados.has(p.codigo)).length, 0);

              <div>

              </div>

        Corredor {corredorEscolhido} concluûÙdo.

          <button className="btn btn-secondary" onClick={()=>setCorredorEscolhido(null)}>Escolher outro corredor</button>

        </div>

    );
  }

  return (
    <div>
      <div className="role-note" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,flexWrap:'wrap'}}>
        <span>Corredor {corredorEscolhido} ôñ item {q.idx+1} de {q.total}</span>
        <button className="btn btn-secondary" style={{padding:'4px 12px',fontSize:'var(--text-sm)'}} onClick={()=>setCorredorEscolhido(null)}>Trocar corredor</button>
      </div>
      <CountStep
        key={q.current.codigo}
        product={q.current}
        user={user}
        inv={inv}
        counts={counts}
        queueAtual={q.idx+1}
        queueTotal={q.total}
        onAddressProposed={onAddressProposed}
        operadorVeSaldo={operadorVeSaldo}
        onComplete={(c)=>{
          if(inv && inv.id){ setInventories(prev=>prev.map(i=>i.id===inv.id?{...i, contados:i.contados+1}:i)); incrementContadosSupabase(inv.id); }
          onRegisterCount(c);
          q.next();
        }}

  );
}

/* ---------------- MûDULO 1B: CONTAGEM POR LISTA IMPORTADA (Excel) ---------------- */

function ImportedListCountFlow({inv, user, onRegisterCount, onFinish, onAddressProposed, setInventories, counts, operadorVeSaldo}){
  // Enriquece a lista importada com o catûÀlogo real do Supabase (busca em
  // lote, uma requisiûÏûÈo sû° pra todos os cû°digos da planilha ã cache local
  // estûÀtico removido, ver CLAUDE.md "cache local removido"). Roda uma vez
  // ao montar; a planilha continua prevalecendo sobre o catûÀlogo quando traz
  // endereûÏo/saldo prû°prios (mesma prioridade de antes).
  const [allItems, setAllItems] = useState(null); // null = carregando
  useEffect(()=>{
    let cancelado = false;
    const lista = (inv && inv.itensImportados) || [];
    const codigos = lista.map(item=>item.codigo);
    fetchProdutosByCodigos(codigos).then(catalogo=>{
      if(cancelado) return;
      setAllItems(lista.map(item=>{
        const doCatalogo = catalogo.get(item.codigo);
        if(doCatalogo){
          return {
            ...doCatalogo,
            // planilha trouxe um endereûÏo e o catûÀlogo ainda nûÈo tem ã usa o da planilha
            ...(item.endereco && !doCatalogo.enderecoCadastrado ? {endereco:item.endereco, enderecoCadastrado:true} : {}),
            // saldo da prû°pria planilha ûˋ mais recente que o catûÀlogo ã prevalece quando informado
            ...(item.saldoSistema!=null ? {saldoSistema:item.saldoSistema} : {}),
          };
        }
        // cû°digo nûÈo estûÀ no catûÀlogo ã monta o item a partir do que a
        // prû°pria planilha trouxe (fallback documentado no CLAUDE.md). A
        // coluna "Sistema" da planilha (item.saldoSistema) ûˋ o que permite
        // comparar o saldo mesmo assim ã sem ela, fica null e a contagem vai
        // sem comparaûÏûÈo automûÀtica para revisûÈo do lûÙder.
        return {
          codigo: item.codigo,
          descricao: item.descricao || item.codigo,
          unidade: null,
          familia: 'ã',
          endereco: item.endereco || null,
          enderecoCadastrado: !!item.endereco,
          almoxarifado: item.almoxarifado || (inv ? inv.almoxarifado : 'ã'),
          corredor: null,
          rua: null,
          saldoSistema: item.saldoSistema,
          custoUnit: 0,
          valorFinanceiro: 0,
          semMovimentoRecente: false,
          ultimaSaida: null,
          foraDoCacheLocal: true,
        };
      }));
    });
    return ()=>{ cancelado = true; };
  }, [inv]);

  // A lista ûˋ sempre percorrida na ordem original; ao voltar para este
  // inventûÀrio depois de contar alguns itens, retoma exatamente de onde
  // parou usando "contados" ã sem isso, cada vez que a tela remonta a fila
  // reiniciaria do item 1 (mesmo problema que a Contagem Aleatû°ria jûÀ tem,
  // mas aqui seria pior: o operador nunca chegaria ao 2ô¤ item da planilha).
  const jaContados = inv ? (inv.contados || 0) : 0;
  const pendentes = useMemo(()=> allItems ? allItems.slice(jaContados) : [], [allItems, jaContados]);
  const q = useCountQueue(pendentes);

  if(allItems===null){
    return <div className="empty-state" style={{padding:20}}>Carregando itens da lista importadaãÎ</div>;
  }

  if(allItems.length===0){
    return <div className="empty-state"><div className="ic"><Ic size={40}>Þ</Ic></div>Esta lista importada nûÈo tem itens vûÀlidos.</div>;
  }

  if(q.done){
    return (
      <div className="empty-state">
        <div className="ic"><Ic size={40}>Þ</Ic></div>
        {inv && inv.tipo==='Itens EspecûÙficos' ? 'Fila concluûÙda' : 'Lista importada concluûÙda'} ã todos os {allItems.length} itens foram contados.
        <div style={{marginTop:16}}><button className="btn btn-primary" onClick={onFinish}>Voltar aos inventûÀrios</button></div>
      </div>
    );
  }

  return (
    <div>
      <div className="role-note">
        {inv && inv.tipo==='Itens EspecûÙficos'
          ? ('Fila de itens especûÙficos'+(inv?' de '+inv.nome:'')+' ã ordem em que foram adicionados')
          : ('Lista importada'+(inv?' de '+inv.nome:'')+' ã ordem original da planilha')}
      </div>
      <CountStep
        key={q.current.codigo}
        product={q.current}
        user={user}
        inv={inv}
        counts={counts}
        queueAtual={jaContados+q.idx+1}
        queueTotal={allItems.length}
        onAddressProposed={onAddressProposed}
        operadorVeSaldo={operadorVeSaldo}
        onComplete={(c)=>{
          if(inv && inv.id){ setInventories(prev=>prev.map(i=>i.id===inv.id?{...i, contados:i.contados+1}:i)); incrementContadosSupabase(inv.id); }
          onRegisterCount(c);
          q.next();
        }}
      />
    </div>
  );
}

/* ---------------- MûDULO 7: RECONTAGEM E ANûLISE DE DIVERGûNCIAS ---------------- */

function RecountFlow({original, user, onFinish, onAddressProposed, operadorVeSaldo}){
  // Busca ao vivo no catûÀlogo real (cache local estûÀtico removido, ver
  // CLAUDE.md "cache local removido"). Se nûÈo encontrar ou a rede falhar,
  // cai pro MESMO fallback sintûˋtico de sempre, montado a partir do que a
  // prû°pria contagem anterior (`original`) jûÀ registrou ã sem isso a
  // recontagem quebrava com "item nûÈo encontrado" pra qualquer contagem
  // originada fora do catûÀlogo.
  const [produtoBase, setProdutoBase] = useState(null); // null = carregando
  useEffect(()=>{
    let cancelado = false;
    // Recontagem repete a comparaûÏûÈo no MESMO armazûˋm da contagem original
    // (`original.almoxarifado`, gravado desde CountStep.finalize) ã sem
    // isso, um item com saldo em mais de um armazûˋm corria o risco de a
    // recontagem comparar contra um armazûˋm errado. Contagens antigas (de
    // antes dessa coluna existir) nûÈo tûˆm esse dado ã `fetchProdutosByCodigos`
    // jûÀ sabe se virar sozinho nesse caso (usa o saldo se o cû°digo sû°
    // existir num armazûˋm, senûÈo marca como sem comparaûÏûÈo automûÀtica).
    fetchProdutosByCodigos([original.productCode], original.almoxarifado).then(catalogo=>{
      if(cancelado) return;
      setProdutoBase(catalogo.get(original.productCode) || {
        codigo: original.productCode,
        descricao: original.descricao,
        unidade: null,
        familia: 'ã',
        endereco: null,
        enderecoCadastrado: false,
        almoxarifado: original.almoxarifado || 'ã',
        corredor: null,
        rua: null,
        saldoSistema: original.saldoSistema,
        custoUnit: 0,
        valorFinanceiro: 0,
        semMovimentoRecente: false,
        ultimaSaida: null,
        foraDoCacheLocal: true,
      });
    });
    return ()=>{ cancelado = true; };
  }, [original.productCode, original.almoxarifado]);

  if(produtoBase===null){
    return <div className="empty-state" style={{padding:20}}>Carregando itemãÎ</div>;
  }

  // Item sem cadastro de endereûÏo (comum ã o Protheus ainda nûÈo tem esse
  // dado) ã na recontagem, reaproveita o endereûÏo que o operador da 1ôˆ
  // contagem informou/confirmou, em vez de pedir de novo pra quem estûÀ
  // recontando (ele nûÈo teria como adivinhar onde o item foi encontrado da
  // primeira vez). Sû° preenche `endereco` pra exibiûÏûÈo ã mantûˋm
  // `enderecoCadastrado:false` de propû°sito, pra nûÈo forûÏar uma etapa de
  // leitura de QR Code num endereûÏo que nunca foi formalmente cadastrado.
  const enderecoContagemAnterior =
    (original.enderecoContado && original.enderecoContado!=='ã' && original.enderecoContado) ||
    (original.endereco && original.endereco!=='ã' && original.endereco) ||
    null;
  const product = (!produtoBase.enderecoCadastrado && !produtoBase.endereco && enderecoContagemAnterior)
    ? {...produtoBase, endereco: enderecoContagemAnterior}
    : produtoBase;

  const sameUser = user.nome === original.usuario;
  return (
    <div>
      {sameUser && (
        <div className="divergence-alert">
          <Ic>ã </Ic>
          <span>Pelo Mû°dulo 7 do processo, a segunda contagem deve ser feita por outro operador ã vocûˆ estûÀ logado como {user.nome}, o mesmo da contagem anterior. Pode continuar, mas o ideal ûˋ pedir para outro operador recontar.</span>
        </div>
      )}
      <CountStep
        product={product}
        user={user}
        onAddressProposed={onAddressProposed}
        onComplete={onFinish}
        numeroContagem={original.numeroContagem+1}
        contagemAnteriorId={original.id}
        previousCount={original}
        expectAddressCheck={!!product.enderecoCadastrado}
        operadorVeSaldo={operadorVeSaldo}
      />
    </div>
  );
}

// Fila de recontagem de verdade ã item jûÀ com status aguardando_segunda,
// pronto pra qualquer operador pegar e recontar. "Itens Divergentes"
// (DivergentItemsPanel, logo abaixo) ûˋ uma tela separada: mostra a
// divergûˆncia ANTES dela virar recontagem ã assim que o lûÙder decide
// "Solicitar nova contagem" (ou a regra automûÀtica jûÀ cria o item aqui
// direto), o item sai de lûÀ e passa a aparecer sû° aqui.
// Linha de chips de severidade (Todos/CrûÙticas/Altas/Mûˋdias/Baixas) ã filtro
// client-side puro sobre a lista jûÀ carregada, reaproveitado pelas 3 telas
// (Recontagens/Itens Divergentes/ConcluûÙdas). `counts` aqui ûˋ a lista Jû
// filtrada por busca/status da tela, sû° usada pra contar quantos itens caem
// em cada nûÙvel (mostrado ao lado do rû°tulo do chip).
function SeverityFilterRow({counts, value, onChange}){
  const niveis = ['critica','alta','media','baixa'];
  const porNivel = {};
  niveis.forEach(n=>{ porNivel[n] = 0; });
  counts.forEach(c=>{
    const lvl = classifySeverity4(severidadeDe(c)).level;
    if(porNivel[lvl]!==undefined) porNivel[lvl]++;
  });
  const LABELS = {critica:'CrûÙticas', alta:'Altas', media:'Mûˋdias', baixa:'Baixas'};
  return (
    <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:14}}>
      <button type="button" className={'btn '+(value==='todos'?'btn-primary':'btn-outline')+' btn-sm'} onClick={()=>onChange('todos')}>Todos ({counts.length})</button>
      {niveis.map(n=>(
        <button key={n} type="button" className={'btn '+(value===n?'btn-primary':'btn-outline')+' btn-sm'} onClick={()=>onChange(n)}>{LABELS[n]} ({porNivel[n]})</button>
      ))}
    </div>
  );
}

// Linha de chips por STATUS (Ajustado/Sem Ajuste/SALDO OK) ã pedido do
// cliente em "Contagens ConcluûÙdas": com "Todos os perûÙodos" virando padrûÈo
// (ver seûÏûÈo anterior), a lista de histû°rico pode passar de milhares de itens
// e o û¤nico filtro que jûÀ existia (`SeverityFilterRow`, por valor em R$) nûÈo
// deixa achar rûÀpido "sû° os Ajustados" ou "sû° os Sem Ajuste". Mesmo padrûÈo
// visual/estrutural de `SeverityFilterRow` (chips com contagem), sû° que
// classificando por `classificarStatusConcluido` em vez de valor ã os dois
// filtros funcionam em conjunto (AND), nûÈo um substituindo o outro.
function StatusConcluidoFilterRow({tips, value, onChange}){
  const categorias = ['ajustado','sem_ajuste','saldo_ok'];
  const porCategoria = {ajustado:0, sem_ajuste:0, saldo_ok:0};
  tips.forEach(tip=>{
    const cat = classificarStatusConcluido(tip);
    if(porCategoria[cat]!==undefined) porCategoria[cat]++;
  });
  const LABELS = {ajustado:'Ajustado', sem_ajuste:'Sem Ajuste', saldo_ok:'SALDO OK'};
  return (
    <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:14}}>
      <button type="button" className={'btn '+(value==='todos'?'btn-primary':'btn-outline')+' btn-sm'} onClick={()=>onChange('todos')}>Todos ({tips.length})</button>
      {categorias.map(cat=>(
        <button key={cat} type="button" className={'btn '+(value===cat?'btn-primary':'btn-outline')+' btn-sm'} onClick={()=>onChange(cat)}>{LABELS[cat]} ({porCategoria[cat]})</button>
      ))}
    </div>
  );
}

// Barra de busca + botûÈo "Scanner" (abre a cûÂmera, ao detectar um cû°digo
// preenche a busca ã mesmo padrûÈo jûÀ usado em ManualCountFlow/CountStep,

// PaginaûÏûÈo client-side pras 4 telas de contagem (Recontagens/Itens
// Divergentes/AprovaûÏûÈo de Ajustes/Contagens ConcluûÙdas) ã cliente notou um
// delay pequeno ao trocar de filtro/tela depois que o padrûÈo de perûÙodo virou
// "Todos os perûÙodos" (ver seûÏûÈo anterior no CLAUDE.md): sem a janela de 30
// dias escondendo a maior parte, essas listas podem renderizar centenas de
// cards `.count-card` (bem mais pesados que uma linha de tabela) de uma vez.
// Mesmo padrûÈo jûÀ usado em `UserManagementPanel` (`USERS_PAGE_SIZE`, "ã¿
// Anterior"/"Prû°xima ã¤"), sû° que com o tamanho de pûÀgina tambûˋm configurûÀvel
// pelo usuûÀrio (pedido explûÙcito ã "opûÏûÈo de escolher outra quantidade se
// necessûÀrio"). PaginaûÏûÈo ûˋ sû° de EXIBIûûO ã a lista inteira jûÀ estûÀ em
// memû°ria (Realtime, sem paginaûÏûÈo no fetch), entûÈo trocar de pûÀgina nûÈo
// bate no Supabase de novo, sû° corta o array antes de mapear pro JSX.
const TAMANHOS_PAGINA_OPCOES = [50, 100, 200, 500];
function usePaginacaoLista(lista, tamanhoPadrao=50){
  const [pagina, setPagina] = useState(1);
  const [tamanhoPagina, setTamanhoPaginaState] = useState(tamanhoPadrao);
  // Trocar o tamanho da pûÀgina sempre volta pra pûÀgina 1 ã senûÈo dava pra
  // ficar numa pûÀgina que nûÈo existe mais (ex: pûÀg. 4 de 50 itens, muda pra
  // 200 por pûÀgina, sû° sobra 1 pûÀgina).
  function setTamanhoPagina(v){ setTamanhoPaginaState(v); setPagina(1); }
  const totalPaginas = Math.max(1, Math.ceil(lista.length / tamanhoPagina));
  // `Math.min` clampa sozinho se a lista encolher (filtro/busca reduzindo o
  // total) ã nûÈo precisa de nenhum `useEffect` de reset, a pûÀgina vûÀlida
  // mais prû°xima jûÀ ûˋ recalculada a cada render.
  const paginaAtual = Math.min(pagina, totalPaginas);
  const listaPaginada = lista.slice((paginaAtual-1)*tamanhoPagina, paginaAtual*tamanhoPagina);
  return {pagina: paginaAtual, setPagina, tamanhoPagina, setTamanhoPagina, listaPaginada, totalPaginas};
}
function PaginationControls({pagina, setPagina, totalPaginas, tamanhoPagina, setTamanhoPagina, totalItens, itemLabel='itens'}){

        <span style={{fontFamily:'var(--font-mono)',fontSize:'var(--text-xs)',color:'var(--ink-dim)'}}>PûÀgina {pagina} de {totalPaginas} ôñ {totalItens} {itemLabel}</span>
        <button type="button" className="btn btn-outline" style={{width:'auto',padding:'8px 14px'}} disabled={pagina>=totalPaginas} onClick={()=>setPagina(p=>p+1)}>Prû°xima ã¤</button>

  );
}

function RecountsPanel({counts, inventories, role, goto, onDeleteCount, onToggleUrgente, operadorVeValoresRecontagem}){
  const canMark = role==='lider' || role==='admin';
  // Escopo AJUSTADO (cliente pediu pra restringir depois de ver o resultado
  // inicial): o quadro Sistema/FûÙsico/DiferenûÏa/% fica visûÙvel pra QUALQUER
  // perfil, sempre ã sû° o toggle "Detalhes"/"Ocultar" (pessoal, todo mundo
  // pode recolher se quiser) controla se ele aparece. `podeVerDetalhes`
  // passou a governar sû° o BLOCO EXTRA (Armazûˋm/EndereûÏo contado/Motivo/
  // ObservaûÏûÈo/Foto/Valor divergente/Contado por) ã ûˋ ali que mora o
  // "valor" que a Diretoria nûÈo quer que a operaûÏûÈo veja, nûÈo nas
  // quantidades/percentual do quadro principal.
  const podeVerDetalhes = role!=='operador' || operadorVeValoresRecontagem;
  const byOriginal = {};
  counts.forEach(c=>{ if(c.contagemAnteriorId) byOriginal[c.contagemAnteriorId]=c; });

  const aguardandoSegunda = counts.filter(c=>c.statusAprovacao==='aguardando_segunda' && !byOriginal[c.id]);

  // Filtro de perûÙodo ("Filtros"), mesmo componente jûÀ usado em Indicadores/
  // Contagens ConcluûÙdas. Essa tela jûÀ teve um filtro de perûÙodo antes,
  // removido numa rodada anterior por sû° existir pra alimentar um contador
  // de "concluûÙdas" que nûÈo fazia sentido aqui (ver CLAUDE.md,
  // "ListaProgressoHeader removido"). Desta vez o filtro tem um propû°sito
  // diferente e honesto: estreitar a PRûPRIA lista de pendentes por data,
  // û¤til pra achar um item especûÙfico numa fila grande sem rolar tudo. O
  // total real de pendentes (`aguardandoSegunda.length`, sem filtro
  // nenhum) nunca ûˋ escondido ã sû° a lista abaixo ûˋ que pode ficar mais
  // curta, e a diferenûÏa ûˋ mostrada explicitamente no cabeûÏalho.
  // `useState` puro (nûÈo `usePersistedState`) ã pedido do cliente: o
  // filtro deve voltar ao padrûÈo sempre que a tela recarregar, nûÈo ficar
  // lembrado entre sessûçes (mesmo critûˋrio em Itens Divergentes/Contagens
  // ConcluûÙdas, ver abaixo). PadrûÈo mudou de "ûltimos 30 dias" pra "Todos os
  // perûÙodos" ã cliente reportou que o filtro de 30 dias escondia registro
  // de verdade sem nenhum aviso ("acaba limitando as consultas"); como
  // `counts` jûÀ vem inteiro pro navegador (Realtime, sem paginaûÏûÈo por
  // perûÙodo), tirar a janela de 30 dias por padrûÈo nûÈo tem custo nenhum de
  // rede/performance ã ûˋ sû° filtro em memû°ria, entûÈo "sem filtro" por
  // padrûÈo ûˋ estritamente melhor aqui, nûÈo uma troca.
  const [trendFilter, setTrendFilter] = useState({tipo:'todos', from:'', to:''});
  const hojeStr = hojeLocalStr();
  const { from: dataInicioStr, to: dataFimStr } = computeTrendRange(trendFilter.tipo, hojeStr, trendFilter.from, trendFilter.to);
  const aguardandoSegundaNoPeriodo = aguardandoSegunda.filter(c=>c.data && c.data>=dataInicioStr && c.data<=dataFimStr);

  // Busca por cû°digo ou descriûÏûÈo ã filtra a fila em tempo real, sem
  // depender de rolar a lista inteira pra achar um item especûÙfico (pedido
  // do cliente). Mesmo padrûÈo simples jûÀ usado em UserManagementPanel/
  // ManualCountFlow (case-insensitive, sem normalizaûÏûÈo de acento).
  const [busca, setBusca] = useState('');
  const buscaNorm = busca.trim().toLowerCase();
  const porBusca = buscaNorm
    ? aguardandoSegundaNoPeriodo.filter(c => c.productCode.toLowerCase().includes(buscaNorm) || (c.descricao||'').toLowerCase().includes(buscaNorm))
    : aguardandoSegundaNoPeriodo;

  const [severidade, setSeveridade] = useState('todos');
  const listaFiltradaSemOrdenar = severidade==='todos' ? porBusca : porBusca.filter(c=>classifySeverity4(severidadeDe(c)).level===severidade);
  // OrdenaûÏûÈo escolhida pelo usuûÀrio: por cû°digo do produto (padrûÈo) ou por
  // endereûÏo ã pedido do cliente, pra poder percorrer a fila na sequûˆncia que
  // fizer mais sentido pro trabalho fûÙsico (ex: seguir a rota de endereûÏos em
  // vez de pular de corredor em corredor pela ordem de cû°digo). `useState`
  // puro (nûÈo persiste) ã mesmo critûˋrio jûÀ usado pra `busca`/`severidade`
  // nesta tela, ûˋ preferûˆncia de sessûÈo, nûÈo configuraûÏûÈo do admin.
  const [ordenacao, setOrdenacao] = useState('codigo');
  // Itens marcados como urgentes (lûÙder/admin, ver toggleUrgente em App())
  // sempre aparecem primeiro, nûÈo importa a ordenaûÏûÈo escolhida ã sort
  // estûÀvel, preserva o critûˋrio de cû°digo/endereûÏo como desempate dentro de
  // cada grupo (urgente vs. nûÈo-urgente).
  const listaFiltrada = [...listaFiltradaSemOrdenar].sort((a,b)=>{
    const urgenteDiff = (b.urgente?1:0)-(a.urgente?1:0);
    if(urgenteDiff!==0) return urgenteDiff;
    if(ordenacao==='endereco'){
      const ea = a.endereco || '';
      const eb = b.endereco || '';
      // Item sem endereûÏo cadastrado vai pro final, nûÈo pro topo (comparar
      // string vazia normalmente colocaria ele primeiro).
      if(!ea && eb) return 1;
      if(ea && !eb) return -1;
      if(ea !== eb) return ea.localeCompare(eb);
    }
    return (a.productCode||'').localeCompare(b.productCode||'');
  });
  const {pagina, setPagina, tamanhoPagina, setTamanhoPagina, listaPaginada, totalPaginas} = usePaginacaoLista(listaFiltrada, 50);

  const [urgenteBusyId, setUrgenteBusyId] = useState(null);
  const [urgenteErro, setUrgenteErro] = useState({});
  async function handleToggleUrgente(c){
    setUrgenteBusyId(c.id);
    setUrgenteErro(prev=>({...prev, [c.id]: null}));
    const res = await onToggleUrgente(c.id, !c.urgente);
    setUrgenteBusyId(null);
    if(!res || !res.ok) setUrgenteErro(prev=>({...prev, [c.id]: (res && res.erro) || 'NûÈo foi possûÙvel salvar ã tente novamente.'}));
  }

  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const [excluindo, setExcluindo] = useState(false);
  const [erroExclusao, setErroExclusao] = useState('');
  // Menu "ãÛ" (Marcar urgente, lûÙder/admin; Excluir, sû° admin) ã guarda sû° o
  // id do card com o menu aberto no momento, um card por vez.
  const [menuAbertoId, setMenuAbertoId] = useState(null);
  // Detalhes agora vûˆm ABERTOS por padrûÈo (pedido do cliente ã antes exigia
  // clicar em "Detalhes" pra ver Sistema/FûÙsico/DiferenûÏa/%). Por isso a
  // lû°gica virou o INVERSO de antes: em vez de guardar qual card estûÀ
  // aberto (sû° 1 por vez), guarda um conjunto dos cards que o usuûÀrio
  // explicitamente OCULTOU ã qualquer card fora desse conjunto jûÀ nasce
  // visûÙvel, e mais de um card pode ficar oculto ao mesmo tempo.
  const [detalhesOcultosIds, setDetalhesOcultosIds] = useState(()=>new Set());
  function toggleDetalhes(id){
    setDetalhesOcultosIds(prev=>{
      const next = new Set(prev);
      if(next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }

  // Fecha o menu "ãÛ" ao clicar em qualquer lugar fora dele ã sem isso, sû°
  // clicar de novo no mesmo botûÈo "ãÛ" fechava, entûÈo clicar em outro canto
  // da tela deixava o menu aberto pra sempre (bug reportado pelo cliente).
  useEffect(()=>{
    if(!menuAbertoId) return;
    function handleClickOutside(e){
      if(!e.target.closest('.count-card-menu')) setMenuAbertoId(null);
    }
    document.addEventListener('click', handleClickOutside);
    return ()=>document.removeEventListener('click', handleClickOutside);
  }, [menuAbertoId]);

  async function handleConfirmDelete(id){
    setExcluindo(true);
    setErroExclusao('');
    const res = await onDeleteCount(id);
    setExcluindo(false);
    if(res && res.ok){
      setConfirmDeleteId(null);
    } else {
      setErroExclusao((res && res.erro) || 'NûÈo foi possûÙvel excluir ã tente novamente.');
    }
  }

  return (
    <div>
      <TrendFilterBar
        trendFilter={trendFilter}
        setTrendFilter={setTrendFilter}
        dataInicioStr={dataInicioStr}
        dataFimStr={dataFimStr}
        hojeStr={hojeStr}
        subtitle="Selecione o perûÙodo para filtrar a fila de recontagem"
      />

      <SearchWithScanner value={busca} onChange={setBusca} placeholder="Buscar por cû°digo ou descriûÏûÈo do material" />

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:10}}>
        <span style={{fontSize:'var(--text-sm)',color:'var(--ink-dim)'}}>
          <strong style={{color:'var(--ink)'}}>{aguardandoSegunda.length}</strong> pendentes
          {aguardandoSegundaNoPeriodo.length!==aguardandoSegunda.length && <> ôñ <strong style={{color:'var(--ink)'}}>{aguardandoSegundaNoPeriodo.length}</strong> no perûÙodo selecionado</>}
        </span>
      </div>

      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <SeverityFilterRow counts={porBusca} value={severidade} onChange={setSeveridade} />
      </div>

      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:14}}>
        <span style={{fontSize:'var(--text-sm)',color:'var(--ink-dim)',display:'flex',alignItems:'center',gap:4}}><DIcon name="arrowsUpDown" size={14}/> Ordenar por:</span>
        <button type="button" className={'btn '+(ordenacao==='codigo'?'btn-primary':'btn-outline')+' btn-sm'} onClick={()=>setOrdenacao('codigo')}>Cû°digo</button>
        <button type="button" className={'btn '+(ordenacao==='endereco'?'btn-primary':'btn-outline')+' btn-sm'} onClick={()=>setOrdenacao('endereco')}>EndereûÏo</button>
      </div>

      {listaFiltrada.length===0 ? (
        <div className="empty-state" style={{padding:20}}>
          {aguardandoSegunda.length===0
            ? 'Nenhum item aguardando recontagem no momento.'
            : (aguardandoSegundaNoPeriodo.length===0 ? 'Nenhum item aguardando recontagem nesse perûÙodo.' : 'Nenhum item encontrado para esse filtro.')}
        </div>
      ) : listaPaginada.map(c=>{
        const sev = classifySeverity4(severidadeDe(c));
        const temExtra = c.motivo || c.observacao || c.foto || c.almoxarifado || (c.enderecoContado && c.enderecoContado!==c.endereco) || (c.valorDivergente && Number(c.valorDivergente)!==0);
        return (
        <div key={c.id} className={"count-card"+(c.urgente?' urgente':'')+(c.reprovadoPelaDiretoria?' reprovado-diretoria':'')}>
          <div className="count-card-bar" style={{background:sev.color}}></div>
          <div className="count-card-body">
            <div className="count-card-head">
              <div className="count-card-badges">
                {c.urgente && <span className="urgente-chip"><Ic>ÞË</Ic> Urgente</span>}
                {c.reprovadoPelaDiretoria
                  ? <span className="severity-chip" style={{background:'var(--purple-bg)',color:'var(--purple)'}}><Ic>ã</Ic> Ajuste Reprovado</span>
                  : c.recontagemSolicitadaPeloLider
                  ? <span className="severity-chip" style={{background:'var(--danger-bg)',color:'var(--danger)'}}><Ic>ã </Ic> Rejeitada</span>
                  : <span className="severity-chip" style={{background:sev.bg,color:sev.color}}><Ic>{sev.icon}</Ic> {sev.label}</span>}
              </div>
              <div className="count-card-head-right">
                <span className="category-chip">{categoriaDoInventario(c, inventories)}</span>
                <span className="count-card-date">{c.data}</span>
                {(canMark || onDeleteCount) && (
                  <div className="count-card-menu">
                    <button type="button" className="count-card-menu-btn" onClick={()=>setMenuAbertoId(menuAbertoId===c.id ? null : c.id)}>ãÛ</button>
                    {menuAbertoId===c.id && (
                      <div className="count-card-menu-dropdown">
                        {canMark && (
                          <button type="button" disabled={urgenteBusyId===c.id} onClick={()=>{ handleToggleUrgente(c); setMenuAbertoId(null); }}><Ic>ÞË</Ic> {urgenteBusyId===c.id ? 'SalvandoãÎ' : (c.urgente ? 'Remover urgûˆncia' : 'Marcar urgente')}</button>
                        )}
                        {onDeleteCount && (
                          <button type="button" className="menu-item-danger" onClick={()=>{ setConfirmDeleteId(c.id); setMenuAbertoId(null); }}><Ic>Þ</Ic> Excluir contagem</button>
                        )}
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
            <div className="count-card-toprow">
              <div className="count-card-title">
                <div className="item-code">{c.productCode}</div>
                <div className="item-desc">{c.descricao}</div>
              </div>
              <div className="count-card-address-badge"><DIcon name="mapPin" size={16} /> {c.endereco || 'nûÈo cadastrado'}</div>
            </div>
            {c.reprovadoPelaDiretoria && (
              <div className="divergence-alert" style={{background:'var(--purple-bg)',borderColor:'var(--purple)',color:'var(--purple)'}}>
                <Ic>ã</Ic><span>A Diretoria reprovou a SA {c.solicitacaoAjuste} em {c.reprovadoEm} ã reenviado para nova anûÀlise.{c.motivoReprovacaoDiretoria && <><br/><strong>Motivo da reprovaûÏûÈo:</strong> <span style={{color:'var(--danger)'}}>{c.motivoReprovacaoDiretoria}</span></>}</span>
              </div>
            )}
            {/* Motivo de um ajuste reprovado ã pedido do cliente: vermelho sû°
                aqui, nûÈo no "Motivo:" comum (causa da divergûˆncia), que
                continua neutro. Sû° quando NûO veio pelo fluxo de SA/Diretoria
                acima (esse jûÀ mostra o motivo embutido no prû°prio alerta roxo,
                mostrar de novo aqui duplicaria) ã cobre o caso de
                "Reprovar ajuste" em Contagens ConcluûÙdas
                (reprovarAjusteHistoricoNaLinha), que reabre o item sem SA. */}
            {!c.reprovadoPelaDiretoria && c.motivoReprovacaoDiretoria && (
              <div style={{padding:'10px 16px 0',fontSize:'var(--text-sm)',color:'var(--danger)'}}>Motivo da reprovaûÏûÈo: <strong>{c.motivoReprovacaoDiretoria}</strong></div>
            )}
            {c.recontagemSolicitadaPeloLider && (
              <div className="divergence-alert"><Ic>ã </Ic>
                <span>{c.recontagemSolicitadaPor || 'O lûÙder'} nûÈo aceitou a divergûˆncia da 1ôˆ contagem e solicitou uma nova contagem em {c.recontagemSolicitadaEm}.</span>
              </div>
            )}
            {confirmDeleteId===c.id ? (
              <div className="count-card-actions">
                <div className="divergence-alert" style={{marginBottom:10}}>
                  <Ic>ã </Ic><span>Excluir esta contagem de {c.productCode}? Essa aûÏûÈo nûÈo pode ser desfeita e nûÈo deixa rastro.</span>
                </div>
                {erroExclusao && <div className="divergence-alert" style={{marginBottom:10}}><Ic>ã </Ic><span>{erroExclusao}</span></div>}
                <div className="btn-row">
                  <button className="btn btn-secondary" disabled={excluindo} onClick={()=>{setConfirmDeleteId(null); setErroExclusao('');}}>Cancelar</button>
                  <button className="btn btn-danger" disabled={excluindo} onClick={()=>handleConfirmDelete(c.id)}>{excluindo ? 'ExcluindoãÎ' : 'Confirmar exclusûÈo'}</button>
                </div>
              </div>
            ) : (
              <div className="count-card-main">
                <div className="count-card-content">
                  {!detalhesOcultosIds.has(c.id) && (
                    <>
                      <div className="result-grid result-grid-4col" style={{marginTop:0,gridTemplateColumns:'repeat(4,1fr)'}}>
                        <div className="rg"><div className="k">Sistema</div><div className="v">{c.saldoSistema==null ? 'ã' : c.saldoSistema}</div></div>
                        <div className="rg"><div className="k">FûÙsico</div><div className="v">{c.qtdContada}</div></div>
                        <div className="rg"><div className="k">DiferenûÏa</div><div className="v" style={{color:sev.color}}>{c.diferenca==null ? 'ã' : (c.diferenca>0?'+':'')+c.diferenca}</div></div>
                        <div className="rg"><div className="k">%</div><div className="v" style={{color:sev.color}}>{c.percentual==null ? 'ã' : Math.round(c.percentual)+'%'}</div></div>
                      </div>
                      {podeVerDetalhes && (
                        <div className="count-card-extra">
                          {c.almoxarifado && <div>Armazûˋm: <strong>{c.almoxarifado}</strong></div>}
                          {c.enderecoContado && c.enderecoContado!==c.endereco && <div>EndereûÏo contado: <strong>{c.enderecoContado}</strong></div>}
                          {c.motivo && <div>Motivo: <strong>{c.motivo}</strong></div>}
                          {limparObservacaoExibicao(c.observacao) && <div>ObservaûÏûÈo: {limparObservacaoExibicao(c.observacao)}</div>}
                          {c.foto && <div>Foto anexada na contagem.</div>}
                          {c.valorDivergente && Number(c.valorDivergente)!==0 && <div>Valor divergente: <strong>R$ {Number(c.valorDivergente).toFixed(2)}</strong></div>}
                          <div>Contado por {c.usuario} em {c.data} {c.hora||''}</div>
                        </div>
                      )}
                    </>
                  )}
                </div>
                <div className="count-card-actions-col">
                  <button className="btn btn-primary" onClick={()=>goto('recount', c)}><Ic>Þ</Ic> Recontar</button>
                  <button className="btn btn-outline" onClick={()=>toggleDetalhes(c.id)}><Ic>Þ</Ic> {detalhesOcultosIds.has(c.id) ? 'Detalhes' : 'Ocultar'}</button>
                </div>
              </div>
            )}
            {urgenteErro[c.id] && (
              <div className="divergence-alert"><Ic>ã </Ic><span>{urgenteErro[c.id]}</span></div>
            )}
          </div>
        </div>
        );
      })}
      <PaginationControls pagina={pagina} setPagina={setPagina} totalPaginas={totalPaginas} tamanhoPagina={tamanhoPagina} setTamanhoPagina={setTamanhoPagina} totalItens={listaFiltrada.length} itemLabel="itens" />
    </div>
  );
}

// "Itens Divergentes" ã tela prû°pria (era a seûÏûÈo "Aguardando AnûÀlise do
// LûÙder", que morava dentro de RecountsPanel). Regra pedida pelo cliente:
// mostra sû° divergûˆncia que AINDA nûÈo entrou em processo de recontagem ã
// assim que vira aguardando_segunda (lûÙder solicita nova contagem, ou a
// regra automûÀtica jûÀ joga direto pra lûÀ), o item some daqui e passa a
// aparecer sû° em "Recontagens". VisûÙvel pra todos os papûˋis (antes ficava
// escondida inteira do operador) ã mas as aûÏûçes (aprovar/solicitar
// recontagem) continuam sû° pra lûÙder/admin, operador vûˆ em modo leitura.
function DivergentItemsPanel({counts, inventories, role, goto, onApprove, onSendToDiretoria, onRequestRecount, onDeleteCount, onToggleUrgente}){
  // Bug real corrigido aqui: faltava a mesma checagem de "ponta da
  // corrente" que RecountsPanel jûÀ tinha (`byOriginal`/`!byOriginal[c.id]`)
  // ã sem isso, uma linha com status 'aguardando_analise_lider' continuava
  // aparecendo aqui MESMO DEPOIS de jûÀ existir uma rodada seguinte que
  // resolveu a divergûˆncia (ex.: 2ôˆ contagem ainda com o status antigo,
  // mas a 3ôˆ jûÀ bateu exato e foi auto-aprovada) ã o item ficava "preso"
  // pra sempre, exigindo decisûÈo do lûÙder sobre uma rodada jûÀ superada.
  const byOriginal = {};
  counts.forEach(c=>{ if(c.contagemAnteriorId) byOriginal[c.contagemAnteriorId]=c; });
  const aguardandoAnalise = counts.filter(c=>c.statusAprovacao==='aguardando_analise_lider' && !byOriginal[c.id]);
  const canApprove = role==='lider' || role==='admin';
  // Revertido: essa tela nûÈo tem nenhum "valor" (R$) exibido ã sû° quadro de
  // quantidades/percentual e o Motivo ã entûÈo nûÈo hûÀ o que restringir pra
  // operaûÏûÈo aqui. O toggle `operadorVeValoresRecontagem` (Diretoria) sû°
  // se aplica ao bloco de detalhes extras de `RecountsPanel`, que û onde
  // "Valor divergente" aparece.

  // `onApprove`/`onRequestRecount`/`onToggleUrgente` aguardam confirmaûÏûÈo do
  // Supabase ã `busyId` desabilita sû° o card em aûÏûÈo (nûÈo a tela inteira),
  // `erros` guarda uma mensagem por id de contagem se a chamada falhar.
  const [busyId, setBusyId] = useState(null);
  const [erros, setErros] = useState({});
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  // Campo inline pra digitar o nû¤mero da SA de Ajuste antes de encaminhar pra
  // aprovaûÏûÈo da Diretoria (mesmo padrûÈo de "confirmar" inline jûÀ usado pra
  // excluir) ã guarda o id do card com o campo aberto e o valor digitado.
  const [saAbertoId, setSaAbertoId] = useState(null);
  const [saValor, setSaValor] = useState('');
  // Menu "ãÛ" (Marcar urgente + Excluir, mesmo padrûÈo do RecountsPanel) ã
  // guarda sû° o id do card com o menu aberto no momento.
  const [menuAbertoId, setMenuAbertoId] = useState(null);
  useEffect(()=>{
    if(!menuAbertoId) return;
    function handleClickOutside(e){
      if(!e.target.closest('.count-card-menu')) setMenuAbertoId(null);
    }
    document.addEventListener('click', handleClickOutside);
    return ()=>document.removeEventListener('click', handleClickOutside);
  }, [menuAbertoId]);

  // Filtro de perûÙodo ("Filtros"), mesmo critûˋrio e mesmo comentûÀrio jûÀ
  // usado em RecountsPanel ã `useState` puro, nûÈo `usePersistedState` (o
  // filtro volta ao padrûÈo sempre que a tela recarregar, pedido do cliente),
  // padrûÈo "Todos os perûÙodos" em vez de "ûltimos 30 dias" (mesmo motivo).
  const [trendFilter, setTrendFilter] = useState({tipo:'todos', from:'', to:''});
  const hojeStr = hojeLocalStr();
  const { from: dataInicioStr, to: dataFimStr } = computeTrendRange(trendFilter.tipo, hojeStr, trendFilter.from, trendFilter.to);
  const aguardandoAnaliseNoPeriodo = aguardandoAnalise.filter(c=>c.data && c.data>=dataInicioStr && c.data<=dataFimStr);

  const [busca, setBusca] = useState('');
  const buscaNorm = busca.trim().toLowerCase();
  const porBusca = buscaNorm
    ? aguardandoAnaliseNoPeriodo.filter(c => c.productCode.toLowerCase().includes(buscaNorm) || (c.descricao||'').toLowerCase().includes(buscaNorm))
    : aguardandoAnaliseNoPeriodo;

  const [severidade, setSeveridade] = useState('todos');
  const listaFiltradaSemOrdenar = severidade==='todos' ? porBusca : porBusca.filter(c=>classifySeverity4(severidadeDe(c)).level===severidade);
  // Itens marcados como urgentes sempre aparecem primeiro ã mesmo critûˋrio
  // jûÀ usado em RecountsPanel.
  const listaFiltrada = [...listaFiltradaSemOrdenar].sort((a,b)=>(b.urgente?1:0)-(a.urgente?1:0));
  const {pagina, setPagina, tamanhoPagina, setTamanhoPagina, listaPaginada, totalPaginas} = usePaginacaoLista(listaFiltrada, 50);

  async function handleApprove(countId){
    setBusyId(countId);
    setErros(prev=>({...prev, [countId]: null}));
    const res = await onApprove(countId);
    setBusyId(null);
    if(!res || !res.ok) setErros(prev=>({...prev, [countId]: (res && res.erro) || 'NûÈo foi possûÙvel aprovar ã tente novamente.'}));

function DiretoriaApprovalPanel({counts, inventories, role, onApproveSA, onRejectSA}){
  const canDecide = role==='admin';

    } else {
      setErros(prev=>({...prev, [countId]: (res && res.erro) || 'NûÈo foi possûÙvel reprovar ã tente novamente.'}));

// "Todas as Divergûˆncias" ã tela nova e separada, sû° alcanûÏûÀvel pelo link

// status (pendente, jûÀ aprovado pelo lûÙder, etc.), com uma û¤nica exceûÏûÈo: os
// que estûÈo na fila de recontagem (`aguardando_segunda`) jûÀ tûˆm tela prû°pria

// histû°rico importado (mesmo pool jûÀ usado em "Top 5 Maiores Divergûˆncias"),

function AllDivergencesPanel({counts, historicoConcluidas, goto}){
  const [busca, setBusca] = useState('');
  const historicoComoContagem = useMemo(()=>historicoConcluidas.map(historicoRowToCountLike).filter(Boolean), [historicoConcluidas]);
  const divergentes = useMemo(()=>{

    // Dedupe por id antes de filtrar ã se a mesma contagem/linha de
    // histû°rico acabar aparecendo mais de uma vez no pool (ex.: uma busca

    const vistos = new Map();
    pool.forEach(c=>{ if(c && c.id!=null && !vistos.has(c.id)) vistos.set(c.id, c); });
    return Array.from(vistos.values())
      .filter(c=>c.diferenca!=null && c.diferenca!==0 && c.statusAprovacao!=='aguardando_segunda')

  const termo = busca.trim().toLowerCase();

        ) : (
          <table className="rank-table">
            <thead><tr><th>Produto</th><th>Almox.</th><th className="num">Esperado</th><th className="num">Encontrado</th><th className="num">DiferenûÏa</th><th className="num">Valor (R$)</th></tr></thead>
            <tbody>
              {filtrados.map(c=>{
                const almoxLabel = c.almoxarifado ? ('Almox ' + (/^[0-9]+$/.test(c.almoxarifado) ? c.almoxarifado.padStart(2,'0') : c.almoxarifado)) : 'ã';
                const valorComSinal = valorDivergenteComSinal(c);
                return (

}

/* ---------------- CONTAGENS CONCLUûDAS (painel de auditoria) ---------------- */

// "Contagens ConcluûÙdas" deixou de ser um atalho pra MyCounts e virou um
// painel de auditoria de verdade ã agrupa `counts` em CADEIAS (a sequûˆncia
// de rodadas do mesmo item, ligadas por contagemAnteriorId/numeroContagem),
// uma linha por ciclo completo (nûÈo uma linha por rodada individual). Uma
// cadeia ûˋ "concluûÙda" quando a rodada mais recente (a ponta, sem nenhuma
// outra contagem apontando pra ela via contagemAnteriorId) sai dos status
// abertos (OPEN_STATUSES) ã chegou a um veredito final: aprovada
// automaticamente na 1ôˆ contagem, aprovada pelo lûÙder, ou confirmada na
// recontagem. 100% derivado de campos que a contagem jûÀ grava ã nenhum dado
// novo precisou ser inventado nem persistido.
// Ordena cadeias por data+hora (mais recente primeiro) ã cadeia SEM data
// (item do histû°rico importado cuja planilha original nûÈo trouxe "Data",
// ver CLAUDE.md "Data sempre explûÙcita") vai sempre pro FIM da lista, nunca
// pro topo. Bug real corrigido aqui: o sort antigo comparava strings
// (`b.tip.data+... .localeCompare(a.tip.data+...)`) e, quando `tip.data` ûˋ
// `null`, a concatenaûÏûÈo vira a STRING literal `"null"` ã que por
// comparaûÏûÈo lexicogrûÀfica (`'n' > qualquer dûÙgito`) sempre "vence" contra
// uma data real tipo `"2026-07-14"`, fazendo os itens sem data flutuarem
// pro TOPO da lista (parecendo "mais recentes que tudo") em vez de para o
// fim, que ûˋ o que faz sentido numa lista "mais recente primeiro".
function compararCadeiasPorData(a, b){
  const da = a.tip.data, db = b.tip.data;
  if(!da && !db) return 0;
  if(!da) return 1;
  if(!db) return -1;
  return (db+(b.tip.hora||'')).localeCompare(da+(a.tip.hora||''));
}

function buildConcludedChains(counts){
  const hasFollowUp = new Set();
  counts.forEach(c=>{ if(c.contagemAnteriorId) hasFollowUp.add(c.contagemAnteriorId); });
  const byId = new Map(counts.map(c=>[c.id, c]));
  const pontas = counts.filter(c => !hasFollowUp.has(c.id) && !OPEN_STATUSES.includes(c.statusAprovacao));
  return pontas.map(tip=>{
    const rodadas = [];
    let atual = tip;
    while(atual){
      rodadas.unshift(atual);
      atual = atual.contagemAnteriorId ? byId.get(atual.contagemAnteriorId) : null;
    }
    // "Houve ajuste de estoque" ã agora tem sinal EXPLûCITO pros dois status
    // que passam pela Diretoria (ver `enviarParaAprovacaoDiretoria`/
    // `aprovarAjusteDiretoria` em App()): `ajuste_aprovado_diretoria` sempre
    // teve ajuste de verdade, `aprovado_lider` (daqui pra frente sû° usado pro
    // caminho "Sem Ajuste NecessûÀrio") nunca tem. Pros status mais antigos
    // (aprovado_auto/aprovado_segunda, sempre com diferenûÏa zero por
    // definiûÏûÈo) cai no mesmo heurûÙstico de antes, que jûÀ dava o resultado
    // certo pra esses casos.
    const houveAjuste = tip.statusAprovacao==='ajuste_aprovado_diretoria' ? true
      : tip.statusAprovacao==='aprovado_lider' ? false
      : (tip.diferenca!=null && tip.diferenca!==0);
    return { chaveId: tip.id, tip, rodadas, houveAjuste };
  }).sort(compararCadeiasPorData);
}

// Converte uma linha de `contagens_historico` (jûÀ filtrada pros status
// concluûÙdos ã ver fetchContagensHistoricoConcluidas) num objeto "contagem"
// no MESMO formato usado pro resto do app, pra poder ser reaproveitado em
// qualquer lugar que jûÀ sabe ler `counts` (ConcludedCountsPanel, Dashboard,
// futuros usos) sem duplicar lû°gica de mapeamento. Carrega TODOS os campos
// que existem na planilha original ã inclusive os que a contagem ao vivo do
// app nûÈo tem (classe/SA/documento/dias sem movimento) ã porque o cliente
// pediu explicitamente que essa tela sirva de painel de auditoria: "um dia
// bata uma auditoria, preciso de toda informaûÏûÈo necessûÀria ali".
// "Ajustar" saiu daqui ã nûÈo ûˋ um veredito CONCLUûDO (o prû°prio nome jûÀ diz
// que ainda precisa de ajuste), entûÈo nûÈo faz mais parte do histû°rico
// "resolvido" mostrado em Contagens ConcluûÙdas. Ver `buildAjustarSeedsFromHistorico`
// ã esses itens agora entram na fila viva de "Itens Divergentes", mesmo
// tratamento jûÀ dado a "Recontar" antes.
const HISTORICO_STATUS_DISPLAY = {
  'OK': {level:'ok', text:'Aprovado (histû°rico importado)'},
  'Sem Ajuste': {level:'ok', text:'Aprovado ã sem ajuste necessûÀrio (histû°rico importado)'},
  'Ajustado': {level:'ok', text:'Ajuste jûÀ aplicado no Protheus (histû°rico importado)'},
};
function historicoRowToCountLike(h){
  const statusNorm = String(h.status||'').trim();
  const display = HISTORICO_STATUS_DISPLAY[statusNorm];
  if(!display || !h.produto_codigo) return null;
  const percentual = (h.saldo_sistema!=null && h.saldo_sistema!==0 && h.diferenca!=null)
    ? (h.diferenca / h.saldo_sistema) * 100
    : null;
  return {
    id: 'HIST-CONCL-' + String(h.produto_codigo).replace(/[^A-Za-z0-9]/g,'') + '-' + (h.data||'sem-data') + '-' + (h.endereco||'sem-endereco'),
    // reconstructNumericCode aqui (nûÈo sû° no parser do upload) corrige a
    // exibiûÏûÈo mesmo pra linhas Jû importadas antes da correûÏûÈo do parser ã
    // sem isso, precisaria o cliente reimportar a planilha inteira de novo.
    productCode: reconstructNumericCode(h.produto_codigo),
    descricao: h.descricao || '',
    // "-" ûˋ sû° um valor sentinela gravado no banco (ver parseHistoricoContagensRows)
    // pra trava de duplicado (unique produto_codigo+data+endereco) funcionar de
    // verdade em linha sem endereûÏo ã na exibiûÏûÈo, trata igual a "sem endereûÏo"
    // de sempre (cai no "nûÈo cadastrado"/"ã" que as telas jûÀ mostram).
    endereco: (h.endereco && h.endereco!=='-') ? h.endereco : null,
    enderecoContado: (h.endereco && h.endereco!=='-') ? h.endereco : null,
    usuario: 'ImportaûÏûÈo Histû°rica',
    numeroContagem: 1,
    contagemAnteriorId: null,
    qtdContada: h.qtd_contada,
    saldoSistema: h.saldo_sistema,
    diferenca: h.diferenca,
    percentual,
    valorDivergente: h.valor_divergente!=null ? Math.abs(h.valor_divergente) : 0,
    classificacao: {label: display.text, level: display.level, rule: ''},
    statusAprovacao: null, // sem equivalente 1:1 no vocabulûÀrio do app ã usa _statusDisplay
    motivo: h.causa,
    observacao: h.observacao || null,
    data: h.data,
    hora: null,
    // Campos extras que sû° a planilha antiga tem ã nûÈo existem numa
    // contagem feita ao vivo no app, mas sûÈo reais e o cliente pediu que
    // apareûÏam pra fins de auditoria.
    classe: h.classe || null,
    // Mesma proteûÏûÈo do filtro de seed (pareceValorDeStatusNaoSA) ã sem isso,
    // um valor sujo tipo "SA"="Ajustado" (mesma palavra do Status) apareceria
    // como badge "Ajustado ôñ SA Ajustado" em Contagens ConcluûÙdas, parecendo
    // uma SA de verdade sem ser.
    solicitacaoAjuste: pareceValorDeStatusNaoSA(h.solicitacao_ajuste) ? null : h.solicitacao_ajuste,
    documento: h.documento || null,
    diasSemMovimento: h.dias_sem_movimento!=null ? h.dias_sem_movimento : null,
    semana: h.semana!=null ? h.semana : null,
    _statusDisplay: display,
    _fromHistorico: true,
    _statusOriginal: statusNorm,
    // Guarda a linha CRUA (produto_codigo/data/endereco tal como estûÀ em
    // `contagens_historico`, sem a reconstruûÏûÈo de cû°digo feita acima) ã ûˋ
    // isso que `reprovarAjusteHistoricoNaLinha` precisa pra bater exatamente
    // na chave û¤nica (produto_codigo, data, endereco) da tabela na hora de
    // atualizar o status; `productCode` (acima) jûÀ vem corrigido pra
    // exibiûÏûÈo e pode nûÈo bater com o valor cru gravado no banco.
    _historicoRaw: h,
  };
}

// Cada linha do histû°rico vira uma cadeia de 1 rodada sû° ã a planilha
// antiga nûÈo guarda a sequûˆncia de rodadas (1ôˆ contagem ã recontagem ã ãÎ)
// que o app registra hoje.
function historicoRowToConcludedChain(h){
  const tip = historicoRowToCountLike(h);
  if(!tip) return null;
  // Diferente das cadeias ao vivo do app (onde `houveAjuste` precisa ser
  // inferido da diferenûÏa, por falta de um campo explûÙcito ã ver
  // buildConcludedChains), a planilha antiga Jû diz isso diretamente pelo
  // prû°prio status: "Ajustado"/"Ajustar" = precisou de ajuste; "OK"/"Sem
  // Ajuste" = nûÈo precisou, MESMO que tenha sobrado uma diferenûÏa pequena
  // dentro da tolerûÂncia (ûˋ exatamente o que "Sem Ajuste" quer dizer) ã nûÈo
  // usar o fallback de diferenûÏa!=0 aqui, ele contradiria o status da
  // prû°pria planilha.
  const houveAjuste = tip._statusOriginal==='Ajustado' || tip._statusOriginal==='Ajustar';
  return { chaveId: tip.id, tip, rodadas: [tip], houveAjuste };
}

function ConcludedCountsPanel({counts, inventories, historicoConcluidas=[], onDeleteCount, onReprovarAjusteHistorico, onRefresh}){
  const [busca, setBusca] = useState('');
  const [confirmDeleteId, setConfirmDeleteId] = useState(null); // id da RODADA (r.id), nûÈo da cadeia
  const [excluindo, setExcluindo] = useState(false);
  const [erroExclusao, setErroExclusao] = useState('');
  const [atualizando, setAtualizando] = useState(false);
  // "Reprovar ajuste" ã reverte um item importado como "Ajustado" direto no
  // site, sem editar a planilha (ver reprovarAjusteHistoricoNaLinha em App()).
  // Estado por CADEIA (cd.chaveId), mesmo padrûÈo de confirmaûÏûÈo inline jûÀ
  // usado pra excluir uma rodada.
  const [confirmReprovarId, setConfirmReprovarId] = useState(null);
  const [reprovando, setReprovando] = useState(false);
  const [erroReprovar, setErroReprovar] = useState('');
  // Motivo da reprovaûÏûÈo ã mesmo pedido do cliente jûÀ aplicado no fluxo de
  // "AprovaûÏûÈo de Ajustes" (ver DiretoriaApprovalPanel): registrar POR QUE o
  // ajuste nûÈo foi aceito, nûÈo sû° QUE foi reprovado.
  const [motivoReprovar, setMotivoReprovar] = useState('');
  // Mesmo padrûÈo de toggle "Detalhes"/"Ocultar" jûÀ usado em RecontagensPanel
  // (pedido do cliente: padronizar) ã troca a navegaûÏûÈo pra uma tela prû°pria
  // por uma expansûÈo inline dentro do prû°prio card, sem sair da lista.
  const [detalhesAbertosIds, setDetalhesAbertosIds] = useState(()=>new Set());
  function toggleDetalhes(id){
    setDetalhesAbertosIds(prev=>{
      const next = new Set(prev);
      if(next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }

  // Mesmo painel "Filtros" (presets de calendûÀrio) jûÀ usado em Indicadores ã
  // `useState` puro, nûÈo `usePersistedState` (pedido do cliente: o filtro
  // volta ao padrûÈo sempre que a tela recarregar, em vez de continuar
  // lembrando o perûÙodo escolhido da û¤ltima vez). PadrûÈo mudou de "ûltimos
  // 30 dias" pra "Todos os perûÙodos" ã mesmo motivo jûÀ documentado em
  // RecountsPanel: o histû°rico completo jûÀ estûÀ em memû°ria (sem paginaûÏûÈo
  // por data), entûÈo filtrar por padrûÈo sû° escondia dado sem necessidade.
  const [trendFilter, setTrendFilter] = useState({tipo:'todos', from:'', to:''});
  const hojeStr = hojeLocalStr();
  const { from: dataInicioStr, to: dataFimStr } = computeTrendRange(trendFilter.tipo, hojeStr, trendFilter.from, trendFilter.to);

  async function handleRefresh(){
    if(!onRefresh) return;
    setAtualizando(true);
    try{ await onRefresh(); } finally { setAtualizando(false); }
  }

  async function handleConfirmDelete(id){
    setExcluindo(true);
    setErroExclusao('');
    const res = await onDeleteCount(id);
    setExcluindo(false);
    if(res && res.ok){
      setConfirmDeleteId(null);
    } else {
      setErroExclusao((res && res.erro) || 'NûÈo foi possûÙvel excluir ã tente novamente.');
    }
  }

  async function handleConfirmReprovar(chaveId, historicoRaw){
    setReprovando(true);
    setErroReprovar('');
    const res = await onReprovarAjusteHistorico(historicoRaw, motivoReprovar.trim());
    setReprovando(false);
    if(res && res.ok){
      setConfirmReprovarId(null);
      setMotivoReprovar('');
      // Tira o item de "Contagens ConcluûÙdas" na hora ã sem isso, ficaria
      // duplicado (aqui como "Ajustado" e em "Itens Divergentes" como
      // pendente) atûˋ o prû°ximo refresh manual/reload.
      if(onRefresh) onRefresh();
    } else {
      setErroReprovar((res && res.erro) || 'NûÈo foi possûÙvel reprovar ã tente novamente.');
    }
  }

  const cadeias = useMemo(()=>{
    const doApp = buildConcludedChains(counts);
    const doHistorico = historicoConcluidas.map(historicoRowToConcludedChain).filter(Boolean);
    return [...doApp, ...doHistorico].sort(compararCadeiasPorData);
  }, [counts, historicoConcluidas]);

  // Filtro de perûÙodo: pedido explûÙcito do cliente ã item SEM data nûÈo deve
  // aparecer em NENHUM filtro de perûÙodo (nem "Hoje", nem "Todo o perûÙodo"
  // via preset, nenhum). DecisûÈo anterior (mostrar sempre, pra nûÈo "esconder
  // dado" da planilha antiga) foi revertida ã o cliente prefere que a
  // ausûˆncia de data exclua o item da lista filtrada por perûÙodo, ponto.
  const cadeiasNoPeriodo = useMemo(()=>
    cadeias.filter(cd => cd.tip.data && cd.tip.data>=dataInicioStr && cd.tip.data<=dataFimStr),
  [cadeias, dataInicioStr, dataFimStr]);

  // Busca tambûˋm por nô¤ de SA ã pedido explûÙcito do cliente ("possibilitando
  // pesquisas por uma SA especûÙfica"), pra achar rûÀpido em qual documento um
  // ajuste especûÙfico foi feito.
  const buscaNorm = busca.trim().toLowerCase();
  const cadeiasPorBusca = buscaNorm
    ? cadeiasNoPeriodo.filter(cd => cd.tip.productCode.toLowerCase().includes(buscaNorm) || (cd.tip.descricao||'').toLowerCase().includes(buscaNorm) || (cd.tip.solicitacaoAjuste||'').toLowerCase().includes(buscaNorm))
    : cadeiasNoPeriodo;

  const [severidade, setSeveridade] = useState('todos');
  // Filtro por STATUS (Ajustado/Sem Ajuste/SALDO OK) ã pedido do cliente,
  // funciona em conjunto (AND) com o filtro de severidade jûÀ existente, nûÈo
  // substitui um pelo outro.
  const [statusFiltro, setStatusFiltro] = useState('todos');
  const cadeiasFiltradas = cadeiasPorBusca
    .filter(cd => severidade==='todos' || classifySeverity4(severidadeDe(cd.tip)).level===severidade)
    .filter(cd => statusFiltro==='todos' || classificarStatusConcluido(cd.tip)===statusFiltro);
  const {pagina, setPagina, tamanhoPagina, setTamanhoPagina, listaPaginada: cadeiasPaginadas, totalPaginas} = usePaginacaoLista(cadeiasFiltradas, 50);

  return (
    <div>
      <TrendFilterBar
        trendFilter={trendFilter}
        setTrendFilter={setTrendFilter}
        dataInicioStr={dataInicioStr}
        dataFimStr={dataFimStr}

/* ---------------- GRûFICOS SEMANAIS (linha + colunas), usados no Dashboard ---------------- */

// Agrupa por semana ISO (segunda a domingo), a partir do campo `data` de
// cada contagem ã mesmo tipo de agregaûÏûÈo jûÀ usada no resto do Dashboard
// (calculado em cima de `counts`, nada fabricado). `key` ûˋ a segunda-feira
// da semana (YYYY-MM-DD, ordenûÀvel direto).
function getWeekInfo(dataStr){
  const d = new Date(dataStr + 'T00:00:00');
  const dow = (d.getDay() + 6) % 7; // 0=segunda ... 6=domingo
  const monday = new Date(d);
  monday.setDate(d.getDate() - dow);
  const key = monday.toISOString().slice(0, 10);
  // Nû¤mero da semana ISO: baseado na quinta-feira da mesma semana (regra
  // ISO 8601 padrûÈo ã evita semana 0/53 ambûÙgua na virada do ano).
  const thursday = new Date(monday);
  thursday.setDate(monday.getDate() + 3);
  const yearStart = new Date(Date.UTC(thursday.getFullYear(), 0, 1));
  const weekNumber = Math.ceil((((thursday - yearStart) / 86400000) + 1) / 7);
  return {
    key,
    weekNumber,
    label: 'Sem ' + weekNumber,
    sublabel: monday.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}),
  };
}

// Acuracidade de UM item ã usa o "Acc" que a prû°pria planilha jûÀ traz
// quando o item vem do histû°rico (0 a 1, fû°rmula original do cliente:
// max(0, 1-|diferenûÏa|/sistema) ã ver "PadrûÈo de planilha do cliente" no
// CLAUDE.md), senûÈo calcula com a MESMA fû°rmula em cima de diferenca/
// saldoSistema (contagem ao vivo do app). Retorna `null` quando nûÈo dûÀ pra
// calcular (sem saldo pra comparar) ã esses itens ficam de fora da MûDIA,
// nûÈo entram como 0% nem como 100%.
function itemAcuracidade(c){
  if(c.acuracidade!=null) return c.acuracidade;
  if(c.saldoSistema==null || c.saldoSistema===0 || c.diferenca==null) return null;
  return Math.max(0, 1 - Math.abs(c.diferenca)/c.saldoSistema);
}

// Agrupa por MûS civil (YYYY-MM) ã mesma ideia de `getWeekInfo`, granularidade
// maior. Usado pelo grûÀfico "Acuracidade Mensal".
const NOMES_MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function getMonthInfo(dataStr){
  const d = new Date(dataStr + 'T00:00:00');
  const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  return {
    key,
    label: NOMES_MESES[d.getMonth()],
    sublabel: String(d.getFullYear()),
  };
}

// Traduz o filtro de perûÙodo do painel "Filtros" (Dashboard/Indicadores) num
// par de datas concreto. Pedido do cliente: abandonar o conceito de "10/26
// semanas" (pouco intuitivo, amarrado û  granularidade do grûÀfico) por
// presets no vocabulûÀrio do dia a dia ã mesmo catûÀlogo usado por
// ferramentas tipo Power BI/Stripe Dashboard ("Hoje", "Este mûˆs", "ûltimos
// 30 dias"...). Os presets fixos sûÈo sempre recalculados a partir de "hoje"
// (nûÈo guardam data absoluta) ã reabrir o dashboard amanhûÈ com "ûltimos 30
// dias" ainda selecionado desliza a janela sozinho, sem precisar o usuûÀrio
// reconfirmar nada. Sû° "custom" usa `from`/`to` (persistidos) como fonte de
// verdade, jûÀ que aûÙ a intenûÏûÈo do usuûÀrio û uma data absoluta especûÙfica.
function computeTrendRange(tipo, hojeStr, from, to){
  const hoje = new Date(hojeStr + 'T00:00:00');
  const fmt = d => d.toISOString().slice(0,10);
  switch(tipo){
    // "Todos os perûÙodos" ã sem restriûÏûÈo de data nenhuma. Em vez de mudar a
    // lû°gica de filtro em cada tela (que jûÀ compara `data>=dataInicioStr &&
    // data<=dataFimStr`), usa uma data-sentinela bem anterior a qualquer
    // registro real do app (nenhuma contagem, ao vivo ou do histû°rico
    // importado, ûˋ de antes disso) ã efeito idûˆntico a "sem filtro", menor
    // impacto na estrutura jûÀ existente.
    case 'todos':
      return { from: '1970-01-01', to: hojeStr };
    case 'hoje':
      return { from: hojeStr, to: hojeStr };
    case 'semana': {
      const diasDesdeSegunda = (hoje.getDay()+6) % 7; // 0=segunda-feira
      const segunda = new Date(hoje); segunda.setDate(hoje.getDate() - diasDesdeSegunda);
      return { from: fmt(segunda), to: hojeStr };
    }
    case 'mes': {
      const inicioMes = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
      return { from: fmt(inicioMes), to: hojeStr };
    }
    case '60d': {
      const d = new Date(hoje); d.setDate(d.getDate() - 59);
      return { from: fmt(d), to: hojeStr };
    }
    case '90d': {
      const d = new Date(hoje); d.setDate(d.getDate() - 89);
      return { from: fmt(d), to: hojeStr };
    }
    case 'ano':
      return { from: hoje.getFullYear() + '-01-01', to: hojeStr };
    case 'custom':
      return { from: from || hojeStr, to: to || hojeStr };
    case '30d':
    default: {
      const d = new Date(hoje); d.setDate(d.getDate() - 29);
      return { from: fmt(d), to: hojeStr };
    }
  }
}

function fmtDataBR(dataStr){
  if(!dataStr) return 'ã';
  const [ano,mes,dia] = dataStr.split('-');
  return dia+'/'+mes+'/'+ano;
}

// Data de HOJE no formato YYYY-MM-DD, sempre pelo horûÀrio LOCAL do aparelho
// ã bug real corrigido aqui: `new Date().toISOString().slice(0,10)` converte
// pra UTC antes de cortar a data, e o Brasil ûˋ UTC-3. Qualquer contagem feita
// entre ~21h e meia-noite (horûÀrio local) cai no dia SEGUINTE em UTC ã uma
// contagem û s 22h30 do dia 17 gravava `data:'2026-07-18'` (errado) junto com
// `hora:'22:30'` (certo, jûÀ que esse campo jûÀ usava horûÀrio local) ã cliente
// reportou o mesmo sintoma no filtro "Hoje" de Contagens ConcluûÙdas, que
// tambûˋm usava esse padrûÈo. `hojeLocalStr`/`localDateStr` usam
// getFullYear/getMonth/getDate (sempre horûÀrio local do navegador, nunca
// UTC) ã substitui todo `new Date().toISOString().slice(0,10)` que tentava
// representar "agora"/"hoje" (nûÈo os que sû° reformatam uma data Jû fixada,
// como o `fmt` de computeTrendRange, que nûÈo sofre desse problema).
function localDateStr(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function hojeLocalStr(){
  return localDateStr(new Date());
}

// Janela por INTERVALO DE DATAS explûÙcito (`dataInicioStr`/`dataFimStr`,
// YYYY-MM-DD) ã troca a antiga janela fixa "û¤ltimas N semanas terminando
// hoje" por algo que o cliente pode apontar pra qualquer perûÙodo (inclusive
// um pedido pontual tipo "me manda marûÏo inteiro"). Sempre gera TODAS as
// semanas entre as duas datas (zero-preenchidas), nûÈo sû° as que tiveram
// contagem ã mesmo raciocûÙnio de antes, sû° que a origem do intervalo agora
// ûˋ escolhida por fora (ver `Dashboard`) em vez de fixa em "hoje".
// `guard` evita um intervalo absurdo (datas invertidas, anos de diferenûÏa)
// gerar um loop gigante ã corta em 300 semanas (~5 anos e meio).
// "Acuracidade Semanal" ûˋ a MûDIA da acuracidade individual de cada item
// contado naquela semana (`itemAcuracidade`, contûÙnua 0-100%) ã nûÈo o %
// binûÀrio de "quantos bateram exato" que o resto do app usa (KPI
// "Acuracidade do Estoque"/Home). Cliente pediu especificamente essa
// definiûÏûÈo pro grûÀfico semanal ("mûˋdia de acuracidade das contagens da
// semana"); os dois convivem no mesmo app porque respondem perguntas
// diferentes ã um ûˋ "taxa de acerto perfeito", o outro ûˋ "o quûÈo perto, em
// mûˋdia, a gente chega". Semana sem NENHUM item com acuracidade calculûÀvel
// vira `acuracidade:null` (nûÈo `0`) ã 0% seria enganoso, pareceria "semana
// pûˋssima" em vez de "sem dado nenhum"; quem desenha o grûÀfico decide como
// representar esse buraco (ver TrendLineChart).
function computeWeeklyStats(counts, dataInicioStr, dataFimStr){
  const buckets = {};
  const ordem = [];
  let cursor = new Date(getWeekInfo(dataInicioStr).key + 'T00:00:00');
  const fimMonday = new Date(getWeekInfo(dataFimStr).key + 'T00:00:00');
  let guard = 0;
  while(cursor <= fimMonday && guard < 300){
    const info = getWeekInfo(cursor.toISOString().slice(0,10));
    if(!buckets[info.key]){
      buckets[info.key] = {key:info.key, label:info.label, sublabel:info.sublabel, total:0, somaAcuracidade:0, comAcuracidade:0};
      ordem.push(info.key);
    }
    cursor.setDate(cursor.getDate()+7);
    guard++;
  }
  counts.forEach(c=>{
    if(!c.data) return;
    const {key} = getWeekInfo(c.data);
    if(!buckets[key]) return; // fora do intervalo escolhido
    buckets[key].total += 1;
    const acc = itemAcuracidade(c);
    if(acc!=null){
      buckets[key].somaAcuracidade += acc;
      buckets[key].comAcuracidade += 1;
    }
  });
  return ordem.map(key=>{
    const w = buckets[key];
    return {
      key:w.key, label:w.label, sublabel:w.sublabel, total:w.total,
      acuracidade: w.comAcuracidade>0 ? (w.somaAcuracidade/w.comAcuracidade)*100 : null,
    };
  });
}

// Mesma ideia de `computeWeeklyStats`, granularidade mensal ã alimenta
// "Acuracidade Mensal". `guard` corta em 120 meses (10 anos).
function computeMonthlyStats(counts, dataInicioStr, dataFimStr){
  const buckets = {};
  const ordem = [];
  let cursor = new Date(dataInicioStr + 'T00:00:00');
  cursor.setDate(1);
  const fim = new Date(dataFimStr + 'T00:00:00');
  fim.setDate(1);
  let guard = 0;
  while(cursor <= fim && guard < 120){
    const info = getMonthInfo(cursor.toISOString().slice(0,10));
    if(!buckets[info.key]){
      buckets[info.key] = {key:info.key, label:info.label, sublabel:info.sublabel, total:0, somaAcuracidade:0, comAcuracidade:0};
      ordem.push(info.key);
    }
    cursor.setMonth(cursor.getMonth()+1);
    guard++;
  }
  counts.forEach(c=>{
    if(!c.data) return;
    const {key} = getMonthInfo(c.data);
    if(!buckets[key]) return;
    buckets[key].total += 1;
    const acc = itemAcuracidade(c);
    if(acc!=null){
      buckets[key].somaAcuracidade += acc;
      buckets[key].comAcuracidade += 1;
    }
  });
  return ordem.map(key=>{
    const w = buckets[key];
    return {
      key:w.key, label:w.label, sublabel:w.sublabel, total:w.total,
      acuracidade: w.comAcuracidade>0 ? (w.somaAcuracidade/w.comAcuracidade)*100 : null,
    };
  });
}

// Gera ticks "redondos" (passo de 1/2/5 û potûˆncia de 10) pro eixo Y ã
// evita um eixo tipo "0, 13, 25, 38, 50" e mostra "0, 15, 30, 45, 60" (ou
// similar) em vez disso. O û¤ltimo tick vira o teto do eixo.
function niceAxisTicks(maxVal, targetTicks){
  if(maxVal<=0) return [0, 10];
  const rawStep = maxVal / targetTicks;
  const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const residual = rawStep / magnitude;
  const niceResidual = residual<=1 ? 1 : residual<=2 ? 2 : residual<=5 ? 5 : 10;
  const step = niceResidual * magnitude;
  const ticks = [0];
  while(ticks[ticks.length-1] < maxVal - 1e-9) ticks.push(ticks[ticks.length-1] + step);
  return ticks;
}

const WEEKLY_CHART_COLOR = '#0D9488'; // mesmo teal jûÀ usado em ARMAZEM_COLORS (Dashboard)

// Meta de acuracidade semanal, confirmada pelo cliente ("meta de 95%") ã
// mesmo tratamento do META_CONTAGENS_SEMANAL: linha de referûˆncia fixa, nûÈo
// mais a mûˋdia das semanas exibidas.
const META_ACURACIDADE_SEMANAL = 95;

function WeeklyLineChart({weeks, meta=META_ACURACIDADE_SEMANAL}){
  const W = 760, H = 220, padL = 34, padR = 30, padT = 34, padB = 40;
  const chartW = W - padL - padR, chartH = H - padT - padB;
  const n = weeks.length;
  const x = i => padL + (n>1 ? (i/(n-1))*chartW : chartW/2);
  const y = v => padT + chartH - (v/100)*chartH;
  // Semanas sem contagem nenhuma tûˆm `acuracidade:null` (ver
  // computeWeeklyStats) ã entram no eixo X (pra manter a janela fixa de
  // `maxWeeks` semanas), mas NûO na linha, que vira um "buraco" em vez de
  // mergulhar pra 0% (0% enganaria, pareceria uma semana ruim em vez de uma
  // semana sem dado nenhum).
  const segmentos = [];
  let atual = [];
  weeks.forEach((w,i)=>{
    if(w.acuracidade!=null) atual.push(i);
    else if(atual.length){ segmentos.push(atual); atual = []; }
  });
  if(atual.length) segmentos.push(atual);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block'}} role="img" aria-label="GrûÀfico de acuracidade semanal">
      {[0,25,50,75,100].map(t=>(
        <g key={t}>
          <line x1={padL} x2={W-padR} y1={y(t)} y2={y(t)} stroke="var(--line)" strokeWidth={1} strokeDasharray="3,3" />
          <text x={padL-8} y={y(t)+3.5} textAnchor="end" fontSize={10} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{t}%</text>
        </g>
      ))}
      {/* Rû°tulo "Meta: X%" saiu do SVG (ver .chart-meta-badge no cabeûÏalho do
          painel, fora do grûÀfico) ã dentro do SVG ele sobrepunha o rû°tulo do
          ponto de dado sempre que a semana mais recente tinha acuracidade
          prû°xima da meta (os dois ficavam no mesmo canto superior direito).
          Fica sû° a linha tracejada de referûˆncia aqui, com tooltip. */}
      <line x1={padL} x2={W-padR} y1={y(meta)} y2={y(meta)} stroke={WEEKLY_CHART_COLOR} strokeWidth={1.5} strokeDasharray="5,4" opacity={0.65}>
        <title>Meta: {meta}%</title>
      </line>
      {segmentos.map((seg,si)=>{
        const pts = seg.map(i=>`${x(i)},${y(weeks[i].acuracidade)}`).join(' ');
        const area = `${x(seg[0])},${y(0)} ${pts} ${x(seg[seg.length-1])},${y(0)}`;
        return (
          <g key={si}>
            <polygon points={area} fill={WEEKLY_CHART_COLOR} opacity={0.12} />
            <polyline points={pts} fill="none" stroke={WEEKLY_CHART_COLOR} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round" />
          </g>
        );
      })}
      {weeks.map((w,i)=>(
        <g key={w.key}>
          {w.acuracidade!=null ? (
            <>
              <circle cx={x(i)} cy={y(w.acuracidade)} r={4} fill={WEEKLY_CHART_COLOR} stroke="var(--panel)" strokeWidth={2}>
                <title>{w.label} ({w.sublabel}): {w.acuracidade.toFixed(1)}% ôñ {w.total} contagem(ns)</title>
              </circle>
              <text x={x(i)} y={y(w.acuracidade)-11} textAnchor="middle" fontSize={11} fontWeight={700} fill="var(--ink)" fontFamily="var(--font-mono)">{Math.round(w.acuracidade)}%</text>
            </>
          ) : (
            <circle cx={x(i)} cy={y(0)} r={2.5} fill="var(--ink-dim)" opacity={0.5}>
              <title>{w.label} ({w.sublabel}): sem contagens</title>
            </circle>
          )}
          <text x={x(i)} y={H-24} textAnchor="middle" fontSize={10} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{w.label}</text>
          <text x={x(i)} y={H-11} textAnchor="middle" fontSize={10} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{w.sublabel}</text>
        </g>
      ))}
    </svg>
  );
}

// Meta semanal de contagem, confirmada pelo cliente ("meta de 250 itens") ã
// linha de referûˆncia fixa no grûÀfico "Contagens na Semana", em vez da
// mûˋdia das semanas exibidas (que mudava a cada janela e nûÈo representava
// nenhum objetivo real). Constante isolada aqui em cima pra ser fûÀcil de
// ajustar se o cliente mudar a meta depois.
const META_CONTAGENS_SEMANAL = 250;

function WeeklyCountChart({weeks, meta=META_CONTAGENS_SEMANAL}){
  const W = 760, H = 220, padL = 34, padR = 30, padT = 34, padB = 40;
  const chartW = W - padL - padR, chartH = H - padT - padB;
  const n = weeks.length;
  const ticks = niceAxisTicks(Math.max(...weeks.map(w=>w.total), meta, 1), 4);
  const maxVal = ticks[ticks.length-1];
  const slot = chartW / n;
  const barW = Math.min(40, slot * 0.5);
  const x = i => padL + i*slot + slot/2;
  const y = v => padT + chartH - (v/maxVal)*chartH;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block'}} role="img" aria-label="GrûÀfico de contagens por semana">
      {ticks.map(t=>(
        <g key={t}>
          <line x1={padL} x2={W-padR} y1={y(t)} y2={y(t)} stroke="var(--line)" strokeWidth={1} strokeDasharray="3,3" />
          <text x={padL-8} y={y(t)+3.5} textAnchor="end" fontSize={10} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{Math.round(t)}</text>
        </g>
      ))}
      <line x1={padL} x2={W-padR} y1={y(meta)} y2={y(meta)} stroke={WEEKLY_CHART_COLOR} strokeWidth={1.5} strokeDasharray="5,4" opacity={0.65}>
        <title>Meta: {meta}</title>
      </line>
      {weeks.map((w,i)=>(
        <g key={w.key}>
          <rect x={x(i)-barW/2} y={y(w.total)} width={barW} height={Math.max(0, y(0)-y(w.total))} rx={4} fill={WEEKLY_CHART_COLOR}>
            <title>{w.label} ({w.sublabel}): {w.total} contagem(ns)</title>
          </rect>
          <text x={x(i)} y={y(w.total)-8} textAnchor="middle" fontSize={11} fontWeight={700} fill="var(--ink)" fontFamily="var(--font-mono)">{w.total}</text>
          <text x={x(i)} y={H-24} textAnchor="middle" fontSize={10} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{w.label}</text>
          <text x={x(i)} y={H-11} textAnchor="middle" fontSize={10} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{w.sublabel}</text>
        </g>
      ))}
    </svg>
  );
}

// "Acuracidade Mensal" virou colunas (era o mesmo WeeklyLineChart de linha,
