const STATUS_LABEL_PADRAO = {
  aprovado_auto: 'OK',
  aprovado_segunda: 'OK',
  aguardando_segunda: 'Recontar',
  aguardando_analise_lider: 'Pendente',
  aprovado_lider: 'Sem Ajuste',
  aguardando_aprovacao_diretoria: 'Pendente',
  ajuste_aprovado_diretoria: 'Ajustado',
};
function statusLabelPadrao(c){
  return STATUS_LABEL_PADRAO[c.statusAprovacao] || '';
}

// "Custo" na planilha do cliente é o valor divergente COM SINAL (diferença ×
// custo unitário) — o app só guarda o valor absoluto em `valorDivergente`
// (ver CountStep.finalize), então recupera o sinal a partir de `diferenca`.
function valorDivergenteComSinal(c){
  const abs = Number(c.valorDivergente || 0);
  if(c.diferenca == null || c.diferenca === 0 || abs === 0) return 0;
  return c.diferenca > 0 ? abs : -abs;
}

// "Acc" na planilha do cliente: acuracidade do ITEM (não do estoque todo),
// max(0, 1 - |diferença|/sistema) — mesma fórmula usada lá, confirmada
// comparando várias linhas da Base_Analise_Contagens_2026.xlsx enviada.
// Sem saldo do sistema pra comparar, não dá pra calcular (retorna '').
function acuracidadeItem(c){
  if(c.saldoSistema == null) return '';
  if(c.saldoSistema === 0) return c.diferenca === 0 ? 1 : 0;
  return Math.max(0, 1 - Math.abs(c.diferenca) / c.saldoSistema);
}

// "Doc" na planilha do cliente é só a própria data reformatada DDMMYY (não
// é um identificador à parte — confirmado comparando as duas colunas linha
// a linha no arquivo original).
function formatDocFromData(dataStr){
  if(!dataStr) return '';
  const [y, m, d] = dataStr.split('-');
  return (d||'') + (m||'') + (y||'').slice(2);
}

function buildSummaryRows(counts, inventories){
  const contados = counts.length;
  // `diferenca!==0` sozinho conta item SEM saldo pra comparar (diferenca:null)
  // como divergente — bug real já corrigido em computeWeeklyStats antes,
  // reproduzido aqui também (achado ao investigar 3 cards de acuracidade
  // mostrando números diferentes). null nunca é divergência de verdade, é
  // ausência de comparação.
  const divergentes = counts.filter(c=>c.diferenca!==0 && c.diferenca!==null);
  const acuracidade = contados>0 ? (((contados-divergentes.length)/contados)*100).toFixed(1) : '100.0';
  const valorDivergente = counts.reduce((s,c)=>s+Number(c.valorDivergente||0),0);
  return [
    {Indicador:'Data do relatório', Valor: new Date().toLocaleString('pt-BR')},
    {Indicador:'Itens contados', Valor: contados},
    {Indicador:'Divergências', Valor: divergentes.length},
    {Indicador:'Acuracidade do estoque (%)', Valor: Number(acuracidade)},
    {Indicador:'Valor total divergente (R$)', Valor: Number(valorDivergente.toFixed(2))},
    {Indicador:'Inventários ativos', Valor: inventories.length},
  ];
}

// Colunas na mesma ordem/nome do padrão que o cliente já usa (aba
// BD_Contagens de Base_Analise_Contagens_2026.xlsx) primeiro — assim ele
// pode colar/importar direto na análise dele sem reformatar — seguidas das
// colunas extras que só o app tem (rastro de operador, rodada, endereço
// realmente contado etc.), que não existem na planilha original.
// "Classe" (ABC) e "SA" (nº de solicitação de ajuste) ficam sempre em
// branco — o app não captura nenhum dos dois no fluxo de contagem hoje
// (decisão consciente, ver CLAUDE.md "Padrão de planilha do cliente");
// "Dias S/ Mov." também fica em branco pelo mesmo motivo — não é salvo
// dentro do objeto `count`, só existe hoje em `estoque_saldo`.
function buildCountRows(counts){
  return counts.map(c=>({
    'Código': c.productCode,
    'Descrição': c.descricao,
    'End': c.endereco,
    'Sistema': c.saldoSistema,
    'Fisico': c.qtdContada,
    'Diferença': c.diferenca,
    'Custo': Number(valorDivergenteComSinal(c).toFixed(2)),
    'Acc': acuracidadeItem(c),
    'Data': c.data,
    'Sem.': c.data ? getWeekInfo(c.data).weekNumber : '',
    'Status': statusLabelPadrao(c),
    'Classe': '',
    'Causa': c.motivo || '',
    'OBS': c.observacao || '',
    'SA': c.solicitacaoAjuste || '',
    'Dias S/ Mov.': '',
    'Doc': formatDocFromData(c.data),
    'ID Contagem': c.id,
    'Inventário': c.inventario,
    'Endereço Contado': c.enderecoContado || '',
    'Rodada': c.numeroContagem || 1,
    'Usuário': c.usuario,
    'Divergência (%)': Number((c.percentual||0).toFixed(2)),
    'Classificação': c.classificacao.label,
    'Status (detalhado)': statusLabel(c),
    'Endereço Pendente Validação': c.enderecoPendenteValidacao ? 'Sim' : 'Não',
    'Hora': c.hora || '',
  }));
}

// Espelha o formato da planilha que o cliente sobe pra gerar a lista de
// contagem (Produto/Descrição/End/Sistema/Fisico, ver
// buildImportTemplateWorkbook) com o resultado já preenchido — "Fisico" traz
// a quantidade contada no app, e "Endereço Contado" traz onde o item foi
// fisicamente encontrado (pode diferir do "End" cadastrado).
function buildPlanilhaPadraoRows(counts){
  return counts.map(c=>({
    'Produto': c.productCode,
    'Descrição': c.descricao,
    'End': c.endereco,
    'Sistema': c.saldoSistema==null ? '' : c.saldoSistema,
    'Fisico': c.qtdContada,
    'Endereço Contado': c.enderecoContado || c.endereco || '',
  }));
}

function buildAdjustmentRows(counts){
  return counts.filter(c=>c.diferenca!==0).map(c=>({
    'Código': c.productCode,
    'Descrição': c.descricao,
    'Endereço': c.endereco,
    'Saldo Sistema (Protheus)': c.saldoSistema,
    'Saldo Contado': c.qtdContada,
    'Ajuste Necessário': c.diferenca,
    'Valor do Ajuste (R$)': Number(c.valorDivergente || 0),
    'Motivo': c.motivo || 'Não informado',
    'Status': statusLabel(c),
    'Aprovado por': c.aprovadoPor || '',
    'Data Aprovação': c.aprovadoEm || '',
  }));
}

function generateReportWorkbook(counts, inventories){
  const XLSX = window.XLSX;
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildSummaryRows(counts, inventories)), 'Resumo');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildCountRows(counts)), 'Contagens');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildPlanilhaPadraoRows(counts)), 'Contar');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildAdjustmentRows(counts)), 'Solicitação de Ajuste');
  return wb;
}

/* ---------------- IMPORTAÇÃO DE LISTA DE CONTAGEM (Excel) ---------------- */

// Modelo alinhado com a planilha real que o cliente já usa para contagem
// (colunas "Produto", "Descrição", "End", "Sistema", "Fisico") — ver
// Cont_13.07.xlsx. "Fisico" fica em branco no modelo: a contagem física é
// feita dentro do app, não escrita à mão na planilha.
const IMPORT_TEMPLATE_COLUMNS = ['Produto', 'Descrição', 'End', 'Sistema', 'Fisico'];

// Aceita variações de acentuação/maiúsculas no cabeçalho da planilha que o
// usuário sobe (ex: "codigo", "CÓDIGO", "Codigo" caem todos em "codigo"), e
// também os dois formatos de coluna já vistos: o nome "cheio" (Código,
// Endereço) e o abreviado usado na planilha real do cliente (Produto, End).
function normalizeHeaderKey(h){
  return String(h||'').normalize('NFD').replace(/[̀-ͯ]/g,'').trim().toLowerCase();
}

const IMPORT_HEADER_MAP = {
  codigo:'codigo',
  produto:'codigo',
  descricao:'descricao',
  endereco:'endereco',
  end:'endereco',
  almoxarifado:'almoxarifado',
  sistema:'saldoSistema',
  saldosistema:'saldoSistema',
  saldo:'saldoSistema',
};

function buildImportTemplateWorkbook(){
  const XLSX = window.XLSX;
  const wb = XLSX.utils.book_new();
  // Exemplo fixo (não amarrado a nenhum produto real/cache — o cache local
  // foi removido, ver CLAUDE.md "cache local removido") — é só ilustrativo,
  // o cliente sempre substitui pelos códigos reais que precisa contar.
  const exemplo = [{
    'Produto': '000.35310',
    'Descrição': 'Exemplo de item',
    'End': '',
    'Sistema': 0,
    'Fisico': '',
  }];
  const ws = XLSX.utils.json_to_sheet(exemplo, {header: IMPORT_TEMPLATE_COLUMNS});
  XLSX.utils.book_append_sheet(wb, ws, 'Contar');
  return wb;
}

// Lê as linhas já convertidas pelo SheetJS (sheet_to_json) e devolve a lista
// de itens válidos (código não vazio, duplicatas removidas mantendo a 1ª
// ocorrência — preserva a ordem original da planilha) mais um resumo para
// exibir antes de confirmar a criação do inventário.
//
// A coluna "Sistema" (saldo do sistema já trazido na própria planilha) é o
// que garante a comparação mesmo pra código sem saldo ainda carregado no
// Supabase (catálogo de 85 mil+ produtos importado, mas `estoque_saldo`
// nem sempre tem linha pra todo código). Quando presente, prevalece sobre o
// saldo vindo do catálogo por ser o dado mais recente que o cliente trouxe.
function parseImportedListRows(rawRows){
  let totalLinhas = 0;
  let semCodigo = 0;
  let duplicadas = 0;
  const vistos = new Set();
  const itens = [];

  rawRows.forEach(row=>{
    totalLinhas++;
    const norm = {};
    Object.keys(row).forEach(k=>{
      const canon = IMPORT_HEADER_MAP[normalizeHeaderKey(k)];
      if(canon) norm[canon] = row[k];
    });
    const codigo = norm.codigo!=null ? String(norm.codigo).trim() : '';
    if(!codigo){ semCodigo++; return; }
    if(vistos.has(codigo)){ duplicadas++; return; }
    vistos.add(codigo);
    let saldoSistema = null;
    if(norm.saldoSistema!=null && String(norm.saldoSistema).trim()!==''){
      const n = Number(String(norm.saldoSistema).replace(',', '.'));
      if(!Number.isNaN(n)) saldoSistema = n;
    }
    itens.push({
      codigo,
      descricao: norm.descricao!=null ? String(norm.descricao).trim() : '',
      endereco: norm.endereco!=null ? String(norm.endereco).trim().toUpperCase() : '',
      almoxarifado: norm.almoxarifado!=null ? String(norm.almoxarifado).trim() : '',
      saldoSistema,
    });
  });

  return {
    itens,
    // naoEncontrados/semSaldoDisponivel entram depois, via
    // computeImportSummaryExtras — dependem de uma busca no Supabase agora
    // (cache local síncrono removido, ver CLAUDE.md "cache local removido").
    resumo: { totalLinhas, validas: itens.length, semCodigo, duplicadas, naoEncontrados: 0, semSaldoDisponivel: 0 },
  };
}

// Completa o resumo pós-parse com quantos códigos não estão no catálogo real
// (Supabase) e, desses, quantos ficam sem saldo pra comparar (a planilha não
// trouxe a coluna "Sistema"). Busca em lote — uma requisição só pra todos os
// códigos da planilha, não uma por linha.
async function computeImportSummaryExtras(itens){
  const codigos = itens.map(it=>it.codigo);
  const catalogo = await fetchProdutosByCodigos(codigos);
  const naoEncontrados = itens.filter(it => !catalogo.has(it.codigo)).length;
  const semSaldoDisponivel = itens.filter(it => !catalogo.has(it.codigo) && it.saldoSistema==null).length;
  return { naoEncontrados, semSaldoDisponivel };
}

/* ---------------- PERSISTÊNCIA (localStorage) ---------------- */
// Primeiro passo pra sair do protótipo 100% em memória: os dados que o app
// gera (usuários, inventários, contagens, endereços propostos, histórico)
// agora sobrevivem a recarregar a página / fechar o navegador NO MESMO
// aparelho. Isso NÃO sincroniza entre tablets/operadores diferentes — cada
// aparelho guarda sua própria cópia local. Pra sincronizar de verdade entre
// aparelhos precisa do backend real (ver backend/schema.sql e README.md).
// STORAGE_VERSION prefixa a chave — se o formato dos dados mudar de um jeito
// incompatível no futuro, basta subir a versão pra ignorar dados antigos em
// vez de o app quebrar tentando ler um formato que não bate mais.
const STORAGE_VERSION = 'v1';

function loadPersisted(key, fallback){
  try{
    const raw = window.localStorage.getItem('stock360:'+STORAGE_VERSION+':'+key);
    if(raw==null) return fallback;
    return JSON.parse(raw);
  } catch(err){
    return fallback;
  }
}

function usePersistedState(key, initialValue){
  const [state, setState] = useState(()=>loadPersisted(key, initialValue));
  useEffect(()=>{
    try{
      window.localStorage.setItem('stock360:'+STORAGE_VERSION+':'+key, JSON.stringify(state));
    } catch(err){
      // localStorage indisponível (modo privado, cota cheia, etc.) — ignora
      // silenciosamente, o app continua funcionando só sem persistir.
    }
  }, [key, state]);
  return [state, setState];
}

const DEFAULT_SESSION_TIMEOUT_MIN = 15; // valor de fábrica, usado se o admin nunca mexer na configuração

// Bug real corrigido aqui — achado ao investigar "Lembrar-me ainda não
// funciona": `lastActivity` fica em localStorage, então sobrevive a fechar
// o navegador (igual "Lembrar-me" pede) — mas o timer de inatividade (logo
// abaixo) usava o tempo decorrido desde essa marca pra decidir se já devia
// deslogar. Resultado: quem marcava "Lembrar-me", fechava o navegador, e
// voltava depois de mais que `sessionTimeoutMin` (15 min por padrão) era
// deslogado NA HORA ao reabrir — mesmo com a sessão do Supabase Auth ainda
// válida — porque o app tratava "o navegador ficou fechado" como se fosse
// "a pessoa ficou parada olhando pra tela logada". `sessionStorage` (ao
// contrário do localStorage) é apagado quando a ABA/JANELA fecha de
// verdade, mas sobrevive a um F5 — exatamente a distinção que faltava:
// aba que já estava aberta (F5) → conta o tempo parado normalmente
// (protege o tablet compartilhado, esquecido logado, que é o objetivo
// original deste timer); aba nova (reabriu o navegador, ou é a primeira
// vez) → reabrir o app é presença de verdade, não inatividade — trata como
// atividade fresca e dá o prazo cheio a partir de agora.
const TAB_ABERTA_KEY = 'stock360:v1:tabAberta';

// "Lembrar-me" — o cliente esclareceu que o pedido real é bem mais simples

// "lembrar usuário" que a maioria dos sites usa). Guarda só o identificador

// migração pro Supabase Auth resolveu, ver CLAUDE.md "Quinto pedaço do

const LOGIN_LEMBRADO_KEY = 'stock360:v1:loginLembrado';

}

function App(){
  // Dados que o app gera ficam salvos no localStorage (ver usePersistedState
  // acima) — sobrevivem a recarregar/fechar o navegador neste aparelho.
  // Navegação (view/flowState) continua só em memória de propósito — cada
  // recarregamento volta pra Home, não faz sentido reabrir no meio de um
  // fluxo de contagem sem o contexto todo. Sessão de login (currentUserId)
  // agora é 100% governada pelo Supabase Auth — `getSession()`/
  // `onAuthStateChange` logo abaixo — e sobrevive a recarregar a página
  // exatamente como antes, só que via sessão real (JWT) em vez do
  // localStorage caseiro. Só expira de verdade por inatividade real (15
  // min, ver efeito mais abaixo) ou logout manual.
  const [users, setUsers] = usePersistedState('users', USERS_SEED);
  const [currentUserId, setCurrentUserId] = useState(null);
  // Evita mostrar a tela de login por uma fração de segundo antes de
  // `getSession()` (assíncrono) resolver se já existe uma sessão válida.
  const [authReady, setAuthReady] = useState(false);
  const [logoutNotice, setLogoutNotice] = useState('');

  useEffect(()=>{
    let cancelled = false;
    supabaseClient.auth.getSession().then(({data:{session}})=>{
      if(cancelled) return;
      setCurrentUserId(session ? session.user.id : null);
      setAuthReady(true);
      sincronizarAuthRealtime(session);
    });
    const { data: sub } = supabaseClient.auth.onAuthStateChange((_event, session)=>{
      setCurrentUserId(session ? session.user.id : null);
      sincronizarAuthRealtime(session);
    });
    return ()=>{ cancelled = true; sub.subscription.unsubscribe(); };
  }, []);

  // Assim que sabemos quem está logado, busca o PRÓPRIO perfil (nome/
  // perfil/status/acessos_extras/ultimo_acesso) — RLS libera essa leitura
  // pra qualquer usuário autenticado sobre a própria linha (ver
  // schema.sql, "leitura própria ou com acesso a usuários"), então isso
  // funciona pra qualquer papel, não só admin. Faz merge (upsert por id) no array
  // `users` em vez de substituir — a sincronização completa (mais abaixo,
  // só pra quem tem acesso à tela "Usuários") pode já ter trazido outras
  // linhas antes disso.
  useEffect(()=>{
    if(!currentUserId) return;
    let cancelled = false;
    supabaseClient.from('usuarios').select('*').eq('id', currentUserId).single().then(({data, error})=>{
      if(cancelled) return;
      if(error || !data){
        // Sem o próprio perfil não dá pra saber perfil/status com segurança
        // — desloga em vez de deixar a tela de "Carregando…" presa pra
        // sempre (ver condição de loading em App(), mais abaixo).
        console.warn('Falha ao buscar o próprio perfil:', error);
        logout('Não foi possível carregar seu perfil. Tente entrar novamente.');
        return;
      }
      const perfil = usuarioRowToLocal(data);
      setUsers(prev=>{
        const semEsse = prev.filter(u=>u.id!==perfil.id);
        return [perfil, ...semEsse];
      });
    });
    return ()=>{ cancelled = true; };
  }, [currentUserId]);

  // Navegação (view/flowState) agora sobrevive a recarregar a página — pedido
  // do cliente, que estava sendo jogado de volta pra Home a cada F5 no meio
  // de uma análise (ex: na tela Indicadores). Mesmo padrão já usado pra
  // sessão de login (Supabase Auth persiste a própria sessão sozinho) e pro
  // resto do estado do app (`usePersistedState`) — `flowState` é sempre um objeto simples (o
  // inventário sendo contado, a contagem original de uma recontagem, etc.),
  // serializa sem problema. `logout()` já força `view:'home'`/
  // `flowState:null` de volta, então isso não "vaza" contexto de um usuário
  // pro próximo login no mesmo aparelho.
  const [view, setView] = usePersistedState('view', 'home');
  const [flowState, setFlowState] = usePersistedState('flowState', null); // params passed into a flow
  // Esconder sidebar (desktop/tablet: começa aberta e empurra o conteúdo; celular
  // <768px: começa fechada, vira painel flutuante — ver CSS ".sidebar" no <style>).
  const [sidebarCollapsed, setSidebarCollapsed] = useState(() => typeof window!=='undefined' && window.innerWidth < 768);

  // Em telas de celular a sidebar é um painel flutuante — fecha sozinha ao navegar,
  // senão ficaria coberta por cima da tela nova. Em telas largas (empurra o conteúdo)
  // não faz sentido fechar sozinha, então só age abaixo de 768px.
  function gotoAndCloseSidebar(id, data){
    goto(id, data);
    if(window.innerWidth < 768) setSidebarCollapsed(true);
  }

  // Chaves 'inventories_v2'/'counts_v2' (em vez de 'inventories'/'counts') —
  // reset geral pedido pelo cliente antes de importar o histórico real da
  // planilha de análise: qualquer aparelho que abrir o app depois desse
  // deploy procura uma chave que não existe mais no localStorage e começa
  // vazio, sem precisar de comando manual em cada tablet. Também removida a
  // seed de 2 inventários fake (INV-001/INV-002, do início do protótipo) —
  // não fazia mais sentido reaparecer num aparelho novo agora que o app usa
  // dado real.
  const [inventories, setInventories] = usePersistedState('inventories_v2', []);

  const [counts, setCounts] = usePersistedState('counts_v2', []); // finalized counts
  // Chave 'enderecosPropostos_v2' (era 'enderecosPropostos') — mesmo reset
  // pedido pelo cliente já aplicado antes a inventários/contagens: esse
  // aparelho ainda tinha propostas de endereço de teste (item tipo "TRAVA
  // ROLO PRESS") sobrando do período de demonstração. Bump de chave zera
  // sozinho em qualquer aparelho que abrir depois deste deploy, sem precisar
  // de comando manual em cada um.
  const [enderecosPropostos, setEnderecosPropostos] = usePersistedState('enderecosPropostos_v2', []); // endereços informados por operadores, aguardando validação do líder
  const [passwordRequests, setPasswordRequests] = usePersistedState('passwordRequests', []); // solicitações de "esqueci minha senha"
  const [passwordHistory, setPasswordHistory] = usePersistedState('passwordHistory', []); // histórico de alterações de senha
  const [reportSendHistory, setReportSendHistory] = usePersistedState('reportSendHistory', []); // histórico de envios de relatório por e-mail
  // Configurações do admin (Configurações → "Visibilidade do Saldo na
  // Contagem" / "Grupos Excluídos da Contagem Automática" / "Tempo de
  // Inatividade") — moravam em `usePersistedState` (localStorage, por
  // aparelho) até esta rodada. Cliente pediu, como regra permanente pra
  // QUALQUER configuração (não só estas 3): "toda alteração que envolvam
  // configuração... reflita em todos os aparelhos de imediato, não quero
  // ter que ficar alterando manualmente em cada aparelho". Migrado pra uma
  // linha única no Supabase (`app_config`, id fixo = 1), sincronizada por
  // Realtime — mesmo padrão já usado pra usuarios/contagens/inventarios/
  // enderecos_propostos (ver backend/schema.sql). Os 3 `useState` abaixo são
  // só o CACHE local — nunca a fonte de verdade — hidratado por
  // `refreshAppConfig()` no login/reconexão e mantido em dia pelo canal
  // Realtime logo abaixo.
  const [operadorVeSaldo, setOperadorVeSaldo] = useState(false);
  // Configuração SEPARADA de `operadorVeSaldo` — pedido explícito do
  // cliente ("a Diretoria não quer que a operação tenha acesso a
  // valores"): controla só as telas de REVISÃO (Recontagens Pendentes/
  // Itens Divergentes), independente de como `operadorVeSaldo` (a
  // visibilidade durante a CONTAGEM em si) estiver configurado — são
  // políticas distintas, não reaproveita a mesma trava.
  const [operadorVeValoresRecontagem, setOperadorVeValoresRecontagem] = useState(false);
  const [gruposExcluidos, setGruposExcluidos] = useState([]);
  const [sessionTimeoutMin, setSessionTimeoutMin] = useState(DEFAULT_SESSION_TIMEOUT_MIN);

  async function refreshAppConfig(){
    const cfg = await fetchAppConfig();
    if(!cfg) return;
    setOperadorVeSaldo(cfg.operadorVeSaldo);
    setOperadorVeValoresRecontagem(cfg.operadorVeValoresRecontagem);
    setGruposExcluidos(cfg.gruposExcluidos);
    setSessionTimeoutMin(cfg.sessionTimeoutMin);
  }

  // Setters assíncronos — aguardam confirmação do Supabase antes de
  // atualizar o cache local (mesmo critério de `approveDivergence`/
  // `deleteInventory`: uma ação de admin precisa de erro visível se falhar,
  // não pode fingir sucesso). O Realtime acima também atualizaria o cache
  // deste mesmo aparelho pouco depois, mas não dá pra depender só dele pro
  // FEEDBACK imediato de quem clicou — daí o `setX(valor)` otimista aqui,
  // assim que `res.ok`.
  async function updateOperadorVeSaldo(v){
    const res = await updateAppConfig({operadorVeSaldo:v}, currentUser?currentUser.nome:null);
    if(res.ok) setOperadorVeSaldo(v);
    return res;
  }
  async function updateOperadorVeValoresRecontagem(v){
    const res = await updateAppConfig({operadorVeValoresRecontagem:v}, currentUser?currentUser.nome:null);
    if(res.ok) setOperadorVeValoresRecontagem(v);
    return res;
  }
  async function updateGruposExcluidos(lista){
    const res = await updateAppConfig({gruposExcluidos:lista}, currentUser?currentUser.nome:null);
    if(res.ok) setGruposExcluidos(lista);
    return res;
  }
  async function updateSessionTimeoutMin(min){
    const res = await updateAppConfig({sessionTimeoutMin:min}, currentUser?currentUser.nome:null);
    if(res.ok) setSessionTimeoutMin(min);
    return res;
  }

  function logReportSend(entry){
    setReportSendHistory(prev=>[entry, ...prev]);
  }

  const currentUser = users.find(u=>u.id===currentUserId) || null;
  const role = currentUser ? currentUser.perfil : null;

  useEffect(()=>{
    if(currentUser) refreshAppConfig();
  }, [currentUser]);
  // Realtime: qualquer admin mudando uma configuração em QUALQUER aparelho
  // atualiza o cache local de TODOS os outros aparelhos logados em poucos
  // segundos, sem precisar de reload nem de esperar um ciclo de polling —
  // exatamente o comportamento pedido. `payload.new` já traz a linha
  // inteira atualizada (é sempre a mesma linha, id=1), então não precisa de
  // merge — só substitui o cache local direto.
  useEffect(()=>{
    if(!supabaseClient || !currentUser) return;
    const channel = supabaseClient
      .channel('realtime:app_config')
      .on('postgres_changes', {event:'*', schema:'public', table:'app_config'}, payload=>{
        if(!payload.new) return;
        setOperadorVeSaldo(!!payload.new.operador_ve_saldo);
        setOperadorVeValoresRecontagem(!!payload.new.operador_ve_valores_recontagem);
        setGruposExcluidos(payload.new.grupos_excluidos || []);
        setSessionTimeoutMin(payload.new.session_timeout_min || DEFAULT_SESSION_TIMEOUT_MIN);
      })
      .subscribe(status=>{ if(status==='SUBSCRIBED') refreshAppConfig(); });
    return ()=>{ supabaseClient.removeChannel(channel); };
  }, [currentUser]);

  // Histórico de navegação — pilha de {view, flowState} visitados, usada só
  // pelo botão "Voltar" do rodapé mobile (ver `MobileNavBar` abaixo).
  // Ephêmero de propósito (useState puro, não `usePersistedState`) — recarregar
  // a página já reinicia a "sessão de navegação" naturalmente, mesmo critério
  // já usado pra `sidebarCollapsed`. Não precisa disso no desktop/tablet largo:
  // lá a Sidebar sempre visível já cobre a navegação.
  const [navHistory, setNavHistory] = useState([]);

  function goto(v, params){
    setNavHistory(prev=>[...prev, {view, flowState}]);
    setFlowState(params||null);
    setView(v);
    window.scrollTo(0,0);
  }

  function voltarUmPasso(){
    setNavHistory(prev=>{
      if(prev.length===0) return prev;
      const anterior = prev[prev.length-1];
      setFlowState(anterior.flowState);
      setView(anterior.view);
      window.scrollTo(0,0);
      return prev.slice(0,-1);
    });
  }

  // A navegação (view) sobrevive a recarregar a página — se o usuário
  // perdeu acesso à tela em que estava (perfil trocado, exceção de acesso
  // removida, ou simplesmente a navegação persistida de antes desta
  // funcionalidade existir ainda aponta pra uma tela hoje restrita, ex.:
  // Indicadores/Relatórios que passaram a exigir líder/admin), volta pra
  // Home em vez de deixar a tela em branco (nenhuma rota bate a condição de
  // acesso, `.content` renderiza vazio).
  useEffect(()=>{
    if(currentUser && ACESSOS_RESTRITOS[view] && !hasAccess(currentUser, view)){
      setView('home');
      setFlowState(null);
    }
  }, [currentUser, view]);

  function addAddressProposal(p){
    const proposta = {...p, id:'END-'+Math.random().toString(36).slice(2,7).toUpperCase(), status:'pendente'};
    setEnderecosPropostos(prev=>[proposta, ...prev]);
    // Fire-and-forget — mesmo padrão de saveContagemToSupabase: o operador
    // não pode travar esperando rede no meio de uma contagem. Se falhar, a
    // proposta continua visível neste aparelho (fonte local já atualizada);
    // só não aparece em outros até o próximo ciclo de sync bem-sucedido.
    saveEnderecoPropostoToSupabase(proposta).then(res=>{
      if(!res.ok) console.warn('Falha ao sincronizar endereço proposto:', res.erro);
    });
  }

  // `counts` muda o tempo todo (cada contagem finalizada), mas o efeito de
  // sincronização (mais abaixo) só quer re-executar quando `currentUser`
  // muda — sem essa ref, o `sync()` capturaria uma versão desatualizada de
  // `counts` presa no closure do momento do login (stale closure clássico
  // de useEffect+setInterval). O ref é só pra LEITURA da fila de retry; toda
  // escrita continua via `setCounts` normal (sempre pega o estado mais
  // recente, independente do closure).
  const countsRef = useRef(counts);
  useEffect(()=>{ countsRef.current = counts; }, [counts]);

  // ---- Sincronização de usuários — só quando há alguém logado com acesso
  // à tela "Usuários" ----
  // Antes desta migração, esse fetch precisava rodar mesmo ANTES do login
  // (senão um usuário excluído em outro aparelho continuava conseguindo
  // logar aqui) — com o Supabase Auth de verdade, login nunca mais confia
  // em cache local (toda tentativa bate direto no Auth), então esse
  // problema não existe mais e o fetch só precisa acontecer pra quem vai
  // de fato USAR a lista (admin, ou quem ganhou a exceção via
  // acessos_extras — ver hasAccess/pode_gerenciar_usuarios no schema.sql,
  // que espelha exatamente essa mesma regra do lado do RLS).
  const podeGerenciarUsuarios = !!(currentUser && hasAccess(currentUser, 'usuarios'));
  // Extraído do useEffect abaixo (que continua rodando a cada 30s) pra
  // também poder ser chamado manualmente logo após criar/editar um usuário —
  // sem isso, o usuário recém-criado só apareceria na lista no próximo ciclo
  // de sincronização (até 30s de espera), dando a falsa impressão de que
  // "não aconteceu nada" ao voltar pra tela de Usuários.
  async function refreshUsuarios(){
    const remoteUsers = await fetchUsuariosFromSupabase();
    if(remoteUsers===null) return;
    setUsers(prev=>mergeByIdComTimestamp(prev, remoteUsers, {timestampField:'atualizadoEm', removeMissing:true}));
  }
  // Sincronização em tempo real (Supabase Realtime) — substitui o polling de
  // 30s que existia aqui antes. Um evento INSERT/UPDATE atualiza só a linha
  // afetada (via `usuarioRowToLocal`, mesmo mapper do fetch); DELETE remove
  // localmente (propaga exclusão feita em outro aparelho, mesmo
  // comportamento que o polling antigo já tinha). O fetch completo
  // (`refreshUsuarios`) só roda quando o canal conecta/reconecta
  // (`status==='SUBSCRIBED'`, dispara na conexão inicial e em toda
  // reconexão automática) — cobre qualquer mudança perdida enquanto o canal
  // estava desconectado, já que o Realtime não garante reentrega de eventos
  // de quando o cliente não estava ouvindo.
  useEffect(()=>{
    if(!supabaseClient || !podeGerenciarUsuarios) return;
    const channel = supabaseClient
      .channel('realtime:usuarios')
      .on('postgres_changes', {event:'*', schema:'public', table:'usuarios'}, payload=>{
        if(payload.eventType==='DELETE'){
          setUsers(prev=>prev.filter(u=>u.id!==payload.old.id));
        } else {
          const row = usuarioRowToLocal(payload.new);
          setUsers(prev=>mergeByIdComTimestamp(prev, [row], {timestampField:'atualizadoEm'}));
        }
      })
      .subscribe(status=>{ if(status==='SUBSCRIBED') refreshUsuarios(); });
    return ()=>{ supabaseClient.removeChannel(channel); };
  }, [podeGerenciarUsuarios]);

  // Reflete `getPendingIncrements().length` (ver index.html perto de
  // incrementContadosSupabase) de forma reativa, só pro indicador visual —
  // a fila em si mora no localStorage, não em estado React.
  const [pendingIncrementsCount, setPendingIncrementsCount] = useState(0);

  // Itens já CONCLUÍDOS na planilha antiga (contagens_historico) — alimenta
  // "Contagens Concluídas" e a Acuracidade do Estoque (Home), ver
  // fetchContagensHistoricoConcluidas. Buscado uma vez por login (não entra
  // no ciclo de sync de 30s — o histórico só muda quando alguém reimporta a
  // planilha em Configurações, não em tempo real) e re-buscado manualmente
  // via `refreshHistoricoConcluidas` logo após uma importação bem-sucedida,
  // pra quem já está logado ver o resultado sem precisar recarregar a página.
  const [historicoConcluidas, setHistoricoConcluidas] = useState([]);
  // Pool mais amplo, só pra "Tendência Semanal" (Dashboard) — inclui
  // "Pendente" (fora de escopo pro resto do app), já que ali o que importa é
  // volume/acuracidade real de contagens feitas, não status de decisão. Ver
  // fetchContagensHistoricoParaTendencia.
  const [historicoParaTendencia, setHistoricoParaTendencia] = useState([]);
  function refreshHistoricoConcluidas(){
    // Retorna a Promise combinada (não só fire-and-forget) — o botão
    // "Atualizar" do painel "Contagens Concluídas" espera essa promise pra
    // saber quando parar de girar o ícone, mesmo padrão já usado pelo
    // "Atualizar" do Dashboard (carregarEstoque).
    return Promise.all([
      fetchContagensHistoricoConcluidas().then(setHistoricoConcluidas),
      fetchContagensHistoricoParaTendencia().then(setHistoricoParaTendencia),
    ]);
  }

  useEffect(()=>{
    if(currentUser) refreshHistoricoConcluidas();
  }, [currentUser]);

  // Ponto único onde toda contagem finalizada entra no estado local E tenta
  // gravar no Supabase — os 5 `onFinish` dos fluxos de contagem (Aleatória,
  // Manual, Rota, Lista Importada, Recontagem) chamam esta função em vez de
  // cada um gravar por conta própria. A contagem aparece na tela IMEDIATAMENTE
  // (sem esperar rede — chão de fábrica não pode travar) com
  // `_syncPendente:true`; quando `saveContagemToSupabase` resolve (rápido, na
  // maioria das vezes), o flag vira `false`. Se falhar (offline etc.), o
  // flag continua `true` e o ciclo de sync de 30s tenta de novo sozinho —
  // ver `sync()` mais abaixo.
  function registerFinishedCount(count){
    setCounts(prev=>[count, ...prev]);
    saveContagemToSupabase(count).then(res=>{
      if(res.ok) setCounts(prev=>prev.map(c=>c.id===count.id ? {...c, _syncPendente:false} : c));
    });
  }

  // Decisão do líder (confirmar/rejeitar) — aguarda confirmação do Supabase
  // antes de mudar a tela, mesmo padrão de approveDivergence: sem isso, um
  // líder decidindo num tablet nunca aparecia nos outros.
  async function resolveAddressProposal(id, status){
    const res = await updateEnderecoPropostoToSupabase(id, status);
    if(res.ok){
      setEnderecosPropostos(prev=>prev.map(e=>e.id===id?{...e, status}:e));
    }
    return res;
  }

  // Decisão do líder — precisa confirmar no Supabase ANTES de mudar a tela
  // (diferente da contagem em si, que continua instantânea/local): é
  // exatamente essa gravação que faz "todo aparelho vê o mesmo histórico"
  // valer de verdade pra aprovação de divergência. Retorna {ok,erro} pra
  // RecountsPanel poder mostrar o erro inline se falhar, sem mudar o card.
  async function approveDivergence(countId){
    const aprovadoPor = currentUser ? currentUser.nome : '—';
    const aprovadoEm = new Date().toLocaleString('pt-BR');
    const res = await updateContagemStatusToSupabase(countId, {
      status_aprovacao: 'aprovado_lider',
      aprovado_por: aprovadoPor,
      aprovado_em: aprovadoEm,
    });
    if(res.ok){
      setCounts(prev=>prev.map(c=>c.id===countId?{...c, statusAprovacao:'aprovado_lider', aprovadoPor, aprovadoEm}:c));
    }
    return res;
  }

  // Encaminha o item pra fila de "Aguardando Segunda Contagem" — não faz a
  // recontagem agora, só libera o item pra qualquer operador pegar depois
  // (mesma fila que já existe, ver RecountsPanel). Diferente do botão
  // "Recontar" (RecountFlow), que é o próprio líder/admin recontando na hora.
  // Mesmo padrão de `approveDivergence`: aguarda confirmação do Supabase
  // antes de mudar o estado local.
  async function requestRecountFromOperator(countId){
    const recontagemSolicitadaPor = currentUser ? currentUser.nome : '—';
    const recontagemSolicitadaEm = new Date().toLocaleString('pt-BR');
    const res = await updateContagemStatusToSupabase(countId, {
      status_aprovacao: 'aguardando_segunda',
      // Marca que essa 2ª contagem existe porque o líder REJEITOU a
      // divergência (não aceitou o resultado) — diferente de um item que
      // caiu em "aguardando_segunda" sozinho pela regra automática da 1ª
      // contagem. RecountsPanel usa isso pra diferenciar o card.
      recontagem_solicitada_pelo_lider: true,
      recontagem_solicitada_por: recontagemSolicitadaPor,
      recontagem_solicitada_em: recontagemSolicitadaEm,
    });
    if(res.ok){
      setCounts(prev=>prev.map(c=>c.id===countId?{
        ...c,
        statusAprovacao:'aguardando_segunda',
        recontagemSolicitadaPeloLider:true,
        recontagemSolicitadaPor,
        recontagemSolicitadaEm,
      }:c));
    }
    return res;
  }

  // ---- Fluxo real de ajuste de estoque da Selgron (SA → Diretoria) ----
  // O líder não finaliza mais uma divergência confirmada sozinho quando decide
  // que precisa mexer no saldo — gera uma SA de Ajuste (número digitado por
  // ele mesmo) e encaminha pra aprovação da Diretoria; só depois da decisão da
  // Diretoria (hoje: manual, feita pelo próprio admin dentro do app) o item
  // conta como resolvido de verdade. "Sem Ajuste Necessário" continua sendo
  // `approveDivergence`, sem passar por nada disso — ver DivergentItemsPanel.

  // Líder gera a SA e encaminha — item sai de "Itens Divergentes" e entra em
  // "Aprovação de Ajustes" (`aguardando_aprovacao_diretoria`, um estado ABERTO
  // como qualquer outro em OPEN_STATUSES).
  async function enviarParaAprovacaoDiretoria(countId, numeroSa){
    const saGeradaPor = currentUser ? currentUser.nome : '—';
    const saGeradaEm = new Date().toLocaleString('pt-BR');
    const res = await updateContagemStatusToSupabase(countId, {
      status_aprovacao: 'aguardando_aprovacao_diretoria',
      numero_sa: numeroSa,
      sa_gerada_por: saGeradaPor,
      sa_gerada_em: saGeradaEm,
    });
    if(res.ok){
      setCounts(prev=>prev.map(c=>c.id===countId?{
        ...c,
        statusAprovacao:'aguardando_aprovacao_diretoria',
        solicitacaoAjuste: numeroSa,
        saGeradaPor,
        saGeradaEm,
      }:c));
    }
    return res;
  }

  // Diretoria aprova — ajuste efetivado, item vira final (aparece em
  // "Contagens Concluídas" como "Ajustado"). Reaproveita `aprovado_por`/
  // `aprovado_em` (mesmas colunas que `approveDivergence` já usa) com o
  // sentido de "quem resolveu essa divergência definitivamente".
  async function aprovarAjusteDiretoria(countId){
    const aprovadoPor = currentUser ? currentUser.nome : '—';
    const aprovadoEm = new Date().toLocaleString('pt-BR');
    const res = await updateContagemStatusToSupabase(countId, {
      status_aprovacao: 'ajuste_aprovado_diretoria',
      aprovado_por: aprovadoPor,
      aprovado_em: aprovadoEm,
    });
    if(res.ok){
      setCounts(prev=>prev.map(c=>c.id===countId?{...c, statusAprovacao:'ajuste_aprovado_diretoria', aprovadoPor, aprovadoEm}:c));
    }
    return res;
  }

  // Diretoria reprova — volta pro MESMO destino de "Solicitar nova contagem"
  // (aguardando_segunda, RecountsPanel), mas com um flag próprio
  // (`reprovadoPelaDiretoria`) pra diferenciar visualmente do card de rejeição
  // do líder — pedido do cliente: precisa ficar "bem destacado" que foi a
  // Diretoria que reprovou, não o líder, pra puxar mais atenção na análise.
  async function reprovarAjusteDiretoria(countId){
    const reprovadoPor = currentUser ? currentUser.nome : '—';
    const reprovadoEm = new Date().toLocaleString('pt-BR');
    const res = await updateContagemStatusToSupabase(countId, {
      status_aprovacao: 'aguardando_segunda',
      reprovado_pela_diretoria: true,
      reprovado_por: reprovadoPor,
      reprovado_em: reprovadoEm,
    });
    if(res.ok){
      setCounts(prev=>prev.map(c=>c.id===countId?{
        ...c,
        statusAprovacao:'aguardando_segunda',
        reprovadoPelaDiretoria:true,
        reprovadoPor,
        reprovadoEm,
      }:c));
    }
    return res;
  }

  // Reverte um item importado do histórico da planilha (status "Ajustado")
  // DIRETO NO SITE, sem editar o arquivo original — pedido do cliente:
  // "tenho itens como Ajustados na planilha que o ajuste foi reprovado...
  // não quero fazer na planilha quero fazer no site". `rawRow` vem de
  // `tip._historicoRaw` (ver historicoRowToCountLike/ConcludedCountsPanel).
  // Ao ter sucesso, insere a divergência reaberta direto no estado local
  // (mesmo padrão de sempre — não espera o próximo ciclo do Realtime pra
  // aparecer em "Itens Divergentes") — se por acaso já existisse uma entrada
  // com esse id (reprovação repetida), substitui em vez de duplicar.
  async function reprovarAjusteHistorico(rawRow){
    const res = await reprovarAjusteHistoricoNaLinha(rawRow);
    if(res.ok && res.seedLocal){
      setCounts(prev=>[res.seedLocal, ...prev.filter(c=>c.id!==res.seedLocal.id)]);
    }
    return res;
  }

  // Marca/desmarca um item pendente (Recontagens/Itens Divergentes) como
  // urgente — líder/admin decidem quais itens furam a ordem normal da fila
  // (as duas telas já ordenam urgentes primeiro, ver `RecountsPanel`/
  // `DivergentItemsPanel`). Mesmo padrão de `approveDivergence`: aguarda
  // confirmação do Supabase (a coluna já sincroniza via Realtime como o
  // resto de `contagens`) antes de atualizar o cache local.
  async function toggleUrgente(countId, urgente){
    const res = await updateContagemStatusToSupabase(countId, {urgente});
    if(res.ok) setCounts(prev=>prev.map(c=>c.id===countId ? {...c, urgente} : c));
    return res;
  }

  // Exclusão de inventário — mesmo padrão: aguarda confirmação do Supabase
  // antes de remover da tela, pra não sumir localmente e "ressuscitar"
  // depois via sincronização se a exclusão remota tiver falhado.
  async function deleteInventory(id){
    const res = await deleteInventarioFromSupabase(id);
    if(res.ok){
      setInventories(prev=>prev.filter(i=>i.id!==id));
    }
    return res;
  }

  // Cancela um inventário em andamento (líder/admin, ação inline em
  // InventoryList) — mantém os itens já contados e descarta só os que ainda
  // estavam em aberto, encerrando o documento como Concluído. Trunca
  // `qtdItens` pro tanto já contado (é isso que faz `inventarioConcluido`
  // considerar o inventário fechado); pros tipos que guardam a própria lista
  // de itens (Lista Importada/Itens Específicos), também trunca
  // `itensImportados` pros primeiros `contados` itens — os demais tipos
  // (Aleatória/Curva ABC/Rota/Grupo) nunca guardaram uma lista própria de
  // itens em aberto (a fila é recalculada por RPC a cada vez, usando
  // `contados` como cursor), então truncar `qtdItens` já é suficiente.
  async function cancelInventory(id){
    const inv = inventories.find(i=>i.id===id);
    if(!inv) return {ok:false, erro:'Inventário não encontrado.'};
    // Sem nenhum item contado ainda não tem o que "manter" — cancelar nesse
    // caso é o mesmo que excluir o documento (senão `qtdItens` zerado nunca
    // bateria a condição `qtdItens>0` de `inventarioConcluido`, e o card
    // ficaria preso pra sempre em "0/0 pendente", sem sair da lista).
    if(inv.contados===0) return deleteInventory(id);
    const patch = {qtd_itens: inv.contados};
    const itensTruncados = inv.itensImportados ? inv.itensImportados.slice(0, inv.contados) : null;
    if(itensTruncados) patch.itens_importados = itensTruncados;
    const res = await updateInventarioToSupabase(id, patch);
    if(res.ok){
      setInventories(prev=>prev.map(i=>i.id===id ? {...i, qtdItens: inv.contados, itensImportados: itensTruncados || i.itensImportados} : i));
    }
    return res;
  }

  // Exclusão definitiva de uma contagem (lançada por engano) — mesmo padrão
  // de `deleteInventory`: aguarda confirmação do Supabase antes de sumir da
  // tela, pra não "ressuscitar" via sincronização se a exclusão remota tiver
  // falhado. Usada por todas as telas que listam contagens individuais
  // (Recontagens, Itens Divergentes, Contagens Concluídas).
  async function deleteCount(id){
    const res = await deleteContagemFromSupabase(id);
    if(res.ok){
      setCounts(prev=>prev.filter(c=>c.id!==id));
    }
    return res;
  }

  function logHistory(usuarioAlvo, acao, administrador){
    setPasswordHistory(prev=>[{
      id:'HIST-'+Math.random().toString(36).slice(2,7).toUpperCase(),
      usuario: usuarioAlvo,
      acao,
      administrador: administrador || '—',
      data: new Date().toLocaleString('pt-BR'),
    }, ...prev]);
  }

  // ---- Autenticação (Supabase Auth de verdade) ----
  // A tela de login aceita "usuário ou e-mail" — como o Supabase Auth só
  // autentica por e-mail, `resolver_login` (RPC, roda no servidor) resolve
  // o identificador digitado pro e-mail real antes de chamar
  // `signInWithPassword`. `currentUserId` não precisa ser setado aqui —
  // `onAuthStateChange` (useEffect acima) já reage à sessão nova sozinho.
  async function attemptLogin(identifier, senha, lembrar=true){
    const id = identifier.trim().toLowerCase();
    const { data: matches, error: rpcErr } = await supabaseClient.rpc('resolver_login', {p_identifier:id});
    const match = matches && matches[0];
    if(rpcErr || !match) return {ok:false, error:'Usuário ou senha inválidos.'};
    if(match.status==='bloqueado') return {ok:false, error:'Usuário bloqueado. Contate o administrador.'};
    if(match.status==='deve_definir_senha') return {ok:false, needsNewPassword:true, userId:match.id};
    const { error } = await supabaseClient.auth.signInWithPassword({email:match.email, password:senha});
    if(error) return {ok:false, error:'Usuário ou senha inválidos.'};
    // "Lembrar-me": guarda (ou esquece) o identificador digitado, nunca a
    // senha — ver comentário perto de `LOGIN_LEMBRADO_KEY`.
    if(lembrar) salvarLoginLembrado(identifier); else limparLoginLembrado();
    touchLastActivity();
    setView('home');
    const agora = new Date().toISOString();
    updateUsuarioToSupabase(match.id, {ultimoAcesso:agora}).then(res=>{
      if(!res.ok) console.warn('Falha ao registrar último acesso:', res.erro);
    });
    return {ok:true};
  }

  async function logout(notice){
    await supabaseClient.auth.signOut();
    clearLastActivity();
    setView('home');
    setFlowState(null);
    setNavHistory([]);
    setLogoutNotice(notice || '');
  }

  function requestPasswordReset(identifier){
    const id = identifier.trim().toLowerCase();
    const user = users.find(u => u.usuario.toLowerCase()===id || (u.email && u.email.toLowerCase()===id));
    if(user){
      setPasswordRequests(prev=>[{
        id:'REQ-'+Math.random().toString(36).slice(2,7).toUpperCase(),
        userId:user.id, usuarioNome:user.nome, data:new Date().toLocaleString('pt-BR'), status:'pendente',
      }, ...prev]);
    }
    // Mensagem genérica sempre — evita confirmar/negar se o usuário existe (boa prática de segurança)
    return 'Se o usuário existir, uma solicitação foi enviada para aprovação do administrador.';
  }

  async function resolvePasswordRequest(reqId, acao, novaSenhaDigitada){
    const req = passwordRequests.find(r=>r.id===reqId);
    if(!req) return {ok:false, erro:'Solicitação não encontrada.'};
    const res = await applyAdminPasswordAction(req.userId, acao, novaSenhaDigitada);
    if(res.ok){
      setPasswordRequests(prev=>prev.map(r=>r.id===reqId?{...r, status:'resolvido'}:r));
    }
    return res;
  }

  // Todas as ações abaixo passam pela Edge Function `usuarios-admin`
  // (service role, só ela consegue mexer em `auth.users`) — nunca mais
  // escrevem direto na tabela `usuarios`. Só atualizam o estado local
  // depois de confirmar que a Edge Function respondeu `ok` — mesmo padrão
  // já usado em `approveDivergence`/`deleteInventory`.
  async function applyAdminPasswordAction(userId, acao, novaSenhaDigitada){
    const target = users.find(u=>u.id===userId);
    if(!target || !currentUser) return {ok:false, erro:'Usuário não encontrado.'};
    if(acao!=='temp' && acao!=='definir' && acao!=='liberar') return {ok:false, erro:'Ação inválida.'};
    const res = await chamarUsuariosAdmin('definir_senha', {userId, modo:acao, novaSenha:novaSenhaDigitada});
    if(res.ok){
      const novoStatus = acao==='liberar' ? 'deve_definir_senha' : 'ativo';
      setUsers(prev=>prev.map(u=>u.id===userId?{...u, status:novoStatus}:u));
      const acaoLabel = acao==='temp' ? `Senha temporária gerada (${res.senhaTemporaria}) — repassar ao usuário`
        : acao==='definir' ? 'Nova senha definida pelo administrador'
        : 'Usuário liberado para criar nova senha';
      logHistory(target.nome, acaoLabel, currentUser.nome);
    }
    return res;
  }

  // Chamado pela tela "Nova senha" (usuário liberado pelo admin definindo a
  // própria senha) — não exige admin logado (a própria Edge Function trata
  // esse caso sem checar JWT, ver `auto_definir_senha`).
  //
  // NÃO tenta logar automaticamente depois de salvar — antes tentava
  // (`signInWithPassword` na hora), mas `target` (o registro local do
  // usuário, usado só pra pegar o e-mail) normalmente é `undefined` no
  // aparelho do OPERADOR: a sincronização completa de `users` só roda pra
  // quem já está logado E tem acesso à tela "Usuários" (ver seção
  // "Quarto pedaço do backend real" no CLAUDE.md) — um operador nunca tem
  // isso, então o aparelho dele geralmente nunca teve `users` carregado
  // antes do primeiro login. Sem `target`, o login automático era pulado
  // em silêncio (sem erro, sem navegar) — a tela "Nova senha" ficava
  // parada, sem feedback nenhum, e se o usuário clicasse "Definir senha e
  // entrar" de novo, a 2ª chamada batia num status que já tinha virado
  // 'ativo' na 1ª tentativa e voltava "Esta conta não está liberada para
  // definir uma nova senha" — confuso, já que a senha TINHA sido salva.
  // Agora só salva a senha e devolve `{ok:true}` — `LoginScreen` volta pra
  // tela de login normal com um aviso de sucesso, e o usuário loga de
  // verdade por ali (fluxo simples e sem essa dependência frágil).
  async function selfSetNewPassword(userId, novaSenha){
    const target = users.find(u=>u.id===userId);
    const res = await chamarUsuariosAdmin('auto_definir_senha', {userId, novaSenha});
    if(res.ok && target){
      setUsers(prev=>prev.map(u=>u.id===userId?{...u, status:'ativo'}:u));
      logHistory(target.nome, 'Senha definida pelo próprio usuário', '—');
    }
    return res;
  }

  async function createUser(data){
    const res = await chamarUsuariosAdmin('criar_usuario', data);
    // Busca a lista de novo na hora (em vez de esperar o próximo ciclo de
    // 30s) — sem isso, o usuário recém-criado só aparece na tela de
    // Usuários depois de até 30s, dando a impressão de que nada aconteceu.
    if(res.ok) await refreshUsuarios();
    return res;
  }

  async function updateUser(userId, data){
    const res = await chamarUsuariosAdmin('atualizar_usuario', {userId, ...data});
    if(res.ok){
      setUsers(prev=>prev.map(u=>u.id===userId?{...u, ...data}:u));
    }
    return res;
  }

  async function toggleUserStatus(userId){
    const target = users.find(u=>u.id===userId);
    if(!target) return {ok:false, erro:'Usuário não encontrado.'};
    const res = await chamarUsuariosAdmin('alternar_bloqueio', {userId});
    if(res.ok){
      setUsers(prev=>prev.map(u=>u.id===userId?{...u, status:res.status}:u));
      logHistory(target.nome, res.status==='bloqueado' ? 'Usuário bloqueado' : 'Usuário desbloqueado', currentUser?currentUser.nome:'—');
    }
    return res;
  }

  async function deleteUser(userId){
    const target = users.find(u=>u.id===userId);
    if(!target || userId===currentUserId) return {ok:false, erro:'Não é possível excluir este usuário.'};
    const res = await chamarUsuariosAdmin('excluir_usuario', {userId});
    if(res.ok){
      setUsers(prev=>prev.filter(u=>u.id!==userId));
      logHistory(target.nome, 'Usuário excluído', currentUser?currentUser.nome:'—');
    }
    return res;
  }

  // ---- Logout automático por inatividade ----
  // O Supabase Auth não tem timeout de inatividade nativo, então essa
  // camada segue por cima da sessão real.
  useEffect(()=>{
    if(!currentUser) return;
    // Minutos configurados pelo admin (Configurações → "Tempo de
    // Inatividade") — cai pro padrão de fábrica se por algum motivo vier
    // vazio/inválido do localStorage (ex.: campo zerado sem querer).
    const timeoutMs = (Number(sessionTimeoutMin) > 0 ? Number(sessionTimeoutMin) : DEFAULT_SESSION_TIMEOUT_MIN) * 60 * 1000;
    // `sessionStorage` sobrevive a um F5 mas é apagado quando a ABA/JANELA
    // fecha de verdade — é exatamente essa distinção que separa os dois
    // cenários (ver comentário perto de `TAB_ABERTA_KEY`, acima):
    let jaDecorrido = 0;
    try{
      const abaJaEstavaAberta = sessionStorage.getItem(TAB_ABERTA_KEY)==='1';
      if(abaJaEstavaAberta){
        // F5/remontagem dentro da MESMA aba — usa o tempo real decorrido
        // desde a última atividade (protege o tablet compartilhado
        // esquecido logado, que é o motivo deste timer existir).
        const ultimaAtividade = loadLastActivity();
        jaDecorrido = ultimaAtividade ? (Date.now() - ultimaAtividade) : 0;
      } else {
        // Aba nova — reabriu o navegador (com "Lembrar-me" marcado) ou é a
        // primeira vez nesta aba. Reabrir o app é presença de verdade, não
        // inatividade acumulada enquanto estava fechado — trata como
        // atividade fresca (prazo cheio a partir de agora), senão quem
        // marca "Lembrar-me" e volta depois de mais de `sessionTimeoutMin`
        // seria deslogado NA HORA ao reabrir, mesmo com a sessão do
        // Supabase Auth ainda válida.
        touchLastActivity();
        sessionStorage.setItem(TAB_ABERTA_KEY, '1');
      }
    }catch(err){}
    let timer = setTimeout(()=>logout('Sessão encerrada por inatividade.'), Math.max(0, timeoutMs - jaDecorrido));
    function resetTimer(){
      clearTimeout(timer);
      touchLastActivity();
      timer = setTimeout(()=>logout('Sessão encerrada por inatividade.'), timeoutMs);
    }
    const events = ['click','keydown','touchstart','mousemove'];
    events.forEach(ev=>window.addEventListener(ev, resetTimer));
    return ()=>{ clearTimeout(timer); events.forEach(ev=>window.removeEventListener(ev, resetTimer)); };
  }, [currentUser, sessionTimeoutMin]);

  // ---- Sincronização de inventários/contagens com o Supabase ----
  // localStorage continua sendo a fonte imediata (mostra na hora o que o
  // próprio aparelho fez) — os dois efeitos abaixo cobrem duas coisas
  // DIFERENTES: este primeiro é só a fila de retry de GRAVAÇÕES que
  // falharam; o segundo (logo abaixo) é a sincronização de LEITURA com
  // outros aparelhos, agora via Realtime em vez de polling.
  //
  // Fila de retry de GRAVAÇÕES que falharam — contagens marcadas
  // `_syncPendente` (ver registerFinishedCount) e incrementos de inventário
  // que falharam antes (ver getPendingIncrements/incrementContadosSupabase).
  // Independente da sincronização de LEITURA logo abaixo (que agora é via
  // Realtime, não polling) — é o que garante que um aparelho que ficou
  // offline no meio de uma contagem sincroniza sozinho assim que a rede
  // voltar, sem precisar ninguém abrir aquele tablet especificamente.
  useEffect(()=>{
    if(!currentUser || !supabaseClient) return;
    let cancelled = false;
    async function retry(){
      const contagensPendentes = countsRef.current.filter(c=>c._syncPendente);
      for(const c of contagensPendentes){
        if(cancelled) return;
        const res = await saveContagemToSupabase(c);
        if(res.ok) setCounts(prev=>prev.map(x=>x.id===c.id ? {...x, _syncPendente:false} : x));
      }
      const incrementosPendentes = getPendingIncrements();
      for(const invId of incrementosPendentes){
        if(cancelled) return;
        await incrementContadosSupabase(invId); // já cuida de add/remove da fila sozinho
      }
      if(!cancelled) setPendingIncrementsCount(getPendingIncrements().length);
    }
    retry();
    const interval = setInterval(retry, 30000);
    return ()=>{ cancelled = true; clearInterval(interval); };
  }, [currentUser]);

  // ---- Sincronização em tempo real (Supabase Realtime) — contagens,
  // inventários e endereços propostos ----
  // Substitui o polling de 30s que existia aqui antes (o cliente confirmou
  // que prefere sincronização instantânea entre aparelhos, aceitando que o
  // app dependa de conexão pro caso comum — ver CLAUDE.md). Cada canal
  // recebe um evento assim que OUTRO aparelho grava/atualiza/exclui uma
  // linha — não precisa mais esperar até 30s pra um tablet ver o progresso
  // de outro no mesmo inventário. `users` tem seu próprio canal
  // independente (ver useEffect logo acima de `countsRef`).
  //
  // Cada canal aplica a MESMA regra de merge que o polling antigo já
  // usava: contagens/endereços por `atualizadoEm` (`mergeByIdComTimestamp`),
  // inventários por `contados >= local.contados` (não tem coluna de
  // timestamp, então mantém a lógica própria). DELETE remove localmente
  // (contagens/inventários podem ser excluídos — deleteCount/
  // deleteInventory; endereços propostos nunca são deletados, só mudam de
  // status, então não trata DELETE ali).
  //
  // Um evento isolado do Realtime só atualiza a LINHA daquele evento — o
  // fetch completo (mesma reconciliação de sempre) só roda quando cada
  // canal conecta/reconecta (`status==='SUBSCRIBED'`, dispara na conexão
  // inicial e em toda reconexão automática), pra cobrir qualquer mudança
  // perdida enquanto o canal estava desconectado (o Realtime não garante
  // reentrega de eventos de quando o cliente não estava ouvindo).
  useEffect(()=>{
    if(!currentUser || !supabaseClient) return;

    const canalContagens = supabaseClient
      .channel('realtime:contagens')
      .on('postgres_changes', {event:'*', schema:'public', table:'contagens'}, payload=>{
        if(payload.eventType==='DELETE'){
          setCounts(prev=>prev.filter(c=>c.id!==payload.old.id));
        } else {
          const row = contagemRowToLocal(payload.new);
          setCounts(prev=>mergeByIdComTimestamp(prev, [row], {timestampField:'atualizadoEm'}));
        }
      })
      .subscribe(status=>{
        if(status!=='SUBSCRIBED') return;
        fetchContagensFromSupabase().then(remote=>{
          if(remote.length) setCounts(prev=>mergeByIdComTimestamp(prev, remote, {timestampField:'atualizadoEm'}));
        });
      });

    const canalInventarios = supabaseClient
      .channel('realtime:inventarios')
      .on('postgres_changes', {event:'*', schema:'public', table:'inventarios'}, payload=>{
        if(payload.eventType==='DELETE'){
          setInventories(prev=>prev.filter(i=>i.id!==payload.old.id));
        } else {
          const row = inventarioRowToLocal(payload.new);
          setInventories(prev=>{
            const byId = new Map(prev.map(i=>[i.id, i]));
            const local = byId.get(row.id);
            if(!local || row.contados >= local.contados) byId.set(row.id, {...local, ...row});
            return Array.from(byId.values());
          });
        }
      })
      .subscribe(status=>{
        if(status!=='SUBSCRIBED') return;
        fetchInventoriesFromSupabase().then(remoteInv=>{
          if(remoteInv===null) return;
          setInventories(prev=>{
            const remoteIds = new Set(remoteInv.map(i=>i.id));
            const byId = new Map(prev.map(i=>[i.id, i]));
            remoteInv.forEach(ri=>{
              const local = byId.get(ri.id);
              if(!local || ri.contados >= local.contados) byId.set(ri.id, {...local, ...ri});
            });
            return Array.from(byId.values()).filter(i=>remoteIds.has(i.id));
          });
        });
      });

    const canalEnderecos = supabaseClient
      .channel('realtime:enderecos_propostos')
      .on('postgres_changes', {event:'*', schema:'public', table:'enderecos_propostos'}, payload=>{
        const row = enderecoPropostoRowToLocal(payload.new);
        setEnderecosPropostos(prev=>mergeByIdComTimestamp(prev, [row], {timestampField:'atualizadoEm'}));
      })
      .subscribe(status=>{
        if(status!=='SUBSCRIBED') return;
        fetchEnderecosPropostosFromSupabase().then(remote=>{
          if(remote.length) setEnderecosPropostos(prev=>mergeByIdComTimestamp(prev, remote, {timestampField:'atualizadoEm'}));
        });
      });

    return ()=>{
      supabaseClient.removeChannel(canalContagens);
      supabaseClient.removeChannel(canalInventarios);
      supabaseClient.removeChannel(canalEnderecos);
    };
  }, [currentUser]);

  // Evita mostrar a tela de login por uma fração de segundo pra quem já tem
  // sessão válida — `getSession()` é assíncrono (ver useEffect acima), então
  // sem essa checagem o primeiro render sempre cairia em "não logado" antes
  // de saber a resposta de verdade. Também espera o fetch do PRÓPRIO perfil
  // terminar quando já existe uma sessão (`currentUserId` setado mas
  // `currentUser` ainda não resolveu em `users`) — se esse fetch falhar de
  // vez, o efeito acima já desloga sozinho, então isso nunca fica preso.
  if(!authReady || (currentUserId && !currentUser)){
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--bg)',color:'var(--ink-dim)',fontFamily:'var(--font-body)',fontSize:14}}>
        Carregando…
      </div>
    );
  }

  if(!currentUser){
    return (
      <LoginScreen
        onLogin={attemptLogin}
        onForgot={requestPasswordReset}
        onSelfSetPassword={selfSetNewPassword}
        notice={logoutNotice}
        clearNotice={()=>setLogoutNotice('')}
      />
    );
  }

  return (
    <div className="app">
      <Sidebar view={view} goto={gotoAndCloseSidebar} role={role} user={currentUser} collapsed={sidebarCollapsed} pendingSync={counts.filter(c=>c._syncPendente).length + pendingIncrementsCount} />
      <div className={"sidebar-backdrop"+(sidebarCollapsed?'':' visible')} onClick={()=>setSidebarCollapsed(true)}></div>
      <button
        className={"sidebar-toggle"+(sidebarCollapsed?' collapsed':'')}
        onClick={()=>setSidebarCollapsed(c=>!c)}
        title={sidebarCollapsed?'Mostrar menu':'Esconder menu'}
      >
        <DIcon name={sidebarCollapsed?'chevronRight':'chevronLeft'} size={14} />
      </button>
      <MobileNavBar onHome={()=>goto('home')} onVoltar={voltarUmPasso} podeVoltar={navHistory.length>0} />
      <div className="app-main">
      {!COUNT_SCREEN_VIEWS.includes(view) && (
        <>
          <TopBar user={currentUser} role={role} onHome={()=>goto('home')} onLogout={()=>logout('')} />
          <DesktopTopbar
            view={view}
            user={currentUser}
            role={role}
            onLogout={()=>logout('')}
            subtitle={VIEW_SUBTITLES[view]}
          />
        </>
      )}
      {view!=='home' && !COUNT_SCREEN_VIEWS.includes(view) && <SubBar view={view} goto={goto} />}
      <div className="content">
        {view==='home' && <Home role={role} user={currentUser} inventories={inventories} counts={counts} historicoConcluidas={historicoConcluidas} enderecosPropostos={enderecosPropostos} goto={goto} />}
        {view==='inventories' && <InventoryList inventories={inventories} goto={goto} role={role} counts={counts} onDelete={deleteInventory} onCancel={cancelInventory} />}
        {view==='pickCountType' && <PickCountType role={role} goto={goto} inventories={inventories} gruposExcluidos={gruposExcluidos} onCreate={async(inv)=>{
          const res = await saveInventarioToSupabase(inv);
          if(res.ok){ setInventories(prev=>[inv,...prev]); goto('inventories'); }
          return res;
        }} />}
        {view==='randomCount' && <RandomCountFlow inv={flowState} user={currentUser} counts={counts} onRegisterCount={registerFinishedCount} onFinish={()=>goto('inventories')} onAddressProposed={addAddressProposal} setInventories={setInventories} operadorVeSaldo={operadorVeSaldo} gruposExcluidos={gruposExcluidos} />}
        {view==='manualCount' && <ManualCountFlow user={currentUser} counts={counts} onFinish={(c)=>{registerFinishedCount(c); goto('home');}} onAddressProposed={addAddressProposal} operadorVeSaldo={operadorVeSaldo} />}
        {view==='routeCount' && <RouteCountFlow inv={flowState} user={currentUser} counts={counts} onRegisterCount={registerFinishedCount} onFinish={()=>goto('inventories')} onAddressProposed={addAddressProposal} setInventories={setInventories} operadorVeSaldo={operadorVeSaldo} gruposExcluidos={gruposExcluidos} />}
        {view==='importedListCount' && <ImportedListCountFlow inv={flowState} user={currentUser} counts={counts} onRegisterCount={registerFinishedCount} onFinish={()=>goto('inventories')} onAddressProposed={addAddressProposal} setInventories={setInventories} operadorVeSaldo={operadorVeSaldo} />}
        {view==='recounts' && <RecountsPanel counts={counts} inventories={inventories} role={role} goto={goto} onDeleteCount={role==='admin' ? deleteCount : undefined} onToggleUrgente={toggleUrgente} operadorVeValoresRecontagem={operadorVeValoresRecontagem} />}
        {view==='divergentes' && <DivergentItemsPanel counts={counts} inventories={inventories} role={role} goto={goto} onApprove={approveDivergence} onSendToDiretoria={enviarParaAprovacaoDiretoria} onRequestRecount={requestRecountFromOperator} onDeleteCount={role==='admin' ? deleteCount : undefined} onToggleUrgente={toggleUrgente} />}
        {view==='aprovacaoDiretoria' && (role==='lider'||role==='admin') && <DiretoriaApprovalPanel counts={counts} inventories={inventories} role={role} onApproveSA={aprovarAjusteDiretoria} onRejectSA={reprovarAjusteDiretoria} />}
        {view==='todasDivergencias' && <AllDivergencesPanel counts={counts} historicoConcluidas={historicoConcluidas} goto={goto} />}
        {view==='concluidas' && <ConcludedCountsPanel counts={counts} inventories={inventories} historicoConcluidas={historicoConcluidas} onDeleteCount={role==='admin' ? deleteCount : undefined} onReprovarAjusteHistorico={role==='admin' ? reprovarAjusteHistorico : undefined} onRefresh={refreshHistoricoConcluidas} />}
        {view==='recount' && flowState && <RecountFlow original={flowState} user={currentUser} onAddressProposed={addAddressProposal} onFinish={(c)=>{registerFinishedCount(c); goto('recounts');}} operadorVeSaldo={operadorVeSaldo} />}
        {view==='dashboard' && hasAccess(currentUser,'dashboard') && <Dashboard counts={counts} inventories={inventories} historicoConcluidas={historicoConcluidas} historicoParaTendencia={historicoParaTendencia} goto={goto} />}
        {view==='relatorios' && hasAccess(currentUser,'relatorios') && <ReportsScreen counts={counts} inventories={inventories} currentUser={currentUser} sendHistory={reportSendHistory} onLogSend={logReportSend} role={role} onHistoricoImportado={refreshHistoricoConcluidas} />}
        {view==='settings' && <Settings role={role} currentUser={currentUser} operadorVeSaldo={operadorVeSaldo} onSetOperadorVeSaldo={updateOperadorVeSaldo} operadorVeValoresRecontagem={operadorVeValoresRecontagem} onSetOperadorVeValoresRecontagem={updateOperadorVeValoresRecontagem} gruposExcluidos={gruposExcluidos} onSetGruposExcluidos={updateGruposExcluidos} sessionTimeoutMin={sessionTimeoutMin} onSetSessionTimeoutMin={updateSessionTimeoutMin} />}
        {view==='usuarios' && hasAccess(currentUser,'usuarios') && (
          <UsuariosScreen
            users={users}
            currentUser={currentUser}
            goto={goto}
            successMessage={flowState && flowState.successMessage}
            onToggleUserStatus={toggleUserStatus}
            onDeleteUser={deleteUser}
            onAdminPasswordAction={applyAdminPasswordAction}
            passwordRequests={passwordRequests}
            onResolvePasswordRequest={resolvePasswordRequest}
            passwordHistory={passwordHistory}
          />
        )}
        {view==='enderecos' && hasAccess(currentUser,'enderecos') && (
          <AddressValidationPanel enderecosPropostos={enderecosPropostos} onResolve={resolveAddressProposal} />
        )}
        {view==='userForm' && hasAccess(currentUser,'usuarios') && flowState && (
          <UserForm
            mode={flowState.mode}
            initialData={flowState.initialData}
            users={users}
            onCreateUser={createUser}
            onUpdateUser={updateUser}
            onSaved={(msg)=>goto('usuarios', msg ? {successMessage:msg} : null)}
            onCancel={()=>goto('usuarios')}
          />
        )}
      </div>
      <BottomNav view={view} goto={goto} role={role} />
      </div>
    </div>
  );
}

// explícito que é a composição INTEIRA da tela (logo, título, subtítulo,
// cena do armazém, dispositivos, benefícios — tudo já dentro da imagem) e
// pediu pra usar exatamente como está, "não precisa alterar ou acrescentar

// tentativas anteriores, imagem como bloco de conteúdo e depois como fundo
// com logo/título sobrepostos, foram as duas rejeitadas). `.login-brand`

// leitor de tela perderia essa informação inteira sem um texto alternativo
// que resuma o que está escrito nela. `onError` continua como salvaguarda.
function BrandIllustration(){
  return (
    <img
      className="login-brand-img"
      src="images/login-illustration.png"
      alt="Selgron Gestão de Estoques — central de controles, inventários e indicadores. Ilustração de um armazém com prateleiras, empilhadeira, notebook e celular exibindo indicadores do sistema. Seguro: seus dados protegidos. Inteligente: indicadores para decisões rápidas. Eficiente: processos otimizados."

}

function LoginScreen({onLogin, onForgot, onSelfSetPassword, notice, clearNotice}){
  const [mode, setMode] = useState('login'); // login | forgot | newPassword
  // "Lembrar-me": mantém só o campo "Usuário ou e-mail" preenchido da
  // próxima vez (nunca a senha, ver `LOGIN_LEMBRADO_KEY`/`attemptLogin`) —
  // se já existe um identificador lembrado de um login anterior, o campo já
  // abre preenchido com ele e o checkbox já abre marcado (reflete o que
  // está de fato acontecendo); senão, os dois começam vazios/desmarcados.
  const [identifier, setIdentifier] = useState(()=>carregarLoginLembrado());
  const [lembrar, setLembrar] = useState(()=>!!carregarLoginLembrado());
  const [senha, setSenha] = useState('');
  const [showSenha, setShowSenha] = useState(false);
  const [error, setError] = useState('');
  const [forgotMsg, setForgotMsg] = useState('');
  // Mostrado na tela de login normal depois que "Nova senha" salva com
  // sucesso — não tenta mais logar automaticamente (ver comentário em
  // `selfSetNewPassword`), então precisa deixar claro que a senha JÁ foi
  // salva e o próximo passo é logar com ela.
  const [successMsg, setSuccessMsg] = useState('');
  const [pendingUserId, setPendingUserId] = useState(null);
  const [novaSenha, setNovaSenha] = useState('');
  const [confirmaSenha, setConfirmaSenha] = useState('');
  const [salvandoSenha, setSalvandoSenha] = useState(false);
  // Login agora é uma chamada de rede de verdade (Supabase Auth) em vez de
  // uma checagem local instantânea — precisa de um estado de "enviando"
  // pra desabilitar o botão e não deixar dois cliques dispararem duas
  // tentativas de login em paralelo.
  const [salvandoLogin, setSalvandoLogin] = useState(false);
  // Os outros dois toggles do formulário continuam puramente visuais
  // (mockup do cliente pede, mas sem funcionalidade real — ver CLAUDE.md
  // "Login vira redesign premium"): o seletor de idioma não faz nada porque
  // o app só existe em pt-BR; "código de acesso" mostra uma nota honesta em
  // vez de fingir um QR-login que não existe (mesmo critério do sino de
  // notificação no DesktopTopbar).
  const [qrNote, setQrNote] = useState(false);
  const senhaRef = useRef(null);

  // Enter no campo "Usuário ou e-mail" pula pro campo "Senha" em vez de
  // tentar logar direto (o formulário só tem os dois campos, então Enter
  // dentro de um <form> submeteria — tinha que apertar Enter DUAS vezes,
  // uma pra "confirmar" o usuário sem querer e outra pra logar de verdade).
  // Só o campo de senha aciona o submit normal do form.
  function handleIdentifierKeyDown(e){
    if(e.key==='Enter'){
      e.preventDefault();
      senhaRef.current && senhaRef.current.focus();
    }
  }

  // Cliente reportou que, no celular, tocar num campo pra digitar exige
  // arrastar a tela manualmente pra ver o que está escrevendo — o teclado
  // virtual cobre o campo e o navegador não rola sozinho até ele (a tela de
  // login é mais alta que a viewport visível quando o teclado abre, já que
  // a ilustração ocupa bastante espaço). Delegado num único handler no
  // container (React propaga foco/blur como qualquer evento) em vez de
  // repetir em cada <input> — cobre os 3 modos (login/esqueci senha/nova
  // senha) de uma vez, inclusive se um campo novo for adicionado depois.
  // O atraso dá tempo da animação do teclado começar antes de rolar —
  // rolar cedo demais rola pra posição errada (calculada com o teclado
  // ainda fechado).
  function scrollCampoFocadoParaVisivel(e){
    if(!e.target || e.target.tagName!=='INPUT') return;
    const el = e.target;
    setTimeout(()=>{ el.scrollIntoView({behavior:'smooth', block:'center'}); }, 300);
  }

  async function submitLogin(e){
    e.preventDefault();
    setError('');
    setSuccessMsg('');
    setSalvandoLogin(true);
    const result = await onLogin(identifier, senha, lembrar);
    setSalvandoLogin(false);
    if(!result.ok){
      if(result.needsNewPassword){
        setPendingUserId(result.userId);
        setMode('newPassword');
      } else {
        setError(result.error);
      }
    }
  }

  function submitForgot(e){
    e.preventDefault();
    const msg = onForgot(identifier);
    setForgotMsg(msg);
  }

  async function submitNewPassword(e){
    e.preventDefault();
    setError('');
    if(novaSenha.length < 6){ setError('A nova senha deve ter pelo menos 6 caracteres.'); return; }
    if(novaSenha !== confirmaSenha){ setError('As senhas não coincidem.'); return; }
    setSalvandoSenha(true);
    const res = await onSelfSetPassword(pendingUserId, novaSenha);
    setSalvandoSenha(false);
    if(res && res.ok){
      // Senha salva — volta pra tela de login normal em vez de tentar
      // entrar direto (ver comentário em `selfSetNewPassword`). Limpa a
      // senha antiga que tinha sido digitada na 1ª tentativa (o campo
      // "Usuário ou e-mail" continua preenchido, já que nunca foi limpo).
      setNovaSenha('');
      setConfirmaSenha('');
      setSenha('');
      setPendingUserId(null);
      setMode('login');
      setSuccessMsg('Senha definida com sucesso! Faça login com sua nova senha.');
    } else if(res){
      setError(res.erro || 'Não foi possível salvar a nova senha — tente novamente.');

                  </div>

                    <input ref={senhaRef} className="has-toggle2" type={showSenha?'text':'password'} value={senha} onChange={e=>setSenha(e.target.value)} placeholder="Digite sua senha" enterKeyHint="go" />
                    <button type="button" className="pw-toggle2" onClick={()=>setShowSenha(s=>!s)} title={showSenha?'Ocultar senha':'Mostrar senha'}><EyeIcon off={showSenha} /></button>

                    <span className={'cb-box'+(lembrar?' checked':'')}>{lembrar && <DIcon name="checkCircle" size={13} style={{marginTop:0}} />}</span>

const ROLE_LABELS = {operador:'Operador', lider:'Líder de Estoque', admin:'Administrador'};

// Telas restritas por perfil, com possibilidade de exceção por usuário —
// pedido do cliente: "posso dar acesso a abas diferentes pra qualquer
// operador independente do perfil cadastrado". `hasAccess` centraliza a
// checagem (perfil já libera OU o usuário está na lista de exceção dele,
// `acessosExtras`) — usado tanto pelos menus (Sidebar/MobileHomeMenu, via
// buildSidebarGroups) quanto pela guarda de rota em App(), mesma dupla
// checagem que o resto do app já faz (visibilidade do link + guarda da
// rota). Telas fora deste mapa não têm restrição nenhuma (sempre liberado).
const ACESSOS_RESTRITOS = {
  dashboard: ['lider','admin'],
  relatorios: ['lider','admin'],
  enderecos: ['lider','admin'],
  usuarios: ['admin'],
  // Aprovação de SA de Ajuste não interessa ao operador — ele não participa
  // dessa etapa do fluxo (líder gera a SA, Diretoria/admin decide).
  aprovacaoDiretoria: ['lider','admin'],
};
function hasAccess(user, viewId){
  if(!user) return false;
  const perfisPadrao = ACESSOS_RESTRITOS[viewId];
  if(!perfisPadrao) return true;
  if(perfisPadrao.includes(user.perfil)) return true;
  return (user.acessosExtras||[]).includes(viewId);
}

// Agrupado por categoria (pedido do cliente: "revise esses nomes, deixar
// intuitivo... pode fazer também categoria e subcategorias") — a lista
// flat de 10+ itens misturava "ações de contagem" com "análise"/"sistema"
// sem nenhuma hierarquia visual. Rótulos também alinhados com o título
// que a própria tela usa (VIEW_TITLES) — "Contagens" virou "Nova
// Contagem" (é isso que a tela faz: começa uma contagem, não lista as já
// feitas — nome antigo confundia com "Minhas Contagens"/"Contagens
// Concluídas" logo ao lado); "Recontagens"/"Endereços" ganharam o mesmo
// sufixo "Pendentes" que o cabeçalho da própria tela já mostra.
// Extraída de `Sidebar` pra ser reaproveitada também por `MobileHomeMenu`
// (o menu que vira a própria tela inicial no celular) — mesma lista de
// destinos nos dois lugares, sem duplicar manutenção.
// Recebe o usuário inteiro (não só o perfil) porque a visibilidade de
// "Endereços"/"Usuários"/"Indicadores"/"Relatórios" agora depende também de
// `acessosExtras` (exceção concedida por usuário, ver ACESSOS_RESTRITOS/
// hasAccess) — o perfil sozinho não é mais suficiente pra decidir.
function buildSidebarGroups(user){
  const podeVer = viewId => hasAccess(user, viewId);
  // "Usuários" saiu de dentro de Configurações e entrou aqui (pedido do
  // cliente: fazia mais sentido como cadastro do que como configuração do
  // sistema) — mesmo grupo que já tinha "Endereços Pendentes" por razão
  // parecida. Cada item aparece só pra quem tem acesso (perfil padrão OU
  // exceção concedida) — o grupo inteiro só existe se sobrar pelo menos 1 item.
  const cadastrosItems = [
    ...(podeVer('usuarios') ? [{id:'usuarios', ic:'user', label:'Usuários'}] : []),
    ...(podeVer('enderecos') ? [{id:'enderecos', ic:'mapPin', label:'Endereços Pendentes'}] : []),
  ];
  const analiseItems = [
    ...(podeVer('dashboard') ? [{id:'dashboard', ic:'barChart', label:'Indicadores'}] : []),
    ...(podeVer('relatorios') ? [{id:'relatorios', ic:'fileText', label:'Relatórios'}] : []),
  ];
  return [
    { label: null, items: [
      {id:'home', ic:'home', label:'Início'},
    ]},
    { label: 'Contagem', items: [
      {id:'inventories', ic:'box', label:'Inventários'},
      {id:'pickCountType', ic:'search', label:'Nova Contagem'},
      {id:'recounts', ic:'repeat', label:'Recontagens Pendentes'},
      {id:'divergentes', ic:'alertTriangle', label:'Itens Divergentes'},
      ...(podeVer('aprovacaoDiretoria') ? [{id:'aprovacaoDiretoria', ic:'clipboardList', label:'Aprovação de Ajustes'}] : []),
      {id:'concluidas', ic:'checkCircle', label:'Contagens Concluídas'},
    ]},
    ...(cadastrosItems.length>0 ? [{ label: 'Cadastros', items: cadastrosItems }] : []),
    ...(analiseItems.length>0 ? [{ label: 'Análise', items: analiseItems }] : []),
    { label: 'Sistema', items: [
      {id:'settings', ic:'settings', label:'Configurações'},
    ]},
  ];
}
