<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Gestão de Estoques</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#EEF0F3" />
<!-- Ícone da aba do navegador (favicon) — mesma logo usada no manifest/ícones do PWA -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<!-- iOS: Safari ignora o manifest.json pra ícone/instalação — precisa desses -->
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png" />
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<!-- Nome curto só pro rótulo do ícone na tela de início do iOS — "Gestão de
     Estoques" (18 caracteres) é longo demais e o iOS trunca por caractere
     em vez de por palavra, colando as palavras visualmente. O nome completo
     continua em todo o resto do app (título da aba, tela de login, sidebar
     etc.), só este rótulo específico é encurtado. -->
<meta name="apple-mobile-web-app-title" content="Gestão Estoque" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg: #EEF0F3;
    --panel: #FFFFFF;
    --panel-raised: #F3F5F7;
    --line: #D7DBE1;
    --ink: #1A1C21;
    --ink-dim: #575756;
    --safety: #F6A200;
    --safety-ink: #14161A;
    --ok: #1E8E4F;
    --ok-bg: #E3F6EA;
    --warn: #A35F00;
    --warn-bg: #FFF1D6;
    --danger: #C4291B;
    --danger-bg: #FBE6E3;
    --accent2: #1F6FA8;
    --radius: 10px;
    --font-display: 'Oswald', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    /* Paleta corporativa/ERP (Inter + navy + cinzas) — login e dashboard novo usam,
       resto do app (tablet do operador) continua no design system original acima */
    --font-corp: 'Inter', sans-serif;
    --navy: #0F172A;
    --gray-50: #F8FAFC;
    --gray-100: #F1F5F9;
    --gray-200: #E2E8F0;
    --gray-400: #94A3B8;
    --gray-500: #64748B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);height:100%;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
  #root{min-height:100vh;display:flex;flex-direction:column;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  ::selection{background:var(--safety);color:var(--safety-ink);}

  .app{display:flex;flex-direction:column;min-height:100vh;max-width:900px;margin:0 auto;width:100%;background:var(--bg);position:relative;}

  /* TOPBAR */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:20;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-logo{height:24px;width:auto;flex-shrink:0;display:block;}
  .brand-text{font-family:var(--font-display);font-weight:600;letter-spacing:0.5px;font-size:19px;text-transform:uppercase;}
  .brand-text small{display:block;font-family:var(--font-mono);font-size:9px;color:var(--ink-dim);letter-spacing:1.5px;font-weight:500;text-transform:uppercase;margin-top:-2px;}
  .role-switch{display:flex;align-items:center;gap:8px;}
  .role-pill{font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.5px;text-transform:uppercase;background:var(--panel-raised);border:1px solid var(--line);color:var(--ink-dim);padding:7px 10px;border-radius:20px;display:flex;align-items:center;gap:6px;}
  .role-pill select{background:transparent;border:none;color:var(--ink);font-family:var(--font-mono);font-size:11px;text-transform:uppercase;outline:none;}
  .role-pill select option{background:var(--panel-raised);color:var(--ink);}
  .logout-btn{background:var(--panel-raised);border:1px solid var(--line);color:var(--ink-dim);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .logout-btn:active{background:var(--danger-bg);color:var(--danger);border-color:var(--danger);}

  /* "Inventário 360" é mais longo que "Stock360" (nome anterior) — em telas
     estreitas precisa encolher/colapsar pra não quebrar o topbar em 3 linhas. */
  @media (max-width:400px){
    .brand-text{font-size:15px;white-space:nowrap;}
    .role-pill span{display:none;}
    .role-pill{padding:7px 9px;}
  }

  /* BACK BAR */
  .subbar{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--bg);}
  .back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--ink-dim);font-size:14px;padding:6px 8px 6px 0;border-radius:6px;}
  .back-btn:active{background:var(--panel-raised);}
  .subbar h1{font-family:var(--font-display);font-size:17px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin:0;}

  .content{flex:1;padding:18px;padding-bottom:100px;}

  /* HOME CARDS */
  .grid-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (min-width:640px){.grid-cards{grid-template-columns:1fr 1fr 1fr;}}
  .home-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 16px;display:flex;flex-direction:column;gap:12px;align-items:flex-start;min-height:120px;position:relative;overflow:hidden;transition:transform .1s;}
  .home-card:active{transform:scale(0.97);background:var(--panel-raised);}
  .home-card .icon{font-size:26px;}
  .home-card .label{font-family:var(--font-display);font-size:15px;text-transform:uppercase;letter-spacing:0.3px;font-weight:600;line-height:1.25;}
  .home-card .badge{position:absolute;top:12px;right:12px;background:var(--safety);color:var(--safety-ink);font-family:var(--font-mono);font-weight:700;font-size:11px;padding:2px 7px;border-radius:20px;}
  .home-card.wide{grid-column:span 2;flex-direction:row;align-items:center;justify-content:space-between;}
  @media (min-width:640px){.home-card.wide{grid-column:span 3;}}

  .greet{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--safety);margin-bottom:4px;}
  .greet-title{font-family:var(--font-display);font-size:24px;font-weight:600;margin:0 0 20px 0;text-transform:uppercase;}

  /* BUTTONS */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 20px;border-radius:var(--radius);font-family:var(--font-display);font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;border:none;width:100%;}
  .btn-primary{background:var(--safety);color:var(--safety-ink);}
  .btn-primary:active{background:#d9a300;}
  .btn-secondary{background:var(--panel-raised);color:var(--ink);border:1px solid var(--line);}
  .btn-secondary:active{background:#2b2f36;}
  .btn-outline{background:transparent;color:var(--ink-dim);border:1px solid var(--line);}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-row{display:flex;gap:10px;}
  .btn-row .btn{flex:1;}
  .btn:disabled{opacity:0.4;}

  /* PANELS/FORMS */
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--ink-dim);margin-bottom:7px;}
  .field input[type=text],.field input[type=number],.field input[type=date],.field select,.field textarea{width:100%;background:var(--panel-raised);border:1px solid var(--line);color:var(--ink);padding:14px;border-radius:8px;font-size:16px;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--safety);outline-offset:0;}
  .field textarea{resize:vertical;min-height:70px;}
  .field-erro{color:var(--danger);font-size:12.5px;margin-top:6px;}
  .chip-input{display:flex;flex-wrap:wrap;align-items:center;gap:8px;width:100%;background:var(--panel-raised);border:1px solid var(--line);padding:9px 10px;border-radius:8px;}
  .chip-input:focus-within{outline:2px solid var(--safety);outline-offset:0;}
  .chip-input .chip{display:flex;align-items:center;gap:6px;background:var(--safety);color:#1a1200;font-family:var(--font-mono);font-weight:700;font-size:13px;padding:6px 8px 6px 12px;border-radius:20px;}
  .chip-input .chip button{background:none;border:none;color:inherit;font-size:16px;line-height:1;cursor:pointer;padding:0 2px;}
  .chip-input input{flex:1;min-width:90px;border:none;background:none;padding:6px 4px;font-size:16px;color:var(--ink);}
  .chip-input input:focus{outline:none;}

  /* Botão de liga/desliga (toggle switch) — usado em "Acessos extras" no
     UserForm, preferido pelo cliente em vez de checkbox simples. Estrutura
     clássica: input checkbox escondido + track/thumb desenhados via CSS. */
  .toggle-switch-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:10px 0;border-bottom:1px solid var(--line);}
  .toggle-switch-row:last-child{border-bottom:none;}
  .toggle-switch{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0;cursor:pointer;}
  .toggle-switch input{opacity:0;width:0;height:0;position:absolute;}
  .toggle-switch-track{position:absolute;inset:0;background:var(--line);border-radius:999px;transition:background .15s ease;}
  .toggle-switch-track::before{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:transform .15s ease;}
  .toggle-switch input:checked + .toggle-switch-track{background:var(--safety);}
  .toggle-switch input:checked + .toggle-switch-track::before{transform:translateX(20px);}
  .toggle-switch input:disabled + .toggle-switch-track{opacity:.55;cursor:not-allowed;}
  .toggle-switch input:focus-visible + .toggle-switch-track{outline:2px solid var(--accent2);outline-offset:2px;}
  .grupo-suggestions{margin-top:6px;max-height:260px;overflow-y:auto;background:var(--panel-raised);border:1px solid var(--line);border-radius:8px;}
  .grupo-suggestion-item{display:block;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);color:var(--ink);padding:11px 14px;font-size:14px;cursor:pointer;}
  .grupo-suggestion-item:last-child{border-bottom:none;}
  .grupo-suggestion-item:hover{background:var(--panel);}
  .grupo-suggestion-count{color:var(--ink-dim);font-family:var(--font-mono);font-size:12px;}
  .grupo-suggestion-empty{padding:14px;color:var(--ink-dim);font-size:13px;}
  .radio-group{display:flex;flex-direction:column;gap:10px;}
  .radio-opt{display:flex;align-items:center;gap:12px;background:var(--panel-raised);border:1px solid var(--line);padding:14px;border-radius:8px;}
  .radio-opt.active{border-color:var(--safety);background:#FFF4E0;}
  .radio-opt input{width:20px;height:20px;accent-color:var(--safety);}
  .radio-opt .opt-title{font-weight:600;font-size:14.5px;}
  .radio-opt .opt-desc{font-size:12px;color:var(--ink-dim);margin-top:2px;}

  /* STATUS */
  .status-tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:700;text-transform:uppercase;padding:4px 9px;border-radius:20px;letter-spacing:0.3px;}
  .status-ok{background:var(--ok-bg);color:var(--ok);}
  .status-warn{background:var(--warn-bg);color:var(--warn);}
  .status-danger{background:var(--danger-bg);color:var(--danger);}
  .status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

  /* ITEM CARD (count item) */
  .item-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
  .item-card-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .item-code{font-family:var(--font-mono);font-size:13px;color:var(--safety);letter-spacing:0.5px;}
  .item-desc{font-family:var(--font-display);font-size:18px;font-weight:600;margin:4px 0 0 0;text-transform:uppercase;}
  .item-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 18px;}
  .item-meta .m{background:var(--panel-raised);border-radius:8px;padding:10px 12px;}
  .item-meta .m .k{font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;color:var(--ink-dim);letter-spacing:0.6px;}
  .item-meta .m .v{font-size:14.5px;font-weight:600;margin-top:3px;}
  .address-chip{font-family:var(--font-mono);font-size:20px;font-weight:700;letter-spacing:2px;background:var(--panel-raised);border:1px dashed var(--line);border-radius:8px;padding:14px;text-align:center;margin-bottom:14px;}

  /* COUNT CARD (Recontagens/Itens Divergentes/Concluídas) — shell visual
     compartilhado pelas 3 telas, ver CLAUDE.md "Redesign das telas de
     Recontagens...". Reaproveita .item-code/.item-desc já existentes, só
     acrescenta a faixa de severidade lateral + badges + linhas novas.
     Raio (16px) e sombra são PRÓPRIOS deste card (pedido explícito do
     cliente pra bater com o mockup de referência) — diferentes do
     --radius:10px usado no resto do app, de propósito, não é regressão. */
  .count-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:16px;display:flex;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  /* Item marcado como urgente (líder/admin, Recontagens/Itens Divergentes) —
     destaque visual pra ele se sobressair na lista, além de vir ordenado
     primeiro (ver RecountsPanel/DivergentItemsPanel). Contorno vermelho e
     grosso, pedido explícito do cliente (1ª versão era azul/fino demais). */
  .count-card.urgente{box-shadow:0 0 0 3px var(--danger), 0 1px 3px rgba(0,0,0,.04);}
  .urgente-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;padding:4px 9px;border-radius:20px;background:var(--danger);color:#fff;}
  /* Item reprovado pela Diretoria (fluxo de SA de Ajuste, ver App()) — mesma
     técnica do anel de "urgente" acima, mas com cor RESERVADA só pra esse
     caso (roxo, já usado em outras partes do app com outro sentido — nunca em
     estado de contagem), pra não se confundir com a rejeição do líder (vermelho). */
  .count-card.reprovado-diretoria{box-shadow:0 0 0 3px #7B3FC4, 0 1px 3px rgba(0,0,0,.04);}
  /* Item "Sem Ajuste" vindo do histórico importado (BD_Contagens) — pedido
     explícito do cliente: "card discreto e uma borda na cor amarela... sem
     chamar muita atenção". Mesma técnica de anel do "urgente"/"reprovado-
     diretoria" acima, mas 2px (não 3px) e cor âmbar (`--warn`, a mesma já
     usada em "Pendente" no resto do app) — deliberadamente mais sutil que os
     outros dois anéis, que são pra CHAMAR atenção; este é o oposto. */
  .count-card.sem-ajuste-destaque{box-shadow:0 0 0 2px var(--warn), 0 1px 3px rgba(0,0,0,.04);}
  .count-card-bar{width:5px;flex-shrink:0;}
  .count-card-body{flex:1;min-width:0;padding:16px 20px;display:flex;flex-direction:column;gap:10px;}
  .count-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .count-card-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .severity-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;padding:4px 9px;border-radius:20px;}
  .category-chip{font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:0.3px;color:var(--ink-dim);background:var(--panel-raised);padding:4px 9px;border-radius:20px;}
  .count-card-head-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .count-card-date{font-family:var(--font-mono);font-size:11px;color:var(--ink-dim);white-space:nowrap;}
  .count-card-menu-btn{background:none;border:none;color:var(--ink-dim);font-size:16px;line-height:1;padding:2px 4px;cursor:pointer;}
  .count-card-menu{position:relative;}
  .count-card-menu-dropdown{position:absolute;right:0;top:100%;margin-top:4px;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.12);z-index:5;overflow:hidden;white-space:nowrap;}
  .count-card-menu-dropdown button{display:block;width:100%;padding:9px 16px;background:none;border:none;text-align:left;font-size:12.5px;color:var(--ink);cursor:pointer;}
  .count-card-menu-dropdown button:hover{background:var(--panel-raised);}
  .count-card-menu-dropdown button.menu-item-danger{color:var(--danger);}
  .count-card-menu-dropdown button.menu-item-danger:hover{background:var(--danger-bg);}
  .count-card-title{line-height:1.15;}
  /* Destaque invertido em relação ao .item-code/.item-desc padrão do resto
     do app (lá a descrição é maior) — pedido do cliente pensando em
     facilidade operacional: o código é o que o operador confere contra o
     item físico/etiqueta, então precisa ser o principal destaque visual
     aqui, com a descrição como apoio secundário menor. Escopado só a
     .count-card-title (Recontagens/Itens Divergentes/Concluídas), não
     muda .item-code/.item-desc em nenhum outro lugar do app. */
  .count-card-title .item-code{font-size:20px;font-weight:700;letter-spacing:0.3px;}
  .count-card-title .item-desc{font-size:12.5px;font-weight:600;margin-top:2px;}
  /* Endereço virou o elemento de MAIOR destaque do cabeçalho do card —
     cliente marcou com print que o espaço vazio ao lado do código deveria
     mostrar o endereço em bem mais evidência ("primeira coisa que bate o
     olho"), já que é a informação que o operador mais precisa pra
     localizar o item fisicamente antes de recontar. */
  .count-card-toprow{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .count-card-toprow .count-card-title{flex:1;min-width:0;}
  .count-card-address-badge{display:flex;align-items:center;gap:6px;flex-shrink:0;font-family:var(--font-mono);font-size:16px;font-weight:700;color:var(--safety-ink);background:#FFF3E0;border:1.5px solid var(--safety);border-radius:10px;padding:8px 14px;white-space:nowrap;}
  .count-card-main{display:flex;gap:16px;align-items:stretch;flex:1;}
  .count-card-content{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;justify-content:center;}
  .count-card-actions-col{display:flex;flex-direction:column;gap:8px;width:150px;flex-shrink:0;justify-content:center;}
  /* Botões empilhados à direita usam o mesmo .btn/.btn-primary/.btn-outline
     do resto do app (não criei classe nova), mas o tamanho padrão (pensado
     pro card espaçado antigo) fica desproporcional aqui — reduzido só
     neste contexto, sem mudar o botão em nenhum outro lugar. */
  .count-card-actions-col .btn{width:100%;padding:11px 14px;font-size:12px;}
  .count-card-extra{border-top:1px solid var(--line);padding-top:8px;font-size:12.5px;color:var(--ink-dim);}
  .count-card-extra strong{color:var(--ink);}
  @media (max-width:640px){
    .count-card-main{flex-direction:column;}
    .count-card-actions-col{width:100%;flex-direction:row;}
  }
  /* .count-card-actions — usado pelo estado de "confirmar exclusão"
     (empilha alerta + botões Cancelar/Confirmar), sempre um wrapper
     isolado, nunca combinado direto com .btn-row no mesmo elemento (ver
     .count-card-actions-row abaixo pra esse outro caso). */
  .count-card-actions{padding:0;display:flex;flex-direction:column;gap:8px;width:100%;}
  .count-card-actions .btn{width:100%;padding:11px 14px;font-size:12px;}
  /* .count-card-actions-row — fileira de botões lado a lado (Itens
     Divergentes pode ter até 4 ações) — classe SEPARADA de
     .count-card-actions de propósito, pra não colidir com o
     flex-direction:column acima quando combinada com .btn-row no mesmo
     elemento. */
  .count-card-actions-row.btn-row .btn{width:auto;padding:11px 14px;font-size:11.5px;flex:1 1 auto;}
  .count-card-actions-row.btn-row .btn-danger{flex:0 0 auto;}

  /* Comparativo 1ª/2ª contagem (item que já tem uma rodada anterior, ver
     "anterior" em DivergentItemsPanel) — as duas rodadas empilhadas, cada
     uma no mesmo .result-grid de sempre, com destaque visual pra qual é a
     rodada ATUAL (borda laranja) vs. a anterior (neutra). Aprovado com o
     cliente via prévia de artifact antes de subir — ver CLAUDE.md. */
  .rounds-stack{display:flex;flex-direction:column;gap:10px;}
  .round-panel{border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:10px;min-width:0;}
  /* Fundo branco (não --panel-raised) — precisa contrastar com o fundo
     cinza das células .rg dentro dele, senão painel e célula se fundem
     num bloco só sem nenhum contraste pro texto dos rótulos. */
  .round-panel.previous{background:var(--panel);border:1px solid var(--line);}
  .round-panel.current{background:#fff;border:2px solid var(--safety);}
  .round-eyebrow{display:flex;align-items:center;flex-wrap:wrap;gap:8px;}
  .round-eyebrow .label{font-family:var(--font-mono);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--ink-dim);}
  .round-panel.current .round-eyebrow .label{color:var(--safety-ink);}
  .round-eyebrow .badge{font-family:var(--font-mono);font-size:9.5px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:10px;background:var(--safety);color:#fff;}
  .round-who{font-size:11.5px;color:var(--ink-dim);margin-left:auto;}

  /* QR SCAN VISUAL */
  .scan-box{position:relative;background:#0A0B0D;border:1px solid var(--line);border-radius:var(--radius);height:180px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:14px;}
  .scan-frame{width:120px;height:120px;position:relative;}
  .scan-frame::before,.scan-frame::after,.scan-corner-b1,.scan-corner-b2{content:'';position:absolute;width:26px;height:26px;border-color:var(--safety);}
  .scan-frame::before{top:0;left:0;border-top:3px solid var(--safety);border-left:3px solid var(--safety);}
  .scan-frame::after{top:0;right:0;border-top:3px solid var(--safety);border-right:3px solid var(--safety);}
  .scan-corner-b1{bottom:0;left:0;border-bottom:3px solid var(--safety);border-left:3px solid var(--safety);}
  .scan-corner-b2{bottom:0;right:0;border-bottom:3px solid var(--safety);border-right:3px solid var(--safety);}
  .scan-laser{position:absolute;left:6px;right:6px;height:2px;background:var(--safety);box-shadow:0 0 8px var(--safety);animation:laser 1.8s ease-in-out infinite;}
  @keyframes laser{0%{top:6px;}50%{top:110px;}100%{top:6px;}}

  /* LIVE CAMERA SCANNER (html5-qrcode) */
  .scanner-wrap{background:#0A0B0D;border-radius:var(--radius);overflow:hidden;margin-bottom:14px;border:1px solid var(--line);position:relative;}
  .scanner-viewport{width:100%;min-height:240px;}
  .scanner-viewport video{width:100% !important;display:block;}
  .scanner-hint{text-align:center;color:var(--ink-dim);font-size:12.5px;margin:-6px 0 14px 0;}
  .scan-toggle-row{display:flex;gap:10px;margin-bottom:14px;}
  .manual-fallback{background:var(--panel-raised);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:14px;}

  /* RESULT BANNER */
  .result-banner{border-radius:var(--radius);padding:20px;margin-bottom:16px;border:1px solid;}
  .result-banner.ok{background:var(--ok-bg);border-color:var(--ok);}
  .result-banner.warn{background:var(--warn-bg);border-color:var(--warn);}
  .result-banner.danger{background:var(--danger-bg);border-color:var(--danger);}
  .result-banner .rb-title{font-family:var(--font-display);font-size:18px;font-weight:700;text-transform:uppercase;margin:0 0 6px 0;}
  .result-banner .rb-sub{font-size:13.5px;color:var(--ink-dim);}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
  /* Era rgba(255,255,255,0.04) — sobra do tema escuro anterior (ver
     "Convenções de design" no CLAUDE.md), praticamente invisível no tema
     claro atual (branco em cima de branco). Corrigido pra --panel-raised,
     o mesmo cinza-claro sutil já usado em outros blocos de info do app. */
  .result-grid .rg{background:var(--panel-raised);border-radius:8px;padding:10px 12px;min-width:0;}
  .result-grid .rg .k{font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .result-grid .rg .v{font-family:var(--font-mono);font-size:17px;font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  /* Grids de 4 colunas numa linha só (Sistema/Físico/Diferença/%, ver
     CLAUDE.md) — em telas de celular estreitas (~360-390px), mesmo com
     nowrap, "DIFERENÇA" ainda não cabia no espaço de 1/4 da largura do
     card. Aperta padding/fonte só nessa variante (classe result-grid-4col),
     sem afetar os outros usos de 2 colunas com labels mais longos. */
  @media (max-width:520px){
    .result-grid.result-grid-4col{gap:5px;}
    .result-grid.result-grid-4col .rg{padding:6px 4px;text-align:center;}
    .result-grid.result-grid-4col .rg .k{font-size:7.2px;}
    .result-grid.result-grid-4col .rg .v{font-size:13px;}
  }

  /* TELA DE CONTAGEM — "coletor industrial" (Zebra/Honeywell/WMS), pedido
     do cliente: "esta é a tela mais importante... prioridade é velocidade
     operacional". Ver CLAUDE.md "Recontar Item vira coletor industrial".
     Cards com 16px de raio + sombra bem discreta (pedido explícito),
     diferente do --radius:10px do resto do app — mesmo tipo de exceção já
     documentada em .count-card acima, escopada só a esta tela. */
  .cs-screen{display:flex;flex-direction:column;gap:14px;padding-bottom:88px;}
  /* Cabeçalho do app some inteiro nas telas de contagem (pedido do
     cliente: "essas informações já existem em outras partes da aplicação
     e ocupam uma área muito valiosa da tela operacional") — o espaço
     liberado é usado por este contexto operacional (progresso da fila ou
     prioridade da recontagem) em vez de nome/avatar/perfil do usuário. */
  .cs-context{display:flex;flex-direction:column;gap:8px;}
  .cs-progress{display:flex;flex-direction:column;gap:6px;}
  .cs-progress-track{height:6px;border-radius:4px;background:var(--line);overflow:hidden;}
  .cs-progress-fill{height:100%;background:var(--safety);border-radius:4px;transition:width .2s ease;}
  .cs-progress-meta{display:flex;justify-content:space-between;gap:8px;font-family:var(--font-mono);font-size:11px;color:var(--ink-dim);}

  /* Card "Nª contagem" (dados da rodada anterior) — movido pro final da
     tela, logo acima do rodapé: é informação de apoio/histórico, não o
     que o operador precisa ver primeiro (pedido do cliente). */
  .cs-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:10px 16px;}
  .cs-round-badge{font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:0.5px;color:#fff;background:var(--accent2);padding:5px 10px;border-radius:20px;white-space:nowrap;}
  .cs-top-sep{width:1px;align-self:stretch;background:var(--line);}
  .cs-top-block .cs-top-k{font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;color:var(--ink-dim);letter-spacing:0.4px;}
  .cs-top-block .cs-top-v{font-size:13px;font-weight:600;margin-top:1px;}

  /* Card do material — Almox/Endereço saíram do canto (já aparecem nas
     informações técnicas mais abaixo, seria duplicado) e o espaço virou
     pro botão de câmera, ~20% maior e centralizado, pra parecer uma ação
     de verdade, não um ícone pequeno perdido no canto. */
  .cs-material{display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:20px;}
  .cs-material-info{flex:1;min-width:0;}
  .cs-code{font-family:var(--font-mono);font-size:clamp(30px,6vw,36px);font-weight:700;color:var(--ink);letter-spacing:0.5px;line-height:1;}
  .cs-scan-btn{flex-shrink:0;width:56px;height:56px;border-radius:14px;border:2px solid var(--safety);background:#FFF3E0;color:var(--safety);display:flex;align-items:center;justify-content:center;}
  .cs-scan-btn:active{background:var(--safety);color:#fff;}
  .cs-desc{font-family:var(--font-display);font-size:22px;font-weight:600;text-transform:uppercase;margin-top:8px;line-height:1.25;}
  .cs-scan-feedback{margin-top:-4px;font-size:12.5px;font-weight:600;border-radius:8px;padding:8px 12px;}
  .cs-scan-feedback.ok{background:var(--ok-bg);color:var(--ok);}
  .cs-scan-feedback.warn{background:var(--warn-bg);color:var(--warn);}

  /* Referência do saldo do sistema ANTES de digitar — mostra o valor
     esperado junto do campo de quantidade (em vez de só depois de já ter
     digitado), reduzindo erro de digitação por comparação visual direta. */
  .cs-sistema-ref{text-align:center;background:var(--panel-raised);border-radius:12px;padding:10px;}
  .cs-sistema-ref .cs-sistema-k{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;color:var(--ink-dim);letter-spacing:0.5px;}
  .cs-sistema-ref .cs-sistema-v{font-family:var(--font-mono);font-size:20px;font-weight:700;margin-top:2px;}
  .cs-sistema-arrow{display:flex;justify-content:center;color:var(--ink-dim);margin:-6px 0;}
  .cs-qty-label-row{display:flex;align-items:center;justify-content:center;position:relative;}
  .cs-qty-label{text-align:center;font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:0.6px;color:var(--ink-dim);}
  /* Calculadora inline — pedido do cliente: somar itens contados em mais de
     um lugar sem precisar sair do app pra usar a calculadora do aparelho. */
  .cs-calc-btn{position:absolute;right:0;width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:var(--panel-raised);color:var(--ink-dim);display:flex;align-items:center;justify-content:center;}
  .cs-calc-btn:active{background:var(--safety);color:#fff;border-color:var(--safety);}
  .cs-calc-panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:14px;}
  .cs-calc-display{text-align:right;font-family:var(--font-mono);font-size:28px;font-weight:700;padding:6px 8px 10px;overflow-x:auto;white-space:nowrap;}
  .cs-calc-history{display:block;font-size:13px;font-weight:600;color:var(--ink-dim);}
  .cs-calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .cs-calc-key{height:48px;border-radius:10px;border:1px solid var(--line);background:var(--panel-raised);color:var(--ink);font-family:var(--font-mono);font-size:18px;font-weight:700;}
  .cs-calc-key:active{background:var(--line);}
  .cs-calc-key.op{background:#EAF2F8;color:var(--accent2);}
  /* "=" ocupa 2 linhas no grid (gridRow:'span 2'), mas a altura FIXA de
     .cs-calc-key acima (48px) sempre vence o esticamento automático do
     grid — sem esse override, o botão ficava com metade da área reservada
     pra ele em branco, por baixo. height:100% deixa ele de fato preencher
     as 2 linhas + o gap entre elas. */
  .cs-calc-key.equals{height:100%;background:var(--safety);color:#fff;font-size:26px;}
  .cs-qty-input{width:100%;height:90px;font-family:var(--font-mono);font-size:48px;font-weight:700;text-align:center;background:var(--panel);border:2px solid var(--line);border-radius:16px;color:var(--ink);}
  .cs-qty-input:focus{outline:none;border-color:var(--accent2);}
  .cs-qty-input.ok{border-color:var(--ok);}
  .cs-qty-input.warn{border-color:var(--warn);}
  .cs-qty-input.danger{border-color:var(--danger);}
  .cs-shortcuts{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .cs-shortcuts button{height:48px;border-radius:12px;border:1px solid var(--line);background:var(--panel-raised);color:var(--ink);font-weight:700;font-size:14px;font-family:var(--font-mono);}
  .cs-shortcuts button:active{background:var(--line);}

  .cs-compare{border-radius:16px;padding:16px;border:1px solid;}
  .cs-compare.ok{background:var(--ok-bg);border-color:var(--ok);}
  .cs-compare.warn{background:var(--warn-bg);border-color:var(--warn);}
  .cs-compare.danger{background:var(--danger-bg);border-color:var(--danger);}
  .cs-compare-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center;}
  .cs-compare-cell .k{font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;color:var(--ink-dim);letter-spacing:0.4px;}
  .cs-compare-cell .v{font-family:var(--font-mono);font-size:20px;font-weight:700;margin-top:2px;}
  .cs-feedback{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;margin-top:12px;}
  .cs-compare.ok .cs-feedback, .cs-compare.ok .cs-compare-cell .v{color:var(--ok);}
  .cs-compare.warn .cs-feedback, .cs-compare.warn .cs-compare-cell .v{color:var(--warn);}
  .cs-compare.danger .cs-feedback, .cs-compare.danger .cs-compare-cell .v{color:var(--danger);}
  .cs-dot{width:9px;height:9px;border-radius:50%;background:currentColor;flex-shrink:0;}

  .cs-mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .cs-mini{background:var(--panel-raised);border-radius:10px;padding:8px 10px;}
  .cs-mini .k{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;color:var(--ink-dim);letter-spacing:0.4px;}
  .cs-mini .v{font-size:12.5px;font-weight:600;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  @media (max-width:520px){ .cs-mini-grid{grid-template-columns:repeat(2,1fr);} }

  .cs-footer{position:sticky;bottom:0;background:var(--panel);border:1px solid var(--line);border-radius:16px 16px 0 0;box-shadow:0 -2px 10px rgba(0,0,0,.06);padding:12px 16px;}
  .cs-footer-row{display:flex;align-items:center;gap:14px;}
  .cs-footer-qtywrap{flex-shrink:0;}
  .cs-footer-label{font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;color:var(--ink-dim);letter-spacing:0.4px;}
  .cs-footer-qty{font-family:var(--font-mono);font-size:20px;font-weight:700;}
  .cs-footer-btn{flex:1;height:54px;font-size:16px;font-weight:700;margin:0;}

  /* LIST ROWS */
  .list-row{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;margin-bottom:10px;}
  .list-row:active{background:var(--panel-raised);}
  .list-row .lr-title{font-weight:600;font-size:14.5px;}
  .list-row .lr-sub{font-size:12px;color:var(--ink-dim);margin-top:3px;font-family:var(--font-mono);}
  .chevron{color:var(--ink-dim);font-size:18px;}

  .progress-bar{height:6px;background:var(--panel-raised);border-radius:4px;overflow:hidden;margin-top:8px;}
  .progress-bar .fill{height:100%;background:var(--safety);border-radius:4px;}

  /* DASHBOARD */
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
  @media (min-width:640px){.kpi-grid{grid-template-columns:repeat(4,1fr);}}
  .weekly-charts-grid{display:flex;flex-direction:column;gap:14px;margin-bottom:14px;}
  @media (min-width:900px){.weekly-charts-grid{display:grid;grid-template-columns:1fr 1fr;}}
  .chart-meta-badge{font-family:var(--font-mono);font-size:11px;font-weight:700;color:#0D9488;background:rgba(13,148,136,0.12);border-radius:6px;padding:3px 8px;white-space:nowrap;}

  /* Card "Saúde do Inventário" — pedido do cliente com imagem de referência
     (selo + variação vs. período anterior + mini gráfico + acuracidade
     atual em destaque). Cor de fundo/destaque muda por faixa de status
     (Excelente/Bom/Atenção/Crítico), calculada em InventoryHealthCard.
     Empilhado (coluna) é o padrão AGORA — cliente reportou (2x, com print de
     tablet) o layout em linha (`flex-wrap:wrap`, breakpoint antigo só abaixo
     de 640px) ficando espremido/colado no filtro "Filtros" logo abaixo em
     larguras de tablet (640-1024px, onde a fileira ainda tentava caber tudo
     lado a lado e sobrava pouco respiro). Empilhar por padrão e só voltar
     pra lado a lado a partir de 1024px (mesmo raciocínio geral do resto do
     app: card com bastante conteúdo, largura de tablet raramente sobra
     espaço de sobra pra isso) resolve pra qualquer tela de celular/tablet
     de uma vez, sem depender de acertar um breakpoint estreito específico. */
  .health-card{display:flex;flex-direction:column;align-items:stretch;gap:16px;border-radius:18px;padding:22px 26px;margin-bottom:24px;}
  .health-left{display:flex;align-items:flex-start;gap:14px;min-width:0;}
  .health-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .health-eyebrow{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-dim);margin-bottom:2px;}
  .health-status{font-family:var(--font-display);font-size:22px;font-weight:700;line-height:1.2;}
  .health-sub{font-size:13px;font-weight:600;margin-top:1px;}
  .health-desc{font-size:12.5px;color:var(--ink-dim);margin-top:6px;max-width:340px;}
  .health-chart{order:3;}
  .health-current{background:#fff;border-radius:14px;padding:14px 22px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06);order:2;}
  .health-current-value{font-family:var(--font-display);font-size:26px;font-weight:700;}
  .health-current-label{font-size:11px;color:var(--ink-dim);margin-top:2px;white-space:nowrap;}
  @media (min-width:1024px){
    .health-card{flex-direction:row;align-items:center;gap:24px;margin-bottom:18px;flex-wrap:wrap;}
    .health-left{flex:1;min-width:220px;}
    .health-chart{flex:1.4;min-width:220px;max-width:360px;order:0;}
    .health-current{flex-shrink:0;order:0;}
  }

  /* Painel "Filtros" do Dashboard — card premium estilo Power BI/Stripe
     Dashboard/Vercel (ver CLAUDE.md "Filtro de período vira painel Filtros
     estilo SaaS"). Cor de destaque (--tfb-teal) é a mesma já usada nos
     gráficos de tendência (WEEKLY_CHART_COLOR) — mantém os toggle buttons
     "verde/teal" pedidos alinhados com o resto da seção, em vez de
     introduzir mais uma cor de marca. */
  .trend-filter-bar{background:#fff;border:1px solid #EAEAEA;border-radius:18px;padding:24px;box-shadow:0 8px 30px rgba(0,0,0,.05);margin-bottom:24px;}
  .tfb-head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;}
  .tfb-icon-badge{width:40px;height:40px;border-radius:12px;background:rgba(13,148,136,0.12);color:#0D9488;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .tfb-icon-badge svg{margin:auto;}
  .tfb-head-text{min-width:0;}
  .tfb-title{font-family:var(--font-corp);font-size:15px;font-weight:700;color:var(--navy);}
  .tfb-subtitle{font-family:var(--font-corp);font-size:12px;color:var(--ink-dim);margin-top:2px;}
  /* Empilhado por padrão (largura total, chip+botão lado a lado mas numa
     linha PRÓPRIA abaixo do título) — mesmo raciocínio do `.health-card`
     acima: só volta a ficar espremido ao lado do título (`margin-left:auto`)
     a partir de telas realmente largas (≥1024px), ver media query no fim
     deste bloco. Cliente reportou (print de tablet) essa fileira ficando
     desorganizada/apertada em larguras intermediárias. */
  .tfb-head-actions{display:flex;align-items:center;gap:10px;margin-left:0;width:100%;justify-content:space-between;flex-wrap:wrap;margin-top:14px;}
  .tfb-range-chip{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--navy);background:var(--gray-50);border:1px solid var(--gray-200);border-radius:10px;padding:9px 14px;white-space:nowrap;}
  .tfb-refresh-btn{display:flex;align-items:center;gap:8px;font-family:var(--font-corp);font-size:12.5px;font-weight:700;color:#fff;background:#0D9488;border:none;border-radius:10px;padding:9px 16px;cursor:pointer;transition:background 0.2s;white-space:nowrap;}
  .tfb-refresh-btn:hover:not(:disabled){background:#0b7a70;}
  .tfb-refresh-btn:disabled{opacity:0.7;cursor:default;}
  .tfb-period-row{display:flex;flex-direction:column;align-items:flex-start;gap:14px;margin-top:20px;}
  .tfb-period-label{display:flex;align-items:center;gap:6px;font-family:var(--font-corp);font-size:12px;font-weight:700;color:var(--ink-dim);text-transform:uppercase;letter-spacing:0.4px;flex-shrink:0;}
  .tfb-quick-buttons{display:flex;flex-wrap:wrap;gap:8px;}

  .tfb-pill:hover:not(.active){background:rgba(13,148,136,0.08);border-color:rgba(13,148,136,0.3);}
  .tfb-pill.active{background:#0D9488;color:#fff;border-color:#0D9488;box-shadow:0 4px 10px rgba(13,148,136,0.3);}
  .tfb-custom-row{display:flex;flex-direction:column;align-items:stretch;gap:16px;margin-top:16px;padding-top:16px;border-top:1px solid var(--gray-100);}
  .tfb-date-field{display:flex;flex-direction:column;gap:6px;}
  .tfb-date-field label{font-family:var(--font-corp);font-size:11px;font-weight:600;color:var(--ink-dim);}
  .tfb-date-input-wrap{display:flex;align-items:center;gap:8px;border:1px solid var(--gray-200);border-radius:10px;background:#fff;padding:8px 12px;color:var(--ink-dim);}
  .tfb-date-input-wrap input{border:none;background:transparent;font-family:var(--font-corp);font-size:12.5px;font-weight:500;color:var(--navy);padding:0;}
  .tfb-date-input-wrap input:focus{outline:none;}
  .spin-icon{animation:tfb-spin 0.8s linear infinite;}
  @keyframes tfb-spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  @media (min-width:1024px){
    .trend-filter-bar{margin-bottom:18px;}
    .tfb-head-actions{margin-left:auto;width:auto;margin-top:0;}
    .tfb-period-row{flex-direction:row;align-items:center;}
    .tfb-custom-row{flex-direction:row;align-items:flex-end;}
  }
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
  .kpi .kv{font-family:var(--font-mono);font-size:26px;font-weight:700;}
  .kpi .kl{font-size:11px;color:var(--ink-dim);margin-top:4px;text-transform:uppercase;letter-spacing:0.4px;}
  .section-title{font-family:var(--font-display);font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-dim);margin:24px 0 12px 0;display:flex;align-items:center;gap:8px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--line);}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .bar-row .bl{width:110px;font-size:12px;color:var(--ink-dim);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar-track{flex:1;height:20px;background:var(--panel-raised);border-radius:5px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--safety);border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;}
  .bar-fill span{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--safety-ink);}
  .rank-table{width:100%;border-collapse:collapse;}
  .rank-table th{text-align:left;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;color:var(--ink-dim);padding:8px 6px;border-bottom:1px solid var(--line);}
  .rank-table td{padding:10px 6px;border-bottom:1px solid var(--line);font-size:13px;}
  .rank-table td.num{font-family:var(--font-mono);text-align:right;}
  .rank-table th.num{text-align:right;}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--line);display:flex;max-width:900px;margin:0 auto;z-index:20;}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px 12px;background:none;border:none;color:var(--ink-dim);font-size:9.5px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.3px;}
  .nav-btn.active{color:var(--safety);}

  .divergence-alert{background:var(--warn-bg);border:1px solid var(--warn);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px;display:flex;gap:10px;align-items:flex-start;}

  .role-note{font-family:var(--font-mono);font-size:11px;color:var(--ink-dim);background:var(--panel-raised);border-radius:8px;padding:10px 12px;margin-bottom:16px;border-left:3px solid var(--accent2);}

  /* LOGIN SCREEN v3 — redesign completo estilo SaaS premium (Microsoft 365,
     SAP Fiori, Power BI, Atlassian, Linear), pedido explícito do cliente com
     mockup de referência exato ("esta imagem passa a ser o Design System
     desta tela"). Ver CLAUDE.md "Login vira redesign premium (Fiori/M365)".
     Estrutura: página com degradê suave → shell centralizado (max 1450px,
     radius 24px) → duas colunas (45% marca / 55% formulário). --safety
     (laranja oficial da Selgron, já usado em todo o app) permanece a cor de
     destaque aqui — não introduzi um hex novo só pra esta tela, mesmo o
     mockup citando #F7941D (visualmente indistinguível de #F6A200, e
     CLAUDE.md já registra --safety como "cor oficial da marca", não um tom
     genérico pra trocar à toa). --navy, --gray-N e --font-corp já eram
     compartilhadas com o Dashboard desde a rodada anterior de redesign.
     Elementos do mockup sem funcionalidade real por trás (idioma, lembrar-me,
     login por código) ficam honestamente decorativos — mesmo critério já
     usado no sino de notificação do DesktopTopbar ("Nenhuma notificação por
     enquanto"), não fingem um recurso que não existe. */
  .login-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(180deg, #F7F8FB 0%, #EEF2F7 100%);
    padding:10px;font-family:var(--font-corp);}
  .login-shell{width:100%;max-width:1040px;background:#fff;border-radius:28px;overflow:hidden;
    box-shadow:0 1px 2px rgba(15,23,42,0.03), 0 20px 48px rgba(15,23,42,0.07);
    display:flex;flex-direction:column;}
  .login-outer-footer{display:flex;align-items:center;justify-content:center;gap:10px;
    margin-top:8px;font-family:var(--font-corp);font-size:12.5px;color:var(--gray-500);}
  .login-outer-footer img{height:15px;width:auto;opacity:0.85;}
  .login-outer-footer .lof-sep{color:var(--gray-200);}

  /* ---- Coluna esquerda — marca ---- */
  /* Terceira imagem do cliente: a composição inteira da tela (logo, título,
     subtítulo, cena do armazém, dispositivos, benefícios — tudo já dentro
     do arquivo), com instrução explícita de usar exatamente como veio, SEM
     nenhum elemento HTML por cima ("não precisa alterar ou acrescentar
     nada") — diferente das duas tentativas anteriores (imagem como bloco de
     conteúdo, depois como fundo com texto HTML sobreposto). `.login-brand`
     agora só existe pra dar a moldura (largura/altura da coluna); todo o
     conteúdo visual vem da própria imagem. */
  .login-brand{position:relative;display:flex;background:#fff;overflow:hidden;}
  /* Mobile-first: largura cheia, altura livre (`height:auto`) — mostra a
     imagem INTEIRA, sem cortar nada, já que agora ela é o único conteúdo do
     painel (sem HTML por cima pra proteger/duplicar). No desktop
     (`@media min-width:900px` mais abaixo), a imagem vira `position:
     absolute` — bug real encontrado: com `height:100%` num `<img>` normal
     (dentro do fluxo), `.login-brand` tenta esticar (`align-items:stretch`
     do `.login-shell` em row) pra bater com a altura de `.login-form-col`,
     mas o cálculo de "altura hipotética" do flexbox usa a proporção NATURAL
     da imagem (bem alta, é retrato) antes de aplicar o stretch — isso
     inflava a linha inteira pra ~1200px de altura (a altura natural da
     imagem numa coluna de ~570px de largura), bem mais do que o formulário
     precisa, forçando rolagem na tela toda. `position:absolute` tira a
     imagem do cálculo de layout do flexbox — `.login-brand` passa a esticar
     só pra bater com a altura de verdade do formulário, e a imagem (agora
     fora do fluxo) preenche esse espaço via `inset:0`. */
  .login-brand-img{width:100%;height:auto;display:block;}

  /* ---- Coluna direita — formulário ---- */
  .login-form-col{display:flex;flex-direction:column;padding:20px 28px;background:#fff;min-width:0;}
  .login-form-body{flex:1;display:flex;flex-direction:column;justify-content:center;max-width:600px;
    margin:0 auto;width:100%;}
  .login-welcome-title{font-family:var(--font-corp);font-weight:800;color:var(--navy);
    font-size:clamp(22px,2.6vw,30px);line-height:1.1;letter-spacing:-0.5px;margin:0;}
  .login-welcome-sub{font-family:var(--font-corp);font-size:14px;color:var(--gray-500);margin:5px 0 14px;}

  .login-field2{margin-bottom:10px;}
  .login-field2 label{display:block;font-family:var(--font-corp);font-size:13px;font-weight:600;
    color:var(--navy);margin-bottom:6px;}
  .login-field2 .field-wrap2{position:relative;display:flex;align-items:center;}
  .login-field2 .field-icon2{position:absolute;left:18px;top:50%;transform:translateY(-50%);
    display:flex;color:var(--gray-400);pointer-events:none;}
  .login-field2 input{width:100%;height:42px;background:#fff;border:1.5px solid var(--gray-200);
    color:var(--navy);padding:0 18px 0 48px;border-radius:12px;font-family:var(--font-corp);
    font-size:14.5px;transition:border-color .15s, box-shadow .15s, background .15s;}
  .login-field2 input::placeholder{color:var(--gray-400);}
  .login-field2 input:hover{border-color:#FBD9A8;background:#FFFBF5;}
  .login-field2 input:focus{outline:none;border-color:var(--safety);background:#fff;
    box-shadow:0 0 0 4px rgba(246,162,0,0.14);}
  .login-field2 input.has-toggle2{padding-right:52px;}
  .pw-toggle2{position:absolute;right:18px;top:50%;transform:translateY(-50%);background:none;
    border:none;color:var(--gray-500);display:flex;align-items:center;padding:4px;
    border-radius:6px;transition:color .15s;}
  .pw-toggle2:hover{color:var(--navy);}

  .login-row-between{display:flex;align-items:center;justify-content:space-between;margin:2px 0 10px;
    font-family:var(--font-corp);font-size:13.5px;}
  .login-remember{display:flex;align-items:center;gap:9px;color:var(--navy);cursor:pointer;
    background:none;border:none;padding:0;font:inherit;}
  .login-remember .cb-box{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--gray-200);
    background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s, border-color .15s;}
  .login-remember .cb-box.checked{background:var(--safety);border-color:var(--safety);color:#fff;}
  .login-forgot2{background:none;border:none;color:var(--safety);font-family:var(--font-corp);
    font-size:13.5px;font-weight:600;padding:0;}
  .login-forgot2:hover{color:#E67E00;text-decoration:underline;}

  .login-btn2{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;height:42px;
    background:var(--safety);color:#fff;border:none;border-radius:12px;font-family:var(--font-corp);
    font-size:15px;font-weight:700;transition:background .15s, transform .1s;}
  .login-btn2:hover:not(:disabled){background:#E67E00;}
  .login-btn2:active:not(:disabled){transform:translateY(1px);}
  .login-btn2:disabled{opacity:0.65;}

  .login-or2{display:flex;align-items:center;gap:14px;margin:10px 0;font-family:var(--font-corp);
    font-size:12px;font-weight:600;color:var(--gray-400);letter-spacing:0.6px;}
  .login-or2::before, .login-or2::after{content:'';flex:1;height:1px;background:var(--gray-200);}

  .login-btn-outline{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    height:42px;background:#fff;color:var(--navy);border:1.5px solid var(--safety);border-radius:12px;
    font-family:var(--font-corp);font-size:14.5px;font-weight:600;transition:background .15s;}
  .login-btn-outline:hover{background:#FFF7EC;}

  .login-back2{display:block;text-align:center;margin-top:10px;background:none;border:none;
    color:var(--gray-500);font-family:var(--font-corp);font-size:13px;width:100%;padding:8px;}
  .login-back2:hover{color:var(--navy);}

  /* Classes SEM o "2" (usadas fora da tela de login: UserForm, CameraScanner,
     import de listas, telas de senha etc.) — não têm relação com o redesign
     do login (que usa login-error2/success2/notice2 abaixo), mas ficaram
     sem NENHUMA regra de estilo depois que o redesign as tratou como só
     "seletor de compatibilidade de teste" (ver CLAUDE.md, seção "Login vira
     redesign premium"). Resultado: mensagem de erro/sucesso nesses lugares
     renderizava como texto puro, sem vermelho/verde nenhum — corrigido
     restaurando o estilo original dessas classes aqui. */
  .login-error{background:var(--danger-bg);border:1px solid var(--danger);color:var(--danger);
    border-radius:8px;padding:12px 14px;font-size:13px;margin-bottom:16px;}
  .login-success{background:var(--ok-bg);border:1px solid var(--ok);color:var(--ok);
    border-radius:8px;padding:12px 14px;font-size:13px;margin-bottom:16px;}
  .login-notice{background:var(--warn-bg);border:1px solid var(--warn);color:var(--warn);
    border-radius:8px;padding:12px 14px;font-size:13px;margin-bottom:16px;}

  .login-error2{display:flex;align-items:center;gap:8px;background:#FEF2F2;border:1px solid #FECACA;
    color:#B91C1C;border-radius:10px;padding:12px 14px;font-size:13.5px;font-family:var(--font-corp);
    margin-bottom:14px;}
  .login-success2{display:flex;align-items:center;gap:8px;background:#F0FDF4;border:1px solid #BBF7D0;
    color:#15803D;border-radius:10px;padding:12px 14px;font-size:13.5px;font-family:var(--font-corp);
    margin-bottom:14px;}
  .login-notice2{display:flex;align-items:center;gap:8px;background:#FFF7ED;border:1px solid #FED7AA;
    color:#9A5B13;border-radius:10px;padding:12px 14px;font-size:13.5px;font-family:var(--font-corp);
    margin-bottom:14px;}
  .login-inline-note2{font-family:var(--font-corp);font-size:12.5px;color:var(--gray-500);
    text-align:center;margin-top:10px;}

  .login-demo-toggle{display:flex;align-items:center;justify-content:center;gap:6px;
    width:100%;background:none;border:none;color:var(--gray-500);font-family:var(--font-corp);
    font-size:12px;font-weight:600;padding:6px;margin-top:12px;}
  .login-demo-toggle:hover{color:var(--navy);}

  .login-demo2{margin-top:12px;background:var(--gray-50);border:1px solid var(--gray-200);
    border-radius:14px;padding:16px 18px;}
  .login-demo2 .dc-sub2{font-family:var(--font-corp);font-size:11.5px;color:var(--gray-500);
    margin:0 0 12px;}
  .login-demo2 .dc-row2{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--gray-200);flex-wrap:wrap;}
  .login-demo2 .dc-row2:first-of-type{border-top:none;padding-top:0;}
  .login-demo2 .dc-avatar2{width:26px;height:26px;border-radius:50%;background:#fff;
    border:1px solid var(--gray-200);color:var(--gray-400);display:flex;align-items:center;
    justify-content:center;flex-shrink:0;}
  .login-demo2 .dc-cred2{flex:1;min-width:0;font-family:var(--font-mono);font-size:12px;color:var(--navy);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  @media (max-width:420px){
    .login-demo2 .dc-row2{gap:4px 10px;}
    .login-demo2 .dc-cred2{flex-basis:100%;order:1;white-space:normal;margin-left:36px;}
    .dc-role-pill{order:2;margin-left:36px;}
  }

  .login-role-note2{font-family:var(--font-corp);font-size:13px;color:var(--gray-500);
    background:var(--gray-50);border-radius:10px;border-left:3px solid var(--safety);padding:12px 14px;
    margin-bottom:20px;}

  .login-footer2{text-align:center;font-family:var(--font-corp);font-size:12.5px;color:var(--gray-500);
    margin-top:24px;line-height:1.8;}
  .login-footer2 .lf-restrict2{display:flex;align-items:center;justify-content:center;gap:6px;}

  @media (min-width:900px){
    /* 3ª imagem: veio em retrato de verdade dessa vez (928×1136, proporção
       ≈0.817:1), bem próxima da pedida (1150×1400, ≈0.821:1) — volta pra
       divisão 44/56 (marca/formulário) de antes da imagem em paisagem, só
       trocando a proporção do `aspect-ratio` pra bater com o arquivo real
       em vez do valor pedido (a diferença entre os dois é mínima, não vale
       a pena recalcular a divisão de colunas de novo por causa disso). Ver
       CLAUDE.md pro histórico completo dessa image (paisagem → retrato). */
    .login-shell{flex-direction:row;min-height:480px;}
    .login-brand{width:55%;flex-shrink:0;aspect-ratio:928/1136;max-height:720px;}
    .login-brand-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;}
    .login-form-col{width:45%;padding:24px 32px;}
  }
  /* Faixa de tablet/monitor pequeno (900-1150px de viewport): o formulário
     tem uma altura mínima de conteúdo que não encolhe proporcionalmente
     junto com a largura da coluna — a essa largura, a coluna de marca em
     44% ficava mais estreita do que a altura forçada (pelo stretch do
     formulário) permitia sem cortar a imagem (ver CLAUDE.md, "corte
     residual"). Corrigido dando mais largura à coluna de marca só nessa
     faixa (44%→54%) e apertando ainda mais o formulário (padding/campos/
     margens), que agora tem menos espaço horizontal disponível mas ainda
     cabe tudo confortavelmente. */
  @media (max-width:1150px) and (min-width:900px){
    .login-brand{width:54%;}
    .login-form-col{width:46%;padding:20px 24px;}
    .login-welcome-title{font-size:22px;}
    .login-field2{margin-bottom:10px;}
    .login-field2 input{height:42px;}
    .login-btn2, .login-btn-outline{height:42px;}
  }
  @media (max-width:899px){
    .login-form-col{padding:24px 24px;}
    .login-form-body{padding-top:4px;}
  }

  /* ---------------- LAYOUT DESKTOP (sidebar) — a partir de celular médio ----------------
     Esse bloco entra a partir de 360px (cobre praticamente qualquer celular moderno,
     incluindo iPhone 13 e maiores, além de tablet/monitor — ver CLAUDE.md "Dashboard
     novo funciona em qualquer largura de tela"). Abaixo de 768px a sidebar vira um
     painel sobreposto (overlay) que desliza por cima do conteúdo em vez de empurrá-lo,
     já que não cabe um menu fixo de 264px numa tela de celular. */
  .desktop-topbar, .sidebar, .sidebar-toggle, .sidebar-backdrop, .desktop-kpi-grid, .desktop-quick-grid, .desktop-cta-row, .pnl-wrap, .mobile-home-menu, .mobile-nav-bar{display:none;}

  @media (min-width:360px){
    .app{max-width:none;flex-direction:row;align-items:flex-start;position:relative;}
    .mobile-topbar, .bottom-nav{display:none;}
    /* SubBar (← Voltar + título) existia pra navegação mobile — no layout
       desktop ela só repetia o MESMO título que o DesktopTopbar já mostra
       (e às vezes uma 3ª vez dentro do próprio conteúdo da tela), sem
       nenhuma função que a Sidebar não cubra. Cliente reportou a
       redundância visual ("3 campos com a mesma informação"). */
    .subbar{display:none;}
    .app-main{flex:1;display:flex;flex-direction:column;min-width:0;}
    .content{padding:32px 40px 48px;max-width:1400px;margin:0 auto;width:100%;}

    .sidebar{display:flex;flex-direction:column;width:264px;flex-shrink:0;background:var(--navy);min-height:100vh;position:sticky;top:0;overflow:hidden;transition:width .18s ease;}
    .sidebar.collapsed{width:0;}
    .sidebar-toggle{display:flex;align-items:center;justify-content:center;position:absolute;top:24px;left:250px;width:28px;height:28px;border-radius:50%;background:var(--accent2);color:#fff;border:2px solid var(--bg);box-shadow:0 2px 6px rgba(0,0,0,0.18);z-index:30;transition:left .18s ease;}
    .sidebar-toggle:hover{background:#195a89;}
    .sidebar-toggle.collapsed{left:8px;}
    .sidebar-brand{padding:22px 22px 18px;border-bottom:1px solid rgba(255,255,255,0.08);width:264px;flex-shrink:0;box-sizing:border-box;text-align:center;}
    .sidebar-brand img{width:100%;max-width:170px;height:auto;display:block;margin:0 auto;}
    .sidebar-brand-divider{position:relative;height:1px;background:linear-gradient(90deg, transparent, var(--safety) 20%, var(--safety) 80%, transparent);margin:14px auto;width:70%;}
    .sidebar-brand-divider::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;border-radius:50%;background:var(--safety);box-shadow:0 0 0 3px var(--navy);}
    .sidebar-brand .product{font-family:var(--font-display);font-size:12px;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;color:#fff;}
    .sidebar-nav{padding:14px 12px;display:flex;flex-direction:column;gap:10px;width:264px;flex-shrink:0;box-sizing:border-box;}
    .sidebar-group{display:flex;flex-direction:column;gap:2px;}
    .sidebar-group-title{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.4);padding:6px 12px 4px;}

    /* Celular (360-767px): menu lateral completo (Sidebar/sidebar-toggle,

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const {useState, useMemo, useRef, useEffect} = React;

/* ---------------- SUPABASE (catálogo real de produtos) ----------------
   Primeiro pedaço do backend real aplicado (ver backend/schema.sql e
   CLAUDE.md "Catálogo real de produtos via Supabase"). A "publishable key"
   é segura de expor no navegador (mesmo papel da antiga "anon key") — as
   tabelas sensíveis (contagens, saldo) têm RLS; `produtos` hoje só tem
   leitura pública porque é só um catálogo de código→descrição, sem dado
   sigiloso. Login/usuários/inventários/contagens continuam 100% no
   localStorage por enquanto — essa migração é a próxima etapa, não esta. */
const SUPABASE_URL = 'https://geeqfpzamexmeketcecu.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_Wx-oyRE86XWz4bTSPWBe5A_8tXRpHJr';

// Cliente Supabase padrão — sessão sempre persiste no localStorage (default
// do supabase-js), sobrevive a fechar o navegador. Uma rodada anterior tinha
// criado um storage adapter próprio pra fazer o checkbox "Lembrar-me"
// controlar ISSO (persistir ou não a sessão) — o cliente esclareceu depois
// que não era esse o pedido: "Lembrar-me" precisa só manter os CAMPOS do
// formulário (usuário/e-mail) preenchidos da próxima vez, não controlar a
// sessão de login em si (ver `LOGIN_LEMBRADO_KEY` mais abaixo, perto de
// `LoginScreen`). Revertido pra configuração padrão, mais simples.
const supabaseClient = window.supabase
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY)
  : null;

// Garante que o socket do Realtime carregue o JWT de quem está logado —
// sem isso, os canais de postgres_changes (ver App(), perto de countsRef)
// silenciosamente não recebem NENHUM evento, porque a policy de RLS
// `auth.role() = 'authenticated'` das 4 tabelas nunca é satisfeita do lado
// de quem RECEBE o evento (a conexão do socket fica anônima por padrão até
// alguém anexar o token). Chamado sempre que a sessão muda (ver App(),
// getSession()/onAuthStateChange) — não custa nada chamar de novo com o
// mesmo token, e cobre o caso de o supabase-js não sincronizar isso sozinho
// automaticamente a tempo do primeiro canal ser assinado.
function sincronizarAuthRealtime(session){
  if(supabaseClient && supabaseClient.realtime && typeof supabaseClient.realtime.setAuth==='function'){
    supabaseClient.realtime.setAuth(session ? session.access_token : null);
  }
}

// Busca no catálogo real (85 mil+ produtos) por código ou descrição — única
// fonte de busca do app (o cache local de 300 SKUs foi removido, ver
// CLAUDE.md "Remoção do cache local de 300 SKUs"). Enriquece com saldo
// (estoque_saldo) e endereço (estoque_enderecos/enderecos) quando existirem;
// sem saldo carregado ainda pro código, o produto sintético monta com
// saldoSistema:null — CountStep já sabe tratar isso como "sem saldo pra
// comparar" (ver hasSaldoLocal).
//
// `almoxarifado` (obrigatório na prática — `ManualCountFlow` sempre pede
// pra escolher o armazém antes de liberar a busca) filtra o saldo pro
// armazém EXATO onde a pessoa está contando. Bug real corrigido aqui: a
// versão anterior somava o saldo de TODOS os armazéns onde o código
// existia — um item com saldo em 2 armazéns nunca batia com a contagem
// física, porque só existe saldo de UM armazém no local físico onde o item
// está. Cada linha de `estoque_saldo` já é por armazém (não precisa somar
// nada) — só faltava restringir a busca ao armazém certo.
async function searchSupabaseCatalog(query, almoxarifado){
  if(!supabaseClient || !query || query.trim().length < 2) return [];
  const q = query.trim();
  const { data, error } = await supabaseClient
    .from('produtos')
    .select('codigo, descricao, unidade, grupo, estoque_enderecos(saldo_no_endereco, enderecos(codigo))')
    .or(`codigo.ilike.%${q}%,descricao.ilike.%${q}%`)
    .limit(8);
  if(error || !data) return [];

  // Busca o saldo REAL (coluna "Saldo Atual" da planilha SB2, gravada em
  // estoque_saldo.saldo pelo upload manual — ver StockSyncPanel/
  // parseSB2Rows) pros códigos encontrados, restrito ao armazém informado —
  // no máximo 1 linha por código+armazém, então não precisa somar nada,
  // só pegar o valor direto. `estoque_saldo` não tem FK pra `produtos` (ver
  // backend/schema.sql), então é uma consulta separada, não um join
  // automático do PostgREST.
  const codigos = data.map(row=>row.codigo);
  const saldoPorCodigo = {};
  if(codigos.length>0 && almoxarifado){
    const { data: saldoRows } = await supabaseClient
      .from('estoque_saldo')
      .select('produto_codigo, saldo, almoxarifado')
      .in('produto_codigo', codigos)
      .eq('almoxarifado', almoxarifado);
    (saldoRows||[]).forEach(r=>{
      saldoPorCodigo[r.produto_codigo] = Number(r.saldo||0);
    });
  }

  return data.map(row=>{
    const enderecoRow = (row.estoque_enderecos && row.estoque_enderecos[0] && row.estoque_enderecos[0].enderecos) || null;
    return {
      codigo: row.codigo,
      descricao: row.descricao,
      unidade: row.unidade || null,
      familia: describeGrupo(row.grupo),
      endereco: enderecoRow ? enderecoRow.codigo : null,
      enderecoCadastrado: !!enderecoRow,
      almoxarifado: almoxarifado || '—',
      corredor: null,
      rua: null,
      // Sem saldo pra ESTE armazém específico = sem saldo pra comparar (não
      // é o mesmo que "código não existe no catálogo") — CountStep trata os
      // dois casos igual (hasSaldoLocal), mas aqui é importante não fingir
      // um saldo de outro armazém.
      saldoSistema: Object.prototype.hasOwnProperty.call(saldoPorCodigo, row.codigo) ? saldoPorCodigo[row.codigo] : null,
      custoUnit: 0,
      valorFinanceiro: 0,
      semMovimentoRecente: false,
      ultimaSaida: null,
      foraDoCacheLocal: true,
    };
  });
}

// Grava a contagem também no Supabase (além do localStorage, que continua
// sendo a fonte de verdade do app hoje). Sem Supabase Auth ainda — usuário e
// inventário vão como texto puro, sem FK pra usuarios/inventarios (esses
// continuam só locais). Continua "fire and forget" NO PONTO DE CHAMADA — quem
// chama (CountStep.finalize) não usa `await`, então uma contagem nunca trava
// esperando rede — mas agora a função RETORNA `{ok, erro}` em vez de nada,
// pra quem quiser reagir ao resultado via `.then()` sem bloquear (ver
// `marcarContagemSincronizada`/fila de retry em App()).
async function saveContagemToSupabase(count){
  if(!supabaseClient) return {ok:false, erro:'Supabase não configurado.'};
  try{
    const { error } = await supabaseClient.from('contagens').insert({
      id: count.id,
      inventario_id: count.inventario,
      produto_codigo: count.productCode,
      descricao: count.descricao,
      endereco: count.endereco,
      endereco_contado: count.enderecoContado,
      endereco_pendente_validacao: count.enderecoPendenteValidacao,
      usuario: count.usuario,
      numero_contagem: count.numeroContagem,
      contagem_anterior_id: count.contagemAnteriorId,
      qtd_contada: count.qtdContada,
      saldo_sistema: count.saldoSistema,
      diferenca: count.diferenca,
      percentual: count.percentual,
      valor_divergente: count.valorDivergente,
      fora_do_cache_local: count.foraDoCacheLocal,
      classificacao: count.classificacao ? count.classificacao.label : null,
      status_aprovacao: count.statusAprovacao,
      motivo: count.motivo,
      tem_foto: count.foto,
      observacao: count.observacao,
      almoxarifado: count.almoxarifado || null,
      familia: count.familia || null,
      data: count.data,
      hora: count.hora,
      diferenca_confirmada: !!count.diferencaConfirmada,
    });
    if(error){
      console.warn('Falha ao salvar contagem no Supabase (mantida no localStorage):', error.message);
      return {ok:false, erro:error.message};
    }
    return {ok:true};
  }catch(err){
    console.warn('Falha ao salvar contagem no Supabase (mantida no localStorage):', err);
    return {ok:false, erro:String(err && err.message || err)};
  }
}

// Atualiza status/decisão do líder numa contagem já existente — usada por
// `approveDivergence`/`requestRecountFromOperator` em App(). Diferente de
// `saveContagemToSupabase`, esta é sempre `await`ada por quem chama: decisão
// do líder precisa de confirmação visível (se falhar, o líder fica sabendo
// na hora, em vez de achar que aprovou e essa decisão nunca aparecer em
// outro aparelho). `patch` é um objeto parcial já em snake_case (colunas da
// tabela `contagens`); sempre inclui `atualizado_em`, usado pela
// sincronização pra saber qual lado é mais recente ao reconciliar.
async function updateContagemStatusToSupabase(id, patch){
  if(!supabaseClient) return {ok:false, erro:'Supabase não configurado.'};
  try{
    const { error } = await supabaseClient
      .from('contagens')
      .update({...patch, atualizado_em: new Date().toISOString()})
      .eq('id', id);
    if(error) return {ok:false, erro:error.message};
    return {ok:true};
  }catch(err){
    return {ok:false, erro:String(err && err.message || err)};
  }
}

// Reconstrói o objeto `count` no mesmo formato que CountStep.finalize() já usa
// localmente, a partir de uma linha da tabela `contagens` — usado ao ler
// contagens feitas em OUTROS aparelhos (ver fetchContagensFromSupabase).
// `classificacao` no banco é só o label (texto) — reconstrói um objeto
// mínimo compatível com os lugares que leem c.classificacao.label/.level/.rule.
// `aprovadoPor`/`aprovadoEm`/`recontagemSolicitada*`/`atualizadoEm` vêm das
// colunas adicionadas pra decisão do líder se propagar entre aparelhos (ver
// updateContagemStatusToSupabase) — `atualizadoEm` também é usado pela
// sincronização pra reconciliar (ver sync() em App()).
function contagemRowToLocal(row){
  return {
    id: row.id,
    // `reconstructNumericCode` aqui (não só no parser do upload) — mesmo
    // raciocínio já aplicado em `historicoRowToCountLike`: linhas semeadas
    // na tabela `contagens` ANTES da correção do parser de histórico (ver
    // `buildRecontarSeedsFromHistorico`) ficaram gravadas com o código cru,
    // sem pontuação (ex.: "12403100020" em vez de "124.031.00020") — e como
    // o upsert de recontagem usa `ignoreDuplicates:true`, reimportar a
    // mesma planilha depois do parser corrigido NÃO conserta essas linhas
    // já existentes. Reconstruir aqui, na leitura, corrige a exibição sem
    // precisar de nenhuma limpeza manual no banco.
    productCode: reconstructNumericCode(row.produto_codigo),
    descricao: row.descricao,
    endereco: row.endereco,
    enderecoContado: row.endereco_contado,
    enderecoPendenteValidacao: row.endereco_pendente_validacao,
    usuario: row.usuario,
    qtdContada: row.qtd_contada,
    saldoSistema: row.saldo_sistema,
    diferenca: row.diferenca,
    percentual: row.percentual,
    valorDivergente: row.valor_divergente,
    foraDoCacheLocal: row.fora_do_cache_local,
    classificacao: {label: row.classificacao, level: undefined, rule: ''},
    statusAprovacao: row.status_aprovacao,
    numeroContagem: row.numero_contagem,
    contagemAnteriorId: row.contagem_anterior_id,
    motivo: row.motivo,
    foto: row.tem_foto,
    observacao: row.observacao,
    almoxarifado: row.almoxarifado,
    familia: row.familia,
    data: row.data,
    hora: row.hora,
    inventario: row.inventario_id,
    aprovadoPor: row.aprovado_por,
    aprovadoEm: row.aprovado_em,
    recontagemSolicitadaPeloLider: row.recontagem_solicitada_pelo_lider,
    recontagemSolicitadaPor: row.recontagem_solicitada_por,
    recontagemSolicitadaEm: row.recontagem_solicitada_em,
    urgente: !!row.urgente,
    diferencaConfirmada: !!row.diferenca_confirmada,
    // Fluxo de SA de Ajuste/aprovação da Diretoria (ver App()) — `solicitacaoAjuste`
    // reaproveita o MESMO nome de campo já usado por `historicoRowToCountLike`
    // pra SA vinda da planilha antiga, unificando os dois casos num só lugar
    // de exibição (ver `ConcludedCountsPanel`).
    solicitacaoAjuste: row.numero_sa,
    saGeradaPor: row.sa_gerada_por,
    saGeradaEm: row.sa_gerada_em,
    reprovadoPelaDiretoria: !!row.reprovado_pela_diretoria,
    reprovadoPor: row.reprovado_por,
    reprovadoEm: row.reprovado_em,
    atualizadoEm: row.atualizado_em,
  };
}

// Busca TODAS as linhas de uma consulta, sem depender de um único `.limit()`
// — nem de um teto fixo no código, nem do limite de linhas por requisição
// configurado no projeto Supabase (Settings → API → Max Rows, geralmente
// 1000 por padrão no PostgREST). Esse teto do projeto corta o resultado
// SILENCIOSAMENTE — sem erro nenhum, `select *` simplesmente devolve menos
// linhas do que existem — foi exatamente o que sumiu com semanas inteiras
// do histórico em "Tendência Semanal" mesmo com o dado presente na tabela
// (confirmado pelo cliente: `count(*)` batia com o total esperado, mas a
// busca de linhas de verdade vinha incompleta). Pagina com `.range()` até
// vir uma página menor que `PAGE_SIZE` (ou vazia) — sinal de que chegou ao
// fim, não importa quantas linhas existam ao todo.
// `buildQuery` é uma FUNÇÃO que devolve um query builder novo a cada
// chamada (não um builder já construído) — necessário porque um builder do
// supabase-js só pode ser "executado" (via `await`) uma vez.
async function fetchTodasPaginado(buildQuery){
  const PAGE_SIZE = 1000;
  let offset = 0;
  let todas = [];
  while(true){
    const { data, error } = await buildQuery().range(offset, offset + PAGE_SIZE - 1);
    if(error) throw error;
    if(!data || data.length === 0) break;
    todas = todas.concat(data);
    if(data.length < PAGE_SIZE) break;
    offset += PAGE_SIZE;
  }
  return todas;
}

// Busca contagens gravadas em QUALQUER aparelho (ver saveContagemToSupabase) —
// usada só pra completar o histórico local com o que aconteceu em outros
// aparelhos, nunca substitui o que já existe localmente. Ordenação com
// tiebreaker (`id`) além de `criado_em` — necessário pra paginação ficar
// estável quando duas linhas têm o mesmo timestamp (sem isso, uma linha
// pode aparecer duas vezes ou nenhuma entre duas páginas).
async function fetchContagensFromSupabase(){
  if(!supabaseClient) return [];
  try{
    const data = await fetchTodasPaginado(() => supabaseClient
      .from('contagens')
      .select('*')
      .order('criado_em', {ascending:false})
      .order('id', {ascending:true}));
    return data.map(contagemRowToLocal);
  }catch(err){
    console.warn('Falha ao buscar contagens do Supabase:', err);
    return [];
  }
}
