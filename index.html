        <div className="m"><div className="k">Almoxarifado</div><div className="v">{product.almoxarifado}</div></div>
        <div className="m"><div className="k">Endereço</div><div className="v">{product.endereco || 'não cadastrado'}</div></div>
      </div>
      {typeof product.valorFinanceiro === 'number' && product.valorFinanceiro > 0 && (
        <div style={{padding:'0 18px 16px',display:'flex',gap:10,fontSize:11.5,color:'var(--ink-dim)',fontFamily:'var(--font-mono)',flexWrap:'wrap'}}>
          <span>Valor em estoque: R$ {product.valorFinanceiro.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
          {product.semMovimentoRecente && <span style={{color:'var(--warn)'}}>· sem saída recente</span>}
        </div>
      )}
    </div>
  );

  // Mensagem de feedback ao vivo, assim que existe um número digitado —
  // mesmos 3 níveis de `classifyDivergence`/`classifyDivergenceSemCusto`
  // (ok/warn/danger), que já é a regra de negócio real (aprovação
  // automática/segunda contagem/análise do líder) — não uma classificação
  // nova só de exibição. Usa `classification.rule` direto pros casos
  // warn/danger (em vez de frase fixa assumindo sempre a regra por R$) —
  // assim a mensagem fica certa tanto na regra normal quanto na rede de
  // segurança por percentual (item sem custo cadastrado).
  const feedbackTexto = !hasSaldoLocal
    ? classification.rule
    : classification.level==='ok' ? 'Contagem confere com o sistema.'
    : classification.rule;

  const progressoPct = (queueAtual && queueTotal) ? Math.round((queueAtual/queueTotal)*100) : null;
  const itensRestantes = (queueAtual && queueTotal) ? Math.max(queueTotal - queueAtual, 0) : null;
  // Prioridade da recontagem — deriva da MESMA classificação de severidade
  // já usada nos painéis de Recontagens/Itens Divergentes (classifySeverity4,
  // agora por valor de divergência), aplicada sobre a rodada ANTERIOR (é ela
  // que explica por que este item está sendo recontado). Só existe quando
  // `previousCount` existe.
  const previousSeverity = previousCount ? classifySeverity4(severidadeDe(previousCount)) : null;

  return (
    <div>
      {step!=='count' && (
        <div className="item-card" style={{marginBottom:14}}>
          <div className="item-card-head" style={{borderBottom:'none'}}>
            <div>
              <div className="item-code">{product.codigo}</div>
              <div className="item-desc">{product.descricao}</div>
            </div>
          </div>
        </div>
      )}

      {needsAddressInput && step==='enderecoManual' && (
        <div>
          <div className="field">
            <label>Endereço onde o item foi encontrado (formato NNN-L-N)</label>
            <input type="text" value={enderecoInformado} onChange={e=>setEnderecoInformado(formatEnderecoInput(e.target.value))} placeholder="Ex: 035-A-1" maxLength={7} />
          </div>
          {scanning ? (
            <CameraScanner onDetected={handleEnderecoManualScanDetected} onCancel={()=>setScanning(false)} />
          ) : (
            <button className="btn btn-primary" style={{marginBottom:14}} onClick={()=>setScanning(true)}><Ic>📷</Ic> Escanear código do endereço</button>
          )}
          <div className="divergence-alert" style={{marginBottom:14}}><Ic>📍</Ic><span>Este item ainda não tem endereço cadastrado no sistema. Escaneie a etiqueta da prateleira ou informe onde você encontrou — o endereço é obrigatório para contar, e essa informação será enviada para validação do líder.</span></div>
          {infoComplementar}
          <button className="btn btn-primary" disabled={!ENDERECO_REGEX.test(enderecoInformado)} onClick={confirmEnderecoManual}>Confirmar e continuar</button>
        </div>
      )}

      {hasAddress && step==='scan' && (
        <div>
          <div className="address-chip">{product.endereco}</div>
          {scanning ? (
            <CameraScanner onDetected={handleAddressScanDetected} onCancel={()=>setScanning(false)} />
          ) : (
            <div>
              <div className="scan-box">
                <div className="scan-frame"><div className="scan-corner-b1"></div><div className="scan-corner-b2"></div><div className="scan-laser"></div></div>
              </div>
              <p className="scanner-hint">Toque em "Escanear" e aponte a câmera para o QR Code do endereço</p>
              <button className="btn btn-primary" style={{marginBottom:10}} onClick={()=>setScanning(true)}><Ic>📷</Ic> Escanear com a câmera</button>
              {infoComplementar}
              <div className="scan-toggle-row">
                <button className="btn btn-outline" style={{fontSize:11.5}} onClick={()=>{simulateScan(false); setStep('scanResult');}}>Sem câmera: simular leitura errada</button>
                <button className="btn btn-outline" style={{fontSize:11.5}} onClick={()=>{simulateScan(true); setStep('scanResult');}}>Sem câmera: simular leitura certa</button>
              </div>
            </div>
          )}
        </div>
      )}

      {hasAddress && step==='scanResult' && (
        addressOk ? (
          <div>
            <div className="result-banner ok">
              <div className="rb-title"><Ic>✅</Ic> Endereço confirmado</div>
              <div className="rb-sub">Código lido: {scannedCode}</div>
            </div>
            {infoComplementar}
            <button className="btn btn-primary" onClick={()=>setStep('count')}>Continuar</button>
          </div>
        ) : (
          <div>
            <div className="result-banner warn">
              <div className="rb-title"><Ic>⚠</Ic> Atenção</div>
              <div className="rb-sub">Você está no endereço: <strong>{scannedCode}</strong><br/>O item está cadastrado no: <strong>{product.endereco}</strong></div>
            </div>
            {infoComplementar}
            <div className="btn-row">
              <button className="btn btn-secondary" onClick={()=>setStep('scan')}>Escanear novamente</button>
              <button className="btn btn-primary" onClick={()=>setStep('count')}>Contar mesmo assim</button>
            </div>
          </div>
        )
      )}

      {step==='count' && (
        <div className="cs-screen">
          {(progressoPct!=null || previousSeverity) && (
            <div className="cs-context">
              {progressoPct!=null && (
                <div className="cs-progress">
                  <div className="cs-progress-track"><div className="cs-progress-fill" style={{width:progressoPct+'%'}}></div></div>
                  <div className="cs-progress-meta">
                    <span>Item {queueAtual} de {queueTotal} · {progressoPct}%</span>
                    <span>Faltam {itensRestantes} itens</span>
                  </div>
                </div>
              )}
              {previousSeverity && (
                <span className="severity-chip" style={{background:previousSeverity.bg,color:previousSeverity.color}}>
                  <Ic>{previousSeverity.icon}</Ic> {previousSeverity.label==='Sem saldo' ? 'Sem saldo para comparar' : 'Divergência '+previousSeverity.label.toLowerCase()}
                </span>
              )}
            </div>
          )}

          <div className="cs-material">
            <div className="cs-material-info">
              <div className="cs-code">{product.codigo}</div>
              <div className="cs-desc">{product.descricao}</div>
            </div>
            <button type="button" className="cs-scan-btn" title="Escanear para conferir o item" onClick={()=>{setItemScanFeedback(null); setScanningItem(true);}}>
              <DIcon name="camera" size={24} />
            </button>
          </div>
          {scanningItem && (
            <div style={{marginTop:-4}}>
              <CameraScanner onDetected={handleItemVerifyScan} onCancel={()=>setScanningItem(false)} />
            </div>
          )}
          {itemScanFeedback && (
            <div className={"cs-scan-feedback "+(itemScanFeedback.ok ? 'ok' : 'warn')}>{itemScanFeedback.text}</div>
          )}

          {mostrarSaldo && (
            <div className="cs-sistema-ref">
              <div className="cs-sistema-k">Sistema</div>
              <div className="cs-sistema-v">{product.saldoSistema} {product.unidade || 'un.'}</div>
            </div>
          )}
          {mostrarSaldo && <div className="cs-sistema-arrow"><DIcon name="arrowDown" size={18} /></div>}
          <div className="cs-qty-label-row">
            <div className="cs-qty-label">{mostrarSaldo ? 'Informe a quantidade' : 'Quantidade encontrada'}</div>
            <button type="button" className="cs-calc-btn" title="Calculadora" aria-label="Calculadora" onClick={()=>{calcClear(); setCalcOpen(o=>!o);}}>
              <DIcon name="calculator" size={16} />
            </button>
          </div>
          <input
            className={"cs-qty-input"+(((mostrarSaldo || !hasSaldoLocal) && qty!=='') ? ' '+classification.level : '')}
            type="number"
            inputMode="decimal"
            value={qty}
            onChange={e=>setQty(e.target.value)}
            onWheel={e=>e.target.blur()}
            placeholder="0"
            autoFocus
          />
          {calcOpen && (
            <div className="cs-calc-panel">
              <div className="cs-calc-display">
                {calcAcc!=null && <span className="cs-calc-history">{calcAcc.replace('.', ',')} {calcOp}</span>}
                {calcCurrent.replace('.', ',')}
              </div>
              <div className="cs-calc-grid">
                <button type="button" className="cs-calc-key op" onClick={calcClear}>C</button>
                <button type="button" className="cs-calc-key op" onClick={calcBackspace}>⌫</button>
                <button type="button" className="cs-calc-key op" onClick={()=>calcOperator('÷')}>÷</button>
                <button type="button" className="cs-calc-key op" onClick={()=>calcOperator('×')}>×</button>
                <button type="button" className="cs-calc-key" onClick={()=>calcDigit(7)}>7</button>
                <button type="button" className="cs-calc-key" onClick={()=>calcDigit(8)}>8</button>
                <button type="button" className="cs-calc-key" onClick={()=>calcDigit(9)}>9</button>
                <button type="button" className="cs-calc-key op" onClick={()=>calcOperator('-')}>−</button>
                <button type="button" className="cs-calc-key" onClick={()=>calcDigit(4)}>4</button>
                <button type="button" className="cs-calc-key" onClick={()=>calcDigit(5)}>5</button>
                <button type="button" className="cs-calc-key" onClick={()=>calcDigit(6)}>6</button>
                <button type="button" className="cs-calc-key op" onClick={()=>calcOperator('+')}>+</button>
                <button type="button" className="cs-calc-key" onClick={()=>calcDigit(1)}>1</button>
                <button type="button" className="cs-calc-key" onClick={()=>calcDigit(2)}>2</button>
                <button type="button" className="cs-calc-key" onClick={()=>calcDigit(3)}>3</button>
                <button type="button" className="cs-calc-key equals" style={{gridRow:'span 2'}} onClick={calcEquals}>=</button>
                <button type="button" className="cs-calc-key" style={{gridColumn:'span 2'}} onClick={()=>calcDigit(0)}>0</button>
                <button type="button" className="cs-calc-key" onClick={calcDot}>,</button>
              </div>
              <button type="button" className="btn btn-primary" style={{width:'100%',marginTop:10}} onClick={calcUsarValor}>Usar valor na quantidade</button>
            </div>
          )}
          <div className="cs-shortcuts">
            <button type="button" onClick={()=>bumpQty(1)}>+1</button>
            <button type="button" onClick={()=>bumpQty(5)}>+5</button>
            <button type="button" onClick={()=>bumpQty(10)}>+10</button>
            <button type="button" onClick={()=>setQty('')}>Limpar</button>
          </div>

          {mostrarSaldo && qty!=='' && (
            <div className={"cs-compare "+classification.level}>
              <div className="cs-compare-grid">
                <div className="cs-compare-cell"><div className="k">Sistema</div><div className="v">{product.saldoSistema}</div></div>
                <div className="cs-compare-cell"><div className="k">Informado</div><div className="v">{qty}</div></div>
                <div className="cs-compare-cell"><div className="k">Diferença</div><div className="v">{(diffAbs>0?'+':'')+diffAbs}</div></div>
              </div>
              <div className="cs-feedback"><span className="cs-dot"></span>{feedbackTexto}</div>
            </div>
          )}
          {!hasSaldoLocal && qty!=='' && (
            <div className={"cs-compare "+classification.level}>
              <div className="cs-compare-grid">
                <div className="cs-compare-cell"><div className="k">Sistema</div><div className="v">—</div></div>
                <div className="cs-compare-cell"><div className="k">Informado</div><div className="v">{qty}</div></div>
                <div className="cs-compare-cell"><div className="k">Diferença</div><div className="v">—</div></div>
              </div>
              <div className="cs-feedback"><span className="cs-dot"></span>{feedbackTexto}</div>
            </div>
          )}
          {mostrarSaldo===false && hasSaldoLocal && user.perfil==='operador' && qty!=='' && (
            <div className="role-note" style={{marginBottom:0}}>Contagem cega — o saldo do sistema fica oculto pra você durante a contagem.</div>
          )}

          <div className="cs-mini-grid">
            <div className="cs-mini"><div className="k">Unidade</div><div className="v">{product.unidade || '—'}</div></div>
            <div className="cs-mini"><div className="k">Família</div><div className="v">{product.familia || '—'}</div></div>
            <div className="cs-mini"><div className="k">Almox</div><div className="v">{product.almoxarifado || '—'}</div></div>
            <div className="cs-mini"><div className="k">Endereço</div><div className="v">{product.endereco || 'não cadastrado'}</div></div>
          </div>

          {previousCount && (
            <div className="cs-top">
              <span className="cs-round-badge">{numeroContagem}ª CONTAGEM</span>
              <div className="cs-top-sep"></div>
              <div className="cs-top-block">
                <div className="cs-top-k">{previousCount.numeroContagem}ª contagem</div>
                <div className="cs-top-v">{previousCount.qtdContada} {product.unidade || 'un.'}</div>
              </div>
              <div className="cs-top-block">
                <div className="cs-top-k">Operador</div>
                <div className="cs-top-v">{previousCount.usuario}</div>
              </div>
              <div className="cs-top-block">
                <div className="cs-top-k">{previousCount.data}</div>
                <div className="cs-top-v">{previousCount.hora || ''}</div>
              </div>
            </div>
          )}

          <div className="cs-footer">
            <div className="cs-footer-row">
              <div className="cs-footer-qtywrap">
                <div className="cs-footer-label">Quantidade</div>
                <div className="cs-footer-qty">{qty===''?'0':qty}</div>
              </div>
              <button className="btn btn-primary cs-footer-btn" disabled={qty===''} onClick={finalize}>Confirmar Contagem</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------------- MÓDULO 2: CONTAGEM ALEATÓRIA ---------------- */

function RandomCountFlow({inv, user, onRegisterCount, onFinish, onAddressProposed, setInventories, counts, operadorVeSaldo, gruposExcluidos}){
  // Armazém obrigatório em TODA contagem por este motor (pedido do
  // cliente: item com saldo em mais de um armazém nunca batia, porque a
  // busca não era presa a um armazém físico específico). Um inventário
  // criado via NewInventory já tem `inv.almoxarifado` (campo obrigatório na
  // criação) — só a versão AVULSA (Aleatória/Grupo escolhidos direto na
  // tela rápida do operador, sem criar inventário) ainda não tem essa
  // informação, e precisa perguntar aqui antes de buscar qualquer item.
  const invAlmoxarifados = (inv && inv.almoxarifado) ? inv.almoxarifado.split(',').map(s=>normalizarCodigoAlmox(s)).filter(Boolean) : null;
  const [armazemAdHoc, setArmazemAdHoc] = useState('');
  const almoxarifadosFiltro = invAlmoxarifados || (armazemAdHoc ? [armazemAdHoc] : null);

  // Lista priorizada de itens vem do Supabase agora (RPC
  // contagem_itens_prioritarios — cache local estático removido, ver
  // CLAUDE.md "cache local removido"). Critério: item sem saída recente
  // primeiro, depois por valor financeiro decrescente (curva A) — calculado
  // no banco, não mais no navegador. Busca uma vez ao montar (só depois do
  // armazém definido); a fila (useCountQueue) e o retomar por "contados"
  // continuam iguais assim que a lista chega.
  const [allItems, setAllItems] = useState(null); // null = carregando
  useEffect(()=>{
    if(!almoxarifadosFiltro) return; // esperando o armazém ser escolhido (avulso)
    let cancelado = false;
    const qtd = (inv && inv.qtdItens) || 5;
    // "Contagem por Grupo" filtra a busca pelos grupos salvos no inventário
    // (`inv.grupo`, texto com códigos separados por vírgula — pode ser mais
    // de um) — os outros tipos passam `undefined`, sem filtro, mesmo
    // comportamento de sempre.
    const gruposFiltro = (inv && inv.grupo) ? inv.grupo.split(',').filter(Boolean) : undefined;
    fetchContagemItensPrioritarios(Math.max(qtd, 25), gruposFiltro, almoxarifadosFiltro, gruposExcluidos).then(itens=>{
      if(cancelado) return;
      // Sequência de endereço: itens com endereço cadastrado vêm primeiro,
      // ordenados por corredor → rua → endereço (deslocamento físico menor);
      // itens sem endereço cadastrado ainda ficam depois, na ordem por valor
      // (a RPC já devolve nessa ordem de valor/movimento).
      function ordenarPorEndereco(lista){
        const comEndereco = lista.filter(p=>p.enderecoCadastrado).sort((a,b)=>
          (a.corredor||'').localeCompare(b.corredor||'') ||
          (a.rua||'').localeCompare(b.rua||'') ||
          (a.endereco||'').localeCompare(b.endereco||'')
        );
        const semEndereco = lista.filter(p=>!p.enderecoCadastrado);
        return [...comEndereco, ...semEndereco];
      }
      // Prioriza itens que AINDA NÃO foram contados (pedido do cliente) —
      // um código com qualquer contagem já registrada (qualquer inventário/
      // rodada, qualquer status) só entra na fila se sobrar vaga depois de
      // esgotar os itens nunca contados. Snapshot de `counts` tirado no
      // momento em que a lista é montada (mesmo padrão de "não re-sortear a
      // cada remontagem" já usado aqui) — não muda a ordem no meio da fila.
      const codigosJaContados = new Set((counts||[]).map(c=>c.productCode));
      const naoContados = itens.filter(p=>!codigosJaContados.has(p.codigo));
      const jaContados = itens.filter(p=>codigosJaContados.has(p.codigo));
      setAllItems([...ordenarPorEndereco(naoContados), ...ordenarPorEndereco(jaContados)].slice(0, qtd));
    });
    return ()=>{ cancelado = true; };
    // `almoxarifadosFiltro`/`gruposExcluidos` são arrays recriados a cada
    // render — usa a versão "achatada" em texto como dependência (join),
    // senão o efeito refaria a busca em TODO render só por causa da
    // identidade do array mudar.
  }, [inv, almoxarifadosFiltro ? almoxarifadosFiltro.join(',') : null, gruposExcluidos ? gruposExcluidos.join(',') : '']);

  // Ao voltar para este inventário no meio da fila, retoma a partir de
  // "contados" — mesmo padrão usado em ImportedListCountFlow — em vez de
  // recomeçar do item 1 a cada re-entrada.
  const jaContados = inv ? (inv.contados || 0) : 0;
  const pendentes = useMemo(()=> allItems ? allItems.slice(jaContados) : [], [allItems, jaContados]);
  const q = useCountQueue(pendentes);

  if(!almoxarifadosFiltro){
    return <ArmazemGate onSelected={setArmazemAdHoc} />;
  }

  if(allItems===null){
    return <div className="empty-state" style={{padding:20}}>Carregando itens para contagem…</div>;
  }

  if(q.done){
    return (
      <div className="empty-state">
        <div className="ic"><Ic size={40}>🎉</Ic></div>
        Fila de contagem concluída.
        <div style={{marginTop:16}}><button className="btn btn-primary" onClick={onFinish}>Voltar aos inventários</button></div>
      </div>
    );
  }

  return (
    <div>
      <div className="role-note">Armazém {almoxarifadosFiltro.map(a=>a.padStart(2,'0')).join(', ')} · Itens ainda não contados primeiro, depois por sequência de endereço{inv && inv.grupo ? (' · Grupo: ' + inv.grupo.split(',').filter(Boolean).map(formatGrupoLabel).join(', ')) : ''}</div>
      <CountStep
        key={q.current.codigo}
        product={q.current}
        user={user}
        inv={inv}
        counts={counts}
        queueAtual={jaContados+q.idx+1}
        queueTotal={allItems.length}
        onAddressProposed={onAddressProposed}
        operadorVeSaldo={operadorVeSaldo}
        onComplete={(c)=>{
          if(inv && inv.id){ setInventories(prev=>prev.map(i=>i.id===inv.id?{...i, contados:i.contados+1}:i)); incrementContadosSupabase(inv.id); }
          onRegisterCount(c);
          q.next();
        }}
      />
    </div>
  );
}

/* ---------------- MÓDULO 3: CONTAGEM MANUAL ---------------- */

// Escolha de armazém, compartilhada pelos fluxos avulsos (Manual, Aleatória/
// Grupo/Rota quando não vêm de um inventário já criado com almoxarifado
// definido) — cliente reportou que um item com saldo em mais de um armazém
// nunca batia na contagem, porque a comparação não sabia em qual armazém a
// pessoa estava fisicamente. Cada fluxo guarda o armazém escolhido no
// próprio estado local (não precisa criar inventário nenhum pra isso).
function ArmazemGate({onSelected, titulo}){
  const [armazens, setArmazens] = useState(null); // null = carregando
  useEffect(()=>{
    let cancelado = false;
    fetchEstoqueValorPorAlmoxarifado().then(rows=>{
      if(cancelado) return;
      setArmazens((rows||[]).map(r=>String(r.almoxarifado)).sort());
    });
    return ()=>{ cancelado = true; };
  }, []);
  const [valor, setValor] = useState('');

  return (
    <div>
      <div className="role-note" style={{marginBottom:16}}>{titulo || 'Antes de buscar um item, informe em qual armazém você está fisicamente — o saldo do sistema só compara certo com o armazém certo.'}</div>
      <div className="field">
        <label>Armazém</label>
        {armazens===null ? (
          <div className="empty-state" style={{padding:14}}>Carregando armazéns…</div>
        ) : armazens.length===0 ? (
          <div className="empty-state" style={{padding:14}}>Nenhum armazém com saldo carregado ainda.</div>
        ) : (
          <select value={valor} onChange={e=>setValor(e.target.value)}>
            <option value="">Selecione o armazém…</option>
            {armazens.map(a=>(
              <option key={a} value={a}>Armazém {a.padStart(2,'0')}</option>
            ))}
          </select>
        )}
      </div>
      <button className="btn btn-primary" disabled={!valor} onClick={()=>onSelected(valor)}>Confirmar armazém</button>
    </div>
  );
}

function ManualCountFlow({user, onFinish, onAddressProposed, counts, operadorVeSaldo}){
  const [armazem, setArmazem] = useState('');
  const [query, setQuery] = useState('');
  const [selected, setSelected] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);

  // Busca só no catálogo real via Supabase (produtos + estoque_saldo +
  // estoque_enderecos, ver searchSupabaseCatalog) — o cache local estático
  // de 300 SKUs foi removido (ver CLAUDE.md "cache local removido"), o
  // Supabase é a única fonte agora. Debounce de 350ms pra não disparar uma
  // requisição a cada tecla. Só dispara depois do armazém escolhido — a
  // busca precisa saber em qual armazém comparar o saldo.
  useEffect(()=>{
    if(!armazem || !query){ setResults([]); setLoading(false); return; }
    let cancelado = false;
    setLoading(true);
    const timer = setTimeout(async ()=>{
      const found = await searchSupabaseCatalog(query, armazem);
      if(!cancelado){ setResults(found); setLoading(false); }
    }, 350);
    return ()=>{ cancelado = true; clearTimeout(timer); };
  }, [query, armazem]);

  if(!armazem){
    return <ArmazemGate onSelected={setArmazem} />;
  }

  if(selected){
    return <CountStep product={selected} user={user} counts={counts} onAddressProposed={onAddressProposed} onComplete={(c)=>onFinish(c)} expectAddressCheck={true} operadorVeSaldo={operadorVeSaldo} />;
  }

  function handleScanDetected(text){
    setScanning(false);
    setQuery(text.trim());
  }

  return (
    <div>
      <div className="role-note" style={{marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
        <span>Contando no <strong>Armazém {armazem.padStart(2,'0')}</strong></span>
        <button type="button" className="back-btn" style={{marginBottom:0}} onClick={()=>{ setArmazem(''); setQuery(''); setResults([]); }}>Trocar armazém</button>
      </div>
      {scanning ? (
        <CameraScanner onDetected={handleScanDetected} onCancel={()=>setScanning(false)} />
      ) : (
        <button className="btn btn-primary" style={{marginBottom:14}} onClick={()=>setScanning(true)}><Ic>📷</Ic> Escanear código de barras / QR do item</button>
      )}
      <div className="field">
        <label>Ou buscar por código, descrição ou código de barras</label>
        <input type="text" value={query} onChange={e=>setQuery(e.target.value)} placeholder="Ex: 000.35310 ou parafuso" />
      </div>
      {loading && <div className="empty-state" style={{padding:20}}>Buscando no catálogo…</div>}
      {!loading && results.length===0 && query && <div className="empty-state" style={{padding:20}}>Nenhum item encontrado.</div>}
      {results.map(p=>(
        <div key={p.codigo} className="list-row" onClick={()=>setSelected(p)}>
          <div>
            <div className="lr-title">{p.descricao}</div>
            <div className="lr-sub">{p.codigo} · {p.enderecoCadastrado ? p.endereco : 'sem endereço cadastrado'}</div>
          </div>
          <span className="chevron"><Ic>›</Ic></span>
        </div>
      ))}
    </div>
  );
}

/* ---------------- MÓDULO 4: CONTAGEM POR ROTA ---------------- */

function RouteCountFlow({inv, user, onRegisterCount, onFinish, onAddressProposed, setInventories, counts, operadorVeSaldo, gruposExcluidos}){
  // Armazém obrigatório (mesmo motivo do RandomCountFlow) — se `inv` já vem
  // de um inventário criado do tipo "Contagem por Rota de Endereço" (ver
  // InventoryList), o almoxarifado já está definido ali; a versão avulsa
  // (operador, "Nova Contagem" → "Contagem por Rota") pergunta na hora.
  const invAlmoxarifados = (inv && inv.almoxarifado) ? inv.almoxarifado.split(',').map(s=>normalizarCodigoAlmox(s)).filter(Boolean) : null;
  const [armazemAdHoc, setArmazemAdHoc] = useState('');
  const almoxarifadosFiltro = invAlmoxarifados || (armazemAdHoc ? [armazemAdHoc] : null);

  // Busca itens priorizados no Supabase (mesma RPC do RandomCountFlow, com
  // limite maior já que aqui interessa toda a rota, não só `qtdItens`) e
  // agrupa por corredor/rua os que já têm endereço cadastrado.
  const [anyAddress, setAnyAddress] = useState(null); // null = carregando
  const [grouped, setGrouped] = useState(null);
  useEffect(()=>{
    if(!almoxarifadosFiltro) return; // esperando o armazém ser escolhido
    let cancelado = false;
    const gruposFiltro = (inv && inv.grupo) ? inv.grupo.split(',').filter(Boolean) : undefined;
    fetchAnyAddressRegistered().then(async (hasAny)=>{
      if(cancelado) return;
      setAnyAddress(hasAny);
      if(!hasAny) return;
      const itens = await fetchContagemItensPrioritarios(200, gruposFiltro, almoxarifadosFiltro, gruposExcluidos);
      if(cancelado) return;
      const byCorredor = {};
      itens.filter(p=>p.enderecoCadastrado).forEach(p=>{
        byCorredor[p.corredor] = byCorredor[p.corredor] || {};
        byCorredor[p.corredor][p.rua] = byCorredor[p.corredor][p.rua] || [];
        byCorredor[p.corredor][p.rua].push(p);
      });
      setGrouped(byCorredor);
    });
    return ()=>{ cancelado = true; };
  }, [almoxarifadosFiltro ? almoxarifadosFiltro.join(',') : null, gruposExcluidos ? gruposExcluidos.join(',') : '', inv && inv.grupo]);

  // Corredor escolhido pra contar agora (ex.: "hoje o 010, amanhã o 019") —
  // pedido do cliente: em vez de despejar TODOS os corredores numa lista só
  // pra clicar item a item, escolhe um corredor e a fila libera sozinha, em
  // sequência (rua → endereço), item após item — mesmo padrão de fila
  // auto-avançando já usado em RandomCountFlow/ImportedListCountFlow.
  const [corredorEscolhido, setCorredorEscolhido] = useState(null);

  // Itens já contados (qualquer corredor, qualquer rodada) — mesmo critério
  // já usado em RandomCountFlow (`codigosJaContados`). Usado pra excluir da
  // fila em vez de basear o "retomar" numa posição fixa: como o operador
  // pode escolher um corredor DIFERENTE a cada vez que entra, não existe um
  // índice único de progresso — cada item já contado simplesmente some de
  // qualquer corredor em que apareça, não importa quando/onde foi contado.
  const codigosJaContados = useMemo(()=> new Set((counts||[]).map(c=>c.productCode)), [counts]);

  // Lista achatada e ordenada (rua → endereço) só do corredor escolhido, sem
  // os itens já contados — "libera na sequência do corredor".
  const itensCorredor = useMemo(()=>{
    if(!grouped || !corredorEscolhido || !grouped[corredorEscolhido]) return [];
    const flat = [];
    Object.keys(grouped[corredorEscolhido]).sort().forEach(rua=>{
      grouped[corredorEscolhido][rua]
        .slice()
        .sort((a,b)=>(a.endereco||'').localeCompare(b.endereco||''))
        .forEach(p=>flat.push(p));
    });
    return flat.filter(p=>!codigosJaContados.has(p.codigo));
  }, [grouped, corredorEscolhido, codigosJaContados]);

  const q = useCountQueue(itensCorredor);

  if(!almoxarifadosFiltro){
    return <ArmazemGate onSelected={setArmazemAdHoc} />;
  }

  if(anyAddress===null){
    return <div className="empty-state" style={{padding:20}}>Verificando endereços cadastrados…</div>;
  }

  if(!anyAddress || !grouped){
    return (
      <div className="empty-state">
        <div className="ic"><Ic size={40}>🗺</Ic></div>
        Nenhum endereço cadastrado ainda neste almoxarifado.<br/>
        A contagem por rota é liberada assim que o líder validar os primeiros endereços informados pelos operadores (veja "Endereços Pendentes" em Configurações).
      </div>
    );
  }

  if(!corredorEscolhido){
    const corredores = Object.keys(grouped).sort();
    return (
      <div>
        <div className="role-note">Armazém {almoxarifadosFiltro.map(a=>a.padStart(2,'0')).join(', ')} · Escolha o corredor que vai contar agora</div>
        {corredores.map(cor=>{
          const totalCor = Object.values(grouped[cor]).reduce((s,arr)=>s+arr.length, 0);
          const pendentesCor = Object.values(grouped[cor]).reduce((s,arr)=>s+arr.filter(p=>!codigosJaContados.has(p.codigo)).length, 0);
          return (
            <div key={cor} className="list-row" onClick={()=>pendentesCor>0 && setCorredorEscolhido(cor)} style={pendentesCor===0 ? {opacity:0.55,cursor:'default'} : undefined}>
              <div>
                <div className="lr-title">Corredor {cor}</div>
                <div className="lr-sub">{pendentesCor===0 ? `${totalCor} itens — todos já contados` : `${pendentesCor} de ${totalCor} itens ainda por contar`}</div>
              </div>
              {pendentesCor>0 && <span className="chevron"><Ic>›</Ic></span>}
            </div>
          );
        })}
      </div>
    );
  }

  if(q.done){
    return (
      <div className="empty-state">
        <div className="ic"><Ic size={40}>🎉</Ic></div>
        Corredor {corredorEscolhido} concluído.
        <div className="btn-row" style={{marginTop:16,justifyContent:'center'}}>
          <button className="btn btn-secondary" onClick={()=>setCorredorEscolhido(null)}>Escolher outro corredor</button>
          {onFinish && <button className="btn btn-primary" onClick={onFinish}>Voltar aos inventários</button>}
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="role-note" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,flexWrap:'wrap'}}>
        <span>Corredor {corredorEscolhido} · item {q.idx+1} de {q.total}</span>
        <button className="btn btn-secondary" style={{padding:'4px 12px',fontSize:12}} onClick={()=>setCorredorEscolhido(null)}>Trocar corredor</button>
      </div>
      <CountStep
        key={q.current.codigo}
        product={q.current}
        user={user}
        inv={inv}
        counts={counts}
        queueAtual={q.idx+1}
        queueTotal={q.total}
        onAddressProposed={onAddressProposed}
        operadorVeSaldo={operadorVeSaldo}
        onComplete={(c)=>{
          if(inv && inv.id){ setInventories(prev=>prev.map(i=>i.id===inv.id?{...i, contados:i.contados+1}:i)); incrementContadosSupabase(inv.id); }
          onRegisterCount(c);
          q.next();
        }}
      />
    </div>
  );
}

/* ---------------- MÓDULO 1B: CONTAGEM POR LISTA IMPORTADA (Excel) ---------------- */

function ImportedListCountFlow({inv, user, onRegisterCount, onFinish, onAddressProposed, setInventories, counts, operadorVeSaldo}){
  // Enriquece a lista importada com o catálogo real do Supabase (busca em
  // lote, uma requisição só pra todos os códigos da planilha — cache local
  // estático removido, ver CLAUDE.md "cache local removido"). Roda uma vez
  // ao montar; a planilha continua prevalecendo sobre o catálogo quando traz
  // endereço/saldo próprios (mesma prioridade de antes).
  const [allItems, setAllItems] = useState(null); // null = carregando
  useEffect(()=>{
    let cancelado = false;
    const lista = (inv && inv.itensImportados) || [];
    const codigos = lista.map(item=>item.codigo);
    fetchProdutosByCodigos(codigos).then(catalogo=>{
      if(cancelado) return;
      setAllItems(lista.map(item=>{
        const doCatalogo = catalogo.get(item.codigo);
        if(doCatalogo){
          return {
            ...doCatalogo,
            // planilha trouxe um endereço e o catálogo ainda não tem — usa o da planilha
            ...(item.endereco && !doCatalogo.enderecoCadastrado ? {endereco:item.endereco, enderecoCadastrado:true} : {}),
            // saldo da própria planilha é mais recente que o catálogo — prevalece quando informado
            ...(item.saldoSistema!=null ? {saldoSistema:item.saldoSistema} : {}),
          };
        }
        // código não está no catálogo — monta o item a partir do que a
        // própria planilha trouxe (fallback documentado no CLAUDE.md). A
        // coluna "Sistema" da planilha (item.saldoSistema) é o que permite
        // comparar o saldo mesmo assim — sem ela, fica null e a contagem vai
        // sem comparação automática para revisão do líder.
        return {
          codigo: item.codigo,
          descricao: item.descricao || item.codigo,
          unidade: null,
          familia: '—',
          endereco: item.endereco || null,
          enderecoCadastrado: !!item.endereco,
          almoxarifado: item.almoxarifado || (inv ? inv.almoxarifado : '—'),
          corredor: null,
          rua: null,
          saldoSistema: item.saldoSistema,
          custoUnit: 0,
          valorFinanceiro: 0,
          semMovimentoRecente: false,
          ultimaSaida: null,
          foraDoCacheLocal: true,
        };
      }));
    });
    return ()=>{ cancelado = true; };
  }, [inv]);

  // A lista é sempre percorrida na ordem original; ao voltar para este
  // inventário depois de contar alguns itens, retoma exatamente de onde
  // parou usando "contados" — sem isso, cada vez que a tela remonta a fila
  // reiniciaria do item 1 (mesmo problema que a Contagem Aleatória já tem,
  // mas aqui seria pior: o operador nunca chegaria ao 2º item da planilha).
  const jaContados = inv ? (inv.contados || 0) : 0;
  const pendentes = useMemo(()=> allItems ? allItems.slice(jaContados) : [], [allItems, jaContados]);
  const q = useCountQueue(pendentes);

  if(allItems===null){
    return <div className="empty-state" style={{padding:20}}>Carregando itens da lista importada…</div>;
  }

  if(allItems.length===0){
    return <div className="empty-state"><div className="ic"><Ic size={40}>📄</Ic></div>Esta lista importada não tem itens válidos.</div>;
  }

  if(q.done){
    return (
      <div className="empty-state">
        <div className="ic"><Ic size={40}>🎉</Ic></div>
        {inv && inv.tipo==='Itens Específicos' ? 'Fila concluída' : 'Lista importada concluída'} — todos os {allItems.length} itens foram contados.
        <div style={{marginTop:16}}><button className="btn btn-primary" onClick={onFinish}>Voltar aos inventários</button></div>
      </div>
    );
  }

  return (
    <div>
      <div className="role-note">
        {inv && inv.tipo==='Itens Específicos'
          ? ('Fila de itens específicos'+(inv?' de '+inv.nome:'')+' — ordem em que foram adicionados')
          : ('Lista importada'+(inv?' de '+inv.nome:'')+' — ordem original da planilha')}
      </div>
      <CountStep
        key={q.current.codigo}
        product={q.current}
        user={user}
        inv={inv}
        counts={counts}
        queueAtual={jaContados+q.idx+1}
        queueTotal={allItems.length}
        onAddressProposed={onAddressProposed}
        operadorVeSaldo={operadorVeSaldo}
        onComplete={(c)=>{
          if(inv && inv.id){ setInventories(prev=>prev.map(i=>i.id===inv.id?{...i, contados:i.contados+1}:i)); incrementContadosSupabase(inv.id); }
          onRegisterCount(c);
          q.next();
        }}
      />
    </div>
  );
}

/* ---------------- MÓDULO 7: RECONTAGEM E ANÁLISE DE DIVERGÊNCIAS ---------------- */

function RecountFlow({original, user, onFinish, onAddressProposed, operadorVeSaldo}){
  // Busca ao vivo no catálogo real (cache local estático removido, ver
  // CLAUDE.md "cache local removido"). Se não encontrar ou a rede falhar,
  // cai pro MESMO fallback sintético de sempre, montado a partir do que a
  // própria contagem anterior (`original`) já registrou — sem isso a
  // recontagem quebrava com "item não encontrado" pra qualquer contagem
  // originada fora do catálogo.
  const [produtoBase, setProdutoBase] = useState(null); // null = carregando
  useEffect(()=>{
    let cancelado = false;
    // Recontagem repete a comparação no MESMO armazém da contagem original
    // (`original.almoxarifado`, gravado desde CountStep.finalize) — sem
    // isso, um item com saldo em mais de um armazém corria o risco de a
    // recontagem comparar contra um armazém errado. Contagens antigas (de
    // antes dessa coluna existir) não têm esse dado — `fetchProdutosByCodigos`
    // já sabe se virar sozinho nesse caso (usa o saldo se o código só
    // existir num armazém, senão marca como sem comparação automática).
    fetchProdutosByCodigos([original.productCode], original.almoxarifado).then(catalogo=>{
      if(cancelado) return;
      setProdutoBase(catalogo.get(original.productCode) || {
        codigo: original.productCode,
        descricao: original.descricao,
        unidade: null,
        familia: '—',
        endereco: null,
        enderecoCadastrado: false,
        almoxarifado: original.almoxarifado || '—',
        corredor: null,
        rua: null,
        saldoSistema: original.saldoSistema,
        custoUnit: 0,
        valorFinanceiro: 0,
        semMovimentoRecente: false,
        ultimaSaida: null,
        foraDoCacheLocal: true,
      });
    });
    return ()=>{ cancelado = true; };
  }, [original.productCode, original.almoxarifado]);

  if(produtoBase===null){
    return <div className="empty-state" style={{padding:20}}>Carregando item…</div>;
  }

  // Item sem cadastro de endereço (comum — o Protheus ainda não tem esse
  // dado) — na recontagem, reaproveita o endereço que o operador da 1ª
  // contagem informou/confirmou, em vez de pedir de novo pra quem está
  // recontando (ele não teria como adivinhar onde o item foi encontrado da
  // primeira vez). Só preenche `endereco` pra exibição — mantém
  // `enderecoCadastrado:false` de propósito, pra não forçar uma etapa de
  // leitura de QR Code num endereço que nunca foi formalmente cadastrado.
  const enderecoContagemAnterior =
    (original.enderecoContado && original.enderecoContado!=='—' && original.enderecoContado) ||
    (original.endereco && original.endereco!=='—' && original.endereco) ||
    null;
  const product = (!produtoBase.enderecoCadastrado && !produtoBase.endereco && enderecoContagemAnterior)
    ? {...produtoBase, endereco: enderecoContagemAnterior}
    : produtoBase;

  const sameUser = user.nome === original.usuario;
  return (
    <div>
      {sameUser && (
        <div className="divergence-alert">
          <Ic>⚠</Ic>
          <span>Pelo Módulo 7 do processo, a segunda contagem deve ser feita por outro operador — você está logado como {user.nome}, o mesmo da contagem anterior. Pode continuar, mas o ideal é pedir para outro operador recontar.</span>
        </div>
      )}
      <CountStep
        product={product}
        user={user}
        onAddressProposed={onAddressProposed}
        onComplete={onFinish}
        numeroContagem={original.numeroContagem+1}
        contagemAnteriorId={original.id}
        previousCount={original}
        expectAddressCheck={!!product.enderecoCadastrado}
        operadorVeSaldo={operadorVeSaldo}
      />
    </div>
  );
}

// Fila de recontagem de verdade — item já com status aguardando_segunda,
// pronto pra qualquer operador pegar e recontar. "Itens Divergentes"
// (DivergentItemsPanel, logo abaixo) é uma tela separada: mostra a
// divergência ANTES dela virar recontagem — assim que o líder decide
// "Solicitar nova contagem" (ou a regra automática já cria o item aqui
// direto), o item sai de lá e passa a aparecer só aqui.
// Linha de chips de severidade (Todos/Críticas/Altas/Médias/Baixas) — filtro
// client-side puro sobre a lista já carregada, reaproveitado pelas 3 telas
// (Recontagens/Itens Divergentes/Concluídas). `counts` aqui é a lista JÁ
// filtrada por busca/status da tela, só usada pra contar quantos itens caem
// em cada nível (mostrado ao lado do rótulo do chip).
function SeverityFilterRow({counts, value, onChange}){
  const niveis = ['critica','alta','media','baixa'];
  const porNivel = {};
  niveis.forEach(n=>{ porNivel[n] = 0; });
  counts.forEach(c=>{
    const lvl = classifySeverity4(severidadeDe(c)).level;
    if(porNivel[lvl]!==undefined) porNivel[lvl]++;
  });
  const LABELS = {critica:'Críticas', alta:'Altas', media:'Médias', baixa:'Baixas'};
  return (
    <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:14}}>
      <button type="button" className={'btn '+(value==='todos'?'btn-primary':'btn-outline')} style={{width:'auto',padding:'8px 14px',fontSize:12}} onClick={()=>onChange('todos')}>Todos ({counts.length})</button>
      {niveis.map(n=>(
        <button key={n} type="button" className={'btn '+(value===n?'btn-primary':'btn-outline')} style={{width:'auto',padding:'8px 14px',fontSize:12}} onClick={()=>onChange(n)}>{LABELS[n]} ({porNivel[n]})</button>
      ))}
    </div>
  );
}

// Barra de busca + botão "Scanner" (abre a câmera, ao detectar um código
// preenche a busca — mesmo padrão já usado em ManualCountFlow/CountStep,
// só reaproveitado aqui). Compartilhada pelas 3 telas.
function SearchWithScanner({value, onChange, placeholder}){
  const [scanning, setScanning] = useState(false);
  if(scanning){
    return <CameraScanner onDetected={text=>{ setScanning(false); onChange(text.trim()); }} onCancel={()=>setScanning(false)} />;
  }
  return (
    <div className="field" style={{marginBottom:14}}>
      <label>Buscar item</label>
      {/* Botão de scanner e input são irmãos diretos nesta linha, sem
          nenhuma altura fixa no botão — o `align-items:stretch` padrão do
          flex row faz o botão automaticamente assumir a MESMA altura
          renderizada do input (que varia com padding/fonte), em vez de um
          valor fixo (44px) que ficava mais baixo que o input de verdade. */}
      <div style={{display:'flex',gap:8}}>
        <input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{flex:1}} />
        <button type="button" className="btn btn-secondary" title="Scanner" style={{width:48,padding:0,flexShrink:0}} onClick={()=>setScanning(true)}><ScanIcon /></button>
      </div>
    </div>
  );
}

// Paginação client-side pras 4 telas de contagem (Recontagens/Itens
// Divergentes/Aprovação de Ajustes/Contagens Concluídas) — cliente notou um
// delay pequeno ao trocar de filtro/tela depois que o padrão de período virou
// "Todos os períodos" (ver seção anterior no CLAUDE.md): sem a janela de 30
// dias escondendo a maior parte, essas listas podem renderizar centenas de
// cards `.count-card` (bem mais pesados que uma linha de tabela) de uma vez.
// Mesmo padrão já usado em `UserManagementPanel` (`USERS_PAGE_SIZE`, "‹
// Anterior"/"Próxima ›"), só que com o tamanho de página também configurável
// pelo usuário (pedido explícito — "opção de escolher outra quantidade se
// necessário"). Paginação é só de EXIBIÇÃO — a lista inteira já está em
// memória (Realtime, sem paginação no fetch), então trocar de página não
// bate no Supabase de novo, só corta o array antes de mapear pro JSX.
const TAMANHOS_PAGINA_OPCOES = [50, 100, 200, 500];
function usePaginacaoLista(lista, tamanhoPadrao=50){
  const [pagina, setPagina] = useState(1);
  const [tamanhoPagina, setTamanhoPaginaState] = useState(tamanhoPadrao);
  // Trocar o tamanho da página sempre volta pra página 1 — senão dava pra
  // ficar numa página que não existe mais (ex: pág. 4 de 50 itens, muda pra
  // 200 por página, só sobra 1 página).
  function setTamanhoPagina(v){ setTamanhoPaginaState(v); setPagina(1); }
  const totalPaginas = Math.max(1, Math.ceil(lista.length / tamanhoPagina));
  // `Math.min` clampa sozinho se a lista encolher (filtro/busca reduzindo o
  // total) — não precisa de nenhum `useEffect` de reset, a página válida
  // mais próxima já é recalculada a cada render.
  const paginaAtual = Math.min(pagina, totalPaginas);
  const listaPaginada = lista.slice((paginaAtual-1)*tamanhoPagina, paginaAtual*tamanhoPagina);
  return {pagina: paginaAtual, setPagina, tamanhoPagina, setTamanhoPagina, listaPaginada, totalPaginas};
}
function PaginationControls({pagina, setPagina, totalPaginas, tamanhoPagina, setTamanhoPagina, totalItens, itemLabel='itens'}){
  if(totalItens===0) return null;
  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10,margin:'14px 0'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <button type="button" className="btn btn-outline" style={{width:'auto',padding:'8px 14px'}} disabled={pagina<=1} onClick={()=>setPagina(p=>p-1)}>‹ Anterior</button>
        <span style={{fontFamily:'var(--font-mono)',fontSize:11.5,color:'var(--ink-dim)'}}>Página {pagina} de {totalPaginas} · {totalItens} {itemLabel}</span>
        <button type="button" className="btn btn-outline" style={{width:'auto',padding:'8px 14px'}} disabled={pagina>=totalPaginas} onClick={()=>setPagina(p=>p+1)}>Próxima ›</button>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--ink-dim)'}}>
        <span>Por página:</span>
        <select aria-label="Itens por página" value={tamanhoPagina} onChange={e=>setTamanhoPagina(Number(e.target.value))} style={{padding:'6px 8px',borderRadius:8,border:'1px solid var(--line)',fontSize:12,fontFamily:'var(--font-corp)'}}>
          {TAMANHOS_PAGINA_OPCOES.map(n=><option key={n} value={n}>{n}</option>)}
        </select>
      </div>
    </div>
  );
}

function RecountsPanel({counts, inventories, role, goto, onDeleteCount, onToggleUrgente, operadorVeValoresRecontagem}){
  const canMark = role==='lider' || role==='admin';
  // Escopo AJUSTADO (cliente pediu pra restringir depois de ver o resultado
  // inicial): o quadro Sistema/Físico/Diferença/% fica visível pra QUALQUER
  // perfil, sempre — só o toggle "Detalhes"/"Ocultar" (pessoal, todo mundo
  // pode recolher se quiser) controla se ele aparece. `podeVerDetalhes`
  // passou a governar só o BLOCO EXTRA (Armazém/Endereço contado/Motivo/
  // Observação/Foto/Valor divergente/Contado por) — é ali que mora o
  // "valor" que a Diretoria não quer que a operação veja, não nas
  // quantidades/percentual do quadro principal.
  const podeVerDetalhes = role!=='operador' || operadorVeValoresRecontagem;
  const byOriginal = {};
  counts.forEach(c=>{ if(c.contagemAnteriorId) byOriginal[c.contagemAnteriorId]=c; });

  const aguardandoSegunda = counts.filter(c=>c.statusAprovacao==='aguardando_segunda' && !byOriginal[c.id]);

  // Filtro de período ("Filtros"), mesmo componente já usado em Indicadores/
  // Contagens Concluídas. Essa tela já teve um filtro de período antes,
  // removido numa rodada anterior por só existir pra alimentar um contador
  // de "concluídas" que não fazia sentido aqui (ver CLAUDE.md,
  // "ListaProgressoHeader removido"). Desta vez o filtro tem um propósito
  // diferente e honesto: estreitar a PRÓPRIA lista de pendentes por data,
  // útil pra achar um item específico numa fila grande sem rolar tudo. O
  // total real de pendentes (`aguardandoSegunda.length`, sem filtro
  // nenhum) nunca é escondido — só a lista abaixo é que pode ficar mais
  // curta, e a diferença é mostrada explicitamente no cabeçalho.
  // `useState` puro (não `usePersistedState`) — pedido do cliente: o
  // filtro deve voltar ao padrão sempre que a tela recarregar, não ficar
  // lembrado entre sessões (mesmo critério em Itens Divergentes/Contagens
  // Concluídas, ver abaixo). Padrão mudou de "Últimos 30 dias" pra "Todos os
  // períodos" — cliente reportou que o filtro de 30 dias escondia registro
  // de verdade sem nenhum aviso ("acaba limitando as consultas"); como
  // `counts` já vem inteiro pro navegador (Realtime, sem paginação por
  // período), tirar a janela de 30 dias por padrão não tem custo nenhum de
  // rede/performance — é só filtro em memória, então "sem filtro" por
  // padrão é estritamente melhor aqui, não uma troca.
  const [trendFilter, setTrendFilter] = useState({tipo:'todos', from:'', to:''});
  const hojeStr = hojeLocalStr();
  const { from: dataInicioStr, to: dataFimStr } = computeTrendRange(trendFilter.tipo, hojeStr, trendFilter.from, trendFilter.to);
  const aguardandoSegundaNoPeriodo = aguardandoSegunda.filter(c=>c.data && c.data>=dataInicioStr && c.data<=dataFimStr);

  // Busca por código ou descrição — filtra a fila em tempo real, sem
  // depender de rolar a lista inteira pra achar um item específico (pedido
  // do cliente). Mesmo padrão simples já usado em UserManagementPanel/
  // ManualCountFlow (case-insensitive, sem normalização de acento).
  const [busca, setBusca] = useState('');
  const buscaNorm = busca.trim().toLowerCase();
  const porBusca = buscaNorm
    ? aguardandoSegundaNoPeriodo.filter(c => c.productCode.toLowerCase().includes(buscaNorm) || (c.descricao||'').toLowerCase().includes(buscaNorm))
    : aguardandoSegundaNoPeriodo;

  const [severidade, setSeveridade] = useState('todos');
  const listaFiltradaSemOrdenar = severidade==='todos' ? porBusca : porBusca.filter(c=>classifySeverity4(severidadeDe(c)).level===severidade);
  // Itens marcados como urgentes (líder/admin, ver toggleUrgente em App())
  // sempre aparecem primeiro — sort estável, preserva a ordem relativa entre
  // itens com a mesma urgência (não embaralha o resto da fila).
  const listaFiltrada = [...listaFiltradaSemOrdenar].sort((a,b)=>(b.urgente?1:0)-(a.urgente?1:0));
  const {pagina, setPagina, tamanhoPagina, setTamanhoPagina, listaPaginada, totalPaginas} = usePaginacaoLista(listaFiltrada, 50);

  const [urgenteBusyId, setUrgenteBusyId] = useState(null);
  const [urgenteErro, setUrgenteErro] = useState({});
  async function handleToggleUrgente(c){
    setUrgenteBusyId(c.id);
    setUrgenteErro(prev=>({...prev, [c.id]: null}));
    const res = await onToggleUrgente(c.id, !c.urgente);
    setUrgenteBusyId(null);
    if(!res || !res.ok) setUrgenteErro(prev=>({...prev, [c.id]: (res && res.erro) || 'Não foi possível salvar — tente novamente.'}));
  }

  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const [excluindo, setExcluindo] = useState(false);
  const [erroExclusao, setErroExclusao] = useState('');
  // Menu "⋮" (Marcar urgente, líder/admin; Excluir, só admin) — guarda só o
  // id do card com o menu aberto no momento, um card por vez.
  const [menuAbertoId, setMenuAbertoId] = useState(null);
  // Detalhes agora vêm ABERTOS por padrão (pedido do cliente — antes exigia
  // clicar em "Detalhes" pra ver Sistema/Físico/Diferença/%). Por isso a
  // lógica virou o INVERSO de antes: em vez de guardar qual card está
  // aberto (só 1 por vez), guarda um conjunto dos cards que o usuário
  // explicitamente OCULTOU — qualquer card fora desse conjunto já nasce
  // visível, e mais de um card pode ficar oculto ao mesmo tempo.
  const [detalhesOcultosIds, setDetalhesOcultosIds] = useState(()=>new Set());
  function toggleDetalhes(id){
    setDetalhesOcultosIds(prev=>{
      const next = new Set(prev);
      if(next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }

  // Fecha o menu "⋮" ao clicar em qualquer lugar fora dele — sem isso, só
  // clicar de novo no mesmo botão "⋮" fechava, então clicar em outro canto
  // da tela deixava o menu aberto pra sempre (bug reportado pelo cliente).
  useEffect(()=>{
    if(!menuAbertoId) return;
    function handleClickOutside(e){
      if(!e.target.closest('.count-card-menu')) setMenuAbertoId(null);
    }
    document.addEventListener('click', handleClickOutside);
    return ()=>document.removeEventListener('click', handleClickOutside);
  }, [menuAbertoId]);

  async function handleConfirmDelete(id){
    setExcluindo(true);
    setErroExclusao('');
    const res = await onDeleteCount(id);
    setExcluindo(false);
    if(res && res.ok){
      setConfirmDeleteId(null);
    } else {
      setErroExclusao((res && res.erro) || 'Não foi possível excluir — tente novamente.');
    }
  }

  return (
    <div>
      <TrendFilterBar
        trendFilter={trendFilter}
        setTrendFilter={setTrendFilter}
        dataInicioStr={dataInicioStr}
        dataFimStr={dataFimStr}
        hojeStr={hojeStr}
        subtitle="Selecione o período para filtrar a fila de recontagem"
      />

      <SearchWithScanner value={busca} onChange={setBusca} placeholder="Buscar por código ou descrição do material" />

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:10}}>
        <span style={{fontSize:12.5,color:'var(--ink-dim)'}}>
          <strong style={{color:'var(--ink)'}}>{aguardandoSegunda.length}</strong> pendentes
          {aguardandoSegundaNoPeriodo.length!==aguardandoSegunda.length && <> · <strong style={{color:'var(--ink)'}}>{aguardandoSegundaNoPeriodo.length}</strong> no período selecionado</>}
        </span>
      </div>

      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <SeverityFilterRow counts={porBusca} value={severidade} onChange={setSeveridade} />
      </div>

      {listaFiltrada.length===0 ? (
        <div className="empty-state" style={{padding:20}}>
          {aguardandoSegunda.length===0
            ? 'Nenhum item aguardando recontagem no momento.'
            : (aguardandoSegundaNoPeriodo.length===0 ? 'Nenhum item aguardando recontagem nesse período.' : 'Nenhum item encontrado para esse filtro.')}
        </div>
      ) : listaPaginada.map(c=>{
        const sev = classifySeverity4(severidadeDe(c));
        const temExtra = c.motivo || c.observacao || c.foto || c.almoxarifado || (c.enderecoContado && c.enderecoContado!==c.endereco) || (c.valorDivergente && Number(c.valorDivergente)!==0);
        return (
        <div key={c.id} className={"count-card"+(c.urgente?' urgente':'')+(c.reprovadoPelaDiretoria?' reprovado-diretoria':'')}>
          <div className="count-card-bar" style={{background:sev.color}}></div>
          <div className="count-card-body">
            <div className="count-card-head">
              <div className="count-card-badges">
                {c.urgente && <span className="urgente-chip"><Ic>🔥</Ic> Urgente</span>}
                {c.reprovadoPelaDiretoria
                  ? <span className="severity-chip" style={{background:'#F1E9FB',color:'#7B3FC4'}}><Ic>⛔</Ic> Ajuste Reprovado</span>
                  : c.recontagemSolicitadaPeloLider
                  ? <span className="severity-chip" style={{background:'var(--danger-bg)',color:'var(--danger)'}}><Ic>⚠</Ic> Rejeitada</span>
                  : <span className="severity-chip" style={{background:sev.bg,color:sev.color}}><Ic>{sev.icon}</Ic> {sev.label}</span>}
              </div>
              <div className="count-card-head-right">
                <span className="category-chip">{categoriaDoInventario(c, inventories)}</span>
                <span className="count-card-date">{c.data}</span>
                {(canMark || onDeleteCount) && (
                  <div className="count-card-menu">
                    <button type="button" className="count-card-menu-btn" onClick={()=>setMenuAbertoId(menuAbertoId===c.id ? null : c.id)}>⋮</button>
                    {menuAbertoId===c.id && (
                      <div className="count-card-menu-dropdown">
                        {canMark && (
                          <button type="button" disabled={urgenteBusyId===c.id} onClick={()=>{ handleToggleUrgente(c); setMenuAbertoId(null); }}><Ic>🔥</Ic> {urgenteBusyId===c.id ? 'Salvando…' : (c.urgente ? 'Remover urgência' : 'Marcar urgente')}</button>
                        )}
                        {onDeleteCount && (
                          <button type="button" className="menu-item-danger" onClick={()=>{ setConfirmDeleteId(c.id); setMenuAbertoId(null); }}><Ic>🗑</Ic> Excluir contagem</button>
                        )}
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
            <div className="count-card-toprow">
              <div className="count-card-title">
                <div className="item-code">{c.productCode}</div>
                <div className="item-desc">{c.descricao}</div>
              </div>
              <div className="count-card-address-badge"><DIcon name="mapPin" size={16} /> {c.endereco || 'não cadastrado'}</div>
            </div>
            {c.reprovadoPelaDiretoria && (
              <div className="divergence-alert" style={{background:'#F1E9FB',borderColor:'#7B3FC4',color:'#7B3FC4'}}>
                <Ic>⛔</Ic><span>A Diretoria reprovou a SA {c.solicitacaoAjuste} em {c.reprovadoEm} — reenviado para nova análise.</span>
              </div>
            )}
            {c.recontagemSolicitadaPeloLider && (
              <div className="divergence-alert"><Ic>⚠</Ic>
                <span>{c.recontagemSolicitadaPor || 'O líder'} não aceitou a divergência da 1ª contagem e solicitou uma nova contagem em {c.recontagemSolicitadaEm}.</span>
              </div>
            )}
            {confirmDeleteId===c.id ? (
              <div className="count-card-actions">
                <div className="divergence-alert" style={{marginBottom:10}}>
                  <Ic>⚠</Ic><span>Excluir esta contagem de {c.productCode}? Essa ação não pode ser desfeita e não deixa rastro.</span>
                </div>
                {erroExclusao && <div className="divergence-alert" style={{marginBottom:10}}><Ic>⚠</Ic><span>{erroExclusao}</span></div>}
                <div className="btn-row">
                  <button className="btn btn-secondary" disabled={excluindo} onClick={()=>{setConfirmDeleteId(null); setErroExclusao('');}}>Cancelar</button>
                  <button className="btn btn-danger" disabled={excluindo} onClick={()=>handleConfirmDelete(c.id)}>{excluindo ? 'Excluindo…' : 'Confirmar exclusão'}</button>
                </div>
              </div>
            ) : (
              <div className="count-card-main">
                <div className="count-card-content">
                  {!detalhesOcultosIds.has(c.id) && (
                    <>
                      <div className="result-grid result-grid-4col" style={{marginTop:0,gridTemplateColumns:'repeat(4,1fr)'}}>
                        <div className="rg"><div className="k">Sistema</div><div className="v">{c.saldoSistema==null ? '—' : c.saldoSistema}</div></div>
                        <div className="rg"><div className="k">Físico</div><div className="v">{c.qtdContada}</div></div>
                        <div className="rg"><div className="k">Diferença</div><div className="v" style={{color:sev.color}}>{c.diferenca==null ? '—' : (c.diferenca>0?'+':'')+c.diferenca}</div></div>
                        <div className="rg"><div className="k">%</div><div className="v" style={{color:sev.color}}>{c.percentual==null ? '—' : Math.round(c.percentual)+'%'}</div></div>
                      </div>
                      {podeVerDetalhes && (
                        <div className="count-card-extra">
                          {c.almoxarifado && <div>Armazém: <strong>{c.almoxarifado}</strong></div>}
                          {c.enderecoContado && c.enderecoContado!==c.endereco && <div>Endereço contado: <strong>{c.enderecoContado}</strong></div>}
                          {c.motivo && <div>Motivo: <strong>{c.motivo}</strong></div>}
                          {c.observacao && <div>Observação: {c.observacao}</div>}
                          {c.foto && <div>Foto anexada na contagem.</div>}
                          {c.valorDivergente && Number(c.valorDivergente)!==0 && <div>Valor divergente: <strong>R$ {Number(c.valorDivergente).toFixed(2)}</strong></div>}
                          <div>Contado por {c.usuario} em {c.data} {c.hora||''}</div>
                        </div>
                      )}
                    </>
                  )}
                </div>
                <div className="count-card-actions-col">
                  <button className="btn btn-primary" onClick={()=>goto('recount', c)}><Ic>🔁</Ic> Recontar</button>
                  <button className="btn btn-outline" onClick={()=>toggleDetalhes(c.id)}><Ic>📋</Ic> {detalhesOcultosIds.has(c.id) ? 'Detalhes' : 'Ocultar'}</button>
                </div>
              </div>
            )}
            {urgenteErro[c.id] && (
              <div className="divergence-alert"><Ic>⚠</Ic><span>{urgenteErro[c.id]}</span></div>
            )}
          </div>
        </div>
        );
      })}
      <PaginationControls pagina={pagina} setPagina={setPagina} totalPaginas={totalPaginas} tamanhoPagina={tamanhoPagina} setTamanhoPagina={setTamanhoPagina} totalItens={listaFiltrada.length} itemLabel="itens" />
    </div>
  );
}

// "Itens Divergentes" — tela própria (era a seção "Aguardando Análise do
// Líder", que morava dentro de RecountsPanel). Regra pedida pelo cliente:
// mostra só divergência que AINDA não entrou em processo de recontagem —
// assim que vira aguardando_segunda (líder solicita nova contagem, ou a
// regra automática já joga direto pra lá), o item some daqui e passa a
// aparecer só em "Recontagens". Visível pra todos os papéis (antes ficava
// escondida inteira do operador) — mas as ações (aprovar/solicitar
// recontagem) continuam só pra líder/admin, operador vê em modo leitura.
function DivergentItemsPanel({counts, inventories, role, goto, onApprove, onSendToDiretoria, onRequestRecount, onDeleteCount, onToggleUrgente}){
  // Bug real corrigido aqui: faltava a mesma checagem de "ponta da
  // corrente" que RecountsPanel já tinha (`byOriginal`/`!byOriginal[c.id]`)
  // — sem isso, uma linha com status 'aguardando_analise_lider' continuava
  // aparecendo aqui MESMO DEPOIS de já existir uma rodada seguinte que
  // resolveu a divergência (ex.: 2ª contagem ainda com o status antigo,
  // mas a 3ª já bateu exato e foi auto-aprovada) — o item ficava "preso"
  // pra sempre, exigindo decisão do líder sobre uma rodada já superada.
  const byOriginal = {};
  counts.forEach(c=>{ if(c.contagemAnteriorId) byOriginal[c.contagemAnteriorId]=c; });
  const aguardandoAnalise = counts.filter(c=>c.statusAprovacao==='aguardando_analise_lider' && !byOriginal[c.id]);
  const canApprove = role==='lider' || role==='admin';
  // Revertido: essa tela não tem nenhum "valor" (R$) exibido — só quadro de
  // quantidades/percentual e o Motivo — então não há o que restringir pra
  // operação aqui. O toggle `operadorVeValoresRecontagem` (Diretoria) só
  // se aplica ao bloco de detalhes extras de `RecountsPanel`, que É onde
  // "Valor divergente" aparece.

  // `onApprove`/`onRequestRecount`/`onToggleUrgente` aguardam confirmação do
  // Supabase — `busyId` desabilita só o card em ação (não a tela inteira),
  // `erros` guarda uma mensagem por id de contagem se a chamada falhar.
  const [busyId, setBusyId] = useState(null);
  const [erros, setErros] = useState({});
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  // Campo inline pra digitar o número da SA de Ajuste antes de encaminhar pra
  // aprovação da Diretoria (mesmo padrão de "confirmar" inline já usado pra
  // excluir) — guarda o id do card com o campo aberto e o valor digitado.
  const [saAbertoId, setSaAbertoId] = useState(null);
  const [saValor, setSaValor] = useState('');
  // Menu "⋮" (Marcar urgente + Excluir, mesmo padrão do RecountsPanel) —
  // guarda só o id do card com o menu aberto no momento.
  const [menuAbertoId, setMenuAbertoId] = useState(null);
  useEffect(()=>{
    if(!menuAbertoId) return;
    function handleClickOutside(e){
      if(!e.target.closest('.count-card-menu')) setMenuAbertoId(null);
    }
    document.addEventListener('click', handleClickOutside);
    return ()=>document.removeEventListener('click', handleClickOutside);
  }, [menuAbertoId]);

  // Filtro de período ("Filtros"), mesmo critério e mesmo comentário já
  // usado em RecountsPanel — `useState` puro, não `usePersistedState` (o
  // filtro volta ao padrão sempre que a tela recarregar, pedido do cliente),
  // padrão "Todos os períodos" em vez de "Últimos 30 dias" (mesmo motivo).
  const [trendFilter, setTrendFilter] = useState({tipo:'todos', from:'', to:''});
  const hojeStr = hojeLocalStr();
  const { from: dataInicioStr, to: dataFimStr } = computeTrendRange(trendFilter.tipo, hojeStr, trendFilter.from, trendFilter.to);
  const aguardandoAnaliseNoPeriodo = aguardandoAnalise.filter(c=>c.data && c.data>=dataInicioStr && c.data<=dataFimStr);

  const [busca, setBusca] = useState('');
  const buscaNorm = busca.trim().toLowerCase();
  const porBusca = buscaNorm
    ? aguardandoAnaliseNoPeriodo.filter(c => c.productCode.toLowerCase().includes(buscaNorm) || (c.descricao||'').toLowerCase().includes(buscaNorm))
    : aguardandoAnaliseNoPeriodo;

  const [severidade, setSeveridade] = useState('todos');
  const listaFiltradaSemOrdenar = severidade==='todos' ? porBusca : porBusca.filter(c=>classifySeverity4(severidadeDe(c)).level===severidade);
  // Itens marcados como urgentes sempre aparecem primeiro — mesmo critério
  // já usado em RecountsPanel.
  const listaFiltrada = [...listaFiltradaSemOrdenar].sort((a,b)=>(b.urgente?1:0)-(a.urgente?1:0));
  const {pagina, setPagina, tamanhoPagina, setTamanhoPagina, listaPaginada, totalPaginas} = usePaginacaoLista(listaFiltrada, 50);

  async function handleApprove(countId){
    setBusyId(countId);
    setErros(prev=>({...prev, [countId]: null}));
    const res = await onApprove(countId);
    setBusyId(null);
    if(!res || !res.ok) setErros(prev=>({...prev, [countId]: (res && res.erro) || 'Não foi possível aprovar — tente novamente.'}));
  }

  async function handleRequestRecount(countId){
    setBusyId(countId);
    setErros(prev=>({...prev, [countId]: null}));
    const res = await onRequestRecount(countId);
    setBusyId(null);
    if(!res || !res.ok) setErros(prev=>({...prev, [countId]: (res && res.erro) || 'Não foi possível solicitar a recontagem — tente novamente.'}));
  }

  async function handleEnviarParaDiretoria(countId){
    if(!saValor.trim()) return;
    setBusyId(countId);
    setErros(prev=>({...prev, [countId]: null}));
    const res = await onSendToDiretoria(countId, saValor.trim());
    setBusyId(null);
    if(res && res.ok){
      setSaAbertoId(null);
      setSaValor('');
    } else {
      setErros(prev=>({...prev, [countId]: (res && res.erro) || 'Não foi possível enviar — tente novamente.'}));
    }
  }

  async function handleConfirmDelete(countId){
    setBusyId(countId);
    setErros(prev=>({...prev, [countId]: null}));
    const res = await onDeleteCount(countId);
    setBusyId(null);
    if(res && res.ok){
      setConfirmDeleteId(null);
    } else {
      setErros(prev=>({...prev, [countId]: (res && res.erro) || 'Não foi possível excluir — tente novamente.'}));
    }
  }

  async function handleToggleUrgente(c){
    setBusyId(c.id);
    setErros(prev=>({...prev, [c.id]: null}));
    const res = await onToggleUrgente(c.id, !c.urgente);
    setBusyId(null);
    if(!res || !res.ok) setErros(prev=>({...prev, [c.id]: (res && res.erro) || 'Não foi possível salvar — tente novamente.'}));
  }

  return (
    <div>
      <TrendFilterBar
        trendFilter={trendFilter}
        setTrendFilter={setTrendFilter}
        dataInicioStr={dataInicioStr}
        dataFimStr={dataFimStr}
        hojeStr={hojeStr}
        subtitle="Selecione o período para filtrar as divergências pendentes"
      />

      <SearchWithScanner value={busca} onChange={setBusca} placeholder="Código ou descrição do material" />

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:10}}>
        <span style={{fontSize:12.5,color:'var(--ink-dim)'}}>
          <strong style={{color:'var(--ink)'}}>{aguardandoAnalise.length}</strong> pendentes
          {aguardandoAnaliseNoPeriodo.length!==aguardandoAnalise.length && <> · <strong style={{color:'var(--ink)'}}>{aguardandoAnaliseNoPeriodo.length}</strong> no período selecionado</>}
        </span>
      </div>

      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <SeverityFilterRow counts={porBusca} value={severidade} onChange={setSeveridade} />
      </div>

      {listaFiltrada.length===0 ? (
        <div className="empty-state" style={{padding:20}}>
          {aguardandoAnalise.length===0
            ? 'Nenhuma divergência aguardando análise no momento.'
            : (aguardandoAnaliseNoPeriodo.length===0 ? 'Nenhuma divergência aguardando análise nesse período.' : 'Nenhum item encontrado para esse filtro.')}
        </div>
      ) : listaPaginada.map(c=>{
        const anterior = c.contagemAnteriorId ? counts.find(x=>x.id===c.contagemAnteriorId) : null;
        const sev = classifySeverity4(severidadeDe(c));
        return (
          <div key={c.id} className={"count-card"+(c.urgente?' urgente':'')+(c.reprovadoPelaDiretoria?' reprovado-diretoria':'')}>
            <div className="count-card-bar" style={{background:sev.color}}></div>
            <div className="count-card-body">
              <div className="count-card-head">
                <div className="count-card-badges">
                  {c.urgente && <span className="urgente-chip"><Ic>🔥</Ic> Urgente</span>}
                  {c.reprovadoPelaDiretoria
                    ? <span className="severity-chip" style={{background:'#F1E9FB',color:'#7B3FC4'}}><Ic>⛔</Ic> Ajuste Reprovado</span>
                    : <span className="severity-chip" style={{background:sev.bg,color:sev.color}}><Ic>{sev.icon}</Ic> {sev.label}</span>}
                  <span className="category-chip">{categoriaDoInventario(c, inventories)}</span>
                  {c.numeroContagem>1 && <span className="category-chip">{c.numeroContagem}ª contagem</span>}
                </div>
                <div className="count-card-head-right">
                  <span className="count-card-date">{c.data}</span>
                  {canApprove && (
                    <div className="count-card-menu">
                      <button type="button" className="count-card-menu-btn" onClick={()=>setMenuAbertoId(menuAbertoId===c.id ? null : c.id)}>⋮</button>
                      {menuAbertoId===c.id && (
                        <div className="count-card-menu-dropdown">
                          <button type="button" disabled={busyId===c.id} onClick={()=>{ handleToggleUrgente(c); setMenuAbertoId(null); }}><Ic>🔥</Ic> {busyId===c.id ? 'Salvando…' : (c.urgente ? 'Remover urgência' : 'Marcar urgente')}</button>
                          {onDeleteCount && (
                            <button type="button" className="menu-item-danger" onClick={()=>{ setConfirmDeleteId(c.id); setMenuAbertoId(null); }}><Ic>🗑</Ic> Excluir contagem</button>
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
              <div className="count-card-toprow">
                <div className="count-card-title">
                  <div className="item-code">{c.productCode}</div>
                  <div className="item-desc">{c.descricao}</div>
                </div>
                <div className="count-card-address-badge"><DIcon name="mapPin" size={16} /> {c.endereco || 'não cadastrado'}</div>
              </div>
              {anterior ? (
                <div className="rounds-stack" style={{padding:'8px 16px 0'}}>
                  <div className="round-panel previous">
                    <div className="round-eyebrow">
                      <span className="label">{anterior.numeroContagem}ª Contagem</span>
                      <span className="round-who">{anterior.usuario} · {anterior.data} {anterior.hora||''}</span>
                    </div>
                    <div className="result-grid" style={{marginTop:0,gridTemplateColumns:'repeat(4,1fr)'}}>
                      <div className="rg"><div className="k">Sistema</div><div className="v">{anterior.saldoSistema==null ? '—' : anterior.saldoSistema}</div></div>
                      <div className="rg"><div className="k">Físico</div><div className="v">{anterior.qtdContada}</div></div>
                      <div className="rg"><div className="k">Diferença</div><div className="v">{anterior.diferenca==null ? '—' : (anterior.diferenca>0?'+':'')+anterior.diferenca}</div></div>
                      <div className="rg"><div className="k">%</div><div className="v">{anterior.percentual==null ? '—' : Math.round(anterior.percentual)+'%'}</div></div>
                    </div>
                  </div>
                  <div className="round-panel current">
                    <div className="round-eyebrow">
                      <span className="label">{c.numeroContagem}ª Contagem</span><span className="badge">Atual</span>
                      <span className="round-who">{c.usuario} · {c.data} {c.hora||''}</span>
                    </div>
                    <div className="result-grid" style={{marginTop:0,gridTemplateColumns:'repeat(4,1fr)'}}>
                      <div className="rg"><div className="k">Sistema</div><div className="v">{c.saldoSistema==null ? '—' : c.saldoSistema}</div></div>
                      <div className="rg"><div className="k">Físico</div><div className="v">{c.qtdContada}</div></div>
                      <div className="rg"><div className="k">Diferença</div><div className="v" style={{color:sev.color}}>{c.diferenca==null ? '—' : (c.diferenca>0?'+':'')+c.diferenca}</div></div>
                      <div className="rg"><div className="k">%</div><div className="v" style={{color:sev.color}}>{c.percentual==null ? '—' : Math.round(c.percentual)+'%'}</div></div>
                    </div>
                  </div>
                </div>
              ) : (
                <div className="result-grid result-grid-4col" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
                  <div className="rg"><div className="k">Sistema</div><div className="v">{c.saldoSistema==null ? '—' : c.saldoSistema}</div></div>
                  <div className="rg"><div className="k">Físico</div><div className="v">{c.qtdContada}</div></div>
                  <div className="rg"><div className="k">Diferença</div><div className="v" style={{color:sev.color}}>{c.diferenca==null ? '—' : (c.diferenca>0?'+':'')+c.diferenca}</div></div>
                  <div className="rg"><div className="k">%</div><div className="v" style={{color:sev.color}}>{c.percentual==null ? '—' : Math.round(c.percentual)+'%'}</div></div>
                </div>
              )}
              {c.motivo && <div style={{padding:'10px 16px 0',fontSize:12.5}}>Motivo: <strong>{c.motivo}</strong></div>}
              {c.reprovadoPelaDiretoria && (
                <div className="divergence-alert" style={{margin:'10px 16px 0',background:'#F1E9FB',borderColor:'#7B3FC4',color:'#7B3FC4'}}>
                  <Ic>⛔</Ic><span>A Diretoria reprovou a SA {c.solicitacaoAjuste} em {c.reprovadoEm} — reenviado para nova análise.</span>
                </div>
              )}
              {c.diferencaConfirmada && (
                <div className="divergence-alert" style={{margin:'10px 16px 0'}}>
                  <Ic>⚠</Ic><span>Diferença confirmada: <strong>{c.diferenca>0?'+':''}{c.diferenca}</strong> nas duas rodadas.</span>
                </div>
              )}
              {erros[c.id] && (
                <div className="divergence-alert" style={{margin:'10px 16px 0'}}><Ic>⚠</Ic><span>{erros[c.id]}</span></div>
              )}
              {confirmDeleteId===c.id ? (
                <div className="count-card-actions">
                  <div className="divergence-alert" style={{marginBottom:10}}>
                    <Ic>⚠</Ic><span>Excluir esta contagem de {c.productCode}? Essa ação não pode ser desfeita e não deixa rastro.</span>
                  </div>
                  <div className="btn-row">
                    <button className="btn btn-secondary" disabled={busyId===c.id} onClick={()=>setConfirmDeleteId(null)}>Cancelar</button>
                    <button className="btn btn-danger" disabled={busyId===c.id} onClick={()=>handleConfirmDelete(c.id)}>{busyId===c.id ? 'Excluindo…' : 'Confirmar exclusão'}</button>
                  </div>
                </div>
              ) : saAbertoId===c.id ? (
                <div className="count-card-actions">
                  <div className="field" style={{marginBottom:10}}>
                    <label>Número da SA de Ajuste</label>
                    <input type="text" value={saValor} onChange={e=>setSaValor(e.target.value)} placeholder="Ex: SA-2026-00123" autoFocus />
                  </div>
                  {erros[c.id] && <div className="divergence-alert" style={{marginBottom:10}}><Ic>⚠</Ic><span>{erros[c.id]}</span></div>}
                  <div className="btn-row">
                    <button className="btn btn-secondary" disabled={busyId===c.id} onClick={()=>{setSaAbertoId(null); setSaValor('');}}>Cancelar</button>
