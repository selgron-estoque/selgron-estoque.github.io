}

// Mini grûÀfico de linha, mais enxuto que WeeklyLineChart (sem meta, sem
// rû°tulo "Sem N" em cima da data, sem % grande em cada ponto) ã pensado pra
// caber dentro do card "Saû¤de do InventûÀrio", nûÈo como painel prû°prio.
function HealthSparkline({pontos, color}){
  const W = 320, H = 92, padL = 30, padR = 8, padT = 8, padB = 18;
  const chartW = W-padL-padR, chartH = H-padT-padB;
  const n = pontos.length;
  const x = i => padL + (n>1 ? (i/(n-1))*chartW : chartW/2);
  const y = v => padT + chartH - (v/100)*chartH;
  const pts = pontos.map((p,i)=>`${x(i)},${y(p.acuracidade)}`).join(' ');
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block'}} role="img" aria-label="Tendûˆncia recente de acuracidade">
      {[0,25,50,75,100].map(t=>(
        <text key={t} x={padL-6} y={y(t)+3} textAnchor="end" fontSize={9} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{t}%</text>
      ))}
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" />
      {pontos.map((p,i)=>(
        <circle key={p.key} cx={x(i)} cy={y(p.acuracidade)} r={3.5} fill={color} stroke="#fff" strokeWidth={1.5}>
          <title>{p.sublabel}: {p.acuracidade.toFixed(1)}%</title>
        </circle>
      ))}
      {pontos.map((p,i)=>{
        // Rû°tulo do 1ô¤/û¤ltimo ponto ancorado na PONTA (start/end) em vez de
        // "middle" ã com "middle" nesses dois, metade do texto (ex: "13/07")
        // cai fora do viewBox (0-W), e o SVG recorta silenciosamente o que
        // passa da borda (overflow implûÙcito da raiz `<svg>`), cortando a
        // data pela metade ("13/0"). Sû° os pontos do meio continuam
        // centralizados, onde nûÈo hûÀ risco de estourar a borda.
        const anchor = i===0 ? 'start' : (i===pontos.length-1 ? 'end' : 'middle');
        return (
          <text key={p.key+'-lbl'} x={x(i)} y={H-4} textAnchor={anchor} fontSize={9} fill="var(--ink-dim)" fontFamily="var(--font-mono)">{p.sublabel}</text>
        );
      })}
    </svg>
  );
}

// Card "Saû¤de do InventûÀrio" ã pedido do cliente (mandou uma imagem de
// referûˆncia: selo de status + variaûÏûÈo vs. perûÙodo anterior + mini
// grûÀfico + acuracidade atual em destaque). Implementado 100% em cima de
// dado real jûÀ calculado por `computeWeeklyStats` ã sem inventar nenhuma
// mûˋtrica nova: "atual" ûˋ a û¤ltima semana com contagem de verdade dentro do
// perûÙodo filtrado, "variaûÏûÈo" compara contra a semana anterior a essa
// (tambûˋm sû° entre semanas com dado real). Se ainda nûÈo existe nenhuma
// semana com contagem no perûÙodo escolhido, nûÈo renderiza nada (mesmo
// critûˋrio de "nûÈo fabricar dado" jûÀ usado no resto do Dashboard) ã quem
// chama decide o que mostrar no lugar.
function InventoryHealthCard({weeklyStats, meta=META_ACURACIDADE_SEMANAL}){
  const comDado = weeklyStats.filter(w=>w.acuracidade!=null);
  if(comDado.length===0) return null;
  const atual = comDado[comDado.length-1];
  const anterior = comDado.length>1 ? comDado[comDado.length-2] : null;
  const variacao = anterior ? (atual.acuracidade - anterior.acuracidade) : null;

  // 4 faixas de status, relativas û  META (nûÈo valores fixos) ã assim o
  // rû°tulo continua fazendo sentido se o cliente um dia mudar a meta de 95%.
  let tier;
  if(atual.acuracidade >= meta) tier = {status:'Excelente', sub:'Vocûˆ estûÀ dentro da meta!', color:'var(--teal)', bg:'var(--teal-bg)'};
  else if(atual.acuracidade >= meta-10) tier = {status:'Bom', sub:'Perto da meta', color:'#2563EB', bg:'#EAF1FD'};
  else if(atual.acuracidade >= meta-25) tier = {status:'AtenûÏûÈo', sub:'Abaixo da meta', color:'#B7791F', bg:'#FDF3E3'};
  else tier = {status:'CrûÙtico', sub:'Bem abaixo da meta', color:'#C4291B', bg:'#FBEAE8'};

  const pontos = comDado.slice(-6);

  return (
    <div className="health-card" style={{background:tier.bg}}>

          <div className="health-status" style={{color:tier.color}}>{tier.status}</div>
          <div className="health-sub" style={{color:tier.color}}>{tier.sub}</div>
          {variacao!=null && (
            <div className="health-desc">
              A acuracidade estûÀ {Math.abs(variacao).toFixed(1)}% {variacao>=0?'acima':'abaixo'} do perûÙodo anterior.
              {variacao>=0 ? ' Continue assim.' : ''}
            </div>

      <div className="health-chart"><HealthSparkline pontos={pontos} color={tier.color} /></div>
      <div className="health-current">

}

function Dashboard({counts, inventories, historicoConcluidas=[], historicoParaTendencia=[], goto}){
  const planejados = inventories.reduce((s,i)=>s+i.qtdItens,0);
  const contados = counts.length;
  const pendentes = Math.max(planejados-contados,0);

  // Filtro de perûÙodo do painel "Filtros" ã trocado de janelas fixas
  // ("10/26 semanas") pra presets de calendûÀrio (Hoje/Esta semana/Este
  // mûˆs/ûltimos 30-90 dias/Este ano/Personalizado), pedido explûÙcito do
  // cliente pra ficar "mais profissional" e no vocabulûÀrio do dia a dia
  // (mesmo catûÀlogo usado por Power BI/Stripe Dashboard). Persiste no
  // localStorage (`usePersistedState`) ã reabrir a tela de Indicadores
  // mantûˋm o û¤ltimo filtro escolhido, tambûˋm pedido explicitamente.
  // `from`/`to` sû° tûˆm significado quando `tipo==='custom'`; os presets
  // fixos sûÈo sempre recalculados a partir de "hoje" (ver
  // `computeTrendRange`), entûÈo nunca ficam desatualizados.
  const [trendFilter, setTrendFilter] = usePersistedState('dashboardTrendFilter', {tipo:'30d', from:'', to:''});

  // "Qualidade" (acuracidade/divergûˆncias/valor divergente), "Principais
  // Causas de Erro" e "Top Itens com Maior Divergûˆncia" passam a somar o
  // histû°rico importado ã sem isso essa tela inteira ficava praticamente
  // vazia logo depois de um reset, jûÀ que dependia sû° de `counts` (contagens
  // feitas ao vivo no app). "Itens Planejados/Contados/Pendentes" (progresso
  // de inventûÀrio em andamento) e "Produtividade por Operador" continuam sû°
  // com dado ao vivo, de propû°sito ã sûÈo conceitos sobre a operaûÏûÈo ATUAL,
  // nûÈo fazem sentido misturados com um histû°rico de meses atrûÀs; o
  // histû°rico tambûˋm nûÈo tem operador real por trûÀs de cada linha (ver
  // `usuario:'ImportaûÏûÈo Histû°rica'` em historicoRowToCountLike).
  const historicoComoContagem = historicoConcluidas.map(historicoRowToCountLike).filter(Boolean);
  const todasParaQualidade = [...counts, ...historicoComoContagem];
  // Bug real corrigido aqui: `diferenca!==0` sozinho conta item SEM saldo
  // pra comparar (diferenca:null, ex.: cû°digo fora do catûÀlogo) como
  // divergente ã mesma classe de bug jûÀ corrigida antes em
  // computeWeeklyStats, reproduzida aqui e em buildSummaryRows (relatû°rio
  // Excel). Era a causa de "Acuracidade do Estoque" mostrar um nû¤mero
  // diferente aqui do que na Home (que jûÀ excluûÙa null corretamente via
  // acumuladoAte) ã cliente reportou 3 cards de acuracidade com valores
  // diferentes.
  const divergentes = todasParaQualidade.filter(c=>c.diferenca!==0 && c.diferenca!==null);
  const acuracidade = todasParaQualidade.length>0 ? (((todasParaQualidade.length-divergentes.length)/todasParaQualidade.length)*100).toFixed(1) : '100.0';
  const valorDivergente = todasParaQualidade.reduce((s,c)=>s+Number(c.valorDivergente||0),0);
  // Card "Itens Divergentes" (Resumo da OperaûÏûÈo) ã cliente pediu pra
  // mostrar, dentro do mesmo card, quantos registros de contagem existem no
  // total e quantos CûDIGOS distintos isso representa (um mesmo produto pode
  // ter mais de um registro ã 1ôˆ contagem + recontagem, ou contagem ao vivo
  // + linha do histû°rico ã entûÈo "registros" e "cû°digos û¤nicos" sûÈo nû¤meros
  // diferentes por natureza). Mesmo raciocûÙnio pro "Divergûˆncias": 835
  // registros divergentes nûÈo sûÈo necessariamente 835 PRODUTOS diferentes.
  const codigosDistintosContados = new Set(todasParaQualidade.map(c=>c.productCode)).size;
  const codigosDistintosDivergentes = new Set(divergentes.map(c=>c.productCode)).size;

  // Valor em estoque por armazûˋm ã vem do Supabase (estoque_saldo,
  // atualizado via upload manual da planilha SB2 em ConfiguraûÏûçes, ver
  // StockSyncPanel). Sem fallback pro cache local (removido, ver CLAUDE.md
  // "cache local removido") ã se a tabela ainda estiver vazia, mostra um
  // empty-state honesto em vez de calcular a partir de dado estûÀtico.
  const [estoqueRemoto, setEstoqueRemoto] = useState(null); // null = ainda carregando/nûÈo tentado
  const [resumoGeral, setResumoGeral] = useState(null);
  const [modoValor, setModoValor] = useState('valor'); // 'valor' | 'percentual' ã toggle do painel "Valor por Armazûˋm"
  // "Atualizar" do painel de Filtros re-busca o saldo/resumo do Supabase ã
  // aûÏûÈo de verdade (nûÈo decorativa): os grûÀficos de tendûˆncia jûÀ sûÈo
  // recalculados na hora a partir de `counts`/histû°rico (em memû°ria, sem
  // custo de rede), mas o painel "Valor por Armazûˋm" depende de RPCs que sû°
  // rodam no mount por padrûÈo ã esse botûÈo dûÀ ao usuûÀrio um jeito manual de
  // puxar o saldo mais recente sem precisar recarregar a pûÀgina inteira
  // (û¤til se o lûÙder subiu uma planilha SB2 nova em outro aparelho/aba
  // enquanto essa tela jûÀ estava aberta).
  const [atualizando, setAtualizando] = useState(false);
  const carregarEstoque = async () => {
    setAtualizando(true);
    try {
      const [rows, resumo] = await Promise.all([
        fetchEstoqueValorPorAlmoxarifado(),
        fetchEstoqueResumoGeral(),
      ]);
      setEstoqueRemoto(rows);
      setResumoGeral(resumo);
    } finally {
      setAtualizando(false);
    }
  };
  useEffect(()=>{ carregarEstoque(); }, []);

  const porArmazem = {};
  (estoqueRemoto||[]).forEach(r=>{ porArmazem[r.almoxarifado || 'ã'] = Number(r.valor_total||0); });
  const armazens = Object.keys(porArmazem).sort();
  const valorTotalEstoque = armazens.reduce((s,k)=>s+porArmazem[k],0);
  const maxArmazemValor = Math.max(1, ...armazens.map(a=>porArmazem[a]));
  const fmtReais = v => 'R$ ' + Number(v).toLocaleString('pt-BR',{maximumFractionDigits:0});
  const armazensAtivos = Number(resumoGeral?.armazens_ativos || armazens.length);
  const ARMAZEM_COLORS = ['#F6A200','#2563EB','#16A34A','#DB2777','#7C3AED','#0D9488','#64748B','#EA580C'];

  const porOperador = {};
  counts.forEach(c=>{ porOperador[c.usuario] = (porOperador[c.usuario]||0)+1; });
  const maxOp = Math.max(1, ...Object.values(porOperador));

  const porMotivo = {};
  divergentes.forEach(c=>{ if(c.motivo) porMotivo[c.motivo] = (porMotivo[c.motivo]||0)+1; });
  const maxMotivo = Math.max(1, ...Object.values(porMotivo));

  // Divergûˆncia por FamûÙlia/Grupo (Resumo da OperaûÏûÈo) ã `familia` sû° existe
  // em contagens registradas a partir do redesenho "coletor industrial" (ver
  // CLAUDE.md, `CountStep.finalize`), que passou a gravar o campo junto da
  // contagem; contagens antigas e itens do histû°rico importado (que nunca
  // teve coluna de grupo/famûÙlia na planilha) nûÈo tûˆm esse dado ã ficam de
  // fora da soma em vez de aparecerem como "sem famûÙlia" fabricado. Ordenado
  // do maior pro menor, mesmo critûˋrio visual de "Principais Causas de Erro".
  const porFamiliaObj = {};
  divergentes.forEach(c=>{ if(c.familia) porFamiliaObj[c.familia] = (porFamiliaObj[c.familia]||0)+1; });
  const porFamilia = Object.entries(porFamiliaObj).sort((a,b)=>b[1]-a[1]);
  const maxFamilia = Math.max(1, ...porFamilia.map(([,n])=>n));

  const topDivergentes = [...todasParaQualidade].sort((a,b)=>Math.abs(b.diferenca||0)-Math.abs(a.diferenca||0)).slice(0,5);
  // "Tendûˆncia Semanal" usa um pool AINDA MAIS amplo que "Qualidade" ã inclui
  // status "Pendente" do histû°rico (fora de escopo pro resto do app), porque
  // aqui o que importa ûˋ quantas contagens de verdade aconteceram naquela
  // semana e qual a acuracidade mûˋdia delas, nûÈo se jûÀ foram decididas. Cada
  // linha do histû°rico carrega a DATA REAL em que a contagem aconteceu
  // (fev-jul/2026, nûÈo a data de importaûÏûÈo), entûÈo soma na semana certa
  // igual a qualquer contagem ao vivo ã nenhum pico artificial.
  const historicoTendenciaComoContagem = historicoParaTendencia
    .filter(h=>h.data)
    .map(h=>({data:h.data, diferenca:h.diferenca, saldoSistema:h.saldo_sistema, acuracidade:h.acuracidade}));
  const poolTendencia = [...counts, ...historicoTendenciaComoContagem];
  // Janela dos grûÀficos ûˋ escolhûÙvel (cliente pediu): fixa em 10/26 semanas,
  // "todo o perûÙodo" (da contagem mais antiga do pool atûˋ hoje) ou um
  // perûÙodo personalizado (dois campos de data) pra quando o cliente
  // precisar olhar uma janela especûÙfica. As trûˆs opûÏûçes convergem pro mesmo
  // par `dataInicioStr`/`dataFimStr`, usado tanto por `computeWeeklyStats`
  // quanto por `computeMonthlyStats` ã os dois recebem intervalo de data
  // agora, nûÈo mais "quantidade de semanas".
  const hojeStr = hojeLocalStr();

// Verifica se o login jûÀ estûÀ em uso por OUTRO usuûÀrio (case-insensitive,
// mesma normalizaûÏûÈo usada no login real). Na ediûÏûÈo, exclui o prû°prio
// usuûÀrio da checagem ã ele pode manter o login que jûÀ tinha.
function isLoginDuplicado(users, usuario, excludeId){
  const norm = usuario.trim().toLowerCase();
  return users.some(u => u.id!==excludeId && u.usuario.trim().toLowerCase()===norm);
}

const USERS_PAGE_SIZE = 8;
const PASSWORD_HISTORY_PAGE_SIZE = 6;

// Cor pastel do avatar circular de cada usuûÀrio ã determinûÙstica por `id`
// (hash simples), pra nûÈo mudar de cor quando a lista ûˋ filtrada/paginada
// nem quando o usuûÀrio reabre a tela depois.
const AVATAR_PALETTE = [
  {bg:'#E0EDFF', fg:'#2563C7'},
  {bg:'#FFE9D6', fg:'#C2660B'},
  {bg:'#DFF5EC', fg:'#1E8E63'},
  {bg:'#EDE3FB', fg:'#7B3FC4'},
  {bg:'#E4F7DE', fg:'#3F8F1E'},
  {bg:'#FCE4EC', fg:'#C2185B'},
];
function avatarColorFor(id){
  let h = 0;
  const s = String(id||'');
  for(let i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i)) | 0;
  return AVATAR_PALETTE[Math.abs(h) % AVATAR_PALETTE.length];
}
function iniciaisNome(nome){
  return (nome||'').split(' ').filter(Boolean).slice(0,2).map(p=>p[0]).join('').toUpperCase();
}

function UserManagementPanel({users, currentUser, goto, onToggleUserStatus, onDeleteUser, onAdminPasswordAction}){
  const [search, setSearch] = useState('');
  const [page, setPage] = useState(1);
  const [pwAction, setPwAction] = useState(null); // userId currently doing a password action
  const [pwValue, setPwValue] = useState('');
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  // AûÏûçes agora aguardam confirmaûÏûÈo do Supabase (ver App()) ã busyId
  // desabilita sû° o botûÈo clicado, erros guarda a mensagem por usuûÀrio, mesmo
  // padrûÈo jûÀ usado em RecountsPanel pra aprovar/rejeitar divergûˆncia.
  const [busyId, setBusyId] = useState(null);
  const [erros, setErros] = useState({});
  // Senha temporûÀria gerada (ver handlePwAction, modo 'temp') ã precisa
  // aparecer na hora, em destaque, senûÈo o admin nûÈo tem como repassar pro
  // usuûÀrio. Antes disso, o valor sû° ficava guardado no "Histû°rico de
  // AlteraûÏûçes de Senha" (rodapûˋ da tela), sem nenhum aviso imediato ã
  // parecia que o botûÈo "Gerar temporûÀria" nûÈo tinha feito nada.
  const [senhaGerada, setSenhaGerada] = useState({}); // {[userId]: senha}

  async function handleToggle(userId){
    setBusyId(userId);
    setErros(prev=>({...prev, [userId]: null}));
    const res = await onToggleUserStatus(userId);
    setBusyId(null);
    if(!res || !res.ok) setErros(prev=>({...prev, [userId]: (res && res.erro) || 'NûÈo foi possûÙvel atualizar ã tente novamente.'}));
  }

  async function handleDelete(userId){
    setBusyId(userId);
    setErros(prev=>({...prev, [userId]: null}));
    const res = await onDeleteUser(userId);
    setBusyId(null);
    if(res && res.ok){
      setConfirmDeleteId(null);
    } else {
      setErros(prev=>({...prev, [userId]: (res && res.erro) || 'NûÈo foi possûÙvel excluir ã tente novamente.'}));
    }
  }

  async function handlePwAction(userId, acao, senha){
    setBusyId(userId);
    setErros(prev=>({...prev, [userId]: null}));
    const res = await onAdminPasswordAction(userId, acao, senha);
    setBusyId(null);
    if(res && res.ok){
      if(acao==='temp' && res.senhaTemporaria){
        // Mantûˋm o painel aberto (em vez de fechar com setPwAction(null))
        // pra dar tempo do admin ler/copiar a senha antes de sumir da tela.
        setSenhaGerada(prev=>({...prev, [userId]: res.senhaTemporaria}));
      } else {
        setPwAction(null);
      }
    } else {
      setErros(prev=>({...prev, [userId]: (res && res.erro) || 'NûÈo foi possûÙvel salvar a senha ã tente novamente.'}));
    }
  }

  const filtered = useMemo(()=>{
    const q = search.trim().toLowerCase();
    if(!q) return users;
    return users.filter(u=>
      u.nome.toLowerCase().includes(q) ||
      u.usuario.toLowerCase().includes(q) ||
      (u.email||'').toLowerCase().includes(q)
    );
  }, [users, search]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / USERS_PAGE_SIZE));
  const currentPage = Math.min(page, totalPages);
  const paged = filtered.slice((currentPage-1)*USERS_PAGE_SIZE, currentPage*USERS_PAGE_SIZE);

  function handleSearchChange(v){
    setSearch(v);
    setPage(1);
  }

      </div>

      {filtered.length===0 ? (
        <div style={{fontSize:'var(--text-sm)',color:'var(--ink-dim)',padding:'12px 0'}}>Nenhum usuûÀrio encontrado{search?` para "${search}"`:''}.</div>
      ) : (
        <React.Fragment>
          {paged.map(u=>{
            const avatarColor = avatarColorFor(u.id);
            return (
            <div key={u.id} className="um-card">
              <div className="um-avatar" style={{background:avatarColor.bg,color:avatarColor.fg}}>{iniciaisNome(u.nome)}</div>
              <div className="um-info">
                <div className="um-name">{u.nome}{u.id===currentUser.id && <span className="um-you">(vocûˆ)</span>}</div>
                <div className="um-sub">{u.usuario} ôñ {PERFIL_OPTIONS.find(p=>p.v===u.perfil)?.label}</div>
                <div className="um-last">
                  ûltimo acesso: {u.ultimoAcesso ? new Date(u.ultimoAcesso).toLocaleString('pt-BR') : 'nunca acessou'}
                </div>
              </div>
              <div className="um-right">
                <StatusTag status={u.status==='ativo'?'ok':u.status==='bloqueado'?'danger':'warn'} text={u.status==='ativo'?'Ativo':u.status==='bloqueado'?'Bloqueado':'Aguardando nova senha'} />
                <div className="um-actions">
                  <button className="btn btn-outline um-btn" disabled={busyId===u.id} onClick={()=>goto('userForm', {mode:u.id, initialData:u})}><DIcon name="edit" size={13}/> Editar</button>
                  {/* Nunca mostra "Bloquear" na prû°pria linha ã mesmo raciocûÙnio jûÀ

                  {(u.id!==currentUser.id || u.status==='bloqueado') && (

                      <React.Fragment>
                        <div style={{fontSize:'var(--text-xs)',color:'var(--ink-dim)',marginBottom:6}}>Senha temporûÀria gerada ã repasse ao usuûÀrio agora (nûÈo fica visûÙvel de novo depois de fechar):</div>
                        <div style={{fontFamily:'var(--font-mono)',fontSize:16,fontWeight:700,color:'var(--ok)',background:'var(--ok-bg)',border:'1px solid var(--ok)',borderRadius:6,padding:'8px 10px',textAlign:'center',marginBottom:8,letterSpacing:1}}>{senhaGerada[u.id]}</div>

                      </React.Fragment>
                    ) : (
                      <React.Fragment>
                        {erros[u.id] && <div style={{fontSize:'var(--text-xs)',color:'var(--danger)',marginBottom:8}}>{erros[u.id]}</div>}
                        <div className="btn-row" style={{marginBottom:8}}>
                          <button className="btn btn-secondary btn-xs" disabled={busyId===u.id} onClick={()=>handlePwAction(u.id,'temp')}>{busyId===u.id ? 'EnviandoãÎ' : 'Gerar temporûÀria'}</button>
                          <button className="btn btn-secondary btn-xs" disabled={busyId===u.id} onClick={()=>handlePwAction(u.id,'liberar')}>Liberar p/ criar</button>
                        </div>
                        <input type="text" placeholder="Definir senha manual" value={pwValue} onChange={e=>setPwValue(e.target.value)} style={{width:'100%',padding:8,marginBottom:8,background:'var(--panel)',border:'1px solid var(--line)',borderRadius:6,color:'var(--ink)',fontSize:'var(--text-sm)'}} />
                        <button className="btn btn-primary btn-xs" disabled={pwValue.length<6 || busyId===u.id} onClick={()=>handlePwAction(u.id,'definir',pwValue)}>{busyId===u.id ? 'EnviandoãÎ' : 'Confirmar senha definida'}</button>
                      </React.Fragment>
                    )}
                  </div>
                )}
                {confirmDeleteId===u.id && (
                  <div className="um-del-panel" style={{background:'var(--danger-bg)',border:'1px solid var(--danger)',borderRadius:8,padding:12}}>
                    <div style={{fontSize:'var(--text-sm)',color:'var(--danger)',marginBottom:10}}>Excluir "{u.nome}"? Essa aûÏûÈo nûÈo pode ser desfeita.</div>
                    {erros[u.id] && <div style={{fontSize:'var(--text-xs)',color:'var(--danger)',marginBottom:10}}>{erros[u.id]}</div>}
                    <div className="btn-row">
                      <button className="btn btn-secondary btn-xs" disabled={busyId===u.id} onClick={()=>setConfirmDeleteId(null)}>Cancelar</button>
                      <button className="btn btn-danger btn-xs" disabled={busyId===u.id} onClick={()=>handleDelete(u.id)}>{busyId===u.id ? 'ExcluindoãÎ' : 'Confirmar exclusûÈo'}</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
            );
          })}
          {totalPages>1 && (
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:10,paddingTop:14,borderTop:'1px solid var(--line)'}}>
              <button className="btn btn-outline" style={{width:'auto',padding:'8px 14px'}} disabled={currentPage<=1} onClick={()=>setPage(p=>p-1)}>ã¿ Anterior</button>
              <span style={{fontFamily:'var(--font-mono)',fontSize:'var(--text-xs)',color:'var(--ink-dim)'}}>PûÀgina {currentPage} de {totalPages} ôñ {filtered.length} usuûÀrio{filtered.length===1?'':'s'}</span>
              <button className="btn btn-outline" style={{width:'auto',padding:'8px 14px'}} disabled={currentPage>=totalPages} onClick={()=>setPage(p=>p+1)}>Prû°xima ã¤</button>
            </div>
          )}
        </React.Fragment>
      )}
    </div>
  );
}

function UserForm({mode, initialData, users, onCreateUser, onUpdateUser, onSaved, onCancel}){
  const isEdit = mode!=='new';
  const [form, setForm] = useState(isEdit && initialData
    ? {nome:initialData.nome, usuario:initialData.usuario, email:initialData.email||'', senha:'', perfil:initialData.perfil, acessosExtras:initialData.acessosExtras||[], acessosRemovidos:initialData.acessosRemovidos||[]}
    : emptyUserForm());
  const [feedback, setFeedback] = useState('');
  const [salvando, setSalvando] = useState(false);
  // Ficha de dados (nome/login/e-mail/perfil): ediûÏûÈo nova sempre comeûÏa
  // editûÀvel (nûÈo existe dado nenhum ainda pra mostrar em modo leitura);
  // ediûÏûÈo de usuûÀrio existente comeûÏa em modo leitura (faixa compacta),
  // sû° vira formulûÀrio ao clicar "Editar dados" ã ûˋ isso que libera o
  // espaûÏo vertical pra permissûçes, pedido explûÙcito do cliente.
  const [editandoDados, setEditandoDados] = useState(!isEdit);
  // Dual-list de permissûçes: nenhuma dessas variûÀveis ûˋ persistida ã sûÈo sû°
  // estado de INTERFACE (seleûÏûÈo mû¤ltipla, busca, ordem visual de arrastar)
  // por cima das mesmas duas listas reais (acessosExtras/acessosRemovidos)
  // que jûÀ existiam antes deste redesenho.
  const [buscaDisponiveis, setBuscaDisponiveis] = useState('');
  const [buscaLiberados, setBuscaLiberados] = useState('');
  const [selDisponiveis, setSelDisponiveis] = useState(()=>new Set());
  const [selLiberados, setSelLiberados] = useState(()=>new Set());
  // Ordem de exibiûÏûÈo de "Comandos Liberados" ã sû° cosmûˋtica (drag and drop
  // pra reorganizar), nunca gravada no usuûÀrio; comeûÏa na ordem natural de
  // TODOS_OS_MENUS e sû° ûˋ reorganizada por arrastar-e-soltar dentro da
  // sessûÈo de ediûÏûÈo atual.
  const [ordemLiberados, setOrdemLiberados] = useState(()=>TODOS_OS_MENUS.map(m=>m.id));
  const [dragId, setDragId] = useState(null);

  // Toggle û¤nico pra QUALQUER tela do menu (TODOS_OS_MENUS) ã decide sozinho
  // se a mudanûÏa deve ir pra `acessosExtras` (perfil normalmente NûO libera
  // essa tela, entûÈo ligar ûˋ conceder uma exceûÏûÈo) ou `acessosRemovidos`
  // (perfil normalmente libera, entûÈo desligar ûˋ uma restriûÏûÈo especûÙfica
  // deste usuûÀrio) ã `padraoPermite` jûÀ vem calculado no render, a partir do
  // perfil ATUAL selecionado no formulûÀrio.
  function toggleAcessoMenu(viewId, padraoPermite){
    setForm(f=>{
      if(padraoPermite){
        return {...f, acessosRemovidos: f.acessosRemovidos.includes(viewId)
          ? f.acessosRemovidos.filter(v=>v!==viewId)
          : [...f.acessosRemovidos, viewId]};
      }
      return {...f, acessosExtras: f.acessosExtras.includes(viewId)
        ? f.acessosExtras.filter(v=>v!==viewId)
        : [...f.acessosExtras, viewId]};
    });
  }
  function estaLiberado(viewId){
    const padraoPermite = perfilLiberaPorPadrao(form.perfil, viewId);
    return padraoPermite ? !form.acessosRemovidos.includes(viewId) : form.acessosExtras.includes(viewId);
  }
  function moverUm(viewId){
    toggleAcessoMenu(viewId, perfilLiberaPorPadrao(form.perfil, viewId));
    setSelDisponiveis(prev=>{ if(!prev.has(viewId)) return prev; const n=new Set(prev); n.delete(viewId); return n; });
    setSelLiberados(prev=>{ if(!prev.has(viewId)) return prev; const n=new Set(prev); n.delete(viewId); return n; });
  }
  function liberarSelecionados(){ selDisponiveis.forEach(moverUm); }
  function removerSelecionados(){ selLiberados.forEach(moverUm); }
  function liberarTodos(){ TODOS_OS_MENUS.filter(m=>!estaLiberado(m.id)).forEach(m=>moverUm(m.id)); }
  function removerTodos(){ TODOS_OS_MENUS.filter(m=>estaLiberado(m.id)).forEach(m=>moverUm(m.id)); }
  function toggleSelecao(setFn, viewId){
    setFn(prev=>{ const n=new Set(prev); n.has(viewId) ? n.delete(viewId) : n.add(viewId); return n; });
  }
  function reordenarLiberado(fromId, toId){
    if(!fromId || fromId===toId) return;
    setOrdemLiberados(prev=>{
      const arr = prev.slice();
      const fromIdx = arr.indexOf(fromId), toIdx = arr.indexOf(toId);
      if(fromIdx===-1 || toIdx===-1) return prev;
      arr.splice(fromIdx,1);
      arr.splice(toIdx,0,fromId);
      return arr;
    });
  }

  const buscaDispNorm = buscaDisponiveis.trim().toLowerCase();
  const buscaLibNorm = buscaLiberados.trim().toLowerCase();
  const disponiveisList = TODOS_OS_MENUS.filter(m=>!estaLiberado(m.id) && (!buscaDispNorm || m.label.toLowerCase().includes(buscaDispNorm)));
  const liberadosList = ordemLiberados
    .map(id=>TODOS_OS_MENUS.find(m=>m.id===id))
    .filter(m=>m && estaLiberado(m.id) && (!buscaLibNorm || m.label.toLowerCase().includes(buscaLibNorm)));
  const totalDisponiveis = TODOS_OS_MENUS.filter(m=>!estaLiberado(m.id)).length;
  const totalLiberados = TODOS_OS_MENUS.filter(m=>estaLiberado(m.id)).length;

  async function submitForm(e){
    e.preventDefault();
    const nome = form.nome.trim();
    const usuario = form.usuario.trim();
    // E-mail sempre normalizado pra minû¤sculo ã mesmo endereûÏo digitado com
    // maiû¤scula em lugares diferentes (ex: criaûÏûÈo vs. login) nûÈo pode virar
    // "duas contas diferentes" pro Supabase Auth, que jûÀ trata e-mail como
    // case-insensitive por padrûÈo.
    const email = form.email.trim().toLowerCase();
    if(!nome || !usuario || !email){ setFeedback('Nome, usuûÀrio de acesso e e-mail sûÈo obrigatû°rios.'); return; }
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ setFeedback('Informe um e-mail vûÀlido.'); return; }
    if(isLoginDuplicado(users, usuario, isEdit ? mode : null)){
      setFeedback('Este login jûÀ estûÀ sendo utilizado por outro usuûÀrio.');
      return;
    }
    setSalvando(true);
    setFeedback('');
    let res;
    if(!isEdit){
      if(!form.senha || form.senha.length<6){ setFeedback('Defina uma senha inicial com pelo menos 6 caracteres.'); setSalvando(false); return; }
      res = await onCreateUser({nome, usuario, email, senha:form.senha, perfil:form.perfil, acessosExtras:form.acessosExtras, acessosRemovidos:form.acessosRemovidos});
    } else {
      res = await onUpdateUser(mode, {nome, usuario, email, perfil:form.perfil, acessosExtras:form.acessosExtras, acessosRemovidos:form.acessosRemovidos});
    }
    setSalvando(false);
    if(res && res.ok){
      onSaved(isEdit ? 'AlteraûÏûçes de "'+nome+'" salvas com sucesso.' : 'UsuûÀrio "'+nome+'" criado com sucesso.');
    } else {
      setFeedback((res && res.erro) || 'NûÈo foi possûÙvel salvar ã tente novamente.');
    }
  }

  return (
    <div className="panel">
      <div className="uf-header">
        <button type="button" className="uf-back-btn" onClick={onCancel} disabled={salvando} aria-label="Voltar"><DIcon name="chevronLeft" size={20}/></button>
        <div>
          <div className="uf-header-title">{isEdit ? 'Editar UsuûÀrio' : 'Novo UsuûÀrio'}</div>
          <div className="uf-header-sub">Atualize os dados do usuûÀrio e defina suas permissûçes de acesso.</div>
        </div>
      </div>
      <form onSubmit={submitForm}>
        {feedback && <div className="login-error" style={{marginBottom:12}}>{feedback}</div>}

        <div className="uf-info-strip">
          {editandoDados ? (
            <>
              <div className="uf-info-editfields">
                <div className="field">
                  <label>Nome completo</label>
                  <input type="text" value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))} autoFocus={!isEdit} />
                </div>
                <div className="field">
                  <label>UsuûÀrio de acesso (login)</label>
                  <input type="text" value={form.usuario} onChange={e=>setForm(f=>({...f,usuario:e.target.value}))} placeholder="nome.sobrenome" autoCapitalize="none" />
                </div>
                <div className="field" style={{minWidth:240}}>
                  <label>E-mail</label>
                  <input type="text" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="nome@empresa.com" autoCapitalize="none" autoCorrect="off" spellCheck="false" />
                  <div style={{fontSize:'var(--text-xs)',color:'var(--ink-dim)',marginTop:6}}>
                    Operador sem e-mail prû°prio? Use um endereûÏo fictûÙcio com o login da pessoa,
                    por exemplo <strong style={{color:'var(--ink)'}}>{(form.usuario||'nome.sobrenome').trim()||'nome.sobrenome'}@estoque.selgron.local</strong> ã
                    ninguûˋm recebe mensagem nesse endereûÏo, ele sû° precisa ser û¤nico no sistema.
                  </div>
                </div>
                {!isEdit && (
                  <div className="field">
                    <label>Senha inicial</label>
                    <input type="text" value={form.senha} onChange={e=>setForm(f=>({...f,senha:e.target.value}))} placeholder="mûÙnimo 6 caracteres" />
                  </div>
                )}
                <div className="field">
                  <label>Perfil de acesso</label>
                  <select value={form.perfil} onChange={e=>setForm(f=>({...f,perfil:e.target.value}))}>
                    {PERFIL_OPTIONS.map(p=><option key={p.v} value={p.v}>{p.label}</option>)}
                  </select>
                </div>
              </div>
              {isEdit && <button type="button" className="btn btn-outline uf-info-editbtn" onClick={()=>setEditandoDados(false)}>Concluir ediûÏûÈo</button>}
            </>
          ) : (
            <>
              <div className="uf-info-item"><span className="uf-info-label">Nome completo</span><span className="uf-info-value">{form.nome}</span></div>
              <div className="uf-info-item"><span className="uf-info-label">UsuûÀrio de acesso (login)</span><span className="uf-info-value">{form.usuario}</span></div>
              <div className="uf-info-item"><span className="uf-info-label">E-mail</span><span className="uf-info-value">{form.email}</span></div>
              <div className="uf-info-item"><span className="uf-info-label">Perfil de acesso</span><span className="uf-info-value">{PERFIL_OPTIONS.find(p=>p.v===form.perfil)?.label}</span></div>
              <button type="button" className="btn btn-outline uf-info-editbtn" onClick={()=>setEditandoDados(true)}>Editar dados</button>
            </>
          )}
        </div>

        <div className="uf-perm-title">Permissûçes de Acesso</div>
        {form.perfil==='admin' ? (
          <div className="uf-perm-note" style={{marginBottom:0}}>Administrador sempre tem acesso a todas as telas ã nûÈo ûˋ possûÙvel restringir.</div>
        ) : (
          <>
            <div className="uf-perm-note">Defina quais telas este usuûÀrio pode acessar ã mova comandos entre as duas listas.</div>
            <div className="uf-dual">
              <div className="uf-list-panel">
                <div className="uf-list-title-row"><span className="uf-list-title">Comandos DisponûÙveis ({totalDisponiveis})</span></div>
                <div className="uf-list-search">
                  <DIcon name="search" size={14}/>
                  <input type="text" placeholder="Buscar comando" value={buscaDisponiveis} onChange={e=>setBuscaDisponiveis(e.target.value)} />
                </div>
                <div className="uf-list-body">
                  {disponiveisList.length===0 && <div className="uf-list-empty">{buscaDispNorm ? 'Nenhum comando encontrado.' : 'Todos os comandos jûÀ estûÈo liberados.'}</div>}
                  {disponiveisList.map(m=>(
                    <div key={m.id} className={'uf-list-row'+(selDisponiveis.has(m.id)?' selected':'')}
                      onClick={()=>toggleSelecao(setSelDisponiveis, m.id)}
                      onDoubleClick={()=>moverUm(m.id)}>
                      <span className="uf-row-label">{m.label}</span>
                    </div>
                  ))}
                </div>
              </div>

              <div className="uf-center">
                <button type="button" className="uf-center-btn" disabled={selDisponiveis.size===0} onClick={liberarSelecionados}><DIcon name="chevronRight" size={14}/> Liberar</button>
                <button type="button" className="uf-center-btn" disabled={selLiberados.size===0} onClick={removerSelecionados}><DIcon name="chevronLeft" size={14}/> Remover</button>
                <button type="button" className="uf-center-btn" disabled={totalDisponiveis===0} onClick={liberarTodos}><DIcon name="chevronsRight" size={14}/> Liberar todos</button>
                <button type="button" className="uf-center-btn" disabled={totalLiberados===0} onClick={removerTodos}><DIcon name="chevronsLeft" size={14}/> Remover todos</button>
              </div>

              <div className="uf-list-panel liberados">
                <div className="uf-list-title-row"><span className="uf-list-title">Comandos Liberados ({totalLiberados})</span></div>
                <div className="uf-list-search">
                  <DIcon name="search" size={14}/>
                  <input type="text" placeholder="Buscar comando" value={buscaLiberados} onChange={e=>setBuscaLiberados(e.target.value)} />
                </div>
                <div className="uf-list-body">
                  {liberadosList.length===0 && <div className="uf-list-empty">{buscaLibNorm ? 'Nenhum comando encontrado.' : 'Nenhum comando liberado ainda.'}</div>}
                  {liberadosList.map(m=>(
                    <div key={m.id} className={'uf-list-row'+(selLiberados.has(m.id)?' selected':'')}
                      draggable
                      onDragStart={()=>setDragId(m.id)}
                      onDragOver={e=>e.preventDefault()}
                      onDrop={e=>{e.preventDefault(); reordenarLiberado(dragId, m.id); setDragId(null);}}
                      onDragEnd={()=>setDragId(null)}
                      onClick={()=>toggleSelecao(setSelLiberados, m.id)}
                      onDoubleClick={()=>moverUm(m.id)}>
                      <span className="uf-row-label">{m.label}</span>
                      <span className="uf-drag-handle"><DIcon name="gripVertical" size={15}/></span>
                      <button type="button" className="uf-remove-btn" onClick={e=>{e.stopPropagation(); moverUm(m.id);}} aria-label={'Remover '+m.label}><DIcon name="x" size={13}/></button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </>
        )}

        <div className="btn-row" style={{marginTop:22}}>
          <button type="button" className="btn btn-outline" onClick={onCancel} disabled={salvando}>Cancelar</button>
          <button type="submit" className="btn btn-primary" disabled={salvando}>{salvando ? 'SalvandoãÎ' : (isEdit ? 'Salvar AlteraûÏûçes' : 'Criar UsuûÀrio')}</button>
        </div>
      </form>
    </div>
  );
}

// Antes vivia empilhado dentro de ConfiguraûÏûçes, logo acima de UsuûÀrios ã foi
// destacado pra tela prû°pria (goto('enderecos')) porque estava se misturando
// visualmente com o cadastro de usuûÀrio. Mesmo componente/lû°gica de antes, sû°
// a navegaûÏûÈo atûˋ ele que mudou (ver Home, Sidebar).
function AddressValidationPanel({enderecosPropostos=[], onResolve}){
  const pendentes = enderecosPropostos.filter(e=>e.status==='pendente');
  // Confirmar/rejeitar agora aguarda confirmaûÏûÈo do Supabase (ver
  // resolveAddressProposal em App()) ã mesmo padrûÈo de busyId/erros jûÀ usado
  // em UserManagementPanel/RecountsPanel.
  const [busyId, setBusyId] = useState(null);
  const [erros, setErros] = useState({});

  async function handleResolve(id, status){
    setBusyId(id);
    setErros(prev=>({...prev, [id]: null}));
    const res = await onResolve(id, status);
    setBusyId(null);
    if(!res || !res.ok) setErros(prev=>({...prev, [id]: (res && res.erro) || 'NûÈo foi possûÙvel salvar ã tente novamente.'}));
  }

  return (
    <div className="panel">
      <div className="section-title" style={{marginTop:0}}>
        Aguardando confirmaûÏûÈo
        {pendentes.length>0 && <span className="badge" style={{position:'static',marginLeft:8}}>{pendentes.length}</span>}
      </div>
      {enderecosPropostos.length===0 ? (
        <div style={{fontSize:'var(--text-sm)',color:'var(--ink-dim)'}}>
          Nenhum endereûÏo informado ainda. Toda vez que um operador contar um item sem endereûÏo
          cadastrado, ele vai informar onde encontrou ã e o endereûÏo aparece aqui para validaûÏûÈo.
        </div>
      ) : (
        enderecosPropostos.map(e=>(
          <div key={e.id} className="list-row" style={{flexWrap:'wrap'}}>
            <div>
              <div className="lr-title">{e.descricao}</div>
              <div className="lr-sub">{e.productCode} ôñ informado como <strong style={{color:'var(--ink)'}}>{e.enderecoInformado}</strong> por {e.usuario} em {e.data}</div>
              {erros[e.id] && <div style={{fontSize:'var(--text-xs)',color:'var(--danger)',marginTop:4}}>{erros[e.id]}</div>}
            </div>

          {resultado.erroFilaRecontagem && <><br/><Ic>ã </Ic> Histû°rico salvo, mas falhou ao enfileirar recontagens/ajustes: {resultado.erroFilaRecontagem}</>}
          {resultado.erroLimpezaSeeds && <><br/><Ic>ã </Ic> Histû°rico salvo, mas falhou ao limpar itens com status desatualizado: {resultado.erroLimpezaSeeds}</>}
        </div>
      )}
      {resultado && !resultado.ok && (
        <div className="divergence-alert" style={{marginTop:14}}><Ic>ã </Ic><span>{resultado.erro}</span></div>
      )}
    </div>
  );
}

// "UsuûÀrios" ã extraûÙdo de dentro de ConfiguraûÏûçes (cliente notou que fazia
// mais sentido como cadastro do que como configuraûÏûÈo de sistema, mesma
// razûÈo que jûÀ tinha levado "EndereûÏos Pendentes" pra fora de ConfiguraûÏûçes
// antes). Levei junto os dois painûˋis de senha (SolicitaûÏûçes de
// RedefiniûÏûÈo, Histû°rico de AlteraûÏûçes) ã sûÈo bem ligados a usuûÀrio, mesmo
// padrûÈo de "extrair o bloco tal como estûÀ" jûÀ usado antes. Sû° admin
// acessa, mesmo grupo que jûÀ tinha esse conteû¤do dentro de ConfiguraûÏûçes.
function UsuariosScreen({users, currentUser, goto, successMessage, onToggleUserStatus, onDeleteUser, onAdminPasswordAction, passwordRequests=[], onResolvePasswordRequest, passwordHistory=[]}){
  const pendentesSenha = passwordRequests.filter(r=>r.status==='pendente');
  // `successMessage` vem via flowState (ver App(), onSaved do UserForm) ã sû°
  // aparece logo depois de criar/editar um usuûÀrio com sucesso, some sozinho
  // em qualquer navegaûÏûÈo seguinte (flowState ûˋ sempre substituûÙdo por
  // goto()). Sem isso, criar um usuûÀrio nûÈo dava nenhuma confirmaûÏûÈo visûÙvel
  // alûˋm de voltar pra esta tela ã parecia que "nada tinha acontecido".
  const [dismissed, setDismissed] = useState(false);
  useEffect(()=>{ setDismissed(false); }, [successMessage]);
  const [historyPage, setHistoryPage] = useState(1);
  const totalHistoryPages = Math.max(1, Math.ceil(passwordHistory.length / PASSWORD_HISTORY_PAGE_SIZE));
  const currentHistoryPage = Math.min(historyPage, totalHistoryPages);
  const historyStart = (currentHistoryPage-1)*PASSWORD_HISTORY_PAGE_SIZE;
  const pagedHistory = passwordHistory.slice(historyStart, historyStart+PASSWORD_HISTORY_PAGE_SIZE);

  return (
    <div>
      {successMessage && !dismissed && (
        <div className="result-banner ok" style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:12}}>
          <span style={{fontSize:'var(--text-sm)',fontWeight:600,color:'var(--ok)'}}>{successMessage}</span>
          <button type="button" className="btn btn-secondary" style={{width:'auto',padding:'6px 12px',fontSize:'var(--text-xs)'}} onClick={()=>setDismissed(true)}>Fechar</button>
        </div>
      )}
      <UserManagementPanel
        users={users}
        currentUser={currentUser}
        goto={goto}
        onToggleUserStatus={onToggleUserStatus}
        onDeleteUser={onDeleteUser}
        onAdminPasswordAction={onAdminPasswordAction}
      />

      <div className="panel">
        <div className="section-title" style={{marginTop:0}}>
          SolicitaûÏûçes de RedefiniûÏûÈo de Senha
          {pendentesSenha.length>0 && <span className="badge" style={{position:'static',marginLeft:8}}>{pendentesSenha.length}</span>}
        </div>
        {passwordRequests.length===0 ? (
          <div style={{fontSize:'var(--text-sm)',color:'var(--ink-dim)'}}>Nenhuma solicitaûÏûÈo de "esqueci minha senha" recebida ainda.</div>
        ) : (
          passwordRequests.map(r=>(
            <PasswordRequestRow key={r.id} req={r} onResolve={onResolvePasswordRequest} />
          ))
        )}
      </div>

      {passwordHistory.length>0 && (
        <div className="panel">
          <div className="section-title" style={{marginTop:0}}>Histû°rico de AlteraûÏûçes de Senha</div>
          <table className="rank-table">
            <thead><tr><th>UsuûÀrio</th><th>AûÏûÈo</th><th>Administrador</th><th>Data/Hora</th></tr></thead>
            <tbody>
              {pagedHistory.map(h=>(
                <tr key={h.id}><td>{h.usuario}</td><td>{h.acao}</td><td>{h.administrador}</td><td style={{fontFamily:'var(--font-mono)',fontSize:'var(--text-xs)'}}>{h.data}</td></tr>
              ))}
            </tbody>
          </table>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:14,paddingTop:14,borderTop:'1px solid var(--line)',flexWrap:'wrap',gap:10}}>
            <span style={{fontSize:'var(--text-sm)',color:'var(--ink-dim)'}}>
              Mostrando {historyStart+1} a {Math.min(historyStart+PASSWORD_HISTORY_PAGE_SIZE, passwordHistory.length)} de {passwordHistory.length} alteraûÏ{passwordHistory.length===1?'ûÈo':'ûçes'}
            </span>
            {totalHistoryPages>1 && (
              <div className="btn-row" style={{width:'auto'}}>
                <button className="btn btn-outline" style={{width:'auto',padding:'8px 14px'}} disabled={currentHistoryPage<=1} onClick={()=>setHistoryPage(p=>p-1)}>ã¿</button>
                <button className="btn btn-outline" style={{width:'auto',padding:'8px 14px'}} disabled={currentHistoryPage>=totalHistoryPages} onClick={()=>setHistoryPage(p=>p+1)}>ã¤</button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ConfiguraûÏûçes ã esvaziada depois que UsuûÀrios (+ painûˋis de senha) virou
// tela prû°pria em Cadastros. Cliente pediu pra manter a tela no menu mesmo
// vazia ("pode surgir ideias pra colocarmos lûÀ dentro"), em vez de remover o
// item de navegaûÏûÈo ã placeholder simples atûˋ aparecer algo real pra ir aqui.
function Settings({role, currentUser, operadorVeSaldo, onSetOperadorVeSaldo, operadorVeValoresRecontagem, onSetOperadorVeValoresRecontagem, gruposExcluidos, onSetGruposExcluidos, sessionTimeoutMin, onSetSessionTimeoutMin}){
  const isAdmin = role==='admin';

  // Lista COMPLETA de grupos com saldo (sem aplicar a prû°pria exclusûÈo) ã
  // o admin precisa ver e poder REMOVER um grupo jûÀ excluûÙdo, nûÈo sû°
  // adicionar; se filtrûÀssemos aqui pela mesma exclusûÈo, o grupo jûÀ marcado
  // desapareceria da lista de sugestûçes e ficaria impossûÙvel desmarcar.
  const [gruposDisponiveis, setGruposDisponiveis] = useState(isAdmin ? null : []);
  useEffect(()=>{
    if(!isAdmin) return;
    let cancelado = false;
    fetchGruposComEstoque().then(lista=>{ if(!cancelado) setGruposDisponiveis(lista); });
    return ()=>{ cancelado = true; };
  }, [isAdmin]);

  // Redesenho pedido pelo cliente (mockup: 4 cards + um û¤nico botûÈo "Salvar
  // alteraûÏûçes" no rodapûˋ) trocou o salvamento de "cada campo grava sozinho
  // ao mudar" (padrûÈo antigo) por "edita tudo local, grava em bloco sû° ao
  // clicar Salvar" ã mais parecido com uma tela de configuraûÏûçes comum
  // (edita vûÀrios campos, confirma uma vez sû°). `*Local` ûˋ sû° estado de
  // INTERFACE, nûÈo persistido sozinho; ressincroniza com o valor real
  // (`app_config`, via Realtime) sempre que a prop muda, mesmo padrûÈo que
  // `timeoutInput` jûÀ usava antes desta rodada.
  const [saldoLocal, setSaldoLocal] = useState(!!operadorVeSaldo);
  const [valoresRecontagemLocal, setValoresRecontagemLocal] = useState(!!operadorVeValoresRecontagem);
  const [gruposLocal, setGruposLocal] = useState(gruposExcluidos||[]);
  const [timeoutInput, setTimeoutInput] = useState(String(sessionTimeoutMin ?? DEFAULT_SESSION_TIMEOUT_MIN));
  useEffect(()=>{ setSaldoLocal(!!operadorVeSaldo); }, [operadorVeSaldo]);
  useEffect(()=>{ setValoresRecontagemLocal(!!operadorVeValoresRecontagem); }, [operadorVeValoresRecontagem]);
  useEffect(()=>{ setGruposLocal(gruposExcluidos||[]); }, [gruposExcluidos]);
  useEffect(()=>{ setTimeoutInput(String(sessionTimeoutMin ?? DEFAULT_SESSION_TIMEOUT_MIN)); }, [sessionTimeoutMin]);

  const [salvando, setSalvando] = useState(false);
  const [erro, setErro] = useState(null);
  const [salvo, setSalvo] = useState(false);

  const gruposIguais = (a,b) => a.length===b.length && a.every(x=>b.includes(x));
  const timeoutAtual = sessionTimeoutMin ?? DEFAULT_SESSION_TIMEOUT_MIN;
  const timeoutNum = Number(timeoutInput);
  const timeoutValido = Number.isFinite(timeoutNum) && timeoutNum>0;
  const houveMudanca = saldoLocal!==!!operadorVeSaldo
    || valoresRecontagemLocal!==!!operadorVeValoresRecontagem
    || !gruposIguais(gruposLocal, gruposExcluidos||[])
    || (timeoutValido && Math.round(timeoutNum)!==timeoutAtual);
  const podeSalvar = isAdmin && timeoutValido && houveMudanca && !salvando;

  async function salvarTudo(){
    if(!podeSalvar) return;
    setSalvando(true); setErro(null); setSalvo(false);
    const falhas = [];
    if(saldoLocal!==!!operadorVeSaldo){
      const res = await onSetOperadorVeSaldo(saldoLocal);
      if(!res.ok) falhas.push('Visibilidade do Saldo na Contagem: '+(res.erro||'falha ao salvar.'));
    }
    if(valoresRecontagemLocal!==!!operadorVeValoresRecontagem){
      const res = await onSetOperadorVeValoresRecontagem(valoresRecontagemLocal);
      if(!res.ok) falhas.push('Visibilidade de Valores em Recontagens: '+(res.erro||'falha ao salvar.'));
    }
    if(!gruposIguais(gruposLocal, gruposExcluidos||[])){
      const res = await onSetGruposExcluidos(gruposLocal);
      if(!res.ok) falhas.push('Grupos ExcluûÙdos: '+(res.erro||'falha ao salvar.'));
    }
    if(Math.round(timeoutNum)!==timeoutAtual){
      const res = await onSetSessionTimeoutMin(Math.round(timeoutNum));
      if(!res.ok) falhas.push('Tempo de Inatividade: '+(res.erro||'falha ao salvar.'));
    }
    setSalvando(false);
    if(falhas.length>0){
      setErro(falhas.join(' '));
    } else {
      setSalvo(true);
      setTimeout(()=>setSalvo(false), 2500);
    }
  }

  return (
    <div>
      {isAdmin && (
        <>
          <div className="cfg-card">
            <div className="cfg-card-head">
              <div>
                <div className="cfg-card-title">Visibilidade do saldo na contagem</div>
                <div className="cfg-card-desc">Controla se o operador vûˆ o saldo do sistema (referûˆncia antes de digitar, card de comparaûÏûÈo ao vivo) durante a contagem, em todos os modos.</div>
              </div>
              <span className="cfg-help-btn" title="Vale pra Aleatû°ria, Manual, Rota, Lista Importada e Recontagem. LûÙder e administrador sempre veem o saldo, independente desta configuraûÏûÈo ã isso nûÈo muda a regra de aprovaûÏûÈo automûÀtica/segunda contagem/anûÀlise do lûÙder, sû° o que aparece na tela.">?</span>
            </div>
            <label className="cfg-check-row" style={{cursor:'pointer'}}>
              <input type="checkbox" checked={saldoLocal} onChange={e=>setSaldoLocal(e.target.checked)} />
              <div>
                <div className="cfg-check-label">Operador pode ver o saldo do sistema durante a contagem</div>
                <div className="cfg-check-sub">Com a opûÏûÈo desligada, o operador conta "û s cegas" ã a comparaûÏûÈo com o sistema sû° aparece depois, na anûÀlise do lûÙder.</div>
              </div>
            </label>
          </div>

          <div className="cfg-card">
            <div className="cfg-card-head">
              <div>
                <div className="cfg-card-title">Visibilidade de valores em recontagens/divergentes</div>
                <div className="cfg-card-desc">ConfiguraûÏûÈo separada da acima ã controla sû° o BLOCO EXTRA de cada card em "Recontagens".</div>
              </div>
              <span className="cfg-help-btn" title="Bloco extra: armazûˋm, endereûÏo contado, motivo, observaûÏûÈo, foto, valor divergente em R$ e quem contou. O quadro principal (Sistema/FûÙsico/DiferenûÏa/%) continua visûÙvel pra qualquer perfil ã essa configuraûÏûÈo ûˋ sû° sobre o valor em R$ e os detalhes complementares.">?</span>
            </div>
            <label className="cfg-check-row" style={{cursor:'pointer'}}>
              <input type="checkbox" checked={valoresRecontagemLocal} onChange={e=>setValoresRecontagemLocal(e.target.checked)} />
              <div>
                <div className="cfg-check-label">Operador pode ver detalhes extras em Recontagens</div>
                <div className="cfg-check-sub">Com a opûÏûÈo desligada (padrûÈo), o operador nûÈo vûˆ esse bloco extra ã lûÙder e administrador sempre veem, sem essa restriûÏûÈo.</div>
              </div>
            </label>
          </div>

          <div className="cfg-card">
            <div className="cfg-card-head">
              <div>
                <div className="cfg-card-title">Grupos excluûÙdos da contagem automûÀtica</div>
                <div className="cfg-card-desc">Grupos/famûÙlias marcados aqui nunca entram sozinhos numa fila de contagem (Aleatû°ria, Curva ABC, Rota de EndereûÏo).</div>
              </div>
              <span className="cfg-help-btn" title="Tambûˋm nûÈo aparecem pra seleûÏûÈo em 'Contagem por Grupo' ã û¤til pra grupos cujo material nûÈo existe fisicamente no almoxarifado (sû° saldo remanescente no sistema). Esta configuraûÏûÈo sû° afeta geraûÏûÈo automûÀtica de fila.">?</span>
            </div>
            {gruposDisponiveis===null ? (
              <div className="empty-state" style={{padding:14,marginTop:14}}>Carregando grupos disponûÙveisãÎ</div>
            ) : gruposDisponiveis.length===0 ? (
              <div className="empty-state" style={{padding:14,marginTop:14}}>Nenhum grupo com saldo carregado ainda.</div>
            ) : (
              <div style={{marginTop:14}}>
                <GrupoMultiSelectField
                  grupos={gruposDisponiveis}
                  selecionados={gruposLocal}
                  onToggle={cod=>setGruposLocal(prev=>[...prev, cod])}
                  onRemove={cod=>setGruposLocal(prev=>prev.filter(c=>c!==cod))}
                />
              </div>
            )}
            <div className="cfg-note"><Ic>ã¿</Ic><span>Buscar um cû°digo especûÙfico na Contagem Manual continua funcionando normalmente, mesmo que um grupo esteja excluûÙdo.</span></div>
          </div>

          <div className="cfg-card">
            <div className="cfg-card-head">
              <div>
                <div className="cfg-card-title">Tempo de inatividade</div>
                <div className="cfg-card-desc">Minutos sem nenhuma interaûÏûÈo (toque, clique, tecla) atûˋ o logout automûÀtico ã protege um tablet compartilhado esquecido logado no chûÈo de fûÀbrica.</div>
              </div>
              <span className="cfg-help-btn" title="Cada evento de toque/clique/tecla reinicia a contagem. Vale em todos os aparelhos assim que salvo.">?</span>
            </div>
            <div className="cfg-timeout-row">
              <input type="number" min="1" step="1" value={timeoutInput} onChange={e=>setTimeoutInput(e.target.value)} onWheel={e=>e.target.blur()} />
              <span style={{fontSize:'var(--text-sm)',color:'var(--ink-dim)'}}>minutos</span>
            </div>
            <div className="cfg-timeout-badge">Hoje: <strong>{timeoutAtual} minutos</strong></div>
          </div>

          {erro && <div className="login-error" style={{marginBottom:12}}>{erro}</div>}
          <div className="cfg-footer">
            {salvo && <span style={{fontSize:'var(--text-sm)',color:'var(--ok)'}}>Salvo ã jûÀ vale em todos os aparelhos.</span>}
            <button type="button" className="btn btn-primary" disabled={!podeSalvar} onClick={salvarTudo}><DIcon name="checkCircle" size={16}/> {salvando ? 'SalvandoãÎ' : 'Salvar alteraûÏûçes'}</button>
          </div>
        </>
      )}
      {!isAdmin && (
        <div className="panel">
          <div style={{fontSize:'var(--text-sm)',color:'var(--ink-dim)'}}>Nenhuma configuraûÏûÈo disponûÙvel no momento.</div>
        </div>
      )}
    </div>
  );
}

</script>
