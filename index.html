// Parser da aba "BD_Contagens" da planilha de anûÀlise que o cliente jûÀ
// usava antes do InventûÀrio 360 (Base_Analise_Contagens_2026.xlsx) ã tem um
// bloco de indicadores ANTES da tabela de verdade (linhas 1-5 do arquivo
// original: tûÙtulo, metas, resumo), entûÈo lûˆ a planilha como matriz crua
// (`sheet_to_json(sheet, {header:1})`) e PROCURA a linha que contûˋm
// "Cû°digo" numa das colunas, em vez de assumir cabeûÏalho na linha 1 (padrûÈo
// diferente de todo o resto do app, onde a planilha subida jûÀ comeûÏa direto
// com o cabeûÏalho). Colunas resolvidas pelo NOME (nûÈo pela posiûÏûÈo) ã se o
// cliente reordenar colunas numa exportaûÏûÈo futura, continua funcionando.
// Cûˋlula de data da planilha de histû°rico nem sempre chega como um `Date`
// de verdade ã se a coluna foi formatada como TEXTO no Excel original (bem
// comum numa planilha alimentada û  mûÈo por vûÀrias pessoas ao longo de
// meses, como a `BD_Contagens`), o SheetJS entrega uma string crua mesmo
// com `cellDates:true`, e o parser antigo (sû° `instanceof Date`) descartava
// a data inteira ã cliente reportou item com data visûÙvel na planilha
// aparecendo como "Sem data registrada" no app. Cobre os formatos mais
// provûÀveis: string "DD/MM/AAAA"/"DD-MM-AAAA"/"DD/MM/AA" (com "/" ou "-"
// como separador, com ou sem hora colada no fim, ex. "14/07/2026 00:00:00"),
// string "AAAA-MM-DD"/"AAAA/MM/DD", e nû¤mero de sûˋrie do Excel (cûˋlula
// numûˋrica que perdeu a formataûÏûÈo de data na leitura). Mantûˋm o
// comportamento antigo (`Date` real) como caso feliz.
function parseDataHistorico(v){
  if(v instanceof Date && !Number.isNaN(v.getTime())) return v.toISOString().slice(0,10);
  if(typeof v === 'number' && window.XLSX && window.XLSX.SSF && window.XLSX.SSF.parse_date_code){
    const d = window.XLSX.SSF.parse_date_code(v);
    if(d && d.y) return String(d.y).padStart(4,'0')+'-'+String(d.m).padStart(2,'0')+'-'+String(d.d).padStart(2,'0');
    return null;
  }
  if(typeof v === 'string'){
    // Tira hora/segundos colados no fim (ex.: "14/07/2026 00:00:00") antes
    // de tentar casar com os formatos de data pura.
    const s = v.trim().replace(/\s+\d{1,2}:\d{2}(:\d{2})?\s*$/, '');
    let m = s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})$/);
    if(m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
    m = s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/);
    if(m) return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
    m = s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{2})$/);
    if(m) return '20'+m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
  }
  return null;
}

// Fallback pra quando a prû°pria coluna "Data" nûÈo bate com nenhum formato
// conhecido: "Doc" ûˋ confirmadamente sû° a "Data" reformatada "DDMMYY" (ver
// CLAUDE.md "Descoberta importante durante a anûÀlise" ã comparaûÏûÈo real
// contra a planilha do cliente, "Doc" nunca ûˋ um ID û  parte). Formato mais
// simples e mais estûÀvel que "Data" em si (planilha alimentada û  mûÈo), entûÈo
// vale tentar antes de desistir e marcar a linha como "sem data". Cobre o
// caso de "Doc" ter perdido o zero û  esquerda por ter sido lido como nû¤mero
// no Excel (mesma classe de bug jûÀ vista em cû°digo de produto/Sld.Atu.).
function parseDocParaData(v){
  if(v==null || v==='') return null;
  let s = String(v).trim();
  if(/^\d+$/.test(s)) s = s.padStart(6,'0');
  const m = s.match(/^(\d{2})(\d{2})(\d{2})$/);
  if(!m) return null;
  const [, dd, mm, yy] = m;
  if(Number(mm)<1 || Number(mm)>12 || Number(dd)<1 || Number(dd)>31) return null;
  return '20'+yy+'-'+mm+'-'+dd;
}

function parseHistoricoContagensRows(matrix){
  const headerRowIdx = matrix.findIndex(row => (row||[]).some(cell => String(cell||'').trim()==='Cû°digo'));
  if(headerRowIdx===-1){
    return { linhas: [], resumo: {totalLinhas:0, validas:0, semCodigo:0, semData:0, erroCabecalho:true} };
  }
  const header = matrix[headerRowIdx].map(h=>String(h||'').trim());
  const col = nome => header.indexOf(nome);
  const idx = {
    codigo: col('Cû°digo'), descricao: col('DescriûÏûÈo'), end: col('End'),
    sistema: col('Sistema'), fisico: col('Fisico'), diferenca: col('DiferenûÏa'),
    custo: col('Custo'), acc: col('Acc'), data: col('Data'), sem: col('Sem.'),
    status: col('Status'), classe: col('Classe'), causa: col('Causa'), obs: col('OBS'),
    sa: col('SA'), diasSMov: col('Dias S/ Mov.'), doc: col('Doc'),
  };
  const num = v => { if(v==null || v==='') return null; const n = Number(v); return Number.isFinite(n) ? n : null; };
  let totalLinhas = 0, semCodigo = 0, semData = 0;
  const linhas = [];
  for(let r=headerRowIdx+1; r<matrix.length; r++){
    const row = matrix[r];
    if(!row || row.every(c=>c==null || c==='')) continue; // linha em branco
    totalLinhas++;
    const codigoRaw = idx.codigo>=0 ? row[idx.codigo] : null;
    if(codigoRaw==null || String(codigoRaw).trim()===''){ semCodigo++; continue; }
    const dataRaw = idx.data>=0 ? row[idx.data] : null;
    let data = parseDataHistorico(dataRaw);
    if(!data && idx.doc>=0) data = parseDocParaData(row[idx.doc]);
    if(!data) semData++;
    // `.trim()` em TODOS os campos de texto ã a planilha real jûÀ mostrou mais
    // de uma vez ter espaûÏo sobrando em cûˋlulas (ver o bug do "Sld.Atu." com
    // padding do formato contûÀbil do Excel, seûÏûÈo "Bug real no upload da
    // SB2"), e um "Status" tipo "OK " (com espaûÏo) faria o filtro de
    // fetchContagensHistoricoConcluidas nûÈo bater com o valor esperado.
    const txt = v => v!=null && String(v).trim()!=='' ? String(v).trim() : null;
    linhas.push({
      // Mesma regra de reconstruûÏûÈo jûÀ usada pro catûÀlogo (produtos) e pro
      // saldo SB2 (reconstructNumericCode) ã a planilha de anûÀlise antiga
      // (BD_Contagens) tem o MESMO problema do Excel com cû°digo 100%
      // numûˋrico (perde zero û  esquerda/pontos), que nunca tinha sido
      // corrigido aqui. Achado ao investigar cû°digos aparecendo sem
      // formataûÏûÈo ("22103300001" em vez de "221.033.00001") em telas que
      // combinam contagens ao vivo com histû°rico importado.
      produto_codigo: reconstructNumericCode(codigoRaw),
      descricao: idx.descricao>=0 ? String(row[idx.descricao]||'').trim() : '',
      // "-" no lugar de null quando a planilha nûÈo traz endereûÏo ã cliente
      // confirmou que reimportar o mesmo arquivo (ou um arquivo parecido)
      // mais de uma vez estava gerando linhas duplicadas de verdade em
      // `contagens_historico`: o Postgres trata NULL como sempre diferente
      // de qualquer outro valor, mesmo de outro NULL, entûÈo a trava de
      // duplicado (unique produto_codigo+data+endereco) nunca pegava linha
      // sem endereûÏo ã cada reimportaûÏûÈo criava uma cû°pia nova em vez de
      // ser bloqueada como jûÀ existente. Com um valor fixo no lugar do null,
      // a MESMA linha reimportada duas vezes agora bate na trava de
      // verdade. NûÈo afeta nenhuma exibiûÏûÈo ã "-" nunca aparece em tela,
      // jûÀ que os lugares que mostram endereûÏo tratam ausûˆncia de dado
      // (endereûÏo nûÈo cadastrado) da mesma forma que sempre trataram.
      endereco: idx.end>=0 ? (txt(row[idx.end]) || '-') : '-',
      saldo_sistema: idx.sistema>=0 ? num(row[idx.sistema]) : null,
      qtd_contada: idx.fisico>=0 ? num(row[idx.fisico]) : null,
      diferenca: idx.diferenca>=0 ? num(row[idx.diferenca]) : null,
      valor_divergente: idx.custo>=0 ? num(row[idx.custo]) : null,
      acuracidade: idx.acc>=0 ? num(row[idx.acc]) : null,
      data,
      semana: idx.sem>=0 ? num(row[idx.sem]) : null,
      status: idx.status>=0 ? txt(row[idx.status]) : null,
      classe: idx.classe>=0 ? txt(row[idx.classe]) : null,
      causa: idx.causa>=0 ? txt(row[idx.causa]) : null,
      observacao: idx.obs>=0 ? txt(row[idx.obs]) : null,
      solicitacao_ajuste: idx.sa>=0 ? txt(row[idx.sa]) : null,
      dias_sem_movimento: idx.diasSMov>=0 ? num(row[idx.diasSMov]) : null,
      documento: idx.doc>=0 ? txt(row[idx.doc]) : null,
    });
  }
  // A planilha real do cliente tem linhas com a MESMA chave (produto_codigo,
  // data, endereco) repetida ã vira erro no Postgres ("ON CONFLICT DO UPDATE
  // command cannot affect row a second time") se duas linhas com a mesma
  // chave caem no mesmo lote de upsert. Dedupe sû° quando os campos da chave
  // sûÈo nûÈo-nulos e batem ã mesma semûÂntica da unique constraint do
  // Postgres, que trata NULL como sempre distinto (mesmo de outro NULL).
  // `endereco` sozinho nûÈo fica mais nulo (vira "-" acima, ver comentûÀrio no
  // campo) ã cliente reportou reimportaûÏûÈo duplicando linha sem endereûÏo de
  // verdade no banco, essa troca jûÀ resolve os dois lados (aqui no parser E
  // na trava do banco). Sû° `data` ainda pode ficar nula (~460 linhas "sem
  // data" da planilha original) e continua fora do dedupe, pra nûÈo perder
  // histû°rico real. Mantûˋm a ûLTIMA ocorrûˆncia entre as que colidem (arquivo
  // master sû° cresce, a linha mais abaixo tende a ser a mais recente/
  // corrigida) ã mesma chave da "linha 1500" do bug reportado.
  const porChave = new Map();
  const linhasDedup = [];
  let duplicadas = 0;
  linhas.forEach(l=>{
    if(l.data==null){ linhasDedup.push(l); return; }
    const chave = l.produto_codigo+'|'+l.data+'|'+l.endereco;
    if(porChave.has(chave)){
      duplicadas++;
      linhasDedup[porChave.get(chave)] = l;
    }else{
      porChave.set(chave, linhasDedup.length);
      linhasDedup.push(l);
    }
  });
  return { linhas: linhasDedup, resumo: { totalLinhas, validas: linhasDedup.length, semCodigo, semData, duplicadas } };
}

// Upload em lote pra `contagens_historico`, via UPSERT (nûÈo substitui tudo
// como o saldo SB2 ã ver `replaceEstoqueSaldoInSupabase`) porque essas
// linhas sûÈo um HISTûRICO imutûÀvel: o arquivo master do cliente sû° cresce
// com novas rodadas, entûÈo ele provavelmente vai re-subir o mesmo arquivo
// (agora maior) mais de uma vez ao longo do tempo, nûÈo sû° uma. Upsert na
// chave (produto_codigo, data, endereco) ã mesma unique constraint da
// tabela, ver backend/schema.sql ã faz o re-upload nûÈo duplicar as linhas
// jûÀ importadas antes.
async function importHistoricoContagensToSupabase(linhas, onProgress){
  if(!supabaseClient) return {ok:false, erro:'Supabase nûÈo configurado.'};
  try{
    const TAMANHO_LOTE = 500;
    let inseridas = 0;
    for(let i=0; i<linhas.length; i+=TAMANHO_LOTE){
      const lote = linhas.slice(i, i+TAMANHO_LOTE);
      const { error } = await supabaseClient
        .from('contagens_historico')
        .upsert(lote, {onConflict: 'produto_codigo,data,endereco'});
      if(error) return {ok:false, erro:'Falha ao gravar lote (linha '+i+'): '+error.message, inseridas};
      inseridas += lote.length;
      if(onProgress) onProgress(inseridas, linhas.length);
    }
    return {ok:true, inseridas};
  }catch(err){
    return {ok:false, erro:String(err && err.message || err)};
  }
}

const HISTORICO_STATUS_VOCABULARIO = ['OK', 'Sem Ajuste', 'Ajustado', 'Ajustar', 'Recontar', 'Pendente'];

// Itens da planilha com Status="Recontar" nûÈo estûÈo resolvidos de verdade ã
// o cliente confirmou que ainda precisam ser recontados. Diferente do resto
// do histû°rico (que sû° vai pra `contagens_historico`, sem tocar no app ao
// vivo), esses viram uma contagem "semente" na tabela `contagens` de
// verdade, com `status_aprovacao='aguardando_segunda'` ã mesmo estado que
// qualquer outro item que caiu na fila de recontagem dentro do prû°prio app.
// Isso faz o item aparecer normalmente em "Aguardando Segunda Contagem"
// (RecountsPanel), pronto pra qualquer operador pegar e recontar via
// RecountFlow ã nûÈo precisou de nenhuma tela nova, sû° alimentar a mesma
// fila que jûÀ existe.
//
// `id` determinûÙstico (`CNT-HIST-<cû°digo>-<data>`) em vez de aleatû°rio ã
// upsert com `ignoreDuplicates:true` faz re-subir o mesmo arquivo nûÈo criar

// de propû°sito, entûÈo usa ON CONFLICT DO NOTHING em vez de sobrescrever).
// Linhas sem `data` (parte das que a planilha nûÈo preenche) sûÈo puladas

function buildRecontarSeedsFromHistorico(linhas){
  return linhas
    .filter(l => l.status==='Recontar' && l.produto_codigo && l.data)

        ? (l.diferenca / l.saldo_sistema) * 100
        : null;
      const classificacao = l.valor_divergente!=null ? classifyDivergence(Math.abs(l.valor_divergente)).label : 'Divergûˆncia (importada do histû°rico)';
      const idSeguro = 'CNT-HIST-' + String(l.produto_codigo).replace(/[^A-Za-z0-9]/g,'') + '-' + l.data.replace(/-/g,'');
      return {

        // parseHistoricoContagensRows) ã nunca deve aparecer na tela como
        // se fosse um endereûÏo de verdade, entûÈo volta a virar null aqui.
        endereco: l.endereco==='-' ? null : l.endereco,
        endereco_contado: l.endereco==='-' ? null : l.endereco,

        observacao: (l.observacao ? l.observacao + ' ã ' : '') + 'Importado do histû°rico da planilha de anûÀlise (ainda precisa de recontagem).',
        data: l.data,
        hora: null,
      };
    });
}

// Mesmo raciocûÙnio de `buildRecontarSeedsFromHistorico`, agora pro Status
// "Ajustar" ã cliente confirmou que esses itens tambûˋm NûO estûÈo resolvidos
// de verdade (o nome jûÀ diz: falta ajustar). DiferenûÏa do "Recontar":
// aqui nûÈo falta uma contagem fûÙsica de novo, falta uma DECISûO do lûÙder
// (aprovar o ajuste, ou mandar recontar) ã por isso o status vira
// `aguardando_analise_lider` (mesmo estado de qualquer outra divergûˆncia
// aguardando o lûÙder), nûÈo `aguardando_segunda`. Isso faz o item aparecer
// em "Itens Divergentes" (DivergentItemsPanel), com as mesmas aûÏûçes que
// qualquer outra divergûˆncia ao vivo jûÀ tem (Aprovar/Solicitar nova
// contagem/Recontar/Marcar urgente/Excluir).
// `id` com prefixo diferente (`CNT-HIST-ADJ-`, nûÈo `CNT-HIST-`) ã evita
// qualquer colisûÈo teû°rica com o id de um seed "Recontar" pro mesmo
// cû°digo+data (nûÈo deveria acontecer, jûÀ que cada linha da planilha tem
// um Status sû°, mas mantûˋm os dois espaûÏos de id claramente distintos).
function buildAjustarSeedsFromHistorico(linhas){
  return linhas
    // Item "Ajustar" que Jû tem uma SA de verdade preenchida na planilha nûÈo
    // deveria mais entrar na fila de decisûÈo do lûÙder (a SA jûÀ existe, entûÈo
    // jûÀ passou por essa etapa em algum lugar) ã sû° o "Ajustar" SEM SA real ûˋ
    // que representa uma divergûˆncia ainda sem decisûÈo nenhuma.
    // `pareceValorDeStatusNaoSA` (perto de HISTORICO_STATUS_CONCLUIDOS) trata
    // como "sem SA real" tanto o campo vazio quanto um valor sujo repetindo
    // uma palavra do vocabulûÀrio de Status (achado real: item "000.63681"
    // tinha "SA"="Ajustar", igual ao Status, e por isso nunca entrava aqui ã
    // o guard original sû° olhava vazio/nûÈo-vazio, sem essa proteûÏûÈo).
    .filter(l => l.status==='Ajustar' && l.produto_codigo && l.data && pareceValorDeStatusNaoSA(l.solicitacao_ajuste))
    .map(l => {
      const percentual = (l.saldo_sistema!=null && l.saldo_sistema!==0 && l.diferenca!=null)
        ? (l.diferenca / l.saldo_sistema) * 100
        : null;
      const classificacao = l.valor_divergente!=null ? classifyDivergence(Math.abs(l.valor_divergente)).label : 'Divergûˆncia (importada do histû°rico)';

// Cliente pediu uma forma de reverter, DIRETO NO SITE (sem editar a
// planilha), um item que a planilha trouxe como "Ajustado" mas cujo ajuste
// foi reprovado na realidade ã "quero voltar o status de Ajustado... nûÈo
// quero fazer na planilha quero fazer no site". Reaproveita o MESMO destino
// que qualquer "Ajustar" jûÀ tem hoje (Itens Divergentes, aguardando_analise_
// lider) ã o item volta a ser uma divergûˆncia pendente de decisûÈo, com as
// mesmas aûÏûçes de sempre (Aprovar/Solicitar nova contagem/Recontar/Gerar SA
// de Ajuste de novo).
//
// Dois efeitos, os dois precisam ter sucesso pra considerar a aûÏûÈo completa:
// (1) atualiza `contagens_historico.status` pra 'Ajustar' ã sû° pra manter o
// registro de auditoria coerente com a decisûÈo tomada no site; NUNCA toca no
// arquivo original (a planilha do cliente continua mostrando "Ajustado" atûˋ
// ele mesmo decidir corrigir lûÀ, se quiser); (2) semeia a entrada equivalente
// em `contagens`, mesmo formato de `buildAjustarSeedsFromHistorico` ã usa
// upsert SEM `ignoreDuplicates` de propû°sito (diferente da importaûÏûÈo em
// massa, que evita sobrescrever pra nûÈo perder uma recontagem jûÀ feita): aqui
// ûˋ uma aûÏûÈo manual e deliberada de um admin, sobrescrever ûˋ o comportamento
// certo, nûÈo um risco de duplicar/perder dado.
async function reprovarAjusteHistoricoNaLinha(rawRow, motivoReprovacao){
  if(!supabaseClient) return {ok:false, erro:'Supabase nûÈo configurado.'};
  if(!rawRow || !rawRow.produto_codigo) return {ok:false, erro:'Item do histû°rico invûÀlido.'};
  try{
    const { error: errUpdate } = await supabaseClient
      .from('contagens_historico')
      .update({status: 'Ajustar'})
      .eq('produto_codigo', rawRow.produto_codigo)
      .eq('data', rawRow.data)
      .eq('endereco', rawRow.endereco);
    if(errUpdate) return {ok:false, erro:'Falha ao atualizar o histû°rico: '+errUpdate.message};

    const codigoSeguro = String(rawRow.produto_codigo).replace(/[^A-Za-z0-9]/g,'');
    const dataSegura = (rawRow.data||'').replace(/-/g,'');
    const idSeguro = 'CNT-HIST-ADJ-' + codigoSeguro + '-' + dataSegura;
    const percentual = (rawRow.saldo_sistema!=null && rawRow.saldo_sistema!==0 && rawRow.diferenca!=null)
      ? (rawRow.diferenca / rawRow.saldo_sistema) * 100
      : null;
    const classificacao = rawRow.valor_divergente!=null ? classifyDivergence(Math.abs(rawRow.valor_divergente)).label : 'Divergûˆncia (importada do histû°rico)';
    const seedRow = {
      id: idSeguro,
      inventario_id: 'ã',
      produto_codigo: rawRow.produto_codigo,
      descricao: rawRow.descricao,
      endereco: rawRow.endereco==='-' ? null : rawRow.endereco,
      endereco_contado: rawRow.endereco==='-' ? null : rawRow.endereco,
      endereco_pendente_validacao: false,
      usuario: 'ImportaûÏûÈo Histû°rica',
      numero_contagem: 1,
      contagem_anterior_id: null,
      qtd_contada: rawRow.qtd_contada,
      saldo_sistema: rawRow.saldo_sistema,
      diferenca: rawRow.diferenca,
      percentual,
      valor_divergente: rawRow.valor_divergente!=null ? Math.abs(rawRow.valor_divergente) : 0,
      fora_do_cache_local: true,
      classificacao,
      status_aprovacao: 'aguardando_analise_lider',
      motivo: rawRow.causa,
      tem_foto: false,
      // Sem a frase padronizada "Ajuste reprovado manualmente no site..." de
      // antes ã cliente achou redundante. ObservaûÏûÈo fica sû° com o texto
      // original da planilha, se houver ã o motivo da reprovaûÏûÈo em si vai
      // pra coluna prû°pria (`motivo_reprovacao_diretoria`, mesma jûÀ usada
      // pelo fluxo de SA/Diretoria) em vez de embutido aqui, pra poder
      // exibir destacado (vermelho) separado do resto da observaûÏûÈo.
      observacao: rawRow.observacao || null,
      motivo_reprovacao_diretoria: motivoReprovacao || null,
      data: rawRow.data,
      hora: null,
    };
    const { error: errSeed } = await supabaseClient.from('contagens').upsert([seedRow], {onConflict:'id'});
    if(errSeed) return {ok:false, erro:'Histû°rico atualizado, mas falhou ao reabrir a divergûˆncia: '+errSeed.message};
    return {ok:true, seedLocal: contagemRowToLocal(seedRow)};
  }catch(err){
    return {ok:false, erro:String(err && err.message || err)};
  }
}

async function seedRecontarQueueFromHistorico(seeds, onProgress){
  if(!supabaseClient) return {ok:false, erro:'Supabase nûÈo configurado.'};
  if(seeds.length===0) return {ok:true, inseridas:0};
  try{
    const TAMANHO_LOTE = 500;
    let inseridas = 0;
    for(let i=0; i<seeds.length; i+=TAMANHO_LOTE){
      const lote = seeds.slice(i, i+TAMANHO_LOTE);
      const { error } = await supabaseClient
        .from('contagens')
        .upsert(lote, {onConflict: 'id', ignoreDuplicates: true});
      if(error) return {ok:false, erro:'Falha ao gravar lote na fila de recontagem (linha '+i+'): '+error.message, inseridas};
      inseridas += lote.length;
      if(onProgress) onProgress(inseridas, seeds.length);
    }
    return {ok:true, inseridas};
  }catch(err){
    return {ok:false, erro:String(err && err.message || err)};
  }
}

// Cliente reimportou a planilha depois de corrigir alguns Status na fonte
// (ex: um item que estava "Recontar"/"Ajustar" foi resolvido pra "OK"/"Sem
// Ajuste"/"Ajustado") e o site continuou mostrando o item como pendente ã
// causa raiz: `seedRecontarQueueFromHistorico` usa `upsert(...,
// {ignoreDuplicates:true})`, que ûˋ ON CONFLICT DO NOTHING ã reimportar com o
// Status novo simplesmente para de GERAR aquele seed (o filtro de
// buildRecontarSeedsFromHistorico/buildAjustarSeedsFromHistorico jûÀ nûÈo bate
// mais), mas isso nunca REMOVE o seed antigo que jûÀ tinha sido gravado numa
// importaûÏûÈo anterior ã ele fica û°rfûÈo em `contagens`, preso pra sempre em
// "Recontagens Pendentes"/"Itens Divergentes" com o status velho.
//
// `computeIdsSeedsCandidatos(linhas)` calcula, pra cada linha do arquivo
// ATUAL, o id que o seed "Recontar" e o id que o seed "Ajustar" TERIAM pra
// aquele cû°digo+data ã e marca como candidato û  remoûÏûÈo sempre que o Status
// atual da linha nûÈo ûˋ mais o que geraria aquele seed. Isso gera candidato
// pra praticamente toda linha que nûÈo ûˋ mais Recontar/Ajustar (a maioria),
// mas sû° ûˋ candidato de verdade ã o passo seguinte confere no banco se esse
// id EXISTE mesmo antes de decidir remover.
function computeIdsSeedsCandidatos(linhas){
  const candidatos = [];
  linhas.forEach(l=>{
    if(!l.produto_codigo || !l.data) return;
    const codigoSeguro = String(l.produto_codigo).replace(/[^A-Za-z0-9]/g,'');
    const dataSegura = l.data.replace(/-/g,'');
    if(l.status!=='Recontar') candidatos.push('CNT-HIST-'+codigoSeguro+'-'+dataSegura);
    // Mesmo critûˋrio de `buildAjustarSeedsFromHistorico` (pareceValorDeStatusNaoSA) ã
    // bug real encontrado: esta funûÏûÈo tinha uma CûPIA da lû°gica antiga
    // (`!l.solicitacao_ajuste`), sem a correûÏûÈo pro dado sujo tipo SA="Ajustar".
    // Resultado: corrigir sû° a funûÏûÈo de seed nûÈo bastava ã o item corrigido
    // (ex. 000.63681) era semeado corretamente e, no mesmo reimport, marcado
    // como "û°rfûÈo" por esta funûÏûÈo (que ainda achava que ele nûÈo deveria mais
    // ter seed) e removido em seguida ã reimportar a planilha parecia "nûÈo
    // atualizar nada", quando na real o insert e o delete aconteciam nesse
    // mesmo ciclo, um cancelando o outro.
    if(!(l.status==='Ajustar' && pareceValorDeStatusNaoSA(l.solicitacao_ajuste))) candidatos.push('CNT-HIST-ADJ-'+codigoSeguro+'-'+dataSegura);
  });
  return candidatos;
}

// Remove da fila ao vivo (`contagens`) os seeds que ficaram û°rfûÈos depois de
// uma reimportaûÏûÈo com Status corrigido. Sû° remove um id quando:
// (a) o registro realmente existe e ainda ûˋ o seed original intocado
//     (`usuario='ImportaûÏûÈo Histû°rica'`, `numero_contagem=1` ã se alguûˋm jûÀ
//     mudou isso û  mûÈo nûÈo ûˋ mais "sû° um seed importado");
// (b) NENHUMA rodada seguinte foi registrada em cima dele
//     (`contagem_anterior_id` de outra linha apontando pra ele) ã isso
//     evita apagar o histû°rico de uma recontagem que jûÀ aconteceu de
//     verdade no app nesse meio-tempo, o que perderia dado real.
// `contagens_historico` (a tabela de auditoria) nunca ûˋ tocada aqui ã sû°
// reflete o arquivo via upsert normal (`importHistoricoContagensToSupabase`);
// esta funûÏûÈo sû° limpa o efeito colateral na tabela AO VIVO.
async function limparSeedsHistoricoDesatualizados(linhas, onProgress){
  if(!supabaseClient) return {ok:false, erro:'Supabase nûÈo configurado.', removidas:0};
  const candidatos = computeIdsSeedsCandidatos(linhas);
  if(candidatos.length===0) return {ok:true, removidas:0};
  try{
    const TAMANHO_LOTE = 300;
    let removidas = 0;
    for(let i=0; i<candidatos.length; i+=TAMANHO_LOTE){
      const lote = candidatos.slice(i, i+TAMANHO_LOTE);
      const { data: existentes, error: err1 } = await supabaseClient
        .from('contagens')
        .select('id')
        .in('id', lote)
        .eq('usuario', 'ImportaûÏûÈo Histû°rica')
        .eq('numero_contagem', 1);
      if(err1) return {ok:false, erro:'Falha ao verificar seeds existentes: '+err1.message, removidas};
      if(!existentes || existentes.length===0){ if(onProgress) onProgress(removidas, candidatos.length); continue; }
      const idsExistentes = existentes.map(r=>r.id);
      const { data: referenciados, error: err2 } = await supabaseClient
        .from('contagens')
        .select('contagem_anterior_id')
        .in('contagem_anterior_id', idsExistentes);
      if(err2) return {ok:false, erro:'Falha ao verificar recontagens jûÀ feitas: '+err2.message, removidas};
      const idsReferenciados = new Set((referenciados||[]).map(r=>r.contagem_anterior_id));
      const idsSeguros = idsExistentes.filter(id=>!idsReferenciados.has(id));
      if(idsSeguros.length>0){
        const { error: err3 } = await supabaseClient.from('contagens').delete().in('id', idsSeguros);
        if(err3) return {ok:false, erro:'Falha ao remover seeds desatualizados: '+err3.message, removidas};
        removidas += idsSeguros.length;
      }
      if(onProgress) onProgress(removidas, candidatos.length);
    }
    return {ok:true, removidas};
  }catch(err){
    return {ok:false, erro:String(err && err.message || err), removidas:0};
  }
}

// Converte uma linha vinda do Supabase (RPC ou consulta direta) pro MESMO
// formato de objeto "produto" que o app sempre usou (antes vindo do cache
// local RAW_SB2_PRODUCTS/PRODUCTS, removido ã ver CLAUDE.md "cache local
// removido") ã assim CountStep e o resto do app nûÈo precisam saber de onde
// o dado veio. `custoUnit` ûˋ derivado de valor_financeiro/saldo (custo mûˋdio
// real), jûÀ que nem `estoque_saldo` nem `produtos` guardam custo unitûÀrio
// direto.
function estoqueRowToProduct(row){
  // row.saldo pode ser null (cû°digo sem NENHUMA linha em estoque_saldo ã nûÈo
  // sabemos o saldo) vs. 0 (linha existe, saldo real ûˋ zero) ã os dois casos
  // sûÈo diferentes pra CountStep (hasSaldoLocal checa `typeof===number`),
  // entûÈo null tem que continuar null, nunca virar 0 por engano.
  const temSaldo = row.saldo!=null;
  const saldo = temSaldo ? Number(row.saldo) : null;
  const valorFinanceiro = Number(row.valor_financeiro||0);
  return {
    codigo: row.codigo,
    descricao: row.descricao,
    unidade: row.unidade || null,
    familia: describeGrupo(row.grupo),
    grupo: row.grupo,
    endereco: row.endereco_codigo || null,
    enderecoCadastrado: !!row.endereco_codigo,
    almoxarifado: row.almoxarifado,
    corredor: row.corredor || null,
    rua: row.rua || null,
    saldoSistema: saldo,
    custoUnit: (temSaldo && saldo!==0) ? valorFinanceiro/saldo : 0,
    valorFinanceiro,
    semMovimentoRecente: !!row.sem_movimento_recente,
    ultimaSaida: row.data_ultima_saida || null,
    foraDoCacheLocal: true,
  };
}

// Lista priorizada de itens pra "Contagem Aleatû°ria"/"Curva ABC", "Rota de
// EndereûÏo" e "Contagem por Grupo" ã substitui o cache local estûÀtico de 300
// SKUs (removido, ver CLAUDE.md). Chama a RPC `contagem_itens_prioritarios`
// (sem-movimento-recente primeiro, depois valor financeiro decrescente).
// `grupos` (opcional, ARRAY de cû°digos) filtra sû° os itens de QUALQUER um
// desses grupos/famûÙlias de produto ã usado por "Contagem por Grupo" (pode
// selecionar mais de um grupo). `almoxarifados` (opcional, ARRAY de cû°digos)
// filtra sû° os itens com saldo em QUALQUER um desses armazûˋns ã cliente
// reportou que um item com saldo em mais de um armazûˋm nunca batia, porque a
// contagem comparava contra saldo de qualquer armazûˋm, nûÈo sû° o fûÙsico de
// onde o item estûÀ sendo contado. Todo fluxo baseado nesta funûÏûÈo (Aleatû°ria,
// Curva ABC, Rota, Grupo) precisa sempre passar o(s) armazûˋm(ns) ã seja do
// inventûÀrio (`inv.almoxarifado`) ou escolhido na hora (contagem avulsa).
// `gruposExcluidos` (opcional, ARRAY de cû°digos, configurado pelo admin em
// ConfiguraûÏûçes ã "Grupos ExcluûÙdos da Contagem AutomûÀtica") remove da fila
// itens de grupos que o cliente marcou como "material nûÈo existe fisicamente"
// ã filtrado NO CLIENTE (nûÈo na RPC, que nûÈo recebe esse parûÂmetro ã evita
// exigir uma migraûÏûÈo de SQL sû° pra isso e depender do cliente rodar). Como o
// filtro acontece DEPOIS do `limit` da RPC, busca um "buffer" maior quando hûÀ
// exclusûÈo configurada, senûÈo a exclusûÈo poderia devolver menos itens do que
// o pedido sû° porque parte caiu num grupo excluûÙdo.
async function fetchContagemItensPrioritarios(limit, grupos, almoxarifados, gruposExcluidos){
  if(!supabaseClient) return [];
  const temExclusao = !!(gruposExcluidos && gruposExcluidos.length);
  const limitBusca = temExclusao ? Math.min(limit * 4, 2000) : limit;
  try{
    const { data, error } = await supabaseClient.rpc('contagem_itens_prioritarios', {
      p_limit: limitBusca,
      p_grupos: (grupos && grupos.length) ? grupos : null,
      p_almoxarifados: (almoxarifados && almoxarifados.length) ? almoxarifados : null,
    });
    if(error || !data) return [];
    let produtos = data.map(estoqueRowToProduct);
    if(temExclusao) produtos = produtos.filter(p => !gruposExcluidos.includes(String(p.grupo)));
    return produtos.slice(0, limit);
  }catch(err){
    console.warn('Falha ao buscar itens prioritûÀrios para contagem:', err);
    return [];
  }
}

// Grupos que realmente tûˆm algum item com saldo carregado (nûÈo os ~248
// grupos possûÙveis do catûÀlogo, a maioria ainda sem saldo importado) ã
// alimenta o seletor de grupo em "Contagem por Grupo". `label` jûÀ vem
// pronto no formato "01 - Chapas Inox" (nû¤mero + descriûÏûÈo), pedido do
// cliente pra sempre mostrar os dois juntos. `gruposExcluidos` (opcional)
// tira da lista os grupos que o admin marcou como excluûÙdos da contagem
// automûÀtica ã nûÈo faz sentido deixar selecionar manualmente pra gerar
// inventûÀrio um grupo que foi justamente marcado como "nûÈo existe
// fisicamente".
async function fetchGruposComEstoque(gruposExcluidos){
  if(!supabaseClient) return [];
  try{

    if(gruposExcluidos && gruposExcluidos.length) lista = lista.filter(g => !gruposExcluidos.includes(String(g.grupo)));
    return lista;
  }catch(err){
    console.warn('Falha ao buscar grupos com estoque:', err);
    return [];
  }
}

// Busca em lote (produtos + estoque_saldo, mesmo padrûÈo non-FK-join jûÀ usado
// em searchSupabaseCatalog) pra uma lista de cû°digos ã usada pra enriquecer
// lista importada (Excel) e pela recontagem, quando o item nûÈo estûÀ mais
// disponûÙvel no que jûÀ foi salvo localmente. Retorna um Map codigoãproduto.
//
// `almoxarifado` (opcional) filtra o saldo pro armazûˋm exato, quando se sabe
// qual ûˋ (mesmo raciocûÙnio de searchSupabaseCatalog). Sem esse contexto (a
// lista importada e a recontagem nûÈo guardam em qual armazûˋm o item foi
// contado ã ver CLAUDE.md), NûO soma mais o saldo de todos os armazûˋns como
// antes (isso nunca batia com a contagem fûÙsica de um û¤nico local): se o
// cû°digo sû° existe num armazûˋm, usa esse valor direto (seguro, sem
// ambiguidade); se existe em mais de um, marca saldo como null (sem
// comparaûÏûÈo automûÀtica) em vez de arriscar um nû¤mero errado.
async function fetchProdutosByCodigos(codigos, almoxarifado){
  const mapa = new Map();
  if(!supabaseClient || !codigos || codigos.length===0) return mapa;
  try{
    const { data: produtosRows } = await supabaseClient
      .from('produtos')
      .select('codigo, descricao, unidade, grupo')
      .in('codigo', codigos);
    if(!produtosRows || produtosRows.length===0) return mapa;

    let saldoQuery = supabaseClient
      .from('estoque_saldo')
      .select('produto_codigo, almoxarifado, saldo, valor_financeiro, data_ultima_saida')
      .in('produto_codigo', codigos);
    if(almoxarifado) saldoQuery = saldoQuery.eq('almoxarifado', almoxarifado);
    const { data: saldoRows } = await saldoQuery;
    const linhasPorCodigo = {};
    (saldoRows||[]).forEach(r=>{
      (linhasPorCodigo[r.produto_codigo] = linhasPorCodigo[r.produto_codigo] || []).push(r);
    });

    produtosRows.forEach(p=>{
      const linhas = linhasPorCodigo[p.codigo] || [];
      // Com armazûˋm informado, no mûÀximo 1 linha (jûÀ filtrado na query).
      // Sem armazûˋm: sû° usa o valor se for inequûÙvoco (1 armazûˋm sû°) ã
      // mais de um vira "sem saldo pra comparar" em vez de somado.
      const unica = linhas.length===1 ? linhas[0] : null;
      const s = unica || {};
      mapa.set(p.codigo, estoqueRowToProduct({
        codigo: p.codigo,
        descricao: p.descricao,
        unidade: p.unidade,
        grupo: p.grupo,
        almoxarifado: s.almoxarifado || (linhas.length>1 ? linhas.map(l=>l.almoxarifado).join('/') : 'ã'),

// Tira zero(s) û  esquerda de um cû°digo de armazûˋm ("01"ã"1") ã o campo
// "Almoxarifado" (NewInventory) sempre re-preenche o cû°digo com 2 dûÙgitos sû°
// pra EXIBIûûO (chip "01"), mas `estoque_saldo.almoxarifado` guarda o cû°digo

function normalizarCodigoAlmox(v){

// O cache local estûÀtico de 300 SKUs (RAW_SB2_PRODUCTS/PRODUCTS) foi removido ã
// ver CLAUDE.md "RemoûÏûÈo do cache local de 300 SKUs". Todo o catûÀlogo agora vem
// ao vivo do Supabase (produtos + estoque_saldo + enderecos), via
// searchSupabaseCatalog/fetchContagemItensPrioritarios/fetchProdutosByCodigos/
// fetchAnyAddressRegistered, abaixo.
// PadrûÈo fixo de endereûÏo da Selgron: 3 nû¤meros, traûÏo, 1 letra, traûÏo,
// 1 nû¤mero (ex: 035-A-1). Aplica a mûÀscara enquanto o operador digita ã
// insere os traûÏos automaticamente e sû° aceita dûÙgito/letra na posiûÏûÈo
// certa ã pra evitar erro de digitaûÏûÈo num campo que hoje ûˋ obrigatû°rio.
const ENDERECO_REGEX = /^\d{3}-[A-Z]-\d$/;

function formatEnderecoInput(value){
  const raw = String(value||'').toUpperCase().replace(/[^0-9A-Z]/g, '');
  let numPart = '', letterPart = '', lastPart = '';
  for(const ch of raw){
    if(numPart.length < 3){
      if(/[0-9]/.test(ch)) numPart += ch;
    } else if(!letterPart){
      if(/[A-Z]/.test(ch)) letterPart = ch;
    } else if(lastPart.length < 1){
      if(/[0-9]/.test(ch)) lastPart += ch;
    }
  }
  let out = numPart;
  if(letterPart) out += '-' + letterPart;
  if(lastPart) out += '-' + lastPart;
  return out;
}

// MûDULO 7 ã regra de aprovaûÏûÈo. Cliente pediu explicitamente pra remover a
// aprovaûÏûÈo automûÀtica "por %" (um item caro com pouca % de diferenûÏa
// passava batido sem ninguûˋm ver, um item barato com % alta ia pra fila û 
// toa) e passou a medir pelo VALOR (R$) da diferenûÏa, nûÈo mais percentual:
//  R$ 0 (contagem bateu exata) ã aprovado automaticamente (û¤nica exceûÏûÈo ã
//    nûÈo hûÀ divergûˆncia nenhuma pra alguûˋm analisar)
//  Atûˋ R$ 49,99            ã direto pra anûÀlise do lûÙder (nûÈo compensa o
//    esforûÏo de recontar fisicamente um valor tûÈo baixo)
//  A partir de R$ 50        ã segunda contagem primeiro (sû° aqui vale a
//    pena conferir de novo antes de escalar pro lûÙder)
// `computeStatus` (abaixo) nûÈo mudou nada ã jûÀ decidia por `level`
// ('ok'/'warn'/outro), sû° o critûˋrio que gera esse `level` mudou de % pra
// R$. Ver tambûˋm `diferencaConfirmada` em `CountStep`: numa recontagem, se
// a diferenûÏa bater exatamente com a da rodada anterior, isso ûˋ sinalizado
// û  parte pro lûÙder ("DiferenûÏa confirmada, seguir com ajuste").
function classifyDivergence(valorDivergente){
  const v = Math.abs(Number(valorDivergente));
  if(v === 0) return {level:'ok', label:'Sem divergûˆncia', rule:'Aprovado automaticamente'};
  if(v < 50) return {level:'danger', label:'DiferenûÏa abaixo de R$ 50', rule:'Enviado para anûÀlise do lûÙder'};
  return {level:'warn', label:'DiferenûÏa de R$ 50 ou mais', rule:'Segunda contagem solicitada'};
}

// BUG REAL corrigido (visto em produûÏûÈo): `custoUnit` vale `0` tanto quando o
// produto genuinamente nûÈo tem custo quanto quando o custo ûˋ DESCONHECIDO
// (sem valor_financeiro/saldo cadastrado ã ver `custoUnit:(temSaldo &&

// marcada como "confere com o sistema"). Esta funûÏûÈo ûˋ a rede de seguranûÏa:
// sem custo cadastrado pra confirmar que a diferenûÏa ûˋ pequena em valor,

function classifyDivergenceSemCusto(){
  return {level:'danger', label:'DiferenûÏa sem custo cadastrado', rule:'Enviado para anûÀlise do lûÙder (sem custo cadastrado)'};

// ClassificaûÏûÈo visual de 4 nûÙveis ã usada sû° nos cards de Recontagens/
// Itens Divergentes/Contagens ConcluûÙdas (pedido do cliente, ver mockup
// de referûˆncia). NûO substitui `classifyDivergence` acima, que continua
// sendo a regra de NEGûCIO real (aprovaûÏûÈo automûÀtica/segunda contagem/
// anûÀlise do lûÙder, limiares 5%/15% de PERCENTUAL) ã esta funûÏûÈo ûˋ sû°
// exibiûÏûÈo/filtro. Recebe o VALOR (R$) da divergûˆncia, nûÈo mais o

// `null` continua reservado pro caso de item sem saldo do sistema pra

function classifySeverity4(valorDivergente){

  if(v<=2000) return {level:'alta', label:'Alta', color:'var(--safety)', bg:'#FFF3E0', icon:'!'};

const OBS_BOILERPLATE_REPROVACAO = 'Ajuste reprovado manualmente no site (a planilha ainda mostra "Ajustado").';

function categoriaDoInventario(count, inventories){
  if(!count.inventario || count.inventario==='ã') return 'Avulsa';
  const inv = (inventories||[]).find(i=>i.id===count.inventario);
  if(!inv) return 'Avulsa';
  return inv.tipo==='Lista Importada (Excel)' ? 'ImportaûÏûÈo' : inv.tipo;
}

// MûDULO 7 ã regra de segunda contagem, aplicada sobre o resultado de CADA
// contagem (a 1ôˆ ou qualquer recontagem seguinte):
//  ãÊ5%           ã aprovado (automaticamente na 1ôˆ, ou confirmado na recontagem)
//  5ã15% na 1ôˆ   ã aguarda segunda contagem, feita por outro operador
//  >15% na 1ôˆ, ou qualquer recontagem que ainda divirja acima de 5%
//                ã vai para anûÀlise do lûÙder de estoque
function computeStatus(numeroContagem, level){
  if(level==='ok') return numeroContagem===1 ? 'aprovado_auto' : 'aprovado_segunda';
  if(numeroContagem===1) return level==='warn' ? 'aguardando_segunda' : 'aguardando_analise_lider';
  return 'aguardando_analise_lider';
}

  aguardando_analise_lider: {level:'danger', text:'Enviado para anûÀlise do lûÙder de estoque'},
  aprovado_lider: {level:'ok', text:'Divergûˆncia aprovada pelo lûÙder de estoque ã sem ajuste necessûÀrio'},

// Encontra o documento de contagem em aberto (se houver) mais recente pra um
// cû°digo de produto ã usado pra bloquear lanûÏar uma contagem NOVA (1ôˆ
// rodada) de um item que jûÀ estûÀ em anûÀlise/aguardando recontagem em outro
// lugar do app. Sû° olha a PONTA de cada corrente de recontagem (o registro
// que ainda nûÈo tem uma rodada seguinte), mesma lû°gica jûÀ usada em
// RecountsPanel pra montar as filas de recontagem.
function getOpenCountForProduct(counts, productCode){
  const hasFollowUp = new Set();
  counts.forEach(c=>{ if(c.contagemAnteriorId) hasFollowUp.add(c.contagemAnteriorId); });
  return counts.find(c=>c.productCode===productCode && !hasFollowUp.has(c.id) && OPEN_STATUSES.includes(c.statusAprovacao)) || null;
}

// Ajuste/Pendente/Ajustar) ã usado sû° na exportaûÏûÈo do relatû°rio, pra bater
// com o padrûÈo que ele jûÀ tem, sem mudar o `statusAprovacao` interno do app.
// Aproximado: o app nûÈo distingue hoje "ajuste jûÀ aplicado no Protheus" de
// "aprovado, sem ajuste necessûÀrio" ã os dois caem em `aprovado_lider`, que
// mapeia pra "Sem Ajuste" (nûÈo temos como saber se o ajuste foi de fato
// lanûÏado no Protheus depois da aprovaûÏûÈo).
const STATUS_LABEL_PADRAO = {

// "Custo" na planilha do cliente ûˋ o valor divergente COM SINAL (diferenûÏa û
// custo unitûÀrio) ã o app sû° guarda o valor absoluto em `valorDivergente`
// (ver CountStep.finalize), entûÈo recupera o sinal a partir de `diferenca`.
function valorDivergenteComSinal(c){
  const abs = Number(c.valorDivergente || 0);
  if(c.diferenca == null || c.diferenca === 0 || abs === 0) return 0;
  return c.diferenca > 0 ? abs : -abs;
}

// "Acc" na planilha do cliente: acuracidade do ITEM (nûÈo do estoque todo),
// max(0, 1 - |diferenûÏa|/sistema) ã mesma fû°rmula usada lûÀ, confirmada
// comparando vûÀrias linhas da Base_Analise_Contagens_2026.xlsx enviada.
// Sem saldo do sistema pra comparar, nûÈo dûÀ pra calcular (retorna '').
function acuracidadeItem(c){
  if(c.saldoSistema == null) return '';
  if(c.saldoSistema === 0) return c.diferenca === 0 ? 1 : 0;
  return Math.max(0, 1 - Math.abs(c.diferenca) / c.saldoSistema);
}

// "Doc" na planilha do cliente ûˋ sû° a prû°pria data reformatada DDMMYY (nûÈo
// ûˋ um identificador û  parte ã confirmado comparando as duas colunas linha
// a linha no arquivo original).
function formatDocFromData(dataStr){
  if(!dataStr) return '';
  const [y, m, d] = dataStr.split('-');
  return (d||'') + (m||'') + (y||'').slice(2);
}

function buildSummaryRows(counts, inventories){
  const contados = counts.length;
  // `diferenca!==0` sozinho conta item SEM saldo pra comparar (diferenca:null)
  // como divergente ã bug real jûÀ corrigido em computeWeeklyStats antes,
  // reproduzido aqui tambûˋm (achado ao investigar 3 cards de acuracidade
  // mostrando nû¤meros diferentes). null nunca ûˋ divergûˆncia de verdade, ûˋ
  // ausûˆncia de comparaûÏûÈo.
  const divergentes = counts.filter(c=>c.diferenca!==0 && c.diferenca!==null);
  const acuracidade = contados>0 ? (((contados-divergentes.length)/contados)*100).toFixed(1) : '100.0';
  const valorDivergente = counts.reduce((s,c)=>s+Number(c.valorDivergente||0),0);
  return [
    {Indicador:'Data do relatû°rio', Valor: new Date().toLocaleString('pt-BR')},
    {Indicador:'Itens contados', Valor: contados},
    {Indicador:'Divergûˆncias', Valor: divergentes.length},
    {Indicador:'Acuracidade do estoque (%)', Valor: Number(acuracidade)},
    {Indicador:'Valor total divergente (R$)', Valor: Number(valorDivergente.toFixed(2))},
    {Indicador:'InventûÀrios ativos', Valor: inventories.length},
  ];
}

// Colunas na mesma ordem/nome do padrûÈo que o cliente jûÀ usa (aba
// BD_Contagens de Base_Analise_Contagens_2026.xlsx) primeiro ã assim ele

// Modelo alinhado com a planilha real que o cliente jûÀ usa para contagem

const IMPORT_TEMPLATE_COLUMNS = ['Produto', 'DescriûÏûÈo', 'End', 'Sistema', 'Fisico'];

// Aceita variaûÏûçes de acentuaûÏûÈo/maiû¤sculas no cabeûÏalho da planilha que o
// usuûÀrio sobe (ex: "codigo", "CûDIGO", "Codigo" caem todos em "codigo"), e
// tambûˋm os dois formatos de coluna jûÀ vistos: o nome "cheio" (Cû°digo,
// EndereûÏo) e o abreviado usado na planilha real do cliente (Produto, End).
function normalizeHeaderKey(h){
  return String(h||'').normalize('NFD').replace(/[ä-ë₤]/g,'').trim().toLowerCase();
}

const IMPORT_HEADER_MAP = {
  codigo:'codigo',
  produto:'codigo',
  descricao:'descricao',
  endereco:'endereco',
  end:'endereco',
  almoxarifado:'almoxarifado',
  sistema:'saldoSistema',
  saldosistema:'saldoSistema',
  saldo:'saldoSistema',
};

function buildImportTemplateWorkbook(){
  const XLSX = window.XLSX;

  // Exemplo fixo (nûÈo amarrado a nenhum produto real/cache ã o cache local
  // foi removido, ver CLAUDE.md "cache local removido") ã ûˋ sû° ilustrativo,
  // o cliente sempre substitui pelos cû°digos reais que precisa contar.
  const exemplo = [{

// Lûˆ as linhas jûÀ convertidas pelo SheetJS (sheet_to_json) e devolve a lista
// de itens vûÀlidos (cû°digo nûÈo vazio, duplicatas removidas mantendo a 1ôˆ
// ocorrûˆncia ã preserva a ordem original da planilha) mais um resumo para
// exibir antes de confirmar a criaûÏûÈo do inventûÀrio.
//
// A coluna "Sistema" (saldo do sistema jûÀ trazido na prû°pria planilha) ûˋ o
// que garante a comparaûÏûÈo mesmo pra cû°digo sem saldo ainda carregado no
// Supabase (catûÀlogo de 85 mil+ produtos importado, mas `estoque_saldo`
// nem sempre tem linha pra todo cû°digo). Quando presente, prevalece sobre o
// saldo vindo do catûÀlogo por ser o dado mais recente que o cliente trouxe.
function parseImportedListRows(rawRows){
  let totalLinhas = 0;
  let semCodigo = 0;
  let duplicadas = 0;
  const vistos = new Set();
  const itens = [];

  rawRows.forEach(row=>{
    totalLinhas++;
    const norm = {};
    Object.keys(row).forEach(k=>{
      const canon = IMPORT_HEADER_MAP[normalizeHeaderKey(k)];
      if(canon) norm[canon] = row[k];
    });
    const codigo = norm.codigo!=null ? String(norm.codigo).trim() : '';
    if(!codigo){ semCodigo++; return; }
    if(vistos.has(codigo)){ duplicadas++; return; }
    vistos.add(codigo);
    let saldoSistema = null;
    if(norm.saldoSistema!=null && String(norm.saldoSistema).trim()!==''){
      const n = Number(String(norm.saldoSistema).replace(',', '.'));
      if(!Number.isNaN(n)) saldoSistema = n;
    }
    itens.push({
      codigo,
      descricao: norm.descricao!=null ? String(norm.descricao).trim() : '',
      endereco: norm.endereco!=null ? String(norm.endereco).trim().toUpperCase() : '',
      almoxarifado: norm.almoxarifado!=null ? String(norm.almoxarifado).trim() : '',
      saldoSistema,
    });
  });

  return {
    itens,
    // naoEncontrados/semSaldoDisponivel entram depois, via
    // computeImportSummaryExtras ã dependem de uma busca no Supabase agora
    // (cache local sûÙncrono removido, ver CLAUDE.md "cache local removido").
    resumo: { totalLinhas, validas: itens.length, semCodigo, duplicadas, naoEncontrados: 0, semSaldoDisponivel: 0 },
  };
}

// Completa o resumo pû°s-parse com quantos cû°digos nûÈo estûÈo no catûÀlogo real
// (Supabase) e, desses, quantos ficam sem saldo pra comparar (a planilha nûÈo
// trouxe a coluna "Sistema"). Busca em lote ã uma requisiûÏûÈo sû° pra todos os
// cû°digos da planilha, nûÈo uma por linha.
async function computeImportSummaryExtras(itens){
  const codigos = itens.map(it=>it.codigo);
  const catalogo = await fetchProdutosByCodigos(codigos);
  const naoEncontrados = itens.filter(it => !catalogo.has(it.codigo)).length;
  const semSaldoDisponivel = itens.filter(it => !catalogo.has(it.codigo) && it.saldoSistema==null).length;
  return { naoEncontrados, semSaldoDisponivel };
}

/* ---------------- PERSISTûNCIA (localStorage) ---------------- */
// Primeiro passo pra sair do protû°tipo 100% em memû°ria: os dados que o app
// gera (usuûÀrios, inventûÀrios, contagens, endereûÏos propostos, histû°rico)
// agora sobrevivem a recarregar a pûÀgina / fechar o navegador NO MESMO
// aparelho. Isso NûO sincroniza entre tablets/operadores diferentes ã cada
// aparelho guarda sua prû°pria cû°pia local. Pra sincronizar de verdade entre
// aparelhos precisa do backend real (ver backend/schema.sql e README.md).
// STORAGE_VERSION prefixa a chave ã se o formato dos dados mudar de um jeito
// incompatûÙvel no futuro, basta subir a versûÈo pra ignorar dados antigos em
// vez de o app quebrar tentando ler um formato que nûÈo bate mais.
const STORAGE_VERSION = 'v1';

function loadPersisted(key, fallback){
  try{
    const raw = window.localStorage.getItem('stock360:'+STORAGE_VERSION+':'+key);
    if(raw==null) return fallback;
    return JSON.parse(raw);
  } catch(err){
    return fallback;
  }
}

function usePersistedState(key, initialValue){
  const [state, setState] = useState(()=>loadPersisted(key, initialValue));
  useEffect(()=>{
    try{
      window.localStorage.setItem('stock360:'+STORAGE_VERSION+':'+key, JSON.stringify(state));
    } catch(err){
      // localStorage indisponûÙvel (modo privado, cota cheia, etc.) ã ignora
      // silenciosamente, o app continua funcionando sû° sem persistir.
    }
  }, [key, state]);
  return [state, setState];
}

const LOGIN_LEMBRADO_KEY = 'stock360:v1:loginLembrado';

function App(){
  // Dados que o app gera ficam salvos no localStorage (ver usePersistedState
  // acima) ã sobrevivem a recarregar/fechar o navegador neste aparelho.
  // NavegaûÏûÈo (view/flowState) continua sû° em memû°ria de propû°sito ã cada
  // recarregamento volta pra Home, nûÈo faz sentido reabrir no meio de um
  // fluxo de contagem sem o contexto todo. SessûÈo de login (currentUserId)
  // agora ûˋ 100% governada pelo Supabase Auth ã `getSession()`/
  // `onAuthStateChange` logo abaixo ã e sobrevive a recarregar a pûÀgina
  // exatamente como antes, sû° que via sessûÈo real (JWT) em vez do
  // localStorage caseiro. Sû° expira de verdade por inatividade real (15
  // min, ver efeito mais abaixo) ou logout manual.
  const [users, setUsers] = usePersistedState('users', USERS_SEED);
  const [currentUserId, setCurrentUserId] = useState(null);
  // Evita mostrar a tela de login por uma fraûÏûÈo de segundo antes de
  // `getSession()` (assûÙncrono) resolver se jûÀ existe uma sessûÈo vûÀlida.
  const [authReady, setAuthReady] = useState(false);
  const [logoutNotice, setLogoutNotice] = useState('');

  useEffect(()=>{
    let cancelled = false;
    supabaseClient.auth.getSession().then(({data:{session}})=>{
      if(cancelled) return;
      setCurrentUserId(session ? session.user.id : null);
      setAuthReady(true);
      sincronizarAuthRealtime(session);
    });
    const { data: sub } = supabaseClient.auth.onAuthStateChange((_event, session)=>{
      setCurrentUserId(session ? session.user.id : null);
      sincronizarAuthRealtime(session);
    });
    return ()=>{ cancelled = true; sub.subscription.unsubscribe(); };
  }, []);

  // Assim que sabemos quem estûÀ logado, busca o PRûPRIO perfil (nome/
  // perfil/status/acessos_extras/ultimo_acesso) ã RLS libera essa leitura
  // pra qualquer usuûÀrio autenticado sobre a prû°pria linha (ver
  // schema.sql, "leitura prû°pria ou com acesso a usuûÀrios"), entûÈo isso
  // funciona pra qualquer papel, nûÈo sû° admin. Faz merge (upsert por id) no array
  // `users` em vez de substituir ã a sincronizaûÏûÈo completa (mais abaixo,
  // sû° pra quem tem acesso û  tela "UsuûÀrios") pode jûÀ ter trazido outras
  // linhas antes disso.
  useEffect(()=>{
    if(!currentUserId) return;
    let cancelled = false;
    supabaseClient.from('usuarios').select('*').eq('id', currentUserId).single().then(({data, error})=>{
      if(cancelled) return;
      if(error || !data){
        // Sem o prû°prio perfil nûÈo dûÀ pra saber perfil/status com seguranûÏa
        // ã desloga em vez de deixar a tela de "CarregandoãÎ" presa pra
        // sempre (ver condiûÏûÈo de loading em App(), mais abaixo).
        console.warn('Falha ao buscar o prû°prio perfil:', error);
        logout('NûÈo foi possûÙvel carregar seu perfil. Tente entrar novamente.');
        return;
      }
      const perfil = usuarioRowToLocal(data);
      setUsers(prev=>{
        const semEsse = prev.filter(u=>u.id!==perfil.id);
        return [perfil, ...semEsse];

    });
    return ()=>{ cancelled = true; };
  }, [currentUserId]);

  // NavegaûÏûÈo (view/flowState) agora sobrevive a recarregar a pûÀgina ã pedido
  // do cliente, que estava sendo jogado de volta pra Home a cada F5 no meio
  // de uma anûÀlise (ex: na tela Indicadores). Mesmo padrûÈo jûÀ usado pra
  // sessûÈo de login (Supabase Auth persiste a prû°pria sessûÈo sozinho) e pro
  // resto do estado do app (`usePersistedState`) ã `flowState` ûˋ sempre um objeto simples (o
  // inventûÀrio sendo contado, a contagem original de uma recontagem, etc.),
  // serializa sem problema. `logout()` jûÀ forûÏa `view:'home'`/
  // `flowState:null` de volta, entûÈo isso nûÈo "vaza" contexto de um usuûÀrio
  // pro prû°ximo login no mesmo aparelho.
  const [view, setView] = usePersistedState('view', 'home');
  const [flowState, setFlowState] = usePersistedState('flowState', null); // params passed into a flow
  // Esconder sidebar (desktop/tablet: comeûÏa aberta e empurra o conteû¤do; celular
  // <768px: comeûÏa fechada, vira painel flutuante ã ver CSS ".sidebar" no <style>).
  const [sidebarCollapsed, setSidebarCollapsed] = useState(() => typeof window!=='undefined' && window.innerWidth < 768);

  // Em telas de celular a sidebar ûˋ um painel flutuante ã fecha sozinha ao navegar,
  // senûÈo ficaria coberta por cima da tela nova. Em telas largas (empurra o conteû¤do)
  // nûÈo faz sentido fechar sozinha, entûÈo sû° age abaixo de 768px.
  function gotoAndCloseSidebar(id, data){
    goto(id, data);
    if(window.innerWidth < 768) setSidebarCollapsed(true);
  }

  // Chaves 'inventories_v2'/'counts_v2' (em vez de 'inventories'/'counts') ã
  // reset geral pedido pelo cliente antes de importar o histû°rico real da
  // planilha de anûÀlise: qualquer aparelho que abrir o app depois desse
  // deploy procura uma chave que nûÈo existe mais no localStorage e comeûÏa
  // vazio, sem precisar de comando manual em cada tablet. Tambûˋm removida a
  // seed de 2 inventûÀrios fake (INV-001/INV-002, do inûÙcio do protû°tipo) ã
  // nûÈo fazia mais sentido reaparecer num aparelho novo agora que o app usa
  // dado real.
  const [inventories, setInventories] = usePersistedState('inventories_v2', []);

  const [counts, setCounts] = usePersistedState('counts_v2', []); // finalized counts
  // Chave 'enderecosPropostos_v2' (era 'enderecosPropostos') ã mesmo reset
  // pedido pelo cliente jûÀ aplicado antes a inventûÀrios/contagens: esse
  // aparelho ainda tinha propostas de endereûÏo de teste (item tipo "TRAVA
  // ROLO PRESS") sobrando do perûÙodo de demonstraûÏûÈo. Bump de chave zera
  // sozinho em qualquer aparelho que abrir depois deste deploy, sem precisar
  // de comando manual em cada um.
  const [enderecosPropostos, setEnderecosPropostos] = usePersistedState('enderecosPropostos_v2', []); // endereûÏos informados por operadores, aguardando validaûÏûÈo do lûÙder
  const [passwordRequests, setPasswordRequests] = usePersistedState('passwordRequests', []); // solicitaûÏûçes de "esqueci minha senha"
  const [passwordHistory, setPasswordHistory] = usePersistedState('passwordHistory', []); // histû°rico de alteraûÏûçes de senha
  const [reportSendHistory, setReportSendHistory] = usePersistedState('reportSendHistory', []); // histû°rico de envios de relatû°rio por e-mail
  // ConfiguraûÏûçes do admin (ConfiguraûÏûçes ã "Visibilidade do Saldo na
  // Contagem" / "Grupos ExcluûÙdos da Contagem AutomûÀtica" / "Tempo de
  // Inatividade") ã moravam em `usePersistedState` (localStorage, por
  // aparelho) atûˋ esta rodada. Cliente pediu, como regra permanente pra
  // QUALQUER configuraûÏûÈo (nûÈo sû° estas 3): "toda alteraûÏûÈo que envolvam
  // configuraûÏûÈo... reflita em todos os aparelhos de imediato, nûÈo quero
  // ter que ficar alterando manualmente em cada aparelho". Migrado pra uma
  // linha û¤nica no Supabase (`app_config`, id fixo = 1), sincronizada por
  // Realtime ã mesmo padrûÈo jûÀ usado pra usuarios/contagens/inventarios/
  // enderecos_propostos (ver backend/schema.sql). Os 3 `useState` abaixo sûÈo
  // sû° o CACHE local ã nunca a fonte de verdade ã hidratado por
  // `refreshAppConfig()` no login/reconexûÈo e mantido em dia pelo canal
  // Realtime logo abaixo.
  const [operadorVeSaldo, setOperadorVeSaldo] = useState(false);
  // ConfiguraûÏûÈo SEPARADA de `operadorVeSaldo` ã pedido explûÙcito do
  // cliente ("a Diretoria nûÈo quer que a operaûÏûÈo tenha acesso a
  // valores"): controla sû° as telas de REVISûO (Recontagens Pendentes/
  // Itens Divergentes), independente de como `operadorVeSaldo` (a
  // visibilidade durante a CONTAGEM em si) estiver configurado ã sûÈo
  // polûÙticas distintas, nûÈo reaproveita a mesma trava.
  const [operadorVeValoresRecontagem, setOperadorVeValoresRecontagem] = useState(false);
  const [gruposExcluidos, setGruposExcluidos] = useState([]);
  const [sessionTimeoutMin, setSessionTimeoutMin] = useState(DEFAULT_SESSION_TIMEOUT_MIN);

  async function refreshAppConfig(){
    const cfg = await fetchAppConfig();
    if(!cfg) return;
    setOperadorVeSaldo(cfg.operadorVeSaldo);
    setOperadorVeValoresRecontagem(cfg.operadorVeValoresRecontagem);
    setGruposExcluidos(cfg.gruposExcluidos);
    setSessionTimeoutMin(cfg.sessionTimeoutMin);
  }

  // Setters assûÙncronos ã aguardam confirmaûÏûÈo do Supabase antes de
  // atualizar o cache local (mesmo critûˋrio de `approveDivergence`/
  // `deleteInventory`: uma aûÏûÈo de admin precisa de erro visûÙvel se falhar,
  // nûÈo pode fingir sucesso). O Realtime acima tambûˋm atualizaria o cache
  // deste mesmo aparelho pouco depois, mas nûÈo dûÀ pra depender sû° dele pro
  // FEEDBACK imediato de quem clicou ã daûÙ o `setX(valor)` otimista aqui,
  // assim que `res.ok`.
  async function updateOperadorVeSaldo(v){
    const res = await updateAppConfig({operadorVeSaldo:v}, currentUser?currentUser.nome:null);
    if(res.ok) setOperadorVeSaldo(v);
    return res;
  }
  async function updateOperadorVeValoresRecontagem(v){
    const res = await updateAppConfig({operadorVeValoresRecontagem:v}, currentUser?currentUser.nome:null);
    if(res.ok) setOperadorVeValoresRecontagem(v);
    return res;
  }
  async function updateGruposExcluidos(lista){
    const res = await updateAppConfig({gruposExcluidos:lista}, currentUser?currentUser.nome:null);
    if(res.ok) setGruposExcluidos(lista);
    return res;
  }
  async function updateSessionTimeoutMin(min){
    const res = await updateAppConfig({sessionTimeoutMin:min}, currentUser?currentUser.nome:null);
    if(res.ok) setSessionTimeoutMin(min);
    return res;
  }

  function logReportSend(entry){
    setReportSendHistory(prev=>[entry, ...prev]);
  }

  const currentUser = users.find(u=>u.id===currentUserId) || null;
  const role = currentUser ? currentUser.perfil : null;

  useEffect(()=>{
    if(currentUser) refreshAppConfig();
  }, [currentUser]);
  // Realtime: qualquer admin mudando uma configuraûÏûÈo em QUALQUER aparelho
  // atualiza o cache local de TODOS os outros aparelhos logados em poucos
  // segundos, sem precisar de reload nem de esperar um ciclo de polling ã
  // exatamente o comportamento pedido. `payload.new` jûÀ traz a linha
  // inteira atualizada (ûˋ sempre a mesma linha, id=1), entûÈo nûÈo precisa de
  // merge ã sû° substitui o cache local direto.
  useEffect(()=>{
    if(!supabaseClient || !currentUser) return;
    const channel = supabaseClient
      .channel('realtime:app_config')
      .on('postgres_changes', {event:'*', schema:'public', table:'app_config'}, payload=>{
        if(!payload.new) return;
        setOperadorVeSaldo(!!payload.new.operador_ve_saldo);
        setOperadorVeValoresRecontagem(!!payload.new.operador_ve_valores_recontagem);
        setGruposExcluidos(payload.new.grupos_excluidos || []);
        setSessionTimeoutMin(payload.new.session_timeout_min || DEFAULT_SESSION_TIMEOUT_MIN);
      })
      .subscribe(status=>{ if(status==='SUBSCRIBED') refreshAppConfig(); });
    return ()=>{ supabaseClient.removeChannel(channel); };
  }, [currentUser]);

  // Histû°rico de navegaûÏûÈo ã pilha de {view, flowState} visitados, usada sû°
  // pelo botûÈo "Voltar" do rodapûˋ mobile (ver `MobileNavBar` abaixo).
  // Ephûˆmero de propû°sito (useState puro, nûÈo `usePersistedState`) ã recarregar
  // a pûÀgina jûÀ reinicia a "sessûÈo de navegaûÏûÈo" naturalmente, mesmo critûˋrio
  // jûÀ usado pra `sidebarCollapsed`. NûÈo precisa disso no desktop/tablet largo:
  // lûÀ a Sidebar sempre visûÙvel jûÀ cobre a navegaûÏûÈo.
  const [navHistory, setNavHistory] = useState([]);

  function goto(v, params){
    setNavHistory(prev=>[...prev, {view, flowState}]);
    setFlowState(params||null);
    setView(v);
    window.scrollTo(0,0);
  }

  function voltarUmPasso(){
    setNavHistory(prev=>{
      if(prev.length===0) return prev;
      const anterior = prev[prev.length-1];
      setFlowState(anterior.flowState);
      setView(anterior.view);
      window.scrollTo(0,0);

  // A navegaûÏûÈo (view) sobrevive a recarregar a pûÀgina ã se o usuûÀrio
  // perdeu acesso û  tela em que estava (perfil trocado, acesso removido pelo
  // admin em `acessosRemovidos`, ou a navegaûÏûÈo persistida de antes de
  // alguma tela virar restrita), volta pra Home em vez de deixar a tela em
  // branco (nenhuma rota bate a condiûÏûÈo de acesso, `.content` renderiza
  // vazio). Checa `hasAccess` direto (sem depender de `view` estar em
  // ACESSOS_RESTRITOS) ã agora QUALQUER tela do menu principal pode ser
  // bloqueada por usuûÀrio, nûÈo sû° as que tinham entrada nesse mapa antes.
  useEffect(()=>{
    if(currentUser && !hasAccess(currentUser, view)){
      setView('home');
      setFlowState(null);
    }
  }, [currentUser, view]);

  function addAddressProposal(p){
    const proposta = {...p, id:'END-'+Math.random().toString(36).slice(2,7).toUpperCase(), status:'pendente'};
    setEnderecosPropostos(prev=>[proposta, ...prev]);
    // Fire-and-forget ã mesmo padrûÈo de saveContagemToSupabase: o operador
    // nûÈo pode travar esperando rede no meio de uma contagem. Se falhar, a
    // proposta continua visûÙvel neste aparelho (fonte local jûÀ atualizada);
    // sû° nûÈo aparece em outros atûˋ o prû°ximo ciclo de sync bem-sucedido.
    saveEnderecoPropostoToSupabase(proposta).then(res=>{
      if(!res.ok) console.warn('Falha ao sincronizar endereûÏo proposto:', res.erro);
    });
  }

  // `counts` muda o tempo todo (cada contagem finalizada), mas o efeito de
  // sincronizaûÏûÈo (mais abaixo) sû° quer re-executar quando `currentUser`
  // muda ã sem essa ref, o `sync()` capturaria uma versûÈo desatualizada de
  // `counts` presa no closure do momento do login (stale closure clûÀssico
  // de useEffect+setInterval). O ref ûˋ sû° pra LEITURA da fila de retry; toda
  // escrita continua via `setCounts` normal (sempre pega o estado mais
  // recente, independente do closure).
  const countsRef = useRef(counts);
  useEffect(()=>{ countsRef.current = counts; }, [counts]);

  // ---- SincronizaûÏûÈo de usuûÀrios ã sû° quando hûÀ alguûˋm logado com acesso
  // û  tela "UsuûÀrios" ----
  // Antes desta migraûÏûÈo, esse fetch precisava rodar mesmo ANTES do login
  // (senûÈo um usuûÀrio excluûÙdo em outro aparelho continuava conseguindo
  // logar aqui) ã com o Supabase Auth de verdade, login nunca mais confia
  // em cache local (toda tentativa bate direto no Auth), entûÈo esse
  // problema nûÈo existe mais e o fetch sû° precisa acontecer pra quem vai
  // de fato USAR a lista (admin, ou quem ganhou a exceûÏûÈo via
  // acessos_extras ã ver hasAccess/pode_gerenciar_usuarios no schema.sql,
  // que espelha exatamente essa mesma regra do lado do RLS).
  const podeGerenciarUsuarios = !!(currentUser && hasAccess(currentUser, 'usuarios'));
  // ExtraûÙdo do useEffect abaixo (que continua rodando a cada 30s) pra
  // tambûˋm poder ser chamado manualmente logo apû°s criar/editar um usuûÀrio ã
  // sem isso, o usuûÀrio recûˋm-criado sû° apareceria na lista no prû°ximo ciclo
  // de sincronizaûÏûÈo (atûˋ 30s de espera), dando a falsa impressûÈo de que
  // "nûÈo aconteceu nada" ao voltar pra tela de UsuûÀrios.
  async function refreshUsuarios(){
    const remoteUsers = await fetchUsuariosFromSupabase();
    if(remoteUsers===null) return;
    setUsers(prev=>mergeByIdComTimestamp(prev, remoteUsers, {timestampField:'atualizadoEm', removeMissing:true}));
  }
  // SincronizaûÏûÈo em tempo real (Supabase Realtime) ã substitui o polling de
  // 30s que existia aqui antes. Um evento INSERT/UPDATE atualiza sû° a linha
  // afetada (via `usuarioRowToLocal`, mesmo mapper do fetch); DELETE remove
  // localmente (propaga exclusûÈo feita em outro aparelho, mesmo
  // comportamento que o polling antigo jûÀ tinha). O fetch completo
  // (`refreshUsuarios`) sû° roda quando o canal conecta/reconecta
  // (`status==='SUBSCRIBED'`, dispara na conexûÈo inicial e em toda
  // reconexûÈo automûÀtica) ã cobre qualquer mudanûÏa perdida enquanto o canal
  // estava desconectado, jûÀ que o Realtime nûÈo garante reentrega de eventos
  // de quando o cliente nûÈo estava ouvindo.
  useEffect(()=>{
    if(!supabaseClient || !podeGerenciarUsuarios) return;
    const channel = supabaseClient
      .channel('realtime:usuarios')
      .on('postgres_changes', {event:'*', schema:'public', table:'usuarios'}, payload=>{
        if(payload.eventType==='DELETE'){

      .subscribe(status=>{ if(status==='SUBSCRIBED') refreshUsuarios(); });
    return ()=>{ supabaseClient.removeChannel(channel); };

  // Reflete `getPendingIncrements().length` (ver index.html perto de
  // incrementContadosSupabase) de forma reativa, sû° pro indicador visual ã
  // a fila em si mora no localStorage, nûÈo em estado React.
  const [pendingIncrementsCount, setPendingIncrementsCount] = useState(0);

  // Itens jûÀ CONCLUûDOS na planilha antiga (contagens_historico) ã alimenta
  // "Contagens ConcluûÙdas" e a Acuracidade do Estoque (Home), ver
  // fetchContagensHistoricoConcluidas. Buscado uma vez por login (nûÈo entra
  // no ciclo de sync de 30s ã o histû°rico sû° muda quando alguûˋm reimporta a
  // planilha em ConfiguraûÏûçes, nûÈo em tempo real) e re-buscado manualmente
  // via `refreshHistoricoConcluidas` logo apû°s uma importaûÏûÈo bem-sucedida,
  // pra quem jûÀ estûÀ logado ver o resultado sem precisar recarregar a pûÀgina.
  const [historicoConcluidas, setHistoricoConcluidas] = useState([]);
  // Pool mais amplo, sû° pra "Tendûˆncia Semanal" (Dashboard) ã inclui
  // "Pendente" (fora de escopo pro resto do app), jûÀ que ali o que importa ûˋ
  // volume/acuracidade real de contagens feitas, nûÈo status de decisûÈo. Ver
  // fetchContagensHistoricoParaTendencia.
  const [historicoParaTendencia, setHistoricoParaTendencia] = useState([]);
  function refreshHistoricoConcluidas(){
    // Retorna a Promise combinada (nûÈo sû° fire-and-forget) ã o botûÈo
    // "Atualizar" do painel "Contagens ConcluûÙdas" espera essa promise pra
    // saber quando parar de girar o ûÙcone, mesmo padrûÈo jûÀ usado pelo
    // "Atualizar" do Dashboard (carregarEstoque).
    return Promise.all([
      fetchContagensHistoricoConcluidas().then(setHistoricoConcluidas),
      fetchContagensHistoricoParaTendencia().then(setHistoricoParaTendencia),
    ]);
  }

  useEffect(()=>{
    if(currentUser) refreshHistoricoConcluidas();
  }, [currentUser]);

  // Ponto û¤nico onde toda contagem finalizada entra no estado local E tenta
  // gravar no Supabase ã os 5 `onFinish` dos fluxos de contagem (Aleatû°ria,
  // Manual, Rota, Lista Importada, Recontagem) chamam esta funûÏûÈo em vez de
  // cada um gravar por conta prû°pria. A contagem aparece na tela IMEDIATAMENTE
  // (sem esperar rede ã chûÈo de fûÀbrica nûÈo pode travar) com
  // `_syncPendente:true`; quando `saveContagemToSupabase` resolve (rûÀpido, na
  // maioria das vezes), o flag vira `false`. Se falhar (offline etc.), o
  // flag continua `true` e o ciclo de sync de 30s tenta de novo sozinho ã
  // ver `sync()` mais abaixo.

  // DecisûÈo do lûÙder (confirmar/rejeitar) ã aguarda confirmaûÏûÈo do Supabase

  // lûÙder decidindo num tablet nunca aparecia nos outros.

  // DecisûÈo do lûÙder ã precisa confirmar no Supabase ANTES de mudar a tela
  // (diferente da contagem em si, que continua instantûÂnea/local): ûˋ
  // exatamente essa gravaûÏûÈo que faz "todo aparelho vûˆ o mesmo histû°rico"
  // valer de verdade pra aprovaûÏûÈo de divergûˆncia. Retorna {ok,erro} pra
  // RecountsPanel poder mostrar o erro inline se falhar, sem mudar o card.
  async function approveDivergence(countId){

  // Encaminha o item pra fila de "Aguardando Segunda Contagem" ã nûÈo faz a
  // recontagem agora, sû° libera o item pra qualquer operador pegar depois
  // (mesma fila que jûÀ existe, ver RecountsPanel). Diferente do botûÈo
  // "Recontar" (RecountFlow), que ûˋ o prû°prio lûÙder/admin recontando na hora.
  // Mesmo padrûÈo de `approveDivergence`: aguarda confirmaûÏûÈo do Supabase
  // antes de mudar o estado local.
  async function requestRecountFromOperator(countId){
    const recontagemSolicitadaPor = currentUser ? currentUser.nome : 'ã';
    const recontagemSolicitadaEm = new Date().toLocaleString('pt-BR');
    const res = await updateContagemStatusToSupabase(countId, {

      // Marca que essa 2ôˆ contagem existe porque o lûÙder REJEITOU a
      // divergûˆncia (nûÈo aceitou o resultado) ã diferente de um item que
      // caiu em "aguardando_segunda" sozinho pela regra automûÀtica da 1ôˆ
      // contagem. RecountsPanel usa isso pra diferenciar o card.
      recontagem_solicitada_pelo_lider: true,

  // ---- Fluxo real de ajuste de estoque da Selgron (SA ã Diretoria) ----
  // O lûÙder nûÈo finaliza mais uma divergûˆncia confirmada sozinho quando decide
  // que precisa mexer no saldo ã gera uma SA de Ajuste (nû¤mero digitado por
  // ele mesmo) e encaminha pra aprovaûÏûÈo da Diretoria; sû° depois da decisûÈo da
  // Diretoria (hoje: manual, feita pelo prû°prio admin dentro do app) o item
  // conta como resolvido de verdade. "Sem Ajuste NecessûÀrio" continua sendo
  // `approveDivergence`, sem passar por nada disso ã ver DivergentItemsPanel.

  // LûÙder gera a SA e encaminha ã item sai de "Itens Divergentes" e entra em
  // "AprovaûÏûÈo de Ajustes" (`aguardando_aprovacao_diretoria`, um estado ABERTO
  // como qualquer outro em OPEN_STATUSES).
  async function enviarParaAprovacaoDiretoria(countId, numeroSa){

  // "Contagens ConcluûÙdas" como "Ajustado"). Reaproveita `aprovado_por`/
  // `aprovado_em` (mesmas colunas que `approveDivergence` jûÀ usa) com o
  // sentido de "quem resolveu essa divergûˆncia definitivamente".
  async function aprovarAjusteDiretoria(countId){

  // Diretoria reprova ã volta pro MESMO destino de "Solicitar nova contagem"

  // Diretoria que reprovou, nûÈo o lûÙder, pra puxar mais atenûÏûÈo na anûÀlise.
  async function reprovarAjusteDiretoria(countId, motivo){

  async function reprovarAjusteHistorico(rawRow, motivo){

  // Cancela um inventûÀrio em andamento (lûÙder/admin, aûÏûÈo inline em
  // InventoryList) ã mantûˋm os itens jûÀ contados e descarta sû° os que ainda
  // estavam em aberto, encerrando o documento como ConcluûÙdo. Trunca
  // `qtdItens` pro tanto jûÀ contado (ûˋ isso que faz `inventarioConcluido`
  // considerar o inventûÀrio fechado); pros tipos que guardam a prû°pria lista
  // de itens (Lista Importada/Itens EspecûÙficos), tambûˋm trunca
  // `itensImportados` pros primeiros `contados` itens ã os demais tipos
  // (Aleatû°ria/Curva ABC/Rota/Grupo) nunca guardaram uma lista prû°pria de
  // itens em aberto (a fila ûˋ recalculada por RPC a cada vez, usando
  // `contados` como cursor), entûÈo truncar `qtdItens` jûÀ ûˋ suficiente.
  async function cancelInventory(id){
    const inv = inventories.find(i=>i.id===id);
    if(!inv) return {ok:false, erro:'InventûÀrio nûÈo encontrado.'};
    // Sem nenhum item contado ainda nûÈo tem o que "manter" ã cancelar nesse
    // caso ûˋ o mesmo que excluir o documento (senûÈo `qtdItens` zerado nunca
    // bateria a condiûÏûÈo `qtdItens>0` de `inventarioConcluido`, e o card
    // ficaria preso pra sempre em "0/0 pendente", sem sair da lista).
    if(inv.contados===0) return deleteInventory(id);
    const patch = {qtd_itens: inv.contados};
    const itensTruncados = inv.itensImportados ? inv.itensImportados.slice(0, inv.contados) : null;
    if(itensTruncados) patch.itens_importados = itensTruncados;
    const res = await updateInventarioToSupabase(id, patch);
    if(res.ok){
      setInventories(prev=>prev.map(i=>i.id===id ? {...i, qtdItens: inv.contados, itensImportados: itensTruncados || i.itensImportados} : i));
    }
    return res;
  }

  // falhado. Usada por todas as telas que listam contagens individuais

  async function deleteCount(id){

  // ---- AutenticaûÏûÈo (Supabase Auth de verdade) ----
  // A tela de login aceita "usuûÀrio ou e-mail" ã como o Supabase Auth sû°
  // autentica por e-mail, `resolver_login` (RPC, roda no servidor) resolve
  // o identificador digitado pro e-mail real antes de chamar
  // `signInWithPassword`. `currentUserId` nûÈo precisa ser setado aqui ã
  // `onAuthStateChange` (useEffect acima) jûÀ reage û  sessûÈo nova sozinho.
  async function attemptLogin(identifier, senha, lembrar=true){
    const id = identifier.trim().toLowerCase();
    const { data: matches, error: rpcErr } = await supabaseClient.rpc('resolver_login', {p_identifier:id});
    const match = matches && matches[0];
    if(rpcErr || !match) return {ok:false, error:'UsuûÀrio ou senha invûÀlidos.'};
    if(match.status==='bloqueado') return {ok:false, error:'UsuûÀrio bloqueado. Contate o administrador.'};
    if(match.status==='deve_definir_senha') return {ok:false, needsNewPassword:true, userId:match.id};
    const { error } = await supabaseClient.auth.signInWithPassword({email:match.email, password:senha});
    if(error) return {ok:false, error:'UsuûÀrio ou senha invûÀlidos.'};
    // "Lembrar-me": guarda (ou esquece) o identificador digitado, nunca a
    // senha ã ver comentûÀrio perto de `LOGIN_LEMBRADO_KEY`.
    if(lembrar) salvarLoginLembrado(identifier); else limparLoginLembrado();
    touchLastActivity();
    setView('home');
    const agora = new Date().toISOString();
    updateUsuarioToSupabase(match.id, {ultimoAcesso:agora}).then(res=>{
      if(!res.ok) console.warn('Falha ao registrar û¤ltimo acesso:', res.erro);
    });
    return {ok:true};
  }

    return 'Se o usuûÀrio existir, uma solicitaûÏûÈo foi enviada para aprovaûÏûÈo do administrador.';

  // Todas as aûÏûçes abaixo passam pela Edge Function `usuarios-admin`

  // jûÀ usado em `approveDivergence`/`deleteInventory`.
  async function applyAdminPasswordAction(userId, acao, novaSenhaDigitada){
    const target = users.find(u=>u.id===userId);
    if(!target || !currentUser) return {ok:false, erro:'UsuûÀrio nûÈo encontrado.'};
    if(acao!=='temp' && acao!=='definir' && acao!=='liberar') return {ok:false, erro:'AûÏûÈo invûÀlida.'};
    const res = await chamarUsuariosAdmin('definir_senha', {userId, modo:acao, novaSenha:novaSenhaDigitada});
    if(res.ok){
      const novoStatus = acao==='liberar' ? 'deve_definir_senha' : 'ativo';

      logHistory(target.nome, acaoLabel, currentUser.nome);

    return res;
  }

  // Chamado pela tela "Nova senha" (usuûÀrio liberado pelo admin definindo a
  // prû°pria senha) ã nûÈo exige admin logado (a prû°pria Edge Function trata
  // esse caso sem checar JWT, ver `auto_definir_senha`).
  //

  // usuûÀrio, usado sû° pra pegar o e-mail) normalmente ûˋ `undefined` no
  // aparelho do OPERADOR: a sincronizaûÏûÈo completa de `users` sû° roda pra
  // quem jûÀ estûÀ logado E tem acesso û  tela "UsuûÀrios" (ver seûÏûÈo
  // "Quarto pedaûÏo do backend real" no CLAUDE.md) ã um operador nunca tem

  // Agora sû° salva a senha e devolve `{ok:true}` ã `LoginScreen` volta pra
  // tela de login normal com um aviso de sucesso, e o usuûÀrio loga de

  async function selfSetNewPassword(userId, novaSenha){

      logHistory(target.nome, 'Senha definida pelo prû°prio usuûÀrio', 'ã');
    }
    return res;
  }
