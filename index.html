function LoginScreen({onLogin, onForgot, onSelfSetPassword, notice, clearNotice}){
  const [mode, setMode] = useState('login'); // login | forgot | newPassword
  const [identifier, setIdentifier] = useState('');
  const [senha, setSenha] = useState('');
  const [showSenha, setShowSenha] = useState(false);
  const [error, setError] = useState('');
  const [forgotMsg, setForgotMsg] = useState('');
  const [pendingUserId, setPendingUserId] = useState(null);
  const [novaSenha, setNovaSenha] = useState('');
  const [confirmaSenha, setConfirmaSenha] = useState('');

  function submitLogin(e){
    e.preventDefault();
    setError('');
    const result = onLogin(identifier, senha);
    if(!result.ok){
      if(result.needsNewPassword){
        setPendingUserId(result.userId);
        setMode('newPassword');
      } else {
        setError(result.error);
      }
    }
  }

  function submitForgot(e){
    e.preventDefault();
    const msg = onForgot(identifier);
    setForgotMsg(msg);
  }

  function submitNewPassword(e){
    e.preventDefault();
    setError('');
    if(novaSenha.length < 6){ setError('A nova senha deve ter pelo menos 6 caracteres.'); return; }
    if(novaSenha !== confirmaSenha){ setError('As senhas não coincidem.'); return; }
    onSelfSetPassword(pendingUserId, novaSenha);
  }

  return (
    <div className="login-screen">
      <div className="login-card">
        <div className="login-illustration">
          <img src={SELGRON_LOGO_URL} alt="Selgron" />
          <div className="login-illust-mid">
            <CycleIcon className="login-cycle-icon" />
            <div className="login-illust-title">Inventário <span>360</span></div>
            <div className="login-illust-tagline">Visão completa. Controle eficiente.</div>
          </div>
          <div className="login-illust-decor"></div>
        </div>

        <div className="login-form-panel">
          <h1 className="login-title">Inventário <span>360°</span></h1>
          <div className="login-subtitle">Controle de Inventário Cíclico</div>
          <div className="login-rule"></div>

          {notice && mode==='login' && (
            <div className="login-notice">{notice}</div>
          )}

          {mode==='login' && (
            <form onSubmit={submitLogin}>
              {error && <div className="login-error">{error}</div>}
              <div className="login-field">
                <label>Usuário ou e-mail</label>
                <div className="field-wrap">
                  <span className="field-icon"><LoginFieldIcon name="user" /></span>
                  <input type="text" value={identifier} onChange={e=>{setIdentifier(e.target.value); clearNotice&&clearNotice();}} placeholder="Digite seu usuário ou e-mail" autoCapitalize="none" autoFocus />
                </div>
              </div>
              <div className="login-field">
                <label>Senha</label>
                <div className="field-wrap">
                  <span className="field-icon"><LoginFieldIcon name="lock" /></span>
                  <input className="has-toggle" type={showSenha?'text':'password'} value={senha} onChange={e=>setSenha(e.target.value)} placeholder="••••••••" />
                  <button type="button" className="pw-toggle" onClick={()=>setShowSenha(s=>!s)} title={showSenha?'Ocultar senha':'Mostrar senha'}><EyeIcon off={showSenha} />{showSenha?'Ocultar':'Mostrar'}</button>
                </div>
              </div>
              <button className="login-btn" type="submit">Entrar</button>

              <div className="login-or">ou</div>
              <button type="button" className="login-forgot" onClick={()=>{setMode('forgot'); setError(''); setForgotMsg('');}}><DIcon name="lock" size={13} /> Esqueci minha senha</button>

              <div className="demo-creds">
                <div className="dc-title"><ShieldIcon /> Acesso de demonstração</div>
                <div className="dc-sub">Ambiente de demonstração (remover em produção)</div>
                <div className="dc-row">
                  <span className="dc-avatar"><DIcon name="user" size={13} /></span>
                  <span className="dc-cred">alisson / admin123</span>
                  <span className="dc-role-pill admin">Administrador</span>
                </div>
                <div className="dc-row">
                  <span className="dc-avatar"><DIcon name="user" size={13} /></span>
                  <span className="dc-cred">roberto.alves / lider123</span>
                  <span className="dc-role-pill lider">Líder de Estoque</span>
                </div>
                <div className="dc-row">
                  <span className="dc-avatar"><DIcon name="user" size={13} /></span>
                  <span className="dc-cred">carlos.mendes / operador123</span>
                  <span className="dc-role-pill operador">Operador</span>
                </div>
              </div>
            </form>
          )}

          {mode==='forgot' && (
            <form onSubmit={submitForgot}>
              {!forgotMsg ? (
                <div>
                  <div className="role-note" style={{marginBottom:20}}>Informe seu usuário ou e-mail. Um administrador vai analisar e liberar o acesso.</div>
                  <div className="login-field">
                    <label>Usuário ou e-mail</label>
                    <div className="field-wrap">
                      <span className="field-icon"><LoginFieldIcon name="user" /></span>
                      <input type="text" value={identifier} onChange={e=>setIdentifier(e.target.value)} autoFocus />
                    </div>
                  </div>
                  <button className="login-btn" type="submit">Solicitar recuperação</button>
                </div>
              ) : (
                <div className="login-success">{forgotMsg}</div>
              )}
              <button type="button" className="login-back" onClick={()=>{setMode('login'); setForgotMsg(''); setIdentifier('');}}>← Voltar ao login</button>
            </form>
          )}

          {mode==='newPassword' && (
            <form onSubmit={submitNewPassword}>
              <div className="role-note" style={{marginBottom:20}}>O administrador liberou sua conta para você criar uma nova senha.</div>
              {error && <div className="login-error">{error}</div>}
              <div className="login-field">
                <label>Nova senha</label>
                <div className="field-wrap">
                  <span className="field-icon"><LoginFieldIcon name="lock" /></span>
                  <input type="password" value={novaSenha} onChange={e=>setNovaSenha(e.target.value)} autoFocus />
                </div>
              </div>
              <div className="login-field">
                <label>Confirmar nova senha</label>
                <div className="field-wrap">
                  <span className="field-icon"><LoginFieldIcon name="lock" /></span>
                  <input type="password" value={confirmaSenha} onChange={e=>setConfirmaSenha(e.target.value)} />
                </div>
              </div>
              <button className="login-btn" type="submit">Definir senha e entrar</button>
            </form>
          )}
        </div>
      </div>

      <div className="login-trust-row">
        <div className="login-trust-item">
          <span className="ti-icon"><DIcon name="shieldCheck" size={20} /></span>
          <div><strong>Seguro</strong><span>Acesso protegido</span></div>
        </div>
        <div className="login-trust-item">
          <span className="ti-icon"><DIcon name="barChart" size={20} /></span>
          <div><strong>Confiável</strong><span>Dados sempre íntegros</span></div>
        </div>
        <div className="login-trust-item">
          <span className="ti-icon"><DIcon name="clock" size={20} /></span>
          <div><strong>Eficiente</strong><span>Processos otimizados</span></div>
        </div>
      </div>

      <div className="login-footer">
        <div className="lf-restrict"><DIcon name="lock" size={12} /> Acesso restrito. Uso exclusivo para usuários autorizados.</div>
        <div>© {new Date().getFullYear()} Selgron. Todos os direitos reservados.</div>
      </div>
    </div>
  );
}

  const pendentes = inventories.filter(i=>i.status!=='concluido').length;

  counts.forEach(c=>{ if(c.contagemAnteriorId) byOriginal[c.contagemAnteriorId]=true; });
  const pendentesRecontagem = counts.filter(c=>(c.statusAprovacao==='aguardando_segunda' && !byOriginal[c.id]) || c.statusAprovacao==='aguardando_analise_lider').length;
  const podeGerir = role==='lider'||role==='admin';
  const pendentesEnderecos = enderecosPropostos.filter(e=>e.status==='pendente').length;

  // (view "home" virou o Dashboard — ver CLAUDE.md "Dashboard vira a tela inicial")
  const emAndamento = inventories.filter(i=>i.contados>0 && i.contados<i.qtdItens).length;
  const pendentesInicio = inventories.filter(i=>i.contados===0).length;

  const hojeStr = new Date().toISOString().slice(0,10);
  const ontemStr = new Date(Date.now()-86400000).toISOString().slice(0,10);

  function acumuladoAte(dataLimite){
    const relevantes = counts.filter(c=>c.data<=dataLimite);
    const divergentes = relevantes.filter(c=>c.diferenca!==0 && c.diferenca!==null);
    const acuracidade = relevantes.length ? ((relevantes.length-divergentes.length)/relevantes.length*100) : 100;
    return {total:relevantes.length, divergentes:divergentes.length, acuracidade};
  }
  const hoje = acumuladoAte(hojeStr);
  const ontem = acumuladoAte(ontemStr);
  const concluidasHoje = counts.filter(c=>c.data===hojeStr).length;
  const concluidasOntem = counts.filter(c=>c.data===ontemStr).length;

  const divergentesTrendPct = pnlTrendPct(hoje.divergentes, ontem.divergentes);
  const concluidasTrendPct = pnlTrendPct(concluidasHoje, concluidasOntem);
  const acuracidadePontos = ontem.total>0 ? (hoje.acuracidade-ontem.acuracidade) : null;

  const kpis = [

      onClick:()=>goto('myCounts'),
    },

/* ---------------- DASHBOARD (agora é a tela "home") ----------------
   Helpers usados pelo bloco desktop de `Home` (design corporativo/ERP — ver
   CLAUDE.md "Dashboard vira a tela inicial"). Toda métrica vem de
   `counts`/`inventories` reais já existentes no app — nada fabricado.
   Tendência dia-a-dia (vs. ontem) só é mostrada onde a comparação é
   genuinamente derivável do campo `data` de cada contagem (cumulativo até uma
   data); para KPIs que são puro estado atual (sem histórico registrado —
   inventários em andamento, recontagens pendentes) mostra uma nota contextual
   real em vez de inventar uma variação percentual sem base de dados. */

function pnlPeriodCutoff(period){
  const now = new Date();
  if(period==='7d') return new Date(now.getTime()-6*86400000).toISOString().slice(0,10);
  if(period==='30d') return new Date(now.getTime()-29*86400000).toISOString().slice(0,10);
  return '0000-00-00';
}

function pnlTrendPct(atual, anterior){
  if(anterior===0) return atual===0 ? 0 : null;
  return ((atual-anterior)/anterior)*100;
}

function KpiTrend({pct, invert, suffix, compareLabel}){
  if(pct===null || pct===undefined){
    return null;
  }
  const flat = Math.abs(pct) < 0.05;
  const rising = pct > 0;
  const good = flat ? null : (invert ? !rising : rising);
  const cls = flat ? 'flat' : (good ? 'good' : 'bad');
  const icon = flat ? 'minus' : (rising ? 'trendingUp' : 'trendingDown');
  const sign = pct > 0 ? '+' : '';
  return (
    <span className={"pnl-kpi-trend "+cls}>
      <DIcon name={icon} size={11} />
      {sign}{pct.toFixed(1)}{suffix || '%'} {compareLabel || 'vs. ontem'}
    </span>
  );
}

function PnlDonut({segments, size=168, strokeWidth=22}){
  const r = (size - strokeWidth) / 2;
  const c = 2 * Math.PI * r;
  const total = segments.reduce((s, x) => s + x.value, 0);
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--gray-100)" strokeWidth={strokeWidth} />
      {total > 0 && segments.map((seg, i) => {
        if (seg.value <= 0) return null;
        const len = (seg.value / total) * c;
        const dashoffset = -offset;
        offset += len;
        return (
          <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={seg.color} strokeWidth={strokeWidth}
            strokeDasharray={`${len} ${c - len}`} strokeDashoffset={dashoffset}
            transform={`rotate(-90 ${size/2} ${size/2})`} />
        );
      })}
      <text x="50%" y="47%" textAnchor="middle" fontSize="24" fontWeight="700" fill="var(--navy)" fontFamily="Inter, sans-serif">{total}</text>
      <text x="50%" y="63%" textAnchor="middle" fontSize="10.5" fill="var(--gray-500)" fontFamily="Inter, sans-serif">inventários</text>
    </svg>
  );
}

function InventoryList({inventories, goto, role, counts, onDelete}){
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);

  if(inventories.length===0){
    return <div className="empty-state"><div className="ic"><Ic>📦</Ic></div>Nenhum inventário programado.</div>;
  }

  function handleDownload(inv){
    if(!window.XLSX) return;
    const invCounts = (counts||[]).filter(c=>c.inventario===inv.id);
    const wb = generateReportWorkbook(invCounts, [inv]);
    const nomeArquivo = inv.nome.replace(/[^\w]+/g,'_');
    window.XLSX.writeFile(wb, `Inventario360_${inv.id}_${nomeArquivo}.xlsx`);
  }

  return (
    <div>
      {(role==='lider'||role==='admin') && (
        <button className="btn btn-primary" style={{marginBottom:16}} onClick={()=>goto('newInventory')}>
          <Ic>➕</Ic> Criar Inventário
        </button>
      )}
      {inventories.map(inv=>{
        const pct = inv.qtdItens ? Math.round((inv.contados/inv.qtdItens)*100) : 0;
        return (
          <div key={inv.id} className="item-card" style={{cursor:'pointer'}} onClick={()=>goto(inv.tipo==='Lista Importada (Excel)' ? 'importedListCount' : 'randomCount', inv)}>

              <div>
                <div className="item-code">{inv.id} · {inv.almoxarifado}</div>
                <div className="item-desc" style={{fontSize:16}}>{inv.nome}</div>
              </div>
              <StatusTag status={inv.status==='pendente' ? 'warn' : inv.status==='concluido' ? 'ok' : 'warn'} text={inv.status==='pendente'?'Pendente':inv.status==='concluido'?'Concluído':'Em andamento'} />
            </div>
            <div style={{padding:'14px 18px'}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12.5,color:'var(--ink-dim)'}}>
                <span>{inv.tipo} · Resp. {inv.responsavel}</span>
                <span>{inv.data}</span>
              </div>
              <div className="progress-bar"><div className="fill" style={{width:pct+'%'}}></div></div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:11.5,color:'var(--ink-dim)',marginTop:6}}>{inv.contados}/{inv.qtdItens} itens contados ({pct}%)</div>
            </div>
            {role==='admin' && (
              confirmDeleteId===inv.id ? (
                <div style={{padding:'0 18px 16px'}} onClick={e=>e.stopPropagation()}>
                  <div className="divergence-alert" style={{marginBottom:10}}>
                    <Ic>⚠</Ic><span>Excluir "{inv.nome}"? Essa ação não pode ser desfeita.</span>
                  </div>
                  <div className="btn-row">
                    <button className="btn btn-secondary" onClick={()=>setConfirmDeleteId(null)}>Cancelar</button>
                    <button className="btn btn-danger" onClick={()=>{onDelete(inv.id); setConfirmDeleteId(null);}}>Confirmar exclusão</button>
                  </div>
                </div>
              ) : (
                <div className="btn-row" style={{padding:'0 18px 16px'}} onClick={e=>e.stopPropagation()}>
                  <button className="btn btn-secondary" onClick={()=>handleDownload(inv)}><Ic>⬇</Ic> Baixar</button>
                  <button className="btn btn-danger" onClick={()=>setConfirmDeleteId(inv.id)}><Ic>🗑</Ic> Excluir</button>
                </div>
              )
            )}
          </div>
        );
      })}

function NewInventory({users, onCreate}){
  const [nome, setNome] = useState('Inventário Cíclico Julho/2026');
  const [almox, setAlmox] = useState('Almox 01');
  const [resp, setResp] = useState('Carlos Mendes');
  const [data, setData] = useState('2026-07-20');
  const [qtd, setQtd] = useState(20);
  const [tipo, setTipo] = useState('Contagem Aleatória');

  const [arquivoNome, setArquivoNome] = useState('');
  const [itensImportados, setItensImportados] = useState(null);
  const [importResumo, setImportResumo] = useState(null);
  const [importErro, setImportErro] = useState('');
  const fileRef = useRef();

  const tipos = [
    {v:'Contagem Aleatória', d:'O sistema seleciona os itens automaticamente'},
    {v:'Contagem por Curva ABC', d:'Prioriza itens de maior valor ou giro'},
    {v:'Contagem Manual', d:'Operador escolhe os itens livremente'},
    {v:'Contagem por Rota de Endereço', d:'Sequência otimizada por corredor/rua'},
    {v:'Lista Importada (Excel)', d:'Conta exatamente os itens de uma planilha importada, na ordem em que vieram'},
  ];

  const isImportado = tipo==='Lista Importada (Excel)';
  const canCreate = isImportado ? !!(itensImportados && itensImportados.length>0) : true;

  function handleDownloadTemplate(){
    if(!window.XLSX) return;
    const wb = buildImportTemplateWorkbook();
    window.XLSX.writeFile(wb, 'Inventario360_Modelo_Lista_Contagem.xlsx');
  }

  function handleFileUpload(e){
    const file = e.target.files[0];
    if(!file) return;
    setImportErro('');
    setArquivoNome(file.name);
    const reader = new FileReader();
    reader.onload = (evt)=>{
      try{
        const data = new Uint8Array(evt.target.result);
        const wb = window.XLSX.read(data, {type:'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = window.XLSX.utils.sheet_to_json(sheet, {defval:''});
        const {itens, resumo} = parseImportedListRows(rows);
        if(itens.length===0){
          setImportErro('Nenhuma linha válida encontrada — verifique se a coluna "Código" está preenchida.');
          setItensImportados(null);
          setImportResumo(null);
          return;
        }
        setItensImportados(itens);
        setImportResumo(resumo);
      } catch(err){
        setImportErro('Não foi possível ler o arquivo. Verifique se é um .xlsx válido.');
        setItensImportados(null);
        setImportResumo(null);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function handleCreate(){
    onCreate({
      id:'INV-'+Math.floor(Math.random()*900+100), nome, almoxarifado:almox, responsavel:resp, data, tipo,
      qtdItens: isImportado ? itensImportados.length : qtd, status:'pendente', contados:0,
      ...(isImportado ? {itensImportados} : {}),
    });
  }

  return (
    <div>
      <div className="panel">
        <div className="field">
          <label>Nome do inventário</label>
          <input type="text" value={nome} onChange={e=>setNome(e.target.value)} />
        </div>
        <div className="field">
          <label>Almoxarifado</label>
          <select value={almox} onChange={e=>setAlmox(e.target.value)}>
            <option>Almox 01</option>
            <option>Almox 02</option>
          </select>
        </div>
        <div className="field">
          <label>Responsável</label>
          <select value={resp} onChange={e=>setResp(e.target.value)}>
            {users.filter(u=>u.perfil==='operador').map(u=><option key={u.id}>{u.nome}</option>)}
          </select>
        </div>
        <div className="field">
          <label>Data</label>
          <input type="date" value={data} onChange={e=>setData(e.target.value)} />
        </div>
        {!isImportado && (
          <div className="field">
            <label>Quantidade de itens</label>
            <input type="number" value={qtd} onChange={e=>setQtd(Number(e.target.value))} />
          </div>
        )}
        <div className="field">
          <label>Tipo de inventário</label>
          <div className="radio-group">
            {tipos.map(t=>(
              <label key={t.v} className={"radio-opt"+(tipo===t.v?' active':'')}>
                <input type="radio" name="tipo" checked={tipo===t.v} onChange={()=>setTipo(t.v)} />
                <div>
                  <div className="opt-title">{t.v}</div>
                  <div className="opt-desc">{t.d}</div>
                </div>
              </label>
            ))}
          </div>
        </div>

        {isImportado && (
          <div className="field">
            <label>Lista de itens para contar</label>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <button type="button" className="btn btn-outline" onClick={handleDownloadTemplate}><Ic>⬇</Ic> Baixar modelo padrão (.xlsx)</button>
              <button type="button" className="btn btn-secondary" onClick={()=>fileRef.current.click()}>
                <Ic>📤</Ic> {arquivoNome ? 'Trocar arquivo (' + arquivoNome + ')' : 'Selecionar planilha preenchida (.xlsx)'}

              <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={handleFileUpload} />
            </div>
            {importErro && <div className="login-error" style={{marginTop:10}}>{importErro}</div>}
          </div>
        )}
      </div>

      {isImportado && importResumo && (
        <div className="panel">
          <div className="section-title" style={{marginTop:0}}>Resumo da Importação</div>
          <div style={{fontSize:13,lineHeight:1.9}}>
            <div>Linhas na planilha: <strong>{importResumo.totalLinhas}</strong></div>
            <div>Itens válidos para contagem: <strong>{importResumo.validas}</strong></div>
            {importResumo.duplicadas>0 && <div>Códigos duplicados removidos: <strong>{importResumo.duplicadas}</strong></div>}
            {importResumo.semCodigo>0 && <div>Linhas sem código (ignoradas): <strong>{importResumo.semCodigo}</strong></div>}
            <div>Códigos não encontrados no cache local (300 SKUs): <strong>{importResumo.naoEncontrados}</strong></div>
            {importResumo.naoEncontrados>0 && (
              <div>&nbsp;&nbsp;↳ desses, com saldo do sistema trazido pela própria planilha (coluna "Sistema"): <strong>{importResumo.naoEncontrados - importResumo.semSaldoDisponivel}</strong></div>
            )}
          </div>
          {importResumo.semSaldoDisponivel>0 && (
            <div className="divergence-alert" style={{marginTop:12}}>
              <Ic>ℹ</Ic>
              <span><strong>{importResumo.semSaldoDisponivel}</strong> {importResumo.semSaldoDisponivel===1?'item':'itens'} não {importResumo.semSaldoDisponivel===1?'está':'estão'} no cache local de 300 SKUs do protótipo e a planilha não trouxe o saldo do sistema (coluna "Sistema") — ainda {importResumo.semSaldoDisponivel===1?'pode':'podem'} ser contado{importResumo.semSaldoDisponivel===1?'':'s'} normalmente, mas sem comparação automática (vai direto para revisão do líder). Em produção, com o banco sincronizado, o saldo real apareceria para qualquer código.</span>
            </div>
          )}

      )}

      <button className="btn btn-primary" disabled={!canCreate} onClick={handleCreate}>Criar Inventário</button>
    </div>

          <div className="opt-desc">O sistema indica o próximo item e endereço a contar</div>
        </button>
        <button className="item-card" style={{padding:18,textAlign:'left',border:'1px solid var(--line)',background:'var(--panel)'}} onClick={()=>goto('manualCount')}>
          <div className="opt-title" style={{fontSize:15}}><Ic>⌨</Ic>&nbsp; Contagem Manual</div>
          <div className="opt-desc">Buscar item por código, descrição ou código de barras</div>
        </button>
        <button
          className="item-card"
          style={{padding:18,textAlign:'left',border:'1px solid var(--line)',background:'var(--panel)', opacity: ANY_ADDRESS_REGISTERED?1:0.5, cursor: ANY_ADDRESS_REGISTERED?'pointer':'not-allowed'}}
          disabled={!ANY_ADDRESS_REGISTERED}
          onClick={()=>{ if(ANY_ADDRESS_REGISTERED) goto('routeCount', inv); }}
        >
          <div className="opt-title" style={{fontSize:15}}><Ic>🗺</Ic>&nbsp; Contagem por Rota de Endereço</div>
          <div className="opt-desc">{ANY_ADDRESS_REGISTERED ? 'Sequência otimizada por corredor e rua, menor deslocamento' : 'Indisponível — nenhum endereço cadastrado ainda neste almoxarifado'}</div>
        </button>
      </div>
    </div>
  );
}

/* ---------------- LEITOR DE CÂMERA (QR Code e Código de Barras) ---------------- */

function CameraScanner({onDetected, onCancel}){
  const containerId = useRef('scanner-'+Math.random().toString(36).slice(2,9)).current;
  const [status, setStatus] = useState('starting'); // starting | scanning | error
  const scannerRef = useRef(null);
  const doneRef = useRef(false);

  useEffect(()=>{
    let cancelled = false;
    async function start(){
      if(!window.Html5Qrcode){
        setStatus('error');
        return;
      }
      try{
        const formats = window.Html5QrcodeSupportedFormats ? [
          window.Html5QrcodeSupportedFormats.QR_CODE,
          window.Html5QrcodeSupportedFormats.CODE_128,
          window.Html5QrcodeSupportedFormats.CODE_39,
          window.Html5QrcodeSupportedFormats.EAN_13,
          window.Html5QrcodeSupportedFormats.EAN_8,
          window.Html5QrcodeSupportedFormats.UPC_A,
          window.Html5QrcodeSupportedFormats.ITF,
        ] : undefined;
        const scanner = new window.Html5Qrcode(containerId, formats ? {formatsToSupport: formats} : undefined);
        scannerRef.current = scanner;
        await scanner.start(
          {facingMode:'environment'},
          {fps:10, qrbox:{width:260, height:160}},
          (decodedText)=>{
            if(doneRef.current || cancelled) return;
            doneRef.current = true;
            onDetected(decodedText.trim());
          },
          ()=>{ /* ignora falhas de leitura por frame — é o comportamento normal enquanto mira */ }
        );
        if(!cancelled) setStatus('scanning');
      } catch(err){
        if(!cancelled) setStatus('error');
      }
    }
    start();
    return ()=>{
      cancelled = true;
      if(scannerRef.current){
        scannerRef.current.stop().then(()=>scannerRef.current.clear()).catch(()=>{});
      }
    };
  }, []);

  return (
    <div>
      <div className="scanner-wrap">
        <div id={containerId} className="scanner-viewport"></div>
      </div>
      {status==='error' && (
        <div className="login-error">Não foi possível acessar a câmera. Verifique a permissão do navegador ou use a digitação manual abaixo.</div>
      )}
      {status==='scanning' && <p className="scanner-hint">Aponte a câmera para o QR Code ou código de barras</p>}
      <button className="btn btn-secondary" onClick={onCancel} style={{marginBottom:14}}>Cancelar leitura</button>
    </div>
  );
}


function useCountQueue(items){
  const [idx, setIdx] = useState(0);
  const current = items[idx];
  const next = ()=> setIdx(i=>Math.min(i+1, items.length));
  const done = idx >= items.length;
  return {current, idx, total:items.length, next, done};
}

function CountStep({product, user, onComplete, onAddressProposed, inv, expectAddressCheck=true, numeroContagem=1, contagemAnteriorId=null, counts=[]}){
  // Bloqueia lançar uma contagem NOVA (1ª rodada) de um item que já tem um
  // documento em aberto em outro lugar do app (ex: contado numa lista de
  // inventário e ainda aguardando análise do líder, e alguém tenta contar o
  // mesmo código de novo via "Nova Contagem" avulsa). Recontagem legítima
  // (numeroContagem>1, vinda do RecountFlow) nunca é bloqueada — é
  // exatamente o fluxo que resolve o documento em aberto.
  const openDoc = numeroContagem===1 ? getOpenCountForProduct(counts, product.codigo) : null;
  if(openDoc){
    const info = STATUS_INFO[openDoc.statusAprovacao] || {};
    return (
      <div className="empty-state">
        <div className="ic"><Ic>🔒</Ic></div>
        <div style={{fontWeight:700,marginBottom:6}}>{product.codigo} já tem uma contagem em aberto</div>
        <div style={{maxWidth:420,margin:'0 auto'}}>
          {openDoc.recontagemSolicitadaPeloLider
            ? <>A divergência anterior não foi aceita — {openDoc.recontagemSolicitadaPor || 'o líder'} solicitou recontagem em {openDoc.recontagemSolicitadaEm||''}.</>
            : <>{info.text || 'Aguardando resolução.'}</>
          } Contado por {openDoc.usuario} em {openDoc.data} {openDoc.hora||''} · {openDoc.qtdContada} un.
        </div>
        <div style={{maxWidth:420,margin:'10px auto 0',fontSize:12.5,color:'var(--ink-dim)'}}>
          Não é possível lançar uma nova contagem deste item enquanto esse documento não for
          resolvido (aprovado ou recontado) — veja em "Recontagens".
        </div>
      </div>
    );
  }
  // Foto e motivo da divergência são tarefas de análise do líder/admin —
  // o operador só precisa contar e informar o endereço corretamente.
  const isOperador = user.perfil === 'operador';
  // Itens sem endereço cadastrado (comum enquanto o cadastro de endereços
  // ainda não existe no Protheus) pulam o QR Code e vão direto para a etapa
  // em que o operador INFORMA onde encontrou o item fisicamente.
  const hasAddress = expectAddressCheck && !!product.enderecoCadastrado;
  const needsAddressInput = expectAddressCheck && !product.enderecoCadastrado;
  const [step, setStep] = useState(hasAddress ? 'scan' : (needsAddressInput ? 'enderecoManual' : 'count'));
  const [scannedCode, setScannedCode] = useState('');
  const [addressOk, setAddressOk] = useState(null);
  const [enderecoInformado, setEnderecoInformado] = useState('');
  const [qty, setQty] = useState('');
  const [photo, setPhoto] = useState(null);
  const [obs, setObs] = useState('');
  const [motivo, setMotivo] = useState('');
  const fileRef = useRef();

  const [scanning, setScanning] = useState(false);

  function simulateScan(match){
    if(match){
      setScannedCode(product.endereco);
      setAddressOk(true);
    } else {
      // pick a plausible wrong neighboring address
      setScannedCode(product.endereco.slice(0,-1) + (((parseInt(product.endereco.slice(-1))+1)%9)||1));
      setAddressOk(false);
    }
  }

  function handleAddressScanDetected(text){
    setScanning(false);
    const clean = text.trim();
    const norm = clean.toUpperCase();
    const expected = (product.endereco||'').toUpperCase();
    setScannedCode(clean);
    setAddressOk(norm === expected);
    setStep('scanResult');
  }

  function handleEnderecoManualScanDetected(text){
    setScanning(false);
    setEnderecoInformado(formatEnderecoInput(text));
  }

  function confirmEnderecoManual(){
    if(onAddressProposed && ENDERECO_REGEX.test(enderecoInformado)){
      onAddressProposed({
        productCode: product.codigo,
        descricao: product.descricao,
        enderecoInformado,
        usuario: user.nome,
        data: new Date().toISOString().slice(0,10),
      });
    }
    setStep('count');
  }

  function handlePhoto(e){
    const f = e.target.files[0];
    if(f){ setPhoto(URL.createObjectURL(f)); }
  }

  const hasSaldoLocal = typeof product.saldoSistema === 'number';
  const diffAbs = (qty!=='' && hasSaldoLocal) ? Number(qty) - product.saldoSistema : 0;
  const diffPct = (qty!=='' && hasSaldoLocal) ? (product.saldoSistema===0 ? 100 : (diffAbs/product.saldoSistema)*100) : 0;
  const classification = hasSaldoLocal
    ? classifyDivergence(diffPct)
    : {level:'warn', label:'Sem saldo local para comparar', rule:'Item fora do cache local do protótipo — revisão manual necessária'};
  const statusAprovacao = hasSaldoLocal ? computeStatus(numeroContagem, classification.level) : 'aguardando_analise_lider';

  function finalize(){
    const count = {
      id: 'CNT-'+Math.random().toString(36).slice(2,8).toUpperCase(),
      productCode: product.codigo,
      descricao: product.descricao,
      endereco: product.endereco || enderecoInformado.toUpperCase() || '—',
      // Endereço onde o item foi FISICAMENTE contado — pode ser diferente do
      // cadastro acima quando o operador escaneia um endereço divergente e
      // opta por "Contar mesmo assim" (scannedCode), ou quando o item não
      // tinha cadastro e o operador informa onde encontrou (enderecoInformado).
      enderecoContado: scannedCode || (enderecoInformado ? enderecoInformado.toUpperCase() : '') || '',
      enderecoPendenteValidacao: needsAddressInput,
      usuario: user.nome,
      qtdContada: Number(qty),
      saldoSistema: hasSaldoLocal ? product.saldoSistema : null,
      diferenca: hasSaldoLocal ? diffAbs : null,
      percentual: hasSaldoLocal ? diffPct : null,
      valorDivergente: hasSaldoLocal ? (Math.abs(diffAbs) * Number(product.custoUnit)).toFixed(2) : '0.00',
      foraDoCacheLocal: !!product.foraDoCacheLocal,
      classificacao: classification,
      statusAprovacao,
      numeroContagem,
      contagemAnteriorId,
      motivo: diffAbs!==0 ? motivo : '',
      foto: !!photo,
      observacao: obs,
      data: new Date().toISOString().slice(0,10),
      hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
      inventario: inv ? inv.id : '—',
    };
    saveContagemToSupabase(count);
    onComplete(count);
  }

  return (
    <div>
      <div className="item-card">
        <div className="item-card-head">
          <div>
            <div className="item-code">{product.codigo}</div>
            <div className="item-desc">{product.descricao}</div>
          </div>
        </div>
        <div className="item-meta">
          <div className="m"><div className="k">Unidade</div><div className="v">{product.unidade || 'não informado'}</div></div>
          <div className="m"><div className="k">Família</div><div className="v">{product.familia}</div></div>
          <div className="m"><div className="k">Almoxarifado</div><div className="v">{product.almoxarifado}</div></div>
          <div className="m"><div className="k">Endereço</div><div className="v">{product.enderecoCadastrado ? product.endereco : 'não cadastrado'}</div></div>
        </div>
        {typeof product.valorFinanceiro === 'number' && product.valorFinanceiro > 0 && (
          <div style={{padding:'0 18px 16px',display:'flex',gap:10,fontSize:11.5,color:'var(--ink-dim)',fontFamily:'var(--font-mono)',flexWrap:'wrap'}}>
            <span>Valor em estoque: R$ {product.valorFinanceiro.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
            {product.semMovimentoRecente && <span style={{color:'var(--warn)'}}>· sem saída recente</span>}
          </div>
        )}
      </div>

      {product.foraDoCacheLocal && (
        <div className="divergence-alert">
          <Ic>ℹ</Ic>
          {hasSaldoLocal ? (
            <span>Este código não está no cache local de 300 SKUs do protótipo, mas o saldo do sistema veio da própria planilha importada (coluna "Sistema") — a comparação funciona normalmente. Só dados complementares (unidade, família, valor em estoque) não estão disponíveis aqui.</span>
          ) : (
            <span>Este código não está no cache local de 300 SKUs do protótipo e a planilha não trouxe o saldo do sistema para este item. O saldo não está disponível aqui para comparação automática; a contagem será registrada para revisão manual do líder. Em produção, com o banco sincronizado, o saldo real apareceria normalmente.</span>
          )}
        </div>
      )}

      {needsAddressInput && step==='enderecoManual' && (
        <div>
          <div className="divergence-alert"><Ic>📍</Ic><span>Este item ainda não tem endereço cadastrado no sistema. Escaneie a etiqueta da prateleira ou informe onde você encontrou — o endereço é obrigatório para contar, e essa informação será enviada para validação do líder.</span></div>
          {scanning ? (
            <CameraScanner onDetected={handleEnderecoManualScanDetected} onCancel={()=>setScanning(false)} />
          ) : (
            <button className="btn btn-primary" style={{marginBottom:14}} onClick={()=>setScanning(true)}><Ic>📷</Ic> Escanear código do endereço</button>
          )}
          <div className="field">
            <label>Endereço onde o item foi encontrado (formato NNN-L-N)</label>
            <input type="text" value={enderecoInformado} onChange={e=>setEnderecoInformado(formatEnderecoInput(e.target.value))} placeholder="Ex: 035-A-1" maxLength={7} />
          </div>
          <button className="btn btn-primary" disabled={!ENDERECO_REGEX.test(enderecoInformado)} onClick={confirmEnderecoManual}>Confirmar e continuar</button>
        </div>
      )}

      {hasAddress && step==='scan' && (
        <div>
          <div className="address-chip">{product.endereco}</div>
          {scanning ? (
            <CameraScanner onDetected={handleAddressScanDetected} onCancel={()=>setScanning(false)} />
          ) : (
            <div>
              <div className="scan-box">
                <div className="scan-frame"><div className="scan-corner-b1"></div><div className="scan-corner-b2"></div><div className="scan-laser"></div></div>
              </div>
              <p className="scanner-hint">Toque em "Escanear" e aponte a câmera para o QR Code do endereço</p>
              <button className="btn btn-primary" style={{marginBottom:10}} onClick={()=>setScanning(true)}><Ic>📷</Ic> Escanear com a câmera</button>
              <div className="scan-toggle-row">
                <button className="btn btn-outline" style={{fontSize:11.5}} onClick={()=>{simulateScan(false); setStep('scanResult');}}>Sem câmera: simular leitura errada</button>
                <button className="btn btn-outline" style={{fontSize:11.5}} onClick={()=>{simulateScan(true); setStep('scanResult');}}>Sem câmera: simular leitura certa</button>

      {hasAddress && step==='scanResult' && (

          <div>
            <div className="result-banner warn">
              <div className="rb-title"><Ic>⚠</Ic> Atenção</div>

      {step==='count' && (

      {step==='result' && (

              &nbsp;{classification.label}{numeroContagem>1 && <span style={{fontWeight:400,fontSize:13}}> · {numeroContagem}ª contagem</span>}
            </div>
            <div className="rb-sub">{STATUS_INFO[statusAprovacao].text}</div>
            <div className="result-grid">
              <div className="rg"><div className="k">Saldo Sistema</div><div className="v">{hasSaldoLocal ? product.saldoSistema : '—'}</div></div>

              <div className="rg"><div className="k">Diferença</div><div className="v">{hasSaldoLocal ? (diffAbs>0?'+':'')+diffAbs : '—'}</div></div>
              <div className="rg"><div className="k">Divergência</div><div className="v">{hasSaldoLocal ? diffPct.toFixed(1)+'%' : '—'}</div></div>
            </div>
          </div>
          {!isOperador && (diffAbs!==0 || !hasSaldoLocal) && (
            <div className="field">

              </select>
            </div>
          )}
          <button className="btn btn-primary" disabled={!isOperador && diffAbs!==0 && hasSaldoLocal && !motivo} onClick={finalize}>Registrar e continuar</button>
        </div>
      )}
    </div>
  );
}

/* ---------------- MÓDULO 2: CONTAGEM ALEATÓRIA ---------------- */

function RandomCountFlow({inv, user, onFinish, onAddressProposed, setInventories, counts}){
  const allItems = useMemo(()=> {
    // Critério aplicado: prioriza itens de maior valor financeiro (curva A) e
    // itens sem saída recente — os dois critérios "futuros" já citados no
    // briefing, aplicados aqui sobre os dados reais da SB2. Seleção
    // determinística (sem Math.random) pra fila ser estável entre
    // re-entradas no mesmo inventário — necessário pra retomar de onde parou
    // em vez de sortear itens novos a cada vez.
    const scored = [...PRODUCTS].map(p=>({
      p, score: (p.semMovimentoRecente ? 50000 : 0) + p.valorFinanceiro
    })).sort((a,b)=>b.score-a.score);
    const qtd = (inv && inv.qtdItens) || 5;
    const pool = scored.slice(0, Math.max(qtd, 25)).map(s=>s.p);
    // Sequência de endereço: itens com endereço cadastrado vêm primeiro,
    // ordenados por corredor → rua → endereço (deslocamento físico menor);
    // itens sem endereço cadastrado ainda ficam depois, na ordem por valor.
    const comEndereco = pool.filter(p=>p.enderecoCadastrado).sort((a,b)=>
      (a.corredor||'').localeCompare(b.corredor||'') ||
      (a.rua||'').localeCompare(b.rua||'') ||
      (a.endereco||'').localeCompare(b.endereco||'')
    );
    const semEndereco = pool.filter(p=>!p.enderecoCadastrado);
    return [...comEndereco, ...semEndereco].slice(0, qtd);
  }, [inv]);

  // Ao voltar para este inventário no meio da fila, retoma a partir de
  // "contados" — mesmo padrão usado em ImportedListCountFlow — em vez de
  // recomeçar do item 1 a cada re-entrada.
  const jaContados = inv ? (inv.contados || 0) : 0;
  const pendentes = useMemo(()=> allItems.slice(jaContados), [allItems, jaContados]);
  const q = useCountQueue(pendentes);

  if(q.done){
    return (
      <div className="empty-state">
        <div className="ic"><Ic>🎉</Ic></div>
        Fila de contagem concluída.
        <div style={{marginTop:16}}><button className="btn btn-primary" onClick={()=>onFinish(null)}>Voltar aos inventários</button></div>
      </div>
    );
  }

  return (
    <div>
      <div className="role-note">Item {jaContados+q.idx+1} de {allItems.length} · Sequência por endereço (itens sem endereço cadastrado entram por último)</div>
      <CountStep
        product={q.current}
        user={user}
        inv={inv}
        counts={counts}
        onAddressProposed={onAddressProposed}
        onComplete={(c)=>{
          if(inv){ setInventories(prev=>prev.map(i=>i.id===inv.id?{...i, contados:i.contados+1}:i)); incrementContadosSupabase(inv.id); }
          onFinish(c);
          q.next();
        }}
      />
    </div>
  );
}

/* ---------------- MÓDULO 3: CONTAGEM MANUAL ---------------- */

function ManualCountFlow({user, onFinish, onAddressProposed, counts}){
  const [query, setQuery] = useState('');
  const [selected, setSelected] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [remoteResults, setRemoteResults] = useState([]);
  const [remoteLoading, setRemoteLoading] = useState(false);

  const localResults = useMemo(()=>{
    if(!query) return [];
    const q = query.toLowerCase();
    return PRODUCTS.filter(p=>p.codigo.toLowerCase().includes(q) || p.descricao.toLowerCase().includes(q)).slice(0,8);
  }, [query]);

  // Item não encontrado no cache local de 300 SKUs — busca no catálogo real
  // (85 mil+ produtos via Supabase, ver CLAUDE.md "Catálogo real de
  // produtos"). Só dispara quando a busca local já não deu resultado, pra
  // não gastar requisição à toa enquanto o item mais comum já aparece local.
  useEffect(()=>{
    if(!query || localResults.length>0){ setRemoteResults([]); setRemoteLoading(false); return; }
    let cancelado = false;
    setRemoteLoading(true);
    const timer = setTimeout(async ()=>{
      const found = await searchSupabaseCatalog(query);
      if(!cancelado){ setRemoteResults(found); setRemoteLoading(false); }
    }, 350);
    return ()=>{ cancelado = true; clearTimeout(timer); };
  }, [query, localResults.length]);

  const results = localResults.length>0 ? localResults : remoteResults;

  if(selected){
    return <CountStep product={selected} user={user} counts={counts} onAddressProposed={onAddressProposed} onComplete={(c)=>onFinish(c)} expectAddressCheck={true} />;
  }

  function handleScanDetected(text){
    setScanning(false);
    setQuery(text.trim());
  }

  return (
    <div>
      {scanning ? (
        <CameraScanner onDetected={handleScanDetected} onCancel={()=>setScanning(false)} />
      ) : (
        <button className="btn btn-primary" style={{marginBottom:14}} onClick={()=>setScanning(true)}><Ic>📷</Ic> Escanear código de barras / QR do item</button>
      )}
      <div className="field">
        <label>Ou buscar por código, descrição ou código de barras</label>
        <input type="text" value={query} onChange={e=>setQuery(e.target.value)} placeholder="Ex: 000.35310 ou parafuso" />
      </div>
      {remoteLoading && <div className="empty-state" style={{padding:20}}>Buscando no catálogo…</div>}
      {!remoteLoading && results.length===0 && query && <div className="empty-state" style={{padding:20}}>Nenhum item encontrado.</div>}
      {results.map(p=>(
        <div key={p.codigo} className="list-row" onClick={()=>setSelected(p)}>
          <div>
            <div className="lr-title">{p.descricao}</div>
            <div className="lr-sub">{p.codigo} · {p.enderecoCadastrado ? p.endereco : 'sem endereço cadastrado'}{p.foraDoCacheLocal ? ' · fora do cache local' : ''}</div>
          </div>
          <span className="chevron"><Ic>›</Ic></span>
        </div>
      ))}
    </div>
  );
}

/* ---------------- MÓDULO 4: CONTAGEM POR ROTA ---------------- */

function RouteCountFlow({inv, user, onFinish, onAddressProposed, setInventories, counts}){
  const grouped = useMemo(()=>{
    const byCorredor = {};
    PRODUCTS.forEach(p=>{
      byCorredor[p.corredor] = byCorredor[p.corredor] || {};
      byCorredor[p.corredor][p.rua] = byCorredor[p.corredor][p.rua] || [];
      byCorredor[p.corredor][p.rua].push(p);
    });
    return byCorredor;
  }, []);

  const [active, setActive] = useState(null);

  if(!ANY_ADDRESS_REGISTERED){
    return (
      <div className="empty-state">
        <div className="ic"><Ic>🗺</Ic></div>
        Nenhum endereço cadastrado ainda neste almoxarifado.<br/>
        A contagem por rota é liberada assim que o líder validar os primeiros endereços informados pelos operadores (veja "Endereços Pendentes" em Configurações).
      </div>
    );
  }

  if(active){
    return <CountStep product={active} user={user} inv={inv} counts={counts} onAddressProposed={onAddressProposed} onComplete={(c)=>{
      if(inv){ setInventories(prev=>prev.map(i=>i.id===inv.id?{...i, contados:i.contados+1}:i)); incrementContadosSupabase(inv.id); }
      onFinish(c);
      setActive(null);
    }} />;
  }

  return (
    <div>
      <div className="role-note">Rota otimizada por menor deslocamento — Almox 01</div>
      {Object.keys(grouped).sort().map(cor=>(
        <div key={cor} style={{marginBottom:18}}>
          <div className="section-title">Corredor {cor}</div>
          {Object.keys(grouped[cor]).sort().map(rua=>(
            <div key={rua} style={{marginBottom:10}}>
              <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--ink-dim)',marginBottom:6,textTransform:'uppercase'}}>Rua {rua}</div>
              {grouped[cor][rua].map(p=>(
                <div key={p.codigo} className="list-row" onClick={()=>setActive(p)}>
                  <div>
                    <div className="lr-title">{p.descricao}</div>
                    <div className="lr-sub">{p.endereco}</div>
                  </div>
                  <span className="chevron"><Ic>›</Ic></span>
                </div>
              ))}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

/* ---------------- MÓDULO 1B: CONTAGEM POR LISTA IMPORTADA (Excel) ---------------- */

function ImportedListCountFlow({inv, user, onFinish, onAddressProposed, setInventories, counts}){
  const allItems = useMemo(()=>{
    const lista = (inv && inv.itensImportados) || [];
    return lista.map(item=>{
      const local = PRODUCTS.find(p=>p.codigo===item.codigo);
      if(local){
        return {
          ...local,
          // planilha trouxe um endereço e o cadastro local ainda não tem — usa o da planilha
          ...(item.endereco && !local.enderecoCadastrado ? {endereco:item.endereco, enderecoCadastrado:true} : {}),
          // saldo da própria planilha é mais recente que o cache estático — prevalece quando informado
          ...(item.saldoSistema!=null ? {saldoSistema:item.saldoSistema} : {}),
        };
      }
      // código não está no cache local de 300 SKUs — monta o item a partir do
      // que a própria planilha trouxe (fallback documentado no CLAUDE.md). A
      // coluna "Sistema" da planilha (item.saldoSistema) é o que permite
      // comparar o saldo mesmo assim — sem ela, fica null e a contagem vai
      // sem comparação automática para revisão do líder.
      return {
        codigo: item.codigo,
        descricao: item.descricao || item.codigo,
        unidade: null,
        familia: '—',
        endereco: item.endereco || null,
        enderecoCadastrado: !!item.endereco,
        almoxarifado: item.almoxarifado || (inv ? inv.almoxarifado : '—'),
        corredor: null,
        rua: null,
        saldoSistema: item.saldoSistema,
        custoUnit: 0,
        valorFinanceiro: 0,
        semMovimentoRecente: false,
        ultimaSaida: null,
        foraDoCacheLocal: true,
      };
    });
  }, [inv]);

  // A lista é sempre percorrida na ordem original; ao voltar para este
  // inventário depois de contar alguns itens, retoma exatamente de onde
  // parou usando "contados" — sem isso, cada vez que a tela remonta a fila
  // reiniciaria do item 1 (mesmo problema que a Contagem Aleatória já tem,
  // mas aqui seria pior: o operador nunca chegaria ao 2º item da planilha).
  const jaContados = inv ? (inv.contados || 0) : 0;
  const pendentes = useMemo(()=> allItems.slice(jaContados), [allItems, jaContados]);
  const q = useCountQueue(pendentes);

  if(allItems.length===0){
    return <div className="empty-state"><div className="ic"><Ic>📄</Ic></div>Esta lista importada não tem itens válidos.</div>;
  }

  if(q.done){
    return (
      <div className="empty-state">
        <div className="ic"><Ic>🎉</Ic></div>
        Lista importada concluída — todos os {allItems.length} itens foram contados.
        <div style={{marginTop:16}}><button className="btn btn-primary" onClick={()=>onFinish(null)}>Voltar aos inventários</button></div>
      </div>
    );
  }

  return (
    <div>
      <div className="role-note">Item {jaContados+q.idx+1} de {allItems.length} · Lista importada{inv?' de '+inv.nome:''} — ordem original da planilha</div>
      <CountStep
        product={q.current}
        user={user}
        inv={inv}
        counts={counts}
        onAddressProposed={onAddressProposed}
        onComplete={(c)=>{
          if(inv){ setInventories(prev=>prev.map(i=>i.id===inv.id?{...i, contados:i.contados+1}:i)); incrementContadosSupabase(inv.id); }
          onFinish(c);
          q.next();
        }}
      />
    </div>
  );
}

/* ---------------- MÓDULO 7: RECONTAGEM E ANÁLISE DE DIVERGÊNCIAS ---------------- */

function RecountFlow({original, user, onFinish, onAddressProposed}){
  // Item pode não estar no cache local de 300 SKUs (ex: contado via busca no
  // catálogo Supabase ou lista importada) — nesse caso monta um produto
  // sintético a partir do que a própria contagem anterior já registrou, mesmo
  // padrão já usado no fallback do ImportedListCountFlow. Sem isso a
  // recontagem quebrava com "item não encontrado" pra qualquer contagem
  // originada fora do cache local.
  const product = PRODUCTS.find(p=>p.codigo===original.productCode) || {
    codigo: original.productCode,
    descricao: original.descricao,
    unidade: null,
    familia: '—',
    endereco: original.endereco && original.endereco!=='—' ? original.endereco : null,
    enderecoCadastrado: !!(original.endereco && original.endereco!=='—'),
    almoxarifado: '—',
    corredor: null,
    rua: null,
    saldoSistema: original.saldoSistema,
    custoUnit: 0,
    valorFinanceiro: 0,
    semMovimentoRecente: false,
    ultimaSaida: null,
    foraDoCacheLocal: true,
  };
  const sameUser = user.nome === original.usuario;
  return (
    <div>
      <div className="role-note">
        {original.numeroContagem}ª contagem: {original.qtdContada} un. por {original.usuario} em {original.data} {original.hora||''} · agora registrando a {original.numeroContagem+1}ª contagem
      </div>
      {sameUser && (
        <div className="divergence-alert">
          <Ic>⚠</Ic>
          <span>Pelo Módulo 7 do processo, a segunda contagem deve ser feita por outro operador — você está logado como {user.nome}, o mesmo da contagem anterior. Pode continuar, mas o ideal é pedir para outro operador recontar.</span>
        </div>
      )}
      <CountStep
        product={product}
        user={user}
        onAddressProposed={onAddressProposed}
        onComplete={onFinish}
        numeroContagem={original.numeroContagem+1}
        contagemAnteriorId={original.id}
        expectAddressCheck={!!product.enderecoCadastrado}
      />
    </div>
  );
}

function ReportsScreen({counts, inventories, currentUser, sendHistory, onLogSend}){
  const [email, setEmail] = useState('');
  const [assunto, setAssunto] = useState('Inventário 360 — Relatório de Inventário Cíclico');
  const [mensagem, setMensagem] = useState('Segue relatório de contagens e divergências do inventário cíclico para análise e solicitação de ajuste de estoque.');
  const [feedback, setFeedback] = useState('');

  const divergentesCount = counts.filter(c=>c.diferenca!==0).length;

  function downloadWorkbook(){
    if(!window.XLSX){
      setFeedback('⚠ A biblioteca de exportação não carregou (verifique a conexão com a internet).');
      return false;
    }
    const wb = generateReportWorkbook(counts, inventories);
    const filename = `Inventario360_Relatorio_${new Date().toISOString().slice(0,10)}.xlsx`;
    window.XLSX.writeFile(wb, filename);
    return filename;
  }

  function handleDownloadClick(){
    const filename = downloadWorkbook();
    if(filename) setFeedback('Relatório baixado: ' + filename);
  }

  function handleSendEmail(e){
    e.preventDefault();
    if(!email.trim()){ setFeedback('Informe o e-mail do destinatário.'); return; }
    const filename = downloadWorkbook();
    if(!filename) return;
    const body = encodeURIComponent(mensagem + '\n\n(O arquivo ' + filename + ' foi baixado agora — anexe-o a este e-mail antes de enviar.)');
    const subject = encodeURIComponent(assunto);
    window.location.href = `mailto:${email.trim()}?subject=${subject}&body=${body}`;
    onLogSend({
      id:'ENV-'+Math.random().toString(36).slice(2,7).toUpperCase(),
      destinatario:email.trim(), assunto, arquivo:filename,
      enviadoPor:currentUser.nome, data:new Date().toLocaleString('pt-BR'),
    });
    setFeedback('E-mail preparado no seu programa de e-mail padrão — anexe o arquivo baixado antes de enviar.');
  }

  return (
    <div>
      <div className="role-note">{counts.length} contagens registradas · {divergentesCount} com divergência</div>
      {feedback && <div className="login-success" style={{marginBottom:16}}>{feedback}</div>}

      <div className="panel">
        <div className="section-title" style={{marginTop:0}}>Baixar Relatório</div>
        <div style={{fontSize:13,color:'var(--ink-dim)',marginBottom:14,lineHeight:1.6}}>
          Gera uma planilha Excel (.xlsx) com 4 abas: <strong>Resumo</strong> (indicadores gerais),
          <strong> Contagens</strong> (todas as contagens realizadas, com histórico completo de
          rodadas e o endereço onde cada item foi fisicamente contado), <strong>Contar</strong>{' '}
          (mesmo formato da planilha de importação — Produto, Descrição, End, Sistema, Fisico —
          já com a quantidade contada e o endereço contado preenchidos) e
          <strong> Solicitação de Ajuste</strong> (só os itens com divergência — pronta para
          enviar à equipe responsável por corrigir o saldo no Protheus).
        </div>
        <button className="btn btn-primary" onClick={handleDownloadClick} disabled={counts.length===0}>
          <Ic>⬇</Ic> Baixar Excel (.xlsx)
        </button>
        {counts.length===0 && <div style={{fontSize:12,color:'var(--ink-dim)',marginTop:8}}>Nenhuma contagem registrada ainda.</div>}
      </div>

      <div className="panel">
        <div className="section-title" style={{marginTop:0}}>Enviar por E-mail</div>
        <div className="divergence-alert" style={{marginBottom:14}}>
          <Ic>ℹ</Ic>
          <span>Por limitação de segurança dos navegadores, não é possível anexar o arquivo
          automaticamente a um e-mail. Ao enviar, o Excel é baixado e o seu programa de
          e-mail abre com o texto pronto — só falta anexar o arquivo baixado antes de mandar.</span>
        </div>
        <form onSubmit={handleSendEmail}>
          <div className="field">
            <label>Destinatário</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="controladoria@empresa.com" />
          </div>
          <div className="field">
            <label>Assunto</label>
            <input type="text" value={assunto} onChange={e=>setAssunto(e.target.value)} />
          </div>
          <div className="field">
            <label>Mensagem</label>
            <textarea value={mensagem} onChange={e=>setMensagem(e.target.value)} />
          </div>
          <button className="btn btn-primary" type="submit" disabled={counts.length===0}>
            <Ic>✉</Ic> Baixar e Preparar E-mail
          </button>
        </form>
      </div>

      {sendHistory.length>0 && (
        <div className="panel">
          <div className="section-title" style={{marginTop:0}}>Histórico de Envios</div>
          <table className="rank-table">
            <thead><tr><th>Destinatário</th><th>Assunto</th><th>Enviado por</th><th>Data</th></tr></thead>
            <tbody>
              {sendHistory.map(h=>(
                <tr key={h.id}><td>{h.destinatario}</td><td>{h.assunto}</td><td>{h.enviadoPor}</td><td style={{fontFamily:'var(--font-mono)',fontSize:11.5}}>{h.data}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function Dashboard({counts, inventories}){
  const planejados = inventories.reduce((s,i)=>s+i.qtdItens,0);
  const contados = counts.length;
  const pendentes = Math.max(planejados-contados,0);
  const divergentes = counts.filter(c=>c.diferenca!==0);
  const acuracidade = contados>0 ? (((contados-divergentes.length)/contados)*100).toFixed(1) : '100.0';
  const valorDivergente = counts.reduce((s,c)=>s+Number(c.valorDivergente||0),0);

  const porOperador = {};
  counts.forEach(c=>{ porOperador[c.usuario] = (porOperador[c.usuario]||0)+1; });
  const maxOp = Math.max(1, ...Object.values(porOperador));

  const porMotivo = {};
  divergentes.forEach(c=>{ if(c.motivo) porMotivo[c.motivo] = (porMotivo[c.motivo]||0)+1; });
  const maxMotivo = Math.max(1, ...Object.values(porMotivo));

  const topDivergentes = [...counts].sort((a,b)=>Math.abs(b.diferenca)-Math.abs(a.diferenca)).slice(0,10);

  return (
    <div>
      <div className="section-title">Operação</div>
      <div className="kpi-grid">
        <div className="kpi"><div className="kv">{planejados}</div><div className="kl">Itens Planejados</div></div>
        <div className="kpi"><div className="kv">{contados}</div><div className="kl">Itens Contados</div></div>
        <div className="kpi"><div className="kv">{pendentes}</div><div className="kl">Itens Pendentes</div></div>
        <div className="kpi"><div className="kv">{counts.length ? '4.2min' : '—'}</div><div className="kl">Tempo Médio</div></div>
      </div>

      <div className="section-title">Qualidade</div>
      <div className="kpi-grid">
        <div className="kpi"><div className="kv" style={{color:'var(--ok)'}}>{acuracidade}%</div><div className="kl">Acuracidade do Estoque</div></div>
        <div className="kpi"><div className="kv" style={{color:'var(--warn)'}}>{divergentes.length}</div><div className="kl">Divergências</div></div>
        <div className="kpi"><div className="kv" style={{color:'var(--danger)'}}>R$ {valorDivergente.toFixed(0)}</div><div className="kl">Valor Divergente</div></div>
        <div className="kpi"><div className="kv">{inventories.length}</div><div className="kl">Inventários Ativos</div></div>
      </div>

      {Object.keys(porOperador).length>0 && (
        <div>
          <div className="section-title">Produtividade por Operador</div>
          <div className="panel">
            {Object.entries(porOperador).map(([nome,n])=>(
              <div key={nome} className="bar-row">
                <div className="bl">{nome}</div>
                <div className="bar-track"><div className="bar-fill" style={{width:(n/maxOp*100)+'%'}}><span>{n}</span></div></div>
              </div>
            ))}
          </div>
        </div>
      )}

      {Object.keys(porMotivo).length>0 && (
        <div>
          <div className="section-title">Principais Causas de Erro</div>
          <div className="panel">
            {Object.entries(porMotivo).map(([m,n])=>(
              <div key={m} className="bar-row">
                <div className="bl" style={{width:160}}>{m}</div>
                <div className="bar-track"><div className="bar-fill" style={{width:(n/maxMotivo*100)+'%', background:'var(--danger)'}}><span style={{color:'#fff'}}>{n}</span></div></div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="section-title">Top Itens com Maior Divergência</div>
      <div className="panel">
        {topDivergentes.length===0 ? <div style={{color:'var(--ink-dim)',fontSize:13}}>Sem contagens registradas.</div> : (
          <table className="rank-table">
            <thead><tr><th>Item</th><th>Endereço</th><th>Diferença</th></tr></thead>
            <tbody>
              {topDivergentes.map(c=>(
                <tr key={c.id}><td>{c.descricao}</td><td>{c.endereco}</td><td className="num" style={{color:c.diferenca===0?'var(--ok)':'var(--danger)'}}>{c.diferenca>0?'+':''}{c.diferenca}</td></tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

/* ---------------- CONTROLE DE USUÁRIOS (admin) ---------------- */

const PERFIL_OPTIONS = [
  {v:'operador', label:'Operador'},
  {v:'lider', label:'Líder de Estoque'},
  {v:'admin', label:'Administrador'},
];

function emptyUserForm(){
  return {nome:'', usuario:'', email:'', senha:'', perfil:'operador'};
}

// Verifica se o login já está em uso por OUTRO usuário (case-insensitive,
// mesma normalização usada no login real). Na edição, exclui o próprio
// usuário da checagem — ele pode manter o login que já tinha.
function isLoginDuplicado(users, usuario, excludeId){
  const norm = usuario.trim().toLowerCase();
  return users.some(u => u.id!==excludeId && u.usuario.trim().toLowerCase()===norm);
}

const USERS_PAGE_SIZE = 8;

function UserManagementPanel({users, currentUser, goto, onToggleUserStatus, onDeleteUser, onAdminPasswordAction}){
  const [search, setSearch] = useState('');
  const [page, setPage] = useState(1);
  const [pwAction, setPwAction] = useState(null); // userId currently doing a password action
  const [pwValue, setPwValue] = useState('');
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);

  const filtered = useMemo(()=>{
    const q = search.trim().toLowerCase();
    if(!q) return users;
    return users.filter(u=>
      u.nome.toLowerCase().includes(q) ||
      u.usuario.toLowerCase().includes(q) ||
      (u.email||'').toLowerCase().includes(q)
    );
  }, [users, search]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / USERS_PAGE_SIZE));
  const currentPage = Math.min(page, totalPages);
  const paged = filtered.slice((currentPage-1)*USERS_PAGE_SIZE, currentPage*USERS_PAGE_SIZE);

  function handleSearchChange(v){
    setSearch(v);
    setPage(1);
  }

  return (
    <div className="panel">
      <div className="section-title" style={{marginTop:0}}>Usuários</div>

      <div className="field">
        <label>Buscar usuário</label>
        <input type="text" value={search} onChange={e=>handleSearchChange(e.target.value)} placeholder="Nome completo, login ou e-mail" />
      </div>

      <button className="btn btn-secondary" style={{marginBottom:14}} onClick={()=>goto('userForm', {mode:'new'})}>+ Novo Usuário</button>

      {filtered.length===0 ? (
        <div style={{fontSize:13,color:'var(--ink-dim)',padding:'12px 0'}}>Nenhum usuário encontrado{search?` para "${search}"`:''}.</div>
      ) : (
        <React.Fragment>
          {paged.map(u=>(
            <div key={u.id} className="list-row" style={{flexWrap:'wrap',alignItems:'flex-start'}}>
              <div>
                <div className="lr-title">{u.nome}{u.id===currentUser.id && <span style={{color:'var(--ink-dim)',fontWeight:400}}> (você)</span>}</div>
                <div className="lr-sub">{u.usuario} · {PERFIL_OPTIONS.find(p=>p.v===u.perfil)?.label}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
                <StatusTag status={u.status==='ativo'?'ok':u.status==='bloqueado'?'danger':'warn'} text={u.status==='ativo'?'Ativo':u.status==='bloqueado'?'Bloqueado':'Aguardando nova senha'} />
                <div className="btn-row" style={{width:'auto'}}>
                  <button className="btn btn-outline" style={{padding:'7px 10px',fontSize:10.5}} onClick={()=>goto('userForm', {mode:u.id, initialData:u})}>Editar</button>
                  <button className="btn btn-outline" style={{padding:'7px 10px',fontSize:10.5}} onClick={()=>onToggleUserStatus(u.id)}>{u.status==='bloqueado'?'Desbloquear':'Bloquear'}</button>
                  <button className="btn btn-outline" style={{padding:'7px 10px',fontSize:10.5}} onClick={()=>{setPwAction(pwAction===u.id?null:u.id); setPwValue('');}}>Redefinir senha</button>
                  {u.id!==currentUser.id && (
                    <button className="btn btn-danger" style={{padding:'7px 10px',fontSize:10.5,width:'auto'}} onClick={()=>setConfirmDeleteId(u.id)}>Excluir</button>
                  )}
                </div>
                {pwAction===u.id && (
                  <div style={{background:'var(--panel-raised)',border:'1px solid var(--line)',borderRadius:8,padding:12,width:260}}>
                    <div className="btn-row" style={{marginBottom:8}}>
                      <button className="btn btn-secondary" style={{padding:'8px',fontSize:10}} onClick={()=>{onAdminPasswordAction(u.id,'temp'); setPwAction(null);}}>Gerar temporária</button>
                      <button className="btn btn-secondary" style={{padding:'8px',fontSize:10}} onClick={()=>{onAdminPasswordAction(u.id,'liberar'); setPwAction(null);}}>Liberar p/ criar</button>
                    </div>
                    <input type="text" placeholder="Definir senha manual" value={pwValue} onChange={e=>setPwValue(e.target.value)} style={{width:'100%',padding:8,marginBottom:8,background:'var(--panel)',border:'1px solid var(--line)',borderRadius:6,color:'var(--ink)',fontSize:12}} />
                    <button className="btn btn-primary" style={{padding:'8px',fontSize:10}} disabled={pwValue.length<6} onClick={()=>{onAdminPasswordAction(u.id,'definir',pwValue); setPwAction(null);}}>Confirmar senha definida</button>
                  </div>
                )}
                {confirmDeleteId===u.id && (
                  <div style={{background:'var(--danger-bg)',border:'1px solid var(--danger)',borderRadius:8,padding:12,width:260}}>
                    <div style={{fontSize:12,color:'var(--danger)',marginBottom:10}}>Excluir "{u.nome}"? Essa ação não pode ser desfeita.</div>
                    <div className="btn-row">
                      <button className="btn btn-secondary" style={{padding:'8px',fontSize:10}} onClick={()=>setConfirmDeleteId(null)}>Cancelar</button>
                      <button className="btn btn-danger" style={{padding:'8px',fontSize:10}} onClick={()=>{onDeleteUser(u.id); setConfirmDeleteId(null);}}>Confirmar exclusão</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          ))}
          {totalPages>1 && (
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:10,paddingTop:14,borderTop:'1px solid var(--line)'}}>
              <button className="btn btn-outline" style={{width:'auto',padding:'8px 14px'}} disabled={currentPage<=1} onClick={()=>setPage(p=>p-1)}>‹ Anterior</button>
              <span style={{fontFamily:'var(--font-mono)',fontSize:11.5,color:'var(--ink-dim)'}}>Página {currentPage} de {totalPages} · {filtered.length} usuário{filtered.length===1?'':'s'}</span>
              <button className="btn btn-outline" style={{width:'auto',padding:'8px 14px'}} disabled={currentPage>=totalPages} onClick={()=>setPage(p=>p+1)}>Próxima ›</button>
            </div>
          )}
        </React.Fragment>
      )}
    </div>
  );
}

function UserForm({mode, initialData, users, onCreateUser, onUpdateUser, onCancel}){
  const isEdit = mode!=='new';
  const [form, setForm] = useState(isEdit && initialData
    ? {nome:initialData.nome, usuario:initialData.usuario, email:initialData.email||'', senha:'', perfil:initialData.perfil}
    : emptyUserForm());
  const [feedback, setFeedback] = useState('');

  function submitForm(e){
    e.preventDefault();
    if(!form.nome.trim() || !form.usuario.trim()){ setFeedback('Nome e usuário de acesso são obrigatórios.'); return; }
    if(isLoginDuplicado(users, form.usuario, isEdit ? mode : null)){
      setFeedback('Este login já está sendo utilizado por outro usuário.');
      return;
    }
    if(!isEdit){
      if(!form.senha || form.senha.length<6){ setFeedback('Defina uma senha inicial com pelo menos 6 caracteres.'); return; }
      onCreateUser({nome:form.nome.trim(), usuario:form.usuario.trim(), email:form.email.trim(), senha:form.senha, perfil:form.perfil});
    } else {
      onUpdateUser(mode, {nome:form.nome.trim(), usuario:form.usuario.trim(), email:form.email.trim(), perfil:form.perfil});
    }
  }

  return (
    <div className="panel">
      <div className="section-title" style={{marginTop:0}}>{isEdit ? 'Editar Usuário' : 'Novo Usuário'}</div>
      <form onSubmit={submitForm}>
        {feedback && <div className="login-error" style={{marginBottom:12}}>{feedback}</div>}
        <div className="field">
          <label>Nome completo</label>
          <input type="text" value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))} autoFocus />
        </div>
        <div className="field">
          <label>Usuário de acesso (login)</label>
          <input type="text" value={form.usuario} onChange={e=>setForm(f=>({...f,usuario:e.target.value}))} placeholder="nome.sobrenome" autoCapitalize="none" />
        </div>
        <div className="field">
          <label>E-mail (opcional)</label>
          <input type="text" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} />
        </div>
        {!isEdit && (
          <div className="field">
            <label>Senha inicial</label>
            <input type="text" value={form.senha} onChange={e=>setForm(f=>({...f,senha:e.target.value}))} placeholder="mínimo 6 caracteres" />
          </div>
        )}
        <div className="field">
          <label>Perfil de acesso</label>
          <select value={form.perfil} onChange={e=>setForm(f=>({...f,perfil:e.target.value}))}>
            {PERFIL_OPTIONS.map(p=><option key={p.v} value={p.v}>{p.label}</option>)}
          </select>
        </div>
        <div className="btn-row">
          <button type="button" className="btn btn-secondary" onClick={onCancel}>Cancelar</button>
          <button type="submit" className="btn btn-primary">{isEdit ? 'Salvar Alterações' : 'Criar Usuário'}</button>
        </div>
      </form>
    </div>
  );
}

function PasswordRequestRow({req, onResolve}){
  const [action, setAction] = useState(null);
  const [pwValue, setPwValue] = useState('');

  if(req.status!=='pendente'){
    return (
      <div className="list-row">
        <div><div className="lr-title">{req.usuarioNome}</div><div className="lr-sub">solicitado em {req.data}</div></div>
        <StatusTag status="ok" text="Resolvido" />
      </div>
    );
  }

  return (
    <div className="list-row" style={{flexWrap:'wrap',alignItems:'flex-start'}}>
      <div>
        <div className="lr-title">{req.usuarioNome}</div>
        <div className="lr-sub">solicitado em {req.data}</div>
      </div>
      <div style={{width:'100%',marginTop:10}}>
        <div className="btn-row" style={{marginBottom:8}}>
          <button className="btn btn-secondary" style={{padding:'8px',fontSize:11}} onClick={()=>onResolve(req.id,'temp')}>Gerar senha temporária</button>
          <button className="btn btn-secondary" style={{padding:'8px',fontSize:11}} onClick={()=>onResolve(req.id,'liberar')}>Liberar p/ criar nova senha</button>
        </div>
        <div style={{display:'flex',gap:8}}>
          <input type="text" placeholder="Definir senha manualmente" value={pwValue} onChange={e=>setPwValue(e.target.value)} style={{flex:1,padding:10,background:'var(--panel-raised)',border:'1px solid var(--line)',borderRadius:6,color:'var(--ink)',fontSize:13}} />
          <button className="btn btn-primary" style={{padding:'0 14px',fontSize:11,width:'auto'}} disabled={pwValue.length<6} onClick={()=>onResolve(req.id,'definir',pwValue)}>Definir</button>
        </div>
      </div>
    </div>
  );
}

      </div>

            </div>
            {e.status==='pendente' ? (

                <button className="btn btn-primary" style={{padding:'8px 12px',fontSize:11}} onClick={()=>onResolve(e.id,'confirmado')}>Confirmar</button>
              </div>

  const isAdmin = role==='admin';

  return (
    <div>
      <div className="role-note">Perfil atual: {ROLE_LABELS[role]} · {currentUser.nome}</div>

      {isAdmin ? (
        <UserManagementPanel
          users={users}
          currentUser={currentUser}
          goto={goto}
          onToggleUserStatus={onToggleUserStatus}
          onDeleteUser={onDeleteUser}
          onAdminPasswordAction={onAdminPasswordAction}
        />
      ) : (
        <div className="panel">
          <div className="section-title" style={{marginTop:0}}>Usuários</div>
          <div style={{fontSize:13,color:'var(--ink-dim)'}}>Gerenciamento de usuários é restrito ao perfil Administrador.</div>
        </div>
      )}

      {isAdmin && (
        <div className="panel">
          <div className="section-title" style={{marginTop:0}}>
            Solicitações de Redefinição de Senha
            {pendentesSenha.length>0 && <span className="badge" style={{position:'static',marginLeft:8}}>{pendentesSenha.length}</span>}

          {passwordRequests.length===0 ? (
            <div style={{fontSize:13,color:'var(--ink-dim)'}}>Nenhuma solicitação de "esqueci minha senha" recebida ainda.</div>

          <table className="rank-table">
            <thead><tr><th>Usuário</th><th>Ação</th><th>Administrador</th><th>Data/Hora</th></tr></thead>
            <tbody>
              {passwordHistory.map(h=>(
                <tr key={h.id}><td>{h.usuario}</td><td>{h.acao}</td><td>{h.administrador}</td><td style={{fontFamily:'var(--font-mono)',fontSize:11.5}}>{h.data}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      <div className="panel">
        <div className="section-title" style={{marginTop:0}}>Regras de Divergência</div>
        <div style={{fontSize:13,lineHeight:1.9,color:'var(--ink-dim)'}}>
          <div>≤ 5% → <span style={{color:'var(--ok)'}}>Aprovação automática</span></div>
          <div>5% – 15% → <span style={{color:'var(--warn)'}}>Segunda contagem obrigatória</span></div>
          <div>&gt; 15% → <span style={{color:'var(--danger)'}}>Análise do líder de estoque</span></div>
        </div>
      </div>
      <div className="panel">
        <div className="section-title" style={{marginTop:0}}>Origem dos Dados</div>
        <div style={{fontSize:13,color:'var(--ink-dim)',lineHeight:1.7}}>
          300 itens carregados de uma exportação real da tabela SB2 (Protheus) — amostra de
          10.512 SKUs do Almox 01. Nenhum endereço físico cadastrado ainda; cadastro de endereços
          em construção via contagem (ver "Endereços Pendentes" na tela inicial).
        </div>
      </div>
      <div className="panel">
        <div className="section-title" style={{marginTop:0}}>Integrações Futuras</div>
        <div style={{fontSize:13,color:'var(--ink-dim)'}}>ERP TOTVS · Power BI · Preparado, ainda não conectado.</div>
      </div>
    </div>
  );
}
