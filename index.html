// Incrementa `contados` no Supabase via função de banco (increment_contados,
// ver backend/schema.sql) em vez de ler+somar+gravar no client — evita perder
// incremento se dois aparelhos completarem uma contagem quase ao mesmo tempo.
// Fila de incrementos que falharam, guardada direto no localStorage (fora do
// estado React de propósito — os 3 pontos que chamam
// `incrementContadosSupabase` (RandomCountFlow/RouteCountFlow/
// ImportedListCountFlow) continuam chamando exatamente como antes, sem
// precisar receber um callback novo de App() só pra registrar falha). O
// ciclo de sync de 30s em App() lê essa fila direto daqui pra reenviar —
// ver PENDING_INCREMENTS_KEY.
const PENDING_INCREMENTS_KEY = 'stock360:v1:pendingIncrements';
function getPendingIncrements(){
  try{ return JSON.parse(window.localStorage.getItem(PENDING_INCREMENTS_KEY)) || []; }
  catch(err){ return []; }
}
function addPendingIncrement(invId){
  try{
    const atual = getPendingIncrements();
    if(!atual.includes(invId)) window.localStorage.setItem(PENDING_INCREMENTS_KEY, JSON.stringify([...atual, invId]));
  }catch(err){ /* localStorage indisponível — ignora */ }
}
function removePendingIncrement(invId){
  try{
    window.localStorage.setItem(PENDING_INCREMENTS_KEY, JSON.stringify(getPendingIncrements().filter(id=>id!==invId)));
  }catch(err){ /* localStorage indisponível — ignora */ }
}

async function incrementContadosSupabase(invId){
  if(!supabaseClient) { addPendingIncrement(invId); return {ok:false, erro:'Supabase não configurado.'}; }
  try{
    const { error } = await supabaseClient.rpc('increment_contados', {p_id: invId});
    if(error){
      console.warn('Falha ao sincronizar progresso do inventário no Supabase:', error.message);
      addPendingIncrement(invId);
      return {ok:false, erro:error.message};
    }
    removePendingIncrement(invId);
    return {ok:true};
  }catch(err){
    console.warn('Falha ao sincronizar progresso do inventário no Supabase:', err);
    addPendingIncrement(invId);
    return {ok:false, erro:String(err && err.message || err)};
  }
}

// Merge genérico por `id`, com desempate por um campo de timestamp — a
// mesma lógica que já existia repetida quase igual em cada ciclo de
// sincronização (contagens, endereços propostos, usuários). Usado tanto
// pelo fetch de reconciliação (na carga inicial e sempre que um canal do
// Realtime reconecta, ver assinatura dos canais em App()) quanto pelos
// handlers de evento INSERT/UPDATE do próprio Realtime.
// `removeMissing:true` só faz sentido chamando com a lista REMOTA COMPLETA
// (fetch de reconciliação) — nunca passar isso ao processar um único
// evento do Realtime, ou tudo que não for aquele um registro seria removido
// por engano.
function mergeByIdComTimestamp(prev, incoming, {timestampField, removeMissing=false}={}){
  const byId = new Map(prev.map(item=>[item.id, item]));
  incoming.forEach(inc=>{
    const local = byId.get(inc.id);
    if(!local){
      byId.set(inc.id, inc);
    } else {
      const remoteTs = inc[timestampField] ? new Date(inc[timestampField]).getTime() : 0;
      const localTs = local[timestampField] ? new Date(local[timestampField]).getTime() : 0;
      if(remoteTs >= localTs) byId.set(inc.id, {...local, ...inc});
    }
  });
  if(removeMissing){
    const incomingIds = new Set(incoming.map(i=>i.id));
    return Array.from(byId.values()).filter(item=>incomingIds.has(item.id));
  }
  return Array.from(byId.values());
}

// Busca inventários gravados em QUALQUER aparelho — mesma lógica de
// fetchContagensFromSupabase, usada pra mesclar progresso feito em outros
// aparelhos no mesmo inventário.
// Retorna `null` (não `[]`) quando a busca FALHA (sem client, erro, exceção)
// — distinto de `[]`, que significa "busquei com sucesso e não tem nenhum
// inventário mesmo". Essa distinção importa pra sincronização (`sync()` em
// App()) poder remover localmente um inventário ausente no Supabase com
// segurança: se tratasse falha de rede como "lista vazia", uma queda de
// conexão apagaria todos os inventários locais por engano.
// Extraído do corpo de `fetchInventoriesFromSupabase` (mesmo padrão dos
// outros 3 mappers `*RowToLocal` deste arquivo) — precisa existir como
// função nomeada porque o handler de Realtime de `inventarios` (ver
// assinatura dos canais, perto de `countsRef`) também mapeia uma linha
// isolada vinda de `payload.new`, não só o array inteiro de um fetch.
function inventarioRowToLocal(row){
  return {
    id: row.id,
    nome: row.nome,
    almoxarifado: row.almoxarifado,
    responsavel: row.responsavel,
    data: row.data,
    tipo: row.tipo,
    qtdItens: row.qtd_itens,
    status: row.status,
    contados: row.contados,
    ...(row.itens_importados ? {itensImportados: row.itens_importados} : {}),
    ...(row.grupo ? {grupo: row.grupo} : {}),
  };
}

async function fetchInventoriesFromSupabase(){
  if(!supabaseClient) return null;
  try{
    const { data, error } = await supabaseClient
      .from('inventarios')
      .select('*')
      .order('criado_em', {ascending:false})
      .limit(200);
    if(error || !data) return null;
    return data.map(inventarioRowToLocal);
  }catch(err){
    console.warn('Falha ao buscar inventários do Supabase:', err);
    return null;
  }
}

// ---- Usuários — login via Supabase Auth de verdade ----
// Senha não mora mais aqui (vive só em `auth.users`, gerenciada pela Edge
// Function `usuarios-admin` via Admin API) — `usuarios` agora é só o
// "perfil" de cada conta (nome, login, e-mail, perfil, status, acessos
// extras, último acesso). Criar/editar/bloquear/redefinir senha/excluir só
// funcionam através de `chamarUsuariosAdmin` (Edge Function, service role
// do lado do servidor) — o client nunca mais escreve direto em `usuarios`
// pra essas ações (ver RLS em backend/schema.sql, migração "LOGIN VIA
// SUPABASE AUTH DE VERDADE"). O único write direto que sobra é o próprio
// `ultimo_acesso` após login (coluna liberada por GRANT específico).
function usuarioRowToLocal(row){
  return {
    id: row.id,
    nome: row.nome,
    usuario: row.usuario,
    email: row.email,
    perfil: row.perfil,
    status: row.status,
    acessosExtras: row.acessos_extras || [],
    ultimoAcesso: row.ultimo_acesso || null,
    atualizadoEm: row.atualizado_em,
  };
}

// Chama a Edge Function `usuarios-admin` — ela decodifica o JWT de quem
// está logado (anexado automaticamente por `functions.invoke`) e confirma
// que é admin antes de fazer qualquer coisa privilegiada. `acao` é sempre
// um dos valores tratados lá dentro (criar_usuario/atualizar_usuario/
// definir_senha/alternar_bloqueio/excluir_usuario/auto_definir_senha).
async function chamarUsuariosAdmin(acao, payload){
  if(!supabaseClient) return {ok:false, erro:'Supabase não configurado.'};
  try{
    const { data, error } = await supabaseClient.functions.invoke('usuarios-admin', {
      body: {acao, ...payload},
    });
    if(error){
      // Quando a Edge Function responde com status != 2xx, o client do
      // Supabase joga fora o corpo da resposta e só devolve uma mensagem
      // genérica ("Edge Function returned a non-2xx status code") — a
      // mensagem de verdade (ex: "e-mail já cadastrado") continua disponível
      // no corpo bruto da resposta, em `error.context` (um Response). Sem
      // isso, todo erro da função aparecia com o mesmo texto genérico,
      // sem dizer o que realmente deu errado.
      let erro = error.message;
      if(error.context && typeof error.context.json==='function'){
        try{
          const corpo = await error.context.json();
          if(corpo && corpo.erro) erro = corpo.erro;
        }catch(_e){ /* corpo não era JSON — mantém a mensagem genérica */ }
      }
      return {ok:false, erro};
    }
    return data;
  }catch(err){
    return {ok:false, erro:String(err && err.message || err)};
  }
}

// `patch` usa nomes de campo em camelCase (mesmo formato do objeto local) —

// ---- Atualização diária do saldo em estoque (planilha SB2) ----
// O cliente ainda não tem a sincronização automática com o Protheus (a Edge
// Function sync-saldo-protheus continua só desenhada) — enquanto isso, ele
// mesmo sobe a planilha SB2 pelo painel "Atualizar Saldo em Estoque" em
// Configurações, tipicamente todo dia.

// Mesma regra de reconstrução já usada pro catálogo de produtos (85 mil+
// linhas importadas) e pro cache local de 300 SKUs: o Excel guarda código
// 100% numérico como número, perdendo o zero à esquerda e os pontos. Formatos
// válidos: 8 dígitos → XXX.XXXXX; 9 → XXX.XXXXX.X; 11 → XXX.XXX.XXXXX; 10 →
// sempre um 11-dígitos que perdeu o zero à esquerda (repõe e formata igual).
function reconstructNumericCode(raw){
  let d = String(raw).trim();
  if(!/^[0-9]+$/.test(d)) return d;
  if(d.length===10) d = '0'+d;
  if(d.length===11) return d.slice(0,3)+'.'+d.slice(3,6)+'.'+d.slice(6,11);
  if(d.length===9) return d.slice(0,3)+'.'+d.slice(3,8)+'.'+d.slice(8,9);
  if(d.length===8) return d.slice(0,3)+'.'+d.slice(3,8);
  return d; // tamanho fora dos formatos conhecidos — mantém cru
}

// Lê as linhas já convertidas pelo SheetJS (sheet_to_json, com cellDates:true
// pra "DT.Ult.Saida" vir como Date em vez de número serial) e devolve as
// linhas normalizadas pra gravar em estoque_saldo, mais um resumo pra exibir
// antes de confirmar. Colunas esperadas (export padrão SB2 do Protheus):
// Produto, Almoxarifado, DT.Ult.Saida, Saldo Atual, Sld.Atu. (valor
// financeiro do saldo).
function parseSB2Rows(rawRows){
  let totalLinhas = 0, semCodigo = 0, invalidas = 0;
  const linhas = [];
  rawRows.forEach(row=>{
    totalLinhas++;
    // Colunas com formato contábil (moeda) no Excel — ex: "Sld.Atu." — fazem
    // o SheetJS devolver a CHAVE do cabeçalho com espaço de preenchimento nas
    // pontas (" Sld.Atu. " em vez de "Sld.Atu."), herdado da parte "texto" do
    // format code contábil (`_-@_-`). Sem isso o valor sempre lia undefined e
    // virava 0 silenciosamente. Normaliza tirando espaço de toda chave antes
    // de comparar, robusto a qualquer coluna que receba esse mesmo formato.
    const norm = {};
    Object.keys(row).forEach(k=>{ norm[k.trim()] = row[k]; });

    const codigoRaw = norm['Produto'];
    if(codigoRaw==null || String(codigoRaw).trim()===''){ semCodigo++; return; }
    const codigo = reconstructNumericCode(codigoRaw);
    const almoxarifado = norm['Almoxarifado']!=null ? String(norm['Almoxarifado']).trim() : '';
    const saldo = Number(norm['Saldo Atual']);
    const valorFinanceiro = Number(norm['Sld.Atu.']);
    if(!almoxarifado || Number.isNaN(saldo)){ invalidas++; return; }
    let dataUltimaSaida = null;
    const rawData = norm['DT.Ult.Saida'];
    if(rawData instanceof Date && !Number.isNaN(rawData.getTime())){
      dataUltimaSaida = rawData.toISOString().slice(0,10);
    }
    linhas.push({
      produto_codigo: codigo,
      almoxarifado,
      saldo,
      valor_financeiro: Number.isNaN(valorFinanceiro) ? 0 : valorFinanceiro,
      data_ultima_saida: dataUltimaSaida,
    });
  });
  const armazens = new Set(linhas.map(l=>l.almoxarifado)).size;
  return { linhas, resumo: { totalLinhas, validas: linhas.length, semCodigo, invalidas, armazens } };
}

// "1" → "Armazém 01" (2 dígitos, mesmo padrão de nomenclatura já usado no
// resto do app — ex: "Almox 01" no cache local). Código não-numérico (ex:
// "EX", visto na planilha real do cliente) mantém como veio, sem inventar
// um nome.
function formatArmazemLabel(codigo){
  return /^[0-9]+$/.test(codigo) ? 'Armazém ' + codigo.padStart(2,'0') : 'Armazém ' + codigo;
}

// Substitui TODO o conteúdo de estoque_saldo pelo snapshot da planilha —
// apaga tudo e insere de novo, em lotes (não é upsert incremental). Isso
// evita linha órfã de item que saiu do armazém/zerou de um dia pro outro, e
// é mais simples que casar upsert por (produto_codigo, almoxarifado) entre
// exportações que podem ter formatação de código levemente diferente.
// Retorna {ok, inseridas, erro}. Não é fire-and-forget como as outras escritas
// — quem chama precisa aguardar e mostrar o resultado, já que é uma ação
// explícita do admin, não um efeito colateral de outro fluxo.
async function replaceEstoqueSaldoInSupabase(linhas, onProgress){
  if(!supabaseClient) return {ok:false, erro:'Supabase não configurado.'};
  try{
    const { error: delError } = await supabaseClient.from('estoque_saldo').delete().not('produto_codigo','is',null);
    if(delError) return {ok:false, erro:'Falha ao limpar saldo anterior: '+delError.message};

    const TAMANHO_LOTE = 500;
    let inseridas = 0;
    for(let i=0; i<linhas.length; i+=TAMANHO_LOTE){
      const lote = linhas.slice(i, i+TAMANHO_LOTE);
      const { error: insError } = await supabaseClient.from('estoque_saldo').insert(lote);
      if(insError) return {ok:false, erro:'Falha ao inserir lote (linha '+i+'): '+insError.message, inseridas};
      inseridas += lote.length;
      if(onProgress) onProgress(inseridas, linhas.length);
    }
    return {ok:true, inseridas};
  }catch(err){
    return {ok:false, erro:String(err && err.message || err)};
  }
}

// Normaliza o endereço vindo da planilha "Descrição de Produtos" pro mesmo
// formato usado no resto do app (3 dígitos-corredor, traço, letra, traço, 1
// dígito de posição — ver ENDERECO_REGEX) — corrige as variações mecânicas
// mais comuns encontradas no export real do cliente (corredor com 1-2
// dígitos, posição com 2 dígitos, traço faltando antes da posição, traço
// duplicado) e devolve `null` pros casos sem informação suficiente pra
// interpretar com segurança (ex.: "073-A", sem posição nenhuma) — esses
// ficam sem endereço cadastrado em vez de arriscar um palpite errado.
// **Exceção deliberada**: o padrão "10000-X-0" (corredor sempre "10000",
// posição sempre "0") foge completamente da numeração normal (001-075 no
// resto da planilha), mas o cliente confirmou que é um endereço real —
// mantido como veio, sem tentar encaixar no formato de 3 dígitos.
function normalizeEnderecoCatalogo(raw){
  if(!raw) return null;
  const e = String(raw).trim().toUpperCase();
  if(!e) return null;
  if(/^\d{3}-[A-Z]-\d$/.test(e)) return e;
  if(/^\d{5}-[A-Z]-\d+$/.test(e)) return e;
  let m = e.match(/^(\d{1,2})-([A-Z])-(\d+)$/);
  if(m) return m[1].padStart(3,'0')+'-'+m[2]+'-'+m[3];
  m = e.match(/^(\d{3})-([A-Z])-0(\d)$/);
  if(m) return m[1]+'-'+m[2]+'-'+m[3];
  m = e.match(/^(\d{1,3})-([A-Z])(\d)$/);
  if(m) return m[1].padStart(3,'0')+'-'+m[2]+'-'+m[3];
  m = e.match(/^(\d{3})--([A-Z])-(\d)$/);
  if(m) return m[1]+'-'+m[2]+'-'+m[3];
  return null;
}

// Lê a planilha "Descrição de Produtos" (export SB2 do Protheus com Unidade
// e Localização acrescentadas — mesmo catálogo de sempre, 85 mil+ códigos) —
// via matriz crua (`sheet_to_json(sheet,{header:1})`), não por nome de
// cabeçalho: o arquivo real do cliente veio com o cabeçalho da coluna
// "Descrição" corrompido (mojibake, provavelmente um export de codepage
// errado) — ler por POSIÇÃO (Produto/Descrição/Grupo/Unidade/Localizacao,
// nessa ordem fixa) é imune a esse tipo de problema de encoding. Reaproveita
// `reconstructNumericCode` (mesmo bug já visto no catálogo original e na
// SB2 de saldo: código 100% numérico perde formatação no Excel).
function parseDescricaoProdutosRows(matrixRows){
  const linhas = matrixRows.slice(1); // pula cabeçalho
  // Guarda o endereço original (cru) junto do já normalizado — a planilha
  // real tem 40 mil+ linhas duplicadas (mesmo código repetido, ver
  // CLAUDE.md) e o resumo (corrigidos/ignorados) precisa contar por CÓDIGO
  // ÚNICO, não por linha crua — senão um código repetido 4x infla a
  // contagem em 4x por engano (bug pego no teste antes de subir).
  const porCodigo = new Map();

  linhas.forEach(row=>{
    if(!row || row[0]==null || String(row[0]).trim()==='') return;
    const codigo = reconstructNumericCode(String(row[0]).trim());
    const descricao = row[1]!=null ? String(row[1]).trim() : '';
    const grupo = row[2]!=null && String(row[2]).trim()!=='' ? String(row[2]).trim() : null;
    const unidadeRaw = row[3]!=null ? String(row[3]).trim() : '';
    const unidade = unidadeRaw ? unidadeRaw.toUpperCase() : null;
    const enderecoRaw = row[4]!=null ? String(row[4]).trim() : '';
    const endereco = enderecoRaw ? normalizeEnderecoCatalogo(enderecoRaw) : null;
    porCodigo.set(codigo, {codigo, descricao, grupo, unidade, endereco, enderecoRaw});
  });

  const entradas = Array.from(porCodigo.values());
  const produtos = entradas.map(({codigo, descricao, grupo, unidade, endereco})=>({codigo, descricao, grupo, unidade, endereco}));
  const comEndereco = entradas.filter(e=>e.endereco).length;
  const enderecosDistintos = new Set(entradas.filter(e=>e.endereco).map(e=>e.endereco)).size;
  const comUnidade = entradas.filter(e=>e.unidade).length;
  const enderecosCorrigidos = entradas.filter(e=>e.endereco && e.endereco!==e.enderecoRaw.toUpperCase()).length;
  const enderecosIgnorados = entradas.filter(e=>e.enderecoRaw && !e.endereco).map(e=>({codigo:e.codigo, enderecoOriginal:e.enderecoRaw}));

  return {
    produtos,
    resumo: {
      totalLinhas: linhas.length,
      codigosUnicos: produtos.length,
      comUnidade,
      comEndereco,
      enderecosDistintos,
      enderecosCorrigidos,
      enderecosIgnorados,
    },
  };
}

// Grava o catálogo atualizado no Supabase — UPSERT por código (não replace
// completo como a SB2 de saldo: aqui não faz sentido apagar tudo, o
// catálogo é fonte de descrição/unidade/endereço, perder uma linha por uma
// falha no meio do upload seria pior que só não atualizar aquele código
// desta vez). Três etapas: (1) upsert em `produtos`; (2) upsert dos
// endereços DISTINTOS em `enderecos` (sempre Armazém 01, confirmado com o
// cliente — a planilha não traz essa coluna), recuperando o `id` de cada
// um via `.select()`; (3) upsert dos vínculos produto↔endereço em
// `estoque_enderecos` usando os ids resolvidos no passo 2.
async function upsertCatalogoDescricao(produtos, onProgress){
  if(!supabaseClient) return {ok:false, erro:'Supabase não configurado.'};
  const TAMANHO_LOTE = 500;
  const agora = new Date().toISOString();
  try{
    // 1) produtos
    const linhasProdutos = produtos.map(p=>({
      codigo: p.codigo, descricao: p.descricao, grupo: p.grupo, unidade: p.unidade,
      sincronizado_em: agora,
    }));
    for(let i=0; i<linhasProdutos.length; i+=TAMANHO_LOTE){
      const lote = linhasProdutos.slice(i, i+TAMANHO_LOTE);
      const { error } = await supabaseClient.from('produtos').upsert(lote, {onConflict:'codigo'});
      if(error) return {ok:false, erro:'Falha ao gravar produtos (linha '+i+'): '+error.message};
      if(onProgress) onProgress({etapa:'produtos', feito:Math.min(i+TAMANHO_LOTE, linhasProdutos.length), total:linhasProdutos.length});
    }

    // 2) endereços distintos
    const comEndereco = produtos.filter(p=>p.endereco);
    const codigosEnderecoDistintos = Array.from(new Set(comEndereco.map(p=>p.endereco)));
    const idPorCodigoEndereco = new Map();
    for(let i=0; i<codigosEnderecoDistintos.length; i+=TAMANHO_LOTE){
      const lote = codigosEnderecoDistintos.slice(i, i+TAMANHO_LOTE).map(codigo=>({codigo, almoxarifado:'01'}));
      const { data, error } = await supabaseClient.from('enderecos').upsert(lote, {onConflict:'codigo'}).select('id, codigo');
      if(error) return {ok:false, erro:'Falha ao gravar endereços (linha '+i+'): '+error.message};
      (data||[]).forEach(row=>idPorCodigoEndereco.set(row.codigo, row.id));
      if(onProgress) onProgress({etapa:'enderecos', feito:Math.min(i+TAMANHO_LOTE, codigosEnderecoDistintos.length), total:codigosEnderecoDistintos.length});
    }

    // 3) vínculos produto↔endereço
    const vinculos = comEndereco
      .map(p=>({produto_codigo:p.codigo, endereco_id:idPorCodigoEndereco.get(p.endereco)}))
      .filter(v=>v.endereco_id);
    for(let i=0; i<vinculos.length; i+=TAMANHO_LOTE){
      const lote = vinculos.slice(i, i+TAMANHO_LOTE);
      const { error } = await supabaseClient.from('estoque_enderecos').upsert(lote, {onConflict:'produto_codigo,endereco_id'});
      if(error) return {ok:false, erro:'Falha ao vincular endereços (linha '+i+'): '+error.message};
      if(onProgress) onProgress({etapa:'vinculos', feito:Math.min(i+TAMANHO_LOTE, vinculos.length), total:vinculos.length});
    }

    return {ok:true, produtos: linhasProdutos.length, enderecos: codigosEnderecoDistintos.length, vinculos: vinculos.length};
  }catch(err){
    return {ok:false, erro:String(err && err.message || err)};
  }
}

// Última atualização do catálogo (mesmo raciocínio de `fetchUltimaAtualizacaoEstoque`
// pra SB2 de saldo) — só olha `produtos.sincronizado_em`, preenchido a cada
// upsert de `upsertCatalogoDescricao`.
async function fetchUltimaAtualizacaoCatalogo(){
  if(!supabaseClient) return null;
  try{
    const { data, error } = await supabaseClient
      .from('produtos').select('sincronizado_em')
      .order('sincronizado_em', {ascending:false}).limit(1);
    if(error || !data || data.length===0) return null;
    return data[0].sincronizado_em;
  }catch(err){
    return null;
  }
}

// Data/hora do upload mais recente da planilha SB2 — usa `sincronizado_em`
// (já preenchido automaticamente em cada linha por `default now()`, sem
// precisar de coluna nova). Basta pegar a linha mais recente; não precisa de
// RPC/agregação pra isso. Retorna null se a tabela ainda estiver vazia.
async function fetchUltimaAtualizacaoEstoque(){

/* ---------------- IMPORTAÇÃO DO HISTÓRICO DE CONTAGENS (planilha de análise) ---------------- */

// Parser da aba "BD_Contagens" da planilha de análise que o cliente já
// usava antes do Inventário 360 (Base_Analise_Contagens_2026.xlsx) — tem um
// bloco de indicadores ANTES da tabela de verdade (linhas 1-5 do arquivo
// original: título, metas, resumo), então lê a planilha como matriz crua
// (`sheet_to_json(sheet, {header:1})`) e PROCURA a linha que contém
// "Código" numa das colunas, em vez de assumir cabeçalho na linha 1 (padrão
// diferente de todo o resto do app, onde a planilha subida já começa direto
// com o cabeçalho). Colunas resolvidas pelo NOME (não pela posição) — se o
// cliente reordenar colunas numa exportação futura, continua funcionando.
// Célula de data da planilha de histórico nem sempre chega como um `Date`
// de verdade — se a coluna foi formatada como TEXTO no Excel original (bem
// comum numa planilha alimentada à mão por várias pessoas ao longo de
// meses, como a `BD_Contagens`), o SheetJS entrega uma string crua mesmo
// com `cellDates:true`, e o parser antigo (só `instanceof Date`) descartava
// a data inteira — cliente reportou item com data visível na planilha
// aparecendo como "Sem data registrada" no app. Cobre os formatos mais
// prováveis: string "DD/MM/AAAA"/"DD-MM-AAAA"/"DD/MM/AA" (com "/" ou "-"
// como separador, com ou sem hora colada no fim, ex. "14/07/2026 00:00:00"),
// string "AAAA-MM-DD"/"AAAA/MM/DD", e número de série do Excel (célula
// numérica que perdeu a formatação de data na leitura). Mantém o
// comportamento antigo (`Date` real) como caso feliz.
function parseDataHistorico(v){
  if(v instanceof Date && !Number.isNaN(v.getTime())) return v.toISOString().slice(0,10);
  if(typeof v === 'number' && window.XLSX && window.XLSX.SSF && window.XLSX.SSF.parse_date_code){
    const d = window.XLSX.SSF.parse_date_code(v);
    if(d && d.y) return String(d.y).padStart(4,'0')+'-'+String(d.m).padStart(2,'0')+'-'+String(d.d).padStart(2,'0');
    return null;
  }
  if(typeof v === 'string'){
    // Tira hora/segundos colados no fim (ex.: "14/07/2026 00:00:00") antes
    // de tentar casar com os formatos de data pura.
    const s = v.trim().replace(/\s+\d{1,2}:\d{2}(:\d{2})?\s*$/, '');
    let m = s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})$/);
    if(m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
    m = s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/);
    if(m) return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
    m = s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{2})$/);
    if(m) return '20'+m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
  }
  return null;
}

// Fallback pra quando a própria coluna "Data" não bate com nenhum formato
// conhecido: "Doc" é confirmadamente só a "Data" reformatada "DDMMYY" (ver
// CLAUDE.md "Descoberta importante durante a análise" — comparação real
// contra a planilha do cliente, "Doc" nunca é um ID à parte). Formato mais
// simples e mais estável que "Data" em si (planilha alimentada à mão), então
// vale tentar antes de desistir e marcar a linha como "sem data". Cobre o
// caso de "Doc" ter perdido o zero à esquerda por ter sido lido como número
// no Excel (mesma classe de bug já vista em código de produto/Sld.Atu.).
function parseDocParaData(v){
  if(v==null || v==='') return null;
  let s = String(v).trim();
  if(/^\d+$/.test(s)) s = s.padStart(6,'0');
  const m = s.match(/^(\d{2})(\d{2})(\d{2})$/);
  if(!m) return null;
  const [, dd, mm, yy] = m;
  if(Number(mm)<1 || Number(mm)>12 || Number(dd)<1 || Number(dd)>31) return null;
  return '20'+yy+'-'+mm+'-'+dd;
}

function parseHistoricoContagensRows(matrix){
  const headerRowIdx = matrix.findIndex(row => (row||[]).some(cell => String(cell||'').trim()==='Código'));
  if(headerRowIdx===-1){
    return { linhas: [], resumo: {totalLinhas:0, validas:0, semCodigo:0, semData:0, erroCabecalho:true} };
  }
  const header = matrix[headerRowIdx].map(h=>String(h||'').trim());
  const col = nome => header.indexOf(nome);
  const idx = {
    codigo: col('Código'), descricao: col('Descrição'), end: col('End'),
    sistema: col('Sistema'), fisico: col('Fisico'), diferenca: col('Diferença'),
    custo: col('Custo'), acc: col('Acc'), data: col('Data'), sem: col('Sem.'),
    status: col('Status'), classe: col('Classe'), causa: col('Causa'), obs: col('OBS'),
    sa: col('SA'), diasSMov: col('Dias S/ Mov.'), doc: col('Doc'),
  };
  const num = v => { if(v==null || v==='') return null; const n = Number(v); return Number.isFinite(n) ? n : null; };
  let totalLinhas = 0, semCodigo = 0, semData = 0;
  const linhas = [];
  for(let r=headerRowIdx+1; r<matrix.length; r++){
    const row = matrix[r];
    if(!row || row.every(c=>c==null || c==='')) continue; // linha em branco
    totalLinhas++;
    const codigoRaw = idx.codigo>=0 ? row[idx.codigo] : null;
    if(codigoRaw==null || String(codigoRaw).trim()===''){ semCodigo++; continue; }
    const dataRaw = idx.data>=0 ? row[idx.data] : null;
    let data = parseDataHistorico(dataRaw);
    if(!data && idx.doc>=0) data = parseDocParaData(row[idx.doc]);
    if(!data) semData++;
    // `.trim()` em TODOS os campos de texto — a planilha real já mostrou mais
    // de uma vez ter espaço sobrando em células (ver o bug do "Sld.Atu." com
    // padding do formato contábil do Excel, seção "Bug real no upload da
    // SB2"), e um "Status" tipo "OK " (com espaço) faria o filtro de
    // fetchContagensHistoricoConcluidas não bater com o valor esperado.
    const txt = v => v!=null && String(v).trim()!=='' ? String(v).trim() : null;
    linhas.push({
      // Mesma regra de reconstrução já usada pro catálogo (produtos) e pro
      // saldo SB2 (reconstructNumericCode) — a planilha de análise antiga
      // (BD_Contagens) tem o MESMO problema do Excel com código 100%
      // numérico (perde zero à esquerda/pontos), que nunca tinha sido
      // corrigido aqui. Achado ao investigar códigos aparecendo sem
      // formatação ("22103300001" em vez de "221.033.00001") em telas que
      // combinam contagens ao vivo com histórico importado.
      produto_codigo: reconstructNumericCode(codigoRaw),
      descricao: idx.descricao>=0 ? String(row[idx.descricao]||'').trim() : '',
      // "-" no lugar de null quando a planilha não traz endereço — cliente
      // confirmou que reimportar o mesmo arquivo (ou um arquivo parecido)
      // mais de uma vez estava gerando linhas duplicadas de verdade em
      // `contagens_historico`: o Postgres trata NULL como sempre diferente
      // de qualquer outro valor, mesmo de outro NULL, então a trava de
      // duplicado (unique produto_codigo+data+endereco) nunca pegava linha
      // sem endereço — cada reimportação criava uma cópia nova em vez de
      // ser bloqueada como já existente. Com um valor fixo no lugar do null,
      // a MESMA linha reimportada duas vezes agora bate na trava de
      // verdade. Não afeta nenhuma exibição — "-" nunca aparece em tela,
      // já que os lugares que mostram endereço tratam ausência de dado
      // (endereço não cadastrado) da mesma forma que sempre trataram.
      endereco: idx.end>=0 ? (txt(row[idx.end]) || '-') : '-',
      saldo_sistema: idx.sistema>=0 ? num(row[idx.sistema]) : null,
      qtd_contada: idx.fisico>=0 ? num(row[idx.fisico]) : null,
      diferenca: idx.diferenca>=0 ? num(row[idx.diferenca]) : null,
      valor_divergente: idx.custo>=0 ? num(row[idx.custo]) : null,
      acuracidade: idx.acc>=0 ? num(row[idx.acc]) : null,
      data,
      semana: idx.sem>=0 ? num(row[idx.sem]) : null,
      status: idx.status>=0 ? txt(row[idx.status]) : null,
      classe: idx.classe>=0 ? txt(row[idx.classe]) : null,
      causa: idx.causa>=0 ? txt(row[idx.causa]) : null,
      observacao: idx.obs>=0 ? txt(row[idx.obs]) : null,
      solicitacao_ajuste: idx.sa>=0 ? txt(row[idx.sa]) : null,
      dias_sem_movimento: idx.diasSMov>=0 ? num(row[idx.diasSMov]) : null,
      documento: idx.doc>=0 ? txt(row[idx.doc]) : null,
    });
  }
  // A planilha real do cliente tem linhas com a MESMA chave (produto_codigo,
  // data, endereco) repetida — vira erro no Postgres ("ON CONFLICT DO UPDATE
  // command cannot affect row a second time") se duas linhas com a mesma
  // chave caem no mesmo lote de upsert. Dedupe só quando os campos da chave
  // são não-nulos e batem — mesma semântica da unique constraint do
  // Postgres, que trata NULL como sempre distinto (mesmo de outro NULL).
  // `endereco` sozinho não fica mais nulo (vira "-" acima, ver comentário no
  // campo) — cliente reportou reimportação duplicando linha sem endereço de
  // verdade no banco, essa troca já resolve os dois lados (aqui no parser E
  // na trava do banco). Só `data` ainda pode ficar nula (~460 linhas "sem
  // data" da planilha original) e continua fora do dedupe, pra não perder
  // histórico real. Mantém a ÚLTIMA ocorrência entre as que colidem (arquivo
  // master só cresce, a linha mais abaixo tende a ser a mais recente/
  // corrigida) — mesma chave da "linha 1500" do bug reportado.
  const porChave = new Map();
  const linhasDedup = [];
  let duplicadas = 0;
  linhas.forEach(l=>{
    if(l.data==null){ linhasDedup.push(l); return; }
    const chave = l.produto_codigo+'|'+l.data+'|'+l.endereco;
    if(porChave.has(chave)){
      duplicadas++;
      linhasDedup[porChave.get(chave)] = l;
    }else{
      porChave.set(chave, linhasDedup.length);
      linhasDedup.push(l);
    }
  });
  return { linhas: linhasDedup, resumo: { totalLinhas, validas: linhasDedup.length, semCodigo, semData, duplicadas } };
}

// Upload em lote pra `contagens_historico`, via UPSERT (não substitui tudo
// como o saldo SB2 — ver `replaceEstoqueSaldoInSupabase`) porque essas
// linhas são um HISTÓRICO imutável: o arquivo master do cliente só cresce
// com novas rodadas, então ele provavelmente vai re-subir o mesmo arquivo
// (agora maior) mais de uma vez ao longo do tempo, não só uma. Upsert na
// chave (produto_codigo, data, endereco) — mesma unique constraint da
// tabela, ver backend/schema.sql — faz o re-upload não duplicar as linhas
// já importadas antes.
async function importHistoricoContagensToSupabase(linhas, onProgress){
  if(!supabaseClient) return {ok:false, erro:'Supabase não configurado.'};
  try{
    const TAMANHO_LOTE = 500;
    let inseridas = 0;
    for(let i=0; i<linhas.length; i+=TAMANHO_LOTE){
      const lote = linhas.slice(i, i+TAMANHO_LOTE);
      const { error } = await supabaseClient
        .from('contagens_historico')
        .upsert(lote, {onConflict: 'produto_codigo,data,endereco'});
      if(error) return {ok:false, erro:'Falha ao gravar lote (linha '+i+'): '+error.message, inseridas};
      inseridas += lote.length;
      if(onProgress) onProgress(inseridas, linhas.length);
    }
    return {ok:true, inseridas};
  }catch(err){
    return {ok:false, erro:String(err && err.message || err)};
  }
}

// Cliente reportou que "Contagens Concluídas" e os indicadores não
// refletiam o histórico importado — causa raiz: `contagens_historico` era
// só uma tabela de consulta/relatório, nenhuma tela do app lia dela (só os
// itens "Recontar" eram replicados pra `contagens`, ver
// buildRecontarSeedsFromHistorico logo abaixo). Essa busca traz só os
// status já CONCLUÍDOS na planilha antiga — "OK"/"Sem Ajuste"/"Ajustado" —
// pra alimentar o painel de auditoria e os indicadores (ver
// ConcludedCountsPanel/Home/Dashboard). Exclui de propósito "Recontar" e
// "Ajustar" (ambos replicados pra `contagens` de verdade, ver
// buildRecontarSeedsFromHistorico/buildAjustarSeedsFromHistorico — incluir
// aqui duplicaria) e "Pendente" (fora de escopo por enquanto — decisão
// consciente, ver CLAUDE.md). "Ajustar" saiu daqui numa rodada posterior:
// cliente apontou que esses itens NÃO estão resolvidos de verdade (o nome
// já diz que falta ajustar) e precisam aparecer como pendente em "Itens
// Divergentes", não arquivado como "concluído".
// O filtro de status é feito NO CLIENTE (não via `.in()` do PostgREST) de
// propósito: linhas importadas antes da correção de trim em
// `parseHistoricoContagensRows` podem ter espaço sobrando no valor
// ("OK " em vez de "OK"), o que faria um `.in()` exato no servidor não
// bater com nada e devolver a tabela toda vazia sem erro nenhum — mesmo
// tipo de bug silencioso já visto antes (RLS bloqueando `produtos` sem
// erro visível). Comparação normalizada (trim) do lado de cá cobre dado
// legado sujo e dado novo já limpo, sem precisar tocar no banco.
// Paginado de verdade (ver fetchTodasPaginado) — nenhum teto fixo, nem do
// código nem do projeto Supabase.
const HISTORICO_STATUS_CONCLUIDOS = ['OK', 'Sem Ajuste', 'Ajustado'];
async function fetchContagensHistoricoConcluidas(){
  if(!supabaseClient) return [];
  try{
    const data = await fetchTodasPaginado(() => supabaseClient
      .from('contagens_historico')
      .select('*')
      .order('data', {ascending:false})
      .order('id', {ascending:true}));
    return data.filter(row => HISTORICO_STATUS_CONCLUIDOS.includes(String(row.status||'').trim()));
  }catch(err){
    console.warn('Falha ao buscar histórico concluído do Supabase:', err);
    return [];
  }
}

// "Tendência Semanal" (Dashboard) precisa de TODO evento de contagem real
// do histórico, não só os já concluídos — diferente de
// fetchContagensHistoricoConcluidas (usada por Contagens Concluídas/
// Qualidade/Causas de Erro/Top Divergências, que só quer o que já tem
// veredito). Cliente reportou que "Contagens na Semana" ficava faltando
// dado mesmo depois do histórico entrar nos indicadores — causa: linhas
// com Status="Pendente" (ainda aguardando decisão) eram excluídas de tudo,
// mas pra fins de VOLUME/acuracidade semanal, um item pendente É uma
// contagem real que aconteceu naquele dia, só ainda não foi decidido.
// Exclui "Recontar" e "Ajustar" — os dois já estão representados em
// `counts` via buildRecontarSeedsFromHistorico/buildAjustarSeedsFromHistorico,

async function fetchContagensHistoricoParaTendencia(){

// Itens da planilha com Status="Recontar" não estão resolvidos de verdade —
// o cliente confirmou que ainda precisam ser recontados. Diferente do resto
// do histórico (que só vai pra `contagens_historico`, sem tocar no app ao
// vivo), esses viram uma contagem "semente" na tabela `contagens` de
// verdade, com `status_aprovacao='aguardando_segunda'` — mesmo estado que
// qualquer outro item que caiu na fila de recontagem dentro do próprio app.
// Isso faz o item aparecer normalmente em "Aguardando Segunda Contagem"
// (RecountsPanel), pronto pra qualquer operador pegar e recontar via
// RecountFlow — não precisou de nenhuma tela nova, só alimentar a mesma
// fila que já existe.
//
// `id` determinístico (`CNT-HIST-<código>-<data>`) em vez de aleatório —
// upsert com `ignoreDuplicates:true` faz re-subir o mesmo arquivo não criar
// entradas duplicadas na fila (a policy de UPDATE não existe em `contagens`
// de propósito, então usa ON CONFLICT DO NOTHING em vez de sobrescrever).
// Linhas sem `data` (parte das que a planilha não preenche) são puladas
// aqui — sem data não dá pra montar um id estável nem exibir a "1ª
// contagem" com sentido no RecountFlow, mas continuam gravadas normalmente
// em `contagens_historico`.
function buildRecontarSeedsFromHistorico(linhas){
  return linhas
    .filter(l => l.status==='Recontar' && l.produto_codigo && l.data)
    .map(l => {
      const percentual = (l.saldo_sistema!=null && l.saldo_sistema!==0 && l.diferenca!=null)
        ? (l.diferenca / l.saldo_sistema) * 100
        : null;
      const classificacao = l.valor_divergente!=null ? classifyDivergence(Math.abs(l.valor_divergente)).label : 'Divergência (importada do histórico)';
      const idSeguro = 'CNT-HIST-' + String(l.produto_codigo).replace(/[^A-Za-z0-9]/g,'') + '-' + l.data.replace(/-/g,'');
      return {
        id: idSeguro,
        inventario_id: '—',
        produto_codigo: l.produto_codigo,
        descricao: l.descricao,
        // "-" é sentinela só pra trava de duplicado da importação (ver
        // parseHistoricoContagensRows) — nunca deve aparecer na tela como
        // se fosse um endereço de verdade, então volta a virar null aqui.
        endereco: l.endereco==='-' ? null : l.endereco,
        endereco_contado: l.endereco==='-' ? null : l.endereco,
        endereco_pendente_validacao: false,
        usuario: 'Importação Histórica',
        numero_contagem: 1,
        contagem_anterior_id: null,
        qtd_contada: l.qtd_contada,
        saldo_sistema: l.saldo_sistema,
        diferenca: l.diferenca,
        percentual,
        valor_divergente: l.valor_divergente!=null ? Math.abs(l.valor_divergente) : 0,
        fora_do_cache_local: true,
        classificacao,
        status_aprovacao: 'aguardando_segunda',
        motivo: l.causa,
        tem_foto: false,
        observacao: (l.observacao ? l.observacao + ' — ' : '') + 'Importado do histórico da planilha de análise (ainda precisa de recontagem).',
        data: l.data,
        hora: null,
      };
    });
}

// Mesmo raciocínio de `buildRecontarSeedsFromHistorico`, agora pro Status
// "Ajustar" — cliente confirmou que esses itens também NÃO estão resolvidos
// de verdade (o nome já diz: falta ajustar). Diferença do "Recontar":
// aqui não falta uma contagem física de novo, falta uma DECISÃO do líder
// (aprovar o ajuste, ou mandar recontar) — por isso o status vira
// `aguardando_analise_lider` (mesmo estado de qualquer outra divergência
// aguardando o líder), não `aguardando_segunda`. Isso faz o item aparecer
// em "Itens Divergentes" (DivergentItemsPanel), com as mesmas ações que
// qualquer outra divergência ao vivo já tem (Aprovar/Solicitar nova
// contagem/Recontar/Marcar urgente/Excluir).
// `id` com prefixo diferente (`CNT-HIST-ADJ-`, não `CNT-HIST-`) — evita
// qualquer colisão teórica com o id de um seed "Recontar" pro mesmo
// código+data (não deveria acontecer, já que cada linha da planilha tem
// um Status só, mas mantém os dois espaços de id claramente distintos).
function buildAjustarSeedsFromHistorico(linhas){
  return linhas
    // "!l.solicitacao_ajuste" — pedido explícito do cliente: item "Ajustar" que
    // JÁ tem uma SA preenchida na planilha não deveria mais entrar na fila de
    // decisão do líder (a SA já existe, então já passou por essa etapa em algum
    // lugar) — só o "Ajustar" SEM SA é que representa uma divergência ainda sem
    // decisão nenhuma. Na prática, o cliente confirmou que linhas "Ajustar" nunca
    // trazem SA na planilha real — este guard é defensivo/futuro, não muda o
    // comportamento observado até aqui.
    .filter(l => l.status==='Ajustar' && l.produto_codigo && l.data && !l.solicitacao_ajuste)
    .map(l => {
      const percentual = (l.saldo_sistema!=null && l.saldo_sistema!==0 && l.diferenca!=null)
        ? (l.diferenca / l.saldo_sistema) * 100
        : null;
      const classificacao = l.valor_divergente!=null ? classifyDivergence(Math.abs(l.valor_divergente)).label : 'Divergência (importada do histórico)';
      const idSeguro = 'CNT-HIST-ADJ-' + String(l.produto_codigo).replace(/[^A-Za-z0-9]/g,'') + '-' + l.data.replace(/-/g,'');
      return {
        id: idSeguro,
        inventario_id: '—',
        produto_codigo: l.produto_codigo,
        descricao: l.descricao,
        // "-" é sentinela só pra trava de duplicado da importação (ver
        // parseHistoricoContagensRows) — nunca deve aparecer na tela como
        // se fosse um endereço de verdade, então volta a virar null aqui.
        endereco: l.endereco==='-' ? null : l.endereco,
        endereco_contado: l.endereco==='-' ? null : l.endereco,
        endereco_pendente_validacao: false,
        usuario: 'Importação Histórica',
        numero_contagem: 1,
        contagem_anterior_id: null,
        qtd_contada: l.qtd_contada,
        saldo_sistema: l.saldo_sistema,
        diferenca: l.diferenca,
        percentual,
        valor_divergente: l.valor_divergente!=null ? Math.abs(l.valor_divergente) : 0,
        fora_do_cache_local: true,
        classificacao,
        status_aprovacao: 'aguardando_analise_lider',
        motivo: l.causa,
        tem_foto: false,
        observacao: (l.observacao ? l.observacao + ' — ' : '') + 'Importado do histórico da planilha de análise (marcado "Ajustar" — aguardando decisão do líder).',
        data: l.data,
        hora: null,
      };
    });
}

// Cliente pediu uma forma de reverter, DIRETO NO SITE (sem editar a
// planilha), um item que a planilha trouxe como "Ajustado" mas cujo ajuste
// foi reprovado na realidade — "quero voltar o status de Ajustado... não
// quero fazer na planilha quero fazer no site". Reaproveita o MESMO destino
// que qualquer "Ajustar" já tem hoje (Itens Divergentes, aguardando_analise_
// lider) — o item volta a ser uma divergência pendente de decisão, com as
// mesmas ações de sempre (Aprovar/Solicitar nova contagem/Recontar/Gerar SA
// de Ajuste de novo).
//
// Dois efeitos, os dois precisam ter sucesso pra considerar a ação completa:
// (1) atualiza `contagens_historico.status` pra 'Ajustar' — só pra manter o
// registro de auditoria coerente com a decisão tomada no site; NUNCA toca no
// arquivo original (a planilha do cliente continua mostrando "Ajustado" até
// ele mesmo decidir corrigir lá, se quiser); (2) semeia a entrada equivalente
// em `contagens`, mesmo formato de `buildAjustarSeedsFromHistorico` — usa
// upsert SEM `ignoreDuplicates` de propósito (diferente da importação em
// massa, que evita sobrescrever pra não perder uma recontagem já feita): aqui
// é uma ação manual e deliberada de um admin, sobrescrever é o comportamento
// certo, não um risco de duplicar/perder dado.
async function reprovarAjusteHistoricoNaLinha(rawRow){
  if(!supabaseClient) return {ok:false, erro:'Supabase não configurado.'};
  if(!rawRow || !rawRow.produto_codigo) return {ok:false, erro:'Item do histórico inválido.'};
  try{
    const { error: errUpdate } = await supabaseClient
      .from('contagens_historico')
      .update({status: 'Ajustar'})
      .eq('produto_codigo', rawRow.produto_codigo)
      .eq('data', rawRow.data)
      .eq('endereco', rawRow.endereco);
    if(errUpdate) return {ok:false, erro:'Falha ao atualizar o histórico: '+errUpdate.message};

    const codigoSeguro = String(rawRow.produto_codigo).replace(/[^A-Za-z0-9]/g,'');
    const dataSegura = (rawRow.data||'').replace(/-/g,'');
    const idSeguro = 'CNT-HIST-ADJ-' + codigoSeguro + '-' + dataSegura;
    const percentual = (rawRow.saldo_sistema!=null && rawRow.saldo_sistema!==0 && rawRow.diferenca!=null)
      ? (rawRow.diferenca / rawRow.saldo_sistema) * 100
      : null;
    const classificacao = rawRow.valor_divergente!=null ? classifyDivergence(Math.abs(rawRow.valor_divergente)).label : 'Divergência (importada do histórico)';
    const seedRow = {
      id: idSeguro,
      inventario_id: '—',
      produto_codigo: rawRow.produto_codigo,
      descricao: rawRow.descricao,
      endereco: rawRow.endereco==='-' ? null : rawRow.endereco,
      endereco_contado: rawRow.endereco==='-' ? null : rawRow.endereco,
      endereco_pendente_validacao: false,
      usuario: 'Importação Histórica',
      numero_contagem: 1,
      contagem_anterior_id: null,
      qtd_contada: rawRow.qtd_contada,
      saldo_sistema: rawRow.saldo_sistema,
      diferenca: rawRow.diferenca,
      percentual,
      valor_divergente: rawRow.valor_divergente!=null ? Math.abs(rawRow.valor_divergente) : 0,
      fora_do_cache_local: true,
      classificacao,
      status_aprovacao: 'aguardando_analise_lider',
      motivo: rawRow.causa,
      tem_foto: false,
      observacao: (rawRow.observacao ? rawRow.observacao + ' — ' : '') + 'Ajuste reprovado manualmente no site (a planilha ainda mostra "Ajustado").',
      data: rawRow.data,
      hora: null,
    };
    const { error: errSeed } = await supabaseClient.from('contagens').upsert([seedRow], {onConflict:'id'});
    if(errSeed) return {ok:false, erro:'Histórico atualizado, mas falhou ao reabrir a divergência: '+errSeed.message};
    return {ok:true, seedLocal: contagemRowToLocal(seedRow)};
  }catch(err){
    return {ok:false, erro:String(err && err.message || err)};
  }
}

async function seedRecontarQueueFromHistorico(seeds, onProgress){
  if(!supabaseClient) return {ok:false, erro:'Supabase não configurado.'};
  if(seeds.length===0) return {ok:true, inseridas:0};
  try{
    const TAMANHO_LOTE = 500;
    let inseridas = 0;
    for(let i=0; i<seeds.length; i+=TAMANHO_LOTE){
      const lote = seeds.slice(i, i+TAMANHO_LOTE);
      const { error } = await supabaseClient
        .from('contagens')
        .upsert(lote, {onConflict: 'id', ignoreDuplicates: true});
      if(error) return {ok:false, erro:'Falha ao gravar lote na fila de recontagem (linha '+i+'): '+error.message, inseridas};
      inseridas += lote.length;
      if(onProgress) onProgress(inseridas, seeds.length);
    }
    return {ok:true, inseridas};
  }catch(err){
    return {ok:false, erro:String(err && err.message || err)};
  }
}

// Cliente reimportou a planilha depois de corrigir alguns Status na fonte
// (ex: um item que estava "Recontar"/"Ajustar" foi resolvido pra "OK"/"Sem
// Ajuste"/"Ajustado") e o site continuou mostrando o item como pendente —
// causa raiz: `seedRecontarQueueFromHistorico` usa `upsert(...,
// {ignoreDuplicates:true})`, que é ON CONFLICT DO NOTHING — reimportar com o
// Status novo simplesmente para de GERAR aquele seed (o filtro de
// buildRecontarSeedsFromHistorico/buildAjustarSeedsFromHistorico já não bate
// mais), mas isso nunca REMOVE o seed antigo que já tinha sido gravado numa
// importação anterior — ele fica órfão em `contagens`, preso pra sempre em
// "Recontagens Pendentes"/"Itens Divergentes" com o status velho.
//
// `computeIdsSeedsCandidatos(linhas)` calcula, pra cada linha do arquivo
// ATUAL, o id que o seed "Recontar" e o id que o seed "Ajustar" TERIAM pra
// aquele código+data — e marca como candidato à remoção sempre que o Status
// atual da linha não é mais o que geraria aquele seed. Isso gera candidato
// pra praticamente toda linha que não é mais Recontar/Ajustar (a maioria),
// mas só é candidato de verdade — o passo seguinte confere no banco se esse
// id EXISTE mesmo antes de decidir remover.
function computeIdsSeedsCandidatos(linhas){
  const candidatos = [];
  linhas.forEach(l=>{
    if(!l.produto_codigo || !l.data) return;
    const codigoSeguro = String(l.produto_codigo).replace(/[^A-Za-z0-9]/g,'');
    const dataSegura = l.data.replace(/-/g,'');
    if(l.status!=='Recontar') candidatos.push('CNT-HIST-'+codigoSeguro+'-'+dataSegura);
    if(!(l.status==='Ajustar' && !l.solicitacao_ajuste)) candidatos.push('CNT-HIST-ADJ-'+codigoSeguro+'-'+dataSegura);
  });
  return candidatos;
}

// Remove da fila ao vivo (`contagens`) os seeds que ficaram órfãos depois de
// uma reimportação com Status corrigido. Só remove um id quando:
// (a) o registro realmente existe e ainda é o seed original intocado
//     (`usuario='Importação Histórica'`, `numero_contagem=1` — se alguém já
//     mudou isso à mão não é mais "só um seed importado");
// (b) NENHUMA rodada seguinte foi registrada em cima dele
//     (`contagem_anterior_id` de outra linha apontando pra ele) — isso
//     evita apagar o histórico de uma recontagem que já aconteceu de
//     verdade no app nesse meio-tempo, o que perderia dado real.
// `contagens_historico` (a tabela de auditoria) nunca é tocada aqui — só
// reflete o arquivo via upsert normal (`importHistoricoContagensToSupabase`);
// esta função só limpa o efeito colateral na tabela AO VIVO.
async function limparSeedsHistoricoDesatualizados(linhas, onProgress){
  if(!supabaseClient) return {ok:false, erro:'Supabase não configurado.', removidas:0};
  const candidatos = computeIdsSeedsCandidatos(linhas);
  if(candidatos.length===0) return {ok:true, removidas:0};
  try{
    const TAMANHO_LOTE = 300;
    let removidas = 0;
    for(let i=0; i<candidatos.length; i+=TAMANHO_LOTE){
      const lote = candidatos.slice(i, i+TAMANHO_LOTE);
      const { data: existentes, error: err1 } = await supabaseClient
        .from('contagens')
        .select('id')
        .in('id', lote)
        .eq('usuario', 'Importação Histórica')
        .eq('numero_contagem', 1);
      if(err1) return {ok:false, erro:'Falha ao verificar seeds existentes: '+err1.message, removidas};
      if(!existentes || existentes.length===0){ if(onProgress) onProgress(removidas, candidatos.length); continue; }
      const idsExistentes = existentes.map(r=>r.id);
      const { data: referenciados, error: err2 } = await supabaseClient
        .from('contagens')
        .select('contagem_anterior_id')
        .in('contagem_anterior_id', idsExistentes);
      if(err2) return {ok:false, erro:'Falha ao verificar recontagens já feitas: '+err2.message, removidas};
      const idsReferenciados = new Set((referenciados||[]).map(r=>r.contagem_anterior_id));
      const idsSeguros = idsExistentes.filter(id=>!idsReferenciados.has(id));
      if(idsSeguros.length>0){
        const { error: err3 } = await supabaseClient.from('contagens').delete().in('id', idsSeguros);
        if(err3) return {ok:false, erro:'Falha ao remover seeds desatualizados: '+err3.message, removidas};
        removidas += idsSeguros.length;
      }
      if(onProgress) onProgress(removidas, candidatos.length);
    }
    return {ok:true, removidas};
  }catch(err){
    return {ok:false, erro:String(err && err.message || err), removidas:0};
  }
}

// Converte uma linha vinda do Supabase (RPC ou consulta direta) pro MESMO
// formato de objeto "produto" que o app sempre usou (antes vindo do cache
// local RAW_SB2_PRODUCTS/PRODUCTS, removido — ver CLAUDE.md "cache local
// removido") — assim CountStep e o resto do app não precisam saber de onde
// o dado veio. `custoUnit` é derivado de valor_financeiro/saldo (custo médio
// real), já que nem `estoque_saldo` nem `produtos` guardam custo unitário
// direto.
function estoqueRowToProduct(row){
  // row.saldo pode ser null (código sem NENHUMA linha em estoque_saldo — não
  // sabemos o saldo) vs. 0 (linha existe, saldo real é zero) — os dois casos
  // são diferentes pra CountStep (hasSaldoLocal checa `typeof===number`),
  // então null tem que continuar null, nunca virar 0 por engano.
  const temSaldo = row.saldo!=null;
  const saldo = temSaldo ? Number(row.saldo) : null;
  const valorFinanceiro = Number(row.valor_financeiro||0);
  return {
    codigo: row.codigo,
    descricao: row.descricao,
    unidade: row.unidade || null,
    familia: describeGrupo(row.grupo),
    grupo: row.grupo,
    endereco: row.endereco_codigo || null,
    enderecoCadastrado: !!row.endereco_codigo,
    almoxarifado: row.almoxarifado,
    corredor: row.corredor || null,
    rua: row.rua || null,
    saldoSistema: saldo,
    custoUnit: (temSaldo && saldo!==0) ? valorFinanceiro/saldo : 0,
    valorFinanceiro,
    semMovimentoRecente: !!row.sem_movimento_recente,
    ultimaSaida: row.data_ultima_saida || null,
    foraDoCacheLocal: true,
  };
}

// Lista priorizada de itens pra "Contagem Aleatória"/"Curva ABC", "Rota de
// Endereço" e "Contagem por Grupo" — substitui o cache local estático de 300
// SKUs (removido, ver CLAUDE.md). Chama a RPC `contagem_itens_prioritarios`
// (sem-movimento-recente primeiro, depois valor financeiro decrescente).
// `grupos` (opcional, ARRAY de códigos) filtra só os itens de QUALQUER um
// desses grupos/famílias de produto — usado por "Contagem por Grupo" (pode
// selecionar mais de um grupo). `almoxarifados` (opcional, ARRAY de códigos)
// filtra só os itens com saldo em QUALQUER um desses armazéns — cliente
// reportou que um item com saldo em mais de um armazém nunca batia, porque a
// contagem comparava contra saldo de qualquer armazém, não só o físico de
// onde o item está sendo contado. Todo fluxo baseado nesta função (Aleatória,
// Curva ABC, Rota, Grupo) precisa sempre passar o(s) armazém(ns) — seja do
// inventário (`inv.almoxarifado`) ou escolhido na hora (contagem avulsa).
// `gruposExcluidos` (opcional, ARRAY de códigos, configurado pelo admin em
// Configurações → "Grupos Excluídos da Contagem Automática") remove da fila
// itens de grupos que o cliente marcou como "material não existe fisicamente"
// — filtrado NO CLIENTE (não na RPC, que não recebe esse parâmetro — evita
// exigir uma migração de SQL só pra isso e depender do cliente rodar). Como o
// filtro acontece DEPOIS do `limit` da RPC, busca um "buffer" maior quando há
// exclusão configurada, senão a exclusão poderia devolver menos itens do que
// o pedido só porque parte caiu num grupo excluído.
async function fetchContagemItensPrioritarios(limit, grupos, almoxarifados, gruposExcluidos){
  if(!supabaseClient) return [];
  const temExclusao = !!(gruposExcluidos && gruposExcluidos.length);
  const limitBusca = temExclusao ? Math.min(limit * 4, 2000) : limit;
  try{
    const { data, error } = await supabaseClient.rpc('contagem_itens_prioritarios', {
      p_limit: limitBusca,
      p_grupos: (grupos && grupos.length) ? grupos : null,
      p_almoxarifados: (almoxarifados && almoxarifados.length) ? almoxarifados : null,
    });
    if(error || !data) return [];
    let produtos = data.map(estoqueRowToProduct);
    if(temExclusao) produtos = produtos.filter(p => !gruposExcluidos.includes(String(p.grupo)));
    return produtos.slice(0, limit);
  }catch(err){
    console.warn('Falha ao buscar itens prioritários para contagem:', err);
    return [];
  }
}

// Grupos que realmente têm algum item com saldo carregado (não os ~248
// grupos possíveis do catálogo, a maioria ainda sem saldo importado) —
// alimenta o seletor de grupo em "Contagem por Grupo". `label` já vem
// pronto no formato "01 - Chapas Inox" (número + descrição), pedido do
// cliente pra sempre mostrar os dois juntos. `gruposExcluidos` (opcional)
// tira da lista os grupos que o admin marcou como excluídos da contagem
// automática — não faz sentido deixar selecionar manualmente pra gerar
// inventário um grupo que foi justamente marcado como "não existe
// fisicamente".
async function fetchGruposComEstoque(gruposExcluidos){
  if(!supabaseClient) return [];
  try{
    const { data, error } = await supabaseClient.rpc('grupos_com_estoque');
    if(error || !data) return [];
    let lista = data.map(row => ({ grupo: row.grupo, descricao: describeGrupo(row.grupo), label: formatGrupoLabel(row.grupo), qtdItens: Number(row.qtd_itens) }));
    if(gruposExcluidos && gruposExcluidos.length) lista = lista.filter(g => !gruposExcluidos.includes(String(g.grupo)));
    return lista;
  }catch(err){
    console.warn('Falha ao buscar grupos com estoque:', err);
    return [];
  }
}

// Substitui o antigo `ANY_ADDRESS_REGISTERED` (derivado do cache local, onde
// era sempre `false`) — libera o módulo de Rota de Endereço quando existir
// pelo menos um endereço com item associado de verdade no Supabase.
async function fetchAnyAddressRegistered(){
  if(!supabaseClient) return false;
  try{
    const { count, error } = await supabaseClient
      .from('estoque_enderecos')
      .select('*', {count:'exact', head:true});
    if(error) return false;
    return (count||0) > 0;
  }catch(err){
    console.warn('Falha ao checar endereços cadastrados:', err);
    return false;
  }
}

// Busca em lote (produtos + estoque_saldo, mesmo padrão non-FK-join já usado
// em searchSupabaseCatalog) pra uma lista de códigos — usada pra enriquecer
// lista importada (Excel) e pela recontagem, quando o item não está mais
// disponível no que já foi salvo localmente. Retorna um Map codigo→produto.
//
// `almoxarifado` (opcional) filtra o saldo pro armazém exato, quando se sabe
// qual é (mesmo raciocínio de searchSupabaseCatalog). Sem esse contexto (a
// lista importada e a recontagem não guardam em qual armazém o item foi
// contado — ver CLAUDE.md), NÃO soma mais o saldo de todos os armazéns como
// antes (isso nunca batia com a contagem física de um único local): se o
// código só existe num armazém, usa esse valor direto (seguro, sem
// ambiguidade); se existe em mais de um, marca saldo como null (sem
// comparação automática) em vez de arriscar um número errado.
async function fetchProdutosByCodigos(codigos, almoxarifado){
  const mapa = new Map();
  if(!supabaseClient || !codigos || codigos.length===0) return mapa;
  try{
    const { data: produtosRows } = await supabaseClient
      .from('produtos')
      .select('codigo, descricao, unidade, grupo')
      .in('codigo', codigos);
    if(!produtosRows || produtosRows.length===0) return mapa;

    let saldoQuery = supabaseClient
      .from('estoque_saldo')
      .select('produto_codigo, almoxarifado, saldo, valor_financeiro, data_ultima_saida')
      .in('produto_codigo', codigos);
    if(almoxarifado) saldoQuery = saldoQuery.eq('almoxarifado', almoxarifado);
    const { data: saldoRows } = await saldoQuery;
    const linhasPorCodigo = {};
    (saldoRows||[]).forEach(r=>{
      (linhasPorCodigo[r.produto_codigo] = linhasPorCodigo[r.produto_codigo] || []).push(r);
    });

    produtosRows.forEach(p=>{
      const linhas = linhasPorCodigo[p.codigo] || [];
      // Com armazém informado, no máximo 1 linha (já filtrado na query).
      // Sem armazém: só usa o valor se for inequívoco (1 armazém só) —
      // mais de um vira "sem saldo pra comparar" em vez de somado.
      const unica = linhas.length===1 ? linhas[0] : null;
      const s = unica || {};
      mapa.set(p.codigo, estoqueRowToProduct({
        codigo: p.codigo,
        descricao: p.descricao,
        unidade: p.unidade,
        grupo: p.grupo,
        almoxarifado: s.almoxarifado || (linhas.length>1 ? linhas.map(l=>l.almoxarifado).join('/') : '—'),
        saldo: unica ? s.saldo : null,
        valor_financeiro: unica ? s.valor_financeiro : 0,
        data_ultima_saida: s.data_ultima_saida || null,
        sem_movimento_recente: false,
        endereco_codigo: null,
        corredor: null,
        rua: null,
      }));
    });
  }catch(err){
    console.warn('Falha ao buscar produtos em lote:', err);
  }
  return mapa;
}

// Descrição do grupo pra exibir na UI — cai de volta pro rótulo cru "Grupo N"
// se algum código não estiver no mapa acima (evita quebrar pra grupo novo
// ainda não coberto pela planilha do cliente).
function describeGrupo(grupo){
  if(grupo==null) return '—';
  return GRUPO_DESCRICOES[String(grupo)] || ('Grupo ' + grupo);
}

// "01 - Chapas Inox" — pedido do cliente pra sempre mostrar o número do
// grupo junto da descrição (não só a descrição sozinha), tanto no seletor de
// "Contagem por Grupo" quanto no nome automático do inventário e no aviso da
// fila de contagem. `padStart(2,'0')` casa com a mesma convenção já usada
// pro código de armazém (chip "01" em vez de "1") — grupos com código de 3+
// dígitos aparecem no tamanho natural, sem cortar nada.
function formatGrupoLabel(grupo){
  if(grupo==null) return '—';
  return String(grupo).padStart(2,'0') + ' - ' + describeGrupo(grupo);
}

// Tira zero(s) à esquerda de um código de armazém ("01"→"1") — o campo
// "Almoxarifado" (NewInventory) sempre re-preenche o código com 2 dígitos só
// pra EXIBIÇÃO (chip "01"), mas `estoque_saldo.almoxarifado` guarda o código
// CRU como veio da planilha SB2 (ex.: "1", não "01" — ver parseSB2Rows).
// Sem normalizar antes de filtrar a busca por armazém, "01" nunca bateria
// com "1" no banco (comparação de texto) e o filtro silenciosamente não
// encontraria nada.
function normalizarCodigoAlmox(v){
  const semZeros = String(v).trim().replace(/^0+(?=\d)/, '');
  return semZeros || '0';
}

// O cache local estático de 300 SKUs (RAW_SB2_PRODUCTS/PRODUCTS) foi removido —
// ver CLAUDE.md "Remoção do cache local de 300 SKUs". Todo o catálogo agora vem
// ao vivo do Supabase (produtos + estoque_saldo + enderecos), via
// searchSupabaseCatalog/fetchContagemItensPrioritarios/fetchProdutosByCodigos/
// fetchAnyAddressRegistered, abaixo.
// Padrão fixo de endereço da Selgron: 3 números, traço, 1 letra, traço,
// 1 número (ex: 035-A-1). Aplica a máscara enquanto o operador digita —
// insere os traços automaticamente e só aceita dígito/letra na posição
// certa — pra evitar erro de digitação num campo que hoje é obrigatório.
const ENDERECO_REGEX = /^\d{3}-[A-Z]-\d$/;

function formatEnderecoInput(value){
  const raw = String(value||'').toUpperCase().replace(/[^0-9A-Z]/g, '');
  let numPart = '', letterPart = '', lastPart = '';
  for(const ch of raw){
    if(numPart.length < 3){
      if(/[0-9]/.test(ch)) numPart += ch;
    } else if(!letterPart){
      if(/[A-Z]/.test(ch)) letterPart = ch;
    } else if(lastPart.length < 1){
      if(/[0-9]/.test(ch)) lastPart += ch;
    }
  }
  let out = numPart;
  if(letterPart) out += '-' + letterPart;
  if(lastPart) out += '-' + lastPart;
  return out;
}

// MÓDULO 7 — regra de aprovação. Cliente pediu explicitamente pra remover a
// aprovação automática "por %" (um item caro com pouca % de diferença
// passava batido sem ninguém ver, um item barato com % alta ia pra fila à
// toa) e passou a medir pelo VALOR (R$) da diferença, não mais percentual:
//  R$ 0 (contagem bateu exata) → aprovado automaticamente (única exceção —
//    não há divergência nenhuma pra alguém analisar)
//  Até R$ 49,99            → direto pra análise do líder (não compensa o
//    esforço de recontar fisicamente um valor tão baixo)
//  A partir de R$ 50        → segunda contagem primeiro (só aqui vale a
//    pena conferir de novo antes de escalar pro líder)
// `computeStatus` (abaixo) não mudou nada — já decidia por `level`
// ('ok'/'warn'/outro), só o critério que gera esse `level` mudou de % pra
// R$. Ver também `diferencaConfirmada` em `CountStep`: numa recontagem, se
// a diferença bater exatamente com a da rodada anterior, isso é sinalizado
// à parte pro líder ("Diferença confirmada, seguir com ajuste").
function classifyDivergence(valorDivergente){
  const v = Math.abs(Number(valorDivergente));
  if(v === 0) return {level:'ok', label:'Sem divergência', rule:'Aprovado automaticamente'};
  if(v < 50) return {level:'danger', label:'Diferença abaixo de R$ 50', rule:'Enviado para análise do líder'};
  return {level:'warn', label:'Diferença de R$ 50 ou mais', rule:'Segunda contagem solicitada'};
}

// BUG REAL corrigido (visto em produção): `custoUnit` vale `0` tanto quando o
// produto genuinamente não tem custo quanto quando o custo é DESCONHECIDO
// (sem valor_financeiro/saldo cadastrado — ver `custoUnit:(temSaldo &&
// saldo!==0) ? valorFinanceiro/saldo : 0` em `estoqueRowToProduct` e os
// fallbacks `custoUnit:0` de produtos sintéticos). Isso fazia
// `diffValor = diferença × custoUnit` sempre dar R$ 0 pra QUALQUER
// diferença de quantidade nesses itens — e `classifyDivergence(0)` aprova
// automaticamente, sem ninguém analisar, não importa o tamanho real da
// diferença (chegou a acontecer com uma diferença de bilhões de unidades
// marcada como "confere com o sistema"). Esta função é a rede de segurança:
// sem custo cadastrado pra confirmar que a diferença é pequena em valor,
// qualquer diferença de quantidade (por menor que seja) vai direto pra
// análise do líder — pedido explícito do cliente, sem régua de percentual
// nenhuma aqui (diferente da regra por R$, que tem 2 patamares).
function classifyDivergenceSemCusto(){
  return {level:'danger', label:'Diferença sem custo cadastrado', rule:'Enviado para análise do líder (sem custo cadastrado)'};
}

// Classificação visual de 4 níveis — usada só nos cards de Recontagens/
// Itens Divergentes/Contagens Concluídas (pedido do cliente, ver mockup
// de referência). NÃO substitui `classifyDivergence` acima, que continua
// sendo a regra de NEGÓCIO real (aprovação automática/segunda contagem/
// análise do líder, limiares 5%/15% de PERCENTUAL) — esta função é só
// exibição/filtro. Recebe o VALOR (R$) da divergência, não mais o
// percentual — cliente pediu explicitamente essa troca: uma divergência de
// 90% num item de R$50 importa muito menos que uma de 5% num item de
// R$50.000, então classificar por valor financeiro reflete melhor o que
// precisa de atenção primeiro. Faixas confirmadas com o cliente: até R$100
// Baixa, R$100–500 Média, R$500–2.000 Alta, acima de R$2.000 Crítica.
// `null` continua reservado pro caso de item sem saldo do sistema pra
// comparar (nenhum percentual/valor confiável pra calcular) — os call sites
// passam `c.percentual==null ? null : c.valorDivergente`, preservando esse
// estado "sem dado" mesmo com o eixo de classificação tendo mudado.
function classifySeverity4(valorDivergente){
  if(valorDivergente==null) return {level:'sem_dado', label:'Sem saldo', color:'var(--ink-dim)', bg:'var(--panel-raised)', icon:'—'};
  const v = Math.abs(Number(valorDivergente));
  if(v<=100) return {level:'baixa', label:'Baixa', color:'var(--ok)', bg:'var(--ok-bg)', icon:'✓'};
  if(v<=500) return {level:'media', label:'Média', color:'var(--warn)', bg:'var(--warn-bg)', icon:'—'};
  if(v<=2000) return {level:'alta', label:'Alta', color:'var(--safety)', bg:'#FFF3E0', icon:'!'};
  return {level:'critica', label:'Crítica', color:'var(--danger)', bg:'var(--danger-bg)', icon:'⚠'};
}
// Extrai o valor que `classifySeverity4` deve usar a partir de uma contagem —
// pequeno helper pra não repetir o mesmo ternário em cada chamada (8 pontos
// diferentes: RecountsPanel, DivergentItemsPanel, ConcludedCountsPanel,
// SeverityFilterRow, RecountFlow).
function severidadeDe(c){
  return c.percentual==null ? null : c.valorDivergente;
}

// Badge de categoria do card — de onde essa contagem veio, cruzando
// `count.inventario` (id local, ou '—' pra contagem avulsa) com a lista de
// inventários já carregada. Nunca inventa uma categoria: se o inventário
// não for encontrado (ex: já foi excluído), cai em "Avulsa" também, mesmo
// tratamento de uma contagem sem inventário associado.
function categoriaDoInventario(count, inventories){
  if(!count.inventario || count.inventario==='—') return 'Avulsa';
  const inv = (inventories||[]).find(i=>i.id===count.inventario);
  if(!inv) return 'Avulsa';
  return inv.tipo==='Lista Importada (Excel)' ? 'Importação' : inv.tipo;
}

// MÓDULO 7 — regra de segunda contagem, aplicada sobre o resultado de CADA
// contagem (a 1ª ou qualquer recontagem seguinte):
//  ≤5%           → aprovado (automaticamente na 1ª, ou confirmado na recontagem)
//  5–15% na 1ª   → aguarda segunda contagem, feita por outro operador
//  >15% na 1ª, ou qualquer recontagem que ainda divirja acima de 5%
//                → vai para análise do líder de estoque
function computeStatus(numeroContagem, level){
  if(level==='ok') return numeroContagem===1 ? 'aprovado_auto' : 'aprovado_segunda';
  if(numeroContagem===1) return level==='warn' ? 'aguardando_segunda' : 'aguardando_analise_lider';
  return 'aguardando_analise_lider';
}

const STATUS_INFO = {
  aprovado_auto: {level:'ok', text:'Aprovado automaticamente'},
  aprovado_segunda: {level:'ok', text:'Aprovado — a recontagem confirmou o saldo dentro da tolerância'},
  aguardando_segunda: {level:'warn', text:'Segunda contagem solicitada — deve ser feita por outro operador'},
  aguardando_analise_lider: {level:'danger', text:'Enviado para análise do líder de estoque'},
  aprovado_lider: {level:'ok', text:'Divergência aprovada pelo líder de estoque — sem ajuste necessário'},
  // Fluxo real de ajuste de estoque da Selgron (pedido do cliente): o líder
  // não finaliza mais uma divergência confirmada direto — gera uma SA de
  // Ajuste e manda pra aprovação da Diretoria (`enviarParaAprovacaoDiretoria`
  // em App()); só depois da Diretoria decidir o item conta como resolvido
  // (`aprovarAjusteDiretoria`) ou volta pra recontagem (`reprovarAjusteDiretoria`,
  // que grava o status de volta como `aguardando_segunda`, ver OPEN_STATUSES).
  aguardando_aprovacao_diretoria: {level:'warn', text:'SA de ajuste enviada — aguardando aprovação da Diretoria'},
  ajuste_aprovado_diretoria: {level:'ok', text:'Ajuste aprovado pela Diretoria e efetivado no estoque'},
};

// Status que ainda não foram resolvidos — enquanto um item estiver num
// desses, existe um "documento de contagem em aberto" pra ele.
const OPEN_STATUSES = ['aguardando_segunda', 'aguardando_analise_lider', 'aguardando_aprovacao_diretoria'];

// Encontra o documento de contagem em aberto (se houver) mais recente pra um
// código de produto — usado pra bloquear lançar uma contagem NOVA (1ª
// rodada) de um item que já está em análise/aguardando recontagem em outro
// lugar do app. Só olha a PONTA de cada corrente de recontagem (o registro
// que ainda não tem uma rodada seguinte), mesma lógica já usada em
// RecountsPanel pra montar as filas de recontagem.
function getOpenCountForProduct(counts, productCode){
  const hasFollowUp = new Set();
  counts.forEach(c=>{ if(c.contagemAnteriorId) hasFollowUp.add(c.contagemAnteriorId); });
  return counts.find(c=>c.productCode===productCode && !hasFollowUp.has(c.id) && OPEN_STATUSES.includes(c.statusAprovacao)) || null;
}
